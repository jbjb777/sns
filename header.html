<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Header - Sharer</title>
  <script>
    const savedTheme = localStorage.getItem('theme') || 'dark';
    if (savedTheme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
    }

    html[data-theme="light"] {
      --bg: #fafafa;
      --bg2: #ffffff;
      --bg3: #f0f0f0;
      --bg4: #e4e4e4;
      --border: #dbdbdb;
      --border2: #cccccc;
      --border3: #a3a3a3;
      --t1: #000000;
      --t2: #737373;
      --t3: #a8a8a8;
    }

    html, body {
      width: 100%;
      height: 56px;
      overflow: hidden;
      background: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--bg);
    }

    /* ===== Mobile Top Bar - iframe 내부에서는 항상 flex ===== */
    .mobile-topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: rgba(0, 0, 0, 0.84);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    html[data-theme="light"] .mobile-topbar {
      background: rgba(250, 250, 250, 0.88);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .topbar-logo {
      width: 28px;
      height: 28px;
      display: block;
      flex-shrink: 0;
      object-fit: contain;
      filter: none !important;
    }

    .topbar-title {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--t1);
      line-height: 1;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .topbar-btn {
      position: relative;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s ease, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      -webkit-tap-highlight-color: transparent;
    }

    .topbar-btn:hover { background: var(--bg3); }
    .topbar-btn:active { transform: scale(0.92); }

    .topbar-btn .icon-img {
      width: 21px;
      height: 21px;
      display: block;
      object-fit: contain;
      transition: filter 0.2s ease;
      filter: none;
    }

    html[data-theme="light"] .topbar-btn .icon-img.icon-invert {
      filter: invert(1);
    }

    /* ===== 빨간 말풍선 카운트 - 인스타 스타일 ===== */
    .noti-bubble {
      position: absolute;
      top: -1px;
      right: -4px;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      background: #ff3040;
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
      border-radius: 11px;
      border: 2px solid var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: center bottom;
      transform: scale(0) translateY(12px);
      opacity: 0;
      pointer-events: none;
      z-index: 5;
      will-change: transform, opacity;
      box-shadow: 0 3px 10px rgba(255,48,64,0.38);
    }

    html[data-theme="light"] .noti-bubble {
      border-color: #ffffff;
      box-shadow: 0 3px 10px rgba(255,48,64,0.32);
    }

    .noti-bubble.show { opacity: 1; }
    .noti-bubble.pop-in { animation: bubblePopIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .noti-bubble.pop-out { animation: bubblePopOut 0.4s cubic-bezier(0.4, 0, 0.7, 1) forwards; }

    @keyframes bubblePopIn {
      0% { transform: scale(0) translateY(14px); opacity: 0; }
      40% { transform: scale(1.4) translateY(-8px); opacity: 1; }
      65% { transform: scale(0.9) translateY(2px); opacity: 1; }
      85% { transform: scale(1.08) translateY(-3px); opacity: 1; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    @keyframes bubblePopOut {
      0% { transform: scale(1) translateY(0); opacity: 1; }
      20% { transform: scale(1.15) translateY(-4px); opacity: 1; }
      100% { transform: scale(0) translateY(-20px); opacity: 0; }
    }
  </style>
</head>
<body>
  <header class="mobile-topbar" role="banner" aria-label="상단바">
    <a class="topbar-left" href="index.html" data-parent-nav aria-label="Sharer 홈">
      <img src="logo.svg" alt="Sharer 로고" class="topbar-logo" width="28" height="28" />
      <span class="topbar-title">Sharer</span>
    </a>

    <div class="topbar-actions">
      <a class="topbar-btn" href="set.html" data-parent-nav aria-label="설정">
        <img src="set.svg" alt="설정" class="icon-img icon-invert" width="21" height="21" />
      </a>

      <a class="topbar-btn" href="notification.html" data-parent-nav aria-label="알림" id="notiBtn">
        <img src="bell.svg" alt="알림" class="icon-img icon-invert" width="21" height="21" />
        <span class="noti-bubble" id="topbarNotiBubble" aria-hidden="true">0</span>
      </a>
    </div>
  </header>

  <script>
    // ===== 부모 페이지로 직접 이동 (iframe 대응) =====
    function navigateParent(url) {
      try {
        if (window.parent && window.parent !== window) {
          window.parent.location.href = url;
        } else {
          window.location.href = url;
        }
      } catch (e) {
        // cross-origin 차단 시 fallback
        window.location.href = url;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('[data-parent-nav]').forEach((el) => {
        el.addEventListener('click', (e) => {
          e.preventDefault();
          const href = el.getAttribute('href');
          if (href) navigateParent(href);
        });
      });
    });

    // ===== 실시간 새로고침 로직 (기존 그대로 유지) =====
    const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";

    async function api(endpoint, options = {}) {
      const url = API_BASE + endpoint;
      const res = await fetch(url, {
        ...options,
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
      });
      if (!res.ok) {
        let t = "";
        try { t = await res.text(); } catch {}
        throw new Error(t || ("HTTP " + res.status));
      }
      if (res.status === 204) return null;
      return res.json();
    }

    function getCurrentUser() {
      try {
        const raw = localStorage.getItem('snsUser');
        if (!raw) return null;
        return JSON.parse(raw);
      } catch { return null; }
    }

    const bubbleEl = document.getElementById('topbarNotiBubble');
    let prevCount = -1;
    let isFirst = true;
    let hideTimer = null;
    let outTimer = null;

    function formatCount(n) {
      n = Number(n) || 0;
      if (n > 99) return '99+';
      if (n > 9) return '9+';
      return String(n);
    }

    function hideImmediate() {
      if (!bubbleEl) return;
      if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
      if (outTimer) { clearTimeout(outTimer); outTimer = null; }
      bubbleEl.classList.remove('show','pop-in','pop-out');
    }

    function showBubble(count) {
      if (!bubbleEl) return;
      count = Number(count) || 0;
      if (count <= 0) { hideImmediate(); return; }

      if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
      if (outTimer) { clearTimeout(outTimer); outTimer = null; }

      bubbleEl.textContent = formatCount(count);
      bubbleEl.classList.remove('pop-out');
      bubbleEl.classList.add('show');

      void bubbleEl.offsetWidth;
      bubbleEl.classList.remove('pop-in');
      void bubbleEl.offsetWidth;
      bubbleEl.classList.add('pop-in');

      hideTimer = setTimeout(() => {
        bubbleEl.classList.remove('pop-in');
        bubbleEl.classList.add('pop-out');
        outTimer = setTimeout(() => {
          bubbleEl.classList.remove('show','pop-out');
        }, 400);
      }, 2000);
    }

    async function checkUnread() {
      const user = getCurrentUser();
      if (!user || !user.id) {
        if (isFirst) {
          isFirst = false;
          prevCount = 0;
        }
        return;
      }
      try {
        const or = encodeURIComponent('(isread.eq.0,isread.is.null)');
        const data = await api(`/notification?user=eq.${user.id}&or=${or}&select=isread&limit=100`);
        const count = Array.isArray(data) ? data.length : 0;

        if (isFirst) {
          isFirst = false;
          prevCount = count;
          if (count > 0) {
            showBubble(count);
          }
          return;
        }

        if (count > prevCount && count > 0) {
          showBubble(count);
        } else if (count === 0 && prevCount > 0) {
          hideImmediate();
        }

        prevCount = count;
      } catch (e) {
        console.warn('[topbar] 알림 체크 실패', e);
      }
    }

    let timer = null;
    function start() {
      if (timer) clearInterval(timer);
      checkUnread();
      timer = setInterval(() => {
        if (document.hidden) return;
        checkUnread();
      }, 3000);
      window.addEventListener('focus', checkUnread);
      document.addEventListener('visibilitychange', () => { if (!document.hidden) checkUnread(); });
      window.addEventListener('storage', (e) => {
        if (!e.key) return;
        if (e.key === 'theme') {
          const v = e.newValue || 'dark';
          if (v === 'light') document.documentElement.setAttribute('data-theme','light');
          else document.documentElement.removeAttribute('data-theme');
        }
        if (e.key === 'snsUser' || e.key.includes('noti')) checkUnread();
      });
    }

    document.addEventListener('DOMContentLoaded', start);
    if (document.readyState !== 'loading') start();

    window.testNotiBubble = (n) => {
      showBubble(n ?? 3);
      console.log('[test] bubble pop!', n);
    };
    window.refreshTopbarNoti = checkUnread;
    window._hideBubble = hideImmediate;
  </script>
</body>
</html>
