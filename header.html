<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Header - Sharer</title>
  <script>
    const savedTheme = localStorage.getItem('theme') || 'dark';
    if (savedTheme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --r1: 10px;
      --r2: 14px;
    }

    html[data-theme="light"] {
      --bg: #fafafa;
      --bg2: #ffffff;
      --bg3: #f0f0f0;
      --bg4: #e4e4e4;
      --border: #dbdbdb;
      --border2: #cccccc;
      --border3: #a3a3a3;
      --t1: #000000;
      --t2: #737373;
      --t3: #a8a8a8;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Mobile Top Bar ===== */
    .mobile-topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: rgba(0, 0, 0, 0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: background 0.2s ease;
    }

    html[data-theme="light"] .mobile-topbar {
      background: rgba(250, 250, 250, 0.86);
    }

    @media (max-width: 768px) {
      .mobile-topbar { display: flex; }
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .topbar-logo {
      width: 28px;
      height: 28px;
      display: block;
      flex-shrink: 0;
      object-fit: contain;
      filter: none !important;
    }

    .topbar-title {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--t1);
      line-height: 1;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .topbar-btn {
      position: relative;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s ease, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      -webkit-tap-highlight-color: transparent;
    }

    .topbar-btn:hover { background: var(--bg3); }
    .topbar-btn:active { transform: scale(0.92); }

    .topbar-btn .icon-img {
      width: 20px;
      height: 20px;
      display: block;
      object-fit: contain;
      transition: filter 0.2s ease;
      filter: none;
    }

    html[data-theme="light"] .topbar-btn .icon-img.icon-invert {
      filter: invert(1);
    }

    /* ===== 알림 말풍선 (빨간 카운트 배지) - 인스타 스타일 팝 효과 ===== */
    .noti-bubble {
      position: absolute;
      top: 0px;
      right: -2px;
      min-width: 19px;
      height: 19px;
      padding: 0 5px;
      background: #ff3040;
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
      border-radius: 10px;
      border: 2px solid var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: center bottom;
      transform: scale(0) translateY(10px);
      opacity: 0;
      pointer-events: none;
      z-index: 2;
      will-change: transform, opacity;
      box-shadow: 0 2px 8px rgba(255,48,64,0.35);
    }

    html[data-theme="light"] .noti-bubble {
      border-color: #ffffff;
      box-shadow: 0 2px 8px rgba(255,48,64,0.28);
    }

    .noti-bubble.show {
      opacity: 1;
    }

    .noti-bubble.pop-in {
      animation: bubblePopIn 0.52s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .noti-bubble.pop-out {
      animation: bubblePopOut 0.38s cubic-bezier(0.4, 0, 0.6, 1) forwards;
    }

    @keyframes bubblePopIn {
      0% {
        transform: scale(0) translateY(10px);
        opacity: 0;
      }
      35% {
        transform: scale(1.35) translateY(-6px);
        opacity: 1;
      }
      60% {
        transform: scale(0.92) translateY(1px);
        opacity: 1;
      }
      80% {
        transform: scale(1.08) translateY(-2px);
        opacity: 1;
      }
      100% {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    @keyframes bubblePopOut {
      0% {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
      25% {
        transform: scale(1.15) translateY(-3px);
        opacity: 1;
      }
      100% {
        transform: scale(0) translateY(-18px);
        opacity: 0;
      }
    }

    /* 데모 확인용 배경 */
    .demo-bg { display: none; }
    @media (max-width: 768px) {
      .demo-bg {
        display: block;
        height: 200vh;
        background: var(--bg);
      }
    }
  </style>
</head>
<body>
  <header class="mobile-topbar" role="banner" aria-label="상단바">
    <a class="topbar-left" href="index.html" target="_top" aria-label="Sharer 홈으로 이동">
      <img src="logo.svg" alt="Sharer 로고" class="topbar-logo" width="28" height="28" />
      <span class="topbar-title">Sharer</span>
    </a>

    <div class="topbar-actions">
      <a class="topbar-btn" href="set.html" target="_top" aria-label="설정">
        <img src="set.svg" alt="설정" class="icon-img icon-invert" width="20" height="20" />
      </a>

      <a class="topbar-btn" href="notification.html" target="_top" aria-label="알림" id="notiBtn">
        <img src="bell.svg" alt="알림" class="icon-img icon-invert" width="20" height="20" />
        <!-- 빨간 말풍선 카운트 배지 -->
        <span class="noti-bubble" id="topbarNotiBubble" aria-hidden="true">0</span>
      </a>
    </div>
  </header>

  <div class="demo-bg"></div>

  <script>
    const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";

    async function api(endpoint, options = {}) {
      const url = API_BASE + endpoint;
      const res = await fetch(url, {
        ...options,
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
      });
      if (!res.ok) {
        let t = "";
        try { t = await res.text(); } catch {}
        throw new Error(t || ("HTTP " + res.status));
      }
      if (res.status === 204) return null;
      return res.json();
    }

    function getCurrentUser() {
      try {
        const raw = localStorage.getItem('snsUser');
        if (!raw) return null;
        return JSON.parse(raw);
      } catch { return null; }
    }

    // ===== 인스타 스타일 말풍선 로직 =====
    const bubbleEl = document.getElementById('topbarNotiBubble');
    let prevUnreadCount = -1; // -1 = 첫 로드 아직 안함
    let hideTimer = null;
    let outTimer = null;
    let isFirstCheck = true;

    function formatCount(n) {
      if (n > 99) return '99+';
      if (n > 9) return '9+';
      return String(n);
    }

    function hideBubbleImmediate() {
      if (!bubbleEl) return;
      if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
      if (outTimer) { clearTimeout(outTimer); outTimer = null; }
      bubbleEl.classList.remove('pop-in', 'pop-out', 'show');
      bubbleEl.style.opacity = '0';
    }

    function showBubble(count) {
      if (!bubbleEl) return;
      if (count <= 0) { hideBubbleImmediate(); return; }

      // 기존 타이머 정리
      if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
      if (outTimer) { clearTimeout(outTimer); outTimer = null; }

      bubbleEl.textContent = formatCount(count);
      bubbleEl.classList.remove('pop-out');
      bubbleEl.classList.add('show');

      // 리플로우 강제 후 애니메이션 재시작
      void bubbleEl.offsetWidth;
      bubbleEl.classList.remove('pop-in');
      void bubbleEl.offsetWidth;
      bubbleEl.classList.add('pop-in');

      // 2초 후 튀어오르며 사라짐
      hideTimer = setTimeout(() => {
        bubbleEl.classList.remove('pop-in');
        bubbleEl.classList.add('pop-out');
        outTimer = setTimeout(() => {
          bubbleEl.classList.remove('show', 'pop-out');
        }, 380);
      }, 2000);
    }

    async function checkUnread() {
      const user = getCurrentUser();
      if (!user || !user.id) {
        prevUnreadCount = 0;
        hideBubbleImmediate();
        return;
      }
      try {
        const or = encodeURIComponent('(isread.eq.0,isread.is.null)');
        const data = await api(`/notification?user=eq.${user.id}&or=${or}&select=isread&limit=100`);
        const count = Array.isArray(data) ? data.length : 0;

        if (isFirstCheck) {
          // 첫 로드: 안읽은게 있으면 한번 팝업 보여주기 (실시간 효과 체험)
          isFirstCheck = false;
          prevUnreadCount = count;
          if (count > 0) {
            showBubble(count);
          } else {
            hideBubbleImmediate();
          }
          return;
        }

        // 실시간으로 새로 생겼을 때만 팝업
        if (count > 0 && count > prevUnreadCount) {
          // 새로운 알림 도착!
          showBubble(count);
        } else if (count === 0 && prevUnreadCount > 0) {
          // 모두 읽음 처리됨 - 즉시 숨김
          hideBubbleImmediate();
        }
        // count가 그대로거나 감소했지만 0이 아닌 경우(일부 읽음)는
        // 이미 떠있는 버블이 있으면 유지, 없으면 조용히 유지 (팝업 안함)

        prevUnreadCount = count;
      } catch (e) {
        console.debug('topbar noti check fail', e);
      }
    }

    let realtimeTimer = null;

    function startRealtime() {
      if (realtimeTimer) clearInterval(realtimeTimer);
      checkUnread();
      realtimeTimer = setInterval(() => {
        if (document.hidden) return;
        checkUnread();
      }, 3000);

      window.addEventListener('focus', checkUnread);
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) checkUnread();
      });
      window.addEventListener('storage', (e) => {
        if (!e.key) return;
        if (e.key === 'snsUser' || e.key === 'noti-read' || e.key.includes('notification')) {
          checkUnread();
        }
        if (e.key === 'theme') {
          const v = e.newValue || 'dark';
          if (v === 'light') document.documentElement.setAttribute('data-theme', 'light');
          else document.documentElement.removeAttribute('data-theme');
        }
      });
      window.addEventListener('beforeunload', () => {
        if (realtimeTimer) clearInterval(realtimeTimer);
        if (hideTimer) clearTimeout(hideTimer);
        if (outTimer) clearTimeout(outTimer);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      const user = getCurrentUser();
      if (!user) { hideBubbleImmediate(); return; }
      startRealtime();
    });

    if (document.readyState !== 'loading') {
      const u = getCurrentUser();
      if (u) startRealtime();
    }

    // 외부에서 테스트용으로 호출 가능: window.testNotiBubble(3)
    window.testNotiBubble = (n) => showBubble(n || 3);
    window.refreshTopbarNoti = checkUnread;
  </script>
</body>
</html>
