<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sharer 이메일 인증</title>

<style>

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;

  display:flex;
  align-items:center;
  justify-content:center;

  min-height:100vh;
}

.card{
  width:100%;
  max-width:420px;

  background:#111;

  border:1px solid #222;
  border-radius:24px;

  padding:28px;
}

input{
  width:100%;
  height:52px;

  background:#1a1a1a;

  border:1px solid #333;
  border-radius:14px;

  color:#fff;

  padding:0 14px;

  margin-bottom:14px;

  outline:none;
}

button{
  width:100%;
  height:52px;

  border:none;
  border-radius:14px;

  background:#fff;
  color:#000;

  font-weight:700;

  cursor:pointer;
}

#status{
  margin-top:16px;
  color:#888;
}

</style>
</head>

<body>

<div class="card">

<h2>Sharer 인증</h2>

<input
type="email"
id="email"
placeholder="이메일"
/>

<button id="sendBtn">
인증번호 보내기
</button>

<div id="status">
대기 중
</div>

</div>

<script>

const sendBtn =
  document.getElementById('sendBtn');

const statusEl =
  document.getElementById('status');

sendBtn.onclick = async () => {

  const email =
    document.getElementById('email')
    .value
    .trim();

  if(!email){

    statusEl.textContent =
      '이메일 입력';

    return;
  }

  const code =
    Math.floor(
      100000 + Math.random() * 900000
    ).toString();

  statusEl.textContent =
    '메일 보내는 중...';

  try{

    const response = await fetch(
      'https://white-salad-5eb7.alexeom97.workers.dev/',
      {
        method:'POST',

        headers:{
          'Content-Type':'application/json'
        },

        body:JSON.stringify({
          email,
          code
        })

      }
    );

    const data =
      await response.json();

    console.log(data);

    if(data.id){

      statusEl.innerHTML =
        `
        메일 전송 성공<br>
        인증번호:
        <b>${code}</b>
        `;

    }else{

      statusEl.textContent =
        JSON.stringify(data);

    }

  }catch(err){

    console.error(err);

    statusEl.textContent =
      '오류 발생';

  }

};

</script>

</body>
</html>
