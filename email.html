<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sharer 이메일 인증</title>

<link rel="stylesheet" href="assets/css/sharer.css">
  <style>

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;

  display:flex;
  justify-content:center;
  align-items:center;

  min-height:100vh;
}

.card{
  width:100%;
  max-width:420px;

  background:#111;

  border:1px solid #222;
  border-radius:24px;

  padding:28px;

  box-sizing:border-box;
}

h2{
  margin-top:0;
}

input{
  width:100%;
  height:52px;

  background:#1a1a1a;

  border:1px solid #333;
  border-radius:14px;

  color:#fff;

  padding:0 14px;

  margin-bottom:14px;

  outline:none;

  box-sizing:border-box;
}

button{
  width:100%;
  height:52px;

  border:none;
  border-radius:14px;

  background:#fff;
  color:#000;

  font-weight:700;

  cursor:pointer;

  margin-bottom:10px;
}

button:disabled{
  opacity:.5;
  cursor:not-allowed;
}

#status{
  margin-top:16px;
  color:#888;
  line-height:1.6;
}

.success{
  color:#4ade80;
}

.error{
  color:#ff6b6b;
}

</style>
</head>

<body>

<div class="card">

<h2>Sharer 이메일 인증</h2>

<input
type="email"
id="email"
placeholder="이메일 입력"
/>

<button id="sendBtn">
인증번호 보내기
</button>

<input
type="text"
id="code"
placeholder="인증번호 입력"
/>

<button id="verifyBtn">
인증 확인
</button>

<div id="status">
대기 중
</div>

</div>

<script>

const WORKER_URL =
  'https://white-salad-5eb7.alexeom97.workers.dev/';

const sendBtn =
  document.getElementById('sendBtn');

const verifyBtn =
  document.getElementById('verifyBtn');

const statusEl =
  document.getElementById('status');

sendBtn.onclick = async () => {

  const email =
    document.getElementById('email')
    .value
    .trim();

  if(!email){

    statusEl.innerHTML =
      '<span class="error">이메일 입력</span>';

    return;
  }

  sendBtn.disabled = true;

  statusEl.textContent =
    '메일 전송 중...';

  try{

    const response =
      await fetch(
        WORKER_URL,
        {
          method:'POST',

          headers:{
            'Content-Type':
              'application/json'
          },

          body:JSON.stringify({
            email
          })
        }
      );

    const text =
      await response.text();

    console.log(text);

    if(response.ok){

      statusEl.innerHTML =
        `
        <span class="success">
        인증번호가 전송되었습니다.
        </span>
        `;

    }else{

      statusEl.innerHTML =
        `
        <span class="error">
        전송 실패
        </span>
        `;

    }

  }catch(err){

    console.error(err);

    statusEl.innerHTML =
      `
      <span class="error">
      오류 발생
      </span>
      `;

  }

  sendBtn.disabled = false;

};

verifyBtn.onclick = async () => {

  const email =
    document.getElementById('email')
    .value
    .trim();

  const code =
    document.getElementById('code')
    .value
    .trim();

  if(!email || !code){

    statusEl.innerHTML =
      `
      <span class="error">
      이메일과 인증번호 입력
      </span>
      `;

    return;
  }

  try{

    const response =
      await fetch(
        WORKER_URL + 'verify',
        {
          method:'POST',

          headers:{
            'Content-Type':
              'application/json'
          },

          body:JSON.stringify({
            email,
            code
          })
        }
      );

    const data =
      await response.json();

    if(data.success){

      statusEl.innerHTML =
        `
        <span class="success">
        인증 성공 ✅
        </span>
        `;

    }else{

      statusEl.innerHTML =
        `
        <span class="error">
        인증번호 불일치
        </span>
        `;

    }

  }catch(err){

    console.error(err);

    statusEl.innerHTML =
      `
      <span class="error">
      인증 실패
      </span>
      `;

  }

};

</script>

</body>
</html>
