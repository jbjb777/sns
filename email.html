<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sharer 회원가입 테스트</title>

<style>

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;

  display:flex;
  align-items:center;
  justify-content:center;

  min-height:100vh;
}

.card{
  width:100%;
  max-width:420px;

  background:#111;

  border:1px solid #1e1e1e;
  border-radius:28px;

  padding:32px;
}

h1{
  margin:0 0 24px;
  font-size:28px;
}

.input{
  width:100%;
  height:52px;

  background:#1a1a1a;

  border:1px solid #2a2a2a;
  border-radius:16px;

  color:#fff;

  padding:0 16px;

  margin-bottom:14px;

  outline:none;

  font-size:15px;
}

.btn{
  width:100%;
  height:52px;

  border:none;
  border-radius:16px;

  background:#fff;
  color:#000;

  font-size:15px;
  font-weight:700;

  cursor:pointer;
}

.status{
  margin-top:18px;

  color:#888;
  font-size:14px;
  line-height:1.6;
}

</style>
</head>

<body>

<div class="card">

<h1>회원가입 테스트</h1>

<input
type="email"
class="input"
id="email"
placeholder="이메일"
/>

<input
type="password"
class="input"
id="password"
placeholder="비밀번호"
/>

<button class="btn" id="signupBtn">
회원가입
</button>

<div class="status" id="status">
아직 실행되지 않음
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const client = window.supabase.createClient(
  'https://hoeevmstbhulbzqyfsug.supabase.co',
  'sb_publishable_vxGxR4uBuYldz-0l_tQXGw_Cz0V6Mj6'
);

const signupBtn =
  document.getElementById('signupBtn');

const statusEl =
  document.getElementById('status');

signupBtn.onclick = async () => {

  const email =
    document.getElementById('email').value;

  const password =
    document.getElementById('password').value;

  if(!email || !password){

    statusEl.textContent =
      '이메일과 비밀번호를 입력해주세요.';

    return;
  }

  statusEl.textContent =
    '회원가입 진행 중...';

  try{

    const { data, error } =
      await client.auth.signUp({

        email,
        password,

        options:{
          emailRedirectTo:
            'https://sharer.r-e.kr/verify.html'
        }

      });

    if(error){

      statusEl.textContent =
        '오류: ' + error.message;

      return;
    }

    statusEl.innerHTML =
      `
      회원가입 성공.<br>
      이메일 인증 메일이 전송되었습니다.
      `;

    console.log(data);

  }catch(err){

    console.error(err);

    statusEl.textContent =
      '예상치 못한 오류 발생';

  }

};

</script>

</body>
</html>
