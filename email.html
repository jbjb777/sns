<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sharer 이메일 인증</title>

<style>

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;

  display:flex;
  justify-content:center;
  align-items:center;

  min-height:100vh;
}

.card{
  width:100%;
  max-width:420px;

  background:#111;

  border:1px solid #222;
  border-radius:24px;

  padding:28px;
}

h2{
  margin-top:0;
}

input{
  width:100%;
  height:52px;

  background:#1a1a1a;

  border:1px solid #333;
  border-radius:14px;

  color:#fff;

  padding:0 14px;

  margin-bottom:14px;

  outline:none;

  box-sizing:border-box;
}

button{
  width:100%;
  height:52px;

  border:none;
  border-radius:14px;

  background:#fff;
  color:#000;

  font-weight:700;

  cursor:pointer;
}

button:disabled{
  opacity:.5;
  cursor:not-allowed;
}

#status{
  margin-top:16px;
  color:#888;
  line-height:1.6;
}

</style>
</head>

<body>

<div class="card">

<h2>Sharer 이메일 인증</h2>

<input
type="email"
id="email"
placeholder="이메일 입력"
/>

<button id="sendBtn">
인증번호 보내기
</button>

<input
type="text"
id="verifyInput"
placeholder="인증번호 입력"
/>

<button id="verifyBtn">
인증 확인
</button>

<div id="status">
대기 중
</div>

</div>

<script>

const WORKER_URL =
  'https://white-salad-5eb7.alexeom97.workers.dev/';

const sendBtn =
  document.getElementById('sendBtn');

const verifyBtn =
  document.getElementById('verifyBtn');

const statusEl =
  document.getElementById('status');

let currentCode = null;

sendBtn.onclick = async () => {

  const email =
    document.getElementById('email')
    .value
    .trim();

  if(!email){

    statusEl.textContent =
      '이메일을 입력하세요';

    return;
  }

  const code =
    Math.floor(
      100000 + Math.random() * 900000
    ).toString();

  currentCode = code;

  sendBtn.disabled = true;

  statusEl.textContent =
    '메일 전송 중...';

  try{

    const response =
      await fetch(
        WORKER_URL,
        {
          method:'POST',

          headers:{
            'Content-Type':
              'application/json'
          },

          body:JSON.stringify({

            from:
              'Sharer 인증 <verify@sharer.r-e.kr>',

            to:[email],

            subject:
              '[Sharer] 이메일 인증번호',

            html:`

            <div style="
              background:#000;
              color:#fff;
              padding:40px;
              font-family:sans-serif;
            ">

              <h1 style="
                margin-top:0;
              ">
                Sharer 인증번호
              </h1>

              <div style="
                font-size:48px;
                font-weight:700;
                letter-spacing:10px;
                margin:30px 0;
              ">
                ${code}
              </div>

              <p>
                5분 안에 입력해주세요.
              </p>

            </div>

            `
          })
        }
      );

    const text =
      await response.text();

    const data =
      JSON.parse(text);

    if(data.id){

      statusEl.innerHTML =
        `
        인증번호가 전송되었습니다.<br>
        이메일을 확인해주세요.
        `;

    }else{

      statusEl.textContent =
        text;

    }

  }catch(err){

    console.error(err);

    statusEl.textContent =
      '전송 실패';

  }

  sendBtn.disabled = false;

};

verifyBtn.onclick = () => {

  const input =
    document.getElementById('verifyInput')
    .value
    .trim();

  if(!currentCode){

    statusEl.textContent =
      '먼저 인증번호를 보내세요';

    return;
  }

  if(input === currentCode){

    statusEl.innerHTML =
      `
      인증 성공 ✅
      `;

  }else{

    statusEl.innerHTML =
      `
      인증번호가 틀렸습니다.
      `;

  }

};

</script>

</body>
</html>
