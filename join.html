<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 : Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* ─── HEADER ─── */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .logo-container:hover { opacity: 0.8; }
    .logo-container:active { transform: scale(0.95); }

    .logo-svg { width: 32px; height: 32px; }
    .logo-text { font-size: 18px; font-weight: 600; color: var(--t1); letter-spacing: -0.3px; }

    .main-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 48px 20px;
    }

    .auth-container {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r4);
      padding: 40px;
      width: 100%;
      max-width: 440px;
      flex-shrink: 0;
      opacity: 0;
      transform: translateY(12px);
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
      overflow: hidden;
    }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

    .slider-wrap {
      width: 100%;
      overflow: hidden;
      position: relative;
    }
    .slider-track {
      display: flex;
      width: 500%; /* 5 steps (0 to 4) */
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .slider-step {
      width: 20%; /* 100 / 5 steps */
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .slider-step h2 {
      text-align: center;
      margin-bottom: 24px;
      color: var(--t1);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .step-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px auto;
      display: block;
      opacity: 0.9;
    }

    .intro-desc {
      color: var(--t2);
      margin-bottom: 24px;
      line-height: 1.6;
      font-size: 13px;
      text-align: center;
    }

    /* ─── INPUTS ─── */
    .slider-step input {
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--r2);
      border: 1px solid var(--border2);
      font-size: 14px;
      margin-bottom: 10px;
      outline: none;
      background: var(--bg3);
      color: var(--t1);
      font-family: inherit;
      transition: border-color 0.2s, background 0.2s;
    }
    .slider-step input:focus { border-color: var(--border3); background: var(--bg4); }
    .slider-step input::placeholder { color: var(--t3); }

    /* ─── BUTTON ─── */
    .slider-step button {
      width: 100%;
      padding: 12px 20px;
      border-radius: var(--r2);
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: #000;
      margin-bottom: 8px;
      font-family: inherit;
      transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .slider-step button:hover:not(:disabled) { background: #e8e8e8; transform: scale(1.02); }
    .slider-step button:active:not(:disabled) { transform: scale(0.97); }
    .slider-step button:disabled { cursor: not-allowed; opacity: 0.5; transform: none; }

    .btn-secondary {
      background: var(--bg3) !important;
      color: var(--t1) !important;
      border: 1px solid var(--border2) !important;
    }
    .btn-secondary:hover:not(:disabled) { background: var(--bg4) !important; }

    /* ─── MESSAGES ─── */
    .error-message { color: var(--pink); font-size: 12px; margin-top: -6px; margin-bottom: 8px; text-align: center; font-weight: 500; }
    .success-message { color: var(--green); font-size: 12px; margin-top: -6px; margin-bottom: 8px; text-align: center; font-weight: 500; }

    /* ─── SPINNER ─── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.2);
      border-radius: 50%;
      border-top-color: #000;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── AVATAR LOADING SYSTEM (끊김 현상 완벽 수정본) ─── */
    .avatar-loading-container {
      position: relative;
      width: 110px;
      height: 110px;
      margin: 12px auto 24px auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .material-spinner {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      transform-origin: center;
      /* 구글 가이드라인 규격 타임라인: 전체 회전 주기 1.4초 상향 */
      animation: spinner-rotate 1.4s linear infinite;
      z-index: 1;
    }

    .spinner-path {
      /* 원주(2 * PI * r) 값 정밀 계산: 2 * 3.14159 * 51 ≒ 320.4 */
      stroke-dasharray: 320.4;
      stroke-dashoffset: 0;
      /* 대시 드로잉 주기를 전체 회전 주기의 배수로 맞추어 끊김 현상 제거 (4배수인 5.6초 적용) */
      animation: spinner-dash 5.6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      transform-origin: center;
    }

    @keyframes spinner-rotate {
      100% { transform: rotate(360deg); }
    }

    @keyframes spinner-dash {
      0% {
        stroke-dashoffset: 304.38; /* 원의 약 5%만 보임 */
        transform: rotate(0deg);
      }
      50% {
        stroke-dashoffset: 48.06;  /* 원의 약 85%까지 부드럽게 채워짐 */
        transform: rotate(135deg);
      }
      100% {
        stroke-dashoffset: 304.38; /* 다시 수축하면서 360도 회전 완료 지점과 자연스럽게 오버랩 */
        transform: rotate(450deg);
      }
    }

    .avatar-loading-user {
      position: relative;
      z-index: 2;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--bg2);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 700;
      color: #777;
    }

    /* ─── ERROR ANIMATION ─── */
    .input-error {
      border-color: var(--pink) !important;
      animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }
    @keyframes shake {
      10%, 90% { transform: translateX(-1px); }
      20%, 80% { transform: translateX(2px); }
      30%, 50%, 70% { transform: translateX(-3px); }
      40%, 60% { transform: translateX(3px); }
    }

    /* ─── FOOTER ─── */
    .footer {
      text-align: center;
      padding: 30px 20px;
      color: var(--t3);
      font-size: 11px;
      line-height: 1.5;
      margin-top: auto;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .auth-container { padding: 28px 20px; }
      .slider-step h2 { font-size: 18px; }
      .main-content { padding: 28px 16px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-container" onclick="goHome()">
      <img src="logo.svg" alt="Sharer 로고" class="logo-svg">
      <span class="logo-text">Sharer</span>
    </div>
  </div>

  <div class="main-content">
    <div class="auth-container">
      <div class="slider-wrap">
        <div class="slider-track" id="sliderTrack">
          
          <div class="slider-step">
            <img src="service.svg" class="step-icon" alt="서비스 소개" onerror="this.style.display='none'">
            <h2>서비스 소개</h2>
            <p class="intro-desc">
              Sharer 서비스는 개인정보를 중요하게 생각하며, 관련 법령을 준수합니다.<br><br>최소한의 정보만 수집하며, 탈퇴 시 즉시 삭제됩니다.
            </p>
            <div style="margin-top:auto;">
              <button onclick="nextStep(1, this)">동의하고 다음으로</button>
            </div>
          </div>

          <div class="slider-step">
            <img src="id.svg" class="step-icon" alt="아이디 설정" onerror="this.style.display='none'">
            <h2>아이디 설정</h2>
            <p class="intro-desc">로그인에 사용할 아이디를 입력해주세요.</p>
            <input type="text" id="signupId" placeholder="아이디">
            <div class="error-message" id="idError"></div>
            <div style="margin-top:auto;">
              <button class="btn-secondary" onclick="prevStep(0)">이전</button>
              <button onclick="nextStep(2, this)">다음으로</button>
            </div>
          </div>

          <div class="slider-step">
            <img src="name.svg" class="step-icon" alt="닉네임 설정" onerror="this.style.display='none'">
            <h2>닉네임 설정</h2>
            <p class="intro-desc">다른 사용자에게 보여질 닉네임을 입력해주세요.</p>
            <input type="text" id="signupNickname" placeholder="닉네임" maxlength="20">
            <div class="error-message" id="nicknameError"></div>
            <div style="margin-top:auto;">
              <button class="btn-secondary" onclick="prevStep(1)">이전</button>
              <button onclick="nextStep(3, this)">다음으로</button>
            </div>
          </div>

          <div class="slider-step">
            <img src="shield.svg" class="step-icon" alt="비밀번호 설정" onerror="this.style.display='none'">
            <h2>비밀번호 설정</h2>
            <p class="intro-desc">안전한 비밀번호를 설정해주세요.</p>
            <input type="password" id="signupPassword" placeholder="비밀번호">
            <div class="error-message" id="signupError"></div>
            <div class="success-message" id="signupSuccess"></div>
            <div style="margin-top:auto;">
              <button class="btn-secondary" onclick="prevStep(2)">이전</button>
              <button id="signupBtn" onclick="handleSignup()">가입 완료</button>
            </div>
          </div>

          <div class="slider-step">
            <h2>계정 설정 중</h2>
            <div class="avatar-loading-container">

              <svg class="material-spinner" viewBox="0 0 110 110">
                <defs>
                  <linearGradient id="spinnerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#0d00ff"/>
                    <stop offset="100%" stop-color="#39f0ea"/>
                  </linearGradient>
                </defs>
                <circle
                  class="spinner-path"
                  cx="55"
                  cy="55"
                  r="51"
                  fill="none"
                  stroke="url(#spinnerGradient)"
                  stroke-width="4"
                  stroke-linecap="round"
                />
              </svg>

              <div class="avatar-loading-user" id="loadingAvatar">?</div>

            </div>
            <p class="intro-desc" id="loadingStatusText">계정 정보를 설정하는 중입니다 </p>
          </div>

        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    본 서비스는 대한민국의 중2 개발자 1인이 만든 프로젝트입니다 모든 소스 코드 및 파일의 출처는 전적으로 개발자에게 있음을 알립니다.
  </div>

<script>
  const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";

  async function api(endpoint, options = {}) {
    const url = API_BASE + endpoint;
    const res = await fetch(url, {
      ...options,
      headers: {
        "Content-Type": "application/json",
        ...(options.headers || {}),
      },
    });

    if (res.status === 204) return null;

    if (!res.ok) {
      let errorText = "";
      try { errorText = await res.text(); } catch {}
      throw new Error(`API 오류 (${res.status}): ${errorText || '응답 본문 없음'}`);
    }

    const text = await res.text();
    if (!text.trim()) return null;

    try {
      return JSON.parse(text);
    } catch (parseError) {
      console.error("JSON 파싱 실패:", parseError, "원본 응답:", text);
      throw new Error("서버 응답이 유효한 JSON 형식이 아닙니다.");
    }
  }

  window.goHome = function() { window.location.href = 'index.html'; }

  async function nextStep(stepIndex, btn) {
    const track = document.getElementById('sliderTrack');
    
    if(stepIndex === 2) {
      const idInput = document.getElementById('signupId');
      const id = idInput.value.trim();
      const err = document.getElementById('idError');
      idInput.classList.remove('input-error');
      if(!id) {
        err.textContent = '아이디를 입력해주세요.';
        idInput.classList.add('input-error');
        return;
      }
      
      const originalText = btn.innerHTML;
      btn.innerHTML = `<span class="spinner"></span>확인 중...`;
      btn.disabled = true;
      try {
        const idCheck = await api(`/users?id=eq.${encodeURIComponent(id)}&select=id`);
        if (idCheck?.length > 0) { 
          err.textContent = '이미 사용 중인 아이디입니다.'; 
          idInput.classList.add('input-error');
          return; 
        }
        err.textContent = '';
      } catch (e) {
        err.textContent = '확인 중 오류가 발생했습니다.';
        return;
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    }
    
    if(stepIndex === 3) {
      const nickInput = document.getElementById('signupNickname');
      const nick = nickInput.value.trim();
      const err = document.getElementById('nicknameError');
      nickInput.classList.remove('input-error');
      if(!nick) {
        err.textContent = '닉네임을 입력해주세요.';
        nickInput.classList.add('input-error');
        return;
      }
      if(nick.length > 20) {
        err.textContent = '닉네임은 20자 이하로 입력하세요.';
        nickInput.classList.add('input-error');
        return;
      }
      if(nick.includes("정빈777")) {
        err.textContent = '이 닉네임은 사용할 수 없습니다.';
        nickInput.classList.add('input-error');
        return;
      }
      
      const originalText = btn.innerHTML;
      btn.innerHTML = `<span class="spinner"></span>확인 중...`;
      btn.disabled = true;
      try {
        const nicknameCheck = await api(`/users?nickname=eq.${encodeURIComponent(nick)}&select=nickname`);
        if (nicknameCheck?.length > 0) { 
          err.textContent = '이미 사용 중인 닉네임입니다.'; 
          nickInput.classList.add('input-error');
          return; 
        }
        err.textContent = '';
      } catch (e) {
        err.textContent = '확인 중 오류가 발생했습니다.';
        return;
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    }

    // Step 이동 시 비율 계산 처리 (5개 스텝이므로 한 칸당 20%)
    track.style.transform = `translateX(-${stepIndex * 20}%)`;
  }

  function prevStep(stepIndex) {
    const track = document.getElementById('sliderTrack');
    track.style.transform = `translateX(-${stepIndex * 20}%)`;
  }

  function setButtonLoading(isLoading, loadingText = '가입 중...') {
    const button = document.getElementById('signupBtn');
    if (isLoading) {
      button.disabled = true;
      button.innerHTML = `<span class="spinner"></span>${loadingText}`;
    } else {
      button.disabled = false;
      button.innerHTML = '가입 완료';
    }
  }

  window.handleSignup = async function() {
    const nicknameInput = document.getElementById('signupNickname');
    const idInput = document.getElementById('signupId');
    const passwordInput = document.getElementById('signupPassword');

    const nickname = nicknameInput.value.trim();
    const id = idInput.value.trim();
    const password = passwordInput.value.trim();

    const idErrorDiv = document.getElementById('idError');
    const nicknameErrorDiv = document.getElementById('nicknameError');
    const errorDiv = document.getElementById('signupError');
    const successDiv = document.getElementById('signupSuccess');

    idErrorDiv.textContent = '';
    nicknameErrorDiv.textContent = '';
    errorDiv.textContent = '';
    successDiv.textContent = '';
    
    nicknameInput.classList.remove('input-error');
    idInput.classList.remove('input-error');
    passwordInput.classList.remove('input-error');

    if (!password) { 
      errorDiv.textContent = '비밀번호를 입력해주세요.'; 
      passwordInput.classList.add('input-error');
      return; 
    }

    setButtonLoading(true);

    // 최소 3초 타이머 연출을 위한 시작 시간 기록
    const startTime = Date.now();

    try {
      // 1. API 데이터 요청 전송
      await api("/users", {
        method: "POST",
        body: JSON.stringify({ id, nickname, password, created_at: new Date().toISOString() })
      });

      // 로컬 스토리지 데이터 임시 저장
      localStorage.setItem('snsUser', JSON.stringify({ id, nickname, isVerified: false }));

      // 2. 가입 프로세스 성공 시 아바타 내부 텍스트를 첫 글자로 변경 및 스텝 이동
      document.getElementById('loadingAvatar').textContent = (nickname[0] || '?').toUpperCase();
      nextStep(4); 

      // 3. 최소 3초 보장 연출 핸들링
      const elapsedTime = Date.now() - startTime;
      const remainingTime = Math.max(0, 3000 - elapsedTime);

      setTimeout(() => {
        document.getElementById('loadingStatusText').innerHTML = `<span style="color:var(--green)">설정 완료</span>`;
        setTimeout(() => {
          window.location.href = `user.html?nickname=${encodeURIComponent(nickname)}&id=${encodeURIComponent(id)}&u=new`;
        }, 800);
      }, remainingTime);

    } catch (error) {
      console.error('회원가입 오류:', error);
      errorDiv.textContent = error.message || '회원가입에 실패했습니다. 다시 시도해주세요.';
      setButtonLoading(false);
    }
  }

  document.getElementById('signupNickname').addEventListener('input', function() {
    this.classList.remove('input-error');
    document.getElementById('nicknameError').textContent = '';
  });

  document.getElementById('signupId').addEventListener('input', function() {
    this.classList.remove('input-error');
    document.getElementById('idError').textContent = '';
  });

  document.getElementById('signupPassword').addEventListener('input', function() {
    this.classList.remove('input-error');
    document.getElementById('signupError').textContent = '';
  });

  document.getElementById('signupPassword').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleSignup();
  });
</script>
</body>
</html>
