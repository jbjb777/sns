<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>알림 : Sharer</title>
  
  <link rel="icon" type="image/png" href="./logo.png">
  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>

  <script>
    const savedTheme = localStorage.getItem('theme') || 'dark';
    if (savedTheme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    }
    // 임베드(사이드 패널) 감지 - 사이드바에서 메시지로 확정 전달받음
    const __notiUrlParams = new URLSearchParams(location.search);
    const __isEmbedQuery = __notiUrlParams.has('embed');
    let __isEmbedFrame = false;
    try { __isEmbedFrame = window.self !== window.top; } catch(e) {}
    const __isEmbedModeEarly = __isEmbedQuery || __isEmbedFrame;
    if (__isEmbedModeEarly) {
      document.documentElement.classList.add('embed');
    }
    // 사이드바에서 오는 확정 임베드 정보 저장소
    window.__sharerNotiEmbedInfo = {
      isEmbed: __isEmbedModeEarly,
      isDesktop: window.matchMedia('(min-width: 769px)').matches,
      received: false,
      viaSidebarPanel: false
    };
    window.addEventListener('message', function(e) {
      const d = e.data;
      if (!d || d.type !== 'sharerNotiEmbed') return;
      // 사이드바 패널에서 보낸 확정 정보
      window.__sharerNotiEmbedInfo = {
        isEmbed: !!d.isEmbed,
        isDesktop: !!d.isDesktop,
        received: true,
        viaSidebarPanel: !!d.viaSidebarPanel
      };
      if (d.isEmbed) {
        document.documentElement.classList.add('embed');
        document.body && document.body.classList.add('embed');
      }
      // 디버그: console.log('[noti] embed info received', window.__sharerNotiEmbedInfo);
    });
  
    // 추가: iframe 로드 후 사이드바에 신호 재요청 (레이스 컨디션 방지)
    window.addEventListener('load', function(){
      try {
        if (window.self !== window.top) {
          window.parent.postMessage({ type: 'requestNotiEmbedInfo' }, '*');
        }
      } catch(e){}
    });

  </script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --blue: #0095f6;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    html[data-theme="light"] {
      --bg: #fafafa;
      --bg2: #ffffff;
      --bg3: #f0f0f0;
      --bg4: #e4e4e4;
      --border: #dbdbdb;
      --border2: #cccccc;
      --border3: #a3a3a3;
      --t1: #000000;
      --t2: #737373;
      --t3: #a8a8a8;
    }

    html { scroll-behavior: smooth; }

    #nprogress .bar { background: var(--t1) !important; height: 2px !important; }
    #nprogress .peg { display: none !important; }
    #nprogress .spinner { display: none !important; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: bodyReveal 0.4s ease forwards;
    }
    @keyframes bodyReveal { to { opacity: 1; } }

    .sidebar-container {
      width: 72px;
      min-width: 72px;
      height: 100vh;
      position: fixed;
      left: 0; top: 0;
      z-index: 100;
    }
    .sidebar-container iframe { width: 72px !important; height: 100%; border: none; }

    .main-wrapper {
      margin-left: 72px;
      width: calc(100% - 72px);
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 100vh;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    html[data-theme="light"] .header {
      background: rgba(250, 250, 250, 0.75);
    }

    .header-left { display: flex; align-items: center; gap: 14px; }
    
    .back-btn {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--t2);
      cursor: pointer;
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .back-btn:hover { background: var(--bg4); color: var(--t1); transform: scale(1.1); }
    .back-btn:active { transform: scale(0.90); }

    .header-title { font-size: 18px; font-weight: 700; color: var(--t1); letter-spacing: -0.02em; }

    .action-btn {
      background: var(--t1);
      color: var(--bg);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 22px;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .action-btn:hover { opacity: 0.85; transform: scale(1.04); }
    .action-btn:active { transform: scale(0.94); }

    .container {
      padding: 24px 28px 40px;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
      flex: 1;
    }

    /* Instagram style list */
    .noti-list {
      display: flex;
      flex-direction: column;
    }

    .noti-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 6px;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      cursor: pointer;
      transition: background 0.15s ease, opacity 0.15s ease;
      opacity: 0;
      transform: translateY(10px);
      animation: postIn 0.4s cubic-bezier(0.22,1,0.36,1) forwards;
      -webkit-tap-highlight-color: transparent;
    }
    @keyframes postIn { to { opacity: 1; transform: translateY(0); } }
    
    .noti-item:last-child { border-bottom: none; }
    .noti-item:hover { background: var(--bg2); }
    .noti-item:active { background: var(--bg3); }
    
    .noti-item.read { opacity: 0.65; }
    .noti-item.read:hover { opacity: 0.85; }

    .noti-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .noti-detail {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.45;
      color: var(--t1);
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .noti-time {
      font-size: 12.5px;
      color: var(--t2);
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    .noti-right {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      margin-left: 4px;
    }

    /* 파란 동그라미 - 읽지 않음 표시 */
    .unread-dot {
      width: 8px;
      height: 8px;
      background: var(--blue);
      border-radius: 50%;
      box-shadow: 0 0 0 4px rgba(0,149,246,0.12);
      flex-shrink: 0;
    }
    html[data-theme="light"] .unread-dot {
      box-shadow: 0 0 0 4px rgba(0,149,246,0.14);
    }

    .no-posts {
      text-align: center;
      padding: 80px 20px;
      color: var(--t2);
      font-size: 15px;
      line-height: 1.8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .no-posts-icon {
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .no-posts-icon img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      opacity: 0.92;
      animation: floatIcon 3s ease-in-out infinite;
      filter: grayscale(0.15);
    }
    html[data-theme="light"] .no-posts-icon img {
      opacity: 0.85;
      filter: grayscale(0.2) brightness(1.05);
    }
    @keyframes floatIcon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(16px);
      opacity: 0;
      background: var(--t1);
      color: var(--bg);
      padding: 12px 20px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 600;
      z-index: 200;
      transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.22,1,0.36,1);
      pointer-events: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 768px) {
      .sidebar-container {
        left: 0; right: 0; top: auto; bottom: 0;
        width: 100%; min-width: 0;
        height: calc(64px + env(safe-area-inset-bottom, 0px));
      }
      .sidebar-container iframe { width: 100% !important; height: 100% !important; }
      
      .main-wrapper { 
        margin-left: 0; 
        width: 100%; 
        padding-bottom: calc(64px + env(safe-area-inset-bottom, 0px)); 
      }
      .header { padding: 14px 18px; }
      .container { padding: 8px 16px 26px; }
      .noti-item { padding: 14px 4px; }
      .no-posts-icon img { width: 64px; height: 64px; }
    }
  
    /* === 임베드(사이드바 패널) 전용 스타일 === */
    html.embed, html.embed body {
      background: var(--bg);
      min-height: 100%;
    }
    html.embed .sidebar-container,
    html.embed .header,
    html.embed #backBtn {
      display: none !important;
    }
    html.embed .main-wrapper {
      margin-left: 0 !important;
      width: 100% !important;
      min-height: 100vh;
    }
    html.embed .container {
      padding: 12px 12px 20px;
      max-width: 100%;
    }
    html.embed .noti-list {
      padding-top: 4px;
    }
    html.embed .noti-item {
      padding: 14px 8px;
    }
    
    </style>
</head>
<body>
  <div class="sidebar-container">
    <iframe src="sidebar.html" id="sidebarFrame" width="72" height="100%" frameborder="0"></iframe>
  </div>

  <div class="main-wrapper">
    <div class="header">
      <div class="header-left">
        <button class="back-btn" id="backBtn" aria-label="뒤로가기">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="header-title">알림</div>
      </div>
      <div class="header-actions">
        <button class="action-btn" id="readAllBtn">모두 읽기</button>
      </div>
    </div>

    <div class="container">
      <div id="state" class="no-posts" style="display:none;"></div>
      <div id="notiList" class="noti-list"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    NProgress.configure({ minimum: 0.08, trickleSpeed: 200, showSpinner: false });
    window.addEventListener('load', () => NProgress.done());
    NProgress.start();

    const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";

    async function api(endpoint, options = {}) {
      const url = API_BASE + endpoint;
      const res = await fetch(url, {
        ...options,
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
      });
      if (!res.ok) {
        let errorText;
        try { errorText = await res.text(); } catch { errorText = ""; }
        throw new Error(`API 오류 (${res.status}): ${errorText}`);
      }
      if (res.status === 204) return null;
      const text = await res.text();
      if (!text) return null;
      try { return JSON.parse(text); } catch { return null; }
    }

    let currentUser = JSON.parse(localStorage.getItem('snsUser')) || null;
    const notiListEl = document.getElementById('notiList');
    const stateEl = document.getElementById('state');
    const toastEl = document.getElementById('toast');

    let realtimeTimer = null;
    let lastHash = '';
    let isFirstLoad = true;

    function toast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), 1600);
    }

    function initCurrentUser() {
      const saved = localStorage.getItem('snsUser');
      if (saved) currentUser = JSON.parse(saved);
    }

    function updateSidebar() {
      const iframe = document.getElementById('sidebarFrame');
      if (iframe?.contentWindow) iframe.contentWindow.postMessage({ type: 'updateUser', user: currentUser }, '*');
    }

    function updateSidebarMode() {
      const iframe = document.getElementById('sidebarFrame');
      const narrow = window.innerWidth <= 768;
      if (iframe?.contentWindow) iframe.contentWindow.postMessage({ type: 'setNarrowMode', narrow }, '*');
    }

    window.addEventListener('message', (event) => {
      const { type, page } = event.data || {};
      if (type === 'navigate') {
        if (page === 'home') location.href = 'index.html';
        if (page === 'explore') location.href = 'explore.html';
        if (page === 'set') location.href = 'set.html';
      }
      if (type === 'logout') {
        localStorage.removeItem('snsUser');
        currentUser = null;
        location.href = 'login.html';
      }
      if (type === 'requestUserInfo') updateSidebar();
    });

    window.onSharerProfileLogout = function () {
      localStorage.removeItem('snsUser');
      currentUser = null;
      location.href = 'login.html';
    };

    function escapeHtml(text) {
      if (!text) return '';
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return String(text).replace(/[&<>"']/g, (m) => map[m]);
    }

    function formatTime(ts) {
      try {
        const d = new Date(ts);
        const now = new Date();
        const diffMs = now - d;
        const diffMin = Math.floor(diffMs / 60000);
        const diffHour = Math.floor(diffMin / 60);
        const isToday = now.toDateString() === d.toDateString();
        
        if (isToday) {
          if (diffMin < 1) return '방금 전';
          if (diffMin < 60) return diffMin + '분 전';
          return diffHour + '시간 전';
        }
        return d.toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
      } catch (e) { return ''; }
    }

    function setState(message, show) {
      if (!show) {
        stateEl.style.display = 'none';
        stateEl.innerHTML = '';
        return;
      }
      // 빈 상태일 때 🍃 대신 like1.svg 사용
      const isEmptyState = message.includes('아직 알림이 없습니다');
      if (isEmptyState) {
        stateEl.innerHTML = `
          <div class="no-posts-icon"><img src="like1.svg" alt="no notifications" /></div>
          <div>${message.replace(/\n/g, '<br>')}</div>
        `;
      } else {
        stateEl.innerHTML = `
          <div>${message.replace(/\n/g, '<br>')}</div>
        `;
      }
      stateEl.style.display = 'flex';
    }

    async function fetchNotifications() {
      const endpoint = `/notification?user=eq.${currentUser.id}&select=user,detail,created_at,link,isread&order=created_at.desc`;
      return await api(endpoint);
    }

    function normalizeIsRead(v) {
      if (v === true) return 1;
      if (v === false) return 0;
      const n = Number(v);
      if (Number.isNaN(n)) return 0;
      return n;
    }

    function getItemsHash(items) {
      if (!items || !items.length) return 'empty';
      return items.map(n => `${n.created_at}|${n.isread}|${n.detail?.slice(0,20)}`).join(';;');
    }

    async function markAsRead(n) {
      if (!n) return;
      if (normalizeIsRead(n.isread) === 1) return;
      const createdAt = n.created_at || '';
      const detail = n.detail || '';
      const link = n.link || '';

      const base = `/notification?user=eq.${currentUser.id}`;
      const byAll = `${base}&created_at=eq.${encodeURIComponent(createdAt)}&detail=eq.${encodeURIComponent(detail)}&link=eq.${encodeURIComponent(link)}`;
      try {
        await api(byAll, { method: "PATCH", body: JSON.stringify({ isread: 1 }) });
        return;
      } catch (e) {}

      const bySafe = `${base}&created_at=eq.${encodeURIComponent(createdAt)}&link=eq.${encodeURIComponent(link)}`;
      try {
        await api(bySafe, { method: "PATCH", body: JSON.stringify({ isread: 1 }) });
      } catch (e) {}
    }

    async function markAllRead() {
      const or = encodeURIComponent('(isread.eq.0,isread.is.null)');
      const endpoint = `/notification?user=eq.${currentUser.id}&or=${or}`;
      await api(endpoint, { method: "PATCH", body: JSON.stringify({ isread: 1 }) });
    }

    function renderNotifications(items, options = {}) {
      const { animate = true } = options;
      notiListEl.innerHTML = '';
      if (!items || items.length === 0) {
        setState('아직 알림이 없습니다.\n댓글이나 좋아요가 달리면 이곳에 표시됩니다.', true);
        lastHash = 'empty';
        return;
      }
      setState('', false);

      items.forEach((n, idx) => {
        const isRead = normalizeIsRead(n.isread) === 1;
        const el = document.createElement('div');
        el.className = 'noti-item' + (isRead ? ' read' : '');
        el.setAttribute('role', 'button');
        el.setAttribute('tabindex', '0');
        if (animate) {
          el.style.animationDelay = `${Math.min(idx, 10) * 0.05}s`;
        } else {
          el.style.opacity = '1';
          el.style.transform = 'none';
          el.style.animation = 'none';
        }
        // 인스타 스타일: 텍스트 영역 + 오른쪽 파란 동그라미
        el.innerHTML = `
          <div class="noti-content">
            <div class="noti-detail">${escapeHtml(n.detail || '알림')}</div>
            <div class="noti-time">${escapeHtml(formatTime(n.created_at))}</div>
          </div>
          <div class="noti-right">
            ${isRead ? '' : '<span class="unread-dot" aria-label="읽지 않음"></span>'}
          </div>
        `;
        const open = async () => {
          try {
            await markAsRead(n);
            const dot = el.querySelector('.unread-dot');
            if (dot) dot.remove();
            el.classList.add('read');
          } catch (e) {}
          const rawLink = (n.link || '').trim();
          const link = rawLink ? rawLink : 'index.html';

          // === 수정됨: 사이드바 신호 기반 분기 ===
          const embedInfo = window.__sharerNotiEmbedInfo || {};
          const hasSignal = !!embedInfo.received;
          const isDesktopSignal = hasSignal ? !!embedInfo.isDesktop : false;
          const isEmbedSignal = hasSignal ? !!embedInfo.isEmbed : false;

          function getTopWidth() {
            try { if (window.top && window.top.innerWidth) return window.top.innerWidth; } catch(e){}
            try { if (window.parent && window.parent.innerWidth) return window.parent.innerWidth; } catch(e){}
            return window.innerWidth;
          }
          function isInIframe() {
            try { return window.self !== window.top; } catch(e){ return false; }
          }

          // 1) 사이드바에서 데스크탑 신호를 받은 경우: 부모 페이지에서 직접 이동 (요청사항)
          if (hasSignal && isEmbedSignal && isDesktopSignal) {
            try {
              // 요청하신대로 parent.location.href 우선
              if (window.parent && window.parent !== window) {
                window.parent.location.href = link;
                return;
              }
            } catch(e){}
            try { window.top.location.href = link; return; } catch(e2){}
            // 부모 리스너가 있는 구조 대비 fallback
            try { window.parent.postMessage({ type: 'notiLink', link }, '*'); return; } catch(e3){}
            window.location.href = link;
            return;
          }

          // 2) 신호가 있지만 모바일( isDesktop=false )인 경우: 모바일은 직접 페이지이므로 직접 이동
          if (hasSignal && isEmbedSignal && !isDesktopSignal) {
            window.location.href = link;
            return;
          }

          // 3) 신호 안 받은 경우: 요청사항대로 직접 열기
          // 단, 신호가 누락된 데스크탑 iframe 상황이면 부모로 이동 시도 (UX 보호)
          if (!hasSignal) {
            const topW = getTopWidth();
            if (isInIframe() && topW >= 769) {
              try { if (window.parent && window.parent !== window) { window.parent.location.href = link; return; } } catch(e){}
              try { window.parent.postMessage({ type: 'notiLink', link }, '*'); return; } catch(e){}
              try { window.top.location.href = link; return; } catch(e){}
            }
            window.location.href = link;
            return;
          }

          // 최종 fallback: 직접 이동
          window.location.href = link;
        };
        el.onclick = open;
        el.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); } };
        notiListEl.appendChild(el);
      });
      lastHash = getItemsHash(items);
    }

    async function loadAndRender(showLoading = true) {
      if (showLoading && isFirstLoad) {
        setState('알림 불러오는 중...', true);
      }
      try {
        const items = await fetchNotifications();
        const newHash = getItemsHash(items || []);
        // 첫 로드거나 데이터가 변경됐을 때만 리렌더
        if (isFirstLoad || newHash !== lastHash) {
          renderNotifications(items || [], { animate: isFirstLoad });
          isFirstLoad = false;
        }
      } catch (e) {
        console.error(e);
        if (isFirstLoad) {
          setState('알림을 불러오지 못했습니다.\n잠시 후 다시 시도해주세요.', true);
        }
      }
    }

    function startRealtime() {
      if (realtimeTimer) clearInterval(realtimeTimer);
      // 3초마다 폴링 - 실시간처럼 동작
      realtimeTimer = setInterval(async () => {
        if (document.hidden) return;
        try {
          await loadAndRender(false);
        } catch (e) {}
      }, 3000);

      // 포커스 복귀 시 즉시 갱신
      window.addEventListener('focus', () => loadAndRender(false));
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) loadAndRender(false);
      });
    }

    function stopRealtime() {
      if (realtimeTimer) {
        clearInterval(realtimeTimer);
        realtimeTimer = null;
      }
    }

    const backBtnEl = document.getElementById('backBtn');
    if (backBtnEl) {
      backBtnEl.onclick = () => {
        const embedInfo = window.__sharerNotiEmbedInfo || {};
        const hasSignal = !!embedInfo.received;
        const isEmbedSignal = hasSignal ? !!embedInfo.isEmbed : document.documentElement.classList.contains('embed') || (function(){ try { return window.self !== window.top; } catch(e){ return false; } })();
        if (isEmbedSignal) {
          try { window.parent.postMessage({ type: 'closeNotiPanel' }, '*'); } catch(e){}
          // 데스크탑 패널이면 닫기만, 모바일 직접 진입이면 뒤로가기
          if (hasSignal && embedInfo.isDesktop) return;
          // 신호 없는 데스크탑 iframe 대비: top width로 판단
          try {
            let tw = 0;
            try { tw = window.top.innerWidth; } catch(e){ try { tw = window.parent.innerWidth; } catch(e2){ tw = window.innerWidth; } }
            if (tw >= 769) return;
          } catch(e){}
        }
        history.length > 1 ? history.back() : (location.href = 'index.html');
      };
    }

    document.getElementById('readAllBtn').onclick = async () => {
      try {
        await markAllRead();
        toast('모두 읽음 처리했습니다.');
        await loadAndRender(false);
        // 즉시 UI 반영
        document.querySelectorAll('.unread-dot').forEach(d => d.remove());
        document.querySelectorAll('.noti-item').forEach(el => el.classList.add('read'));
        // 부모 배지 즉시 갱신 요청
        try { window.parent.postMessage({ type: 'forceNotiCheck' }, '*'); } catch(e){}
        try { window.parent.postMessage({ type: 'forceDmUnreadCheck' }, '*'); } catch(e){}
      } catch (e) {
        console.error(e);
        toast('처리에 실패했습니다.');
      }
    };

    initCurrentUser();
    if (!currentUser) {
      location.href = 'login.html';
    } else {
      updateSidebar();
      updateSidebarMode();
      window.addEventListener('resize', updateSidebarMode);
      loadAndRender(true).then(() => {
        startRealtime();
      });
      window.addEventListener('beforeunload', stopRealtime);
    }
  </script>
</body>
</html>
