<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오류 : Sharer</title>
<link rel="icon" type="image/svg+xml" href="./logo.svg">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #fff;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 24px;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 32px;
    max-width: 480px;
    width: 100%;
    animation: fadeUp 0.4s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .text-block {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .code {
    font-size: 72px;
    font-weight: 700;
    letter-spacing: -3px;
    color: #fff;
    line-height: 1;
  }

  .message {
    font-size: 22px;
    font-weight: 400;
    color: #555;
    letter-spacing: -0.3px;
    line-height: 1.4;
  }

  .btn-home {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #fff;
    color: #000;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 22px;
    border-radius: 24px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    letter-spacing: -0.2px;
  }
  .btn-home:hover { background: #ddd; }
  .btn-home:active { transform: scale(0.94); }

  .btn-home svg {
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="container">
  <div class="text-block">
    <span class="code">404</span>
    <span class="message">이곳에는 아무것도 없어요</span>
  </div>
  <a class="btn-home" href="index.html">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
      <path d="M3 12L12 3l9 9M5 10v9a1 1 0 0 0 1 1h4v-5h4v5h4a1 1 0 0 0 1-1v-9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    메인 페이지로
  </a>
</div>

</body>
</html>
