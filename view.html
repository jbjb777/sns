<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>게시물 : Sharer</title>
  
  <script>
    // 화면 깜빡임(FOUC) 방지를 위해 HTML 렌더링 전 테마를 즉시 적용합니다.
    const savedTheme = localStorage.getItem('theme') || 'dark';
    if (savedTheme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  </script>

  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --blue: #3b82f6;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }
    /* NProgress 커스텀 */
    #nprogress .bar { background: var(--t1) !important; height: 2px !important; }
    #nprogress .peg { display: none !important; }
    #nprogress .spinner { display: none !important; }
    /* ─── SPLASH ─── */
    #splash {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      transition: opacity 0.45s ease;
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }
    .splash-logo {
      width: 72px; height: 72px;
      animation: splashLogoPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes splashLogoPop {
      from { opacity: 0; transform: scale(0.7); }
      to { opacity: 1; transform: scale(1); }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }
    /* ─── SIDEBAR ─── */
    .sidebar-container { width: 72px; min-width: 72px; height: 100vh; position: fixed; left: 0; top: 0; z-index: 100; }
    .sidebar-container iframe { width: 72px !important; height: 100%; border: none; }
    /* ─── MAIN WRAPPER ─── */
    .main-wrapper { margin-left: 72px; width: calc(100% - 72px); display: flex; flex-direction: column; min-height: 100vh; }
    /* ─── HEADER ─── */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
      opacity: 0;
      transform: translateY(-10px);
      animation: slideDown 0.4s ease 0.1s forwards;
    }
    @keyframes slideDown { to { opacity: 1; transform: translateY(0); } }
    .back-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: none;
      background: none;
      color: var(--t2);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .back-btn:hover { color: var(--t1); background: var(--bg3); }
    .back-btn:active { transform: scale(0.82); }
    .header-title { font-size: 16px; font-weight: 600; color: var(--t1); }
    /* ─── CONTAINER ─── */
    .container {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px;
      flex: 1;
      opacity: 0;
      transform: translateY(12px);
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
    }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
    
    /* ─── STORY RING (스토리 프로필 테두리 그라데이션) ─── */
    .story-ring-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      flex-shrink: 0;
      vertical-align: middle;
    }
    .story-ring-wrapper.has-story {
      padding: 2.5px;
      background: linear-gradient(270deg, #0740ba, #651fff, #29b1ff, #0740ba);
      background-size: 200% 200%;
      animation: storyRing 3s linear infinite;
    }
    @keyframes storyRing {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    .story-ring-wrapper.has-story .author-avatar,
    .story-ring-wrapper.has-story .comment-avatar {
      border: 3px solid var(--bg) !important;
    }

    /* ─── POST DETAIL CARD ─── */
    .post-detail-card { margin-bottom: 48px; }
    .post-detail-header {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-actions { display: flex; align-items: center; gap: 10px; }
    .author-info {
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .author-info:hover { opacity: 0.75; }
    .author-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      overflow: hidden;
      flex-shrink: 0;
      color: var(--t2);
      transition: border-color 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .author-info:hover .author-avatar { border-color: var(--border3); transform: scale(1.05); }
    .author-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .author-details { display: flex; flex-direction: column; gap: 5px; }
    .author-name {
      font-weight: 700;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 7px;
      letter-spacing: -0.3px;
    }
    .post-timestamp { font-size: 13px; color: var(--t3); }

    /* 관리자 텍스트 배지 스타일 추가 (다크/라이트 UI 대응) */
    .admin-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--t2);
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      vertical-align: middle;
      margin-left: 5px;
      line-height: 1;
    }
    
    /* ─── ACCESS BADGE (공개범위) ─── */
    .access-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      background: none;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: 22px;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    .access-badge:hover { transform: scale(1.05); }
    .access-badge:active { transform: scale(0.95); }
    .access-badge img {
      width: 16px;
      height: 16px;
      display: block;
    }
    .access-badge.public {
      border: 1px solid var(--green);
      color: var(--green);
      background: rgba(74,222,128,0.06);
    }
    .access-badge.private {
      border: 1px solid var(--border3);
      color: var(--t2);
      background: var(--bg3);
    }
    .access-badge.protected {
      border: 1px solid var(--blue);
      color: var(--blue);
      background: rgba(59,130,246,0.06);
    }
    /* ─── LIKE BTN ─── */
    .like-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: none;
      border: 1px solid var(--border2);
      color: var(--t2);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: 22px;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .like-btn:hover { border-color: var(--pink); color: var(--pink); background: rgba(255,107,107,0.06); }
    .like-btn:active { transform: scale(0.92); }
    .like-btn.liked { border-color: var(--pink); color: var(--pink); background: rgba(255,107,107,0.08); }
    .like-heart {
      width: 16px; height: 16px;
      fill: currentColor;
      transition: transform 0.25s cubic-bezier(0.34,1.7,0.64,1);
    }
    .like-btn:hover .like-heart { transform: scale(1.3); }
    .like-btn.liked .like-heart { transform: scale(1.15); }
    /* ─── DELETE BTN ─── */
    .delete-btn {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--pink);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      padding: 9px 16px;
      border-radius: 22px;
      transition: background 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      font-family: inherit;
    }
    .delete-btn:hover { background: rgba(255,107,107,0.1); border-color: var(--pink); transform: scale(1.04); }
    .delete-btn:active { transform: scale(0.94); }
    /* ─── 이미지 캐러셀 ─── */
    .post-images {
      margin: 28px 0;
      position: relative;
      border-radius: var(--r3);
      overflow: hidden;
      background: var(--bg);
    }
    .image-carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      gap: 8px;
      padding: 4px;
    }
    .image-carousel::-webkit-scrollbar { display: none; }
    .carousel-slide {
      flex: 0 0 100%;
      scroll-snap-align: start;
      position: relative;
    }
    .carousel-slide img {
      width: 100%;
      max-height: 620px;
      object-fit: contain;
      border-radius: var(--r3);
      border: 1px solid var(--border);
      display: block;
      cursor: pointer;
    }
    .carousel-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      z-index: 10;
      transition: all 0.2s;
    }
    .carousel-nav:hover {
      background: rgba(0,0,0,0.85);
      transform: translateY(-50%) scale(1.1);
    }
    .carousel-nav.prev { left: 12px; }
    .carousel-nav.next { right: 12px; }
    .carousel-indicators {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    .indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--t3);
      cursor: pointer;
      transition: all 0.2s;
    }
    .indicator.active {
      background: var(--t1);
      transform: scale(1.4);
    }
    /* ─── POST CONTENT ─── */
    .post-detail-content { padding: 16px 0 32px; }
    .post-text {
      font-size: 15px;
      line-height: 1.8;
      color: var(--t1);
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .post-text a { color: var(--t2); text-decoration: underline; text-underline-offset: 3px; }
    .post-text a:hover { color: var(--t1); }
    /* ─── SHARE ─── */
    .share-container {
      padding: 24px 0;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .share-label { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--t3); }
    .share-box-wrapper { display: flex; gap: 10px; align-items: center; }
    .share-url-box {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border2);
      padding: 11px 16px;
      border-radius: var(--r2);
      font-size: 13px;
      color: var(--t2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .copy-btn {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--t2);
      width: 42px; height: 42px;
      border-radius: var(--r2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .copy-btn:hover { background: var(--bg4); color: var(--t1); border-color: var(--border3); }
    .copy-btn:active { transform: scale(0.88); }
    .copy-btn.success { background: rgba(74,222,80,0.12); border-color: var(--green); color: var(--green); }
    /* ─── COMMENT SECTION ─── */
    .comment-section {
      padding: 32px 0;
      opacity: 0;
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.35s forwards;
    }
    .comment-input-wrapper { display: flex; gap: 10px; margin-bottom: 32px; }
    .comment-input {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r2);
      padding: 12px 16px;
      color: var(--t1);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 48px;
      max-height: 180px;
      transition: border-color 0.2s, background 0.2s;
      line-height: 1.5;
    }
    .comment-input:focus { outline: none; border-color: var(--border3); background: var(--bg3); }
    .comment-input::placeholder { color: var(--t3); }
    .comment-submit-btn {
      background: var(--t1);
      border: none;
      color: var(--bg);
      padding: 0 20px;
      border-radius: var(--r2);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
    }
    .comment-submit-btn:hover { opacity: 0.85; transform: scale(1.04); }
    .comment-submit-btn:active { transform: scale(0.94); }
    .comment-list { display: flex; flex-direction: column; gap: 0; }
    .comment-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
    }
    .comment-item:last-child { border-bottom: none; }
    .comment-header { display: flex; justify-content: space-between; align-items: center; }
    .comment-author-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .comment-author-wrapper:hover { opacity: 0.75; }
    .comment-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      overflow: hidden;
      flex-shrink: 0;
      color: var(--t2);
      transition: border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .comment-author-wrapper:hover .comment-avatar { border-color: var(--border3); transform: scale(1.06); }
    .comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .comment-author {
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--t1);
    }
    .comment-content {
      font-size: 14px;
      color: var(--t1);
      line-height: 1.7;
      white-space: pre-wrap;
      padding-left: 2px;
    }
    .comment-content a { color: var(--t2); text-decoration: underline; text-underline-offset: 3px; }
    .comment-content a:hover { color: var(--t1); }
    .comment-date { font-size: 11px; color: var(--t3); padding-left: 2px; }
    .comment-del-btn {
      background: none;
      border: none;
      color: var(--t3);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      font-family: inherit;
      transition: color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .comment-del-btn:hover { color: var(--pink); background: rgba(255,107,107,0.08); }
    .comment-del-btn:active { transform: scale(0.88); }
    /* ─── REPLIES (대댓글) ─── */
    .comment-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 2px;
      margin-top: 2px;
    }
    .reply-btn, .replies-toggle-btn {
      background: none;
      border: none;
      color: var(--t2);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 10px;
      font-family: inherit;
      transition: color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .reply-btn:hover, .replies-toggle-btn:hover { color: var(--t1); background: var(--bg3); }
    .reply-btn:active, .replies-toggle-btn:active { transform: scale(0.92); }
    .reply-compose {
      margin-top: 10px;
      padding-left: 44px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .reply-input {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r2);
      padding: 10px 14px;
      color: var(--t1);
      font-size: 13px;
      font-family: inherit;
      resize: none;
      min-height: 42px;
      max-height: 160px;
      transition: border-color 0.2s, background 0.2s;
      line-height: 1.5;
    }
    .reply-input:focus { outline: none; border-color: var(--border3); background: var(--bg3); }
    .reply-input::placeholder { color: var(--t3); }
    .reply-compose-actions { display: flex; justify-content: flex-end; gap: 8px; }
    .reply-submit-btn, .reply-cancel-btn {
      border: 1px solid var(--border2);
      background: var(--bg3);
      color: var(--t2);
      padding: 8px 12px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .reply-submit-btn { background: var(--t1); color: var(--bg); border-color: transparent; }
    .reply-submit-btn:hover { opacity: 0.85; transform: scale(1.02); }
    .reply-cancel-btn:hover { background: var(--bg4); color: var(--t1); border-color: var(--border3); }
    .reply-submit-btn:active, .reply-cancel-btn:active { transform: scale(0.96); }
    .reply-list {
      margin-top: 10px;
      padding-left: 44px;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
    }
    .reply-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 14px 0 14px 14px;
    }
    .reply-item .comment-avatar { width: 28px; height: 28px; font-size: 12px; }
    .reply-item .comment-author { font-size: 13px; }
    .reply-item .comment-content { font-size: 13px; color: var(--t1); }
    .reply-item .comment-date { font-size: 10px; }
    /* ─── LOGIN ALERT ─── */
    .login-alert {
      position: fixed;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg2);
      border: 1px solid var(--border2);
      color: var(--t1);
      padding: 12px 24px;
      border-radius: 22px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      z-index: 9999;
      transition: top 0.5s cubic-bezier(0.34,1.4,0.64,1);
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      white-space: nowrap;
    }
    .login-alert.show { top: 20px; }
    /* ─── DELETE MODAL ─── */
    .delete-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }
    .delete-modal-overlay.show { opacity: 1; visibility: visible; }
    .delete-modal {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r4);
      padding: 36px 28px;
      text-align: center;
      max-width: 360px;
      width: 90%;
      transform: scale(0.88) translateY(12px);
      transition: transform 0.3s cubic-bezier(0.34,1.4,0.64,1);
    }
    .delete-modal-overlay.show .delete-modal { transform: scale(1) translateY(0); }
    .delete-modal img { width: 80px; height: 80px; margin-bottom: 20px; opacity: 0.85; }
    .delete-modal-title { font-size: 16px; font-weight: 600; margin-bottom: 28px; color: var(--t1); line-height: 1.5; }
    .delete-modal-buttons { display: flex; gap: 10px; justify-content: center; }
    .delete-modal-btn {

      87.5% { stroke-dashoffset: 80.11; transform: rotate(810deg); }
      100% { stroke-dashoffset: 304.42; transform: rotate(1080deg); }
    }
  </style>

<script>
  // ─── 초기 스켈레톤 HTML 저장 (새로고침 시 활용) ───
  const defaultPostSkeleton = document.getElementById('postContent').innerHTML;

  // ─── NPROGRESS 설정 ───
  NProgress.configure({ minimum: 0.08, trickleSpeed: 200, showSpinner: false });
  document.addEventListener('click', function(e) {
    const link = e.target.closest('a');
    if (link && link.href && !link.target && !link.hasAttribute('download')) {
      NProgress.start();
    }
  });

  // ─── SPLASH ───
  (function () {
    const splash = document.getElementById('splash');
    function finishSplash() {
      splash.classList.add('fade-out');
      setTimeout(() => { splash.style.display = 'none'; }, 460);
    }
    if (sessionStorage.getItem('splashShown')) {
      splash.style.display = 'none';
    } else {
      sessionStorage.setItem('splashShown', 'true');
      const splashStart = Date.now();
      const MIN_SPLASH = 2000;
      window.addEventListener('load', () => {
        NProgress.done();
        const elapsed = Date.now() - splashStart;
        const remaining = Math.max(0, MIN_SPLASH - elapsed);
        setTimeout(finishSplash, remaining);
      });
      setTimeout(finishSplash, 5000);
    }
  })();

  const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";

  async function api(endpoint, options = {}) {
    const url = API_BASE + endpoint;
    const res = await fetch(url, {
      ...options,
      headers: {
        "Content-Type": "application/json",
        ...(options.headers || {}),
      },
    });
    if (!res.ok) {
      let errorText;
      try { errorText = await res.text(); } catch { errorText = "Unknown error"; }
      throw new Error(`API 오류 (${res.status}): ${errorText}`);
    }
    if (res.status === 204) return null;
    const text = await res.text();
    if (!text) return null;
    try { return JSON.parse(text); } catch (e) { console.error("JSON 파싱 오류:", e); return null; }
  }

  let currentUser = JSON.parse(localStorage.getItem('snsUser')) || null;
  let currentPost = null;
  let pendingDeletePostId = null;
  const openReplyThreads = new Set();
  let currentLightboxImages = [];
  let currentLightboxIndex = 0;
  
  // ─── 48시간 내 게시물 작성 유저 추적 ───
  let recentStoryAuthors = new Set();
  async function fetchRecentStories() {
    try {
      const twoDaysAgo = new Date(Date.now() - 48 * 60 * 60 * 1000).toISOString();
      const posts = await api(`/posts?created_at=gte.${twoDaysAgo}&select=author_id`);
      if (posts) {

        return;

      const post = posts[0];

      // 최신 currentUser 상태(로그인 유저 정보)를 완벽히 동기화한 뒤 비교합니다.
      const savedUser = localStorage.getItem('snsUser');
      const activeUser = savedUser ? JSON.parse(savedUser) : null;
      
      // access 값이 private 일 때 권한 확인 처리 코드
      if (post.access === 'private') {
        if (!activeUser) {
          // 로그인이 안 되어 있다면 예외 없이 즉시 리다이렉트
          window.location.href = '403.html';

        const isAuthor = (activeUser.id === post.author_id) || (activeUser.nickname === post.author);
        
        if (!isAuthor) {
          window.location.href = '403.html';
          return;
        }

  function initCarouselIndicators(postIdStr, count) {
    const container = document.getElementById(`indicators-${postIdStr}`);
    if (!container) return;
    container.innerHTML = '';
    for (let i = 0; i < count; i++) {
      const dot = document.createElement('div');
      dot.className = `indicator ${i === 0 ? 'active' : ''}`;
      dot.onclick = () => {
        const carousel = document.getElementById(`carousel-${postIdStr}`);
        if (carousel) {
          const slideWidth = carousel.clientWidth;
          carousel.scrollTo({ left: i * slideWidth, behavior: 'smooth' });
        }
      };
      container.appendChild(dot);
    }

    const carousel = document.getElementById(`carousel-${postIdStr}`);
    if (carousel) {
      carousel.addEventListener('scroll', () => {
        const scrollLeft = carousel.scrollLeft;
        const slideWidth = carousel.clientWidth;
        const activeIndex = Math.round(scrollLeft / slideWidth);
        const dots = container.querySelectorAll('.indicator');
        dots.forEach((dot, idx) => {
          dot.classList.toggle('active', idx === activeIndex);
        });
      });
    }
  }

  function updateLikeUI(likes) {
    const btn = document.getElementById('likeBtn');
    const countEl = document.getElementById('likeCount');
    if (!btn || !countEl) return;
    countEl.textContent = likes.length;
    if (currentUser && likes.some(l => l.user_id === currentUser.id)) {
      btn.classList.add('liked');
    } else {
      btn.classList.remove('liked');
    }
  }

  window.toggleLike = async function() {
    if (!currentUser) return showLoginAlert();
    if (!currentPost) return;

    const btn = document.getElementById('likeBtn');
    const countEl = document.getElementById('likeCount');
    
    try {
      const [likeRecords, likeCountResult] = await Promise.all([
        api(`/likes?post_id=eq.${postId}&user_id=eq.${currentUser.id}&select=id`),
        api(`/likes?post_id=eq.${postId}&select=count`)
      ]);
      
      const currentlyLiked = likeRecords?.length > 0;
      const currentServerCount = Math.max(0, likeCountResult?.[0]?.count || 0);
      const uiLiked = btn.classList.contains('liked');
      const uiCount = parseInt(countEl.textContent, 10) || 0;

      if (uiLiked !== currentlyLiked || uiCount !== currentServerCount) {
        btn.classList.toggle('liked', currentlyLiked);
        countEl.textContent = currentServerCount;
      }

      if (currentlyLiked) {
        if (likeRecords?.[0]?.id) {
          await api(`/likes?id=eq.${likeRecords[0].id}`, { method: "DELETE" });
        }
        btn.classList.remove('liked');
        countEl.textContent = currentServerCount - 1;
      } else {
        await api("/likes", {
          method: "POST",
          body: JSON.stringify({ post_id: postId, user_id: currentUser.id })
        });
        btn.classList.add('liked');
        countEl.textContent = currentServerCount + 1;
        createNotification(currentPost.author_id, `${currentUser.nickname}님이 좋아요를 눌렀습니다`, `view.html?id=${postId}`);
      }

      const finalCount = await api(`/likes?post_id=eq.${postId}&select=count`);
      countEl.textContent = Math.max(0, finalCount?.[0]?.count || 0);
    } catch (err) {
      console.error("좋아요 처리 오류:", err);
      try {
        const [records, countRes] = await Promise.all([
          api(`/likes?post_id=eq.${postId}&user_id=eq.${currentUser.id}&select=id`),
          api(`/likes?post_id=eq.${postId}&select=count`)
        ]);
        btn.classList.toggle('liked', records?.length > 0);
        countEl.textContent = Math.max(0, countRes?.[0]?.count || 0);
      } catch (recoveryErr) { console.error("복구 실패:", recoveryErr); }
    }
  };

  async function listenComments(postId) {
    try {
      const comments = await api(`/comments?post_id=eq.${postId}&select=*&order=created_at.desc`);
      const userIds = [...new Set(comments.map(c => c.user_id))];
      const profileImages = {};
      
      await Promise.all(userIds.map(async (uid) => {
        const img = await getProfileImage(uid);
        if (img) profileImages[uid] = img;
      }));
      
      displayComments(comments || [], profileImages);
    } catch (e) { console.error('댓글 로드 오류:', e); }
  }

  function displayComments(comments, profileImages = {}) {
    const list = document.getElementById('commentList');
    list.innerHTML = '';
    
    if (comments.length === 0) {
      list.innerHTML = '<div style="text-align:center; color:var(--t3); padding:48px 20px; font-size:14px;">아직 댓글이 없습니다. 첫 댓글을 남겨보세요!</div>';
      return;
    }

    const roots = [];
    const repliesByParent = {};
    
    comments.forEach(c => {
      const parentId = c.parent_id || null;
      if (!parentId) roots.push(c);
      else {
        if (!repliesByParent[parentId]) repliesByParent[parentId] = [];
        repliesByParent[parentId].push(c);
      }
    });
    
    Object.values(repliesByParent).forEach(arr => {
      arr.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
    });
    
    // 댓글 및 답글 프로필에 렌더링 시 스토리 테두리 링을 포함시킵니다.
    function renderAvatar(userName, userId) {
      let avatarInner = userName ? userName[0].toUpperCase() : '?';
      if (profileImages[userId]) {
        const url = profileImages[userId].includes('?')
          ? `${profileImages[userId]}&v=${Date.now()}`
          : `${profileImages[userId]}?v=${Date.now()}`;
        avatarInner = `<img src="${url}" alt="${escapeHtml(userName)}">`;
      }
      const hasStory = recentStoryAuthors.has(userId);
      return `<div class="story-ring-wrapper ${hasStory ? 'has-story' : ''}"><div class="comment-avatar">${avatarInner}</div></div>`;
    }

    function renderOneComment(c, { showReplyButton }) {
      const isMine = currentUser?.id === c.user_id;

        year: 'numeric', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
      const isVerified = ["JB777", "진정오"].includes(c.user_name);
      const avatarContent = renderAvatar(c.user_name, c.user_id);
      const linkedText = parseMarkdown(c.text);
      const replyCount = (repliesByParent[c.id] || []).length;
      const hasReplies = replyCount > 0;
      const isOpen = openReplyThreads.has(c.id);

        ? `<button class="reply-btn" onclick="openReplyComposer('${c.id}')">답글 달기</button>`
        : '';

        ? `<button class="replies-toggle-btn" id="toggleReplies-${c.id}" data-count="${replyCount}" onclick="toggleReplies('${c.id}')">${isOpen ? '답글 접기' : `답글 ${replyCount}개 보기`}</button>`

      const replyComposeHtml = showReplyButton ?
      `

            <button class="reply-submit-btn" onclick="submitReply('${c.id}')">답글</button>
          </div>
        </div>
      ` : '';
      
      const replies = repliesByParent[c.id] || [];
      const repliesHtml = replies.length ?
      `
        <div class="reply-list" id="replyList-${c.id}" style="display: ${isOpen ? 'flex' : 'none'};">
          ${replies.map(r => {
            const rIsMine = currentUser?.id === r.user_id;

            const rAvatarContent = renderAvatar(r.user_name, r.user_id);
            const rLinkedText = parseMarkdown(r.text);

            return `

                    ${rAvatarContent}

                      ${escapeHtml(r.user_name)}
                      ${rIsVerified ? '<span class="admin-badge">관리자</span>' : ''}
                    </span>
                  </div>
                  ${rIsMine ? `<button class="comment-del-btn" onclick="deleteComment('${r.id}')">삭제</button>` : ''}
                </div>
                <div class="comment-content">${rLinkedText}</div>
                <div class="comment-date">${rDate}</div>
              </div>
            `;
          }).join('')}
        </div>
      ` : '';
      
      return `
        <div class="comment-header">
          <div class="comment-author-wrapper" onclick="goToProfile('${c.user_id}', '${escapeHtml(c.user_name)}')">
            ${avatarContent}
            <span class="comment-author">
              ${escapeHtml(c.user_name)}
              ${isVerified ? '<span class="admin-badge">관리자</span>' : ''}
            </span>
          </div>
          ${isMine ? `<button class="comment-del-btn" onclick="deleteComment('${c.id}')">삭제</button>` : ''}
        </div>
        <div class="comment-content">${linkedText}</div>
        <div class="comment-date">${date}</div>
        ${showReplyButton ?
        `
          <div class="comment-actions">
            ${replyBtnHtml}
            ${toggleBtnHtml}
          </div>
          ${replyComposeHtml}
          ${repliesHtml}
        ` : ''}
      `;
    }

    roots.forEach(c => {
      const item = document.createElement('div');
      item.className = 'comment-item';
      item.innerHTML = renderOneComment(c, { showReplyButton: true });
      list.appendChild(item);
    });
  }

  function showError(msg) {
    document.getElementById('postContent').innerHTML = `
      <div style="padding:80px 20px; text-align:center;">
        <div style="color:var(--pink); font-size:15px; margin-bottom:20px;">${msg}</div>
        <button onclick="window.history.back()" style="background:var(--t1); color:var(--bg); border:none; padding:12px 28px; border-radius:var(--r2); font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; transition:opacity 0.15s;" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">돌아가기</button>
      </div>
    `;
  }

  // ─── INFO MODAL 추가 로직 ───
  window.openInfoModal = function() {
    document.getElementById('accessInfoModal').classList.add('open');
  };

  window.closeInfoModal = function() {
    document.getElementById('accessInfoModal').classList.remove('open');
  };

  // 모달 영역 밖 클릭 시 닫기
  window.addEventListener('click', (e) => {
    const infoModal = document.getElementById('accessInfoModal');
    if (e.target === infoModal) {
      closeInfoModal();
    }
  });

  window.openDeleteModal = function(id) {
    pendingDeletePostId = id;
    document.getElementById('deleteModal').classList.add('show');
    document.body.style.overflow = 'hidden';
  };
  
  window.closeDeleteModal = function() {
    document.getElementById('deleteModal').classList.remove('show');
    document.body.style.overflow = '';
    pendingDeletePostId = null;
  };
  
  window.goToProfile = function(userId, nickname) {
    window.location.href = `user.html?id=${userId}&nickname=${encodeURIComponent(nickname)}`;
  };
  
  window.addComment = async function() {
    const input = document.getElementById('commentInput');
    const text = input.value.trim();
    if (!currentUser) return showLoginAlert();
    if (!text || !currentPost) return;

    try {
      await api("/comments", {
        method: "POST",
        body: JSON.stringify({
          post_id: postId,
          user_id: currentUser.id,
          user_name: currentUser.nickname,
          text,
          parent_id: null,
          created_at: new Date().toISOString()
        })
      });
      createNotification(currentPost.author_id, `${currentUser.nickname}님이 댓글을 남겼습니다`, `view.html?id=${postId}`);
      input.value = '';
      listenComments(postId);
    } catch (e) { alert('댓글 작성 실패'); }
  };
  
  window.openReplyComposer = function(commentId) {
    if (!currentUser) return showLoginAlert();
    const compose = document.getElementById(`replyCompose-${commentId}`);
    if (!compose) return;
    compose.style.display = 'flex';
    const input = document.getElementById(`replyInput-${commentId}`);
    if (input) input.focus();
  };
  
  window.cancelReply = function(commentId) {
    const compose = document.getElementById(`replyCompose-${commentId}`);
    const input = document.getElementById(`replyInput-${commentId}`);
    if (input) input.value = '';
    if (compose) compose.style.display = 'none';
  };

  window.submitReply = async function(parentId) {
    const input = document.getElementById(`replyInput-${parentId}`);
    const text = input?.value?.trim() || '';
    if (!currentUser) return showLoginAlert();
    if (!text || !currentPost) return;
    
    try {
      await api("/comments", {
        method: "POST",
        body: JSON.stringify({
          post_id: postId,
          user_id: currentUser.id,
          user_name: currentUser.nickname,
          text,
          parent_id: parentId,
          created_at: new Date().toISOString()
        })
      });
      const parentComment = await getCommentById(parentId);
      const targetUserId = parentComment?.user_id || currentPost.author_id;
      createNotification(targetUserId, `${currentUser.nickname}님이 답글을 남겼습니다`, `view.html?id=${postId}`);

      if (input) input.value = '';
      const compose = document.getElementById(`replyCompose-${parentId}`);
      if (compose) compose.style.display = 'none';
      openReplyThreads.add(parentId);
      listenComments(postId);
    } catch (e) { alert('답글 작성 실패'); }
  };
  
  window.toggleReplies = function(commentId) {
    const listEl = document.getElementById(`replyList-${commentId}`);
    const btn = document.getElementById(`toggleReplies-${commentId}`);
    if (!listEl || !btn) return;
    
    const opening = listEl.style.display === 'none' || !listEl.style.display;

    if (opening) {
      listEl.style.display = 'flex';
      btn.textContent = '답글 접기';
      openReplyThreads.add(commentId);
    } else {
      listEl.style.display = 'none';
      const count = Number(btn.dataset.count || 0);
      btn.textContent = `답글 ${count}개 보기`;
      openReplyThreads.delete(commentId);
    }
  };
  
  window.deleteComment = async function(commentId) {
    if (!confirm('댓글을 삭제하시겠습니까?')) return;
    try {
      await api(`/comments?id=eq.${commentId}`, { method: "DELETE" });
      listenComments(postId);
    } catch (e) { alert('댓글 삭제 실패'); }
  };
  
  window.copyShareLink = function() {
    navigator.clipboard.writeText(window.location.href).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.classList.add('success');
      setTimeout(() => btn.classList.remove('success'), 1500);
    });
  };

  window.goHome = () => window.location.href = "index.html";
  window.showPrivacyPolicy = () => window.location.href = "privacy.html";
  window.showTerms = () => window.location.href = "policy.html";

  document.getElementById('confirmDeleteBtn').onclick = async () => {
    if (!pendingDeletePostId) return;
    try {
      await api(`/comments?post_id=eq.${pendingDeletePostId}`, { method: "DELETE" });
      await api(`/likes?post_id=eq.${pendingDeletePostId}`, { method: "DELETE" });
      await api(`/posts?id=eq.${pendingDeletePostId}`, { method: "DELETE" });
      window.location.href = 'index.html';
    } catch (e) { alert('게시물 삭제 실패'); }
  };
  
  function escapeHtml(unsafe) {
    return unsafe
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  // ─── 추가된 위로 스크롤해서 새로고침 (Pull To Refresh) 스크립트 ───
  (function() {
    const refreshEl = document.getElementById('pullRefresh');
    const pullSpinnerSvg = document.getElementById('pullSpinnerSvg');

    let startY = 0;
    let pulling = false;
    let isLoading = false;

    // 스크롤이 맨 위인지 확인
    function isScrollTop() {
      const windowScrollY = window.scrollY || document.documentElement.scrollTop;
      return windowScrollY <= 5;
    }

    // 터치 이벤트 연결
    window.addEventListener('touchstart', e => {
      if (isLoading) return;
      if (isScrollTop()) {
        startY = e.touches[0].clientY;
        pulling = true;
      }
    }, { passive: true });

    window.addEventListener('touchmove', e => {
      if (!pulling || isLoading) return;

      const currentY = e.touches[0].clientY;
      const distance = currentY - startY;

      // 아래로 당기고 최상단일 때만 동작
      if (distance > 0 && isScrollTop()) {
        if (e.cancelable) e.preventDefault();

        refreshEl.classList.add('show');
        pullSpinnerSvg.style.display = 'block';
        
        const rotation = Math.min(distance * 2, 360);
        const topPos = Math.min(distance - 65, 24);

        pullSpinnerSvg.style.transform = `rotate(${rotation}deg)`;
        refreshEl.style.top = `${topPos}px`;
        refreshEl.style.transition = 'none';
      } else if (distance < 0) {
        // 위로 스크롤 시 당기기 취소
        pulling = false;
        refreshEl.style.top = '-65px';
      }
    }, { passive: false });

    window.addEventListener('touchend', async e => {
      if (!pulling || isLoading) return;
      pulling = false;

      const currentY = e.changedTouches[0].clientY;
      const distance = currentY - startY;

      if (distance > 80 && isScrollTop() && postId) {
        isLoading = true;
        refreshEl.classList.add('loading');
        
        // 애니메이션 회전에 맡기기 위해 초기화
        pullSpinnerSvg.style.transform = 'none'; 
        
        refreshEl.style.transition = 'top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        refreshEl.style.top = '24px';

        // 스켈레톤 상태로 UI 초기화
        document.getElementById('postContent').innerHTML = defaultPostSkeleton;
        document.getElementById('commentList').innerHTML = '';

        try {
          // 데이터 다시 불러오기
          await fetchRecentStories();
          await loadPost(postId);
          await listenComments(postId);
        } catch (err) {
          console.error("새로고침 중 오류:", err);
        } finally {
          setTimeout(() => {
            refreshEl.classList.remove('loading');
            refreshEl.style.transition = 'top 0.3s ease';
            refreshEl.style.top = '-65px';
            setTimeout(() => {
              refreshEl.classList.remove('show');
              pullSpinnerSvg.style.display = 'none';
              isLoading = false;
            }, 300);
          }, 600);
        }
      } else {
        refreshEl.style.transition = 'top 0.3s ease';
        refreshEl.style.top = '-65px';
        setTimeout(() => { 
          refreshEl.classList.remove('show');
          pullSpinnerSvg.style.display = 'none';
        }, 300);
      }
    });
  })();
</script>
