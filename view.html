<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시물 : Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }
    /* NProgress 커스텀 */
    #nprogress .bar { background: #fff !important; height: 2px !important; }
    #nprogress .peg { display: none !important; }
    #nprogress .spinner { display: none !important; }
    /* ─── SPLASH ─── */
    #splash {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      transition: opacity 0.45s ease;
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }
    .splash-logo {
      width: 72px; height: 72px;
      animation: splashLogoPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes splashLogoPop {
      from { opacity: 0; transform: scale(0.7); }
      to { opacity: 1; transform: scale(1); }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }
    /* ─── SIDEBAR ─── */
    .sidebar-container { width: 72px; min-width: 72px; height: 100vh; position: fixed; left: 0; top: 0; z-index: 100; }
    .sidebar-container iframe { width: 72px !important; height: 100%; border: none; }
    /* ─── MAIN WRAPPER ─── */
    .main-wrapper { margin-left: 72px; width: calc(100% - 72px); display: flex; flex-direction: column; min-height: 100vh; }
    /* ─── HEADER ─── */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
      opacity: 0;
      transform: translateY(-10px);
      animation: slideDown 0.4s ease 0.1s forwards;
    }
    @keyframes slideDown { to { opacity: 1; transform: translateY(0); } }
    .back-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: none;
      background: none;
      color: var(--t2);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .back-btn:hover { color: var(--t1); background: var(--bg3); }
    .back-btn:active { transform: scale(0.82); }
    .header-title { font-size: 16px; font-weight: 600; color: var(--t1); }
    /* ─── CONTAINER ─── */
    .container {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px;
      flex: 1;
      opacity: 0;
      transform: translateY(12px);
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
    }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
    /* ─── POST DETAIL CARD ─── */
    .post-detail-card { margin-bottom: 48px; }
    .post-detail-header {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-actions { display: flex; align-items: center; gap: 10px; }
    .author-info {
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .author-info:hover { opacity: 0.75; }
    .author-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      overflow: hidden;
      flex-shrink: 0;
      color: #666;
      transition: border-color 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .author-info:hover .author-avatar { border-color: var(--border3); transform: scale(1.05); }
    .author-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .author-details { display: flex; flex-direction: column; gap: 5px; }
    .author-name {
      font-weight: 700;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 7px;
      letter-spacing: -0.3px;
    }
    
    /* 타임스탬프 및 공개 범위 한 줄 정렬 스타일 추가 */
    .meta-row { display: flex; align-items: center; gap: 8px; }
    .post-timestamp { font-size: 13px; color: var(--t3); }
    
    /* 공개 범위 표시 전용 스타일배지 추가 */
    .access-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--t2);
      background: var(--bg3);
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid var(--border2);
    }
    .access-badge svg { fill: currentColor; flex-shrink: 0; }

    .verification-badge {
      display: inline-block;
      width: 14px;
      height: 14px;
      vertical-align: middle;
      background-image: url('https://sharer.jbjb.r-e.kr/badge.svg');
      background-repeat: no-repeat;
      background-size: contain;
      background-position: center;
    }
    /* ─── LIKE BTN ─── */
    .like-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: none;
      border: 1px solid var(--border2);
      color: var(--t2);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: 22px;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .like-btn:hover { border-color: var(--pink); color: var(--pink); background: rgba(255,107,107,0.06); }
    .like-btn:active { transform: scale(0.92); }
    .like-btn.liked { border-color: var(--pink); color: var(--pink); background: rgba(255,107,107,0.08); }
    .like-heart {
      width: 16px; height: 16px;
      fill: currentColor;
      transition: transform 0.25s cubic-bezier(0.34,1.7,0.64,1);
    }
    .like-btn:hover .like-heart { transform: scale(1.3); }
    .like-btn.liked .like-heart { transform: scale(1.15); }
    /* ─── DELETE BTN ─── */
    .delete-btn {
      background: transparent;
      border: 1px solid #2a1a1a;
      color: var(--pink);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      padding: 9px 16px;
      border-radius: 22px;
      transition: background 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      font-family: inherit;
    }
    .delete-btn:hover { background: rgba(255,107,107,0.1); border-color: var(--pink); transform: scale(1.04); }
    .delete-btn:active { transform: scale(0.94); }
    /* ─── 이미지 캐러셀 ─── */
    .post-images {
      margin: 28px 0;
      position: relative;
      border-radius: var(--r3);
      overflow: hidden;
      background: #000;
    }
    .image-carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      gap: 8px;
      padding: 4px;
    }
    .image-carousel::-webkit-scrollbar { display: none; }
    .carousel-slide {
      flex: 0 0 100%;
      scroll-snap-align: start;
      position: relative;
    }
    .carousel-slide img {
      width: 100%;
      max-height: 620px;
      object-fit: contain;
      border-radius: var(--r3);
      border: 1px solid var(--border);
      display: block;
      cursor: pointer;
    }
    .carousel-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      z-index: 10;
      transition: all 0.2s;
    }
    .carousel-nav:hover {
      background: rgba(0,0,0,0.85);
      transform: translateY(-50%) scale(1.1);
    }
    .carousel-nav.prev { left: 12px; }
    .carousel-nav.next { right: 12px; }
    .carousel-indicators {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    .indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: all 0.2s;
    }
    .indicator.active {
      background: #fff;
      transform: scale(1.4);
    }
    /* ─── POST CONTENT ─── */
    .post-detail-content { padding: 16px 0 32px; }
    .post-text {
      font-size: 15px;
      line-height: 1.8;
      color: var(--t1);
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .post-text a { color: #888; text-decoration: underline; text-underline-offset: 3px; }
    .post-text a:hover { color: var(--t1); }
    /* ─── SHARE ─── */
    .share-container {
      padding: 24px 0;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .share-label { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--t3); }
    .share-box-wrapper { display: flex; gap: 10px; align-items: center; }
    .share-url-box {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border2);
      padding: 11px 16px;
      border-radius: var(--r2);
      font-size: 13px;
      color: var(--t2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .copy-btn {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--t2);
      width: 42px; height: 42px;
      border-radius: var(--r2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .copy-btn:hover { background: var(--bg4); color: var(--t1); border-color: var(--border3); }
    .copy-btn:active { transform: scale(0.88); }
    .copy-btn.success { background: rgba(74,222,80,0.12); border-color: var(--green); color: var(--green); }
    /* ─── COMMENT SECTION ─── */
    .comment-section {
      padding: 32px 0;
      opacity: 0;
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.35s forwards;
    }
    .comment-input-wrapper { display: flex; gap: 10px; margin-bottom: 32px; }
    .comment-input {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r2);
      padding: 12px 16px;
      color: var(--t1);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 48px;
      max-height: 180px;
      transition: border-color 0.2s, background 0.2s;
      line-height: 1.5;
    }
    .comment-input:focus { outline: none; border-color: var(--border3); background: var(--bg3); }
    .comment-input::placeholder { color: var(--t3); }
    .comment-submit-btn {
      background: #fff;
      border: none;
      color: #000;
      padding: 0 20px;
      border-radius: var(--r2);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
    }
    .comment-submit-btn:hover { background: #e8e8e8; transform: scale(1.04); }
    .comment-submit-btn:active { transform: scale(0.94); }
    .comment-list { display: flex; flex-direction: column; gap: 0; }
    .comment-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
    }
    .comment-item:last-child { border-bottom: none; }
    .comment-header { display: flex; justify-content: space-between; align-items: center; }
    .comment-author-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .comment-author-wrapper:hover { opacity: 0.75; }
    .comment-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      overflow: hidden;
      flex-shrink: 0;
      color: #666;
      transition: border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .comment-author-wrapper:hover .comment-avatar { border-color: var(--border3); transform: scale(1.06); }
    .comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .comment-author {
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--t1);
    }
    .comment-content {
      font-size: 14px;
      color: #ccc;
      line-height: 1.7;
      white-space: pre-wrap;
      padding-left: 2px;
    }
    .comment-content a { color: var(--t2); text-decoration: underline; text-underline-offset: 3px; }
    .comment-content a:hover { color: var(--t1); }
    .comment-date { font-size: 11px; color: var(--t3); padding-left: 2px; }
    .comment-del-btn {
      background: none;
      border: none;
      color: var(--t3);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      font-family: inherit;
      transition: color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .comment-del-btn:hover { color: var(--pink); background: rgba(255,107,107,0.08); }
    .comment-del-btn:active { transform: scale(0.88); }
    /* ─── REPLIES (대댓글) ─── */
    .comment-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 2px;
      margin-top: 2px;
    }
    .reply-btn, .replies-toggle-btn {
      background: none;
      border: none;
      color: var(--t2);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 10px;
      font-family: inherit;
      transition: color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .reply-btn:hover, .replies-toggle-btn:hover { color: var(--t1); background: var(--bg3); }
    .reply-btn:active, .replies-toggle-btn:active { transform: scale(0.92); }
    .reply-compose {
      margin-top: 10px;
      padding-left: 44px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .reply-input {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r2);
      padding: 10px 14px;
      color: var(--t1);
      font-size: 13px;
      font-family: inherit;
      resize: none;
      min-height: 42px;
      max-height: 160px;
      transition: border-color 0.2s, background 0.2s;
      line-height: 1.5;
    }
    .reply-input:focus { outline: none; border-color: var(--border3); background: var(--bg3); }
    .reply-input::placeholder { color: var(--t3); }
    .reply-compose-actions { display: flex; justify-content: flex-end; gap: 8px; }
    .reply-submit-btn, .reply-cancel-btn {
      border: 1px solid var(--border2);
      background: var(--bg3);
      color: var(--t2);
      padding: 8px 12px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .reply-submit-btn { background: #fff; color: #000; border-color: transparent; }
    .reply-submit-btn:hover { background: #e8e8e8; transform: scale(1.02); }
    .reply-cancel-btn:hover { background: var(--bg4); color: var(--t1); border-color: var(--border3); }
    .reply-submit-btn:active, .reply-cancel-btn:active { transform: scale(0.96); }
    .reply-list {
      margin-top: 10px;
      padding-left: 44px;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
    }
    .reply-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 14px 0 14px 14px;
      border-bottom: 1px solid var(--border);
    }
    .reply-item:last-child { border-bottom: none; }
    .reply-item .comment-header { display: flex; justify-content: space-between; align-items: center; }
    .reply-item .comment-avatar { width: 28px; height: 28px; font-size: 12px; }
    .reply-item .comment-author { font-size: 13px; }
    .reply-item .comment-content { font-size: 13px; color: #cfcfcf; padding-left: 2px; }
    .reply-item .comment-date { font-size: 10px; color: var(--t3); padding-left: 2px; }
    /* ─── LOGIN ALERT ─── */
    .login-alert {
      position: fixed;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg2);
      border: 1px solid var(--border2);
      color: var(--t1);
      padding: 12px 24px;
      border-radius: 22px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      z-index: 9999;
      transition: top 0.5s cubic-bezier(0.34,1.4,0.64,1);
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      white-space: nowrap;
    }
    .login-alert.show { top: 20px; }
    /* ─── DELETE MODAL ─── */
    .delete-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }
    .delete-modal-overlay.show { opacity: 1; visibility: visible; }
    .delete-modal {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r4);
      padding: 36px 28px;
      text-align: center;
      max-width: 360px;
      width: 90%;
      transform: scale(0.88) translateY(12px);
      transition: transform 0.3s cubic-bezier(0.34,1.4,0.64,1);
    }
    .delete-modal-overlay.show .delete-modal { transform: scale(1) translateY(0); }
    .delete-modal img { width: 80px; height: 80px; margin-bottom: 20px; opacity: 0.85; }
    .delete-modal-title { font-size: 16px; font-weight: 600; margin-bottom: 28px; color: var(--t1); line-height: 1.5; }
    .delete-modal-buttons { display: flex; gap: 10px; justify-content: center; }
    .delete-modal-btn {
      padding: 10px 28px;
      border-radius: var(--r2);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      border: none;
    }
    .delete-modal-btn.cancel { background: var(--bg3); color: var(--t2); border: 1px solid var(--border2); }
    .delete-modal-btn.cancel:hover { background: var(--bg4); color: var(--t1); }
    .delete-modal-btn.delete { background: rgba(255,107,107,0.15); color: var(--pink); border: 1px solid rgba(255,107,107,0.3); }
    .delete-modal-btn.delete:hover { background: rgba(255,107,107,0.25); border-color: var(--pink); }
    /* 라이트박스 (이미지 확대 보기) */
    #imageLightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20000;
      backdrop-filter: blur(8px);
    }
    .lightbox-content { position: relative; max-width: 95vw; max-height: 95vh; display: flex; align-items: center; justify-content: center; }
    .lightbox-content img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: var(--r2); }
    .lightbox-close { position: absolute; top: -40px; right: 0; background: none; border: none; color: white; font-size: 28px; cursor: pointer; }
    /* ─── FOOTER ─── */
    .footer { border-top: 1px solid var(--border); padding: 24px 20px; text-align: center; color: var(--t3); font-size: 11px; display: flex; justify-content: center; gap: 16px; margin-top: 40px; }
    .footer span { cursor: pointer; transition: color 0.15s; }
    .footer span:hover { color: var(--t2); }
    @media (max-width: 768px) {
      .sidebar-container { display: none; }
      .main-wrapper { margin-left: 0; width: 100%; }
      .container { padding: 20px 16px; }
    }
  </style>
</head>
<body>
  <div id="splash">
    <img src="./logo.svg" alt="logo" class="splash-logo">
  </div>

  <div class="sidebar-container">
    <iframe src="sidebar.html"></iframe>
  </div>

  <div class="main-wrapper">
    <div class="header">
      <button class="back-btn" onclick="goHome()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      </button>
      <div class="header-title">게시물 보기</div>
    </div>

    <div class="container">
      <div class="post-detail-card">
        <div class="post-detail-header">
          <div class="author-info" id="authorInfo">
            <div class="author-avatar" id="authorAvatar"></div>
            <div class="author-details">
              <div class="author-name" id="authorName"></div>
              
              <div class="meta-row">
                <span class="post-timestamp" id="postTimestamp"></span>
                <span id="accessBadgeContainer"></span>
              </div>
              
            </div>
          </div>
          <div class="header-actions">
            <button class="like-btn" id="likeBtn">
              <svg class="like-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
              <span id="likeCount">0</span>
            </button>
            <button class="delete-btn" id="deleteBtn" style="display:none;">삭제</button>
          </div>
        </div>

        <div class="post-images" id="postImages" style="display:none;">
          <button class="carousel-nav prev" id="prevBtn" style="display:none;">&lt;</button>
          <div class="image-carousel" id="imageCarousel"></div>
          <button class="carousel-nav next" id="nextBtn" style="display:none;">&gt;</button>
          <div class="carousel-indicators" id="carouselIndicators"></div>
        </div>

        <div class="post-detail-content">
          <div class="post-text" id="postContent"></div>
        </div>

        <div class="share-container">
          <div class="share-label">공유 링크</div>
          <div class="share-box-wrapper">
            <div class="share-url-box" id="shareUrl"></div>
            <button class="copy-btn" id="copyBtn" onclick="copyShareLink()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="comment-section">
        <div class="comment-input-wrapper">
          <textarea class="comment-input" id="commentInput" placeholder="댓글을 입력하세요..." rows="1"></textarea>
          <button class="comment-submit-btn" id="commentSubmitBtn">등록</button>
        </div>
        <div class="comment-list" id="commentList"></div>
      </div>
    </div>

    <div class="footer">
      <span onclick="showPrivacyPolicy()">개인정보처리방침</span>
      <span onclick="showTerms()">이용약관</span>
    </div>
  </div>

  <div class="login-alert" id="loginAlert">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
    로그인이 필요합니다. 로그인 페이지로 이동합니다.
  </div>

  <div class="delete-modal-overlay" id="deleteModalOverlay">
    <div class="delete-modal">
      <img src="https://sharer.jbjb.r-e.kr/delete.svg" alt="warning">
      <div class="delete-modal-title">게시물을 완전히 삭제하시겠습니까?<br>삭제된 데이터는 복구할 수 없습니다.</div>
      <div class="delete-modal-buttons">
        <button class="delete-modal-btn cancel" id="cancelDeleteBtn">취소</button>
        <button class="delete-modal-btn delete" id="confirmDeleteBtn">삭제</button>
      </div>
    </div>
  </div>

  <div id="imageLightbox" onclick="closeLightbox()">
    <div class="lightbox-content" onclick="event.stopPropagation()">
      <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
      <img id="lightboxImg" src="" alt="확대 이미지">
    </div>
  </div>

  <script>
  const SUPABASE_URL = "https://wzsnmbeffwunmshbshcc.supabase.co";
  const SUPABASE_KEY = "발급받은_anon_key_넣기";

  const urlParams = new URLSearchParams(window.location.search);
  const postId = urlParams.get('id');

  let currentUser = null;
  let currentPostAuthorId = null;
  let pendingDeletePostId = null;
  let activeImageIndex = 0;
  let totalImages = 0;

  const activeInputReplies = new Set();
  const visibleReplies = new Set();

  async function api(path, options = {}) {
    options.headers = {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      ...(options.headers || {})
    };
    const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, options);
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(errText);
    }
    if (options.method === 'DELETE' || options.headers['Prefer'] === 'return=minimal') {
      return null;
    }
    return res.json();
  }

  window.addEventListener('DOMContentLoaded', async () => {
    NProgress.start();
    const userStr = localStorage.getItem('user');
    if (userStr) {
      try { currentUser = JSON.parse(userStr); } catch(e){}
    }

    if (!postId) {
      alert('올바르지 않은 접근입니다.');
      window.location.href = 'index.html';
      return;
    }

    document.getElementById('shareUrl').textContent = window.location.href;

    try {
      await loadPostDetail();
      await listenComments(postId);
    } catch (e) {
      console.error(e);
      alert('게시물을 불러오지 못했습니다.');
    } finally {
      NProgress.done();
      const splash = document.getElementById('splash');
      splash.classList.add('fade-out');
      setTimeout(() => splash.remove(), 450);
    }

    setupLikeButton();
    setupDeleteButton();
    setupCommentSubmit();
    setupTextareaAutoResize();
  });

  async function loadPostDetail() {
    const data = await api(`/posts?id=eq.${postId}&select=*`);
    if (!data || data.length === 0) {
      alert('존재하지 않거나 삭제된 게시물입니다.');
      window.location.href = 'index.html';
      return;
    }

    const post = data[0];
    currentPostAuthorId = post.author_id;

    // 아바타 및 유저 정보 랜더링
    const avatarEl = document.getElementById('authorAvatar');
    if (post.author_avatar) {
      avatarEl.innerHTML = `<img src="${post.author_avatar}" alt="avatar">`;
    } else {
      avatarEl.textContent = post.author ? post.author.substring(0, 1) : '?';
    }

    const nameEl = document.getElementById('authorName');
    nameEl.innerHTML = `${escapeHtml(post.author || '익명')} ${post.is_verified ? '<span class="verification-badge"></span>' : ''}`;
    
    document.getElementById('postTimestamp').textContent = formatDate(post.created_at);

    // ─── [핵심 추가] 공개 범위 배지 렌더링 ───
    renderAccessBadge(post.access);

    // 본문 내용 렌der
    const contentEl = document.getElementById('postContent');
    contentEl.innerHTML = linkify(escapeHtml(post.content || ''));

    // 본문 삭제 버튼 노출 여부
    if (currentUser && (currentUser.id === post.author_id || currentUser.role === 'admin')) {
      document.getElementById('deleteBtn').style.display = 'block';
    }

    // 이미지 렌더링 (캐러셀)
    if (post.image_url) {
      const urls = post.image_url.split(',').map(u => u.trim()).filter(Boolean);
      if (urls.length > 0) {
        totalImages = urls.length;
        document.getElementById('postImages').style.display = 'block';
        const carousel = document.getElementById('imageCarousel');
        const indicators = document.getElementById('carouselIndicators');

        urls.forEach((url, idx) => {
          const slide = document.createElement('div');
          slide.className = 'carousel-slide';
          slide.innerHTML = `<img src="${url}" alt="post image" onclick="openLightbox('${url}')">`;
          carousel.appendChild(slide);

          const ind = document.createElement('div');
          ind.className = `indicator ${idx === 0 ? 'active' : ''}`;
          ind.onclick = () => scrollToSlide(idx);
          indicators.appendChild(ind);
        });

        if (urls.length > 1) {
          document.getElementById('prevBtn').style.display = 'flex';
          document.getElementById('nextBtn').style.display = 'flex';
          setupCarouselScrollListener();
        }
      }
    }

    // 좋아요 상태 업데이트
    await updateLikeUI();
  }

  // ─── [핵심 추가] 공개 범위 배지 생성기 함수 ───
  function renderAccessBadge(accessValue) {
    const container = document.getElementById('accessBadgeContainer');
    if (!container) return;

    let badgeText = '공개';
    let iconSvg = `<svg width="11" height="11" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>`; // 지구본

    if (accessValue === 'link') {
      badgeText = '일부 공개';
      iconSvg = `<svg width="11" height="11" viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>`; // 링크 모양
    } else if (accessValue === 'private') {
      badgeText = '비공개';
      iconSvg = `<svg width="11" height="11" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>`; // 자물쇠 모양
    }

    container.innerHTML = `
      <span class="access-badge">
        ${iconSvg}
        <span>${badgeText}</span>
      </span>
    `;
  }

  function setupCarouselScrollListener() {
    const carousel = document.getElementById('imageCarousel');
    carousel.addEventListener('scroll', () => {
      const width = carousel.clientWidth;
      const index = Math.round(carousel.scrollLeft / width);
      if (index !== activeImageIndex) {
        activeImageIndex = index;
        updateIndicators();
      }
    });

    document.getElementById('prevBtn').onclick = () => {
      if (activeImageIndex > 0) scrollToSlide(activeImageIndex - 1);
    };
    document.getElementById('nextBtn').onclick = () => {
      if (activeImageIndex < totalImages - 1) scrollToSlide(activeImageIndex + 1);
    };
  }

  function scrollToSlide(idx) {
    const carousel = document.getElementById('imageCarousel');
    const width = carousel.clientWidth;
    carousel.scrollTo({ left: idx * width, behavior: 'smooth' });
  }

  function updateIndicators() {
    const inds = document.querySelectorAll('.carousel-indicators .indicator');
    inds.forEach((ind, idx) => {
      ind.classList.toggle('active', idx === activeImageIndex);
    });
  }

  async function updateLikeUI() {
    const countData = await api(`/likes?post_id=eq.${postId}`, { method: "GET", headers: { "Prefer": "count=exact" } });
    const totalLikes = countData ? countData.length : 0;
    document.getElementById('likeCount').textContent = totalLikes;

    if (currentUser) {
      const myLike = await api(`/likes?post_id=eq.${postId}&user_id=eq.${currentUser.id}`);
      const btn = document.getElementById('likeBtn');
      if (myLike && myLike.length > 0) {
        btn.classList.add('liked');
      } else {
        btn.classList.remove('liked');
      }
    }
  }

  function setupLikeButton() {
    const btn = document.getElementById('likeBtn');
    btn.onclick = async () => {
      if (!currentUser) { showLoginAlert(); return; }
      btn.disabled = true;
      try {
        const isLiked = btn.classList.contains('liked');
        if (isLiked) {
          await api(`/likes?post_id=eq.${postId}&user_id=eq.${currentUser.id}`, { method: "DELETE" });
        } else {
          await api(`/likes`, {
            method: "POST",
            body: JSON.stringify({ post_id: postId, user_id: currentUser.id })
          });
        }
        await updateLikeUI();
      } catch(e) {
        alert('좋아요 처리 실패');
      } finally {
        btn.disabled = false;
      }
    };
  }

  function setupDeleteButton() {
    const delBtn = document.getElementById('deleteBtn');
    const overlay = document.getElementById('deleteModalOverlay');
    const cancelBtn = document.getElementById('cancelDeleteBtn');

    delBtn.onclick = () => {
      pendingDeletePostId = postId;
      overlay.classList.add('show');
    };

    cancelBtn.onclick = () => {
      overlay.classList.remove('show');
      pendingDeletePostId = null;
    };
  }

  function showLoginAlert() {
    const alertEl = document.getElementById('loginAlert');
    alertEl.classList.add('show');
    alertEl.onclick = () => window.location.href = 'login.html';
    setTimeout(() => alertEl.classList.remove('show'), 4000);
  }

  async function listenComments(pid) {
    const comments = await api(`/comments?post_id=eq.${pid}&parent_id=is.null&order=created_at.asc`);
    const listEl = document.getElementById('commentList');
    listEl.innerHTML = '';

    for (let c of comments) {
      const item = document.createElement('div');
      item.className = 'comment-item';
      
      const childData = await api(`/comments?parent_id=eq.${c.id}&order=created_at.asc`);
      const childCount = childData ? childData.length : 0;

      let avatarHTML = c.author_avatar ? `<img src="${c.author_avatar}">` : (c.author ? c.author.substring(0,1) : '?');
      let isMyComment = currentUser && (currentUser.id === c.user_id || currentUser.role === 'admin');
      let isToggleChecked = visibleReplies.has(c.id);

      item.innerHTML = `
        <div class="comment-header">
          <div class="comment-author-wrapper">
            <div class="comment-avatar">${avatarHTML}</div>
            <div class="comment-author">
              ${escapeHtml(c.author || '익명')}
              ${c.is_verified ? '<span class="verification-badge"></span>' : ''}
              ${c.user_id === currentPostAuthorId ? '<span style="font-size:10px; background:#333; color:#aaa; padding:1px 5px; border-radius:4px; margin-left:3px;">작성자</span>' : ''}
            </div>
          </div>
          ${isMyComment ? `<button class="comment-del-btn" onclick="deleteComment('${c.id}')">삭제</button>` : ''}
        </div>
        <div class="comment-content">${linkify(escapeHtml(c.content || ''))}</div>
        <div class="comment-date">${formatDate(c.created_at)}</div>
        <div class="comment-actions">
          <button class="reply-btn" onclick="toggleReplyCompose('${c.id}')">답글</button>
          ${childCount > 0 ? `<button class="replies-toggle-btn" onclick="toggleRepliesList('${c.id}')">${isToggleChecked ? '답글 숨기기' : `답글 ${childCount}개 보기`}</button>` : ''}
        </div>
        <div id="replyCompose_${c.id}" class="reply-compose" style="display:${activeInputReplies.has(c.id)?'flex':'none'};">
          <textarea class="reply-input" id="replyInput_${c.id}" placeholder="답글을 입력하세요..." rows="1"></textarea>
          <div class="reply-compose-actions">
            <button class="reply-cancel-btn" onclick="toggleReplyCompose('${c.id}')">취소</button>
            <button class="reply-submit-btn" onclick="submitReply('${c.id}')">등록</button>
          </div>
        </div>
        <div id="replyList_${c.id}" class="reply-list" style="display:${isToggleChecked?'flex':'none'};"></div>
      `;

      listEl.appendChild(item);

      if (isToggleChecked && childCount > 0) {
        renderReplies(childData, document.getElementById(`replyList_${c.id}`));
      }
    }
  }

  function renderReplies(replies, container) {
    container.innerHTML = '';
    replies.forEach(r => {
      const div = document.createElement('div');
      div.className = 'reply-item';
      let avatarHTML = r.author_avatar ? `<img src="${r.author_avatar}">` : (r.author ? r.author.substring(0,1) : '?');
      let isMyReply = currentUser && (currentUser.id === r.user_id || currentUser.role === 'admin');

      div.innerHTML = `
        <div class="comment-header">
          <div class="comment-author-wrapper">
            <div class="comment-avatar">${avatarHTML}</div>
            <div class="comment-author">
              ${escapeHtml(r.author || '익명')}
              ${r.is_verified ? '<span class="verification-badge"></span>' : ''}
              ${r.user_id === currentPostAuthorId ? '<span style="font-size:10px; background:#333; color:#aaa; padding:1px 5px; border-radius:4px; margin-left:3px;">작성자</span>' : ''}
            </div>
          </div>
          ${isMyReply ? `<button class="comment-del-btn" onclick="deleteComment('${r.id}')">삭제</button>` : ''}
        </div>
        <div class="comment-content">${linkify(escapeHtml(r.content || ''))}</div>
        <div class="comment-date">${formatDate(r.created_at)}</div>
      `;
      container.appendChild(div);
    });
  }

  window.toggleReplyCompose = function(cid) {
    if (!currentUser) { showLoginAlert(); return; }
    const box = document.getElementById(`replyCompose_${cid}`);
    const textarea = document.getElementById(`replyInput_${cid}`);
    if (box.style.display === 'none') {
      box.style.display = 'flex';
      activeInputReplies.add(cid);
      textarea.focus();
    } else {
      box.style.display = 'none';
      activeInputReplies.delete(cid);
      textarea.value = '';
    }
  };

  window.toggleRepliesList = function(cid) {
    const box = document.getElementById(`replyList_${cid}`);
    if (box.style.display === 'none') {
      visibleReplies.add(cid);
    } else {
      visibleReplies.delete(cid);
    }
    listenComments(postId);
  };

  function setupCommentSubmit() {
    const btn = document.getElementById('commentSubmitBtn');
    const input = document.getElementById('commentInput');

    btn.onclick = async () => {
      if (!currentUser) { showLoginAlert(); return; }
      const txt = input.value.trim();
      if (!txt) return;
      btn.disabled = true;

      try {
        await api('/comments', {
          method: "POST",
          body: JSON.stringify({
            post_id: postId,
            user_id: currentUser.id,
            author: currentUser.nickname,
            author_avatar: currentUser.avatar_url,
            content: txt,
            is_verified: currentUser.is_verified || false,
            created_at: new Date().toISOString()
          })
        });
        input.value = '';
        input.style.height = '48px';
        await listenComments(postId);
      } catch(e) {
        alert('댓글 등록 실패');
      } finally {
        btn.disabled = false;
      }
    };
  }

  window.submitReply = async function(parentId) {
    const input = document.getElementById(`replyInput_${parentId}`);
    const txt = input.value.trim();
    if (!txt) return;

    try {
      await api('/comments', {
        method: "POST",
        body: JSON.stringify({
          post_id: postId,
          parent_id: parentId,
          user_id: currentUser.id,
          author: currentUser.nickname,
          author_avatar: currentUser.avatar_url,
          content: txt,
          is_verified: currentUser.is_verified || false,
          created_at: new Date().toISOString()
        })
      });
      activeInputReplies.delete(parentId);
      visibleReplies.add(parentId);
      listenComments(postId);
    } catch(e) {
      alert('답글 등록 실패');
    }
  };

  window.deleteComment = async function(commentId) {
    if (!confirm('댓글을 삭제하시겠습니까?')) return;
    try {
      await api(`/comments?id=eq.${commentId}`, { method: "DELETE" });
      listenComments(postId);
    } catch (e) { alert('댓글 삭제 실패'); }
  };

  window.copyShareLink = function() {
    navigator.clipboard.writeText(window.location.href).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.classList.add('success');
      setTimeout(() => btn.classList.remove('success'), 1500);
    });
  };

  window.goHome = () => window.location.href = "index.html";
  window.showPrivacyPolicy = () => window.location.href = "privacy.html";
  window.showTerms = () => window.location.href = "policy.html";

  document.getElementById('confirmDeleteBtn').onclick = async () => {
    if (!pendingDeletePostId) return;
    try {
      await api(`/comments?post_id=eq.${pendingDeletePostId}`, { method: "DELETE" });
      await api(`/likes?post_id=eq.${pendingDeletePostId}`, { method: "DELETE" });
      await api(`/posts?id=eq.${pendingDeletePostId}`, { method: "DELETE" });
      window.location.href = 'index.html';
    } catch (e) { alert('게시물 삭제 실패'); }
  };

  function escapeHtml(unsafe) {
    return unsafe
         .replace(/&/g, "&amp;")
         .replace(/</g, "&lt;")
         .replace(/>/g, "&gt;")
         .replace(/"/g, "&quot;")
         .replace(/'/g, "&#039;");
  }

  function linkify(text) {
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    return text.replace(urlRegex, function(url) {
      return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
    });
  }

  function formatDate(isoString) {
    if (!isoString) return '';
    const date = new Date(isoString);
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    const hh = String(date.getHours()).padStart(2, '0');
    const mm = String(date.getMinutes()).padStart(2, '0');
    return `${y}.${m}.${d} ${hh}:${mm}`;
  }

  function setupTextareaAutoResize() {
    const input = document.getElementById('commentInput');
    input.addEventListener('input', function() {
      this.style.height = '48px';
      this.style.height = (this.scrollHeight) + 'px';
    });
  }

  window.openLightbox = function(url) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('imageLightbox').style.display = 'flex';
  };

  window.closeLightbox = function() {
    document.getElementById('imageLightbox').style.display = 'none';
  };
  </script>
</body>
</html>
