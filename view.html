<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시물 : Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }
    /* NProgress 커스텀 */
    #nprogress .bar { background: #fff !important; height: 2px !important; }
    #nprogress .peg { display: none !important; }
    #nprogress .spinner { display: none !important; }
    /* ─── SPLASH ─── */
    #splash {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      transition: opacity 0.45s ease;
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }
    .splash-logo {
      width: 72px; height: 72px;
      animation: splashLogoPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes splashLogoPop {
      from { opacity: 0; transform: scale(0.7); }
      to { opacity: 1; transform: scale(1); }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }
    /* ─── SIDEBAR ─── */
    .sidebar-container { width: 72px; min-width: 72px; height: 100vh; position: fixed; left: 0; top: 0; z-index: 100; }
    .sidebar-container iframe { width: 72px !important; height: 100%; border: none; }
    /* ─── MAIN WRAPPER ─── */
    .main-wrapper { margin-left: 72px; width: calc(100% - 72px); display: flex; flex-direction: column; min-height: 100vh; }
    /* ─── HEADER ─── */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
      opacity: 0;
      transform: translateY(-10px);
      animation: slideDown 0.4s ease 0.1s forwards;
    }
    @keyframes slideDown { to { opacity: 1; transform: translateY(0); } }
    .back-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: none;
      background: none;
      color: var(--t2);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .back-btn:hover { color: var(--t1); background: var(--bg3); }
    .back-btn:active { transform: scale(0.82); }
    .header-title { font-size: 16px; font-weight: 600; color: var(--t1); }
    /* ─── CONTAINER ─── */
    .container {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px;
      flex: 1;
      opacity: 0;
      transform: translateY(12px);
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
    }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
    /* ─── POST DETAIL CARD ─── */
    .post-detail-card { margin-bottom: 48px; }
    .post-detail-header {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-actions { display: flex; align-items: center; gap: 10px; }
    .author-info {
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .author-info:hover { opacity: 0.75; }
    .author-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      overflow: hidden;
      flex-shrink: 0;
      color: #666;
      transition: border-color 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .author-info:hover .author-avatar { border-color: var(--border3); transform: scale(1.05); }
    .author-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .author-details { display: flex; flex-direction: column; gap: 5px; }
    .author-name {
      font-weight: 700;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 7px;
      letter-spacing: -0.3px;
    }
    .post-timestamp { font-size: 13px; color: var(--t3); }
    .verification-badge {
      display: inline-block;
      width: 14px;
      height: 14px;
      vertical-align: middle;
      background-image: url('https://sharer.jbjb.r-e.kr/badge.svg');
      background-repeat: no-repeat;
      background-size: contain;
      background-position: center;
    }
    /* ─── LIKE BTN ─── */
    .like-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: none;
      border: 1px solid var(--border2);
      color: var(--t2);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: 22px;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .like-btn:hover { border-color: var(--pink); color: var(--pink); background: rgba(255,107,107,0.06); }
    .like-btn:active { transform: scale(0.92); }
    .like-btn.liked { border-color: var(--pink); color: var(--pink); background: rgba(255,107,107,0.08); }
    .like-heart {
      width: 16px; height: 16px;
      fill: currentColor;
      transition: transform 0.25s cubic-bezier(0.34,1.7,0.64,1);
    }
    .like-btn:hover .like-heart { transform: scale(1.3); }
    .like-btn.liked .like-heart { transform: scale(1.15); }
    /* ─── DELETE BTN ─── */
    .delete-btn {
      background: transparent;
      border: 1px solid #2a1a1a;
      color: var(--pink);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      padding: 9px 16px;
      border-radius: 22px;
      transition: background 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      font-family: inherit;
    }
    .delete-btn:hover { background: rgba(255,107,107,0.1); border-color: var(--pink); transform: scale(1.04); }
    .delete-btn:active { transform: scale(0.94); }
    /* ─── ACCESS BADGE ─── */
    .access-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 9px 16px;
      border-radius: 22px;
      font-family: inherit;
      background: transparent;
    }
    .access-badge img {
      width: 14px;
      height: 14px;
      object-fit: contain;
    }
    /* 공개 스타일 (초록색) */
    .access-badge.public {
      border: 1px solid rgba(74, 222, 128, 0.2);
      color: var(--green);
    }
    /* 비공개 스타일 (검은색/어두운 회색 조합) */
    .access-badge.private {
      border: 1px solid var(--border3);
      color: #fff;
      background: var(--bg3);
    }
    /* 일부 공개 스타일 (파란색) */
    .access-badge.link {
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #3b82f6;
    }
    /* ─── 이미지 캐러셀 ─── */
    .post-images {
      margin: 28px 0;
      position: relative;
      border-radius: var(--r3);
      overflow: hidden;
      background: #000;
    }
    .image-carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      gap: 8px;
      padding: 4px;
    }
    .image-carousel::-webkit-scrollbar { display: none; }
    .carousel-slide {
      flex: 0 0 100%;
      scroll-snap-align: start;
      position: relative;
    }
    .carousel-slide img {
      width: 100%;
      max-height: 620px;
      object-fit: contain;
      border-radius: var(--r3);
      border: 1px solid var(--border);
      display: block;
      cursor: pointer;
    }
    .carousel-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      z-index: 10;
      transition: all 0.2s;
    }
    .carousel-nav:hover {
      background: rgba(0,0,0,0.85);
      transform: translateY(-50%) scale(1.1);
    }
    .carousel-nav.prev { left: 12px; }
    .carousel-nav.next { right: 12px; }
    .carousel-indicators {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    .indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: all 0.2s;
    }
    .indicator.active {
      background: #fff;
      transform: scale(1.4);
    }
    /* ─── POST CONTENT ─── */
    .post-detail-content { padding: 16px 0 32px; }
    .post-text {
      font-size: 15px;
      line-height: 1.8;
      color: var(--t1);
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .post-text a { color: #888; text-decoration: underline; text-underline-offset: 3px; }
    .post-text a:hover { color: var(--t1); }
    /* ─── SHARE ─── */
    .share-container {
      padding: 24px 0;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .share-label { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--t3); }
    .share-box-wrapper { display: flex; gap: 10px; align-items: center; }
    .share-url-box {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border2);
      padding: 11px 16px;
      border-radius: var(--r2);
      font-size: 13px;
      color: var(--t2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .copy-btn {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--t2);
      width: 42px; height: 42px;
      border-radius: var(--r2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .copy-btn:hover { background: var(--bg4); color: var(--t1); border-color: var(--border3); }
    .copy-btn:active { transform: scale(0.88); }
    .copy-btn.success { background: rgba(74,222,80,0.12); border-color: var(--green); color: var(--green); }
    /* ─── COMMENT SECTION ─── */
    .comment-section {
      padding: 32px 0;
      opacity: 0;
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.35s forwards;
    }
    .comment-input-wrapper { display: flex; gap: 10px; margin-bottom: 32px; }
    .comment-input {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r2);
      padding: 12px 16px;
      color: var(--t1);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 48px;
      max-height: 180px;
      transition: border-color 0.2s, background 0.2s;
      line-height: 1.5;
    }
    .comment-input:focus { outline: none; border-color: var(--border3); background: var(--bg3); }
    .comment-input::placeholder { color: var(--t3); }
    .comment-submit-btn {
      background: #fff;
      border: none;
      color: #000;
      padding: 0 20px;
      border-radius: var(--r2);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
    }
    .comment-submit-btn:hover { background: #e8e8e8; transform: scale(1.04); }
    .comment-submit-btn:active { transform: scale(0.94); }
    .comment-list { display: flex; flex-direction: column; gap: 0; }
    .comment-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
    }
    .comment-item:last-child { border-bottom: none; }
    .comment-header { display: flex; justify-content: space-between; align-items: center; }
    .comment-author-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .comment-author-wrapper:hover { opacity: 0.75; }
    .comment-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      overflow: hidden;
      flex-shrink: 0;
      color: #666;
      transition: border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .comment-author-wrapper:hover .comment-avatar { border-color: var(--border3); transform: scale(1.06); }
    .comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .comment-author {
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--t1);
    }
    .comment-content {
      font-size: 14px;
      color: #ccc;
      line-height: 1.7;
      white-space: pre-wrap;
      padding-left: 2px;
    }
    .comment-content a { color: var(--t2); text-decoration: underline; text-underline-offset: 3px; }
    .comment-content a:hover { color: var(--t1); }
    .comment-date { font-size: 11px; color: var(--t3); padding-left: 2px; }
    .comment-del-btn {
      background: none;
      border: none;
      color: var(--t3);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      font-family: inherit;
      transition: color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .comment-del-btn:hover { color: var(--pink); background: rgba(255,107,107,0.08); }
    .comment-del-btn:active { transform: scale(0.88); }
    /* ─── REPLIES (대댓글) ─── */
    .comment-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 2px;
      margin-top: 2px;
    }
    .reply-btn, .replies-toggle-btn {
      background: none;
      border: none;
      color: var(--t2);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 10px;
      font-family: inherit;
      transition: color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .reply-btn:hover, .replies-toggle-btn:hover { color: var(--t1); background: var(--bg3); }
    .reply-btn:active, .replies-toggle-btn:active { transform: scale(0.92); }
    .reply-compose {
      margin-top: 10px;
      padding-left: 44px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .reply-input {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r2);
      padding: 10px 14px;
      color: var(--t1);
      font-size: 13px;
      font-family: inherit;
      resize: none;
      min-height: 42px;
      max-height: 160px;
      transition: border-color 0.2s, background 0.2s;
      line-height: 1.5;
    }
    .reply-input:focus { outline: none; border-color: var(--border3); background: var(--bg3); }
    .reply-input::placeholder { color: var(--t3); }
    .reply-compose-actions { display: flex; justify-content: flex-end; gap: 8px; }
    .reply-submit-btn, .reply-cancel-btn {
      border: 1px solid var(--border2);
      background: var(--bg3);
      color: var(--t2);
      padding: 8px 12px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .reply-submit-btn { background: #fff; color: #000; border-color: transparent; }
    .reply-submit-btn:hover { background: #e8e8e8; transform: scale(1.02); }
    .reply-cancel-btn:hover { background: var(--bg4); color: var(--t1); border-color: var(--border3); }
    .reply-submit-btn:active, .reply-cancel-btn:active { transform: scale(0.96); }
    .reply-list {
      margin-top: 10px;
      padding-left: 44px;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
    }
    .reply-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 14px 0 14px 14px;
    }
    .reply-item .comment-avatar { width: 28px; height: 28px; font-size: 12px; }
    .reply-item .comment-author { font-size: 13px; }
    .reply-item .comment-content { font-size: 13px; color: #cfcfcf; }
    .reply-item .comment-date { font-size: 10px; }
    /* ─── LOGIN ALERT ─── */
    .login-alert {
      position: fixed;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg2);
      border: 1px solid var(--border2);
      color: var(--t1);
      padding: 12px 24px;
      border-radius: 22px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      z-index: 9999;
      transition: top 0.5s cubic-bezier(0.34,1.4,0.64,1);
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(12px);
    }
    .login-alert.show { top: 24px; }
    .login-alert svg { width: 14px; height: 14px; fill: currentColor; }
    /* ─── FOOTER ─── */
    .footer { border-top: 1px solid var(--border); padding: 40px 0; margin-top: 64px; display: flex; flex-direction: column; gap: 16px; }
    .footer-links { display: flex; gap: 16px; justify-content: center; }
    .footer-links a { color: var(--t3); font-size: 12px; text-decoration: none; font-weight: 500; transition: color 0.15s; }
    .footer-links a:hover { color: var(--t2); }
    .footer-text { max-width: 520px; margin: 0 auto; text-align: center; font-size: 11px; color: #333; line-height: 1.6; }
    /* ─── MODAL (DELETE) ─── */
    .delete-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; opacity: 0; transition: opacity 0.2s ease; }
    .delete-modal.show { display: flex; opacity: 1; }
    .delete-modal-content { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--r3); padding: 28px; max-width: 360px; width: 90%; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); transform: scale(0.9); transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1); }
    .delete-modal.show .delete-modal-content { transform: scale(1); }
    .delete-modal-title { font-size: 16px; font-weight: 700; margin-bottom: 10px; color: var(--t1); }
    .delete-modal-desc { font-size: 13px; color: var(--t2); margin-bottom: 24px; line-height: 1.5; }
    .delete-modal-actions { display: flex; gap: 10px; justify-content: center; }
    .delete-modal-btn { padding: 10px 28px; border-radius: var(--r2); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1); border: none; }
    .delete-modal-btn.cancel { background: var(--bg3); color: var(--t2); border: 1px solid var(--border2); }
    .delete-modal-btn.cancel:hover { background: var(--bg4); color: var(--t1); }
    .delete-modal-btn.delete { background: rgba(255,107,107,0.15); color: var(--pink); border: 1px solid rgba(255,107,107,0.3); }
    .delete-modal-btn.delete:hover { background: rgba(255,107,107,0.25); border-color: var(--pink); }
    /* 라이트박스 (이미지 확대 보기) */
    #imageLightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 20000; backdrop-filter: blur(8px); }
    .lightbox-content { position: relative; max-width: 95vw; max-height: 95vh; display: flex; align-items: center; justify-content: center; }
    .lightbox-content img { max-width: 100%; max-height: 95vh; object-fit: contain; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
    .lightbox-close { position: absolute; top: -44px; right: 0; background: none; border: none; color: #fff; font-size: 32px; cursor: pointer; opacity: 0.7; transition: opacity 0.2s; }
    .lightbox-close:hover { opacity: 1; }
    .lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: none; color: #fff; width: 54px; height: 54px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: all 0.2s; user-select: none; }
    .lightbox-nav:hover { background: rgba(255,255,255,0.25); }
    .lightbox-nav.prev { left: -84px; }
    .lightbox-nav.next { right: -84px; }
    .lightbox-counter { position: absolute; bottom: -36px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.6); font-size: 14px; font-weight: 500; }
    @media (max-width: 900px) {
      .lightbox-nav.prev { left: 16px; background: rgba(0,0,0,0.5); }
      .lightbox-nav.next { right: 16px; background: rgba(0,0,0,0.5); }
      .lightbox-close { right: 16px; top: 16px; }
    }
    @media (max-width: 768px) {
      .sidebar-container { display: none; }
      .main-wrapper { margin-left: 0; width: 100%; }
      .container { padding: 20px 16px; }
      .post-detail-header { padding: 16px 0; }
      .author-avatar { width: 44px; height: 44px; font-size: 18px; }
      .author-name { font-size: 16px; }
      .like-btn, .delete-btn, .access-badge { padding: 8px 14px; font-size: 12px; }
    }
  </style>
</head>
<body>

  <div id="splash">
    <svg class="splash-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="48" fill="#111" stroke="#222" stroke-width="4"/>
      <path d="M35 50 L45 60 L65 40" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <div class="sidebar-container">
    <iframe id="sidebarFrame" src="sidebar.html"></iframe>
  </div>

  <div class="main-wrapper">
    <div class="header">
      <button class="back-btn" onclick="goHome()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M19 12H5M5 12l7-7M5 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="header-title">게시물</div>
    </div>

    <div class="container">
      <div id="postContent"></div>

      <div class="comment-section">
        <div class="comment-input-wrapper">
          <textarea id="commentInput" class="comment-input" placeholder="댓글을 입력하세요 (최대 500자)" maxlength="500"></textarea>
          <button class="comment-submit-btn" onclick="addComment()">업로드</button>
        </div>
        <div id="commentList" class="comment-list"></div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-links">
        <a href="#" onclick="showPrivacyPolicy(); return false;">개인정보처리방침</a>
        <a href="#" onclick="showTerms(); return false;">이용약관</a>
        <a href="mailto:alexeom97@outlook.com">문의하기</a>
      </div>
      <div class="footer-text">본 서비스는 대한민국의 중2 개발자 1인이 만든 프로젝트입니다 모든 소스 코드 및 파일의 출처는 전적으로 개발자에게 있음을 알립니다.</div>
    </div>
  </div>

  <div class="delete-modal" id="deleteModal">
    <div class="delete-modal-content">
      <div class="delete-modal-title">게시물 삭제</div>
      <div class="delete-modal-desc">정말로 이 게시물을 삭제하시겠습니까? 삭제된 데이터는 복구할 수 없습니다.</div>
      <div class="delete-modal-actions">
        <button class="delete-modal-btn cancel" onclick="closeDeleteModal()">취소</button>
        <button class="delete-modal-btn delete" id="confirmDeleteBtn">삭제</button>
      </div>
    </div>
  </div>

  <div id="imageLightbox">
    <div class="lightbox-content">
      <button class="lightbox-close" onclick="closeLightbox()">×</button>
      <button class="lightbox-nav prev" onclick="prevLightboxImage()">‹</button>
      <img id="lightboxImage" src="" alt="확대 이미지">
      <button class="lightbox-nav next" onclick="nextLightboxImage()">›</button>
      <div class="lightbox-counter" id="lightboxCounter">1 / 1</div>
    </div>
  </div>

  <div class="login-alert" id="loginAlert">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h-2v-2h4v8zm0-10h-2V5h2v2z"/></svg>
    <span>로그인이 필요한 서비스입니다. 여기를 눌러 로그인하세요.</span>
  </div>

  <script src="markdown.js"></script>
  <script>
    // ─── NPROGRESS 설정 ───
    NProgress.configure({ minimum: 0.08, trickleSpeed: 200, showSpinner: false });
    document.addEventListener('click', function(e) {
      const link = e.target.closest('a');
      if (link && link.href && !link.target && !link.hasAttribute('download')) {
        NProgress.start();
      }
    });

    // ─── SPLASH ───
    (function () {
      window.addEventListener('load', () => {
        const splash = document.getElementById('splash');
        if (splash) {
          setTimeout(() => {
            splash.classList.add('fade-out');
            setTimeout(() => splash.remove(), 450);
          }, 300);
        }
      });
    })();

    // ─── 코어 API 통신 ───
    const API_URL = "https://clm-supa.jbjb.r-e.kr/rest/v1";
    const API_KEY = "내용생략";

    async function api(path, options = {}) {
      const url = `${API_URL}${path}`;
      const headers = {
        "apikey": API_KEY,
        "Authorization": `Bearer ${API_KEY}`,
        "Content-Type": "application/json",
        ...options.headers
      };
      const res = await fetch(url, { ...options, headers });
      if (!res.ok) {
        const text = await res.text();
        throw new Error(`API Error: ${res.status} - ${text}`);
      }
      if (res.status === 204) return null;
      return await res.json();
    }

    // ─── 글로벌 상태 관리 ───
    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');
    let currentUser = null;
    let currentPost = null;
    let openReplyThreads = new Set(); 
    let repliesByParent = {}; 
    let profileImages = {}; 
    let currentLightboxImages = [];
    let currentLightboxIndex = 0;
    let pendingDeletePostId = null;

    window.openLightbox = function(startIndex, imageCsvString) {
      if (!imageCsvString) return;
      currentLightboxImages = imageCsvString.split(',').map(u => u.trim()).filter(Boolean);
      currentLightboxIndex = startIndex;
      const lightbox = document.getElementById('imageLightbox');
      const imgEl = document.getElementById('lightboxImage');
      const counter = document.getElementById('lightboxCounter');
      imgEl.src = currentLightboxImages[currentLightboxIndex];
      counter.textContent = `${currentLightboxIndex + 1} / ${currentLightboxImages.length}`;
      lightbox.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    };

    window.closeLightbox = function() {
      const lightbox = document.getElementById('imageLightbox');
      lightbox.style.display = 'none';
      document.body.style.overflow = '';
    };

    window.prevLightboxImage = function() {
      if (currentLightboxImages.length <= 1) return;
      currentLightboxIndex = (currentLightboxIndex - 1 + currentLightboxImages.length) % currentLightboxImages.length;
      const imgEl = document.getElementById('lightboxImage');
      const counter = document.getElementById('lightboxCounter');
      imgEl.src = currentLightboxImages[currentLightboxIndex];
      counter.textContent = `${currentLightboxIndex + 1} / ${currentLightboxImages.length}`;
    };

    window.nextLightboxImage = function() {
      if (currentLightboxImages.length <= 1) return;
      currentLightboxIndex = (currentLightboxIndex + 1) % currentLightboxImages.length;
      const imgEl = document.getElementById('lightboxImage');
      const counter = document.getElementById('lightboxCounter');
      imgEl.src = currentLightboxImages[currentLightboxIndex];
      counter.textContent = `${currentLightboxIndex + 1} / ${currentLightboxImages.length}`;
    };

    document.addEventListener('keydown', function(e) {
      if (e.key === "Escape") {
        const lightbox = document.getElementById('imageLightbox');
        if (lightbox.style.display === 'flex') {
          closeLightbox();
        }
      }
    });

    async function loadPost(postId) {
      try {
        const posts = await api(`/posts?id=eq.${postId}&select=*`);
        if (!posts?.length) {
          showError('게시물을 찾을 수 없습니다.');
          return;
        }
        const post = posts[0];
        const savedUser = localStorage.getItem('snsUser');
        const activeUser = savedUser ? JSON.parse(savedUser) : null;
        
        if (post.access === 'private') {
          if (!activeUser || String(activeUser.id) !== String(post.author_id)) {
            showError('비공개 게시물입니다. 작성자만 확인할 수 있습니다.');
            return;
          }
        }
        
        currentPost = post;
        const authorImg = await getProfileImage(post.author_id);
        if (authorImg) profileImages[post.author_id] = authorImg;
        
        const contentDiv = document.getElementById('postContent');
        const timeStr = new Date(post.created_at).toLocaleString('ko-KR', { year:'numeric', month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
        const isMine = activeUser && String(activeUser.id) === String(post.author_id);
        const deleteBtnHtml = isMine ? `<button class="delete-btn" onclick="openDeleteModal('${post.id}')">삭제</button>` : '';
        
        // 공개 범위 분기 처리 구조 설정
        let accessBadgeHtml = '';
        if (post.access === 'public' || !post.access) {
          accessBadgeHtml = `<div class="access-badge public"><img src="earth.svg" alt="공개">공개</div>`;
        } else if (post.access === 'private') {
          accessBadgeHtml = `<div class="access-badge private"><img src="service.svg" alt="비공개">비공개</div>`;
        } else if (post.access === 'link') {
          accessBadgeHtml = `<div class="access-badge link"><img src="link.svg" alt="일부 공개">일부 공개</div>`;
        }

        let avatarContent = post.author ? post.author[0].toUpperCase() : '?';
        if (profileImages[post.author_id]) {
          avatarContent = `<img src="${profileImages[post.author_id]}" alt="${escapeHtml(post.author)}">`;
        }
        
        let imagesHtml = '';
        if (post.image_url) {
          const imgs = post.image_url.split(',').map(u => u.trim()).filter(Boolean);
          if (imgs.length > 0) {
            let slides = '';
            let dots = '';
            imgs.forEach((img, idx) => {
              slides += `<div class="carousel-slide"><img src="${img}" alt="첨부이미지" onclick="openLightbox(${idx}, '${escapeHtml(post.image_url)}')"></div>`;
              dots += `<div class="indicator ${idx === 0 ? 'active' : ''}" onclick="setCarouselSlide(this, ${idx})"></div>`;
            });
            const navs = imgs.length > 1 ? `
              <button class="carousel-nav prev" onclick="moveCarousel(this, -1)">‹</button>
              <button class="carousel-nav next" onclick="moveCarousel(this, 1)">›</button>
            ` : '';
            const indicators = imgs.length > 1 ? `<div class="carousel-indicators">${dots}</div>` : '';
            imagesHtml = `
              <div class="post-images">
                <div class="image-carousel" onscroll="handleCarouselScroll(this)">${slides}</div>
                ${navs}
                ${indicators}
              </div>
            `;
          }
        }
        
        const isVerified = ["JB777", "진정오"].includes(post.author);
        
        contentDiv.innerHTML = `
          <div class="post-detail-card">
            <div class="post-detail-header">
              <div class="author-info" onclick="goToProfile('${post.author_id}', '${escapeHtml(post.author)}')">
                <div class="author-avatar">${avatarContent}</div>
                <div class="author-details">
                  <div class="author-name">
                    ${escapeHtml(post.author)}
                    ${isVerified ? '<span class="verification-badge"></span>' : ''}
                  </div>
                  <div class="post-timestamp">${timeStr}</div>
                </div>
              </div>
              <div class="header-actions">
                ${accessBadgeHtml}
                <button class="like-btn" id="likeBtn" onclick="toggleLike()">
                  <svg class="like-heart" viewBox="0 0 2300 2300" xmlns="http://www.w3.org/2000/svg">
                    <path fill="currentColor" d="M 2169.75708 1273.707397 C 2082.986328 1435.051758 1959.814697 1592.116455 1800.239746 1744.902832 C 1640.756348 1897.699951 1451.88208 2043.705688 1233.619141 2182.920898 C 1220.223145 2191.470215 1206.115234 2198.850586 1191.452637 2204.979248 C 1165.430908 2218.340332 1135.539307 2218.420166 1109.436768 2205.199463 C 1094.673828 2199.110596 1080.472656 2191.730225 1066.974854 2183.1604 C 848.711914 2043.945557 659.83783 1897.940063 500.354248 1745.142456 C 340.779541 1592.356567 217.60791 1435.291382 130.837158 1273.947266 C 44.066406 1112.602783 0.680908 952.128418 0.680908 792.524414 C 0.680908 576.438965 69.414795 397.681641 206.882812 256.252441 C 344.350586 114.823242 516.536133 44.108398 723.438965 44.108398 C 837.288574 44.108398 945.719727 71.979004 1048.732422 127.720703 C 1100.238281 155.591309 1147.810547 192.051514 1191.452637 237.101318 C 1235.094727 192.051514 1282.666992 155.591309 1334.172852 127.720703 C 1437.185547 71.979004 1545.616211 44.108398 1659.466797 44.108398 C 1866.368652 44.108398 2038.554688 114.823242 2176.022461 256.252441 C 2313.490234 397.681641 2382.224121 576.438965 2382.224121 792.524414 C 2382.224121 952.128418 2338.438477 1112.602783 2169.75708 1273.707397 Z"/>
                  </svg>
                  <span id="likeCount">0</span>
                </button>
                ${deleteBtnHtml}
              </div>
            </div>
            ${imagesHtml}
            <div class="post-detail-content">
              <div class="post-text">${parseMarkdown(post.content)}</div>
            </div>
            <div class="share-container">
              <div class="share-label">공유 링크</div>
              <div class="share-box-wrapper">
                <div class="share-url-box" id="shareUrl">${window.location.href}</div>
                <button class="copy-btn" id="copyBtn" onclick="copyShareLink()">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        `;
        
        loadLikes(postId);
      } catch (e) {
        console.error(e);
        showError('게시물을 불러오는 중 오류가 발생했습니다.');
      }
    }

    function showError(msg) {
      document.getElementById('postContent').innerHTML = `
        <div style="text-align:center; padding:64px 16px; color:var(--t2);">
          <p style="font-size:15px; margin-bottom:24px; line-height:1.6;">${escapeHtml(msg)}</p>
          <button onclick="goHome()" style="background:#fff; color:#000; border:none; padding:12px 28px; border-radius:var(--r2); font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; transition:background 0.15s;" onmouseover="this.style.background='#e8e8e8'" onmouseout="this.style.background='#fff'">돌아가기</button>
        </div>
      `;
    }

    window.openDeleteModal = function(id) {
      pendingDeletePostId = id;
      document.getElementById('deleteModal').classList.add('show');
      document.body.style.overflow = 'hidden';
    };

    window.closeDeleteModal = function() {
      document.getElementById('deleteModal').classList.remove('show');
      document.body.style.overflow = '';
      pendingDeletePostId = null;
    };

    window.goToProfile = function(userId, nickname) {
      window.location.href = `user.html?id=${userId}&nickname=${encodeURIComponent(nickname)}`;
    };

    window.addComment = async function() {
      const input = document.getElementById('commentInput');
      const text = input.value.trim();
      if (!currentUser) return showLoginAlert();
      if (!text || !currentPost) return;
      try {
        await api("/comments", {
          method: "POST",
          body: JSON.stringify({
            post_id: postId,
            user_id: currentUser.id,
            user_name: currentUser.nickname,
            text: text,
            parent_id: null,
            created_at: new Date().toISOString()
          })
        });
        input.value = '';
        input.style.height = '48px';
        listenComments(postId);
      } catch (e) { alert('댓글 작성 실패'); }
    };

    window.moveCarousel = function(btn, dir) {
      const container = btn.closest('.post-images');
      const carousel = container.querySelector('.image-carousel');
      const slideWidth = carousel.clientWidth;
      carousel.scrollBy({ left: slideWidth * dir, behavior: 'smooth' });
    };

    window.setCarouselSlide = function(dot, idx) {
      const container = dot.closest('.post-images');
      const carousel = container.querySelector('.image-carousel');
      const slideWidth = carousel.clientWidth;
      carousel.scrollTo({ left: slideWidth * idx, behavior: 'smooth' });
    };

    window.handleCarouselScroll = function(carousel) {
      const container = carousel.closest('.post-images');
      const scrollLeft = carousel.scrollLeft;
      const slideWidth = carousel.clientWidth;
      const activeIndex = Math.round(scrollLeft / slideWidth);
      const dots = container.querySelectorAll('.indicator');
      dots.forEach((dot, idx) => {
        dot.classList.toggle('active', idx === activeIndex);
      });
    };

    async function loadLikes(postId) {
      try {
        const likes = await api(`/likes?post_id=eq.${postId}&select=user_id`);
        updateLikeUI(likes || []);
      } catch (e) { console.error('loadLikes 오류:', e); }
    }

    function updateLikeUI(likes) {
      const btn = document.getElementById('likeBtn');
      const countEl = document.getElementById('likeCount');
      if (!btn || !countEl) return;
      countEl.textContent = likes.length;
      if (currentUser && likes.some(l => l.user_id === currentUser.id)) {
        btn.classList.add('liked');
      } else {
        btn.classList.remove('liked');
      }
    }

    window.toggleLike = async function() {
      if (!currentUser) return showLoginAlert();
      if (!currentPost) return;
      const btn = document.getElementById('likeBtn');
      const countEl = document.getElementById('likeCount');
      try {
        const [likeRecords, likeCountResult] = await Promise.all([
          api(`/likes?post_id=eq.${postId}&user_id=eq.${currentUser.id}&select=id`),
          api(`/likes?post_id=eq.${postId}&select=count`)
        ]);
        const currentlyLiked = likeRecords?.length > 0;
        const currentServerCount = Math.max(0, likeCountResult?.[0]?.count || 0);
        const uiLiked = btn.classList.contains('liked');
        const uiCount = parseInt(countEl.textContent, 10) || 0;
        
        if (uiLiked !== currentlyLiked || uiCount !== currentServerCount) {
          btn.classList.toggle('liked', currentlyLiked);
          countEl.textContent = currentServerCount;
        }
        
        if (currentlyLiked) {
          if (likeRecords?.[0]?.id) {
            await api(`/likes?id=eq.${likeRecords[0].id}`, { method: "DELETE" });
          }
          btn.classList.remove('liked');
          countEl.textContent = currentServerCount - 1;
        } else {
          await api("/likes", {
            method: "POST",
            body: JSON.stringify({ post_id: postId, user_id: currentUser.id })
          });
          btn.classList.add('liked');
          countEl.textContent = currentServerCount + 1;
        }
      } catch (e) { console.error('좋아요 토글 실패:', e); }
    };

    async function listenComments(postId) {
      try {
        const comments = await api(`/comments?post_id=eq.${postId}&select=*`);
        comments.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
        
        const userIds = [...new Set(comments.map(c => c.user_id))];
        await Promise.all(userIds.map(async (id) => {
          if (!profileImages[id]) {
            const img = await getProfileImage(id);
            if (img) profileImages[id] = img;
          }
        }));
        
        repliesByParent = {};
        const roots = [];
        comments.forEach(c => {
          if (!c.parent_id) {
            roots.push(c);
          } else {
            const parentId = c.parent_id;
            if (!repliesByParent[parentId]) repliesByParent[parentId] = [];
            repliesByParent[parentId].push(c);
          }
        });
        Object.values(repliesByParent).forEach(arr => {
          arr.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
        });
        
        const listDiv = document.getElementById('commentList');
        listDiv.innerHTML = '';
        if (roots.length === 0) {
          listDiv.innerHTML = `<div style="text-align:center; padding:32px 0; color:var(--t3); font-size:13px;">첫 댓글을 남겨보세요.</div>`;
          return;
        }
        roots.forEach(r => {
          const item = document.createElement('div');
          item.className = 'comment-item';
          item.innerHTML = renderOneComment(r, { showReplyButton: true });
          
          const replyListContainer = document.createElement('div');
          replyListContainer.className = 'reply-list';
          replyListContainer.id = `replyList-${r.id}`;
          if (!openReplyThreads.has(r.id)) replyListContainer.style.display = 'none';
          
          const childs = repliesByParent[r.id] || [];
          childs.forEach(ch => {
            const subItem = document.createElement('div');
            subItem.className = 'reply-item';
            subItem.innerHTML = renderOneComment(ch, { showReplyButton: false });
            replyListContainer.appendChild(subItem);
          });
          
          item.appendChild(replyListContainer);
          listDiv.appendChild(item);
        });
      } catch (e) { console.error('댓글 로드 실패:', e); }
    }

    function renderAvatar(userName, userId) {
      let avatar = userName ? userName[0].toUpperCase() : '?';
      if (profileImages[userId]) {
        const url = profileImages[userId].includes('?') ? `${profileImages[userId]}&v=${Date.now()}` : `${profileImages[userId]}?v=${Date.now()}`;
        avatar = `<img src="${url}" alt="${escapeHtml(userName)}">`;
      }
      return avatar;
    }

    function renderOneComment(c, { showReplyButton }) {
      const isMine = currentUser?.id === c.user_id;
      const date = new Date(c.created_at).toLocaleString('ko-KR', { year: 'numeric', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      const isVerified = ["JB777", "진정오"].includes(c.user_name);
      const avatarContent = renderAvatar(c.user_name, c.user_id);
      const linkedText = parseMarkdown(c.text);
      const replyCount = (repliesByParent[c.id] || []).length;
      const hasReplies = replyCount > 0;
      const isOpen = openReplyThreads.has(c.id);
      
      const replyBtnHtml = showReplyButton ? `<button class="reply-btn" onclick="openReplyComposer('${c.id}')">답글 달기</button>` : '';
      const toggleBtnHtml = hasReplies ? `<button class="replies-toggle-btn" id="toggleReplies-${c.id}" data-count="${replyCount}" onclick="toggleReplies('${c.id}')">${isOpen ? '답글 접기' : `답글 ${replyCount}개 보기`}</button>` : '';
      const replyComposeHtml = showReplyButton ? `
        <div class="reply-compose" id="replyCompose-${c.id}" style="display:none;">
          <textarea id="replyInput-${c.id}" class="reply-input" placeholder="답글을 입력하세요 (최대 500자)" maxlength="500"></textarea>
          <div class="reply-compose-actions">
            <button class="reply-cancel-btn" onclick="cancelReply('${c.id}')">취소</button>
            <button class="reply-submit-btn" onclick="submitReply('${c.id}')">답글 등록</button>
          </div>
        </div>
      ` : '';
      const delBtnHtml = isMine ? `<button class="comment-del-btn" onclick="deleteComment('${c.id}')">삭제</button>` : '';
      
      return `
        <div class="comment-header">
          <div class="comment-author-wrapper" onclick="goToProfile('${c.user_id}', '${escapeHtml(c.user_name)}')">
            <div class="comment-avatar">${avatarContent}</div>
            <span class="comment-author">
              ${escapeHtml(c.user_name)}
              ${isVerified ? '<span class="verification-badge"></span>' : ''}
            </span>
          </div>
          ${delBtnHtml}
        </div>
        <div class="comment-content">${linkedText}</div>
        <div class="comment-date">${date}</div>
        <div class="comment-actions">
          ${replyBtnHtml}
          ${toggleBtnHtml}
        </div>
        ${replyComposeHtml}
      `;
    }

    window.openReplyComposer = function(commentId) {
      if (!currentUser) return showLoginAlert();
      const el = document.getElementById(`replyCompose-${commentId}`);
      if (el) el.style.display = el.style.display === 'none' ? 'flex' : 'none';
    };

    window.cancelReply = function(commentId) {
      const el = document.getElementById(`replyCompose-${commentId}`);
      if (el) el.style.display = 'none';
      const ta = document.getElementById(`replyInput-${commentId}`);
      if (ta) ta.value = '';
    };

    window.submitReply = async function(commentId) {
      if (!currentUser) return showLoginAlert();
      const ta = document.getElementById(`replyInput-${commentId}`);
      const text = ta?.value.trim();
      if (!text) return;
      try {
        await api("/comments", {
          method: "POST",
          body: JSON.stringify({
            post_id: postId,
            user_id: currentUser.id,
            user_name: currentUser.nickname,
            text: text,
            parent_id: commentId,
            created_at: new Date().toISOString()
          })
        });
        openReplyThreads.add(commentId);
        listenComments(postId);
      } catch (e) { alert('답글 작성 실패'); }
    };

    window.toggleReplies = function(commentId) {
      const list = document.getElementById(`replyList-${commentId}`);
      const btn = document.getElementById(`toggleReplies-${commentId}`);
      if (!list || !btn) return;
      const count = btn.getAttribute('data-count') || '0';
      if (list.style.display === 'none') {
        list.style.display = 'flex';
        btn.textContent = '답글 접기';
        openReplyThreads.add(commentId);
      } else {
        list.style.display = 'none';
        btn.textContent = `답글 ${count}개 보기`;
        openReplyThreads.delete(commentId);
      }
    };

    window.deleteComment = async function(commentId) {
      if (!confirm('댓글을 삭제하시겠습니까?')) return;
      try {
        await api(`/comments?id=eq.${commentId}`, { method: "DELETE" });
        listenComments(postId);
      } catch (e) { alert('댓글 삭제 실패'); }
    };

    window.copyShareLink = function() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.classList.add('success');
        setTimeout(() => btn.classList.remove('success'), 1500);
      });
    };

    window.goHome = () => window.location.href = "index.html";
    window.showPrivacyPolicy = () => window.location.href = "privacy.html";
    window.showTerms = () => window.location.href = "policy.html";

    document.getElementById('confirmDeleteBtn').onclick = async () => {
      if (!pendingDeletePostId) return;
      try {
        await api(`/comments?post_id=eq.${pendingDeletePostId}`, { method: "DELETE" });
        await api(`/likes?post_id=eq.${pendingDeletePostId}`, { method: "DELETE" });
        await api(`/posts?id=eq.${pendingDeletePostId}`, { method: "DELETE" });
        window.location.href = 'index.html';
      } catch (e) { alert('게시물 삭제 실패'); }
    };

    function escapeHtml(unsafe) {
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function parseMarkdown(text) {
      if (!text) return '';
      let html = escapeHtml(text);
      html = html.replace(/(https?:\/\/[^\s]+)/gi, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
      return html;
    }

    async function getCommentById(commentId) {
      if (!commentId) return null;
      try {
        const rows = await api(`/comments?id=eq.${commentId}&select=user_id,user_name`);
        return rows?.[0] || null;
      } catch (e) { return null; }
    }

    function showLoginAlert() {
      const alert = document.getElementById('loginAlert');
      alert.classList.add('show');
      setTimeout(() => alert.classList.remove('show'), 3000);
      alert.onclick = () => window.location.href = 'login.html';
    }

    function initCurrentUser() {
      const saved = localStorage.getItem('snsUser');
      if (saved) {
        currentUser = JSON.parse(saved);
        updateSidebar();
      }
    }

    function updateSidebar() {
      const iframe = document.getElementById('sidebarFrame');
      if (iframe?.contentWindow) iframe.contentWindow.postMessage({ type: 'updateUser', user: currentUser }, '*');
    }

    function updateSidebarMode() {
      const iframe = document.getElementById('sidebarFrame');
      const narrow = window.innerWidth <= 768;
      if (iframe?.contentWindow) iframe.contentWindow.postMessage({ type: 'setNarrowMode', narrow }, '*');
    }

    window.addEventListener('message', (event) => {
      const { type, page } = event.data || {};
      if (type === 'navigate') {
        if (page === 'home') location.href = 'index.html';
        if (page === 'explore') location.href = 'explore.html';
      }
      if (type === 'logout') {
        localStorage.removeItem('snsUser');
        currentUser = null;
        location.href = 'index.html';
      }
      if (type === 'requestUserInfo') updateSidebar();
    });

    window.onSharerProfileLogout = function () {
      localStorage.removeItem('snsUser');
      currentUser = null;
      location.href = 'index.html';
    };

    document.getElementById('commentInput')?.addEventListener('focus', function() {
      if (!currentUser) {
        this.blur();
        showLoginAlert();
      }
    });

    initCurrentUser();
    updateSidebarMode();
    window.addEventListener('resize', updateSidebarMode);

    if (!postId) {
      showError('게시물 ID가 없습니다.');
    } else {
      loadPost(postId);
      listenComments(postId);
    }

    async function getProfileImage(userId) {
      if (!userId) return null;
      try {
        const users = await api(`/users?id=eq.${userId}&select=avatar_url`);
        return users?.[0]?.avatar_url || null;
      } catch (e) { return null; }
    }

    const tx = document.getElementById('commentInput');
    if (tx) {
      tx.addEventListener('input', function() {
        this.style.height = '48px';
        this.style.height = Math.min(this.scrollHeight, 180) + 'px';
      });
    }
  </script>
</body>
</html>
