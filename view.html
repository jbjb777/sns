<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시물 - Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.png">
  <meta name="description" content="Sharer 게시물">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --text1: #fff;
      --text2: #888;
      --text3: #555;
      --text4: #333;
      --accent: #fff;
      --pink: #ff4d7e;
      --pink-dim: rgba(255,77,126,0.12);
      --green: #4ade80;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text1);
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ─── SIDEBAR ─── */
    .sidebar-container {
      width: 72px;
      min-width: 72px;
      height: 100vh;
      position: fixed;
      left: 0; top: 0;
      z-index: 100;
    }
    .sidebar-container iframe {
      width: 72px !important;
      height: 100%;
      border: none;
    }

    .main-wrapper {
      margin-left: 72px;
      width: calc(100% - 72px);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--text2);
      font-size: 28px;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: var(--r2);
      transition: all 0.2s;
    }
    .back-btn:hover {
      color: var(--text1);
      background: rgba(255,255,255,0.06);
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    /* ─── MAIN CONTENT ─── */
    .main-content {
      flex: 1;
      padding: 40px 28px;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
    }

    .post-detail-card {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r4);
      overflow: hidden;
      animation: contentReveal 0.5s cubic-bezier(0.4,0,0.2,1) forwards;
    }

    @keyframes contentReveal {
      to { opacity: 1; transform: translateY(0); }
    }

    .post-detail-header {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .author-info {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .author-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      flex-shrink: 0;
      overflow: hidden;
      border: 1px solid var(--border2);
    }
    .author-avatar img {
      width: 100%; height: 100%; object-fit: cover;
    }

    .author-name {
      font-weight: 600;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .post-timestamp {
      font-size: 13px;
      color: var(--text3);
    }

    .verification-badge {
      display: inline-block;
      width: 16px;
      height: 16px;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:%23ff00ff;stop-opacity:1" /><stop offset="100%" style="stop-color:%23ff0066;stop-opacity:1" /></linearGradient></defs><path fill="url(%23grad)" d="M512 0 L1024 295 L1024 729 L512 1024 L0 729 L0 295 Z"/><path fill="white" d="M256 512 L384 640 L768 256 L832 320 L384 768 L192 576 Z"/></svg>');
      background-size: contain;
    }

    .post-image {
      width: 100%;
      max-height: 620px;
      object-fit: cover;
      border-bottom: 1px solid var(--border);
    }

    .post-content {
      padding: 28px 24px;
      font-size: 15.5px;
      line-height: 1.75;
      white-space: pre-wrap;
      color: var(--text1);
    }

    /* Like Button */
    .like-button {
      background: none;
      border: none;
      padding: 8px 16px;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text3);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .like-button:hover { background: var(--pink-dim); color: var(--pink); }
    .like-button.liked { color: var(--pink); }

    .like-heart {
      width: 22px;
      height: 22px;
      fill: currentColor;
      transition: transform 0.25s cubic-bezier(0.34,1.7,0.64,1);
    }
    .like-button.liked .like-heart { transform: scale(1.15); }

    .delete-btn {
      background: transparent;
      border: 1px solid rgba(255,77,126,0.3);
      color: var(--pink);
      padding: 8px 18px;
      border-radius: 9999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .delete-btn:hover {
      background: var(--pink-dim);
      border-color: var(--pink);
    }

    /* Share */
    .share-section {
      padding: 20px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg3);
    }

    .share-box {
      display: flex;
      background: var(--bg4);
      border: 1px solid var(--border2);
      border-radius: var(--r2);
      overflow: hidden;
    }
    .share-url {
      flex: 1;
      padding: 14px 16px;
      font-size: 14px;
      color: var(--text2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .copy-btn {
      background: var(--text1);
      color: #000;
      border: none;
      padding: 0 20px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover { background: #ddd; }

    /* Comments */
    .comment-section {
      padding: 24px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
    }

    .comment-input-wrapper {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
    }

    .comment-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--r2);
      padding: 14px 18px;
      color: var(--text1);
      font-size: 15px;
      resize: vertical;
      min-height: 52px;
      outline: none;
      transition: border-color 0.2s;
    }
    .comment-input:focus {
      border-color: var(--pink);
    }

    .comment-submit-btn {
      padding: 0 28px;
      background: var(--text1);
      color: #000;
      border: none;
      border-radius: var(--r2);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .comment-submit-btn:hover { background: #ddd; }

    .comment-list {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .comment-item {
      display: flex;
      gap: 14px;
    }

    .comment-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--bg3);
      flex-shrink: 0;
      overflow: hidden;
      border: 1px solid var(--border2);
    }

    .comment-body {
      flex: 1;
    }

    .comment-author {
      font-weight: 600;
      font-size: 14.5px;
      margin-bottom: 4px;
    }

    .comment-text {
      font-size: 15px;
      line-height: 1.65;
      color: var(--text1);
    }

    .comment-time {
      font-size: 12px;
      color: var(--text3);
      margin-top: 6px;
    }

    .no-comments {
      text-align: center;
      color: var(--text3);
      padding: 60px 20px;
      font-size: 15px;
    }

    /* Footer */
    .footer {
      border-top: 1px solid var(--border);
      padding: 28px;
      text-align: center;
      color: var(--text3);
      font-size: 12px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar-container { width: 80px; min-width: 80px; }
      .sidebar-container iframe { width: 80px !important; }
      .main-wrapper { margin-left: 80px; width: calc(100% - 80px); }
      .main-content { padding: 20px 16px; }
    }
  </style>
</head>
<body>
  <div class="sidebar-container">
    <iframe src="sidebar.html" id="sidebarFrame" width="72" height="100%" frameborder="0"></iframe>
  </div>

  <div class="main-wrapper">
    <div class="header">
      <button class="back-btn" onclick="goHome()">←</button>
      <div class="header-title">게시물</div>
    </div>

    <div class="main-content">
      <div id="postContent">
        <!-- JS에서 채워짐 -->
      </div>

      <div class="comment-section">
        <div class="comment-input-wrapper">
          <textarea id="commentInput" class="comment-input" placeholder="댓글을 입력하세요..."></textarea>
          <button class="comment-submit-btn" onclick="addComment()">게시</button>
        </div>
        <div id="commentList" class="comment-list"></div>
      </div>
    </div>

    <div class="footer">
      <div>© 2025 ㋡꧁정빈777꧂ Sharer. All rights reserved.</div>
    </div>
  </div>

<script>
  const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";

  async function api(endpoint, options = {}) {
    const url = API_BASE + endpoint;
    const res = await fetch(url, {
      ...options,
      headers: { "Content-Type": "application/json", ...(options.headers || {}) }
    });
    if (!res.ok) throw new Error(`API Error ${res.status}`);
    if (res.status === 204) return null;
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  let currentUser = JSON.parse(localStorage.getItem('snsUser')) || null;
  let currentPost = null;
  const postId = new URLSearchParams(window.location.search).get('id');

  function updateSidebar() {
    const iframe = document.getElementById('sidebarFrame');
    if (iframe?.contentWindow) {
      iframe.contentWindow.postMessage({ type: 'updateUser', user: currentUser }, '*');
    }
  }

  async function loadPost() {
    if (!postId) return;

    try {
      const posts = await api(`/posts?id=eq.${postId}&select=*`);
      if (!posts?.length) {
        document.getElementById('postContent').innerHTML = `<div style="text-align:center;padding:100px 20px;color:#888;">게시물을 찾을 수 없습니다.</div>`;
        return;
      }

      currentPost = posts[0];
      const authorProfile = await api(`/users?id=eq.${currentPost.author_id}&select=profile_image`);
      currentPost.author_profile_image = authorProfile?.[0]?.profile_image || null;

      renderPost();
      loadComments();
      loadLikes();
    } catch (e) {
      console.error(e);
    }
  }

  function renderPost() {
    const container = document.getElementById('postContent');
    const isVerified = ["JB777", "진정오"].includes(currentPost.author);
    const canDelete = currentUser && (currentUser.nickname === "JB777" || currentUser.id === currentPost.author_id);

    const avatarHTML = currentPost.author_profile_image 
      ? `<img src="${currentPost.author_profile_image}" alt="">`
      : `<span>${currentPost.author?.[0]?.toUpperCase() || '?'}</span>`;

    container.innerHTML = `
      <div class="post-detail-card">
        <div class="post-detail-header">
          <div class="author-info" onclick="goToProfile('${currentPost.author_id}', '${encodeURIComponent(currentPost.author)}')">
            <div class="author-avatar">${avatarHTML}</div>
            <div>
              <div class="author-name">
                ${currentPost.author}
                ${isVerified ? '<span class="verification-badge"></span>' : ''}
              </div>
              <div class="post-timestamp">${new Date(currentPost.created_at).toLocaleString('ko-KR')}</div>
            </div>
          </div>
          <div style="display:flex;gap:10px;">
            <button class="like-button" id="likeBtn" onclick="toggleLike()">
              <svg class="like-heart" viewBox="0 0 2300 2300" xmlns="http://www.w3.org/2000/svg">
                <path d="M2169.757 1273.707 C... (same heart path as home)"/>
              </svg>
              <span id="likeCount">0</span>
            </button>
            ${canDelete ? `<button class="delete-btn" onclick="deletePost()">삭제</button>` : ''}
          </div>
        </div>

        ${currentPost.image_url ? `<img src="${currentPost.image_url}" class="post-image" alt="이미지">` : ''}

        <div class="post-content">
          ${currentPost.content ? currentPost.content.replace(/\n/g, '<br>') : ''}
        </div>

        <div class="share-section">
          <div class="share-box">
            <div class="share-url">${window.location.href}</div>
            <button class="copy-btn" onclick="copyLink()">복사</button>
          </div>
        </div>
      </div>
    `;
  }

  async function loadLikes() {
    try {
      const likes = await api(`/likes?post_id=eq.${postId}&select=user_id`);
      const count = likes?.length || 0;
      const isLiked = currentUser && likes.some(l => l.user_id === currentUser.id);

      const btn = document.getElementById('likeBtn');
      const countEl = document.getElementById('likeCount');
      if (btn && countEl) {
        countEl.textContent = count;
        btn.classList.toggle('liked', isLiked);
      }
    } catch (e) {}
  }

  window.toggleLike = async function() {
    if (!currentUser) return alert("로그인이 필요합니다.");
    try {
      const existing = await api(`/likes?post_id=eq.${postId}&user_id=eq.${currentUser.id}`);
      if (existing?.length) {
        await api(`/likes?id=eq.${existing[0].id}`, { method: "DELETE" });
      } else {
        await api("/likes", {
          method: "POST",
          body: JSON.stringify({ post_id: postId, user_id: currentUser.id })
        });
      }
      loadLikes();
    } catch (e) { console.error(e); }
  };

  async function loadComments() {
    try {
      const comments = await api(`/comments?post_id=eq.${postId}&order=created_at.desc`);
      const list = document.getElementById('commentList');
      list.innerHTML = '';

      if (!comments?.length) {
        list.innerHTML = `<div class="no-comments">아직 댓글이 없습니다.<br>첫 댓글을 남겨보세요 ✨</div>`;
        return;
      }

      comments.forEach(c => {
        const isMine = currentUser?.id === c.user_id;
        const item = document.createElement('div');
        item.className = 'comment-item';
        item.innerHTML = `
          <div class="comment-avatar">${c.user_name?.[0]?.toUpperCase() || '?'}</div>
          <div class="comment-body">
            <div class="comment-author">${c.user_name}</div>
            <div class="comment-text">${c.text.replace(/\n/g, '<br>')}</div>
            <div class="comment-time">${new Date(c.created_at).toLocaleString('ko-KR', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'})}</div>
          </div>
          ${isMine ? `<button onclick="deleteComment('${c.id}')" style="background:none;border:none;color:#ff4d7e;cursor:pointer;font-size:13px;">삭제</button>` : ''}
        `;
        list.appendChild(item);
      });
    } catch (e) {}
  }

  window.addComment = async function() {
    const input = document.getElementById('commentInput');
    const text = input.value.trim();
    if (!text || !currentUser) return;

    try {
      await api("/comments", {
        method: "POST",
        body: JSON.stringify({
          post_id: postId,
          user_id: currentUser.id,
          user_name: currentUser.nickname,
          text: text,
          created_at: new Date().toISOString()
        })
      });
      input.value = '';
      loadComments();
    } catch (e) { alert('댓글 등록 실패'); }
  };

  window.deleteComment = async function(id) {
    if (!confirm('댓글을 삭제할까요?')) return;
    await api(`/comments?id=eq.${id}`, { method: "DELETE" });
    loadComments();
  };

  window.deletePost = async function() {
    if (!confirm('게시물을 삭제하시겠습니까?')) return;
    try {
      await api(`/posts?id=eq.${postId}`, { method: "DELETE" });
      alert('게시물이 삭제되었습니다.');
      window.location.href = 'index.html';
    } catch (e) { alert('삭제 실패'); }
  };

  window.copyLink = function() {
    navigator.clipboard.writeText(window.location.href).then(() => {
      alert('링크가 복사되었습니다.');
    });
  };

  window.goToProfile = function(id, nick) {
    window.location.href = `user.html?id=${id}&nickname=${nick}`;
  };

  window.goHome = () => window.location.href = 'index.html';

  // Init
  updateSidebar();
  if (postId) loadPost();
  else document.getElementById('postContent').innerHTML = `<div style="text-align:center;padding:120px;color:#666;">잘못된 접근입니다.</div>`;
</script>
</body>
</html>
