<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>게시물 보기 : Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--t1);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* ─── HEADER ─── */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 50;
      opacity: 0;
      transform: translateY(-10px);
      animation: slideDown 0.4s ease 0.08s forwards;
    }
    @keyframes slideDown { to { opacity: 1; transform: translateY(0); } }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 1;
      min-width: 0;
    }

    .back-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: none;
      background: none;
      color: var(--t2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      flex-shrink: 0;
    }
    .back-btn:hover { color: var(--t1); background: var(--bg3); }
    .back-btn:active { transform: scale(0.82); }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--t1);
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-profile-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      overflow: hidden;
      color: #666;
    }
    .header-profile-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    /* ─── MAIN CONTENT ─── */
    .main-content {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 36px 20px;
    }

    .view-container {
      max-width: 580px;
      width: 100%;
      opacity: 0;
      transform: translateY(12px);
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.18s forwards;
    }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

    /* ─── POST CARD ─── */
    .post-card {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r3);
      padding: 24px;
    }

    .author-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .create-profile-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 700;
      flex-shrink: 0;
      overflow: hidden;
      color: #666;
    }
    .create-profile-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .author-info { display: flex; flex-direction: column; gap: 2px; }
    .author-name { font-size: 14px; font-weight: 600; color: var(--t1); }
    .author-sub { font-size: 12px; color: var(--t3); }

    .post-body {
      font-size: 16px;
      line-height: 1.6;
      color: var(--t1);
      margin-bottom: 20px;
      word-break: break-all;
      white-space: pre-wrap;
    }

    /* ─── 이미지 그리드 ─── */
    .post-images-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .post-image-item {
      border-radius: var(--r3);
      overflow: hidden;
      border: 1px solid var(--border);
      aspect-ratio: 1 / 1;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .post-image-item:hover {
      transform: scale(1.02);
    }
    .post-image-item img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* ─── DIVIDER ─── */
    .section-divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    /* ─── 하단 액션 버튼 배치 영역 ─── */
    .post-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ─── 공개 범위 표시 배지 (좋아요, 삭제 버튼과 동일한 외형 구조) ─── */
    .access-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: 22px;
      font-family: inherit;
      border: 1px solid var(--border2);
      background: var(--bg3);
      user-select: none;
    }
    .access-badge img {
      width: 14px; height: 14px;
      object-fit: contain;
    }

    /* 공개 상태 스타일 (초록색 테마) */
    .access-badge.public {
      color: var(--green);
      border-color: var(--green);
      background: rgba(74, 222, 128, 0.04);
    }
    
    /* 일부 공개 상태 스타일 (파란색 테마) */
    .access-badge.link {
      color: #3b82f6;
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.04);
    }

    /* 비공개 상태 스타일 (검은색 테마 - 다크모드 가독성을 위해 흰색 배경 반전 적용) */
    .access-badge.private {
      color: #000000;
      border-color: #000000;
      background: #ffffff;
    }

    /* ─── LIKE BTN ─── */
    .like-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--t2);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: 22px;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .like-btn:hover { color: var(--t1); border-color: var(--border3); background: var(--bg4); }
    .like-btn:active { transform: scale(0.94); }
    .like-btn.active {
      color: var(--pink);
      border-color: var(--pink);
      background: rgba(255, 107, 107, 0.04);
    }
    .like-btn svg {
      transition: fill 0.15s, stroke 0.15s;
    }

    /* ─── DELETE BTN ─── */
    .delete-btn {
      background: transparent;
      border: 1px solid #2a1a1a;
      color: var(--pink);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: 22px;
      transition: background 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      font-family: inherit;
      margin-left: auto; /* 삭제 버튼은 항상 맨 우측으로 정렬 */
    }
    .delete-btn:hover { background: rgba(255,107,107,0.1); border-color: var(--pink); }
    .delete-btn:active { transform: scale(0.94); }

    /* ─── LIGHTBOX (이미지 크게 보기) ─── */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(8px);
    }
    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      border-radius: var(--r2);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    /* ─── FOOTER ─── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 20px;
      text-align: center;
      color: var(--t3);
      font-size: 11px;
      margin-top: auto;
    }

    /* ─── MOBILE RESPONSIVE FIX ─── */
    @media (max-width: 768px) {
      .header { padding: 10px 12px; gap: 8px; }
      .header-left { gap: 6px; }
      .back-btn { width: 32px; height: 32px; }
      .header-title { font-size: 13px; gap: 6px; }
      .header-profile-avatar { width: 26px; height: 26px; }
      .main-content { padding: 24px 16px; }
      .post-card { padding: 16px; }
      .post-body { font-size: 15px; }
      .access-badge, .like-btn, .delete-btn { padding: 7px 14px; font-size: 12px; }
      .post-images-grid { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <button class="back-btn" onclick="goBack()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M19 12H5M5 12l7-7M5 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="header-title">
        게시물 보기
        <div class="header-profile-avatar" id="headerAvatar"></div>
      </span>
    </div>
  </div>

  <div class="main-content">
    <div class="view-container" id="postContainer">
      <div style="text-align: center; color: var(--t2); padding: 40px 0;">게시물을 불러오는 중...</div>
    </div>
  </div>

  <div class="lightbox" id="imageLightbox" onclick="closeLightbox()">
    <img id="lightboxImg" src="" alt="확대된 이미지">
  </div>

  <div class="footer">
    본 서비스는 대한민국의 중2 개발자 1인이 만든 프로젝트입니다 모든 소스 코드 및 파일의 출처는 전적으로 개발자에게 있음을 알립니다.
  </div>

<script src="markdown.js"></script>
<script>
  const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";

  async function api(endpoint, options = {}) {
    const url = API_BASE + endpoint;
    const res = await fetch(url, {
      ...options,
      headers: {
        "Content-Type": "application/json",
        ...(options.headers || {}),
      },
    });
    if (!res.ok) {
      let errorText = "";
      try { errorText = await res.text(); } catch {}
      throw new Error(`API 오류 (${res.status}): ${errorText || "알 수 없는 오류"}`);
    }
    if (res.status === 204 || res.headers.get("content-length") === "0") return null;
    try { return await res.json(); } catch (e) {
      console.warn("JSON 파싱 실패했지만 2xx 성공으로 간주:", e);
      return null;
    }
  }

  let currentUser = null;

  function setAvatar(el, profileImage, nickname) {
    if (profileImage) {
      el.innerHTML = `<img src="${profileImage}" alt="${nickname || ''}">`;
    } else {
      el.textContent = (nickname?.[0] || '?').toUpperCase();
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }

  function renderMarkdown(md) {
    if (!md) return '';
    let html = md;
    html = html.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
    html = html.replace(/\*(.*?)\*/g, '<i>$1</i>');
    html = html.replace(/__(.*?)__/g, '<u>$1</u>');
    html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');
    html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
    html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
    html = html.replace(/^---$/gm, '<hr>');
    return html;
  }

  window.goBack = function() { window.history.back(); };

  window.openLightbox = function(url) {
    const lightbox = document.getElementById('imageLightbox');
    const img = document.getElementById('lightboxImg');
    img.src = url;
    lightbox.style.display = 'flex';
  };

  window.closeLightbox = function() {
    document.getElementById('imageLightbox').style.display = 'none';
  };

  // 게시물 렌더링 함수
  function renderPost(post) {
    const container = document.getElementById('postContainer');

    const avatarContent = post.profile_image 
      ? `<img src="${post.profile_image}" alt="${post.author}">` 
      : (post.author?.[0] || '?').toUpperCase();

    const timeStr = new Date(post.created_at).toLocaleString('ko-KR', {
      month: 'long',
      day: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    });

    // 여러 이미지 분할 처리 및 출력 설정
    let imagesHtml = '';
    if (post.image_url) {
      const urls = post.image_url.split(',');
      imagesHtml = '<div class="post-images-grid">';
      urls.forEach(url => {
        if (url.trim()) {
          imagesHtml += `<div class="post-image-item"><img src="${url.trim()}" alt="post image" onclick="openLightbox('${url.trim()}')"></div>`;
        }
      });
      imagesHtml += '</div>';
    }

    const isAuthor = currentUser && currentUser.id === post.author_id;

    // 좋아요 로컬 스토리지 시뮬레이션 데이터 불러오기
    const likedPosts = JSON.parse(localStorage.getItem('likedPosts') || '{}');
    const isLiked = !!likedPosts[post.id];
    const simulatedLikes = localStorage.getItem(`likes_${post.id}`) || Math.floor(Math.random() * 8);

    // 공개 범위 분기 UI 디자인 구조 생성 (좋아요 버튼 왼쪽에 배치됨)
    let accessBadgeHtml = '';
    if (post.access === 'public') {
      accessBadgeHtml = `
        <div class="access-badge public">
          <img src="earth.svg" alt="공개">
          <span>공개</span>
        </div>
      `;
    } else if (post.access === 'link') {
      accessBadgeHtml = `
        <div class="access-badge link">
          <img src="link.svg" alt="일부 공개">
          <span>일부 공개</span>
        </div>
      `;
    } else {
      accessBadgeHtml = `
        <div class="access-badge private">
          <img src="service.svg" alt="비공개">
          <span>비공개</span>
        </div>
      `;
    }

    container.innerHTML = `
      <div class="post-card">
        <div class="author-row">
          <div class="create-profile-avatar">${avatarContent}</div>
          <div class="author-info">
            <div class="author-name">${escapeHtml(post.author)}</div>
            <div class="author-sub">${timeStr}</div>
          </div>
        </div>
        
        <div class="post-body">${renderMarkdown(post.content)}</div>
        
        ${imagesHtml}
        
        <div class="section-divider"></div>
        
        <div class="post-actions">
          ${accessBadgeHtml}
          
          <button class="like-btn ${isLiked ? 'active' : ''}" id="likeBtn" onclick="toggleLike('${post.id}')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="${isLiked ? 'var(--pink)' : 'none'}" stroke="${isLiked ? 'var(--pink)' : 'currentColor'}" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            <span id="likeCount">${simulatedLikes}</span>
          </button>
          
          ${isAuthor ? `
            <button class="delete-btn" onclick="deletePost('${post.id}')">삭제</button>
          ` : ''}
        </div>
      </div>
    `;
  }

  // 좋아요 작동 함수
  window.toggleLike = function(postId) {
    const likedPosts = JSON.parse(localStorage.getItem('likedPosts') || '{}');
    const likeBtn = document.getElementById('likeBtn');
    const likeCountEl = document.getElementById('likeCount');
    let currentLikes = parseInt(likeCountEl.textContent) || 0;
    
    if (likedPosts[postId]) {
      delete likedPosts[postId];
      currentLikes--;
      likeBtn.classList.remove('active');
      likeBtn.querySelector('svg').setAttribute('fill', 'none');
      likeBtn.querySelector('svg').setAttribute('stroke', 'currentColor');
    } else {
      likedPosts[postId] = true;
      currentLikes++;
      likeBtn.classList.add('active');
      likeBtn.querySelector('svg').setAttribute('fill', 'var(--pink)');
      likeBtn.querySelector('svg').setAttribute('stroke', 'var(--pink)');
    }
    
    likeCountEl.textContent = currentLikes;
    localStorage.setItem('likedPosts', JSON.stringify(likedPosts));
    localStorage.setItem(`likes_${postId}`, currentLikes);
  };

  // 게시물 삭제 함수
  window.deletePost = async function(postId) {
    if (!confirm('정말로 이 게시물을 삭제하시겠습니까?')) return;
    try {
      await api(`/posts?id=eq.${encodeURIComponent(postId)}`, { method: 'DELETE' });
      alert('게시물이 성공적으로 삭제되었습니다.');
      window.location.href = 'index.html';
    } catch (e) {
      console.error(e);
      alert('게시물 삭제에 실패했습니다.');
    }
  };

  // 페이지 초기 로드 진입점
  async function initPage() {
    const savedUser = localStorage.getItem('snsUser');
    if (!savedUser) {
      alert('로그인이 필요합니다.');
      window.location.href = 'login.html';
      return;
    }
    currentUser = JSON.parse(savedUser);

    const headerAvatar = document.getElementById('headerAvatar');
    setAvatar(headerAvatar, currentUser.profile_image || null, currentUser.nickname);

    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');
    if (!postId) {
      document.getElementById('postContainer').innerHTML = '<div style="text-align: center; color: var(--pink); padding: 40px 0;">잘못된 접근입니다.</div>';
      return;
    }

    try {
      const posts = await api(`/posts?id=eq.${encodeURIComponent(postId)}`);
      if (!posts || posts.length === 0) {
        document.getElementById('postContainer').innerHTML = '<div style="text-align: center; color: var(--pink); padding: 40px 0;">존재하지 않거나 삭제된 게시물입니다.</div>';
        return;
      }
      
      const post = posts[0];
      
      // 비공개(private) 게시글 권한 체크 보안 가드 코드
      if (post.access === 'private' && post.author_id !== currentUser.id) {
        document.getElementById('postContainer').innerHTML = '<div style="text-align: center; color: var(--pink); padding: 40px 0;">비공개 게시물입니다. 접근 권한이 없습니다.</div>';
        return;
      }

      renderPost(post);
    } catch (e) {
      console.error(e);
      document.getElementById('postContainer').innerHTML = `<div style="text-align: center; color: var(--pink); padding: 40px 0;">정보를 불러오는 데 실패했습니다.</div>`;
    }
  }

  initPage();
</script>
</body>
</html>
