<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시물 : Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }
    /* NProgress 커스텀 */
    #nprogress .bar { background: #fff !important; height: 2px !important; }
    #nprogress .peg { display: none !important; }
    #nprogress .spinner { display: none !important; }
    /* ─── SPLASH ─── */
    #splash {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      transition: opacity 0.45s ease;
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }
    .splash-logo {
      width: 72px; height: 72px;
      animation: splashLogoPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes splashLogoPop {
      from { opacity: 0; transform: scale(0.7); }
      to { opacity: 1; transform: scale(1); }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }
    /* ─── SIDEBAR ─── */
    .sidebar-container { width: 72px; min-width: 72px; height: 100vh; position: fixed; left: 0; top: 0; z-index: 100; }
    .sidebar-container iframe { width: 72px !important; height: 100%; border: none; }
    /* ─── MAIN WRAPPER ─── */
    .main-wrapper { margin-left: 72px; width: calc(100% - 72px); display: flex; flex-direction: column; min-height: 100vh; }
    /* ─── HEADER ─── */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
      opacity: 0;
      transform: translateY(-10px);
      animation: slideDown 0.4s ease 0.1s forwards;
    }
    @keyframes slideDown { to { opacity: 1; transform: translateY(0); } }
    .back-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: none;
      background: none;
      color: var(--t2);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .back-btn:hover { color: var(--t1); background: var(--bg3); }
    .back-btn:active { transform: scale(0.82); }
    .header-title { font-size: 16px; font-weight: 600; color: var(--t1); }
    /* ─── CONTAINER ─── */
    .container {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px;
      flex: 1;
      opacity: 0;
      transform: translateY(12px);
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
    }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
    /* ─── POST DETAIL CARD ─── */
    .post-detail-card { margin-bottom: 48px; }
    .post-detail-header {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-actions { display: flex; align-items: center; gap: 10px; }
    .author-info {
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .author-info:hover { opacity: 0.75; }
    .author-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      overflow: hidden;
      flex-shrink: 0;
      color: #666;
      transition: border-color 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .author-info:hover .author-avatar { border-color: var(--border3); transform: scale(1.05); }
    .author-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .author-details { display: flex; flex-direction: column; gap: 5px; }
    .author-name {
      font-weight: 700;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 7px;
      letter-spacing: -0.3px;
    }
    .post-timestamp { font-size: 13px; color: var(--t3); }
    .verification-badge {
      display: inline-block;
      width: 14px;
      height: 14px;
      vertical-align: middle;
      background-image: url('https://sharer.jbjb.r-e.kr/badge.svg');
      background-repeat: no-repeat;
      background-size: contain;
      background-position: center;
    }
    /* ─── ACCESS BADGE ─── */
    .access-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 9px 16px;
      border-radius: 22px;
      transition: background 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      font-family: inherit;
      user-select: none;
    }
    .access-badge img {
      width: 14px;
      height: 14px;
      object-fit: contain;
    }
    /* 공개 스타일 (초록색 계열) */
    .access-badge.public {
      background: rgba(74, 222, 128, 0.06);
      border: 1px solid rgba(74, 222, 128, 0.2);
      color: var(--green);
    }
    .access-badge.public:hover {
      background: rgba(74, 222, 128, 0.12);
      border-color: var(--green);
      transform: scale(1.04);
    }
    .access-badge.public:active { transform: scale(0.94); }
    
    /* 비공개 스타일 (검은색/어두운 회색 계열) */
    .access-badge.private {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid #222;
      color: #777;
    }
    .access-badge.private:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: #444;
      color: #aaa;
      transform: scale(1.04);
    }
    .access-badge.private:active { transform: scale(0.94); }
    
    /* 일부 공개 스타일 (파란색 계열) */
    .access-badge.link {
      background: rgba(59, 130, 246, 0.06);
      border: 1px solid rgba(59, 130, 246, 0.2);
      color: #3b82f6;
    }
    .access-badge.link:hover {
      background: rgba(59, 130, 246, 0.12);
      border-color: #3b82f6;
      color: #60a5fa;
      transform: scale(1.04);
    }
    .access-badge.link:active { transform: scale(0.94); }

    /* ─── LIKE BTN ─── */
    .like-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: none;
      border: 1px solid var(--border2);
      color: var(--t2);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: 22px;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .like-btn:hover { border-color: var(--pink); color: var(--pink); background: rgba(255,107,107,0.06); }
    .like-btn:active { transform: scale(0.92); }
    .like-btn.liked { border-color: var(--pink); color: var(--pink); background: rgba(255,107,107,0.08); }
    .like-heart {
      width: 16px; height: 16px;
      fill: currentColor;
      transition: transform 0.25s cubic-bezier(0.34,1.7,0.64,1);
    }
    .like-btn:hover .like-heart { transform: scale(1.3); }
    .like-btn.liked .like-heart { transform: scale(1.15); }
    /* ─── DELETE BTN ─── */
    .delete-btn {
      background: transparent;
      border: 1px solid #2a1a1a;
      color: var(--pink);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      padding: 9px 16px;
      border-radius: 22px;
      transition: background 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      font-family: inherit;
    }
    .delete-btn:hover { background: rgba(255,107,107,0.1); border-color: var(--pink); transform: scale(1.04); }
    .delete-btn:active { transform: scale(0.94); }
    /* ─── 이미지 캐러셀 ─── */
    .post-images {
      margin: 28px 0;
      position: relative;
      border-radius: var(--r3);
      overflow: hidden;
      background: #000;
    }
    .image-carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      gap: 8px;
      padding: 4px;
    }
    .image-carousel::-webkit-scrollbar { display: none; }
    .carousel-slide {
      flex: 0 0 100%;
      scroll-snap-align: start;
      position: relative;
    }
    .carousel-slide img {
      width: 100%;
      max-height: 620px;
      object-fit: contain;
      border-radius: var(--r3);
      border: 1px solid var(--border);
      display: block;
      cursor: pointer;
    }
    .carousel-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      z-index: 10;
      transition: all 0.2s;
    }
    .carousel-nav:hover {
      background: rgba(0,0,0,0.85);
      transform: translateY(-50%) scale(1.1);
    }
    .carousel-nav.prev { left: 12px; }
    .carousel-nav.next { right: 12px; }
    .carousel-indicators {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    .indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: all 0.2s;
    }
    .indicator.active {
      background: #fff;
      transform: scale(1.4);
    }
    /* ─── POST CONTENT ─── */
    .post-detail-content { padding: 16px 0 32px; }
    .post-text {
      font-size: 15px;
      line-height: 1.8;
      color: var(--t1);
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .post-text a { color: #888; text-decoration: underline; text-underline-offset: 3px; }
    .post-text a:hover { color: var(--t1); }
    /* ─── SHARE ─── */
    .share-container {
      padding: 24px 0;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .share-label { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--t3); }
    .share-box-wrapper { display: flex; gap: 10px; align-items: center; }
    .share-url-box {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border2);
      padding: 11px 16px;
      border-radius: var(--r2);
      font-size: 13px;
      color: var(--t2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .copy-btn {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--t2);
      width: 42px; height: 42px;
      border-radius: var(--r2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .copy-btn:hover { background: var(--bg4); color: var(--t1); border-color: var(--border3); }
    .copy-btn:active { transform: scale(0.88); }
    .copy-btn.success { background: rgba(74,222,80,0.12); border-color: var(--green); color: var(--green); }
    /* ─── COMMENT SECTION ─── */
    .comment-section {
      padding: 32px 0;
      opacity: 0;
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.35s forwards;
    }
    .comment-input-wrapper { display: flex; gap: 10px; margin-bottom: 32px; }
    .comment-input {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r2);
      padding: 12px 16px;
      color: var(--t1);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 48px;
      max-height: 180px;
      transition: border-color 0.2s, background 0.2s;
      line-height: 1.5;
    }
    .comment-input:focus { outline: none; border-color: var(--border3); background: var(--bg3); }
    .comment-input::placeholder { color: var(--t3); }
    .comment-submit-btn {
      background: #fff;
      border: none;
      color: #000;
      padding: 0 20px;
      border-radius: var(--r2);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
    }
    .comment-submit-btn:hover { background: #e8e8e8; transform: scale(1.04); }
    .comment-submit-btn:active { transform: scale(0.94); }
    .comment-list { display: flex; flex-direction: column; gap: 0; }
    .comment-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
    }
    .comment-item:last-child { border-bottom: none; }
    .comment-header { display: flex; justify-content: space-between; align-items: center; }
    .comment-author-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .comment-author-wrapper:hover { opacity: 0.75; }
    .comment-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      overflow: hidden;
      flex-shrink: 0;
      color: #666;
      transition: border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .comment-author-wrapper:hover .comment-avatar { border-color: var(--border3); transform: scale(1.06); }
    .comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .comment-author {
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--t1);
    }
    .comment-content {
      font-size: 14px;
      color: #ccc;
      line-height: 1.7;
      white-space: pre-wrap;
      padding-left: 2px;
    }
    .comment-content a { color: var(--t2); text-decoration: underline; text-underline-offset: 3px; }
    .comment-content a:hover { color: var(--t1); }
    .comment-date { font-size: 11px; color: var(--t3); padding-left: 2px; }
    .comment-del-btn {
      background: none;
      border: none;
      color: var(--t3);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      font-family: inherit;
      transition: color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .comment-del-btn:hover { color: var(--pink); background: rgba(255,107,107,0.08); }
    .comment-del-btn:active { transform: scale(0.88); }
    /* ─── REPLIES (대댓글) ─── */
    .comment-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 2px;
      margin-top: 2px;
    }
    .reply-btn, .replies-toggle-btn {
      background: none;
      border: none;
      color: var(--t2);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 10px;
      font-family: inherit;
      transition: color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .reply-btn:hover, .replies-toggle-btn:hover { color: var(--t1); background: var(--bg3); }
    .reply-btn:active, .replies-toggle-btn:active { transform: scale(0.92); }
    .reply-compose {
      margin-top: 10px;
      padding-left: 44px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .reply-input {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r2);
      padding: 10px 14px;
      color: var(--t1);
      font-size: 13px;
      font-family: inherit;
      resize: none;
      min-height: 42px;
      max-height: 160px;
      transition: border-color 0.2s, background 0.2s;
      line-height: 1.5;
    }
    .reply-input:focus { outline: none; border-color: var(--border3); background: var(--bg3); }
    .reply-input::placeholder { color: var(--t3); }
    .reply-compose-actions { display: flex; justify-content: flex-end; gap: 8px; }
    .reply-submit-btn, .reply-cancel-btn {
      border: 1px solid var(--border2);
      background: var(--bg3);
      color: var(--t2);
      padding: 8px 12px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .reply-submit-btn { background: #fff; color: #000; border-color: transparent; }
    .reply-submit-btn:hover { background: #e8e8e8; transform: scale(1.02); }
    .reply-cancel-btn:hover { background: var(--bg4); color: var(--t1); border-color: var(--border3); }
    .reply-submit-btn:active, .reply-cancel-btn:active { transform: scale(0.96); }
    .reply-list {
      margin-top: 10px;
      padding-left: 44px;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
    }
    .reply-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 14px 0 14px 14px;
    }
    .reply-item .comment-avatar { width: 28px; height: 28px; font-size: 12px; }
    .reply-item .comment-author { font-size: 13px; }
    .reply-item .comment-content { font-size: 13px; color: #cfcfcf; }
    .reply-item .comment-date { font-size: 10px; }
    /* ─── LOGIN ALERT ─── */
    .login-alert {
      position: fixed;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg2);
      border: 1px solid var(--border2);
      color: var(--t1);
      padding: 12px 24px;
      border-radius: 22px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      z-index: 9999;
      transition: top 0.5s cubic-bezier(0.34,1.4,0.64,1);
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
    }
    .login-alert.show { top: 24px; }
    .login-alert::before {
      content: "🔒";
      font-size: 14px;
    }
    /* ─── MODAL ─── */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 10000;
    }
    .modal.show { opacity: 1; pointer-events: auto; }
    .modal-content {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r3);
      padding: 32px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      transform: scale(0.9);
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal.show .modal-content { transform: scale(1); }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; color: var(--t1); }
    .modal-desc { font-size: 14px; color: var(--t2); margin-bottom: 28px; line-height: 1.6; }
    .modal-actions { display: flex; gap: 12px; justify-content: center; }
    .delete-modal-btn {
      padding: 10px 28px;
      border-radius: var(--r2);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      border: none;
    }
    .delete-modal-btn.cancel { background: var(--bg3); color: var(--t2); border: 1px solid var(--border2); }
    .delete-modal-btn.cancel:hover { background: var(--bg4); color: var(--t1); }

      right: 24px;

      height: 44px;

    .lightbox-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);

      border: none;

      height: 56px;

      align-items: center;
      justify-content: center;

    .lightbox-arrow:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-50%) scale(1.08);
    }
    .lightbox-arrow.left { left: 24px; }
    .lightbox-arrow.right { right: 24px; }
    .lightbox-counter {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      padding: 6px 16px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      z-index: 20001;

    /* ─── FOOTER ─── */

    .footer-links a:hover { color: var(--t1); }
    .footer-text { font-size: 12px; color: var(--t3); line-height: 1.6; max-width: 480px; }
    @media (max-width: 768px) {
      .sidebar-container { display: none; }

      .delete-btn { padding: 8px 14px; font-size: 11px; }
      .access-badge { padding: 8px 14px; font-size: 11px; }
    }
  </style>
</head>

  <script src="markdown.js"></script>
  <script>
    // ─── NPROGRESS 설정 ───
    NProgress.configure({ minimum: 0.08, trickleSpeed: 200, showSpinner: false });
    document.addEventListener('click', function(e) {
      const link = e.target.closest('a');
      if (link && link.href && !link.target && !link.hasAttribute('download')) {
        NProgress.start();
      }
    });

    // ─── SPLASH ───
    (function() {
      const splash = document.getElementById('splash');
      window.addEventListener('load', () => {
        setTimeout(() => {
          splash.classList.add('fade-out');
          setTimeout(() => splash.remove(), 450);
        }, 300);
      });
    })();

    const SUPABASE_URL = "https://wzxtbllgffgshscfioas.supabase.co/rest/v1";
    const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6eHRibGxnZmZnc2hzY2Zpb2FzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY2NDY2OTIsImV4cCI6MjA1MjIyMjY5Mn0.8-F_9P41Xk3809xO2ZgWd6wH979tC8E8h9pYfFmU8o8";

    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');

    let currentUser = null;
    let currentPost = null;
    let currentLightboxImages = [];
    let currentLightboxIndex = 0;
    let pendingDeletePostId = null;

    let profileImages = {};
    let openReplyThreads = new Set();
    let repliesByParent = {};

    async function api(path, options = {}) {
      const url = `${SUPABASE_URL}${path}`;
      const headers = {
        "apikey": API_KEY,
        "Authorization": `Bearer ${API_KEY}`,
        "Content-Type": "application/json",
        ...(options.headers || {})
      };
      const res = await fetch(url, { ...options, headers });
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(`API Error: ${res.status} - ${txt}`);
      }
      if (res.status === 204) return null;
      return res.json();
    }

    window.openLightbox = function(imagesStr, startIndex) {
      currentLightboxImages = imagesStr.split(',').map(u => u.trim()).filter(Boolean);
      currentLightboxIndex = startIndex;
      const lightbox = document.getElementById('imageLightbox');
      const imgEl = document.getElementById('lightboxImage');
      const counter = document.getElementById('lightboxCounter');
      
      imgEl.src = currentLightboxImages[currentLightboxIndex];
      counter.textContent = `${currentLightboxIndex + 1} / ${currentLightboxImages.length}`;
      lightbox.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    };

    window.closeLightbox = function() {
      const lightbox = document.getElementById('imageLightbox');
      lightbox.style.display = 'none';
      document.body.style.overflow = '';
    };

    window.prevLightboxImage = function() {
      if (currentLightboxImages.length <= 1) return;
      currentLightboxIndex = (currentLightboxIndex - 1 + currentLightboxImages.length) % currentLightboxImages.length;
      const imgEl = document.getElementById('lightboxImage');
      const counter = document.getElementById('lightboxCounter');
      imgEl.src = currentLightboxImages[currentLightboxIndex];
      counter.textContent = `${currentLightboxIndex + 1} / ${currentLightboxImages.length}`;
    };

    window.nextLightboxImage = function() {
      if (currentLightboxImages.length <= 1) return;
      currentLightboxIndex = (currentLightboxIndex + 1) % currentLightboxImages.length;
      const imgEl = document.getElementById('lightboxImage');
      const counter = document.getElementById('lightboxCounter');
      imgEl.src = currentLightboxImages[currentLightboxIndex];
      counter.textContent = `${currentLightboxIndex + 1} / ${currentLightboxImages.length}`;
    };

    document.addEventListener('keydown', function(e) {
      if (e.key === "Escape") {
        const lightbox = document.getElementById('imageLightbox');
        if (lightbox.style.display === 'flex') {
          closeLightbox();
        }
      }
    });

    async function loadPost(postId) {
      try {
        const posts = await api(`/posts?id=eq.${postId}&select=*`);
        if (!posts?.length) {
          showError('게시물을 찾을 수 없습니다.');
          return;
        }
        const post = posts[0];
        
        const savedUser = localStorage.getItem('snsUser');
        const activeUser = savedUser ? JSON.parse(savedUser) : null;

        if (post.access === 'private') {
          if (!activeUser || String(activeUser.id) !== String(post.author_id)) {
            showError('비공개 게시물입니다. 작성자만 확인할 수 있습니다.');
            return;
          }
        }

        currentPost = post;

        const pImg = await getProfileImage(post.author_id);
        let avatarContent = post.author ? post.author[0].toUpperCase() : '?';
        if (pImg) {
          avatarContent = `<img src="${pImg}" alt="${escapeHtml(post.author)}">`;
        }

        const isMine = activeUser && String(activeUser.id) === String(post.author_id);
        const deleteBtnHtml = isMine ? `<button class="delete-btn" onclick="openDeleteModal('${post.id}')">삭제</button>` : '';

        // 공개 범위 정보 구성
        let accessHtml = '';
        if (post.access === 'private') {
          accessHtml = `<div class="access-badge private"><img src="service.svg" alt="비공개">비공개</div>`;
        } else if (post.access === 'link') {
          accessHtml = `<div class="access-badge link"><img src="link.svg" alt="일부 공개">일부 공개</div>`;
        } else {
          // public 혹은 지정되지 않은 기본 상태일 때 공개로 처리
          accessHtml = `<div class="access-badge public"><img src="earth.svg" alt="공개">공개</div>`;
        }

        const timeStr = new Date(post.created_at).toLocaleString('ko-KR', {
          year: 'numeric', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit'
        });

        let imagesHtml = '';
        if (post.image_url) {
          const imgs = post.image_url.split(',').map(u => u.trim()).filter(Boolean);
          if (imgs.length > 0) {
            let slides = '';
            let indicators = '';
            imgs.forEach((url, index) => {
              slides += `
                <div class="carousel-slide">
                  <img src="${url}" alt="첨부 이미지" onclick="openLightbox('${escapeHtml(post.image_url)}', ${index})">
                </div>`;
              indicators += `<div class="indicator ${index === 0 ? 'active' : ''}" data-index="${index}"></div>`;
            });

            const navButtons = imgs.length > 1 ? `
              <button class="carousel-nav prev" onclick="moveCarousel('${post.id}', -1)">‹</button>
              <button class="carousel-nav next" onclick="moveCarousel('${post.id}', 1)">›</button>
            ` : '';

            const indicatorWrapper = imgs.length > 1 ? `
              <div class="carousel-indicators">${indicators}</div>
            ` : '';

            imagesHtml = `
              <div class="post-images" id="carousel-${post.id}">
                <div class="image-carousel" onscroll="handleCarouselScroll('${post.id}')">
                  ${slides}
                </div>
                ${navButtons}
                ${indicatorWrapper}
              </div>`;
          }
        }

        const isVerified = ["JB777", "진정오"].includes(post.author);
        const parsedContent = parseMarkdown(post.content || '');

        const contentDiv = document.getElementById('postContent');
        contentDiv.innerHTML = `
          <div class="post-detail-card">
            <div class="post-detail-header">
              <div class="author-info" onclick="goToProfile('${post.author_id}', '${escapeHtml(post.author)}')">
                <div class="author-avatar">${avatarContent}</div>
                <div class="author-details">
                  <div class="author-name">
                    ${escapeHtml(post.author)}
                    ${isVerified ? '<span class="verification-badge"></span>' : ''}
                  </div>
                  <div class="post-timestamp">${timeStr}</div>
                </div>
              </div>
              <div class="header-actions">
                ${accessHtml}
                <button class="like-btn" id="likeBtn" onclick="toggleLike()">
                  <svg class="like-heart" viewBox="0 0 2300 2300" xmlns="http://www.w3.org/2000/svg">
                    <path fill="currentColor" d="M 2169.75708 1273.707397 C 2082.986328 1435.051758 1959.814697 1592.116455 1800.239746 1744.902832 C 1640.756348 1897.699951 1451.88208 2043.705688 1233.619141 2182.920898 C 1220.223145 2191.470215 1206.115234 2198.850586 1191.452637 2204.979248 C 1165.430908 2218.340332 1137.466797 2225.031982 1108.432617 2225.031982 C 1079.388428 2225.031982 1051.424316 2218.340332 1025.402588 2204.979248 C 1010.750244 2198.850586 996.63208 2191.470215 983.246338 2182.920898 C 764.973145 2043.705688 576.109131 1897.699951 416.615479 1744.902832 C 257.040771 1592.116455 133.868896 1435.051758 47.108398 1273.707397 C -15.702393 1157.007568 -15.702393 1026.002686 47.108398 909.29248 C 128.261963 757.887207 242.485596 612.921387 389.768555 474.384521 C 537.061768 335.85791 701.374268 218.423096 882.716064 122.091064 C 914.498535 105.210693 948.514404 92.570068 984.75708 84.180908 C 1025.045166 74.850098 1066.398682 70.180176 1108.432617 70.180176 C 1150.456299 70.180176 1191.820068 74.850098 1232.108154 84.180908 C 1268.340576 92.570068 1302.356445 105.210693 1334.14917 122.091064 C 1515.490967 218.423096 1679.803467 335.85791 1827.09668 474.384521 C 1974.379639 612.921387 2088.603271 757.887207 2169.75708 909.29248 C 2232.567871 1026.002686 2232.567871 1157.007568 2169.75708 1273.707397 Z" />
                  </svg>
                  <span id="likeCount">0</span>
                </button>
                ${deleteBtnHtml}
              </div>
            </div>

            ${imagesHtml}

            <div class="post-detail-content">
              <div class="post-text">${parsedContent}</div>
            </div>

            <div class="share-container">
              <div class="share-label">공유 링크</div>
              <div class="share-box-wrapper">
                <div class="share-url-box" id="shareUrlBox"></div>
                <button class="copy-btn" id="copyBtn" onclick="copyShareLink()" title="링크 복사">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        `;

        document.getElementById('shareUrlBox').textContent = window.location.href;

        setupCarouselIndicators(post.id);
        loadLikes(post.id);

      } catch (error) {
        console.error('loadPost 오류:', error);
        showError('게시물을 불러오는 중 오류가 발생했습니다.');
      }
    }

    function showError(msg) {
      document.getElementById('postContent').innerHTML = `
        <div style="text-align:center; padding:80px 24px; color:var(--t2);">
          <div style="font-size:40px; margin-bottom:16px;">⚠️</div>
          <div style="font-size:15px; font-weight:600; margin-bottom:24px; color:var(--t1);">${escapeHtml(msg)}</div>
          <button onclick="goHome()" style="background:#fff; color:#000; border:none; padding:12px 28px; border-radius:var(--r2); font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; transition:background 0.15s;" onmouseover="this.style.background='#e8e8e8'" onmouseout="this.style.background='#fff'">돌아가기</button>
        </div>
      `;
    }

    window.openDeleteModal = function(id) {
      pendingDeletePostId = id;
      document.getElementById('deleteModal').classList.add('show');
      document.body.style.overflow = 'hidden';
    };

    window.closeDeleteModal = function() {
      document.getElementById('deleteModal').classList.remove('show');
      document.body.style.overflow = '';
      pendingDeletePostId = null;
    };

    window.goToProfile = function(userId, nickname) {
      window.location.href = `user.html?id=${userId}&nickname=${encodeURIComponent(nickname)}`;
    };

    window.addComment = async function() {
      const input = document.getElementById('commentInput');
      const text = input.value.trim();
      if (!currentUser) return showLoginAlert();
      if (!text || !currentPost) return;

      try {
        await api("/comments", {
          method: "POST",
          body: JSON.stringify({
            post_id: postId,
            user_id: currentUser.id,
            user_name: currentUser.nickname,
            text: text,
            created_at: new Date().toISOString()
          })
        });
        input.value = '';
        listenComments(postId);
      } catch (e) { alert('댓글 작성 실패'); }
    };

    window.openReplyComposer = function(commentId) {
      const comp = document.getElementById(`replyCompose-${commentId}`);
      if (comp) comp.style.display = comp.style.display === 'none' ? 'flex' : 'none';
    };

    window.cancelReply = function(commentId) {
      const comp = document.getElementById(`replyCompose-${commentId}`);
      if (comp) comp.style.display = 'none';
      const input = document.getElementById(`replyInput-${commentId}`);
      if (input) input.value = '';
    };

    window.submitReply = async function(commentId) {
      if (!currentUser) return showLoginAlert();
      const input = document.getElementById(`replyInput-${commentId}`);
      const text = input.value.trim();
      if (!text) return;

      try {
        await api("/comments", {
          method: "POST",
          body: JSON.stringify({
            post_id: postId,
            parent_id: commentId,
            user_id: currentUser.id,
            user_name: currentUser.nickname,
            text: text,
            created_at: new Date().toISOString()
          })
        });
        input.value = '';
        openReplyThreads.add(commentId);
        listenComments(postId);
      } catch (e) { alert('답글 작성 실패'); }
    };

    window.toggleReplies = function(commentId) {
      const listEl = document.getElementById(`replyList-${commentId}`);
      const btn = document.getElementById(`toggleReplies-${commentId}`);
      if (!listEl || !btn) return;

      const count = btn.getAttribute('data-count') || 0;
      if (openReplyThreads.has(commentId)) {
        openReplyThreads.delete(commentId);
        listEl.style.display = 'none';
        btn.textContent = `답글 ${count}개 보기`;
      } else {
        openReplyThreads.add(commentId);
        listEl.style.display = 'flex';
        btn.textContent = '답글 접기';
      }
    };

    window.deleteComment = async function(commentId) {
      if (!confirm('댓글을 삭제하시겠습니까?')) return;
      try {
        await api(`/comments?id=eq.${commentId}`, { method: "DELETE" });
        listenComments(postId);
      } catch (e) { alert('댓글 삭제 실패'); }
    };

    window.copyShareLink = function() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.classList.add('success');
        setTimeout(() => btn.classList.remove('success'), 1500);
      });
    };

    window.goHome = () => window.location.href = "index.html";
    window.showPrivacyPolicy = () => window.location.href = "privacy.html";
    window.showTerms = () => window.location.href = "policy.html";

    document.getElementById('confirmDeleteBtn').onclick = async () => {
      if (!pendingDeletePostId) return;
      try {
        await api(`/comments?post_id=eq.${pendingDeletePostId}`, { method: "DELETE" });
        await api(`/likes?post_id=eq.${pendingDeletePostId}`, { method: "DELETE" });
        await api(`/posts?id=eq.${pendingDeletePostId}`, { method: "DELETE" });
        window.location.href = 'index.html';
      } catch (e) { alert('게시물 삭제 실패'); }
    };

    function escapeHtml(unsafe) {
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    window.moveCarousel = function(id, dir) {
      const container = document.getElementById(`carousel-${id}`);
      if (!container) return;
      const carousel = container.querySelector('.image-carousel');
      const slideWidth = carousel.clientWidth;
      carousel.scrollBy({ left: slideWidth * dir, behavior: 'smooth' });
    };

    window.handleCarouselScroll = function(id) {
      const container = document.getElementById(`carousel-${id}`);
      if (!container) return;
      const carousel = container.querySelector('.image-carousel');
      const scrollLeft = carousel.scrollLeft;
      const slideWidth = carousel.clientWidth;
      const activeIndex = Math.round(scrollLeft / slideWidth);

      const dots = container.querySelectorAll('.indicator');
      dots.forEach((dot, idx) => {
        dot.classList.toggle('active', idx === activeIndex);
      });
    };

    function setupCarouselIndicators(id) {
      const container = document.getElementById(`carousel-${id}`);
      if (!container) return;
      const dots = container.querySelectorAll('.indicator');
      const carousel = container.querySelector('.image-carousel');
      
      dots.forEach(dot => {
        dot.onclick = () => {
          const idx = parseInt(dot.getAttribute('data-index'), 10);
          const slideWidth = carousel.clientWidth;
          carousel.scrollTo({ left: slideWidth * idx, behavior: 'smooth' });
        };
      });
    }

    async function listenComments(postId) {
      try {
        const comments = await api(`/comments?post_id=eq.${postId}&order=created_at.asc`);
        
        const userIds = [...new Set(comments.map(c => c.user_id))];
        await Promise.all(userIds.map(id => getProfileImage(id)));

        const mainComments = [];
        repliesByParent = {};

        comments.forEach(c => {
          if (!c.parent_id) {
            mainComments.push(c);
          } else {
            const parentId = c.parent_id;
            if (!repliesByParent[parentId]) repliesByParent[parentId] = [];
            repliesByParent[parentId].push(c);
          }
        });

        Object.values(repliesByParent).forEach(arr => {
          arr.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
        });

        function renderAvatar(userName, userId) {
          let avatar = userName ? userName[0].toUpperCase() : '?';
          if (profileImages[userId]) {
            const url = profileImages[userId].includes('?') ? `${profileImages[userId]}&v=${Date.now()}` : `${profileImages[userId]}?v=${Date.now()}`;
            avatar = `<img src="${url}" alt="${escapeHtml(userName)}">`;
          }
          return avatar;
        }

        function renderOneComment(c, { showReplyButton }) {
          const isMine = currentUser?.id === c.user_id;
          const date = new Date(c.created_at).toLocaleString('ko-KR', {
            year: 'numeric', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit'
          });
          const isVerified = ["JB777", "진정오"].includes(c.user_name);
          const avatarContent = renderAvatar(c.user_name, c.user_id);
          const linkedText = parseMarkdown(c.text);

          const replyCount = (repliesByParent[c.id] || []).length;
          const hasReplies = replyCount > 0;
          const isOpen = openReplyThreads.has(c.id);

          const replyBtnHtml = showReplyButton ? `<button class="reply-btn" onclick="openReplyComposer('${c.id}')">답글 달기</button>` : '';
          const toggleBtnHtml = hasReplies ? `<button class="replies-toggle-btn" id="toggleReplies-${c.id}" data-count="${replyCount}" onclick="toggleReplies('${c.id}')">${isOpen ? '답글 접기' : `답글 ${replyCount}개 보기`}</button>` : '';
          const replyComposeHtml = showReplyButton ? `
            <div class="reply-compose" id="replyCompose-${c.id}" style="display:none;">
              <textarea id="replyInput-${c.id}" class="reply-input" placeholder="답글을 입력하세요 (최대 500자)" maxlength="500"></textarea>
              <div class="reply-compose-actions">
                <button class="reply-cancel-btn" onclick="cancelReply('${c.id}')">취소</button>
                <button class="reply-submit-btn" onclick="submitReply('${c.id}')">답글 업로드</button>
              </div>
            </div>
          ` : '';

          let repliesHtml = '';
          if (hasReplies) {
            const childArr = repliesByParent[c.id] || [];
            let childItemsHtml = '';
            childArr.forEach(child => {
              childItemsHtml += renderOneComment(child, { showReplyButton: false });
            });
            repliesHtml = `
              <div class="reply-list" id="replyList-${c.id}" style="display: ${isOpen ? 'flex' : 'none'};">
                ${childItemsHtml}
              </div>
            `;
          }

          const delBtnHtml = isMine ? `<button class="comment-del-btn" onclick="deleteComment('${c.id}')">삭제</button>` : '';

          return `
            <div class="comment-item">
              <div class="comment-header">
                <div class="comment-author-wrapper" onclick="goToProfile('${c.user_id}', '${escapeHtml(c.user_name)}')">
                  <div class="comment-avatar">${avatarContent}</div>
                  <div class="comment-author">
                    ${escapeHtml(c.user_name)}
                    ${isVerified ? '<span class="verification-badge"></span>' : ''}
                  </div>
                </div>
                ${delBtnHtml}
              </div>
              <div class="comment-content">${linkedText}</div>
              <div class="comment-date">${date}</div>
              <div class="comment-actions">
                ${replyBtnHtml}
                ${toggleBtnHtml}
              </div>
              ${replyComposeHtml}
              ${repliesHtml}
            </div>
          `;
        }

        const listEl = document.getElementById('commentList');
        if (mainComments.length === 0) {
          listEl.innerHTML = '<div style="text-align:center; padding:32px; color:var(--t3); font-size:13px;">아직 댓글이 없습니다. 첫 댓글을 남겨보세요!</div>';
          return;
        }

        let html = '';
        mainComments.forEach(c => {
          html += renderOneComment(c, { showReplyButton: true });
        });
        listEl.innerHTML = html;

      } catch (e) {
        console.error('listenComments 오류:', e);
      }
    }

    async function getCommentById(commentId) {
      if (!commentId) return null;
      try {
        const rows = await api(`/comments?id=eq.${commentId}&select=user_id,user_name`);
        return rows?.[0] || null;
      } catch (e) { return null; }
    }

    function showLoginAlert() {
      const alert = document.getElementById('loginAlert');
      alert.classList.add('show');
      setTimeout(() => alert.classList.remove('show'), 3000);
      alert.onclick = () => window.location.href = 'login.html';
    }

    function initCurrentUser() {
      const saved = localStorage.getItem('snsUser');
      if (saved) {
        currentUser = JSON.parse(saved);
        updateSidebar();
      }
    }

    function updateSidebar() {
      const iframe = document.getElementById('sidebarFrame');
      if (iframe?.contentWindow) iframe.contentWindow.postMessage({ type: 'updateUser', user: currentUser }, '*');
    }

    function updateSidebarMode() {
      const iframe = document.getElementById('sidebarFrame');
      const narrow = window.innerWidth <= 768;
      if (iframe?.contentWindow) iframe.contentWindow.postMessage({ type: 'setNarrowMode', narrow }, '*');
    }

    window.addEventListener('message', (event) => {
      const { type, page } = event.data || {};
      if (type === 'navigate') {
        if (page === 'home') location.href = 'index.html';
        if (page === 'explore') location.href = 'explore.html';
      }
      if (type === 'logout') {
        localStorage.removeItem('snsUser');
        currentUser = null;
        location.href = 'index.html';
      }
      if (type === 'requestUserInfo') updateSidebar();
    });

    window.onSharerProfileLogout = function () {
      localStorage.removeItem('snsUser');
      currentUser = null;
      location.href = 'index.html';
    };

    document.getElementById('commentInput')?.addEventListener('focus', function() {
      if (!currentUser) {
        this.blur();
        showLoginAlert();
      }
    });

    initCurrentUser();
    updateSidebarMode();
    window.addEventListener('resize', updateSidebarMode);

    if (!postId) {
      showError('게시물 ID가 없습니다.');
    } else {
      loadPost(postId);
      listenComments(postId);
    }

    async function getProfileImage(userId) {
      if (!userId) return null;
      try {
        const users = await api(`/users?id=eq.${userId}&select=profile_image_url`);
        if (users && users.length > 0 && users[0].profile_image_url) {
          profileImages[userId] = users[0].profile_image_url;
          return users[0].profile_image_url;
        }
        return null;
      } catch (e) {
        return null;
      }
    }

    async function loadLikes(postId) {
      try {
        const likes = await api(`/likes?post_id=eq.${postId}&select=user_id`);
        updateLikeUI(likes || []);
      } catch (e) { console.error('loadLikes 오류:', e); }
    }

    function updateLikeUI(likes) {
      const btn = document.getElementById('likeBtn');
      const countEl = document.getElementById('likeCount');
      if (!btn || !countEl) return;
      countEl.textContent = likes.length;
      if (currentUser && likes.some(l => l.user_id === currentUser.id)) {
        btn.classList.add('liked');
      } else {
        btn.classList.remove('liked');
      }
    }

    window.toggleLike = async function() {
      if (!currentUser) return showLoginAlert();
      if (!currentPost) return;

      const btn = document.getElementById('likeBtn');
      const countEl = document.getElementById('likeCount');

      try {
        const [likeRecords, likeCountResult] = await Promise.all([
          api(`/likes?post_id=eq.${postId}&user_id=eq.${currentUser.id}&select=id`),
          api(`/likes?post_id=eq.${postId}&select=count`)
        ]);

        const currentlyLiked = likeRecords?.length > 0;
        const currentServerCount = Math.max(0, likeCountResult?.[0]?.count || 0);

        const uiLiked = btn.classList.contains('liked');
        const uiCount = parseInt(countEl.textContent, 10) || 0;

        if (uiLiked !== currentlyLiked || uiCount !== currentServerCount) {
          btn.classList.toggle('liked', currentlyLiked);
          countEl.textContent = currentServerCount;
        }

        if (currentlyLiked) {
          if (likeRecords?.[0]?.id) {
            await api(`/likes?id=eq.${likeRecords[0].id}`, { method: "DELETE" });
          }
          btn.classList.remove('liked');
          countEl.textContent = currentServerCount - 1;
        } else {
          await api("/likes", {
            method: "POST",
            body: JSON.stringify({ post_id: postId, user_id: currentUser.id })
          });
          btn.classList.add('liked');
          countEl.textContent = currentServerCount + 1;
        }
      } catch (e) { console.error('좋아요 토글 실패:', e); }
    };
  </script>
</body>
</html>
