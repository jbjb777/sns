<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시물 : Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    #nprogress .bar { background: #fff !important; height: 2px !important; }
    #nprogress .peg, #nprogress .spinner { display: none !important; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    .sidebar-container { width: 72px; min-width: 72px; height: 100vh; position: fixed; left: 0; top: 0; z-index: 100; }
    .sidebar-container iframe { width: 72px !important; height: 100%; border: none; }

    .main-wrapper { 
      margin-left: 72px; 
      width: calc(100% - 72px); 
      display: flex; 
      flex-direction: column; 
      min-height: 100vh;
    }

    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
      opacity: 0;
      transform: translateY(-10px);
      animation: slideDown 0.4s ease 0.1s forwards;
    }
    @keyframes slideDown { to { opacity: 1; transform: translateY(0); } }

    .back-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: none;
      background: none;
      color: var(--t2);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .back-btn:hover { color: var(--t1); background: var(--bg3); }
    .back-btn:active { transform: scale(0.82); }

    .header-title { font-size: 16px; font-weight: 600; color: var(--t1); }

    .container {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px 120px;
      flex: 1;
      opacity: 0;
      transform: translateY(12px);
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
    }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

    .post-detail-card { margin-bottom: 48px; }

    .post-detail-header {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-actions { display: flex; align-items: center; gap: 10px; }

    .author-info {
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .author-info:hover { opacity: 0.75; }

    .author-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      overflow: hidden;
      flex-shrink: 0;
      color: #666;
    }
    .author-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .author-details { display: flex; flex-direction: column; gap: 5px; }
    .author-name { font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 7px; letter-spacing: -0.3px; }
    .post-timestamp { font-size: 13px; color: var(--t3); }

    .verification-badge {
      display: inline-block;
      width: 14px; height: 14px;
      vertical-align: middle;
      background-image: url('https://sharer.jbjb.r-e.kr/badge.svg');
      background-repeat: no-repeat;
      background-size: contain;
    }

    .like-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: none;
      border: 1px solid var(--border2);
      color: var(--t2);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: 22px;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .like-btn:hover { border-color: var(--pink); color: var(--pink); background: rgba(255,107,107,0.06); }
    .like-btn.liked { border-color: var(--pink); color: var(--pink); background: rgba(255,107,107,0.08); }

    .delete-btn {
      background: transparent;
      border: 1px solid #2a1a1a;
      color: var(--pink);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      padding: 9px 16px;
      border-radius: 22px;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .delete-btn:hover { background: rgba(255,107,107,0.1); border-color: var(--pink); }

    /* 이미지 영역 */
    .post-images {
      margin: 28px 0;
      position: relative;
      border-radius: var(--r3);
      overflow: hidden;
    }
    .image-container {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      gap: 12px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .image-container::-webkit-scrollbar { display: none; }
    .image-container.single { justify-content: center; }

    .image-container img {
      width: 100%;
      max-height: 620px;
      object-fit: contain;
      background: #000;
      border-radius: var(--r3);
      border: 1px solid var(--border);
      scroll-snap-align: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .image-container img:hover { transform: scale(1.02); }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
      z-index: 10;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .nav-btn:hover { background: rgba(0,0,0,0.9); }
    .nav-btn.left { left: 12px; }
    .nav-btn.right { right: 12px; }
    .post-images:hover .nav-btn { display: flex; }

    /* 이미지 모달 */
    #imageModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.97);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20000;
    }
    #modalImageContainer {
      position: relative;
      max-width: 96%;
      max-height: 96vh;
    }
    #modalImage {
      max-width: 100%;
      max-height: 96vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }
    .modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.2);
      color: white;
      border: none;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      font-size: 28px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-nav:hover { background: rgba(255,255,255,0.35); }
    .modal-nav.left { left: -80px; }
    .modal-nav.right { right: -80px; }
    .modal-close {
      position: absolute;
      top: -70px;
      right: 10px;
      background: none;
      border: none;
      color: #fff;
      font-size: 38px;
      cursor: pointer;
      line-height: 1;
    }

    .post-detail-content { padding: 16px 0 32px; }
    .post-text {
      font-size: 15px;
      line-height: 1.8;
      color: var(--t1);
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .post-text a { color: #888; text-decoration: underline; text-underline-offset: 3px; }
    .post-text a:hover { color: var(--t1); }

    .share-container {
      padding: 24px 0;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .share-label { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--t3); }
    .share-box-wrapper { display: flex; gap: 10px; align-items: center; }
    .share-url-box {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border2);
      padding: 11px 16px;
      border-radius: var(--r2);
      font-size: 13px;
      color: var(--t2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .copy-btn {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--t2);
      width: 42px; height: 42px;
      border-radius: var(--r2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .copy-btn:hover { background: var(--bg4); color: var(--t1); }
    .copy-btn.success { background: rgba(74,222,80,0.12); border-color: var(--green); color: var(--green); }

    .comment-section { padding: 32px 0; }
    .comment-input-wrapper { display: flex; gap: 10px; margin-bottom: 32px; }
    .comment-input {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r2);
      padding: 12px 16px;
      color: var(--t1);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 48px;
      max-height: 180px;
      line-height: 1.5;
    }
    .comment-input:focus { outline: none; border-color: var(--border3); background: var(--bg3); }
    .comment-input::placeholder { color: var(--t3); }

    .comment-submit-btn {
      background: #fff;
      border: none;
      color: #000;
      padding: 0 20px;
      border-radius: var(--r2);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }

    .footer {
      border-top: 1px solid var(--border);
      padding: 28px 24px 60px;
      text-align: center;
      color: var(--t3);
      font-size: 12px;
      line-height: 1.6;
      margin-top: auto;
    }
    .footer-links {
      margin-bottom: 14px;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .footer-links a { color: var(--t3); text-decoration: none; }
    .footer-links a:hover { color: var(--t2); }

    @media (max-width: 768px) {
      .sidebar-container { left: 0; right: 0; top: auto; bottom: 0; width: 100%; height: calc(64px + env(safe-area-inset-bottom, 0px)); }
      .main-wrapper { margin-left: 0; width: 100%; padding-bottom: calc(64px + env(safe-area-inset-bottom, 0px)); }
      .container { padding: 20px 16px 140px; }
      .post-detail-header { flex-direction: column; align-items: flex-start; gap: 16px; }
      .header-actions { align-self: flex-end; }
      .nav-btn { width: 38px; height: 38px; font-size: 18px; }
      .modal-nav { width: 48px; height: 48px; font-size: 24px; left: -60px; right: -60px; }
    }
  </style>
</head>
<body>
  <!-- SPLASH -->
  <div id="splash">
    <img src="logo.svg" class="splash-logo" alt="Sharer">
  </div>

  <!-- 로그인 알림 -->
  <div class="login-alert" id="loginAlert">
    <span>로그인 후 사용 가능합니다</span>
  </div>

  <!-- 삭제 모달 -->
  <div class="delete-modal-overlay" id="deleteModal">
    <div class="delete-modal">
      <img src="careful.png" alt="주의">
      <div class="delete-modal-title">정말로 삭제하시겠습니까?</div>
      <div class="delete-modal-buttons">
        <button class="delete-modal-btn cancel" onclick="closeDeleteModal()">취소</button>
        <button class="delete-modal-btn delete" id="confirmDeleteBtn">삭제</button>
      </div>
    </div>
  </div>

  <div class="sidebar-container">
    <iframe src="sidebar.html" id="sidebarFrame" width="72" height="100%" frameborder="0"></iframe>
  </div>

  <div id="sharerProfileSheetHost" class="sharer-profile-sheet-host" hidden></div>

  <div class="main-wrapper">
    <div class="header">
      <button class="back-btn" onclick="goHome()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M19 12H5M5 12l7-7M5 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="header-title">게시물</div>
    </div>

    <div class="container">
      <div id="postContent"></div>
      <div class="comment-section">
        <div class="comment-input-wrapper">
          <textarea id="commentInput" class="comment-input" placeholder="댓글을 입력하세요 (최대 500자)" maxlength="500"></textarea>
          <button class="comment-submit-btn" onclick="addComment()">업로드</button>
        </div>
        <div id="commentList" class="comment-list"></div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-links">
        <a href="#" onclick="showPrivacyPolicy(); return false;">개인정보처리방침</a>
        <a href="#" onclick="showTerms(); return false;">이용약관</a>
        <a href="mailto:alexeom97@outlook.com">문의하기</a>
      </div>
      <div>본 서비스는 대한민국의 중2 개발자 1인이 만든 프로젝트입니다.<br>모든 소스 코드 및 파일의 출처는 전적으로 개발자에게 있음을 알립니다.</div>
    </div>
  </div>

  <!-- 이미지 확대 모달 -->
  <div id="imageModal">
    <div id="modalImageContainer">
      <button class="modal-nav left" onclick="prevModalImage()">‹</button>
      <img id="modalImage" alt="확대된 이미지">
      <button class="modal-nav right" onclick="nextModalImage()">›</button>
      <button class="modal-close" onclick="closeImageModal()">×</button>
    </div>
  </div>

<script src="markdown.js"></script>
<script>
  NProgress.configure({ minimum: 0.08, trickleSpeed: 200, showSpinner: false });

  // Splash
  (function () {
    const splash = document.getElementById('splash');
    function finishSplash() {
      splash.classList.add('fade-out');
      setTimeout(() => { splash.style.display = 'none'; }, 460);
    }
    if (sessionStorage.getItem('splashShown')) {
      splash.style.display = 'none';
    } else {
      sessionStorage.setItem('splashShown', 'true');
      const splashStart = Date.now();
      window.addEventListener('load', () => {
        const elapsed = Date.now() - splashStart;
        setTimeout(finishSplash, Math.max(0, 2000 - elapsed));
      });
    }
  })();

  const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";

  async function api(endpoint, options = {}) {
    const url = API_BASE + endpoint;
    const res = await fetch(url, {
      ...options,
      headers: {
        "Content-Type": "application/json",
        ...(options.headers || {}),
      },
    });
    if (!res.ok) {
      let errorText = "Unknown error";
      try { errorText = await res.text(); } catch {}
      throw new Error(`API 오류 (${res.status}): ${errorText}`);
    }
    if (res.status === 204) return null;
    const text = await res.text();
    if (!text) return null;
    try { return JSON.parse(text); } catch { return null; }
  }

  let currentUser = JSON.parse(localStorage.getItem('snsUser')) || null;
  let currentPost = null;
  let pendingDeletePostId = null;
  let currentImages = [];
  let currentImageIndex = 0;

  const urlParams = new URLSearchParams(window.location.search);
  const postId = urlParams.get('id');

  function showLoginAlert() {
    const alert = document.getElementById('loginAlert');
    alert.classList.add('show');
    setTimeout(() => alert.classList.remove('show'), 3000);
    alert.onclick = () => window.location.href = 'login.html';
  }

  async function getProfileImage(userId) {
    if (!userId) return null;
    try {
      const users = await api(`/users?id=eq.${userId}&select=profile_image`);
      return users?.[0]?.profile_image || null;
    } catch (e) { return null; }
  }

  // 이미지 렌더링 (가로 스크롤 + 모달)
  function renderImages(imageUrl) {
    if (!imageUrl) return '';
    const urls = imageUrl.split(',').map(url => url.trim()).filter(Boolean);
    currentImages = urls;

    if (urls.length === 0) return '';

    let html = `<div class="post-images">`;
    html += `<div class="image-container ${urls.length === 1 ? 'single' : ''}">`;

    urls.forEach((url, index) => {
      html += `<img src="${url}" alt="게시물 이미지" loading="lazy" onclick="openImageModal(${index})">`;
    });

    html += `</div>`;

    if (urls.length > 1) {
      html += `
        <button class="nav-btn left" onclick="scrollImages(-1)">‹</button>
        <button class="nav-btn right" onclick="scrollImages(1)">›</button>`;
    }

    html += `</div>`;
    return html;
  }

  window.openImageModal = function(index) {
    currentImageIndex = index;
    document.getElementById('imageModal').style.display = 'flex';
    document.getElementById('modalImage').src = currentImages[index];
    document.body.style.overflow = 'hidden';
  };

  window.prevModalImage = function() {
    currentImageIndex = (currentImageIndex - 1 + currentImages.length) % currentImages.length;
    document.getElementById('modalImage').src = currentImages[currentImageIndex];
  };

  window.nextModalImage = function() {
    currentImageIndex = (currentImageIndex + 1) % currentImages.length;
    document.getElementById('modalImage').src = currentImages[currentImageIndex];
  };

  window.closeImageModal = function() {
    document.getElementById('imageModal').style.display = 'none';
    document.body.style.overflow = '';
  };

  window.scrollImages = function(direction) {
    const container = document.querySelector('.image-container');
    if (container) {
      const scrollAmount = container.clientWidth * 0.8;
      container.scrollBy({ left: scrollAmount * direction, behavior: 'smooth' });
    }
  };

  async function loadPost(postId) {
    try {
      const posts = await api(`/posts?id=eq.${postId}&select=*`);
      if (!posts?.length) {
        showError('게시물을 찾을 수 없습니다.');
        return;
      }
      const post = posts[0];
      const authorProfileImage = await getProfileImage(post.author_id);
      currentPost = { ...post, author_profile_image: authorProfileImage };
      displayPost(currentPost);
      loadLikes(postId);
    } catch (e) {
      console.error('loadPost 오류:', e);
      showError('게시물 로드 중 오류가 발생했습니다.');
    }
  }

  function displayPost(post) {
    const contentDiv = document.getElementById('postContent');
    const timeStr = new Date(post.created_at).toLocaleString('ko-KR', {
      year: 'numeric', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit'
    });
    const isVerified = ["JB777", "진정오"].includes(post.author);
    const canDelete = currentUser && (
      currentUser.nickname === post.author ||
      currentUser.id === post.author_id ||
      (currentUser.nickname === "JB777" && currentUser.isVerified)
    );

    let avatarContent = post.author ? post.author[0].toUpperCase() : '?';
    if (post.author_profile_image) {
      avatarContent = `<img src="${post.author_profile_image}?v=${Date.now()}" alt="${escapeHtml(post.author)}">`;
    }

    const linkedContent = parseMarkdown(post.content || '');

    contentDiv.innerHTML = `
      <div class="post-detail-card">
        <div class="post-detail-header">
          <div class="author-info" onclick="goToProfile('${post.author_id}', '${escapeHtml(post.author)}')">
            <div class="author-avatar">${avatarContent}</div>
            <div class="author-details">
              <div class="author-name">
                ${escapeHtml(post.author)}
                ${isVerified ? '<span class="verification-badge"></span>' : ''}
              </div>
              <div class="post-timestamp">${timeStr}</div>
            </div>
          </div>
          <div class="header-actions">
            <button class="like-btn" id="likeBtn" onclick="toggleLike()">
              <svg class="like-heart" width="16" height="16" viewBox="0 0 2300 2300" xmlns="http://www.w3.org/2000/svg">
                <path fill="currentColor" d="M 2169.75708 1273.707397 C 2082.986328 1435.051758 1959.814697 1592.116455 1800.239746 1744.902832 C 1640.756348 1897.699951 1451.88208 2043.705688 1233.619141 2182.920898 C 1220.223145 2191.470215 1206.115234 2198.850586 1191.452637 2204.979248 C 1165.430908 2218.340332 1134.569092 2218.340332 1108.547363 2204.979248 C 1093.884766 2198.850586 1079.776855 2191.470215 1066.380859 2182.920898 C 848.148438 2043.693726 659.267578 1897.687988 499.74292 1744.902832 C 340.21582 1592.116455 217.04187 1435.051758 130.216797 1273.707397 C 43.415771 1112.370728 0 944.232666 0 779.5177 C 0 642.959229 28.581055 527.005981 85.715088 421.457642 C 139.349243 319.653564 219.24231 234.056396 317.106201 173.547607 C 414.637207 113.417725 527.301025 82.374756 641.860352 84.066162 C 755.30127 84.066162 858.310303 112.998535 943.981934 171.086914 C 1030.09082 228.040771 1100.847168 305.330322 1150 396.127686 C 1199.152832 305.330322 1269.90918 228.040771 1356.018066 171.086914 C 1441.689697 112.998535 1544.744385 84.066162 1658.139648 84.066162 C 1772.703369 82.367188 1885.371582 113.411133 1982.904785 173.547607 C 2080.76001 234.048828 2160.637695 319.64917 2214.239258 421.457642 C 2271.384033 527.005981 2300 642.959229 2300 779.5177 C 2300 944.232666 2256.584229 1112.370728 2169.75708 1273.707397 Z"/>
              </svg>
              <span id="likeCount">0</span>
            </button>
            ${canDelete ? `<button class="delete-btn" onclick="openDeleteModal('${postId}')">삭제</button>` : ''}
          </div>
        </div>
        ${renderImages(post.image_url)}
        <div class="post-detail-content">
          <div class="post-text">${linkedContent}</div>
        </div>
        <div class="share-container">
          <div class="share-label">게시물 공유</div>
          <div class="share-box-wrapper">
            <div class="share-url-box">${window.location.href}</div>
            <button class="copy-btn" id="copyBtn" onclick="copyShareLink()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>
    `;
  }

  async function loadLikes(postId) {
    try {
      const likes = await api(`/likes?post_id=eq.${postId}&select=user_id`);
      updateLikeUI(likes || []);
    } catch (e) { console.error('loadLikes 오류:', e); }
  }

  function updateLikeUI(likes) {
    const btn = document.getElementById('likeBtn');
    const countEl = document.getElementById('likeCount');
    if (!btn || !countEl) return;
    countEl.textContent = likes.length;
    if (currentUser && likes.some(l => l.user_id === currentUser.id)) {
      btn.classList.add('liked');
    } else {
      btn.classList.remove('liked');
    }
  }

  window.toggleLike = async function() {
    if (!currentUser) return showLoginAlert();
    if (!currentPost) return;

    const btn = document.getElementById('likeBtn');
    const countEl = document.getElementById('likeCount');

    try {
      const [likeRecords, likeCountResult] = await Promise.all([
        api(`/likes?post_id=eq.${postId}&user_id=eq.${currentUser.id}&select=id`),
        api(`/likes?post_id=eq.${postId}&select=count`)
      ]);

      const currentlyLiked = likeRecords?.length > 0;
      const currentServerCount = Math.max(0, likeCountResult?.[0]?.count || 0);

      if (currentlyLiked) {
        if (likeRecords?.[0]?.id) {
          await api(`/likes?id=eq.${likeRecords[0].id}`, { method: "DELETE" });
        }
        btn.classList.remove('liked');
        countEl.textContent = currentServerCount - 1;
      } else {
        await api("/likes", {
          method: "POST",
          body: JSON.stringify({ post_id: postId, user_id: currentUser.id })
        });
        btn.classList.add('liked');
        countEl.textContent = currentServerCount + 1;
        createNotification(currentPost.author_id, `${currentUser.nickname}님이 좋아요를 눌렀습니다`, `view.html?id=${postId}`);
      }

      const finalCount = await api(`/likes?post_id=eq.${postId}&select=count`);
      countEl.textContent = Math.max(0, finalCount?.[0]?.count || 0);
    } catch (err) {
      console.error("좋아요 처리 오류:", err);
    }
  };

  async function createNotification(targetUserId, detail, link) {
    if (!targetUserId || targetUserId === currentUser?.id) return;
    try {
      await api("/notification", {
        method: "POST",
        body: JSON.stringify({
          user: targetUserId,
          detail,
          link,
          isread: 0,
          created_at: new Date().toISOString()
        })
      });
    } catch (e) {}
  }

  async function listenComments(postId) {
    try {
      const comments = await api(`/comments?post_id=eq.${postId}&select=*&order=created_at.desc`);
      const userIds = [...new Set(comments.map(c => c.user_id))];
      const profileImages = {};
      await Promise.all(userIds.map(async (uid) => {
        const img = await getProfileImage(uid);
        if (img) profileImages[uid] = img;
      }));
      displayComments(comments || [], profileImages);
    } catch (e) { console.error('댓글 로드 오류:', e); }
  }

  function displayComments(comments, profileImages = {}) {
    const list = document.getElementById('commentList');
    list.innerHTML = '';

    if (comments.length === 0) {
      list.innerHTML = '<div style="text-align:center; color:var(--t3); padding:48px 20px; font-size:14px;">아직 댓글이 없습니다. 첫 댓글을 남겨보세요!</div>';
      return;
    }

    // 여기서는 간단한 버전으로 처리 (답글 기능은 원하시면 추가 가능)
    comments.forEach(c => {
      const isMine = currentUser?.id === c.user_id;
      const date = new Date(c.created_at).toLocaleString('ko-KR', {
        year: 'numeric', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
      const isVerified = ["JB777", "진정오"].includes(c.user_name);
      let avatar = c.user_name ? c.user_name[0].toUpperCase() : '?';
      if (profileImages[c.user_id]) {
        avatar = `<img src="${profileImages[c.user_id]}?v=${Date.now()}" alt="${c.user_name}">`;
      }

      const item = document.createElement('div');
      item.className = 'comment-item';
      item.innerHTML = `
        <div class="comment-header">
          <div class="comment-author-wrapper" onclick="goToProfile('${c.user_id}', '${escapeHtml(c.user_name)}')">
            <div class="comment-avatar">${avatar}</div>
            <span class="comment-author">
              ${escapeHtml(c.user_name)}
              ${isVerified ? '<span class="verification-badge" style="width:12px;height:12px;"></span>' : ''}
            </span>
          </div>
          ${isMine ? `<button class="comment-del-btn" onclick="deleteComment('${c.id}')">삭제</button>` : ''}
        </div>
        <div class="comment-content">${parseMarkdown(c.text)}</div>
        <div class="comment-date">${date}</div>
      `;
      list.appendChild(item);
    });
  }

  window.addComment = async function() {
    const input = document.getElementById('commentInput');
    const text = input.value.trim();
    if (!currentUser) return showLoginAlert();
    if (!text || !currentPost) return;

    try {
      await api("/comments", {
        method: "POST",
        body: JSON.stringify({
          post_id: postId,
          user_id: currentUser.id,
          user_name: currentUser.nickname,
          text,
          parent_id: null,
          created_at: new Date().toISOString()
        })
      });
      createNotification(currentPost.author_id, `${currentUser.nickname}님이 댓글을 남겼습니다`, `view.html?id=${postId}`);
      input.value = '';
      listenComments(postId);
    } catch (e) { alert('댓글 작성 실패'); }
  };

  window.deleteComment = async function(commentId) {
    if (!confirm('댓글을 삭제하시겠습니까?')) return;
    try {
      await api(`/comments?id=eq.${commentId}`, { method: "DELETE" });
      listenComments(postId);
    } catch (e) { alert('댓글 삭제 실패'); }
  };

  window.copyShareLink = function() {
    navigator.clipboard.writeText(window.location.href).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.classList.add('success');
      setTimeout(() => btn.classList.remove('success'), 1500);
    });
  };

  window.goHome = () => window.location.href = "index.html";
  window.showPrivacyPolicy = () => window.location.href = "privacy.html";
  window.showTerms = () => window.location.href = "policy.html";

  window.openDeleteModal = function(id) {
    pendingDeletePostId = id;
    document.getElementById('deleteModal').classList.add('show');
    document.body.style.overflow = 'hidden';
  };

  window.closeDeleteModal = function() {
    document.getElementById('deleteModal').classList.remove('show');
    document.body.style.overflow = '';
    pendingDeletePostId = null;
  };

  document.getElementById('confirmDeleteBtn').onclick = async () => {
    if (!pendingDeletePostId) return;
    try {
      await api(`/comments?post_id=eq.${pendingDeletePostId}`, { method: "DELETE" });
      await api(`/likes?post_id=eq.${pendingDeletePostId}`, { method: "DELETE" });
      await api(`/posts?id=eq.${pendingDeletePostId}`, { method: "DELETE" });
      window.location.href = 'index.html';
    } catch (e) { alert('게시물 삭제 실패'); }
  };

  window.goToProfile = function(userId, nickname) {
    window.location.href = `user.html?id=${userId}&nickname=${encodeURIComponent(nickname)}`;
  };

  function showError(msg) {
    document.getElementById('postContent').innerHTML = `
      <div style="padding:80px 20px; text-align:center;">
        <div style="color:var(--pink); font-size:15px; margin-bottom:20px;">${msg}</div>
        <button onclick="window.history.back()" style="background:#fff; color:#000; border:none; padding:12px 28px; border-radius:var(--r2); font-size:13px; font-weight:600; cursor:pointer;">돌아가기</button>
      </div>
    `;
  }

  function escapeHtml(unsafe) {
    return unsafe
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  // ESC 키로 모달 닫기
  document.addEventListener('keydown', (e) => {
    if (e.key === "Escape") {
      const modal = document.getElementById('imageModal');
      if (modal.style.display === 'flex') closeImageModal();
    }
  });

  // 초기화
  if (!postId) {
    showError('게시물 ID가 없습니다.');
  } else {
    loadPost(postId);
    listenComments(postId);
  }
</script>
<script src="sharer-profile-sheet-host.js"></script>
</body>
