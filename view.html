<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시물 - Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.png">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #0a0a0a;
      --bg3: #111;
      --bg4: #1a1a1a;
      --border: #222;
      --border2: #333;
      --text1: #fff;
      --text2: #aaa;
      --text3: #666;
      --pink: #ff4d7e;
      --green: #4ade80;
      --r2: 14px;
      --r4: 24px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text1);
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
    }

    .sidebar-container {
      width: 250px; min-width: 250px;
      height: 100vh; position: fixed; left: 0; top: 0; z-index: 100;
    }
    .sidebar-container iframe { width: 250px !important; height: 100%; border: none; }

    .main-wrapper {
      margin-left: 250px;
      width: calc(100% - 250px);
      display: flex; flex-direction: column; min-height: 100vh;
    }

    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex; align-items: center; gap: 16px;
      position: sticky; top: 0; z-index: 50;
    }
    .back-btn {
      background: none; border: none; color: var(--text2);
      font-size: 28px; cursor: pointer; padding: 6px 12px;
      border-radius: var(--r2); transition: all 0.25s;
    }
    .back-btn:hover { color: var(--text1); background: rgba(255,255,255,0.08); }

    .header-title { font-size: 19px; font-weight: 600; }

    .container {
      max-width: 920px; width: 100%; margin: 0 auto;
      padding: 30px 24px; flex: 1;
    }

    .post-detail-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r4);
      overflow: hidden;
    }

    .post-detail-header {
      padding: 24px 28px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .author-info {
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
    }
    .author-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--bg4); overflow: hidden;
      border: 2px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 600;
    }
    .author-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .author-name {
      font-weight: 600; font-size: 17px;
      display: flex; align-items: center; gap: 6px;
    }

    .post-timestamp { font-size: 13.5px; color: var(--text3); }

    .verification-badge {
      width: 18px; height: 18px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:%23ff00ff;stop-opacity:1" /><stop offset="100%" style="stop-color:%23ff0066;stop-opacity:1" /></linearGradient></defs><path fill="url(%23grad)" d="M512 0 L1024 295 L1024 729 L512 1024 L0 729 L0 295 Z"/><path fill="white" d="M256 512 L384 640 L768 256 L832 320 L384 768 L192 576 Z"/></svg>') center/contain no-repeat;
    }

    .post-detail-image {
      width: 100%; max-height: 680px; object-fit: cover;
    }

    .post-detail-content {
      padding: 32px 28px;
      font-size: 16.2px; line-height: 1.78;
      white-space: pre-wrap;
    }

    .header-actions { display: flex; gap: 12px; }

    .like-button {
      background: transparent; border: 1px solid var(--border);
      color: var(--text2); padding: 10px 22px;
      border-radius: 9999px; display: flex; align-items: center; gap: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: all 0.25s;
    }
    .like-button:hover { border-color: #fff; color: #fff; }
    .like-button.liked { background: #fff; color: #000; border-color: #fff; }

    .share-container {
      padding: 28px; border-top: 1px solid var(--border); background: var(--bg3);
    }

    .share-box-wrapper {
      display: flex; gap: 12px; align-items: center;
    }
    .share-url-box {
      flex: 1; background: var(--bg4); border: 1px solid var(--border);
      padding: 14px 18px; border-radius: var(--r2);
      font-size: 14.5px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .copy-btn {
      background: #fff; color: #000; border: none;
      width: 54px; height: 54px; border-radius: var(--r2);
      cursor: pointer; transition: all 0.3s;
      display: flex; align-items: center; justify-content: center;
    }

    /* Custom Toast */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: var(--bg2); border: 1px solid var(--border);
      padding: 14px 24px; border-radius: 9999px;
      color: var(--text1); font-size: 15px; font-weight: 500;
      display: none; align-items: center; gap: 12px;
      z-index: 20000; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      animation: toastPop 0.4s;
    }
    @keyframes toastPop { from { opacity:0; transform: translate(-50%, -20px); } to { opacity:1; transform: translate(-50%, 0); } }

    /* Delete Modal */
    .delete-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px); display: none;
      align-items: center; justify-content: center; z-index: 10000;
    }
    .delete-modal-overlay.show { display: flex; }

    .delete-modal {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r4); padding: 40px 36px; text-align: center;
      max-width: 400px;
    }
    .delete-modal-title { font-size: 20px; font-weight: 600; margin: 20px 0 32px; }
    .delete-modal-buttons { display: flex; gap: 12px; justify-content: center; }
    .delete-modal-btn {
      padding: 12px 32px; border-radius: 9999px; font-weight: 600; cursor: pointer;
    }
    .delete-modal-btn.cancel { background: var(--bg4); color: var(--text2); }
    .delete-modal-btn.delete { background: var(--pink); color: white; }

    .footer {
      border-top: 1px solid var(--border); padding: 32px; text-align: center;
      color: var(--text3); font-size: 12.5px;
    }

    @media (max-width: 768px) {
      .sidebar-container { width: 80px; min-width: 80px; }
      .main-wrapper { margin-left: 80px; width: calc(100% - 80px); }
      .container { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <div class="sidebar-container">
    <iframe src="sidebar.html" id="sidebarFrame" frameborder="0"></iframe>
  </div>

  <div class="main-wrapper">
    <div class="header">
      <button class="back-btn" onclick="goHome()">←</button>
      <div class="header-title">게시물</div>
    </div>

    <div class="container">
      <div id="postContent"></div>

      <div class="comment-section" style="padding:28px;background:var(--bg2);">
        <div class="comment-input-wrapper" style="display:flex;gap:12px;margin-bottom:36px;">
          <textarea id="commentInput" class="comment-input" style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:16px 20px;color:var(--text1);font-size:15.5px;resize:vertical;min-height:58px;" placeholder="댓글을 입력하세요..."></textarea>
          <button class="comment-submit-btn" onclick="addComment()" style="background:#fff;color:#000;border:none;padding:0 32px;border-radius:var(--r2);font-weight:600;cursor:pointer;">업로드</button>
        </div>
        <div id="commentList" class="comment-list"></div>
      </div>
    </div>

    <div class="footer">© 2025 ㋡꧁정빈777꧂ Sharer. All rights reserved.</div>
  </div>

  <!-- Delete Modal -->
  <div class="delete-modal-overlay" id="deleteModal">
    <div class="delete-modal">
      <div class="delete-modal-title">정말로 삭제하시겠습니까?</div>
      <div class="delete-modal-buttons">
        <button class="delete-modal-btn cancel" onclick="closeDeleteModal()">취소</button>
        <button class="delete-modal-btn delete" id="confirmDeleteBtn">삭제</button>
      </div>
    </div>
  </div>

  <!-- Custom Toast -->
  <div class="toast" id="toast">
    <span id="toastText"></span>
  </div>

<script>
  const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";

  async function api(endpoint, options = {}) {
    const res = await fetch(API_BASE + endpoint, {
      ...options,
      headers: { "Content-Type": "application/json", ...(options.headers || {}) }
    });
    if (!res.ok) throw new Error(`API Error ${res.status}`);
    if (res.status === 204) return null;
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  let currentUser = JSON.parse(localStorage.getItem('snsUser')) || null;
  let currentPost = null;
  let pendingDeletePostId = null;
  const postId = new URLSearchParams(window.location.search).get('id');

  function showToast(message, duration = 2500) {
    const toast = document.getElementById('toast');
    document.getElementById('toastText').textContent = message;
    toast.style.display = 'flex';
    setTimeout(() => { toast.style.display = 'none'; }, duration);
  }

  function updateSidebar() {
    const iframe = document.getElementById('sidebarFrame');
    if (iframe?.contentWindow) iframe.contentWindow.postMessage({ type: 'updateUser', user: currentUser }, '*');
  }

  async function loadPost() {
    if (!postId) return showToast("게시물 ID가 없습니다.");

    try {
      const posts = await api(`/posts?id=eq.${postId}&select=*`);
      if (!posts?.length) return showToast("게시물을 찾을 수 없습니다.");

      currentPost = posts[0];

      // 프로필 이미지 불러오기
      if (currentPost.author_id) {
        const userData = await api(`/users?id=eq.${currentPost.author_id}&select=profile_image`);
        if (userData?.[0]?.profile_image) {
          currentPost.author_profile_image = userData[0].profile_image;
        }
      }

      displayPost();
      loadLikes();
      listenComments();
    } catch (e) {
      console.error(e);
      showToast("게시물을 불러오는 중 오류가 발생했습니다.");
    }
  }

  function displayPost() {
    const container = document.getElementById('postContent');
    const isVerified = ["JB777", "진정오"].includes(currentPost.author);
    const canDelete = currentUser && (currentUser.nickname === "JB777" || currentUser.id === currentPost.author_id);

    const avatarHTML = currentPost.author_profile_image 
      ? `<img src="${currentPost.author_profile_image}" alt="${currentPost.author}">`
      : `<span>${currentPost.author ? currentPost.author[0].toUpperCase() : '?'}</span>`;

    container.innerHTML = `
      <div class="post-detail-card">
        <div class="post-detail-header">
          <div class="author-info" onclick="goToProfile('${currentPost.author_id}', '${encodeURIComponent(currentPost.author)}')">
            <div class="author-avatar">${avatarHTML}</div>
            <div>
              <div class="author-name">
                ${currentPost.author}
                ${isVerified ? '<span class="verification-badge"></span>' : ''}
              </div>
              <div class="post-timestamp">${new Date(currentPost.created_at).toLocaleString('ko-KR')}</div>
            </div>
          </div>
          <div class="header-actions">
            <button class="like-button" id="likeBtn" onclick="toggleLike()">
              ❤️ <span id="likeCount">0</span>
            </button>
            ${canDelete ? `<button class="delete-btn" onclick="openDeleteModal('${postId}')" style="background:transparent;border:1px solid #ff4d7e;color:#ff4d7e;padding:10px 22px;border-radius:9999px;font-size:14px;font-weight:600;cursor:pointer;">삭제</button>` : ''}
          </div>
        </div>

        ${currentPost.image_url ? `<img src="${currentPost.image_url}" class="post-detail-image" alt="게시물 이미지">` : ''}

        <div class="post-detail-content">
          ${currentPost.content ? currentPost.content.replace(/\n/g, '<br>') : ''}
        </div>

        <div class="share-container">
          <div class="share-box-wrapper">
            <div class="share-url-box">${window.location.href}</div>
            <button class="copy-btn" id="copyBtn" onclick="copyShareLink()">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </button>
          </div>
        </div>
      </div>
    `;
  }

  async function loadLikes() {
    try {
      const likes = await api(`/likes?post_id=eq.${postId}&select=user_id`);
      const count = likes ? likes.length : 0;
      const liked = currentUser && likes.some(l => l.user_id === currentUser.id);
      document.getElementById('likeCount').textContent = count;
      document.getElementById('likeBtn').classList.toggle('liked', liked);
    } catch (e) {}
  }

  window.toggleLike = async function() {
    if (!currentUser) return showToast("로그인 후 이용해주세요.");
    try {
      const existing = await api(`/likes?post_id=eq.${postId}&user_id=eq.${currentUser.id}`);
      if (existing?.length) {
        await api(`/likes?id=eq.${existing[0].id}`, { method: "DELETE" });
      } else {
        await api("/likes", { method: "POST", body: JSON.stringify({ post_id: postId, user_id: currentUser.id }) });
      }
      loadLikes();
    } catch (e) { showToast("오류가 발생했습니다."); }
  };

  async function listenComments() {
    try {
      const comments = await api(`/comments?post_id=eq.${postId}&order=created_at.desc`);
      const list = document.getElementById('commentList');
      list.innerHTML = comments?.length 
        ? '' 
        : `<div style="text-align:center;padding:80px 20px;color:#666;font-size:15.5px;">아직 댓글이 없습니다.<br>첫 댓글을 남겨보세요 ✨</div>`;

      comments.forEach(c => {
        const item = document.createElement('div');
        item.style.display = 'flex'; item.style.gap = '14px'; item.style.marginBottom = '32px';
        item.innerHTML = `
          <div style="width:42px;height:42px;border-radius:50%;background:#222;overflow:hidden;border:1px solid #333;">${c.user_name?.[0]?.toUpperCase() || '?'}</div>
          <div style="flex:1">
            <div style="font-weight:600;margin-bottom:6px;">${c.user_name}</div>
            <div style="font-size:15.2px;line-height:1.7;">${c.text.replace(/\n/g, '<br>')}</div>
            <div style="font-size:12.5px;color:#666;margin-top:8px;">${new Date(c.created_at).toLocaleString('ko-KR', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
          </div>
          ${currentUser?.id === c.user_id ? `<button onclick="deleteComment('${c.id}')" style="color:#ff4d7e;background:none;border:none;cursor:pointer;font-size:13px;">삭제</button>` : ''}
        `;
        list.appendChild(item);
      });
    } catch (e) {}
  }

  window.addComment = async function() {
    const input = document.getElementById('commentInput');
    const text = input.value.trim();
    if (!text) return;
    if (!currentUser) return showToast("로그인 후 댓글을 작성해주세요.");

    try {
      await api("/comments", {
        method: "POST",
        body: JSON.stringify({
          post_id: postId,
          user_id: currentUser.id,
          user_name: currentUser.nickname,
          text,
          created_at: new Date().toISOString()
        })
      });
      input.value = '';
      listenComments();
    } catch (e) { showToast("댓글 작성 실패"); }
  };

  window.deleteComment = async function(id) {
    if (!confirm("댓글을 삭제하시겠습니까?")) return;
    await api(`/comments?id=eq.${id}`, { method: "DELETE" });
    listenComments();
  };

  window.openDeleteModal = function(id) {
    pendingDeletePostId = id;
    document.getElementById('deleteModal').classList.add('show');
  };

  window.closeDeleteModal = function() {
    document.getElementById('deleteModal').classList.remove('show');
  };

  document.getElementById('confirmDeleteBtn').onclick = async () => {
    if (!pendingDeletePostId) return;
    try {
      await api(`/posts?id=eq.${pendingDeletePostId}`, { method: "DELETE" });
      showToast("게시물이 삭제되었습니다.");
      setTimeout(() => window.location.href = 'index.html', 1200);
    } catch (e) { showToast("삭제 실패"); }
  };

  window.copyShareLink = function() {
    navigator.clipboard.writeText(window.location.href).then(() => {
      const btn = document.getElementById('copyBtn');
      const originalHTML = btn.innerHTML;

      btn.innerHTML = `
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      `;
      btn.style.background = '#4ade80';
      btn.style.color = '#000';

      setTimeout(() => {
        btn.innerHTML = originalHTML;
        btn.style.background = '#fff';
        btn.style.color = '#000';
      }, 1500);
    });
  };

  window.goToProfile = function(id, nick) {
    window.location.href = `user.html?id=${id}&nickname=${nick}`;
  };

  window.goHome = () => window.location.href = "index.html";

  // Init
  updateSidebar();
  if (postId) loadPost();
  else showToast("잘못된 접근입니다.");
</script>
</body>
</html>
