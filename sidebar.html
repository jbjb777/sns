<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent !important;
  height: 100vh;
  overflow: hidden;
}

/* ─── 데스크탑 사이드바 ─── */
.sidebar {
  width: 72px !important;
  max-width: 72px !important;
  min-width: 72px !important;
  height: 100vh;
  background: transparent;
  border-right: none;
  padding: 16px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-y: auto;
  overflow-x: hidden;
  box-sizing: border-box;
  position: relative;
  scrollbar-width: thin;
  scrollbar-color: #444 transparent;
}

/* ─── 모바일 하단 탭바 ─── */
.bottom-bar {
  display: none;                    /* 기본은 숨김 */
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  height: 60px;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.07);
  z-index: 9999;
  align-items: center;
  justify-content: space-around;
  padding: 0 4px;
  box-sizing: border-box;
}

/* 나머지 스타일은 그대로 유지 (아래는 생략 없이 그대로 복사) */
.logo-container { margin: 0 auto 32px; cursor: pointer; transition: transform 0.2s; }
.logo-container:hover { transform: scale(1.1); }
.logo-svg { width: 40px; height: 40px; }

.nav-item {
  width: 48px; height: 48px; margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 12px; cursor: pointer; transition: all 0.25s;
}
.nav-item:hover { transform: scale(1.08); }
.nav-item:not(.active) .nav-icon-img,
.nav-item:not(.active) .nav-icon-img-home,
.nav-item:not(.active) .nav-icon-img-explore { filter: brightness(70%); }
.nav-icon-img, .nav-icon-img-home, .nav-icon-img-explore { width: 32px; height: 32px; }

.create-btn {
  width: 56px; height: 56px; margin: 24px auto;
  border: none; border-radius: 50%;
  background: linear-gradient(135deg, #5269FF, #5722B3, #FF00EC);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}
.create-btn:hover { transform: scale(1.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.btn-icon-img { width: 32px; height: 32px; }

.user-info {
  margin-top: auto; padding: 10px 0 16px;
  display: flex; flex-direction: column; align-items: center;
  cursor: pointer; width: 100%; gap: 4px;
}
.user-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  background: linear-gradient(135deg, #3478f6, #53b6f9);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: white; overflow: hidden;
}
.user-avatar img { width: 100%; height: 100%; object-fit: cover; }

.bottom-bar-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; padding: 6px 0; border-radius: 10px; transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1); }
.bottom-bar-item:active { transform: scale(0.88); }
.bottom-bar-item img { width: 26px; height: 26px; transition: filter 0.2s ease; }
.bottom-bar-item:not(.active) img { filter: brightness(55%); }
.bottom-bar-item.active img { filter: brightness(100%); }
.bottom-bar-label { font-size: 10px; font-weight: 500; color: #555; transition: color 0.2s; }
.bottom-bar-item.active .bottom-bar-label { color: #fff; }

.bottom-bar-create { flex: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.bottom-bar-create-btn {
  width: 46px; height: 46px; border-radius: 50%;
  background: linear-gradient(135deg, #5269FF, #5722B3, #FF00EC);
  border: none; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(82,105,255,0.4);
}
.bottom-bar-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: linear-gradient(135deg, #3478f6, #53b6f9);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: white; overflow: hidden;
}
</style>
</head>
<body>

<!-- 데스크탑 사이드바 -->
<div class="sidebar">
  <div class="logo-container" id="logoContainer">
    <img src="logo.svg" alt="Sharer 로고" class="logo-svg">
  </div>
  <div class="nav-item active" id="homeNav">
    <img src="home.png" alt="홈" class="nav-icon-img-home" id="homeIcon">
  </div>
  <div class="nav-item" id="exploreNav">
    <img src="exploreX.png" alt="탐색" class="nav-icon-img-explore" id="exploreIcon">
  </div>
  <div class="nav-item" id="chatNav">
    <img src="chatX.png" alt="채팅" class="nav-icon-img" id="chatIcon">
  </div>
  <div class="nav-item" id="discordNav">
    <img src="discord.png" alt="Discord" class="nav-icon-img">
  </div>
  <button class="create-btn" id="createBtn">
    <img src="new.png" alt="만들기" class="btn-icon-img">
  </button>
  <div class="user-info" id="userInfo" style="display: none;">
    <div class="user-avatar" id="userAvatar"></div>
    <button class="logout-icon-btn-mobile" id="logoutBtnMobile" onclick="handleLogout(event)">
      <img src="logout.png" alt="로그아웃">
    </button>
  </div>
</div>

<!-- 모바일 하단 탭바 -->
<div class="bottom-bar" id="bottomBar">
  <!-- ... (기존 bottom-bar 내용 그대로 복사) ... -->
  <div class="bottom-bar-item active" id="btmHome">
    <img src="home.png" alt="홈" id="btmHomeIcon">
    <span class="bottom-bar-label">홈</span>
  </div>
  <div class="bottom-bar-item" id="btmExplore">
    <img src="exploreX.png" alt="탐색" id="btmExploreIcon">
    <span class="bottom-bar-label">탐색</span>
  </div>
  <div class="bottom-bar-create" id="btmCreate">
    <button class="bottom-bar-create-btn">
      <img src="new.png" alt="만들기">
    </button>
  </div>
  <div class="bottom-bar-item" id="btmChat">
    <img src="chatX.png" alt="채팅" id="btmChatIcon">
    <span class="bottom-bar-label">채팅</span>
  </div>
  <div class="bottom-bar-item" id="btmProfile">
    <div class="bottom-bar-avatar" id="btmAvatar">?</div>
    <span class="bottom-bar-label" id="btmProfileLabel">프로필</span>
  </div>
</div>

<script>
/* 기존 스크립트 전체 유지 + setNarrowMode 처리 추가 */

let isLoggedIn = false;
let currentUserId = null;
let currentUserNickname = null;
let currentUserProfileImage = null;

/* ... (기존 모든 변수, updateIcons, updateBottomIcons, setActiveTab, onclick 이벤트 등 그대로 유지) ... */

/* ←←← 여기서부터 기존 스크립트 내용 복사 (setNarrowMode 부분만 아래로 교체) →→→ */

window.addEventListener('message', (event) => {
  const data = event.data;
  if (!data?.type) return;

  if (data.type === 'activateHome' || data.type === 'default') setActiveTab('home');
  if (data.type === 'activateExplore') setActiveTab('explore');
  if (data.type === 'activateChat') setActiveTab('chat');

  if (data.type === 'updateUser') applyUserToUI(data.user || null);

  /* ★★★ 핵심 수정 부분 ★★★ */
  if (data.type === 'setNarrowMode') {
    const sidebarEl = document.querySelector('.sidebar');
    const bottomBarEl = document.querySelector('.bottom-bar');

    if (data.narrow) {
      // 모바일 모드
      if (sidebarEl) sidebarEl.style.display = 'none';
      if (bottomBarEl) bottomBarEl.style.display = 'flex';
    } else {
      // PC 모드
      if (sidebarEl) sidebarEl.style.display = 'flex';
      if (bottomBarEl) bottomBarEl.style.display = 'none';
    }
  }
});

/* 초기화 */
setActiveTab('home');
parent.postMessage({ type: 'requestUserInfo' }, '*');
</script>
</body>
</html>
