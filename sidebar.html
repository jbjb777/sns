<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent !important;
      height: 100vh;
      overflow: hidden;
    }
    .sidebar-root {
      min-height: 100vh;
      height: 100%;
      box-sizing: border-box;
      position: relative;
    }
    .sidebar {
      width: 72px !important;
      max-width: 72px !important;
      min-width: 72px !important;
      height: 100vh;
      background: transparent;
      border-right: none;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
      overflow-x: hidden;
      box-sizing: border-box;
      position: relative;
      scrollbar-width: thin;
      scrollbar-color: #444 transparent;
    }
    .logo-container {
      margin: 0 auto 32px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .logo-container:hover { transform: scale(1.1); }
    .logo-svg {
      width: 40px;
      height: 40px;
    }
    .logo-text { display: none; }
    .mob-nav-left,
    .mob-nav-right {
      display: contents;
    }
    .nav-item {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.25s;
      background: transparent;
    }
    .nav-item:hover {
      transform: scale(1.08);
    }
    .nav-item.active {
      /* 배경 그라데이션 및 그림자 제거 (필요시 다시 추가 가능) */
      /* background와 box-shadow 주석 처리 또는 삭제 */
      /* background: linear-gradient(135deg, rgba(54,99,255,0.3), rgba(87,34,179,0.2)); */
      /* box-shadow: 0 4px 12px rgba(54,99,255,0.25); */
    }
    /* 비활성 상태일 때 아이콘 밝기 낮춤 */
    .nav-item:not(.active) .nav-icon-img,
    .nav-item:not(.active) .nav-icon-img-home,
    .nav-item:not(.active) .nav-icon-img-explore {
      filter: brightness(70%);
    }
    .nav-icon-img, .nav-icon-img-home, .nav-icon-img-explore {
      width: 32px;
      height: 32px;
      margin: 0;
      transition: filter 0.2s ease;
    }
    .nav-text { display: none; }
    .create-btn {
      width: 56px;
      height: 56px;
      margin: 24px auto;
      padding: 0;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, #5269FF, #5722B3, #FF00EC);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      transition: all 0.25s;
    }
    .create-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .btn-icon-img {
      width: 32px;
      height: 32px;
      margin: 0;
    }
    .btn-text { display: none; }
    .user-info {
      margin-top: auto;
      padding: 10px 0 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      width: 100%;
      gap: 4px;
    }
    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3478f6, #53b6f9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: white;
      overflow: hidden;
    }
    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .user-details, .logout-icon-btn, .verification-badge, .user-page-label {
      display: none;
    }
    .logout-icon-btn-mobile {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(54, 99, 255, 0.8);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 8px auto 0;
      transition: all 0.2s;
    }
    .logout-icon-btn-mobile:hover { transform: scale(1.1); }
    .logout-icon-btn-mobile img {
      width: 20px !important;
      height: 20px !important;
    }
    .sidebar::-webkit-scrollbar {
      width: 3px;
    }
    .sidebar::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 10px;
    }

    /* 데스크톱 iframe(좁음): 시트 숨김 — 뷰포트 min-width는 iframe 너비 기준이라 72px에서는 아래 블록 미적용 */
    .mobile-sheet-backdrop,
    .mobile-profile-sheet {
      display: none;
    }

    /*
      모바일: 부모가 iframe을 화면 너비로 둠 → 뷰포트가 넓어짐(200px 이상).
      max-width:768px는 iframe 안에서도 참이 되어 데스크톱 사이드바가 깨지므로 쓰지 않음.
    */
    @media (min-width: 200px) {
      html, body {
        height: 100% !important;
        min-height: 100% !important;
        overflow: hidden;
      }
      body {
        pointer-events: none;
      }
      .sidebar-root {
        min-height: 100vh;
        min-height: 100dvh;
        height: 100%;
        pointer-events: none;
      }
      .sidebar {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 100% !important;
        height: auto;
        min-height: 0;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        column-gap: 12px;
        align-items: center;
        justify-items: center;
        padding: 8px 14px calc(8px + env(safe-area-inset-bottom, 0px));
        box-sizing: border-box;
        overflow: visible;
        border-right: none;
        background: rgba(10, 10, 10, 0.92);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        top: auto;
        z-index: 2;
        pointer-events: auto;
      }
      .sidebar.has-profile {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .logo-container { display: none; }
      #chatNav,
      #discordNav {
        display: none !important;
      }
      .mob-nav-left,
      .mob-nav-right {
        display: contents;
      }
      .nav-item {
        width: 48px;
        height: 48px;
        max-width: 48px;
        margin: 0;
        box-sizing: border-box;
      }
      .create-btn {
        width: 48px;
        height: 48px;
        margin: 0;
        box-sizing: border-box;
      }
      .user-info {
        margin-top: 0;
        padding: 0;
        width: 48px;
        height: 48px;
        min-width: 0;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 0;
        box-sizing: border-box;
      }
      .logout-icon-btn-mobile {
        display: none !important;
      }
      .nav-icon-img, .nav-icon-img-home, .nav-icon-img-explore {
        width: 26px;
        height: 26px;
      }
      .btn-icon-img {
        width: 28px;
        height: 28px;
      }
      .user-avatar {
        width: 40px;
        height: 40px;
        font-size: 18px;
        box-sizing: border-box;
      }

      .mobile-sheet-backdrop {
        display: block;
        position: fixed;
        inset: 0;
        z-index: 10000;
        background: rgba(0, 0, 0, 0.45);
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s ease;
        pointer-events: none;
      }
      .mobile-sheet-backdrop.open {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }
      .mobile-profile-sheet {
        display: block;
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 10001;
        transform: translateY(100%);
        transition: transform 0.38s cubic-bezier(0.22, 1, 0.36, 1);
        pointer-events: none;
      }
      .mobile-profile-sheet.open {
        transform: translateY(0);
        pointer-events: auto;
      }
      .mobile-profile-sheet-inner {
        background: #141414;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-bottom: none;
        border-radius: 20px 20px 0 0;
        padding: 10px 16px calc(20px + env(safe-area-inset-bottom, 0px));
        max-height: 70vh;
        box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.45);
      }
      .sheet-grab {
        width: 40px;
        height: 4px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.2);
        margin: 0 auto 16px;
      }
      .sheet-profile-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.05);
        cursor: pointer;
        margin-bottom: 12px;
        transition: background 0.2s;
      }
      .sheet-profile-row:active {
        background: rgba(255, 255, 255, 0.1);
      }
      .sheet-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: linear-gradient(135deg, #3478f6, #53b6f9);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: #fff;
        overflow: hidden;
        flex-shrink: 0;
      }
      .sheet-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .sheet-nickname {
        font-size: 16px;
        font-weight: 600;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .sheet-logout {
        width: 100%;
        padding: 14px 16px;
        border: none;
        border-radius: 14px;
        background: rgba(255, 80, 80, 0.15);
        color: #ff8a8a;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        transition: background 0.2s, transform 0.15s;
      }
      .sheet-logout:active {
        transform: scale(0.98);
      }
    }
  </style>
</head>
<body>
  <div class="sidebar-root">
    <div class="sidebar">
      <div class="logo-container" id="logoContainer">
        <img src="logo.svg" alt="Sharer 로고" class="logo-svg">
      </div>
      <div class="mob-nav-left">
        <div class="nav-item active" id="homeNav">
          <img src="home.png" alt="홈" class="nav-icon-img-home" id="homeIcon">
        </div>
        <div class="nav-item" id="exploreNav">
          <img src="exploreX.png" alt="탐색" class="nav-icon-img-explore" id="exploreIcon">
        </div>
      </div>
      <div class="nav-item" id="chatNav">
        <img src="chatX.png" alt="채팅" class="nav-icon-img" id="chatIcon">
      </div>
      <div class="nav-item" id="discordNav">
        <img src="discord.png" alt="Discord" class="nav-icon-img">
      </div>
      <button class="create-btn" id="createBtn" type="button">
        <img src="new.png" alt="만들기" class="btn-icon-img">
      </button>
      <div class="mob-nav-right">
        <div class="user-info" id="userInfo" style="display: none;">
          <div class="user-avatar-wrapper">
            <div class="user-avatar" id="userAvatar"></div>
          </div>
          <button class="logout-icon-btn-mobile" id="logoutBtnMobile" type="button" onclick="handleLogout(event)">
            <img src="logout.png" alt="로그아웃">
          </button>
        </div>
      </div>
    </div>

    <div class="mobile-sheet-backdrop" id="profileSheetBackdrop" aria-hidden="true"></div>
    <div class="mobile-profile-sheet" id="profileSheet" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="mobile-profile-sheet-inner">
        <div class="sheet-grab"></div>
        <div class="sheet-profile-row" id="sheetProfileRow">
          <div class="sheet-avatar" id="sheetMenuAvatar"></div>
          <span class="sheet-nickname" id="sheetMenuNickname"></span>
        </div>
        <button type="button" class="sheet-logout" id="sheetLogoutBtn">로그아웃</button>
      </div>
    </div>
  </div>
  <script>
    const homeNav = document.getElementById('homeNav');
    const exploreNav = document.getElementById('exploreNav');
    const chatNav = document.getElementById('chatNav');
    const discordNav = document.getElementById('discordNav');
    const createBtn = document.getElementById('createBtn');
    const logoContainer = document.getElementById('logoContainer');
    const userInfo = document.getElementById('userInfo');
    const homeIcon = document.getElementById('homeIcon');
    const exploreIcon = document.getElementById('exploreIcon');
    const chatIcon = document.getElementById('chatIcon');
    const profileSheetBackdrop = document.getElementById('profileSheetBackdrop');
    const profileSheet = document.getElementById('profileSheet');
    const sheetProfileRow = document.getElementById('sheetProfileRow');
    const sheetMenuAvatar = document.getElementById('sheetMenuAvatar');
    const sheetMenuNickname = document.getElementById('sheetMenuNickname');
    const sheetLogoutBtn = document.getElementById('sheetLogoutBtn');
    const userAvatar = document.getElementById('userAvatar');
    const sidebarBar = document.querySelector('.sidebar');

    function isMobileBottomLayout() {
      return window.matchMedia('(min-width: 200px)').matches;
    }

    function openProfileSheet() {
      if (!isMobileBottomLayout()) return;
      profileSheetBackdrop.classList.add('open');
      profileSheet.classList.add('open');
      profileSheet.setAttribute('aria-hidden', 'false');
      profileSheetBackdrop.setAttribute('aria-hidden', 'false');
    }

    function closeProfileSheet() {
      profileSheetBackdrop.classList.remove('open');
      profileSheet.classList.remove('open');
      profileSheet.setAttribute('aria-hidden', 'true');
      profileSheetBackdrop.setAttribute('aria-hidden', 'true');
    }

    function goCreate() {
      if (isLoggedIn) {
        window.top.location.href = 'https://sharer.jbjb.r-e.kr/make.html';
      } else {
        window.top.location.href = 'https://sharer.jbjb.r-e.kr/login.html';
      }
    }

    let isLoggedIn = false;
    let currentUserId = null;
    let currentUserNickname = null;
    let currentUserProfileImage = null;

    function updateIcons() {
      if (homeNav.classList.contains('active')) {
        homeIcon.src = 'home.png';
      } else {
        homeIcon.src = 'homeX.png';
      }
      if (exploreNav.classList.contains('active')) {
        exploreIcon.src = 'explore.png';
      } else {
        exploreIcon.src = 'exploreX.png';
      }
      if (chatNav.classList.contains('active')) {
        chatIcon.src = 'chat.png';
      } else {
        chatIcon.src = 'chatX.png';
      }
    }

    function syncSheetProfileFromUser() {
      sheetMenuNickname.textContent = currentUserNickname || '';
      sheetMenuAvatar.innerHTML = '';
      if (currentUserProfileImage && typeof currentUserProfileImage === 'string' && currentUserProfileImage.trim() !== '') {
        const img = document.createElement('img');
        const url = currentUserProfileImage + (currentUserProfileImage.includes('?') ? '&' : '?') + 'v=' + Date.now();
        img.src = url;
        img.alt = currentUserNickname || '프로필';
        img.onerror = () => {
          sheetMenuAvatar.textContent = currentUserNickname ? currentUserNickname[0].toUpperCase() : '?';
        };
        sheetMenuAvatar.appendChild(img);
      } else {
        sheetMenuAvatar.textContent = currentUserNickname ? currentUserNickname[0].toUpperCase() : '?';
      }
    }

    logoContainer.onclick = () => {
      window.top.location.href = 'https://sharer.jbjb.r-e.kr/index.html';
    };
    homeNav.onclick = () => {
      window.top.location.href = 'https://sharer.jbjb.r-e.kr/index.html';
    };
    exploreNav.onclick = () => {
      window.top.location.href = 'https://sharer.jbjb.r-e.kr/explore.html';
    };
    chatNav.onclick = () => {
      window.top.location.href = 'https://sharer.jbjb.r-e.kr/chat.html';
    };
    discordNav.onclick = () => {
      window.open('https://discord.gg/8s6XuWkfQb', '_blank');
    };
    createBtn.onclick = (e) => {
      e.stopPropagation();
      goCreate();
    };
    userInfo.onclick = (e) => {
      if (isMobileBottomLayout() && isLoggedIn) {
        e.preventDefault();
        e.stopPropagation();
        syncSheetProfileFromUser();
        openProfileSheet();
        return;
      }
      if (isLoggedIn && currentUserId && currentUserNickname) {
        window.top.location.href = `https://sharer.jbjb.r-e.kr/user.html?id=${currentUserId}&nickname=${encodeURIComponent(currentUserNickname)}`;
      }
    };

    profileSheetBackdrop.onclick = () => closeProfileSheet();
    sheetProfileRow.onclick = (e) => {
      e.stopPropagation();
      if (isLoggedIn && currentUserId && currentUserNickname) {
        closeProfileSheet();
        window.top.location.href = `https://sharer.jbjb.r-e.kr/user.html?id=${currentUserId}&nickname=${encodeURIComponent(currentUserNickname)}`;
      }
    };
    sheetLogoutBtn.onclick = (e) => {
      e.stopPropagation();
      closeProfileSheet();
      parent.postMessage({ type: 'logout' }, '*');
    };

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && profileSheet.classList.contains('open')) {
        closeProfileSheet();
      }
    });

    window.handleLogout = (event) => {
      event.stopPropagation();
      parent.postMessage({ type: 'logout' }, '*');
    };
    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data?.type) return;
      if (data.type === 'activateHome' || data.type === 'default') {
        homeNav.classList.add('active');
        exploreNav.classList.remove('active');
        chatNav.classList.remove('active');
        updateIcons();
      }
      if (data.type === 'activateExplore') {
        homeNav.classList.remove('active');
        exploreNav.classList.add('active');
        chatNav.classList.remove('active');
        updateIcons();
      }
      if (data.type === 'activateChat') {
        homeNav.classList.remove('active');
        exploreNav.classList.remove('active');
        chatNav.classList.add('active');
        updateIcons();
      }
      if (data.type === 'updateUser') {
        if (data.user) {
          isLoggedIn = true;
          currentUserId = data.user.id;
          currentUserNickname = data.user.nickname;
          currentUserProfileImage = data.user.profile_image;
          if (currentUserProfileImage && typeof currentUserProfileImage === 'string' && currentUserProfileImage.trim() !== '') {
            const img = document.createElement('img');
            const url = currentUserProfileImage + (currentUserProfileImage.includes('?') ? '&' : '?') + 'v=' + Date.now();
            img.src = url;
            img.alt = data.user.nickname || '프로필';
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'cover';
            img.onerror = () => {
              userAvatar.innerHTML = data.user.nickname ? data.user.nickname[0].toUpperCase() : '?';
            };
            userAvatar.innerHTML = '';
            userAvatar.appendChild(img);
          } else {
            userAvatar.textContent = data.user.nickname ? data.user.nickname[0].toUpperCase() : '?';
          }
          userInfo.style.display = 'flex';
          sidebarBar.classList.add('has-profile');
          syncSheetProfileFromUser();
        } else {
          isLoggedIn = false;
          currentUserId = null;
          currentUserNickname = null;
          currentUserProfileImage = null;
          userInfo.style.display = 'none';
          sidebarBar.classList.remove('has-profile');
          closeProfileSheet();
        }
      }
      if (data.type === 'setNarrowMode') {
        const sidebar = document.querySelector('.sidebar');
        if (data.narrow) {
          sidebar.classList.add('narrow');
        } else {
          sidebar.classList.remove('narrow');
        }
      }
    });
    homeNav.classList.add('active');
    updateIcons();
    parent.postMessage({ type: 'requestUserInfo' }, '*');
  </script>
</body>
</html>
