<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent !important;
      height: 100vh;
      overflow: hidden;
    }
    .sidebar-root {
      min-height: 100vh;
      height: 100%;
      box-sizing: border-box;
      position: relative;
    }
    .sidebar {
      width: 72px !important;
      max-width: 72px !important;
      min-width: 72px !important;
      height: 100vh;
      background: transparent;
      border-right: none;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
      overflow-x: hidden;
      box-sizing: border-box;
      position: relative;
      scrollbar-width: thin;
      scrollbar-color: #444 transparent;
    }
    .logo-container {
      margin: 0 auto 32px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .logo-container:hover { transform: scale(1.1); }
    .logo-svg {
      width: 40px;
      height: 40px;
      fill: none;
    }
    .nav-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
    }
    .nav-item {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      cursor: pointer;
      transition: color 0.2s, background 0.2s, transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
    }
    .nav-item:hover {
      color: #fff;
      background: #111;
    }
    .nav-item:active {
      transform: scale(0.92);
    }
    .nav-item.active {
      color: #fff;
      background: #111;
    }
    .nav-item svg {
      width: 24px;
      height: 24px;
    }
    
    /* ─── MAKE BUTTON & EDGE FLOW EFFECT (처음 3번만 작동) ─── */
    .make-btn-container {
      position: relative;
      width: 48px;
      height: 48px;
      margin-top: 12px;
    }
    .make-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #fff;
      color: #000;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 4px 12px rgba(255,255,255,0.1);
      position: relative;
      z-index: 2;
    }
    .make-btn:hover {
      background: #e8e8e8;
      transform: scale(1.08);
    }
    .make-btn:active {
      transform: scale(0.92);
    }
    .make-btn svg {
      width: 22px;
      height: 22px;
    }

    /* 테두리를 따라 흐르는 SVG 라인 오버레이 */
    .make-btn-spinner {
      position: absolute;
      top: -3px;
      left: -3px;
      width: calc(100% + 6px);
      height: calc(100% + 6px);
      z-index: 1;
      pointer-events: none;
    }

    .make-spinner-path {
      /* 원형 버튼 둘레(약 164) 기준 선 길이 */
      stroke-dasharray: 164;
      /* 1.8초 동안 테두리를 한 바퀴 돌고, 딱 3번만 무한 반복 후 자동 정지 */
      animation: sidebar-line-flow 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      animation-iteration-count: 3;
    }

    @keyframes sidebar-line-flow {
      0% {
        stroke-dashoffset: 164;
      }
      50% {
        stroke-dashoffset: 82;
      }
      100% {
        stroke-dashoffset: -164;
      }
    }

    /* ─── USER PROFILE BOTTOM ─── */
    .user-info {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      z-index: 10;
    }
    .user-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      color: #666;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      overflow: hidden;
    }
    .user-avatar:hover {
      transform: scale(1.05);
      border-color: #444;
    }
    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="sidebar-root">
    <div class="sidebar">
      <div class="logo-container" onclick="handleNavClick('home')">
        <svg class="logo-svg" viewBox="0 0 40 40">
          <rect width="40" height="40" rx="10" fill="#fff"/>
          <path d="M14 13h12v3H14zm0 5h12v3H14zm0 5h8v3h-8z" fill="#000"/>
        </svg>
      </div>

      <div class="nav-container">
        <div class="nav-item" id="homeNav" onclick="handleNavClick('home')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
        </div>
        <div class="nav-item" id="searchNav" onclick="handleNavClick('search')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </div>
        <div class="nav-item" id="exploreNav" onclick="handleNavClick('explore')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
            <line x1="9" y1="3" x2="9" y2="18"></line>
            <line x1="15" y1="6" x2="15" y2="21"></line>
          </svg>
        </div>
        <div class="nav-item" id="notificationsNav" onclick="handleNavClick('notifications')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
        </div>

        <div class="make-btn-container">
          <button class="make-btn" onclick="handleNavClick('make')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
          <svg class="make-btn-spinner" viewBox="0 0 54 54">
            <defs>
              <linearGradient id="sidebarSpinnerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0d00ff"/>
                <stop offset="100%" stop-color="#39f0ea"/>
              </linearGradient>
            </defs>
            <circle
              class="make-spinner-path"
              cx="27" cy="27" r="25.5"
              fill="none"
              stroke="url(#sidebarSpinnerGradient)"
              stroke-width="2.5"
              stroke-linecap="round"
            />
          </svg>
        </div>
      </div>

      <div class="user-info" id="userInfo">
        <div class="user-avatar" id="userAvatar" onclick="handleAvatarClick()">?</div>
      </div>
    </div>
  </div>

  <script>
    let isLoggedIn = false;
    let currentUserId = null;
    let currentUserNickname = null;
    let currentUserProfileImage = null;

    const homeNav = document.getElementById('homeNav');
    const searchNav = document.getElementById('searchNav');
    const exploreNav = document.getElementById('exploreNav');
    const notificationsNav = document.getElementById('notificationsNav');
    const userInfo = document.getElementById('userInfo');
    const userAvatar = document.getElementById('userAvatar');

    function updateIcons() {
      const items = [homeNav, searchNav, exploreNav, notificationsNav];
      items.forEach(item => {
        if (item) item.classList.remove('active');
      });
    }

    function handleNavClick(type) {
      updateIcons();
      if (type === 'home' && homeNav) homeNav.classList.add('active');
      if (type === 'search' && searchNav) searchNav.classList.add('active');
      if (type === 'explore' && exploreNav) exploreNav.classList.add('active');
      if (type === 'notifications' && notificationsNav) notificationsNav.classList.add('active');
      
      parent.postMessage({ type: 'navClick', menu: type }, '*');
    }

    function handleAvatarClick() {
      parent.postMessage({ type: 'profileClick' }, '*');
    }

    window.addEventListener('message', (e) => {
      const data = e.data;
      if (!data) return;

      if (data.type === 'responseUserInfo' || data.type === 'syncUserInfo') {
        if (data.isLoggedIn && data.user) {
          isLoggedIn = true;
          currentUserId = data.user.id;
          currentUserNickname = data.user.nickname;
          currentUserProfileImage = data.user.profile_image;

          if (currentUserProfileImage) {
            const img = document.createElement('img');
            const url = currentUserProfileImage + (currentUserProfileImage.includes('?') ? '&' : '?') + 'v=' + Date.now();
            img.src = url;
            img.alt = data.user.nickname || '프로필';
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'cover';
            img.onerror = () => {
              userAvatar.innerHTML = data.user.nickname ? data.user.nickname[0].toUpperCase() : '?';
            };
            userAvatar.innerHTML = '';
            userAvatar.appendChild(img);
          } else {
            userAvatar.textContent = data.user.nickname ? data.user.nickname[0].toUpperCase() : '?';
          }
          userInfo.style.display = 'flex';
        } else {
          isLoggedIn = false;
          currentUserId = null;
          currentUserNickname = null;
          currentUserProfileImage = null;
          userInfo.style.display = 'none';
        }
      }
    });

    homeNav.classList.add('active');
    parent.postMessage({ type: 'requestUserInfo' }, '*');
  </script>
</body>
</html>
