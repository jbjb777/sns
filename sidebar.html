<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent !important;
      height: 100vh;
      overflow: hidden;
    }
    .sidebar-root {
      min-height: 100vh;
      height: 100%;
      box-sizing: border-box;
      position: relative;
    }
    .sidebar {
      width: 72px !important;
      max-width: 72px !important;
      min-width: 72px !important;
      height: 100vh;
      background: transparent;
      border-right: none;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
      overflow-x: hidden;
      box-sizing: border-box;
      position: relative;
      scrollbar-width: thin;
      scrollbar-color: #444 transparent;
    }
    .logo-container {
      margin: 0 auto 32px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .logo-container:hover { transform: scale(1.1); }
    .logo-svg {
      width: 40px;
      height: 40px;
    }
    .nav-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      width: 100%;
    }
    .nav-item {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      color: #888;
      position: relative;
    }
    .nav-item:hover {
      background-color: #111;
      color: #fff;
    }
    .nav-item:active {
      transform: scale(0.92);
    }
    .nav-item.active {
      background-color: #111;
      color: #fff;
    }
    .nav-item svg {
      width: 24px;
      height: 24px;
      stroke-width: 2;
      transition: transform 0.2s;
    }
    
    /* ─── 게시물 만들기 버튼 전용 3회 테두리 흐름 시스템 ─── */
    .create-btn-wrapper {
      position: relative;
      width: 48px;
      height: 48px;
      display: inline-block;
    }
    
    /* 사이드바 내 게시물 만들기 아이콘을 감싸며 흐르는 테두리 SVG 패널 */
    .sidebar-border-loader {
      position: absolute;
      top: -2px;
      left: -2px;
      width: calc(100% + 4px);
      height: calc(100% + 4px);
      z-index: 1;
      pointer-events: none;
    }

    .sidebar-loader-path {
      /* 48x48 영역 외부 패스 둘레(약 200)에 맞춘 선 길이 지정 */
      stroke-dasharray: 200;
      /* 정확히 3번 회전 흐름을 반복한 뒤 멈추고 투명화(사라짐)되도록 세팅 */
      animation: sidebar-line-flow 2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      animation-iteration-count: 3;
    }

    @keyframes sidebar-line-flow {
      0% {
        stroke-dashoffset: 200;
        opacity: 1;
      }
      50% {
        stroke-dashoffset: 100;
        opacity: 1;
      }
      100% {
        stroke-dashoffset: -200;
        /* 애니메이션 종료 순간 흔적 없이 사라지도록 알파 오프셋 매핑 */
        opacity: 0;
      }
    }

    /* 하단 유저 프로필 영역 */
    .user-info-container {
      margin-top: auto;
      padding-top: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }
    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      overflow: hidden;
      color: #666;
      transition: transform 0.2s;
    }
    .user-avatar:hover { transform: scale(1.08); }
    .user-avatar:active { transform: scale(0.95); }
    
    .sidebar-bar-line {
      position: absolute;
      right: 0;
      top: 0;
      width: 1px;
      height: 100vh;
      background: #1e1e1e;
      z-index: 10;
      transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .sidebar-bar-line.has-profile {
      height: calc(100vh - 80px);
    }

    /* 슬라이드 프로필 시트 */
    .profile-sheet {
      position: fixed;
      left: -280px;
      top: 0;
      width: 280px;
      height: 100vh;
      background: #000;
      border-right: 1px solid #1e1e1e;
      z-index: 100;
      box-shadow: 10px 0 30px rgba(0,0,0,0.5);
      transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 24px;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }
    .profile-sheet.open {
      left: 72px;
    }
    .sheet-close-btn {
      align-self: flex-end;
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      padding: 4px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .sheet-close-btn:hover {
      background: #1a1a1a;
      color: #fff;
    }
    .sheet-close-btn svg { width: 20px; height: 20px; }
    
    .sheet-profile-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 16px;
      gap: 12px;
    }
    .sheet-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      color: #666;
      overflow: hidden;
    }
    .sheet-nickname {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }
    
    .sheet-menu {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .sheet-menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      color: #888;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s, color 0.2s, transform 0.1s ease;
    }
    .sheet-menu-item:hover {
      background: #111;
      color: #fff;
    }
    .sheet-menu-item:active {
      transform: scale(0.98);
    }
    .sheet-menu-item svg {
      width: 20px;
      height: 20px;
      stroke-width: 2;
    }
    .sheet-menu-item.logout-btn {
      color: #ff6b6b;
    }
    .sheet-menu-item.logout-btn:hover {
      background: rgba(255, 107, 107, 0.1);
      color: #ff6b6b;
    }

    .sidebar.narrow {
      width: 60px !important;
      max-width: 60px !important;
      min-width: 60px !important;
    }
    .sidebar.narrow .logo-svg { width: 32px; height: 32px; }
    .sidebar.narrow .nav-item { width: 40px; height: 40px; border-radius: 12px; }
    .sidebar.narrow .create-btn-wrapper { width: 40px; height: 40px; }
    .sidebar.narrow .sidebar-border-loader {
      width: calc(100% + 4px);
      height: calc(100% + 4px);
    }
    .sidebar.narrow .sidebar-loader-path rect {
      width: 41px;
      height: 41px;
      rx: 11.5px;
      ry: 11.5px;
    }
    .sidebar.narrow .user-avatar { width: 32px; height: 32px; }
    .profile-sheet.open-narrow { left: 60px; }

    .sheet-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.4);
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .sheet-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .sidebar-bar-line { display: none; }
      .profile-sheet { display: none; }
      .sheet-overlay { display: none; }
    }
  </style>
</head>
<body>
  <div class="sidebar-root">
    <div class="sidebar">
      <div class="logo-container" onclick="navigate('home')">
        <svg class="logo-svg" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="12" fill="#fff"/>
          <path d="M12 15L20 11L28 15V25L20 29L12 25V15Z" stroke="#000" stroke-width="2.5" stroke-linejoin="round"/>
          <path d="M20 11V29" stroke="#000" stroke-width="2" stroke-dasharray="2 2"/>
          <path d="M12 20H28" stroke="#000" stroke-width="2" stroke-dasharray="2 2"/>
        </svg>
      </div>

      <div class="nav-container">
        <div class="nav-item" id="homeNav" onclick="navigate('home')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <div class="nav-item" id="searchNav" onclick="navigate('search')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </div>
        
        <div class="create-btn-wrapper">
          <div class="nav-item" id="createNav" onclick="navigate('create')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </div>
          <svg class="sidebar-border-loader" viewBox="0 0 52 52" preserveAspectRatio="none">
            <defs>
              <linearGradient id="sidebarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0d00ff"/>
                <stop offset="100%" stop-color="#39f0ea"/>
              </linearGradient>
            </defs>
            <rect
              class="sidebar-loader-path"
              x="1.5" y="1.5"
              width="49" height="49"
              rx="13.5" ry="13.5"
              fill="none"
              stroke="url(#sidebarGrad)"
              stroke-width="2.5"
              stroke-linecap="round"
            />
          </svg>
        </div>

      </div>

      <div class="user-info-container" id="userInfo" style="display: none;">
        <div class="user-avatar" id="userAvatar" onclick="toggleProfileSheet()">?</div>
      </div>
    </div>
    
    <div class="sidebar-bar-line" id="sidebarBar"></div>
  </div>

  <div class="sheet-overlay" id="sheetOverlay" onclick="closeProfileSheet()"></div>

  <div class="profile-sheet" id="profileSheet">
    <button class="sheet-close-btn" onclick="closeProfileSheet()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    
    <div class="sheet-profile-section">
      <div class="sheet-avatar" id="sheetAvatar">?</div>
      <div class="sheet-nickname" id="sheetNickname">사용자</div>
    </div>
    
    <div class="sheet-menu">
      <div class="sheet-menu-item" onclick="handleSheetMenu('profile')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        프로필 보기
      </div>
      <div class="sheet-menu-item" onclick="handleSheetMenu('settings')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.52-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.52 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        설정
      </div>
      <div class="sheet-menu-item logout-btn" onclick="handleSheetMenu('logout')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        로그아웃
      </div>
    </div>
  </div>

  <script>
    const homeNav = document.getElementById('homeNav');
    const searchNav = document.getElementById('searchNav');
    const createNav = document.getElementById('createNav');
    const userInfo = document.getElementById('userInfo');
    const userAvatar = document.getElementById('userAvatar');
    const sidebarBar = document.getElementById('sidebarBar');
    const profileSheet = document.getElementById('profileSheet');
    const sheetOverlay = document.getElementById('sheetOverlay');
    const sheetAvatar = document.getElementById('sheetAvatar');
    const sheetNickname = document.getElementById('sheetNickname');

    let isLoggedIn = false;
    let currentUserId = null;
    let currentUserNickname = null;
    let currentUserProfileImage = null;

    function updateIcons() {
      const activeItem = document.querySelector('.nav-item.active');
      document.querySelectorAll('.nav-item').forEach(item => {
        const svg = item.querySelector('svg');
        if (item === activeItem) {
          svg.style.transform = 'scale(1.1)';
          if(item.id === 'homeNav') svg.setAttribute('fill', 'currentColor');
        } else {
          svg.style.transform = 'scale(1)';
          if(item.id === 'homeNav') svg.setAttribute('fill', 'none');
        }
      });
    }

    function navigate(page) {
      document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
      
      if (page === 'home') homeNav.classList.add('active');
      if (page === 'search') searchNav.classList.add('active');
      if (page === 'create') createNav.classList.add('active');
      
      updateIcons();
      closeProfileSheet();
      parent.postMessage({ type: 'navigate', page: page }, '*');
    }

    function toggleProfileSheet() {
      const isNarrow = document.querySelector('.sidebar').classList.contains('narrow');
      if (profileSheet.classList.contains('open')) {
        closeProfileSheet();
      } else {
        profileSheet.classList.add('open');
        if (isNarrow) profileSheet.classList.add('open-narrow');
        sheetOverlay.classList.add('show');
      }
    }

    function closeProfileSheet() {
      profileSheet.classList.remove('open');
      profileSheet.classList.remove('open-narrow');
      sheetOverlay.classList.remove('show');
    }

    function syncSheetProfileFromUser() {
      if (currentUserProfileImage) {
        const img = document.createElement('img');
        img.src = currentUserProfileImage;
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.objectFit = 'cover';
        img.onerror = () => {
          sheetAvatar.innerHTML = currentUserNickname ? currentUserNickname[0].toUpperCase() : '?';
        };
        sheetAvatar.innerHTML = '';
        sheetAvatar.appendChild(img);
      } else {
        sheetAvatar.textContent = currentUserNickname ? currentUserNickname[0].toUpperCase() : '?';
      }
      sheetNickname.textContent = currentUserNickname || '사용자';
    }

    function handleSheetMenu(action) {
      closeProfileSheet();
      if (action === 'logout') {
        parent.postMessage({ type: 'logout' }, '*');
      } else if (action === 'profile') {
        parent.postMessage({ type: 'navigateProfile', id: currentUserId, nickname: currentUserNickname }, '*');
      } else if (action === 'settings') {
        parent.postMessage({ type: 'navigateSettings' }, '*');
      }
    }

    window.addEventListener('message', (e) => {
      const data = e.data;
      if (data.type === 'syncActive') {
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        if (data.page === 'home') homeNav.classList.add('active');
        if (data.page === 'search') searchNav.classList.add('active');
        if (data.page === 'create') createNav.classList.add('active');
        updateIcons();
      }
      if (data.type === 'responseUserInfo') {
        if (data.isLoggedIn) {
          isLoggedIn = true;
          currentUserId = data.user.id;
          currentUserNickname = data.user.nickname;
          currentUserProfileImage = data.user.profile_image || null;

          if (currentUserProfileImage) {
            const img = document.createElement('img');
            const url = currentUserProfileImage + (currentUserProfileImage.includes('?') ? '&' : '?') + 'v=' + Date.now();
            img.src = url;
            img.alt = data.user.nickname || '프로필';
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'cover';
            img.onerror = () => {
              userAvatar.innerHTML = data.user.nickname ? data.user.nickname[0].toUpperCase() : '?';
            };
            userAvatar.innerHTML = '';
            userAvatar.appendChild(img);
          } else {
            userAvatar.textContent = data.user.nickname ? data.user.nickname[0].toUpperCase() : '?';
          }
          userInfo.style.display = 'flex';
          sidebarBar.classList.add('has-profile');
          syncSheetProfileFromUser();
        } else {
          isLoggedIn = false;
          currentUserId = null;
          currentUserNickname = null;
          currentUserProfileImage = null;
          userInfo.style.display = 'none';
          sidebarBar.classList.remove('has-profile');
          closeProfileSheet();
        }
      }
      if (data.type === 'setNarrowMode') {
        const sidebar = document.querySelector('.sidebar');
        if (data.narrow) {
          sidebar.classList.add('narrow');
        } else {
          sidebar.classList.remove('narrow');
        }
      }
    });
    homeNav.classList.add('active');
    updateIcons();
    parent.postMessage({ type: 'requestUserInfo' }, '*');
  </script>
</body>
</html>
