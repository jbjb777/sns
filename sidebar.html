<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent !important;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── 데스크탑: 기존 사이드바 ─── */
    .sidebar {
      width: 72px !important;
      max-width: 72px !important;
      min-width: 72px !important;
      height: 100vh;
      background: transparent;
      border-right: none;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
      overflow-x: hidden;
      box-sizing: border-box;
      position: relative;
      scrollbar-width: thin;
      scrollbar-color: #444 transparent;
    }
    .logo-container {
      margin: 0 auto 32px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .logo-container:hover { transform: scale(1.1); }
    .logo-svg {
      width: 40px;
      height: 40px;
    }
    .logo-text { display: none; }
    .nav-item {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.25s;
      background: transparent;
    }
    .nav-item:hover {
      transform: scale(1.08);
    }
    .nav-item:not(.active) .nav-icon-img,
    .nav-item:not(.active) .nav-icon-img-home,
    .nav-item:not(.active) .nav-icon-img-explore {
      filter: brightness(70%);
    }
    .nav-icon-img, .nav-icon-img-home, .nav-icon-img-explore {
      width: 32px;
      height: 32px;
      margin: 0;
      transition: filter 0.2s ease;
    }
    .nav-text { display: none; }
    .create-btn {
      width: 56px;
      height: 56px;
      margin: 24px auto;
      padding: 0;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, #5269FF, #5722B3, #FF00EC);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      transition: all 0.25s;
    }
    .create-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .btn-icon-img {
      width: 32px;
      height: 32px;
      margin: 0;
    }
    .btn-text { display: none; }
    .user-info {
      margin-top: auto;
      padding: 10px 0 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      width: 100%;
      gap: 4px;
    }
    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3478f6, #53b6f9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: white;
      overflow: hidden;
    }
    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .user-details, .logout-icon-btn, .verification-badge, .user-page-label {
      display: none;
    }
    .logout-icon-btn-mobile {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(54, 99, 255, 0.8);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 8px auto 0;
      transition: all 0.2s;
    }
    .logout-icon-btn-mobile:hover { transform: scale(1.1); }
    .logout-icon-btn-mobile img {
      width: 20px !important;
      height: 20px !important;
    }
    .sidebar::-webkit-scrollbar {
      width: 3px;
    }
    .sidebar::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 10px;
    }

    /* ─── 모바일: 하단 탭바 ─── */
    .bottom-bar {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      height: 60px;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.07);
      z-index: 9999;
      align-items: center;
      justify-content: space-around;
      padding: 0 4px;
      box-sizing: border-box;
    }

    .bottom-bar-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 6px 0;
      border-radius: 10px;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
      -webkit-tap-highlight-color: transparent;
      position: relative;
      gap: 3px;
    }
    .bottom-bar-item:active { transform: scale(0.88); }

    .bottom-bar-item img {
      width: 26px;
      height: 26px;
      object-fit: contain;
      transition: filter 0.2s ease;
    }
    .bottom-bar-item:not(.active) img {
      filter: brightness(55%);
    }
    .bottom-bar-item.active img {
      filter: brightness(100%);
    }

    .bottom-bar-label {
      font-size: 10px;
      font-weight: 500;
      color: #555;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      letter-spacing: 0.01em;
      transition: color 0.2s;
    }
    .bottom-bar-item.active .bottom-bar-label {
      color: #fff;
    }

    /* 가운데 만들기 버튼 */
    .bottom-bar-create {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .bottom-bar-create-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5269FF, #5722B3, #FF00EC);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(82,105,255,0.4);
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .bottom-bar-create-btn:active { transform: scale(0.88); }
    .bottom-bar-create-btn img {
      width: 24px;
      height: 24px;
    }

    /* 프로필 아바타 (하단바) */
    .bottom-bar-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3478f6, #53b6f9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: white;
      overflow: hidden;
      flex-shrink: 0;
    }
    .bottom-bar-avatar img {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
      filter: none !important;
    }

    @media (max-width: 768px) {
      .sidebar { display: none !important; }
      .bottom-bar { display: flex !important; }
      html, body { height: 100%; overflow: visible; }
    }
  </style>
</head>
<body>

  <!-- 데스크탑 사이드바 -->
  <div class="sidebar">
    <div class="logo-container" id="logoContainer">
      <img src="logo.svg" alt="Sharer 로고" class="logo-svg">
    </div>
    <div class="nav-item active" id="homeNav">
      <img src="home.png" alt="홈" class="nav-icon-img-home" id="homeIcon">
    </div>
    <div class="nav-item" id="exploreNav">
      <img src="exploreX.png" alt="탐색" class="nav-icon-img-explore" id="exploreIcon">
    </div>
    <div class="nav-item" id="chatNav">
      <img src="chatX.png" alt="채팅" class="nav-icon-img" id="chatIcon">
    </div>
    <div class="nav-item" id="discordNav">
      <img src="discord.png" alt="Discord" class="nav-icon-img">
    </div>
    <button class="create-btn" id="createBtn">
      <img src="new.png" alt="만들기" class="btn-icon-img">
    </button>
    <div class="user-info" id="userInfo" style="display: none;">
      <div class="user-avatar-wrapper">
        <div class="user-avatar" id="userAvatar"></div>
      </div>
      <button class="logout-icon-btn-mobile" id="logoutBtnMobile" onclick="handleLogout(event)">
        <img src="logout.png" alt="로그아웃">
      </button>
    </div>
  </div>

  <!-- 모바일 하단 탭바 -->
  <div class="bottom-bar" id="bottomBar">
    <!-- 홈 -->
    <div class="bottom-bar-item active" id="btmHome">
      <img src="home.png" alt="홈" id="btmHomeIcon">
      <span class="bottom-bar-label">홈</span>
    </div>
    <!-- 탐색 -->
    <div class="bottom-bar-item" id="btmExplore">
      <img src="exploreX.png" alt="탐색" id="btmExploreIcon">
      <span class="bottom-bar-label">탐색</span>
    </div>
    <!-- 만들기 (중앙) -->
    <div class="bottom-bar-create" id="btmCreate">
      <button class="bottom-bar-create-btn">
        <img src="new.png" alt="만들기">
      </button>
    </div>
    <!-- 채팅 -->
    <div class="bottom-bar-item" id="btmChat">
      <img src="chatX.png" alt="채팅" id="btmChatIcon">
      <span class="bottom-bar-label">채팅</span>
    </div>
    <!-- 프로필 / 로그인 -->
    <div class="bottom-bar-item" id="btmProfile">
      <div class="bottom-bar-avatar" id="btmAvatar">?</div>
      <span class="bottom-bar-label" id="btmProfileLabel">프로필</span>
    </div>
  </div>

  <script>
    /* ─── 공통 상태 ─── */
    let isLoggedIn = false;
    let currentUserId = null;
    let currentUserNickname = null;
    let currentUserProfileImage = null;

    const homeNav    = document.getElementById('homeNav');
    const exploreNav = document.getElementById('exploreNav');
    const chatNav    = document.getElementById('chatNav');
    const discordNav = document.getElementById('discordNav');
    const createBtn  = document.getElementById('createBtn');
    const logoContainer = document.getElementById('logoContainer');
    const userInfo   = document.getElementById('userInfo');
    const userAvatar = document.getElementById('userAvatar');
    const homeIcon   = document.getElementById('homeIcon');
    const exploreIcon= document.getElementById('exploreIcon');
    const chatIcon   = document.getElementById('chatIcon');

    /* 데스크탑 아이콘 업데이트 */
    function updateIcons() {
      homeIcon.src    = homeNav.classList.contains('active')    ? 'home.png'    : 'homeX.png';
      exploreIcon.src = exploreNav.classList.contains('active') ? 'explore.png' : 'exploreX.png';
      chatIcon.src    = chatNav.classList.contains('active')    ? 'chat.png'    : 'chatX.png';
    }

    /* 모바일 하단바 아이콘 업데이트 */
    const btmHome    = document.getElementById('btmHome');
    const btmExplore = document.getElementById('btmExplore');
    const btmChat    = document.getElementById('btmChat');
    const btmProfile = document.getElementById('btmProfile');
    const btmHomeIcon    = document.getElementById('btmHomeIcon');
    const btmExploreIcon = document.getElementById('btmExploreIcon');
    const btmChatIcon    = document.getElementById('btmChatIcon');
    const btmProfileLabel= document.getElementById('btmProfileLabel');
    const btmAvatar  = document.getElementById('btmAvatar');

    function updateBottomIcons() {
      btmHomeIcon.src    = btmHome.classList.contains('active')    ? 'home.png'    : 'homeX.png';
      btmExploreIcon.src = btmExplore.classList.contains('active') ? 'explore.png' : 'exploreX.png';
      btmChatIcon.src    = btmChat.classList.contains('active')    ? 'chat.png'    : 'chatX.png';
    }

    function setActiveTab(tab) {
      [homeNav, exploreNav, chatNav].forEach(n => n.classList.remove('active'));
      [btmHome, btmExplore, btmChat, btmProfile].forEach(n => n.classList.remove('active'));

      if (tab === 'home')    { homeNav.classList.add('active');    btmHome.classList.add('active'); }
      if (tab === 'explore') { exploreNav.classList.add('active'); btmExplore.classList.add('active'); }
      if (tab === 'chat')    { chatNav.classList.add('active');    btmChat.classList.add('active'); }
      if (tab === 'profile') { btmProfile.classList.add('active'); }

      updateIcons();
      updateBottomIcons();
    }

    /* ─── 데스크탑 네비게이션 ─── */
    logoContainer.onclick = () => { window.top.location.href = 'https://sharer.jbjb.r-e.kr/index.html'; };
    homeNav.onclick    = () => { window.top.location.href = 'https://sharer.jbjb.r-e.kr/index.html'; };
    exploreNav.onclick = () => { window.top.location.href = 'https://sharer.jbjb.r-e.kr/explore.html'; };
    chatNav.onclick    = () => { window.top.location.href = 'https://sharer.jbjb.r-e.kr/chat.html'; };
    discordNav.onclick = () => { window.open('https://discord.gg/8s6XuWkfQb', '_blank'); };

    createBtn.onclick = () => {
      window.top.location.href = isLoggedIn
        ? 'https://sharer.jbjb.r-e.kr/make.html'
        : 'https://sharer.jbjb.r-e.kr/login.html';
    };

    userInfo.onclick = () => {
      if (isLoggedIn && currentUserId && currentUserNickname) {
        window.top.location.href = `https://sharer.jbjb.r-e.kr/user.html?id=${currentUserId}&nickname=${encodeURIComponent(currentUserNickname)}`;
      }
    };

    /* ─── 모바일 하단바 네비게이션 ─── */
    btmHome.onclick = () => { window.top.location.href = 'https://sharer.jbjb.r-e.kr/index.html'; };
    btmExplore.onclick = () => { window.top.location.href = 'https://sharer.jbjb.r-e.kr/explore.html'; };
    btmChat.onclick = () => { window.top.location.href = 'https://sharer.jbjb.r-e.kr/chat.html'; };

    document.getElementById('btmCreate').onclick = () => {
      window.top.location.href = isLoggedIn
        ? 'https://sharer.jbjb.r-e.kr/make.html'
        : 'https://sharer.jbjb.r-e.kr/login.html';
    };

    btmProfile.onclick = () => {
      if (isLoggedIn && currentUserId && currentUserNickname) {
        window.top.location.href = `https://sharer.jbjb.r-e.kr/user.html?id=${currentUserId}&nickname=${encodeURIComponent(currentUserNickname)}`;
      } else {
        window.top.location.href = 'https://sharer.jbjb.r-e.kr/login.html';
      }
    };

    /* ─── 로그아웃 ─── */
    window.handleLogout = (event) => {
      event.stopPropagation();
      parent.postMessage({ type: 'logout' }, '*');
    };

    /* ─── 프로필 아바타 업데이트 (데스크탑 + 모바일 공통) ─── */
    function applyUserToUI(user) {
      if (!user) {
        isLoggedIn = false;
        currentUserId = null;
        currentUserNickname = null;
        currentUserProfileImage = null;
        userInfo.style.display = 'none';
        // 하단바 프로필 초기화
        btmAvatar.innerHTML = '?';
        btmAvatar.style.background = 'linear-gradient(135deg, #3478f6, #53b6f9)';
        btmProfileLabel.textContent = '프로필';
        return;
      }

      isLoggedIn = true;
      currentUserId = user.id;
      currentUserNickname = user.nickname;
      currentUserProfileImage = user.profile_image;

      /* 데스크탑 아바타 */
      if (user.profile_image && user.profile_image.trim()) {
        const img = document.createElement('img');
        img.src = user.profile_image + (user.profile_image.includes('?') ? '&' : '?') + 'v=' + Date.now();
        img.alt = user.nickname || '프로필';
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
        img.onerror = () => { userAvatar.innerHTML = user.nickname ? user.nickname[0].toUpperCase() : '?'; };
        userAvatar.innerHTML = '';
        userAvatar.appendChild(img);
      } else {
        userAvatar.textContent = user.nickname ? user.nickname[0].toUpperCase() : '?';
      }
      userInfo.style.display = 'flex';

      /* 모바일 아바타 */
      if (user.profile_image && user.profile_image.trim()) {
        const mImg = document.createElement('img');
        mImg.src = user.profile_image + (user.profile_image.includes('?') ? '&' : '?') + 'v=' + Date.now();
        mImg.alt = user.nickname || '프로필';
        mImg.onerror = () => { btmAvatar.innerHTML = user.nickname ? user.nickname[0].toUpperCase() : '?'; };
        btmAvatar.innerHTML = '';
        btmAvatar.appendChild(mImg);
      } else {
        btmAvatar.innerHTML = user.nickname ? user.nickname[0].toUpperCase() : '?';
      }
      btmProfileLabel.textContent = user.nickname ? user.nickname.slice(0, 4) : '프로필';
    }

    /* ─── 메시지 수신 ─── */
    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data?.type) return;

      if (data.type === 'activateHome' || data.type === 'default') setActiveTab('home');
      if (data.type === 'activateExplore') setActiveTab('explore');
      if (data.type === 'activateChat')    setActiveTab('chat');

      if (data.type === 'updateUser') applyUserToUI(data.user || null);

      if (data.type === 'setNarrowMode') {
        /* narrow 모드 처리 – 모바일에서는 CSS media query가 하단바 제어하므로 별도 처리 없음 */
      }
    });

    /* ─── 초기화 ─── */
    setActiveTab('home');
    parent.postMessage({ type: 'requestUserInfo' }, '*');
  </script>
</body>
</html>
