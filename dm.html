<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다이렉트 : Sharer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #000000;
            --secondary-bg: #121212;
            --container-bg: #1c1c1e;
            --text-main: #ffffff;
            --text-sub: #a1a1a1;
            --accent-color: #6366f1;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --border-color: #2c2c2e;
            --my-chat-bg: #6366f1;
            --other-chat-bg: #2c2c2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 메인 레이아웃 */
        .dm-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background-color: var(--secondary-bg);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        @media (min-width: 768px) {
            .dm-container {
                height: 800px;
                border-radius: 20px;
                overflow: hidden;
                border: 1px solid var(--border-color);
            }
        }

        /* 헤더 스타일 */
        header {
            padding: 15px 20px;
            background-color: var(--secondary-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .header-actions i {
            font-size: 1.2rem;
            margin-left: 15px;
            cursor: pointer;
            color: var(--text-sub);
        }

        .header-actions i:hover {
            color: var(--text-main);
        }

        /* 리스트 뷰 (채팅방 목록) */
        #room-list-view {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 70px;
        }

        .room-item {
            display: flex;
            padding: 15px 20px;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .room-item:hover {
            background-color: var(--container-bg);
        }

        .room-profile {
            width: 50px;
            height: 50px;
            border-radius: 18px;
            background: var(--accent-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            font-size: 1.2rem;
            color: white;
            position: relative;
        }

        .room-info {
            flex: 1;
            overflow: hidden;
        }

        .room-name-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .room-name {
            font-weight: 600;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .room-time {
            font-size: 0.75rem;
            color: var(--text-sub);
        }

        .room-last-msg {
            font-size: 0.85rem;
            color: var(--text-sub);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .room-badge {
            background-color: #ff4d4f;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 5px;
        }

        /* 채팅방 뷰 */
        #chat-room-view {
            display: none;
            flex-direction: column;
            height: 100%;
            background-color: var(--secondary-bg);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 20;
        }

        .chat-header {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
        }

        .back-btn {
            margin-right: 15px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg-row {
            display: flex;
            max-width: 80%;
        }

        .msg-row.me {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-profile {
            width: 35px;
            height: 35px;
            border-radius: 12px;
            background: #444;
            margin-right: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
        }

        .me .msg-profile {
            margin-right: 0;
            margin-left: 10px;
        }

        .msg-content-wrapper {
            display: flex;
            flex-direction: column;
        }

        .msg-sender {
            font-size: 0.75rem;
            color: var(--text-sub);
            margin-bottom: 4px;
        }

        .me .msg-sender {
            text-align: right;
        }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
        }

        .other .msg-bubble {
            background-color: var(--other-chat-bg);
            border-top-left-radius: 2px;
        }

        .me .msg-bubble {
            background: var(--accent-gradient);
            border-top-right-radius: 2px;
        }

        .msg-time {
            font-size: 0.65rem;
            color: var(--text-sub);
            align-self: flex-end;
            margin: 0 5px;
        }

        /* 채팅 입력창 */
        .chat-input-area {
            padding: 15px;
            background-color: var(--secondary-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            background-color: var(--container-bg);
            border: none;
            border-radius: 20px;
            padding: 10px 15px;
            color: white;
            outline: none;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: none;
            color: white;
        }

        /* 모달 스타일 */
        .modal {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--container-bg);
            width: 100%;
            max-width: 350px;
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--border-color);
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px;
            color: white;
            outline: none;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-cancel {
            background: #333;
            color: white;
        }

        .btn-confirm {
            background: var(--accent-gradient);
            color: white;
        }

        /* 초대/설정 사이드바 */
        #chat-settings {
            display: none;
            position: absolute;
            top: 0;
            right: 0;
            width: 70%;
            height: 100%;
            background: var(--container-bg);
            z-index: 30;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            padding: 20px;
            flex-direction: column;
        }

        .settings-header {
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .member-list {
            flex: 1;
            overflow-y: auto;
        }

        .member-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .member-profile {
            width: 30px;
            height: 30px;
            border-radius: 10px;
            background: #444;
            margin-right: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.7rem;
        }

        .leave-btn {
            color: #ff4d4f;
            cursor: pointer;
            margin-top: 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 플로팅 버튼 */
        .fab {
            position: absolute;
            bottom: 30px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 20px;
            background: var(--accent-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            cursor: pointer;
            z-index: 15;
            transition: transform 0.2s;
        }

        .fab:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="dm-container">
        <!-- 채팅방 목록 헤더 -->
        <header id="list-header">
            <div class="header-title">메시지</div>
            <div class="header-actions">
                <i class="fas fa-search"></i>
                <i class="fas fa-cog"></i>
            </div>
        </header>

        <!-- 채팅방 목록 뷰 -->
        <div id="room-list-view">
            <!-- 동적으로 생성될 목록 -->
        </div>

        <!-- 새 채팅방 만들기 버튼 -->
        <div class="fab" onclick="openCreateModal()">
            <i class="fas fa-plus"></i>
        </div>

        <!-- 채팅방 상세 뷰 -->
        <div id="chat-room-view">
            <div class="chat-header">
                <i class="fas fa-arrow-left back-btn" onclick="closeChat()"></i>
                <div class="room-info">
                    <div class="room-name" id="current-room-name">채팅방</div>
                    <div class="room-time" id="current-room-members">멤버 0명</div>
                </div>
                <div class="header-actions">
                    <i class="fas fa-bars" onclick="toggleSettings()"></i>
                </div>
            </div>
            
            <div class="chat-messages" id="chat-messages">
                <!-- 메시지들 -->
            </div>

            <div class="chat-input-area">
                <i class="far fa-image" style="color: var(--text-sub); cursor: pointer;"></i>
                <input type="text" id="message-input" placeholder="메시지를 입력하세요..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>

            <!-- 채팅방 설정/초대 사이드바 -->
            <div id="chat-settings">
                <div class="settings-header">채팅방 정보</div>
                <div style="font-size: 0.8rem; color: var(--text-sub); margin-bottom: 10px;">대화 상대</div>
                <div class="member-list" id="current-member-list">
                    <!-- 멤버 목록 -->
                </div>
                <div class="modal-btn btn-confirm" style="margin-top: 15px; text-align: center; font-size: 0.85rem;" onclick="openInviteModal()">
                    <i class="fas fa-user-plus"></i> 대화 상대 초대
                </div>
                <div class="leave-btn" onclick="leaveRoom()">
                    <i class="fas fa-sign-out-alt"></i> 채팅방 나가기
                </div>
            </div>
        </div>

        <!-- 채팅방 생성 모달 -->
        <div id="create-modal" class="modal">
            <div class="modal-content">
                <div class="modal-title">새 채팅방 만들기</div>
                <div class="input-group">
                    <label>채팅방 이름</label>
                    <input type="text" id="new-room-name" placeholder="예: 코딩 공부방, 철수와 대화">
                </div>
                <div class="input-group">
                    <label>첫 번째 멤버 닉네임</label>
                    <input type="text" id="new-room-member" placeholder="초대할 사용자 아이디">
                </div>
                <div class="modal-btns">
                    <button class="modal-btn btn-cancel" onclick="closeModal('create-modal')">취소</button>
                    <button class="modal-btn btn-confirm" onclick="createRoom()">생성하기</button>
                </div>
            </div>
        </div>

        <!-- 초대 모달 -->
        <div id="invite-modal" class="modal">
            <div class="modal-content">
                <div class="modal-title">대화 상대 초대</div>
                <div class="input-group">
                    <label>사용자 닉네임</label>
                    <input type="text" id="invite-nickname" placeholder="초대할 사용자 아이디">
                </div>
                <div class="modal-btns">
                    <button class="modal-btn btn-cancel" onclick="closeModal('invite-modal')">취소</button>
                    <button class="modal-btn btn-confirm" onclick="inviteMember()">초대하기</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 상태 관리
        let rooms = JSON.parse(localStorage.getItem('sharer_dm_rooms')) || [
            {
                id: 1,
                name: 'Sharer 공식 공지방',
                members: ['Sharer', '나'],
                lastMsg: '새로운 기능이 업데이트 되었습니다!',
                time: '오후 2:30',
                unread: 1,
                messages: [
                    { sender: 'Sharer', content: '안녕하세요! Sharer DM 기능에 오신 것을 환영합니다.', time: '오후 2:25' },
                    { sender: 'Sharer', content: '새로운 기능이 업데이트 되었습니다!', time: '오후 2:30' }
                ]
            }
        ];

        let currentRoomId = null;
        const myNickname = '나';

        // 초기화
        window.onload = () => {
            renderRoomList();
        };

        // 방 목록 렌더링
        function renderRoomList() {
            const listContainer = document.getElementById('room-list-view');
            listContainer.innerHTML = '';

            rooms.sort((a, b) => b.id - a.id).forEach(room => {
                const item = document.createElement('div');
                item.className = 'room-item';
                item.onclick = () => openChat(room.id);

                const initials = room.name.substring(0, 1);
                
                item.innerHTML = `
                    <div class="room-profile">${initials}</div>
                    <div class="room-info">
                        <div class="room-name-row">
                            <span class="room-name">${room.name}</span>
                            <span class="room-time">${room.time}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span class="room-last-msg">${room.lastMsg}</span>
                            ${room.unread > 0 ? `<span class="room-badge">${room.unread}</span>` : ''}
                        </div>
                    </div>
                `;
                listContainer.appendChild(item);
            });
            
            localStorage.setItem('sharer_dm_rooms', JSON.stringify(rooms));
        }

        // 채팅방 열기
        function openChat(roomId) {
            currentRoomId = roomId;
            const room = rooms.find(r => r.id === roomId);
            if (!room) return;

            room.unread = 0;
            document.getElementById('current-room-name').innerText = room.name;
            document.getElementById('current-room-members').innerText = `멤버 ${room.members.length}명`;
            
            renderMessages();
            document.getElementById('chat-room-view').style.display = 'flex';
            renderRoomList(); // 배지 업데이트용
        }

        // 메시지 렌더링
        function renderMessages() {
            const room = rooms.find(r => r.id === currentRoomId);
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';

            room.messages.forEach(msg => {
                const isMe = msg.sender === myNickname;
                const row = document.createElement('div');
                row.className = `msg-row ${isMe ? 'me' : 'other'}`;

                const initials = msg.sender.substring(0, 1);

                row.innerHTML = `
                    ${!isMe ? `<div class="msg-profile">${initials}</div>` : ''}
                    <div class="msg-content-wrapper">
                        ${!isMe ? `<div class="msg-sender">${msg.sender}</div>` : ''}
                        <div style="display: flex; ${isMe ? 'flex-direction: row-reverse;' : ''} align-items: flex-end;">
                            <div class="msg-bubble">${msg.content}</div>
                            <div class="msg-time">${msg.time}</div>
                        </div>
                    </div>
                `;
                container.appendChild(row);
            });
            container.scrollTop = container.scrollHeight;
        }

        // 메시지 전송
        function sendMessage() {
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            if (!content || !currentRoomId) return;

            const room = rooms.find(r => r.id === currentRoomId);
            const now = new Date();
            const timeStr = `${now.getHours() > 12 ? '오후' : '오전'} ${now.getHours() % 12 || 12}:${String(now.getMinutes()).padStart(2, '0')}`;

            const newMsg = {
                sender: myNickname,
                content: content,
                time: timeStr
            };

            room.messages.push(newMsg);
            room.lastMsg = content;
            room.time = timeStr;

            input.value = '';
            renderMessages();
            renderRoomList();
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        // 채팅방 닫기
        function closeChat() {
            document.getElementById('chat-room-view').style.display = 'none';
            document.getElementById('chat-settings').style.display = 'none';
            currentRoomId = null;
        }

        // 모달 관리
        function openCreateModal() {
            document.getElementById('create-modal').style.display = 'flex';
        }

        function openInviteModal() {
            document.getElementById('invite-modal').style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        // 채팅방 생성
        function createRoom() {
            const nameInput = document.getElementById('new-room-name');
            const memberInput = document.getElementById('new-room-member');
            
            if (!nameInput.value.trim()) return alert('방 이름을 입력하세요.');

            const newRoom = {
                id: Date.now(),
                name: nameInput.value.trim(),
                members: [myNickname],
                lastMsg: '채팅방이 생성되었습니다.',
                time: '방금',
                unread: 0,
                messages: []
            };

            if (memberInput.value.trim()) {
                newRoom.members.push(memberInput.value.trim());
            }

            rooms.push(newRoom);
            closeModal('create-modal');
            nameInput.value = '';
            memberInput.value = '';
            renderRoomList();
            openChat(newRoom.id);
        }

        // 설정 사이드바 토글
        function toggleSettings() {
            const settings = document.getElementById('chat-settings');
            const isVisible = settings.style.display === 'flex';
            
            if (!isVisible) {
                const room = rooms.find(r => r.id === currentRoomId);
                const list = document.getElementById('current-member-list');
                list.innerHTML = '';
                
                room.members.forEach(m => {
                    const item = document.createElement('div');
                    item.className = 'member-item';
                    item.innerHTML = `
                        <div class="member-profile">${m.substring(0,1)}</div>
                        <div style="font-size: 0.9rem;">${m} ${m === myNickname ? '(나)' : ''}</div>
                    `;
                    list.appendChild(item);
                });
                settings.style.display = 'flex';
            } else {
                settings.style.display = 'none';
            }
        }

        // 멤버 초대
        function inviteMember() {
            const input = document.getElementById('invite-nickname');
            const nickname = input.value.trim();
            if (!nickname) return;

            const room = rooms.find(r => r.id === currentRoomId);
            if (room.members.includes(nickname)) {
                alert('이미 대화 중인 멤버입니다.');
            } else {
                room.members.push(nickname);
                room.messages.push({
                    sender: 'System',
                    content: `${nickname}님이 초대되었습니다.`,
                    time: ''
                });
                renderMessages();
                document.getElementById('current-room-members').innerText = `멤버 ${room.members.length}명`;
                closeModal('invite-modal');
                input.value = '';
                toggleSettings(); // 새로고침용
                toggleSettings();
            }
        }

        // 방 나가기
        function leaveRoom() {
            if (!confirm('정말 이 채팅방을 나가시겠습니까?')) return;
            
            rooms = rooms.filter(r => r.id !== currentRoomId);
            closeChat();
            renderRoomList();
        }
    </script>
</body>
</html>
