<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>메시지 : Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>
  <script>
    const savedTheme = localStorage.getItem('theme') || 'dark';
    if (savedTheme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --blue: #3b82f6;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    html[data-theme="light"] {
      --bg: #fafafa;
      --bg2: #ffffff;
      --bg3: #f0f0f0;
      --bg4: #e4e4e4;
      --border: #dbdbdb;
      --border2: #cccccc;
      --border3: #a3a3a3;
      --t1: #000000;
      --t2: #737373;
      --t3: #a8a8a8;
    }

    #nprogress .bar { background: var(--t1) !important; height: 2px !important; }
    #nprogress .peg { display: none !important; }
    #nprogress .spinner { display: none !important; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
      overflow: hidden;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* SIDEBAR */
    .sidebar-container { width: 72px; min-width: 72px; height: 100vh; position: fixed; left: 0; top: 0; z-index: 100; }
    .sidebar-container iframe { width: 72px !important; height: 100%; border: none; }

    /* MAIN WRAPPER */
    .main-wrapper { 
      margin-left: 72px; 
      width: calc(100% - 72px); 
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
    }

    /* HEADER */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      z-index: 50;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .back-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: none;
      background: none;
      color: var(--t2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .back-btn:hover { color: var(--t1); background: var(--bg3); }
    .back-btn:active { transform: scale(0.82); }
    .header-title { font-size: 16px; font-weight: 600; }

    .header-right .action-btn {
      background: var(--t1);
      color: var(--bg);
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .header-right .action-btn:active { transform: scale(0.95); }

    /* DM LAYOUT */
    .dm-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      background: var(--bg);
    }

    /* 왼쪽 패널 (목록) */
    .room-list-pane {
      width: 320px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      background: var(--bg);
    }
    .room-list-header {
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 700;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .rooms-scroll-area { flex: 1; overflow-y: auto; }
    .room-item {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      gap: 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }
    .room-item:hover { background: var(--bg2); }
    .room-item.active { background: var(--bg3); }

    /* 카카오톡 스타일 복합 프로필 */
    .room-avatar {
      width: 48px; height: 48px;
      border-radius: 18px;
      background: var(--bg4);
      position: relative;
      overflow: hidden;
      display: grid;
      gap: 1px;
      flex-shrink: 0;
    }
    .room-avatar.grid-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    .room-avatar.grid-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
    .room-avatar.grid-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .room-avatar.grid-3 img:first-child { grid-column: 1 / span 2; }
    .room-avatar.grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

    .room-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .room-avatar .avatar-text {
      width: 100%; height: 100%; display: flex; align-items: center; 
      justify-content: center; font-size: 16px; font-weight: 600; color: var(--t1); background: var(--bg4);
    }

    .room-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .room-name { font-size: 14px; font-weight: 600; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .room-last-msg { font-size: 12px; color: var(--t2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* 오른쪽 패널 (채팅창) */
    .chat-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg2);
      position: relative;
    }
    .chat-empty-state {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: var(--bg); color: var(--t2); font-size: 14px; gap: 8px;
    }

    /* 채팅창 내부 세컨드 헤더 바 */
    .chat-sub-header {
      padding: 12px 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sub-header-left { font-size: 15px; font-weight: 600; }
    .sub-header-right { display: flex; align-items: center; gap: 8px; }
    
    .icon-btn {
      width: 34px; height: 34px; border-radius: 8px; border: none; background: transparent;
      color: var(--t2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .icon-btn:hover { color: var(--t1); background: var(--bg3); }
    .icon-btn:active { transform: scale(0.92); }

    /* 대화 뷰 영역 */
    .chat-messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 메시지 공통 */
    .msg-wrapper { display: flex; gap: 10px; max-width: 75%; align-items: flex-end; }
    .msg-wrapper.me { align-self: flex-end; flex-direction: row-reverse; max-width: 70%; }
    .msg-wrapper.other { align-self: flex-start; }

    .msg-avatar {
      width: 36px; height: 36px; border-radius: 50%; background: var(--bg4);
      overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .msg-container { display: flex; flex-direction: column; gap: 4px; }
    .msg-author { font-size: 12px; color: var(--t2); padding-left: 2px; }
    
    .msg-bubble-box { display: flex; align-items: flex-end; gap: 6px; }
    .msg-wrapper.me .msg-bubble-box { flex-direction: row-reverse; }

    .msg-bubble {
      padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-break: break-all; white-space: pre-wrap;
    }
    .msg-wrapper.other .msg-bubble { background: var(--bg3); color: var(--t1); border-top-left-radius: 4px; }
    .msg-wrapper.me .msg-bubble { background: var(--t1); color: var(--bg); border-top-right-radius: 4px; }

    /* 전송 중 로딩 효과 및 종이비행기 */
    .msg-wrapper.me.sending .msg-bubble { opacity: 0.6; }
    .status-indicator { display: flex; align-items: center; color: var(--t2); }
    .paper-plane-icon { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; animation: pulsePlane 1s infinite alternate; }
    @keyframes pulsePlane { from { opacity: 0.4; } to { opacity: 1; } }

    .msg-time { font-size: 10px; color: var(--t3); flex-shrink: 0; margin-bottom: 2px; }

    /* 시스템 메시지 UI */
    .system-msg {
      align-self: center;
      background: var(--bg3);
      color: var(--t2);
      font-size: 12px;
      padding: 6px 16px;
      border-radius: 20px;
      text-align: center;
      max-width: 90%;
      margin: 8px 0;
      border: 1px solid var(--border);
    }

    /* 하단 입력 바 */
    .chat-input-bar {
      padding: 16px 20px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: center;
      flex-shrink: 0;
    }
    .chat-textarea {
      flex: 1; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--r2);
      padding: 12px 16px; color: var(--t1); font-size: 14px; font-family: inherit; resize: none;
      height: 44px; max-height: 120px; line-height: 1.4;
    }
    .chat-textarea:focus { outline: none; border-color: var(--border3); }
    .send-btn {
      background: var(--t1); color: var(--bg); border: none; padding: 0 16px; height: 44px;
      border-radius: var(--r2); font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:active { transform: scale(0.95); }

    /* 알림 시스템 */
    .noti-toast {
      position: fixed; top: -60px; left: 50%; transform: translateX(-50%);
      background: var(--bg3); border: 1px solid var(--border2); color: var(--t1);
      padding: 10px 24px; border-radius: 30px; font-size: 13px; font-weight: 500;
      z-index: 99999; pointer-events: none; opacity: 0; transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .noti-toast.show { top: 20px; opacity: 1; }

    /* 모달 스타일 */
    .modal {
      display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0); backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
      justify-content: center; align-items: center; z-index: 10000; pointer-events: none; visibility: hidden;
      transition: all 0.3s ease;
    }
    .modal.open { 
      pointer-events: auto; visibility: visible; background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .modal-content {
      background: var(--bg2); border: 1px solid var(--border2); width: 90%; max-width: 400px;
      border-radius: var(--r4); padding: 24px; position: relative; display: flex; flex-direction: column;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5); opacity: 0; transform: scale(0.85) translateY(20px);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal.open .modal-content { opacity: 1; transform: scale(1) translateY(0); }
    
    .modal-close-btn {
      position: absolute; top: 20px; right: 20px; background: none; border: none;
      color: var(--t2); cursor: pointer; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
    }
    .modal-title { font-size: 16px; font-weight: 600; color: var(--t1); margin-bottom: 16px; padding-right: 24px; }
    
    /* 멤버 리스트 박스 */
    .member-list { display: flex; flex-direction: column; gap: 8px; max-height: 240px; overflow-y: auto; margin-bottom: 20px; }
    .member-item {
      display: flex; align-items: center; gap: 12px; padding: 8px 10px; border-radius: var(--r1);
      background: var(--bg); border: 1px solid var(--border); cursor: pointer; transition: background 0.2s;
    }
    .member-item:hover { background: var(--bg3); }
    .member-avatar { width: 32px; height: 32px; border-radius: 50%; overflow: hidden; background: var(--bg4); display: flex; align-items: center; justify-content: center; font-size: 12px; }
    .member-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .member-name { font-size: 14px; font-weight: 500; color: var(--t1); flex: 1; }
    
    .modal-footer-btn {
      width: 100%; padding: 12px; border-radius: var(--r2); border: none; font-size: 14px;
      font-weight: 600; cursor: pointer; text-align: center; font-family: inherit; transition: all 0.2s;
    }
    .modal-footer-btn.leave { background: rgba(255, 107, 107, 0.15); color: var(--pink); border: 1px solid rgba(255, 107, 107, 0.3); }
    .modal-footer-btn.leave:hover { background: rgba(255, 107, 107, 0.25); }
    .modal-footer-btn.primary { background: var(--t1); color: var(--bg); }

    /* 검색창 패널 + 스켈레톤 로딩 */
    .search-panel {
      position: fixed; top: 0; left: 72px; width: 350px; height: 100vh; background: var(--bg);
      border-right: 1px solid var(--border); z-index: 90; transform: translateX(-100%);
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1); display: flex; flex-direction: column;
    }
    .search-panel.open { transform: translateX(0); }
    .search-panel-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    
    .search-input-box { padding: 12px 20px; border-bottom: 1px solid var(--border); }
    .search-input { width: 100%; padding: 8px 12px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; color: var(--t1); font-family: inherit; }
    .search-results-area { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }

    /* 스켈레톤 기본 구조 */
    .skeleton {
      background: linear-gradient(90deg, var(--bg2) 0%, var(--bg3) 50%, var(--bg2) 100%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite linear; border-radius: var(--r1);
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .sk-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
    .sk-circle { width: 40px; height: 40px; border-radius: 50%; }
    .sk-text-line { height: 14px; border-radius: 4px; }

    @media (max-width: 768px) {
      .sidebar-container { left: 0; right: 0; top: auto; bottom: 0; width: 100%; min-width: 0; height: 56px; }
      .sidebar-container iframe { width: 100% !important; height: 100% !important; }
      .main-wrapper { margin-left: 0; width: 100%; height: calc(100vh - 56px); }
      .search-panel { left: 0; width: 100%; z-index: 110; }
      .room-list-pane { width: 100%; }
      .room-list-pane.hidden-mobile { display: none; }
      .chat-pane { display: none; width: 100%; }
      .chat-pane.active-mobile { display: flex; }
    }
  </style>
</head>
<body>

  <div class="noti-toast" id="notiToast">새로운 메시지가 도착했습니다.</div>

  <div class="sidebar-container">
    <iframe src="sidebar.html" id="sidebarFrame"></iframe>
  </div>

  <!-- 유저 검색 패널 -->
  <div class="search-panel" id="searchPanel">
    <div class="search-panel-header">
      <h3 style="font-size: 16px; font-weight: 600;">유저 검색</h3>
      <button class="icon-btn" onclick="toggleSearchPanel()" style="font-size: 18px;">✕</button>
    </div>
    <div class="search-input-box">
      <input type="text" class="search-input" id="userSearchInput" placeholder="닉네임으로 검색..." oninput="handleSearchInput(this.value)">
    </div>
    <div class="search-results-area" id="searchResultsArea"></div>
  </div>

  <!-- 대화방 서랍/상세 정보 모달 -->
  <div class="modal" id="roomDrawerModal">
    <div class="modal-content">
      <button class="modal-close-btn" onclick="closeDrawerModal()">✕</button>
      <div class="modal-title" id="drawerRoomName">채팅방 정보</div>
      <div style="font-size: 12px; color: var(--t2); margin-bottom: 8px;">대화 상대 목록</div>
      <div class="member-list" id="drawerMemberList"></div>
      <button class="modal-footer-btn leave" onclick="leaveCurrentRoom()">방 나가기</button>
    </div>
  </div>

  <!-- 멤버 초대 모달 -->
  <div class="modal" id="inviteUserModal">
    <div class="modal-content">
      <button class="modal-close-btn" onclick="closeInviteModal()">✕</button>
      <div class="modal-title">채팅방에 초대하기</div>
      <div class="member-list" id="inviteUsersList"></div>
      <button class="modal-footer-btn primary" onclick="closeInviteModal()">완료</button>
    </div>
  </div>

  <div class="main-wrapper">
    <div class="header">
      <div class="header-left">
        <button class="back-btn" onclick="handleHeaderBack()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M19 12H5M5 12l7-7M5 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="header-title">Direct Messages</div>
      </div>
      <div class="header-right">
        <button class="action-btn" onclick="openNewChatFlow()">새 대화</button>
      </div>
    </div>

    <div class="dm-container">
      <!-- 대화방 목록 -->
      <div class="room-list-pane" id="roomListPane">
        <div class="room-list-header">
          <span>채팅방</span>
          <button class="icon-btn" onclick="toggleSearchPanel()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </button>
        </div>
        <div class="rooms-scroll-area" id="roomsContainer"></div>
      </div>

      <!-- 채팅창 메인 판넬 -->
      <div class="chat-pane" id="chatPane">
        <div class="chat-empty-state" id="chatEmptyState">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--t3);"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          <span>선택된 채팅방이 없습니다. 대화를 시작해 보세요.</span>
        </div>

        <div class="chat-sub-header">
          <div class="sub-header-left" id="chatSubHeaderTitle">대화방</div>
          <div class="sub-header-right">
            <button class="icon-btn" title="초대하기" onclick="openInviteModal()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
            </button>
            <button class="icon-btn" title="정보 및 메뉴" onclick="openDrawerModal()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
          </div>
        </div>

        <div class="chat-messages-area" id="chatMessagesArea"></div>

        <div class="chat-input-bar">
          <textarea class="chat-textarea" id="chatTextarea" placeholder="메시지를 입력하세요..." onkeydown="handleTextAreaKey(event)"></textarea>
          <button class="send-btn" onclick="sendMessage()">전송</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    NProgress.configure({ showSpinner: false });

    // 1. 로그인 유저 상태 연동 (없으면 기본 정빈 계정으로 초기화 생성)
    let currentUser = JSON.parse(localStorage.getItem('snsUser'));
    if (!currentUser) {
      currentUser = { id: "user_me", nickname: "정빈", profile_image: "" };
      localStorage.setItem('snsUser', JSON.stringify(currentUser));
    }
    
    // 2. 글로벌 가상 데이터베이스 초기화 (localStorage 세션에 의존하여 유저방 유지 가능)
    let mockUsers = JSON.parse(localStorage.getItem('mock_users')) || [
      { id: "user_1", nickname: "김철수", profile_image: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=80&h=80&fit=crop" },
      { id: "user_2", nickname: "이영희", profile_image: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=80&h=80&fit=crop" },
      { id: "user_3", nickname: "박민수", profile_image: "https://images.unsplash.com/photo-1599566150163-29194dcaad36?w=80&h=80&fit=crop" },
      { id: "user_4", nickname: "최지우", profile_image: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=80&h=80&fit=crop" }
    ];

    // 현재 접속해 있는 currentUser가 들어있는 방 정보들만 로드
    let mockRooms = JSON.parse(localStorage.getItem('mock_rooms')) || [
      { id: "room_init_1", name: "동아리 단톡방", members: [currentUser.id, "user_1", "user_2", "user_3"], last_message: "디자인 결과물 공유드립니다.", timestamp: "오후 12:40" },
      { id: "room_init_2", name: "이영희", members: [currentUser.id, "user_2"], last_message: "넵 알겠습니다!", timestamp: "어제" }
    ];

    let mockMessages = JSON.parse(localStorage.getItem('mock_messages')) || {
      "room_init_1": [
        { id: "m1", user_id: "user_1", user_name: "김철수", text: "정빈님 안녕하세요!", is_system: false, timestamp: "오후 12:30" },
        { id: "m2", user_id: "", user_name: "", text: "김철수님이 이영희님을 초대했습니다.", is_system: true, timestamp: "오후 12:31" },
        { id: "m3", user_id: "user_2", user_name: "이영희", text: "디자인 결과물 공유드립니다.", is_system: false, timestamp: "오후 12:40" }
      ],
      "room_init_2": [
        { id: "m4", user_id: "user_2", user_name: "이영희", text: "정빈님 확인 부탁드려요!", is_system: false, timestamp: "어제" },
        { id: "m5", user_id: currentUser.id, user_name: currentUser.nickname, text: "넵 알겠습니다!", is_system: false, timestamp: "어제" }
      ]
    };

    let activeRoomId = null;
    let searchTimeout = null;

    window.addEventListener('load', () => {
      document.body.style.opacity = 1;
      saveToStorage();
      renderRoomList();
      setupSidebarLink();
    });

    function saveToStorage() {
      localStorage.setItem('mock_users', JSON.stringify(mockUsers));
      localStorage.setItem('mock_rooms', JSON.stringify(mockRooms));
      localStorage.setItem('mock_messages', JSON.stringify(mockMessages));
    }

    function setupSidebarLink() {
      window.addEventListener('message', (event) => {
        const { type, page } = event.data || {};
        if (type === 'navigate') {
          if (page === 'home') location.href = 'index.html';
          if (page === 'explore') location.href = 'explore.html';
          if (page === 'profile') location.href = 'profile.html';
        }
      });
    }

    // 로그인한 사용자가 속한 방만 필터링해서 그리는 카카오톡 스타일 복합 프로필 생성기
    function generateRoomAvatarHTML(memberIds) {
      const others = memberIds.filter(id => id !== currentUser.id);
      
      if (others.length === 0) {
        return `<div class="room-avatar grid-1"><div class="avatar-text">나</div></div>`;
      }
      if (others.length === 1) {
        const u = getUserInfo(others[0]);
        if (u.profile_image) return `<div class="room-avatar grid-1"><img src="${u.profile_image}"></div>`;
        return `<div class="room-avatar grid-1"><div class="avatar-text">${u.nickname[0]}</div></div>`;
      }
      if (others.length === 2) {
        return `
          <div class="room-avatar grid-2">
            ${renderIndividualAvatar(others[0])}
            ${renderIndividualAvatar(others[1])}
          </div>`;
      }
      if (others.length === 3) {
        return `
          <div class="room-avatar grid-3">
            ${renderIndividualAvatar(others[0])}
            ${renderIndividualAvatar(others[1])}
            ${renderIndividualAvatar(others[2])}
          </div>`;
      }
      return `
        <div class="room-avatar grid-4">
          ${renderIndividualAvatar(others[0])}
          ${renderIndividualAvatar(others[1])}
          ${renderIndividualAvatar(others[2])}
          ${renderIndividualAvatar(others[3])}
        </div>`;
    }

    function renderIndividualAvatar(userId) {
      const u = getUserInfo(userId);
      if (u.profile_image) return `<img src="${u.profile_image}">`;
      return `<div class="avatar-text" style="font-size:10px;">${u.nickname[0]}</div>`;
    }

    function getUserInfo(userId) {
      if (userId === currentUser.id) return currentUser;
      return mockUsers.find(u => u.id === userId) || { id: userId, nickname: "퇴장인원", profile_image: "" };
    }

    // 내 계정이 속한 대화방만 동적으로 렌더링하도록 매핑 변경
    function renderRoomList() {
      const container = document.getElementById('roomsContainer');
      container.innerHTML = '';

      // 내가 포함된 방 필터링
      const myRooms = mockRooms.filter(room => room.members.includes(currentUser.id));

      if (myRooms.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:40px; color:var(--t3); font-size:13px;">참여 중인 대화방이 없습니다.</div>`;
        return;
      }

      myRooms.forEach(room => {
        const div = document.createElement('div');
        div.className = `room-item ${room.id === activeRoomId ? 'active' : ''}`;
        div.onclick = () => selectRoom(room.id);

        const avatarHTML = generateRoomAvatarHTML(room.members);

        // 방 이름 정의 (단독 채팅방이면 상대방 이름으로 가변 자동 지정)
        let displayRoomName = room.name;
        if (room.members.length === 2) {
          const opponentId = room.members.find(id => id !== currentUser.id);
          if (opponentId) displayRoomName = getUserInfo(opponentId).nickname;
        }

        div.innerHTML = `
          ${avatarHTML}
          <div class="room-info">
            <div style="display:flex; justify-content:space-between; width:100%;">
              <span class="room-name" style="flex:1;">${escapeHtml(displayRoomName)}</span>
              <span style="font-size:11px; color:var(--t3);">${room.timestamp}</span>
            </div>
            <div class="room-last-msg">${escapeHtml(room.last_message || '')}</div>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function selectRoom(roomId) {
      activeRoomId = roomId;
      document.getElementById('chatEmptyState').style.display = 'none';
      
      document.getElementById('roomListPane').classList.add('hidden-mobile');
      document.getElementById('chatPane').classList.add('active-mobile');

      const room = mockRooms.find(r => r.id === roomId);
      let roomTitle = room.name;
      if (room.members.length === 2) {
        const opponentId = room.members.find(id => id !== currentUser.id);
        if (opponentId) roomTitle = getUserInfo(opponentId).nickname;
      }

      document.getElementById('chatSubHeaderTitle').textContent = `${roomTitle} (${room.members.length})`;

      renderRoomMessages();
      renderRoomList();
    }

    function renderRoomMessages() {
      const area = document.getElementById('chatMessagesArea');
      area.innerHTML = '';

      const list = mockMessages[activeRoomId] || [];
      list.forEach(msg => {
        if (msg.is_system) {
          const sysDiv = document.createElement('div');
          sysDiv.className = 'system-msg';
          sysDiv.textContent = msg.text;
          area.appendChild(sysDiv);
        } else {
          const isMe = msg.user_id === currentUser.id;
          const wrapper = document.createElement('div');
          wrapper.className = `msg-wrapper ${isMe ? 'me' : 'other'} ${msg.sending ? 'sending' : ''}`;

          let avatarHtml = '';
          if (!isMe) {
            const u = getUserInfo(msg.user_id);
            const innerAv = u.profile_image ? `<img src="${u.profile_image}">` : u.nickname[0];
            avatarHtml = `<div class="msg-avatar">${innerAv}</div>`;
          }

          let indicatorHtml = '';
          if (isMe && msg.sending) {
            indicatorHtml = `
              <div class="status-indicator">
                <svg class="paper-plane-icon" viewBox="0 0 24 24">
                  <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                </svg>
              </div>`;
          }

          wrapper.innerHTML = `
            ${avatarHtml}
            <div class="msg-container">
              ${!isMe ? `<span class="msg-author">${escapeHtml(msg.user_name)}</span>` : ''}
              <div class="msg-bubble-box">
                <div class="msg-bubble">${escapeHtml(msg.text)}</div>
                ${indicatorHtml}
                <span class="msg-time">${msg.timestamp || '방금 전'}</span>
              </div>
            </div>
          `;
          area.appendChild(wrapper);
        }
      });
      area.scrollTop = area.scrollHeight;
    }

    function sendMessage() {
      const ta = document.getElementById('chatTextarea');
      const text = ta.value.trim();
      if (!text || !activeRoomId) return;

      ta.value = '';
      
      const tempId = 'temp_' + Date.now();
      const newMsg = {
        id: tempId,
        user_id: currentUser.id,
        user_name: currentUser.nickname,
        text: text,
        is_system: false,
        sending: true,
        timestamp: getNowTimeString()
      };

      if (!mockMessages[activeRoomId]) mockMessages[activeRoomId] = [];
      mockMessages[activeRoomId].push(newMsg);
      renderRoomMessages();

      setTimeout(() => {
        const found = mockMessages[activeRoomId].find(m => m.id === tempId);
        if (found) delete found.sending;
        
        const room = mockRooms.find(r => r.id === activeRoomId);
        if (room) {
          room.last_message = text;
          room.timestamp = getNowTimeString();
        }
        
        saveToStorage();
        renderRoomMessages();
        renderRoomList();
        showToastNotification(`메시지가 전송되었습니다.`);
      }, 600);
    }

    function handleTextAreaKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function handleHeaderBack() {
      if (document.getElementById('chatPane').classList.contains('active-mobile')) {
        document.getElementById('chatPane').classList.remove('active-mobile');
        document.getElementById('roomListPane').classList.remove('hidden-mobile');
      } else {
        location.href = "index.html";
      }
    }

    let isSearchOpen = false;
    function toggleSearchPanel() {
      const p = document.getElementById('searchPanel');
      isSearchOpen = !isSearchOpen;
      
      if (isSearchOpen) {
        p.classList.add('open');
        document.getElementById('userSearchInput').focus();
        triggerSearchSkeleton();
      } else {
        p.classList.remove('open');
      }
    }

    function triggerSearchSkeleton() {
      const area = document.getElementById('searchResultsArea');
      area.innerHTML = `
        <div class="sk-item"><div class="skeleton sk-circle"></div><div style="flex:1; display:flex; flex-direction:column; gap:6px;"><div class="skeleton sk-text-line" style="width:40%;"></div><div class="skeleton sk-text-line" style="width:60%;"></div></div></div>
        <div class="sk-item"><div class="skeleton sk-circle"></div><div style="flex:1; display:flex; flex-direction:column; gap:6px;"><div class="skeleton sk-text-line" style="width:50%;"></div><div class="skeleton sk-text-line" style="width:30%;"></div></div></div>
      `;
      
      setTimeout(() => {
        // 나를 제외한 전체 유저 바인딩
        const others = mockUsers.filter(u => u.id !== currentUser.id);
        renderSearchResults(others);
      }, 500);
    }

    function handleSearchInput(val) {
      const area = document.getElementById('searchResultsArea');
      area.innerHTML = `
        <div class="sk-item"><div class="skeleton sk-circle"></div><div style="flex:1; display:flex; flex-direction:column; gap:6px;"><div class="skeleton sk-text-line" style="width:40%;"></div><div class="skeleton sk-text-line" style="width:70%;"></div></div></div>
      `;

      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        const filtered = mockUsers.filter(u => u.id !== currentUser.id && u.nickname.toLowerCase().includes(val.toLowerCase()));
        renderSearchResults(filtered);
      }, 300);
    }

    function renderSearchResults(users) {
      const area = document.getElementById('searchResultsArea');
      area.innerHTML = '';

      if(users.length === 0) {
        area.innerHTML = `<div style="text-align:center; font-size:13px; color:var(--t3); padding-top:20px;">검색 결과가 없습니다.</div>`;
        return;
      }

      users.forEach(u => {
        const item = document.createElement('div');
        item.className = 'member-item';
        item.onclick = () => {
          startSingleChatWithUser(u);
          toggleSearchPanel();
        };
        const avInner = u.profile_image ? `<img src="${u.profile_image}">` : u.nickname[0];
        item.innerHTML = `
          <div class="member-avatar">${avInner}</div>
          <span class="member-name">${escapeHtml(u.nickname)}</span>
          <span style="font-size:11px; color:var(--blue); font-weight:600;">대화하기</span>
        `;
        area.appendChild(item);
      });
    }

    function startSingleChatWithUser(targetUser) {
      let existing = mockRooms.find(r => r.members.length === 2 && r.members.includes(targetUser.id) && r.members.includes(currentUser.id));
      if (existing) {
        selectRoom(existing.id);
        return;
      }

      const newId = 'room_' + Date.now();
      const newRoom = {
        id: newId,
        name: targetUser.nickname,
        members: [currentUser.id, targetUser.id],
        last_message: "새로운 대화방이 생성되었습니다.",
        timestamp: getNowTimeString()
      };

      mockRooms.unshift(newRoom);
      mockMessages[newId] = [
        { id: 'sys_' + Date.now(), user_id: '', user_name: '', text: `${currentUser.nickname}님이 대화를 시작했습니다.`, is_system: true, timestamp: getNowTimeString() }
      ];
      saveToStorage();
      selectRoom(newId);
    }

    function showToastNotification(text) {
      const t = document.getElementById('notiToast');
      t.textContent = text;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    function openDrawerModal() {
      if (!activeRoomId) return;
      const room = mockRooms.find(r => r.id === activeRoomId);
      
      let displayRoomName = room.name;
      if (room.members.length === 2) {
        const opponentId = room.members.find(id => id !== currentUser.id);
        if (opponentId) displayRoomName = getUserInfo(opponentId).nickname;
      }

      document.getElementById('drawerRoomName').textContent = displayRoomName;
      const listArea = document.getElementById('drawerMemberList');
      listArea.innerHTML = '';

      room.members.forEach(mId => {
        const u = getUserInfo(mId);
        const div = document.createElement('div');
        div.className = 'member-item';
        div.onclick = () => {
          location.href = `user.html?id=${u.id}&nickname=${encodeURIComponent(u.nickname)}`;
        };

        const avInner = u.profile_image ? `<img src="${u.profile_image}">` : u.nickname[0];
        div.innerHTML = `
          <div class="member-avatar">${avInner}</div>
          <div class="member-name">${escapeHtml(u.nickname)} ${mId === currentUser.id ? '<span style="color:var(--t3); font-size:11px;">(나)</span>':''}</div>
          <span style="font-size:11px; color:var(--t2);">프로필</span>
        `;
        listArea.appendChild(div);
      });

      document.getElementById('roomDrawerModal').classList.add('open');
    }

    function closeDrawerModal() {
      document.getElementById('roomDrawerModal').classList.remove('open');
    }

    function openInviteModal() {
      if (!activeRoomId) return;
      const room = mockRooms.find(r => r.id === activeRoomId);
      const listArea = document.getElementById('inviteUsersList');
      listArea.innerHTML = '';

      const nonMembers = mockUsers.filter(u => !room.members.includes(u.id));

      if (nonMembers.length === 0) {
        listArea.innerHTML = `<div style="text-align:center; padding:20px; font-size:12px; color:var(--t3);">초대할 수 있는 다른 유저가 없습니다.</div>`;
      } else {
        nonMembers.forEach(u => {
          const div = document.createElement('div');
          div.className = 'member-item';
          div.onclick = () => executeInviteUser(u.id, u.nickname);

          const avInner = u.profile_image ? `<img src="${u.profile_image}">` : u.nickname[0];
          div.innerHTML = `
            <div class="member-avatar">${avInner}</div>
            <div class="member-name">${escapeHtml(u.nickname)}</div>
            <span style="font-size:11px; color:var(--blue); font-weight:600;">초대</span>
          `;
          listArea.appendChild(div);
        });
      }

      document.getElementById('inviteUserModal').classList.add('open');
    }

    function closeInviteModal() {
      document.getElementById('inviteUserModal').classList.remove('open');
    }

    function executeInviteUser(targetId, targetName) {
      const room = mockRooms.find(r => r.id === activeRoomId);
      if (!room) return;

      room.members.push(targetId);
      
      const sysMsg = {
        id: 'sys_' + Date.now(),
        user_id: '',
        user_name: '',
        text: `${currentUser.nickname}님이 ${targetName}님을 초대했습니다.`,
        is_system: true,
        timestamp: getNowTimeString()
      };
      
      mockMessages[activeRoomId].push(sysMsg);
      room.last_message = `${targetName}님이 초대되었습니다.`;
      
      let roomTitle = room.name;
      if (room.members.length === 2) {
        const opponentId = room.members.find(id => id !== currentUser.id);
        if (opponentId) roomTitle = getUserInfo(opponentId).nickname;
      }
      document.getElementById('chatSubHeaderTitle').textContent = `${roomTitle} (${room.members.length})`;
      
      saveToStorage();
      closeInviteModal();
      renderRoomMessages();
      renderRoomList();
      showToastNotification(`${targetName}님을 초대했습니다.`);
    }

    function leaveCurrentRoom() {
      if (!activeRoomId) return;
      if (!confirm("정말로 이 채팅방에서 나가시겠습니까?")) return;

      const room = mockRooms.find(r => r.id === activeRoomId);
      if (room) {
        // 내 아이디를 멤버 목록에서 차감
        room.members = room.members.filter(id => id !== currentUser.id);
        
        const sysMsg = {
          id: 'sys_' + Date.now(),
          user_id: '',
          user_name: '',
          text: `${currentUser.nickname}님이 퇴장하셨습니다.`,
          is_system: true,
          timestamp: getNowTimeString()
        };
        mockMessages[activeRoomId].push(sysMsg);
        room.last_message = `${currentUser.nickname}님이 퇴장하셨습니다.`;
        
        saveToStorage();
        closeDrawerModal();
        activeRoomId = null;
        
        document.getElementById('chatPane').classList.remove('active-mobile');
        document.getElementById('roomListPane').classList.remove('hidden-mobile');
        document.getElementById('chatEmptyState').style.display = 'flex';
        
        renderRoomList();
        showToastNotification("채팅방을 퇴장했습니다.");
      }
    }

    function openNewChatFlow() {
      toggleSearchPanel();
    }

    function getNowTimeString() {
      const now = new Date();
      let hours = now.getHours();
      const minutes = now.getMinutes();
      const ampm = hours >= 12 ? '오후' : '오전';
      hours = hours % 12;
      hours = hours ? hours : 12; 
      const minutesStr = minutes < 10 ? '0' + minutes : minutes;
      return `${ampm} ${hours}:${minutesStr}`;
    }

    function escapeHtml(unsafe) {
      if (!unsafe) return '';
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
