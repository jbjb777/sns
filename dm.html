<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DM | Sharer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #000000;
            --secondary-bg: #121212;
            --container-bg: #1c1c1e;
            --text-main: #ffffff;
            --text-sub: #a1a1a1;
            --accent-color: #6366f1;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --border-color: #2c2c2e;
            --my-chat-bg: #6366f1;
            --other-chat-bg: #2c2c2e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--primary-bg); color: var(--text-main); height: 100vh; display: flex; justify-content: center; align-items: center; }

        .dm-container { width: 100%; max-width: 500px; height: 100vh; background-color: var(--secondary-bg); display: flex; flex-direction: column; position: relative; }
        @media (min-width: 768px) { .dm-container { height: 850px; border-radius: 20px; overflow: hidden; border: 1px solid var(--border-color); } }

        header { padding: 15px 20px; background-color: var(--secondary-bg); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-size: 1.2rem; font-weight: 700; }
        .header-actions i { font-size: 1.2rem; margin-left: 15px; cursor: pointer; color: var(--text-sub); }

        #room-list-view { flex: 1; overflow-y: auto; }
        .room-item { display: flex; padding: 15px 20px; align-items: center; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .room-item:hover { background-color: var(--container-bg); }
        .room-profile { width: 50px; height: 50px; border-radius: 18px; background: var(--accent-gradient); display: flex; justify-content: center; align-items: center; margin-right: 15px; font-size: 1.2rem; color: white; }
        .room-info { flex: 1; overflow: hidden; }
        .room-name-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .room-name { font-weight: 600; }
        .room-last-msg { font-size: 0.85rem; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #chat-room-view { display: none; flex-direction: column; height: 100%; background-color: var(--secondary-bg); position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 20; }
        .chat-header { padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; }
        .back-btn { margin-right: 15px; cursor: pointer; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg-row { display: flex; max-width: 85%; margin-bottom: 5px; }
        .msg-row.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 10px 14px; border-radius: 15px; font-size: 0.95rem; position: relative; word-break: break-all; }
        .other .msg-bubble { background-color: var(--other-chat-bg); border-top-left-radius: 2px; }
        .me .msg-bubble { background: var(--accent-gradient); border-top-right-radius: 2px; }
        .msg-info { font-size: 0.7rem; color: var(--text-sub); margin-top: 4px; }
        .me .msg-info { text-align: right; }

        .chat-input-area { padding: 15px; border-top: 1px solid var(--border-color); display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; background: var(--container-bg); border: none; border-radius: 20px; padding: 10px 15px; color: white; outline: none; }
        .send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--accent-gradient); border: none; color: white; cursor: pointer; }

        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--container-bg); width: 100%; max-width: 350px; border-radius: 20px; padding: 25px; }
        .modal-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; margin-top: 10px; cursor: pointer; font-weight: 600; }
        .btn-confirm { background: var(--accent-gradient); color: white; }
        .btn-cancel { background: #333; color: white; }

        .fab { position: absolute; bottom: 30px; right: 20px; width: 56px; height: 56px; border-radius: 20px; background: var(--accent-gradient); display: flex; justify-content: center; align-items: center; color: white; font-size: 1.5rem; cursor: pointer; z-index: 15; }
        
        #chat-settings { display: none; position: absolute; top: 0; right: 0; width: 75%; height: 100%; background: var(--container-bg); z-index: 30; padding: 20px; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        .loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 200; }
    </style>
</head>
<body>

    <div class="dm-container">
        <div id="loading" class="loading-overlay"><i class="fas fa-spinner fa-spin fa-2x"></i></div>

        <header id="list-header">
            <div class="header-title">Sharer DM</div>
            <div class="header-actions"><i class="fas fa-cog"></i></div>
        </header>

        <div id="room-list-view"></div>

        <div class="fab" onclick="document.getElementById('create-modal').style.display='flex'"><i class="fas fa-plus"></i></div>

        <div id="chat-room-view">
            <div class="chat-header">
                <i class="fas fa-arrow-left back-btn" onclick="closeChat()"></i>
                <div class="room-info">
                    <div class="room-name" id="current-room-name">채팅방</div>
                    <div id="current-room-status" style="font-size: 0.7rem; color: var(--text-sub);">연결 중...</div>
                </div>
                <div class="header-actions"><i class="fas fa-bars" onclick="toggleSettings()"></i></div>
            </div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="message-input" placeholder="메시지 입력..." onkeypress="if(event.key==='Enter')sendMessage()">
                <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>

            <div id="chat-settings">
                <h3 style="margin-bottom: 20px;">채팅방 정보</h3>
                <div id="member-list" style="flex:1; overflow-y:auto;"></div>
                <button class="modal-btn btn-confirm" onclick="document.getElementById('invite-modal').style.display='flex'">초대하기</button>
                <button class="modal-btn btn-cancel" onclick="leaveRoom()" style="color:#ff4d4f;">방 나가기</button>
            </div>
        </div>

        <!-- 모달들 -->
        <div id="create-modal" class="modal">
            <div class="modal-content">
                <h3>새 채팅방</h3>
                <input type="text" id="new-room-name" placeholder="방 이름" style="width:100%; padding:10px; margin:10px 0; background:#222; border:1px solid #444; color:white; border-radius:5px;">
                <button class="modal-btn btn-confirm" onclick="createRoom()">생성</button>
                <button class="modal-btn btn-cancel" onclick="this.parentElement.parentElement.style.display='none'">취on취소</button>
            </div>
        </div>

        <div id="invite-modal" class="modal">
            <div class="modal-content">
                <h3>초대하기</h3>
                <input type="text" id="invite-user-id" placeholder="사용자 UUID 또는 닉네임" style="width:100%; padding:10px; margin:10px 0; background:#222; border:1px solid #444; color:white; border-radius:5px;">
                <button class="modal-btn btn-confirm" onclick="inviteUser()">초대</button>
                <button class="modal-btn btn-cancel" onclick="this.parentElement.parentElement.style.display='none'">취소</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";
        let currentUser = null;
        let currentRoomId = null;
        let pollInterval = null;

        // API 통신 함수
        async function callApi(endpoint, method = 'GET', body = null) {
            const options = {
                method,
                headers: { 'Content-Type': 'application/json' }
            };
            if (body) options.body = JSON.stringify(body);
            
            try {
                const res = await fetch(`${API_BASE}${endpoint}`, options);
                return await res.json();
            } catch (e) {
                console.error("API Error:", e);
                return { error: true };
            }
        }

        // 초기화: 로그인 정보 확인 (Sharer 기존 시스템 연동 가정)
        window.onload = async () => {
            // 실제 서비스에서는 localStorage나 세션에서 사용자 정보를 가져옵니다.
            // 테스트를 위해 임시 유저 정보를 생성하거나 가져옵니다.
            currentUser = JSON.parse(localStorage.getItem('sharer_user')) || { id: 'test-uuid', nickname: '사용자' };
            loadRooms();
        };

        // 채팅방 목록 불러오기
        async function loadRooms() {
            showLoading(true);
            // 실제 API 엔드포인트는 개발하신 Cloudflare Worker 구조에 맞게 조정 필요
            // 예: /dm/rooms?user_id=...
            const data = await callApi(`/dm_rooms?user_id=${currentUser.id}`);
            const container = document.getElementById('room-list-view');
            container.innerHTML = '';

            if (data && data.rooms) {
                data.rooms.forEach(room => {
                    const div = document.createElement('div');
                    div.className = 'room-item';
                    div.onclick = () => openChat(room.id, room.name);
                    div.innerHTML = `
                        <div class="room-profile">${room.name[0]}</div>
                        <div class="room-info">
                            <div class="room-name-row"><span class="room-name">${room.name}</span></div>
                            <div class="room-last-msg">${room.last_message || '대화 내용이 없습니다.'}</div>
                        </div>
                    `;
                    container.appendChild(div);
                });
            }
            showLoading(false);
        }

        // 채팅방 열기
        async function openChat(roomId, roomName) {
            currentRoomId = roomId;
            document.getElementById('current-room-name').innerText = roomName;
            document.getElementById('chat-room-view').style.display = 'flex';
            document.getElementById('chat-messages').innerHTML = '';
            
            loadMessages();
            // 실시간성을 위해 3초마다 메시지 폴링 (Supabase Realtime 미사용 시)
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(loadMessages, 3000);
        }

        // 메시지 불러오기
        async function loadMessages() {
            if (!currentRoomId) return;
                const data = await callApi(`/dm_messages?room_id=${currentRoomId}`);
            if (data && data.messages) {
                const container = document.getElementById('chat-messages');
                const isAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 100;
                
                container.innerHTML = '';
                data.messages.forEach(msg => {
                    const isMe = msg.sender_id === currentUser.id;
                    const row = document.createElement('div');
                    row.className = `msg-row ${isMe ? 'me' : 'other'}`;
                    row.innerHTML = `
                        <div class="msg-content-wrapper">
                            <div class="msg-bubble">${msg.content}</div>
                            <div class="msg-info">${new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                        </div>
                    `;
                    container.appendChild(row);
                });
                if (isAtBottom) container.scrollTop = container.scrollHeight;
            }
        }

        // 메시지 전송
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            if (!content || !currentRoomId) return;

            const res = await callApi('/dm_messages', 'POST', {
                room_id: currentRoomId,
                sender_id: currentUser.id,
                content: content
            });

            if (res.success) {
                input.value = '';
                loadMessages();
            }
        }

        // 채팅방 생성
        async function createRoom() {
            const name = document.getElementById('new-room-name').value.trim();
            if (!name) return;

            const res = await callApi('/dm_rooms', 'POST', {
                name: name,
                creator_id: currentUser.id
            });

            if (res.success) {
                document.getElementById('create-modal').style.display = 'none';
                loadRooms();
                openChat(res.room_id, name);
            }
        }

        // 사용자 초대
        async function inviteUser() {
            const userId = document.getElementById('invite-user-id').value.trim();
            if (!userId || !currentRoomId) return;

            const res = await callApi('/dm/invite', 'POST', {
                room_id: currentRoomId,
                user_id: userId
            });

            if (res.success) {
                alert('초대되었습니다.');
                document.getElementById('invite-modal').style.display = 'none';
            }
        }

        // 방 나가기
        async function leaveRoom() {
            if (!confirm('방을 나가시겠습니까?')) return;
            const res = await callApi('/dm/leave', 'POST', {
                room_id: currentRoomId,
                user_id: currentUser.id
            });
            if (res.success) {
                closeChat();
                loadRooms();
            }
        }

        function closeChat() {
            document.getElementById('chat-room-view').style.display = 'none';
            currentRoomId = null;
            if (pollInterval) clearInterval(pollInterval);
        }

        function toggleSettings() {
            const s = document.getElementById('chat-settings');
            s.style.display = s.style.display === 'flex' ? 'none' : 'flex';
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }
    </script>
</body>
</html>
