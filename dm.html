<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단일 테이블 DM 페이지</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-bg: #000000;
            --secondary-bg: #121212;
            --container-bg: #1c1c1e;
            --text-main: #ffffff;
            --text-sub: #a1a1a1;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --border-color: #2c2c2e;
            --other-chat-bg: #2c2c2e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--primary-bg); color: var(--text-main); height: 100vh; display: flex; justify-content: center; align-items: center; }

        .dm-container { width: 100%; max-width: 500px; height: 100vh; background-color: var(--secondary-bg); display: flex; flex-direction: column; position: relative; }
        @media (min-width: 768px) { .dm-container { height: 850px; border-radius: 20px; overflow: hidden; border: 1px solid var(--border-color); } }

        /* 로그인 / 방 입장 화면 */
        #login-view { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 30px; gap: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group input { background: var(--container-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 15px; color: white; outline: none; font-size: 1rem; }
        .btn-join { background: var(--accent-gradient); border: none; padding: 15px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }

        /* 채팅방 화면 */
        #chat-room-view { display: none; flex-direction: column; height: 100%; }
        .chat-header { padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; }
        .back-btn { margin-right: 15px; cursor: pointer; font-size: 1.2rem; }
        .room-info { flex: 1; }
        .room-name { font-weight: 600; font-size: 1.1rem; }
        
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-row { display: flex; flex-direction: column; max-width: 80%; margin-bottom: 5px; }
        .msg-row.me { align-self: flex-end; align-items: flex-end; }
        .msg-row.other { align-self: flex-start; align-items: flex-start; }
        
        .sender-name { font-size: 0.75rem; color: var(--text-sub); margin-bottom: 4px; padding: 0 4px; }
        .msg-bubble { padding: 10px 14px; border-radius: 15px; font-size: 0.95rem; word-break: break-all; }
        .other .msg-bubble { background-color: var(--other-chat-bg); border-top-left-radius: 2px; }
        .me .msg-bubble { background: var(--accent-gradient); border-top-right-radius: 2px; }
        .msg-time { font-size: 0.7rem; color: var(--text-sub); margin-top: 4px; padding: 0 4px; }

        .chat-input-area { padding: 15px; border-top: 1px solid var(--border-color); display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; background: var(--container-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 10px 15px; color: white; outline: none; }
        .send-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--accent-gradient); border: none; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div class="dm-container">
        
        <div id="login-view">
            <h2 style="text-align: center; margin-bottom: 20px;">DM 시작하기</h2>
            <div class="input-group">
                <label style="color: var(--text-sub); font-size: 0.85rem;">내 닉네임</label>
                <input type="text" id="my-name" placeholder="사용할 닉네임 입력 (예: 사용자1)">
            </div>
            <div class="input-group">
                <label style="color: var(--text-sub); font-size: 0.85rem;">채팅방 이름 (Room ID)</label>
                <input type="text" id="room-name" placeholder="접속할 방 이름 입력 (예: room_a)">
            </div>
            <button class="btn-join" onclick="joinRoom()">입장하기</button>
        </div>

        <div id="chat-room-view">
            <div class="chat-header">
                <i class="fas fa-arrow-left back-btn" onclick="leaveRoom()"></i>
                <div class="room-info">
                    <div class="room-name" id="display-room-name">채팅방</div>
                    <div style="font-size: 0.7rem; color: var(--accent-color);">실시간 연결됨</div>
                </div>
            </div>
            
            <div class="chat-messages" id="chat-messages">
                </div>
            
            <div class="chat-input-area">
                <input type="text" id="message-input" placeholder="메시지 입력..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

    </div>

    <script>
        // ==========================================
        // 🚨 여기에 본인의 Supabase 정보를 입력하세요!
        // ==========================================
        const SUPABASE_URL = 'https://hoeevmstbhulbzqyfsug.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_vxGxR4uBuYldz-0l_tQXGw_Cz0V6Mj6';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 상태 변수
        let currentUser = '';
        let currentRoom = '';
        let realtimeChannel = null;

        // 1. 방 입장하기
        async function joinRoom() {
            const nameInput = document.getElementById('my-name').value.trim();
            const roomInput = document.getElementById('room-name').value.trim();

            if (!nameInput || !roomInput) {
                alert('닉네임과 방 이름을 모두 입력해주세요.');
                return;
            }

            currentUser = nameInput;
            currentRoom = roomInput;

            // UI 변경
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('chat-room-view').style.display = 'flex';
            document.getElementById('display-room-name').innerText = currentRoom;
            
            // 기존 메시지 불러오기 및 실시간 구독 시작
            await loadMessages();
            subscribeToRealtime();
        }

        // 2. 기존 메시지 불러오기 (Read)
        async function loadMessages() {
            const { data, error } = await supabaseClient
                .from('dm_messages')
                .select('*')
                .eq('room_id', currentRoom)
                .order('created_at', { ascending: true }); // 과거순 정렬

            if (error) {
                console.error("메시지 로드 에러:", error);
                return;
            }

            const container = document.getElementById('chat-messages');
            container.innerHTML = ''; // 초기화
            
            data.forEach(msg => appendMessageToUI(msg));
            scrollToBottom();
        }

        // 3. 메시지 전송하기 (Create)
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            if (!content) return;

            // UI 즉각 반영을 위해 인풋 비우기
            input.value = '';

            // Supabase에 데이터 Insert
            const { error } = await supabaseClient
                .from('dm_messages')
                .insert([
                    { 
                        room_id: currentRoom, 
                        sender_id: currentUser, 
                        content: content 
                    }
                ]);

            if (error) {
                console.error("메시지 전송 에러:", error);
                alert("전송 실패!");
            }
            // 성공하면 Realtime이 감지해서 UI에 그려줍니다.
        }

        // 4. 실시간(Realtime) 구독 설정
        function subscribeToRealtime() {
            // 기존 구독이 있다면 해제
            if (realtimeChannel) {
                supabaseClient.removeChannel(realtimeChannel);
            }

            // dm_messages 테이블에 INSERT 이벤트가 발생할 때마다 감지
            realtimeChannel = supabaseClient
                .channel('room-channel')
                .on('postgres_changes', { 
                    event: 'INSERT', 
                    schema: 'public', 
                    table: 'dm_messages',
                    filter: `room_id=eq.${currentRoom}` // 현재 방의 메시지만 감지
                }, payload => {
                    appendMessageToUI(payload.new);
                    scrollToBottom();
                })
                .subscribe();
        }

        // --- 유틸리티 함수들 ---
        
        // 화면에 메시지 그리기
        function appendMessageToUI(msg) {
            const container = document.getElementById('chat-messages');
            const isMe = msg.sender_id === currentUser;
            
            // 시간 포맷팅 (HH:MM)
            const timeObj = new Date(msg.created_at);
            const timeStr = isNaN(timeObj) ? '' : timeObj.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

            const row = document.createElement('div');
            row.className = `msg-row ${isMe ? 'me' : 'other'}`;
            
            // 상대방일 경우에만 위에 닉네임 표시
            const senderHtml = !isMe ? `<div class="sender-name">${msg.sender_id}</div>` : '';

            row.innerHTML = `
                ${senderHtml}
                <div class="msg-bubble">${msg.content}</div>
                <div class="msg-time">${timeStr}</div>
            `;
            container.appendChild(row);
        }

        // 스크롤 맨 아래로
        function scrollToBottom() {
            const container = document.getElementById('chat-messages');
            container.scrollTop = container.scrollHeight;
        }

        // 방 나가기
        function leaveRoom() {
            if (realtimeChannel) {
                supabaseClient.removeChannel(realtimeChannel);
            }
            document.getElementById('chat-room-view').style.display = 'none';
            document.getElementById('login-view').style.display = 'flex';
            document.getElementById('chat-messages').innerHTML = '';
            currentUser = '';
            currentRoom = '';
        }
    </script>
</body>
</html>
