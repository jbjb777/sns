<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>메시지 : Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>
  <script>
    const savedTheme = localStorage.getItem('theme') || 'dark';
    if (savedTheme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --blue: #3e3bf6;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    html[data-theme="light"] {
      --bg: #fafafa;
      --bg2: #ffffff;
      --bg3: #f0f0f0;
      --bg4: #e4e4e4;
      --border: #dbdbdb;
      --border2: #cccccc;
      --border3: #a3a3a3;
      --t1: #000000;
      --t2: #737373;
      --t3: #a8a8a8;
    }

    #nprogress .bar { background: var(--t1) !important; height: 2px !important; }
    #nprogress .peg { display: none !important; }
    #nprogress .spinner { display: none !important; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
      overflow: hidden;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* 스켈레톤 로딩 애니메이션 */
    .skeleton {
      background: linear-gradient(90deg, var(--bg2) 0%, var(--bg3) 50%, var(--bg2) 100%);
      background-size: 300% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
      border-radius: var(--r1);
    }
    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    /* 채팅방 전환 스켈레톤 */
    .chat-skeleton { display:flex; flex-direction:column; gap:18px; width:100%; padding:8px 0; }
    .chat-skel-row { display:flex; gap:10px; align-items:flex-end; animation: skelIn 0.25s ease; }
    .chat-skel-row.me { justify-content:flex-end; }
    .chat-skel-row.other { justify-content:flex-start; }
    .chat-skel-avatar { width:32px; height:32px; border-radius:50%; flex-shrink:0; }
    .chat-skel-content { display:flex; flex-direction:column; gap:6px; max-width:68%; }
    .chat-skel-content.me { align-items:flex-end; }
    .chat-skel-name { width:56px; height:12px; border-radius:4px; }
    .chat-skel-bubble { height:42px; border-radius:18px; }
    .chat-skel-bubble.short { width:110px; }
    .chat-skel-bubble.mid { width:180px; }
    .chat-skel-bubble.long { width:240px; }
    .chat-skel-bubble.xlong { width:300px; max-width:100%; }
    .chat-skel-time { width:32px; height:10px; border-radius:4px; margin-bottom:2px; }
    @keyframes skelIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .chat-messages.skeleton-active { overflow:hidden; pointer-events:none; }


    /* SIDEBAR */
    .sidebar-container { width: 72px; min-width: 72px; height: 100vh; position: fixed; left: 0; top: 0; z-index: 100; }
    .sidebar-container iframe { width: 72px !important; height: 100%; border: none; }

    /* MAIN WRAPPER */
    .main-wrapper { 
      margin-left: 72px; 
      width: calc(100% - 72px); 
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
    }
@media (max-width: 768px) {
  /* 채팅방 안에 있을 때만 사이드바 숨김 */
  body.chat-room-active .sidebar-container {
    display: none;
  }
  
  /* 사이드바 없어지니까 메인도 전체 너비로 */
  body.chat-room-active .main-wrapper {
    margin-left: 0;
    width: 100%;
  }

  /* 입력창도 왼쪽 끝부터 시작하게 */
  body.chat-room-active .message-input-container {
    left: 0; 
  }
}
    /* HEADER */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      z-index: 50;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .back-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: none;
      background: none;
      color: var(--t2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .back-btn:hover { color: var(--t1); background: var(--bg3); }
    .back-btn:active { transform: scale(0.82); }
    .header-title { font-size: 16px; font-weight: 600; }

    .header-right .action-btn {
      background: var(--t1);
      color: var(--bg);
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .header-right .action-btn:active { transform: scale(0.95); }

    /* DM LAYOUT */
    .dm-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      background: var(--bg);
    }

    /* 왼쪽 패널 (목록) */
    .room-list-pane {
      width: 320px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      background: var(--bg);
    }
    .rooms-scroll-area { flex: 1; overflow-y: auto; }
    .rooms-scroll-area::-webkit-scrollbar { width: 6px; }
    .rooms-scroll-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .room-item {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      gap: 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }
    .room-item:hover { background: var(--bg2); }
    .room-item.active { background: var(--bg3); }

    /* 카카오톡 스타일 멀티 프로필 아바타 */
    .room-avatar {
      width: 48px; height: 48px;
      border-radius: 18px;
      background: var(--bg4);
      position: relative;
      overflow: hidden;
      display: grid;
      gap: 1px;
      flex-shrink: 0;
    }
    .room-avatar.grid-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    .room-avatar.grid-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
    .room-avatar.grid-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .room-avatar.grid-3 img:first-child, .room-avatar.grid-3 .avatar-text:first-child { grid-column: 1 / span 2; }
    .room-avatar.grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

    .room-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .room-avatar .avatar-text {
      width: 100%; height: 100%; display: flex; align-items: center; 
      justify-content: center; font-size: 14px; font-weight: 600; color: var(--t1); background: var(--bg4);
    }

    .room-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .room-name { font-size: 15px; font-weight: 600; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .room-last-msg { font-size: 13px; color: var(--t2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* 오른쪽 패널 (채팅창) */
    .chat-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg2);
      position: relative;
    }
    .chat-empty-state {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: var(--bg); color: var(--t3); z-index: 10;
    }
    .chat-empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5; }
    .chat-empty-state p { font-size: 15px; font-weight: 500; }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-header-info { display: flex; align-items: center; gap: 12px; }
    .mobile-back-to-list { display: none; }
    .chat-title { font-size: 16px; font-weight: 700; color: var(--t1); }
    
    .chat-header-actions { display: flex; gap: 8px; align-items: center; }
    .chat-header-actions button {
      background: var(--bg3); border: 1px solid var(--border2); color: var(--t1);
      padding: 6px 12px; border-radius: var(--r1); font-size: 12px; cursor: pointer; transition: background 0.15s;
      display: flex; align-items: center; justify-content: center; height: 32px;
    }
    .chat-header-actions button:hover { background: var(--bg4); }

    .chat-messages {
      flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .message-wrapper { display: flex; flex-direction: column; max-width: 70%; }
    .message-wrapper.me { align-self: flex-end; align-items: flex-end; }
    .message-wrapper.other { align-self: flex-start; align-items: flex-start; }

    .message-sender { font-size: 11px; color: var(--t3); margin-bottom: 4px; margin-left: 4px; margin-right: 4px; }
    .message-bubble { padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.5; word-break: break-all; }
    
    .message-wrapper.me .message-bubble { background: var(--blue); color: #fff; border-bottom-right-radius: 4px; }
    .message-wrapper.other .message-bubble { background: var(--bg3); color: var(--t1); border: 1px solid var(--border2); border-bottom-left-radius: 4px; }
    
    .message-time { font-size: 10px; color: var(--t3); margin-top: 4px; margin-left: 4px; margin-right: 4px; display: flex; align-items: center; gap: 2px;}

    /* 시스템 메시지 UI */
    .system-message-container {
      display: flex; justify-content: center; width: 100%; max-width: 100% !important; margin: 4px 0; align-self: center; align-items: center;
    }
    .system-message-bubble {
      background: var(--bg3); color: var(--t2); font-size: 12px; font-weight: 500;
      padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border2);
      text-align: center;
    }

    .chat-input-area { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--bg); display: flex; gap: 12px; align-items: flex-end; }
    .chat-input {
      flex: 1; background: var(--bg2); border: 1px solid var(--border2); border-radius: 24px;
      padding: 12px 20px; color: var(--t1); font-size: 14px; font-family: inherit; resize: none;
      outline: none; min-height: 44px; max-height: 120px; transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: var(--border3); }

    .send-btn {
      width: 44px; height: 44px; border-radius: 50%; background: var(--blue); border: none; color: #fff;
      display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: transform 0.15s, opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.9; }
    .send-btn:active { transform: scale(0.9); }
    .send-btn:disabled { background: var(--bg3); color: var(--t3); cursor: not-allowed; }

    /* MODAL STYLE */
    .modal {
      display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0); backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
      justify-content: center; align-items: center; z-index: 200; pointer-events: none; visibility: hidden; transition: all 0.3s;
    }
    .modal.open { 
      pointer-events: auto; visibility: visible; background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .modal-content {
      background: var(--bg2); border: 1px solid var(--border2); width: 90%; max-width: 400px;
      border-radius: var(--r4); padding: 24px; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      opacity: 0; transform: scale(0.9) translateY(20px); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal.open .modal-content { opacity: 1; transform: scale(1) translateY(0); }
    
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--t2); cursor: pointer; padding: 4px; border-radius: 50%; }
    .modal-close:hover { background: var(--bg3); color: var(--t1); }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; color: var(--t2); margin-bottom: 8px; }
    .form-group input { width: 100%; padding: 12px 16px; border-radius: var(--r2); border: 1px solid var(--border2); background: var(--bg); color: var(--t1); font-size: 14px; outline: none; }
    .form-group input:focus { border-color: var(--blue); }
    .form-group input[readonly] { background: var(--bg3); cursor: default; }
    .form-group input[readonly]:focus { border-color: var(--border2); }

    .modal-search-box { display: flex; align-items: center; background: var(--bg); border: 1px solid var(--border2); border-radius: var(--r2); padding: 0 14px; height: 44px; margin-bottom: 12px; transition: border-color 0.2s; }
    .modal-search-box:focus-within { border-color: var(--blue); }
    .modal-search-box input { flex: 1; background: transparent; border: none; outline: none; color: var(--t1); font-size: 14px; padding-left: 8px; }
    .modal-search-box input::placeholder { color: var(--t3); }
    .modal-search-box .search-icon { color: var(--t2); display: flex; align-items: center; }
    
    .user-select-list { max-height: 200px; overflow-y: auto; border: 1px solid var(--border2); border-radius: var(--r2); background: var(--bg); }
    .user-select-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.2s; }
    .user-select-item:last-child { border-bottom: none; }
    .user-select-item:hover { background: var(--bg3); }
    .user-select-item .user-meta { display: flex; align-items: center; gap: 10px; }
    .user-select-item .user-meta span { font-size: 14px; font-weight: 500; }
    
    .select-chk-btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--t2); padding: 6px 14px; border-radius: 14px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .select-chk-btn.checked { background: var(--blue); border-color: var(--blue); color: #fff; }
    
    .modal-btn { width: 100%; padding: 14px; border-radius: var(--r2); background: var(--t1); color: var(--bg); border: none; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    .modal-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .modal-btn.danger { background: rgba(255,107,107,0.15); color: var(--pink); border: 1px solid rgba(255,107,107,0.3); transition: background 0.2s; }
    .modal-btn.danger:hover { background: rgba(255,107,107,0.25); }

    /* 아이콘 없는 커스텀 알림 */
    .custom-alert {
      position: fixed; top: -70px; left: 50%; transform: translateX(-50%); background: var(--bg3); color: var(--t1);
      border: 1px solid var(--border2); padding: 14px 24px; border-radius: var(--r3); font-size: 14px; font-weight: 600;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 9999; display: flex; align-items: center; justify-content: center;
      transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .custom-alert.show { top: 24px; }

    @media (max-width: 768px) {
      .sidebar-container { left: 0; right: 0; top: auto; bottom: 0; width: 100%; min-width: 0; height: calc(64px + env(safe-area-inset-bottom, 0px)); }
      .sidebar-container iframe { width: 100% !important; height: 100% !important; }
      .main-wrapper { margin-left: 0; width: 100%; height: calc(100vh - 64px - env(safe-area-inset-bottom, 0px)); }
  .dm-container {
    padding-bottom: 72px; /* 사이드바 높이만큼 */
    box-sizing: border-box;
  }
  .message-input-container {
    position: fixed;
    bottom: 0;
    left: 72px; /* 사이드바 너비만큼 띄움 */
    right: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom)); /* iOS 하단바 대응 */
    z-index: 101; /* 사이드바 z-index: 100보다 높게 */
  }
    .message-list {
    padding-bottom: 80px; /* 입력창 높이 + 여유 */
    height: calc(100dvh - 65px); /* 헤더 높이 빼기 */
    overflow-y: auto;
  }
      .room-list-pane { width: 100%; flex: 1; border-right: none; }
      .chat-pane { display: none; position: absolute; inset: 0; z-index: 60; }
      .dm-container.room-active .room-list-pane { display: none; }
      .dm-container.room-active .chat-pane { display: flex; }
      .mobile-back-to-list { display: flex; background: none; border: none; color: var(--t1); padding: 4px; cursor: pointer; align-items: center; justify-content: center; }
      .chat-header { padding: 12px 16px; }
      .chat-messages { padding: 16px; }
      .chat-input-area { padding: 12px 16px; }
    }
  
    /* === 사이드바 검색 패널 (index.html 동일) === */
    .search-panel {
      position: fixed;
      top: 0;
      left: 72px;
      width: 380px;
      max-width: calc(100vw - 72px);
      height: 100vh;
      background: var(--bg);
      border-right: 1px solid var(--border);
      z-index: 90;
      transform: translateX(-100%);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 24px rgba(0,0,0,0.3);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    html[data-theme="light"] .search-panel {
      box-shadow: 4px 0 24px rgba(0,0,0,0.1);
    }
    .search-panel.open {
      transform: translateX(0);
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
    .search-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }
    .search-panel-header h2 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
      color: var(--t1);
    }
    .search-close-btn {
      background: transparent;
      border: none;
      color: var(--t2);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, transform 0.2s;
    }
    .search-close-btn:hover {
      color: var(--t1);
      transform: scale(1.1);
    }
    .search-panel iframe {
      width: 100%;
      flex: 1;
      border: none;
    }

    /* === 프로필 시트 (index.html 동일) === */
    .sharer-profile-sheet-host[hidden] { display: none !important; }
    .sharer-profile-sheet-host {
      position: fixed;
      inset: 0;
      z-index: 960;
    }
    .sharer-profile-sheet-host .sps-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.34s ease;
    }
    .sharer-profile-sheet-host.sps-host-open .sps-backdrop {
      opacity: 1;
      pointer-events: auto;
    }
    .sharer-profile-sheet-host .sps-panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 20px 20px 0 0;
      padding: 4px 16px calc(20px + env(safe-area-inset-bottom, 0px));
      box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.45);
      max-height: 44vh;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      will-change: transform;
      transform: translateY(100%);
      transition: transform 0.44s cubic-bezier(0.22, 1, 0.36, 1), max-height 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .sharer-profile-sheet-host.sps-host-open .sps-panel {
      transform: translateY(0);
    }
    .sharer-profile-sheet-host .sps-panel.sps-panel-expanded {
      max-height: 88vh;
    }
    .sharer-profile-sheet-host .sps-panel.sps-panel-dragging {
      transition: none;
    }
    .sharer-profile-sheet-host .sps-drag-area {
      touch-action: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 6px 16px 14px;
      margin: -2px -16px 0 -16px;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
    }

  <script>
    const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";
    let currentUser = null;
    let usersCache = {}; 
    let roomMembersMap = {}; 
    let activeRoomId = null;
    let messagePollInterval = null;
    let isSending = false;
    let selectedUserIds = new Set();
    let roomListPollInterval = null;
    let replyTarget = null; // {id, sender_id, content}
    let swipeState = { startX:0, startY:0, msgId:null, swiping:false };

    /* === 사이드바 연동 (index.html 동일 로직) === */
    function updateSidebar() {
      const iframe = document.getElementById('sidebarFrame');
      if (iframe?.contentWindow) iframe.contentWindow.postMessage({ type: 'updateUser', user: currentUser }, '*');
    }
    function updateSidebarMode() {
      const iframe = document.getElementById('sidebarFrame');
      const narrow = window.innerWidth <= 768;
      if (iframe?.contentWindow) iframe.contentWindow.postMessage({ type: 'setNarrowMode', narrow }, '*');
    }
    let searchPanelOpen = false;
    window.toggleSearchPanel = function() {
      const panel = document.getElementById('searchPanel');
      searchPanelOpen = !searchPanelOpen;
      const frame = document.getElementById('sidebarFrame');
      if (searchPanelOpen) {
        panel.classList.add('open');
        frame?.contentWindow?.postMessage({ type: 'activateSearch', active: true }, '*');
      } else {
        panel.classList.remove('open');
        frame?.contentWindow?.postMessage({ type: 'activateSearch', active: false }, '*');
      }
    };
    window.addEventListener('message', (event) => {
      const { type, page } = event.data || {};
      if (type === 'toggleSearch') {
        window.toggleSearchPanel();
      }
      if (type === 'navigate') {
        if (page === 'home') location.href = 'index.html';
        else if (page === 'explore') location.href = 'explore.html';
        else if (page === 'set') location.href = 'set.html';
        else if (page === 'dm' || page === 'message' || page === 'messages') location.href = 'dm.html';
        else if (page) location.href = page + '.html';
      }
      if (type === 'logout') {
        localStorage.removeItem('snsUser');
        currentUser = null;
        location.reload();
      }
      if (type === 'requestUserInfo') updateSidebar();
    });
    window.onSharerProfileLogout = function () {
      localStorage.removeItem('snsUser');
      currentUser = null;
      location.reload();
    };
    NProgress.configure({ minimum: 0.08, trickleSpeed: 200, showSpinner: false });
    document.addEventListener('click', function(e) {
      const link = e.target.closest('a');
      if (link && link.href && !link.target && !link.hasAttribute('download')) {
        try { NProgress.start(); } catch {}
      }

    async function api(endpoint, options = {}) {
      const url = API_BASE + endpoint;
      const res = await fetch(url, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          ...(options.headers || {}),
        },
      });
      if (!res.ok) {
        let err = ""; try { err = await res.text(); } catch{}
        throw new Error(`API 오류 (${res.status}): ${err}`);
      }
      if (res.status === 204 || res.headers.get("content-length") === "0") return null;
      try { return await res.json(); } catch(e) { return null; }
    }

    async function checkRoomInvites() {
      if (!currentUser) return;
      try {
        const myMemberships = await api(`/dm_room_members?user_id=eq.${encodeURIComponent(currentUser.id)}&select=room_id`);
        if (!myMemberships) return;
        const polledIds = myMemberships.map(m => m.room_id).sort();
        const currentIds = Object.keys(roomMembersMap).sort();
        const isDifferent = polledIds.length !== currentIds.length || polledIds.some((id, i) => id !== currentIds[i]);
        if (isDifferent) {
          const prevSet = new Set(currentIds);
          const newIds = polledIds.filter(id => !prevSet.has(id));
          await loadRooms(true); // silent: 스켈레톤 없이 조용히 갱신
          if (newIds.length > 0) {
            showAlert(`새 채팅방 ${newIds.length}개에 초대되었습니다`);
          }
        }
      } catch (e) {
        // 폴링 오류는 조용히 무시 (네트워크 일시 오류 대응)
      }
    }

    function startRoomListPolling() {
      if (roomListPollInterval) clearInterval(roomListPollInterval);
      roomListPollInterval = setInterval(() => {
        checkRoomInvites();

    }


    async function loadRooms(silent = false) {
      if (!silent) renderRoomSkeleton(); // 최초 로딩에만 스켈레톤, 폴링(silent)時は 스켈레톤 생략
      
      try {
        const myMemberships = await api(`/dm_room_members?user_id=eq.${encodeURIComponent(currentUser.id)}`);
        if (!myMemberships || myMemberships.length === 0) {
          document.getElementById('roomList').innerHTML = '<div style="padding:20px; color:var(--t3); text-align:center;">참여중인 채팅방이 없습니다.</div>';
          return;
        }

        const roomIds = myMemberships.map(m => m.room_id);
        const allMembers = await api(`/dm_room_members?room_id=in.(${roomIds.join(',')})`);
        
        roomMembersMap = {};
        if (allMembers) {
          allMembers.forEach(m => {
            if (!roomMembersMap[m.room_id]) roomMembersMap[m.room_id] = [];
            roomMembersMap[m.room_id].push(m.user_id);
          });
        }

        const rooms = await api(`/dm_rooms?id=in.(${roomIds.join(',')})&order=created_at.desc`);
        renderRoomList(rooms || []);
      } catch (e) {
        console.error("채팅방 로드 오류", e);
        document.getElementById('roomList').innerHTML = '<div style="padding:20px; color:var(--pink); text-align:center;">채팅방을 불러올 수 없습니다.</div>';
      }
    }

    let currentMessages = [];
    let isLoadingMessages = false;

    async function getReadMapForMessages(messageIds) {
      const readMap = {}; // messageId -> Set(userId)
      if (!messageIds || messageIds.length === 0) return { readMap };
      const chunkSize = 60;
      let allReads = [];
      for (let i = 0; i < messageIds.length; i += chunkSize) {
        const chunk = messageIds.slice(i, i + chunkSize);
        try {
          const reads = await api(`/dm_read?message_id=in.(${chunk.join(',')})`);
          if (reads && reads.length) allReads = allReads.concat(reads);
        } catch (e) { console.warn('dm_read 조회 실패', e); }
      }
      allReads.forEach(r => {
        if (!readMap[r.message_id]) readMap[r.message_id] = new Set();
        readMap[r.message_id].add(r.user_id);
      });
      return { readMap, allReads };
    }

    // ✅ 각 메시지 독립 계산: 이 메시지 기준으로만 안읽은 사람 수 세기
    function calcUnreadIndependent(msgId, senderId, roomId, readMap) {
      const members = roomMembersMap[roomId] || [];
      if (members.length === 0) return 0;
      const readers = new Set(readMap[msgId] ? Array.from(readMap[msgId]) : []);
      // 보낸 사람은 항상 읽음
      if (senderId) readers.add(senderId);
      // 멤버 중 readers에 없는 사람 수만 센다 (각 메시지 독립)
      let unread = 0;
      for (let i = 0; i < members.length; i++) {
        if (!readers.has(members[i])) unread++;
      }
      return unread;
    }

    async function markMessagesAsRead(messageIds) {
      if (!messageIds || messageIds.length === 0) return;
      const uniq = [...new Set(messageIds)];
      const payload = uniq.map(mid => ({ user_id: currentUser.id, message_id: mid }));
      try { await api("/dm_read", { method: "POST", body: JSON.stringify(payload) }); }
      catch (e) {
        const m = String(e.message||e).toLowerCase();
        if (m.includes('409') || m.includes('duplicate') || m.includes('23505')) return;
        console.warn('markAsRead 실패', e);
      }
    }

    async function updateUnreadCountsOnlyIndependent(msgs, roomId, readMapOverride) {
      let readMap = readMapOverride;
      if (!readMap) {
        const ids = msgs.filter(m=>!m.content.startsWith('[SYSTEM] ')).map(m=>m.id);
        if (ids.length===0) return;
        const res = await getReadMapForMessages(ids);
        readMap = res.readMap;
      }
      msgs.forEach(m=>{
        if (m.content.startsWith('[SYSTEM] ')) return;
        const el = document.getElementById(`unread-${m.id}`);
        if (!el) return;
        const uc = calcUnreadIndependent(m.id, m.sender_id, roomId, readMap);
        el.textContent = uc>0? String(uc) : '0';
        el.style.opacity = uc>0? '1' : '0';
      });
    }

    async function loadMessages(roomId, isPolling = false) {
      if (isLoadingMessages && isPolling) return;
      try {
        if (isPolling) isLoadingMessages = true;
        const msgs = await api(`/dm_messages?room_id=eq.${roomId}&order=created_at.asc`);
        if (!msgs) { isLoadingMessages=false; return; }
        const container = document.getElementById('chatMessages');

        // 폴링: ID가 완전히 같으면 DOM 재생성 없이 각 메시지 독립적으로 숫자만 갱신
        if (isPolling && currentMessages.length === msgs.length) {
          const prev = currentMessages.map(m=>m.id).join(',');
          const next = msgs.map(m=>m.id).join(',');
          if (prev === next) {
            const ids = msgs.filter(m=>!m.content.startsWith('[SYSTEM] ')).map(m=>m.id);
            const { readMap } = await getReadMapForMessages(ids);
            // 내 읽음 필요하면 먼저 처리
            const need = [];
            for (let i=0;i<msgs.length;i++){
              const mm = msgs[i];
              if (mm.content.startsWith('[SYSTEM] ')) continue;
              if (mm.sender_id === currentUser.id) continue;
              const s = readMap[mm.id];
              if (!s || !s.has(currentUser.id)) need.push(mm.id);
            }
            if (need.length>0){ await markMessagesAsRead(need); need.forEach(id=>{ if(!readMap[id]) readMap[id]=new Set(); readMap[id].add(currentUser.id); }); }
            await updateUnreadCountsOnlyIndependent(msgs, roomId, readMap);
            isLoadingMessages=false; return;
          }
        }

        currentMessages = msgs;
        const normal = msgs.filter(m=>!m.content.startsWith('[SYSTEM] '));
        const ids = normal.map(m=>m.id);
        let readMap = {};
        if (ids.length>0){
          const r = await getReadMapForMessages(ids);
          readMap = r.readMap;
          if (!isPolling){
            const missing=[];
            normal.forEach(m=>{ const set=readMap[m.id]; if(!set||!set.has(m.sender_id)) missing.push({user_id:m.sender_id,message_id:m.id}); });
            if(missing.length>0){ try{await api("/dm_read",{method:"POST",body:JSON.stringify(missing)});}catch(e){} missing.forEach(x=>{ if(!readMap[x.message_id]) readMap[x.message_id]=new Set(); readMap[x.message_id].add(x.user_id); }); }
          }
        }

        // Build map for reply lookup
        const msgMap = {};
        msgs.forEach(m=>{ msgMap[m.id]=m; });

        container.innerHTML='';
        container.classList.remove('skeleton-active');
        msgs.forEach(msg=>{
          const w=document.createElement('div');
          w.id = 'msg-' + msg.id;
          w.dataset.msgId = msg.id;
          if(msg.content.startsWith('[SYSTEM] ')){ w.className='system-message-container'; w.innerHTML=`<div class="system-message-bubble">${escapeHTML(msg.content.replace('[SYSTEM] ','').trim())}</div>`; container.appendChild(w); return; }
          const isMe = msg.sender_id===currentUser.id;
          const time = new Date(msg.created_at).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
          const senderName = isMe? '' : getUserInfo(msg.sender_id).nickname;
          const uc = calcUnreadIndependent(msg.id, msg.sender_id, roomId, readMap);
          w.className=`message-wrapper ${isMe?'me':'other'}`;

          let bubbleHTML = '';
          const hasReply = !!(msg.reply);
          if(hasReply){
            const orig = msgMap[msg.reply];
            let origAuthor = '알 수 없음';
            let origContentFull = '(원본 메시지를 찾을 수 없습니다)';
            if(orig){
              origAuthor = getUserInfo(orig.sender_id).nickname || '알 수 없음';
              origContentFull = orig.content || '';
              if(origContentFull.startsWith('[SYSTEM] ')) origContentFull = origContentFull.replace('[SYSTEM] ','');
            }
            let origPreview = origContentFull.replace(/\n/g,' ').trim();
            if(origPreview.length>60) origPreview = origPreview.slice(0,60)+'…';
            const replyLabel = `${escapeHTML(origAuthor)}님에게 답장`;
            const replyContent = escapeHTML(origPreview);
            const mainContent = escapeHTML(msg.content).replace(/\n/g,'<br>');
            bubbleHTML = `<div class="message-bubble has-reply">
              <div class="reply-origin" onclick="jumpToOriginal('${msg.reply}')">
                <div class="reply-to-label">${replyLabel}</div>
                <div class="reply-to-content">${replyContent}</div>
              </div>
              <div class="reply-main">${mainContent}</div>
            </div>`;
          } else {
            bubbleHTML = `<div class="message-bubble">${escapeHTML(msg.content).replace(/\n/g,'<br>')}</div>`;
          }

          let h=''; if(!isMe) h+=`<div class="message-sender">${escapeHTML(senderName)}</div>`;
          h+=`<div class="message-row ${isMe?'me':'other'}">${bubbleHTML}<div class="msg-side">${uc>0?`<span class="unread-count" id="unread-${msg.id}">${uc}</span>`:`<span class="unread-count" id="unread-${msg.id}" style="opacity:0;">0</span>`}<span class="message-time" style="margin:0;">${time}</span></div></div>`;
          h+=`<div class="reply-action"><button class="reply-trigger-btn" onclick="enterReplyModeById('${msg.id}')" aria-label="답장"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"></polyline><path d="M20 20v-7a4 4 0 0 0-4-4H4"></path></svg></button></div>`;
          w.innerHTML=h;

          // touch swipe to reply
          w.addEventListener('touchstart', (e)=>{
            if(e.touches.length!==1) return;
            swipeState.startX = e.touches[0].clientX;
            swipeState.startY = e.touches[0].clientY;
            swipeState.msgId = msg.id;
            swipeState.swiping = false;
            w.style.transition='none';
          }, {passive:true});
          w.addEventListener('touchmove', (e)=>{
            if(!swipeState.msgId || swipeState.msgId!==msg.id) return;
            const dx = e.touches[0].clientX - swipeState.startX;
            const dy = e.touches[0].clientY - swipeState.startY;
            if(Math.abs(dx)>18 && Math.abs(dx)>Math.abs(dy)*1.2){
              swipeState.swiping = true;
              const clamped = Math.max(Math.min(dx, 80), -80);
              w.style.transform = `translateX(${clamped}px)`;
            }
          }, {passive:true});
          w.addEventListener('touchend', (e)=>{
            if(!swipeState.msgId) return;
            w.style.transition='transform 0.22s cubic-bezier(0.22,1,0.36,1)';
            w.style.transform='';
            if(swipeState.swiping){
              const dx = e.changedTouches[0].clientX - swipeState.startX;
              if(Math.abs(dx)>55){
                enterReplyModeById(swipeState.msgId);
              }
            }
            swipeState.msgId=null; swipeState.swiping=false;
          }, {passive:true});

          // mouse drag for desktop swipe simulation (right drag)
          w.addEventListener('mousedown', (e)=>{
            swipeState.startX = e.clientX;
            swipeState.startY = e.clientY;
            swipeState.msgId = msg.id;
            swipeState.swiping = false;
            const onMove = (ev)=>{
              const dx = ev.clientX - swipeState.startX;
              const dy = ev.clientY - swipeState.startY;
              if(Math.abs(dx)>18 && Math.abs(dx)>Math.abs(dy)*1.2){
                swipeState.swiping = true;
                const clamped = Math.max(Math.min(dx, 80), -80);
                w.style.transform = `translateX(${clamped}px)`;
                w.style.transition='none';
              }
            };
            const onUp = (ev)=>{
              w.style.transition='transform 0.22s cubic-bezier(0.22,1,0.36,1)';
              w.style.transform='';
              document.removeEventListener('mousemove', onMove);
              document.removeEventListener('mouseup', onUp);
              if(swipeState.swiping){
                const dx = ev.clientX - swipeState.startX;
                if(Math.abs(dx)>55) enterReplyModeById(swipeState.msgId);
              }
              swipeState.msgId=null; swipeState.swiping=false;
            };
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
          });

          container.appendChild(w);
        });
        container.scrollTop=container.scrollHeight;

        // 내가 안읽은 것들 독립적으로 읽음 처리 (각 메시지 독립)
        const unreadByMe=[];
        normal.forEach(m=>{ if(m.sender_id===currentUser.id) return; const s=readMap[m.id]; if(!s||!s.has(currentUser.id)) unreadByMe.push(m.id); });
        if(unreadByMe.length>0){
          markMessagesAsRead(unreadByMe).then(async()=>{
            // 읽은 후 각 메시지 독립 재계산해서 0으로
            unreadByMe.forEach(id=>{ if(!readMap[id]) readMap[id]=new Set(); readMap[id].add(currentUser.id); });
            await updateUnreadCountsOnlyIndependent(msgs, roomId, readMap);
            const dot=document.getElementById(`unreadDot-${roomId}`); if(dot){dot.classList.remove('show');dot.style.display='none';}
          });
        }else{
          const dot=document.getElementById(`unreadDot-${roomId}`); if(dot){dot.classList.remove('show');dot.style.display='none';}
        }
      }catch(e){ console.error("메시지 로드 오류",e); const _c=document.getElementById('chatMessages'); if(_c) _c.classList.remove('skeleton-active'); } finally{ isLoadingMessages=false; }
    }

    async function sendMessage() {
      if (!activeRoomId || isSending) return;
      const input = document.getElementById('messageInput');
      const content = input.value.trim();
      if (!content) return;
      isSending = true;
      document.getElementById('sendBtn').disabled = true;
      const container = document.getElementById('chatMessages');
      const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
      const tempWrapper = document.createElement('div');
      tempWrapper.className = 'message-wrapper me temp-msg';
      tempWrapper.style.opacity = '0.7';
      tempWrapper.innerHTML = `<div class="message-row me"><div class="message-bubble">${escapeHTML(content).replace(/\n/g, '<br>')}</div><div class="msg-side"><span class="message-time" style="margin:0; display:flex; align-items:center; gap:2px;">${time} <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></span></div></div>`;
      container.appendChild(tempWrapper);
      container.scrollTop = container.scrollHeight;
      input.value = ''; input.style.height = '44px';
      const newMessageId = (crypto.randomUUID? crypto.randomUUID() : 'msg-' + Date.now() + '-' + Math.random().toString(36).slice(2));
      const replyIdForSend = replyTarget ? replyTarget.id : null;
      try {
        const payload = { id: newMessageId, room_id: activeRoomId, sender_id: currentUser.id, content: content, created_at: new Date().toISOString() };
        if(replyIdForSend) payload.reply = replyIdForSend;
        await api("/dm_messages", { method: "POST", headers: { "Prefer": "return=representation" }, body: JSON.stringify(payload) });
        try { await api("/dm_read", { method: "POST", body: JSON.stringify([{ user_id: currentUser.id, message_id: newMessageId }]) }); } catch (readErr) {}
        tempWrapper.remove();
        cancelReplyMode();
        await loadMessages(activeRoomId, false);
      } catch (e) { showAlert("메시지 전송에 실패했습니다."); tempWrapper.remove(); }
      finally { isSending = false; document.getElementById('sendBtn').disabled = false; input.focus(); }
    }


    function resizeInput(el) {
      el.style.height = '44px';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }


    function enterReplyMode(originalMsg){
      if(!originalMsg) return;
      if(originalMsg.content && originalMsg.content.startsWith('[SYSTEM] ')) return;
      replyTarget = originalMsg;
      const bar = document.getElementById('replyPreviewBar');
      const wrap = document.getElementById('kakaoInputWrap');
      const toEl = document.getElementById('replyPreviewTo');
      const contentEl = document.getElementById('replyPreviewContent');
      const input = document.getElementById('messageInput');
      if(!bar || !toEl || !contentEl) return;
      const senderName = getUserInfo(originalMsg.sender_id).nickname || '알 수 없음';
      const isSelf = originalMsg.sender_id === currentUser.id;
      toEl.textContent = (isSelf ? '나' : senderName) + '에게 답장';
      let preview = (originalMsg.content || '').replace(/\n/g,' ').trim();
      if(preview.length>50) preview = preview.slice(0,50)+'…';
      contentEl.textContent = preview;
      if(input){
        input.placeholder = '답장 메시지 입력';
        input.focus();
      }
      if(wrap) wrap.classList.add('has-reply');
      bar.style.display='flex';
      bar.classList.remove('closing');
      void bar.offsetWidth;
      bar.classList.add('open');
    }
    function enterReplyModeById(msgId){
      const msg = currentMessages.find(m=>m.id===msgId);
      if(msg) enterReplyMode(msg);
    }
    function cancelReplyMode(){
      const bar = document.getElementById('replyPreviewBar');
      const wrap = document.getElementById('kakaoInputWrap');
      const input = document.getElementById('messageInput');
      if(input) input.placeholder = '메시지를 입력하세요...';
      if(!bar) { replyTarget=null; if(wrap) wrap.classList.remove('has-reply'); return; }
      if(bar.style.display==='none' || bar.style.display===''){ replyTarget=null; if(wrap) wrap.classList.remove('has-reply'); return; }
      bar.classList.remove('open');
      bar.classList.add('closing');
      setTimeout(()=>{
        bar.style.display='none';
        bar.classList.remove('closing');
        if(wrap) wrap.classList.remove('has-reply');
      }, 200);
      replyTarget = null;
    }
    function jumpToOriginal(origId){
      const target = document.getElementById('msg-'+origId);
      const container = document.getElementById('chatMessages');
      if(!target || !container){
        showAlert('원본 메시지를 찾을 수 없습니다.');
        return;
      }
      const containerRect = container.getBoundingClientRect();
      const targetRect = target.getBoundingClientRect();
      const currentScroll = container.scrollTop;
      const offset = targetRect.top - containerRect.top + currentScroll - 80;
      container.scrollTo({top: offset, behavior:'smooth'});
      target.classList.remove('shake-anim','highlight-orig');
      void target.offsetWidth;
      target.classList.add('shake-anim','highlight-orig');
      setTimeout(()=>{
        target.classList.remove('shake-anim','highlight-orig');
      }, 1800);
    }

    async function leaveRoom() {
      if(!activeRoomId) return;
      if(!confirm("정말로 이 채팅방에서 나가시겠습니까?")) return;
      
      NProgress.start();
      try {
        // 나감 시스템 메시지 발송
        const sysMsg = `[SYSTEM] ${currentUser.nickname}님이 나갔습니다.`;
        await api("/dm_messages", {
          method: "POST",
          body: JSON.stringify({
            room_id: activeRoomId,
            sender_id: currentUser.id,
            content: sysMsg,
            created_at: new Date().toISOString()
          })
        });
        
        // 내 멤버 기록 삭제
        await api(`/dm_room_members?room_id=eq.${activeRoomId}&user_id=eq.${currentUser.id}`, {
          method: "DELETE"
        });

        closeModals();
        closeRoom();
        showAlert("채팅방에서 나갔습니다.");
      } catch(e) {
        showAlert("나가기 실패: " + e.message);
      } finally {
        NProgress.done();
      }
    }

    function renderUserSelectList(containerId, filterKeyword = '') {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      
      const filteredUsers = Object.values(usersCache).filter(u => {
        if (u.id === currentUser.id) return false; 
        if (containerId === 'inviteUserList' && activeRoomId && roomMembersMap[activeRoomId]?.includes(u.id)) return false; // 이미 들어와 있는 유저 필터링
        if (!filterKeyword) return true;
        return u.nickname.toLowerCase().includes(filterKeyword.toLowerCase());
      });

      if (filteredUsers.length === 0) {
        container.innerHTML = '<div style="padding:20px; color:var(--t3); text-align:center; font-size:14px;">검색 결과가 없습니다.</div>';
        return;
      }

      filteredUsers.forEach(u => {
        const item = document.createElement('div');
        item.className = 'user-select-item';
        const isChecked = selectedUserIds.has(u.id);
        
        item.innerHTML = `
          <div class="user-meta">
            <span>${escapeHTML(u.nickname)}</span>
          </div>
          <button type="button" class="select-chk-btn ${isChecked ? 'checked' : ''}" data-id="${u.id}">
            ${isChecked ? '선택됨' : '선택'}
          </button>
        `;

        const toggleSelection = (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (selectedUserIds.has(u.id)) {
            selectedUserIds.delete(u.id);
            btn.classList.remove('checked');
            btn.textContent = '선택';
          } else {
            selectedUserIds.add(u.id);
            btn.classList.add('checked');
            btn.textContent = '선택됨';
          }
        };

        const btn = item.querySelector('.select-chk-btn');
        item.onclick = toggleSelection;
        btn.onclick = toggleSelection;

        container.appendChild(item);
      });
    }

    async function createRoom() {
      const name = document.getElementById('newRoomName').value.trim() || '새 채팅방';
      const selectedIds = Array.from(selectedUserIds);
      
      const btn = document.getElementById('createRoomBtn');
      btn.disabled = true;
      NProgress.start();

      try {
        const roomPayload = { name: name, created_at: new Date().toISOString() };
        roomPayload.id = crypto.randomUUID ? crypto.randomUUID() : 'room-' + Date.now(); 

        const roomRes = await api("/dm_rooms", {
          method: "POST",
          headers: { "Prefer": "return=representation" },
          body: JSON.stringify(roomPayload)
        });
        
        const newRoomId = (roomRes && roomRes[0]) ? roomRes[0].id : roomPayload.id;

        const membersData = [
          { room_id: newRoomId, user_id: currentUser.id, joined_at: new Date().toISOString() }
        ];

        selectedIds.forEach(id => {
          membersData.push({ room_id: newRoomId, user_id: id, joined_at: new Date().toISOString() });
        });

        await api("/dm_room_members", {
          method: "POST",
          body: JSON.stringify(membersData)
        });

        // 초대 완료 시스템 메시지 등록
        if (selectedIds.length > 0) {
          const invitedNames = selectedIds.map(id => getUserInfo(id).nickname).join(', ');
          const sysMsg = `[SYSTEM] ${currentUser.nickname}님이 ${invitedNames}님을 초대했습니다.`;
          await api("/dm_messages", {
            method: "POST",
            body: JSON.stringify({
              room_id: newRoomId,
              sender_id: currentUser.id,
              content: sysMsg,
              created_at: new Date().toISOString()
            })
          });
        }

        closeModals();
        await loadRooms();
        openRoom(newRoomId, name);
        showAlert("새 채팅방이 개설되었습니다.");
      } catch (e) {
        showAlert("방 생성 실패: " + e.message);
      } finally {
        btn.disabled = false;
        NProgress.done();
      }
    }

        showAlert("초대할 사용자를 선택해주세요.");

      btn.disabled = true;

          room_id: activeRoomId,
          user_id: id,
          joined_at: new Date().toISOString()
        }));

        await api("/dm_room_members", {

          body: JSON.stringify(membersData)

        // 시스템 메시지 등록sdsadsa
        const invitedNames = selectedIds.map(id => getUserInfo(id).nickname).join(', ');
        const sysMsg = `[SYSTEM] ${currentUser.nickname}님이 ${invitedNames}님을 초대했습니다.`;
        await api("/dm_messages", {
          method: "POST",
          body: JSON.stringify({
            room_id: activeRoomId,
            sender_id: currentUser.id,

          })

        showAlert("성공적으로 사용자를 초대했습니다.");

        await loadRooms();
        
        if (roomMembersMap[activeRoomId]) {

      } catch (e) {
        showAlert("초대 실패: " + e.message);
      } finally {
        btn.disabled = false;
        NProgress.done();
      }
    }

    function escapeHTML(str) {
      if (!str) return '';
      return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
      );
    }
