<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>메시지 : Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>
  <script>
    const savedTheme = localStorage.getItem('theme') || 'dark';
    if (savedTheme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --blue: #3e3bf6;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    html[data-theme="light"] {
      --bg: #fafafa;
      --bg2: #ffffff;
      --bg3: #f0f0f0;
      --bg4: #e4e4e4;
      --border: #dbdbdb;
      --border2: #cccccc;
      --border3: #a3a3a3;
      --t1: #000000;
      --t2: #737373;
      --t3: #a8a8a8;
    }

    #nprogress .bar { background: var(--t1) !important; height: 2px !important; }
    #nprogress .peg { display: none !important; }
    #nprogress .spinner { display: none !important; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
      overflow: hidden;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* 스켈레톤 로딩 애니메이션 */
    .skeleton {
      background: linear-gradient(90deg, var(--bg2) 0%, var(--bg3) 50%, var(--bg2) 100%);
      background-size: 300% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
      border-radius: var(--r1);
    }
    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    /* SIDEBAR */
    .sidebar-container { width: 72px; min-width: 72px; height: 100vh; position: fixed; left: 0; top: 0; z-index: 100; }
    .sidebar-container iframe { width: 72px !important; height: 100%; border: none; }

    /* MAIN WRAPPER */
    .main-wrapper { 
      margin-left: 72px; 
      width: calc(100% - 72px); 
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
    }
@media (max-width: 768px) {
  /* 채팅방 안에 있을 때만 사이드바 숨김 */
  body.chat-room-active .sidebar-container {
    display: none;
  }
  
  /* 사이드바 없어지니까 메인도 전체 너비로 */
  body.chat-room-active .main-wrapper {
    margin-left: 0;
    width: 100%;
  }

  /* 입력창도 왼쪽 끝부터 시작하게 */
  body.chat-room-active .message-input-container {
    left: 0; 
  }
}
    /* HEADER */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      z-index: 50;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .back-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: none;
      background: none;
      color: var(--t2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .back-btn:hover { color: var(--t1); background: var(--bg3); }
    .back-btn:active { transform: scale(0.82); }
    .header-title { font-size: 16px; font-weight: 600; }

    .header-right .action-btn {
      background: var(--t1);
      color: var(--bg);
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .header-right .action-btn:active { transform: scale(0.95); }

    /* DM LAYOUT */
    .dm-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      background: var(--bg);
    }

    /* 왼쪽 패널 (목록) */
    .room-list-pane {
      width: 320px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      background: var(--bg);
    }
    .rooms-scroll-area { flex: 1; overflow-y: auto; }
    .rooms-scroll-area::-webkit-scrollbar { width: 6px; }
    .rooms-scroll-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .room-item {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      gap: 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }
    .room-item:hover { background: var(--bg2); }
    .room-item.active { background: var(--bg3); }

    /* 카카오톡 스타일 멀티 프로필 아바타 */
    .room-avatar {
      width: 48px; height: 48px;
      border-radius: 18px;
      background: var(--bg4);
      position: relative;
      overflow: hidden;
      display: grid;
      gap: 1px;
      flex-shrink: 0;
    }
    .room-avatar.grid-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    .room-avatar.grid-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
    .room-avatar.grid-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .room-avatar.grid-3 img:first-child, .room-avatar.grid-3 .avatar-text:first-child { grid-column: 1 / span 2; }
    .room-avatar.grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

    .room-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .room-avatar .avatar-text {
      width: 100%; height: 100%; display: flex; align-items: center; 
      justify-content: center; font-size: 14px; font-weight: 600; color: var(--t1); background: var(--bg4);
    }

    .room-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .room-name { font-size: 15px; font-weight: 600; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .room-last-msg { font-size: 13px; color: var(--t2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* 오른쪽 패널 (채팅창) */
    .chat-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg2);
      position: relative;
    }
    .chat-empty-state {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: var(--bg); color: var(--t3); z-index: 10;
    }
    .chat-empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5; }
    .chat-empty-state p { font-size: 15px; font-weight: 500; }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-header-info { display: flex; align-items: center; gap: 12px; }
    .mobile-back-to-list { display: none; }
    .chat-title { font-size: 16px; font-weight: 700; color: var(--t1); }
    
    .chat-header-actions { display: flex; gap: 8px; align-items: center; }
    .chat-header-actions button {
      background: var(--bg3); border: 1px solid var(--border2); color: var(--t1);
      padding: 6px 12px; border-radius: var(--r1); font-size: 12px; cursor: pointer; transition: background 0.15s;
      display: flex; align-items: center; justify-content: center; height: 32px;
    }
    .chat-header-actions button:hover { background: var(--bg4); }

    .chat-messages {
      flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .message-wrapper { display: flex; flex-direction: column; max-width: 70%; }
    .message-wrapper.me { align-self: flex-end; align-items: flex-end; }
    .message-wrapper.other { align-self: flex-start; align-items: flex-start; }

    .message-sender { font-size: 11px; color: var(--t3); margin-bottom: 4px; margin-left: 4px; margin-right: 4px; }
    .message-bubble { padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.5; word-break: break-all; }
    
    .message-wrapper.me .message-bubble { background: var(--blue); color: #fff; border-bottom-right-radius: 4px; }
    .message-wrapper.other .message-bubble { background: var(--bg3); color: var(--t1); border: 1px solid var(--border2); border-bottom-left-radius: 4px; }
    
    .message-time { font-size: 10px; color: var(--t3); margin-top: 4px; margin-left: 4px; margin-right: 4px; display: flex; align-items: center; gap: 2px;}

    /* 시스템 메시지 UI */
    .system-message-container {
      display: flex; justify-content: center; width: 100%; max-width: 100% !important; margin: 4px 0; align-self: center; align-items: center;
    }
    .system-message-bubble {
      background: var(--bg3); color: var(--t2); font-size: 12px; font-weight: 500;
      padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border2);
      text-align: center;
    }

    .chat-input-area { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--bg); display: flex; gap: 12px; align-items: flex-end; }
    .chat-input {
      flex: 1; background: var(--bg2); border: 1px solid var(--border2); border-radius: 24px;
      padding: 12px 20px; color: var(--t1); font-size: 14px; font-family: inherit; resize: none;
      outline: none; min-height: 44px; max-height: 120px; transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: var(--border3); }

    .send-btn {
      width: 44px; height: 44px; border-radius: 50%; background: var(--blue); border: none; color: #fff;
      display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: transform 0.15s, opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.9; }
    .send-btn:active { transform: scale(0.9); }
    .send-btn:disabled { background: var(--bg3); color: var(--t3); cursor: not-allowed; }

    /* MODAL STYLE */
    .modal {
      display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0); backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
      justify-content: center; align-items: center; z-index: 200; pointer-events: none; visibility: hidden; transition: all 0.3s;
    }
    .modal.open { 
      pointer-events: auto; visibility: visible; background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .modal-content {
      background: var(--bg2); border: 1px solid var(--border2); width: 90%; max-width: 400px;
      border-radius: var(--r4); padding: 24px; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      opacity: 0; transform: scale(0.9) translateY(20px); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal.open .modal-content { opacity: 1; transform: scale(1) translateY(0); }
    
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--t2); cursor: pointer; padding: 4px; border-radius: 50%; }
    .modal-close:hover { background: var(--bg3); color: var(--t1); }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; color: var(--t2); margin-bottom: 8px; }
    .form-group input { width: 100%; padding: 12px 16px; border-radius: var(--r2); border: 1px solid var(--border2); background: var(--bg); color: var(--t1); font-size: 14px; outline: none; }
    .form-group input:focus { border-color: var(--blue); }
    .form-group input[readonly] { background: var(--bg3); cursor: default; }
    .form-group input[readonly]:focus { border-color: var(--border2); }

    .modal-search-box { display: flex; align-items: center; background: var(--bg); border: 1px solid var(--border2); border-radius: var(--r2); padding: 0 14px; height: 44px; margin-bottom: 12px; transition: border-color 0.2s; }
    .modal-search-box:focus-within { border-color: var(--blue); }
    .modal-search-box input { flex: 1; background: transparent; border: none; outline: none; color: var(--t1); font-size: 14px; padding-left: 8px; }
    .modal-search-box input::placeholder { color: var(--t3); }
    .modal-search-box .search-icon { color: var(--t2); display: flex; align-items: center; }
    
    .user-select-list { max-height: 200px; overflow-y: auto; border: 1px solid var(--border2); border-radius: var(--r2); background: var(--bg); }
    .user-select-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.2s; }
    .user-select-item:last-child { border-bottom: none; }
    .user-select-item:hover { background: var(--bg3); }
    .user-select-item .user-meta { display: flex; align-items: center; gap: 10px; }
    .user-select-item .user-meta span { font-size: 14px; font-weight: 500; }
    
    .select-chk-btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--t2); padding: 6px 14px; border-radius: 14px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .select-chk-btn.checked { background: var(--blue); border-color: var(--blue); color: #fff; }
    
    .modal-btn { width: 100%; padding: 14px; border-radius: var(--r2); background: var(--t1); color: var(--bg); border: none; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    .modal-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .modal-btn.danger { background: rgba(255,107,107,0.15); color: var(--pink); border: 1px solid rgba(255,107,107,0.3); transition: background 0.2s; }
    .modal-btn.danger:hover { background: rgba(255,107,107,0.25); }

    /* 아이콘 없는 커스텀 알림 */
    .custom-alert {
      position: fixed; top: -70px; left: 50%; transform: translateX(-50%); background: var(--bg3); color: var(--t1);
      border: 1px solid var(--border2); padding: 14px 24px; border-radius: var(--r3); font-size: 14px; font-weight: 600;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 9999; display: flex; align-items: center; justify-content: center;
      transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .custom-alert.show { top: 24px; }

    @media (max-width: 768px) {
      .sidebar-container { left: 0; right: 0; top: auto; bottom: 0; width: 100%; min-width: 0; height: calc(64px + env(safe-area-inset-bottom, 0px)); }
      .sidebar-container iframe { width: 100% !important; height: 100% !important; }
      .main-wrapper { margin-left: 0; width: 100%; height: calc(100vh - 64px - env(safe-area-inset-bottom, 0px)); }
  .dm-container {
    padding-bottom: 72px; /* 사이드바 높이만큼 */
    box-sizing: border-box;
  }
  .message-input-container {
    position: fixed;
    bottom: 0;
    left: 72px; /* 사이드바 너비만큼 띄움 */
    right: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom)); /* iOS 하단바 대응 */
    z-index: 101; /* 사이드바 z-index: 100보다 높게 */
  }
    .message-list {
    padding-bottom: 80px; /* 입력창 높이 + 여유 */
    height: calc(100dvh - 65px); /* 헤더 높이 빼기 */
    overflow-y: auto;
  }
      .room-list-pane { width: 100%; flex: 1; border-right: none; }
      .chat-pane { display: none; position: absolute; inset: 0; z-index: 60; }
      .dm-container.room-active .room-list-pane { display: none; }
      .dm-container.room-active .chat-pane { display: flex; }
      .mobile-back-to-list { display: flex; background: none; border: none; color: var(--t1); padding: 4px; cursor: pointer; align-items: center; justify-content: center; }
      .chat-header { padding: 12px 16px; }
      .chat-messages { padding: 16px; }
      .chat-input-area { padding: 12px 16px; }
    }
  
    /* === 사이드바 검색 패널 (index.html 동일) === */
    .search-panel {
      position: fixed;
      top: 0;
      left: 72px;
      width: 380px;
      max-width: calc(100vw - 72px);
      height: 100vh;
      background: var(--bg);
      border-right: 1px solid var(--border);
      z-index: 90;
      transform: translateX(-100%);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 24px rgba(0,0,0,0.3);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    html[data-theme="light"] .search-panel {
      box-shadow: 4px 0 24px rgba(0,0,0,0.1);
    }
    .search-panel.open {
      transform: translateX(0);
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
    .search-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }
    .search-panel-header h2 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
      color: var(--t1);
    }
    .search-close-btn {
      background: transparent;
      border: none;
      color: var(--t2);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, transform 0.2s;
    }
    .search-close-btn:hover {
      color: var(--t1);
      transform: scale(1.1);
    }
    .search-panel iframe {
      width: 100%;
      flex: 1;
      border: none;
    }

    /* === 프로필 시트 (index.html 동일) === */
    .sharer-profile-sheet-host[hidden] { display: none !important; }
    .sharer-profile-sheet-host {
      position: fixed;
      inset: 0;
      z-index: 960;
    }
    .sharer-profile-sheet-host .sps-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.34s ease;
    }
    .sharer-profile-sheet-host.sps-host-open .sps-backdrop {
      opacity: 1;
      pointer-events: auto;
    }
    .sharer-profile-sheet-host .sps-panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 20px 20px 0 0;
      padding: 4px 16px calc(20px + env(safe-area-inset-bottom, 0px));
      box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.45);
      max-height: 44vh;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      will-change: transform;
      transform: translateY(100%);
      transition: transform 0.44s cubic-bezier(0.22, 1, 0.36, 1), max-height 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .sharer-profile-sheet-host.sps-host-open .sps-panel {
      transform: translateY(0);
    }
    .sharer-profile-sheet-host .sps-panel.sps-panel-expanded {
      max-height: 88vh;
    }
    .sharer-profile-sheet-host .sps-panel.sps-panel-dragging {
      transition: none;
    }
    .sharer-profile-sheet-host .sps-drag-area {
      touch-action: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 6px 16px 14px;
      margin: -2px -16px 0 -16px;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
    }
    .sharer-profile-sheet-host .sps-drag-area:active {
      cursor: grabbing;
    }
    .sharer-profile-sheet-host .sps-grab {
      width: 40px;
      height: 5px;
      border-radius: 5px;
      background: var(--border3);
      flex-shrink: 0;
    }
    .sharer-profile-sheet-host .sps-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--bg2);
      cursor: pointer;
      margin-bottom: 12px;
    }
    .sharer-profile-sheet-host .sps-av {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3478f6, #53b6f9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #fff;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sharer-profile-sheet-host .sps-av img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .sharer-profile-sheet-host .sps-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--t1);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sharer-profile-sheet-host .sps-logout {
      width: 100%;
      padding: 14px 16px;

    @media (max-width: 768px) {
      .search-panel {
        left: 0;

    /* === 읽음 처리 UI (추가) === */

      box-shadow: 0 0 10px rgba(62,59,246,0.7);

</head>
<body>
  <div class="sidebar-container">
    <iframe src="sidebar.html" id="sidebarFrame" width="72" height="100%" frameborder="0"></iframe>

  <div id="searchPanel" class="search-panel">

      <div class="chat-pane" id="chatPane">
        <div class="chat-empty-state" id="chatEmptyState">

          </svg>

        <div class="chat-header" id="chatHeader" style="display: none;">
          <div class="chat-header-info">

              <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>

          <div class="chat-header-actions">

            <button onclick="openRoomInfoModal()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>

        <div class="chat-messages" id="chatMessages" style="display: none;"></div>

        <div class="chat-input-area" id="chatInputArea" style="display: none;">
          <textarea class="chat-input" id="messageInput" placeholder="메시지를 입력하세요..." rows="1" oninput="resizeInput(this)" onkeydown="checkEnter(event)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>

  <!-- 방 만들기 모달 -->
  <div class="modal" id="createRoomModal">

      <button class="modal-close" onclick="closeModals()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>

  <!-- 사용자 초대 모달 -->
  <div class="modal" id="inviteModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModals()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="modal-title">사용자 초대하기</div>
      <div class="form-group">
        <label>초대할 사용자 선택</label>
        <div class="modal-search-box">
          <span class="search-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </span>

        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

        <label>채팅방 이름</label>

      </div>
      <div class="form-group">

      </div>

    </div>
  </div>

  <script>
    const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";
    let currentUser = null;
    let usersCache = {}; 
    let roomMembersMap = {}; 
    let activeRoomId = null;
    let messagePollInterval = null;
    let isSending = false;
    let selectedUserIds = new Set();

    /* === 사이드바 연동 (index.html 동일 로직) === */
    function updateSidebar() {
      const iframe = document.getElementById('sidebarFrame');
      if (iframe?.contentWindow) iframe.contentWindow.postMessage({ type: 'updateUser', user: currentUser }, '*');
    }
    function updateSidebarMode() {
      const iframe = document.getElementById('sidebarFrame');
      const narrow = window.innerWidth <= 768;
      if (iframe?.contentWindow) iframe.contentWindow.postMessage({ type: 'setNarrowMode', narrow }, '*');
    }
    let searchPanelOpen = false;
    window.toggleSearchPanel = function() {
      const panel = document.getElementById('searchPanel');
      searchPanelOpen = !searchPanelOpen;
      const frame = document.getElementById('sidebarFrame');
      if (searchPanelOpen) {
        panel.classList.add('open');
        frame?.contentWindow?.postMessage({ type: 'activateSearch', active: true }, '*');
      } else {
        panel.classList.remove('open');
        frame?.contentWindow?.postMessage({ type: 'activateSearch', active: false }, '*');
      }
    };
    window.addEventListener('message', (event) => {
      const { type, page } = event.data || {};
      if (type === 'toggleSearch') {
        window.toggleSearchPanel();
      }
      if (type === 'navigate') {
        if (page === 'home') location.href = 'index.html';
        else if (page === 'explore') location.href = 'explore.html';
        else if (page === 'set') location.href = 'set.html';
        else if (page === 'dm' || page === 'message' || page === 'messages') location.href = 'dm.html';
        else if (page) location.href = page + '.html';
      }
      if (type === 'logout') {
        localStorage.removeItem('snsUser');
        currentUser = null;
        location.reload();
      }
      if (type === 'requestUserInfo') updateSidebar();
    });
    window.onSharerProfileLogout = function () {
      localStorage.removeItem('snsUser');
      currentUser = null;
      location.reload();
    };
    NProgress.configure({ minimum: 0.08, trickleSpeed: 200, showSpinner: false });
    document.addEventListener('click', function(e) {
      const link = e.target.closest('a');
      if (link && link.href && !link.target && !link.hasAttribute('download')) {
        try { NProgress.start(); } catch {}
      }
    });
    window.addEventListener('resize', updateSidebarMode);



    function showAlert(message) {
      const alertEl = document.getElementById('customAlert');
      const msgEl = document.getElementById('customAlertMsg');
      msgEl.textContent = message;
      alertEl.classList.add('show');
      setTimeout(() => alertEl.classList.remove('show'), 2500);
    }

    async function api(endpoint, options = {}) {
      const url = API_BASE + endpoint;
      const res = await fetch(url, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          ...(options.headers || {}),
        },
      });
      if (!res.ok) {
        let err = ""; try { err = await res.text(); } catch{}
        throw new Error(`API 오류 (${res.status}): ${err}`);
      }
      if (res.status === 204 || res.headers.get("content-length") === "0") return null;
      try { return await res.json(); } catch(e) { return null; }
    }

    async function initPage() {
      NProgress.start();
      const savedUser = localStorage.getItem('snsUser');
      if (!savedUser) {
        showAlert('로그인이 필요합니다.');
        setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        return;
      }
      currentUser = JSON.parse(savedUser);
      try { updateSidebar(); updateSidebarMode(); } catch {}

      try {
        await loadAllUsers();
        await loadRooms();
      } catch (e) {
        console.error("초기화 실패:", e);
      }
      NProgress.done();
    }

    async function loadAllUsers() {
      try {
        const users = await api("/users?select=id,nickname,profile_image");
        if (users) {
          users.forEach(u => usersCache[u.id] = u);
        }
      } catch (e) {
        console.warn("유저 목록 로드 실패", e);
      }
    }

    function getUserInfo(id) {
      return usersCache[id] || { id, nickname: '알 수 없음', profile_image: '' };
    }

    function generateMultiAvatarHTML(roomId) {
      const memberIds = roomMembersMap[roomId] || [];
      const others = memberIds.filter(id => id !== currentUser.id);

      if (others.length === 0) {
        return `<div class="room-avatar grid-1"><div class="avatar-text">나</div></div>`;
      }
      if (others.length === 1) {
        const u = getUserInfo(others[0]);
        if (u.profile_image) return `<div class="room-avatar grid-1"><img src="${u.profile_image}"></div>`;
        return `<div class="room-avatar grid-1"><div class="avatar-text">${u.nickname[0]}</div></div>`;
      }
      if (others.length === 2) {
        return `
          <div class="room-avatar grid-2">
            ${renderIndividualSlice(others[0])}
            ${renderIndividualSlice(others[1])}
          </div>`;
      }
      if (others.length === 3) {
        return `
          <div class="room-avatar grid-3">
            ${renderIndividualSlice(others[0])}
            ${renderIndividualSlice(others[1])}
            ${renderIndividualSlice(others[2])}
          </div>`;
      }
      return `
        <div class="room-avatar grid-4">
          ${renderIndividualSlice(others[0])}
          ${renderIndividualSlice(others[1])}
          ${renderIndividualSlice(others[2])}
          ${renderIndividualSlice(others[3])}
        </div>`;
    }

    function renderIndividualSlice(userId) {
      const u = getUserInfo(userId);
      if (u.profile_image) return `<img src="${u.profile_image}">`;
      return `<div class="avatar-text" style="font-size:10px;">${u.nickname[0]}</div>`;
    }

    // 스켈레톤 로딩 렌더링 함수
    function renderRoomSkeleton() {
      const listEl = document.getElementById('roomList');
      let html = '';
      for(let i=0; i<6; i++) {
        html += `
        <div class="room-item" style="pointer-events:none;">
          <div class="skeleton" style="width:48px; height:48px; border-radius:18px; flex-shrink:0;"></div>
          <div class="room-info" style="gap:8px;">
            <div class="skeleton" style="width:50%; height:16px; border-radius:4px;"></div>
            <div class="skeleton" style="width:70%; height:13px; border-radius:4px;"></div>
          </div>
        </div>`;
      }
      listEl.innerHTML = html;
    }

    async function loadRooms() {
      renderRoomSkeleton(); // 로딩 전 스켈레톤 노출
      
      try {
        const myMemberships = await api(`/dm_room_members?user_id=eq.${encodeURIComponent(currentUser.id)}`);
        if (!myMemberships || myMemberships.length === 0) {
          document.getElementById('roomList').innerHTML = '<div style="padding:20px; color:var(--t3); text-align:center;">참여중인 채팅방이 없습니다.</div>';
          return;
        }

        const roomIds = myMemberships.map(m => m.room_id);
        const allMembers = await api(`/dm_room_members?room_id=in.(${roomIds.join(',')})`);
        
        roomMembersMap = {};
        if (allMembers) {
          allMembers.forEach(m => {
            if (!roomMembersMap[m.room_id]) roomMembersMap[m.room_id] = [];
            roomMembersMap[m.room_id].push(m.user_id);
          });
        }

        const rooms = await api(`/dm_rooms?id=in.(${roomIds.join(',')})&order=created_at.desc`);
        renderRoomList(rooms || []);
      } catch (e) {
        console.error("채팅방 로드 오류", e);
        document.getElementById('roomList').innerHTML = '<div style="padding:20px; color:var(--pink); text-align:center;">채팅방을 불러올 수 없습니다.</div>';
      }
    }

    function renderRoomList(rooms) {
      const listEl = document.getElementById('roomList');
      listEl.innerHTML = '';

      rooms.forEach(room => {
        const div = document.createElement('div');
        div.className = `room-item ${room.id === activeRoomId ? 'active' : ''}`;
        
        let displayRoomName = room.name || '채팅방';
        const members = roomMembersMap[room.id] || [];
        if (members.length === 2) {
          const opponentId = members.find(id => id !== currentUser.id);
          if (opponentId) displayRoomName = getUserInfo(opponentId).nickname;
        }

        div.onclick = () => openRoom(room.id, displayRoomName);

        div.innerHTML = `
          <div id="avatarContainer-${room.id}"></div>
          <div class="room-info">
            <div class="room-name">${escapeHTML(displayRoomName)} <span style="font-size:12px; font-weight:400; color:var(--t3);">${members.length}</span></div>
            <div class="room-last-msg" id="lastMsg-${room.id}">대화를 시작해보세요</div>
          </div>
          <div class="unread-blue-dot" id="unreadDot-${room.id}"></div>
        `;
        listEl.appendChild(div);

        document.getElementById(`avatarContainer-${room.id}`).innerHTML = generateMultiAvatarHTML(room.id);

        // 최신 메시지 + 안읽음 파란점 처리
        api(`/dm_messages?room_id=eq.${room.id}&order=created_at.desc&limit=1`)
          .then(async msgs => {
            if (msgs && msgs.length > 0) {
              const el = document.getElementById(`lastMsg-${room.id}`);
              if (el) {
                let text = msgs[0].content;
                if(text.startsWith('[SYSTEM] ')) text = text.replace('[SYSTEM] ', '');
                el.textContent = text;
              }
              const lastMsg = msgs[0];
              // 내가 보낸 메시지거나 시스템 메시지는 안읽음 처리 안함
              if (lastMsg.sender_id === currentUser.id || lastMsg.content.startsWith('[SYSTEM] ')) {
                return;
              }
              try {
                const readCheck = await api(`/dm_read?message_id=eq.${lastMsg.id}&user_id=eq.${encodeURIComponent(currentUser.id)}`);
                const isUnread = !readCheck || readCheck.length === 0;
                const dotEl = document.getElementById(`unreadDot-${room.id}`);
                if (dotEl && isUnread) {
                  dotEl.classList.add('show');
                  dotEl.style.display = 'block';
                }
              } catch(e) {
                // 조회 실패시 조용히 무시
              }
            }
          }).catch(()=>{});
      });
    }

    function openRoom(roomId, roomName) {
      activeRoomId = roomId;
      document.getElementById('dmContainer').classList.add('room-active');
      document.body.classList.add('chat-room-active');
      document.getElementById('chatEmptyState').style.display = 'none';
      document.getElementById('chatHeader').style.display = 'flex';
      document.getElementById('chatMessages').style.display = 'flex';
      document.getElementById('chatInputArea').style.display = 'flex';
      document.getElementById('activeRoomName').textContent = roomName;

      document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
      const activeEl = Array.from(document.querySelectorAll('.room-item')).find(el => el.innerHTML.includes(roomId));
      if(activeEl) activeEl.classList.add('active');

      if (messagePollInterval) clearInterval(messagePollInterval);
      loadMessages(roomId);
      messagePollInterval = setInterval(() => {
        loadMessages(roomId, true);
      }, 3000); 
    }

    function closeRoom() {
      document.body.classList.remove('chat-room-active');
      activeRoomId = null;
      document.getElementById('dmContainer').classList.remove('room-active');
      if (messagePollInterval) clearInterval(messagePollInterval);
      loadRooms();
    }
// 채팅방 클릭 시
function openChatRoom(roomId) {
  document.body.classList.add('chat-room-active');
  // 채팅방 여는 기존 로직...
}

// 뒤로가기 or 목록으로 돌아갈 때
function closeChatRoom() {
  document.body.classList.remove('chat-room-active');
  // 목록 보여주는 기존 로직...
}
document.querySelector('.back-btn').addEventListener('click', () => {
  document.body.classList.remove('chat-room-active');
});
    let currentMessages = [];
    // === 읽음 처리: 메시지 읽음 맵 캐시 ===
    async function getReadMapForMessages(messageIds) {
      const readMap = {}; // message_id -> Set(user_id)
      const readCountMap = {};
      if (!messageIds || messageIds.length === 0) return { readMap, readCountMap };
      const chunkSize = 80;
      let allReads = [];
      for (let i = 0; i < messageIds.length; i += chunkSize) {
        const chunk = messageIds.slice(i, i + chunkSize);
        try {
          const reads = await api(`/dm_read?message_id=in.(${chunk.join(',')})`);
          if (reads && reads.length) allReads = allReads.concat(reads);
        } catch (e) {
          console.warn('dm_read 조회 실패', e);
        }
      }
      allReads.forEach(r => {
        if (!readMap[r.message_id]) readMap[r.message_id] = new Set();
        readMap[r.message_id].add(r.user_id);
      });
      messageIds.forEach(id => {
        readCountMap[id] = readMap[id] ? readMap[id].size : 0;
      });
      return { readMap, readCountMap, allReads };
    }

    async function loadMessages(roomId, isPolling = false) {
      try {
        const msgs = await api(`/dm_messages?room_id=eq.${roomId}&order=created_at.asc`);
        if (!msgs) return;
        
        // 폴링시에도 읽음수는 변할 수 있으므로 길이 같아도 읽음 맵은 갱신해야 함
        // 단, 완전히 동일하면 렌더 스킵을 위해선 별도 처리하지만 여기선 항상 최신 읽음 반영
        if (!isPolling || msgs.length !== currentMessages.length) {
          currentMessages = msgs;
        }

        const container = document.getElementById('chatMessages');
        const totalMembers = (roomMembersMap[roomId] || []).length || 1;

        // 시스템 메시지 제외한 실제 메시지 ID만 추출
        const normalMessages = msgs.filter(m => !m.content.startsWith('[SYSTEM] '));
        const messageIds = normalMessages.map(m => m.id);

        let readMap = {};
        let readCountMap = {};

        if (messageIds.length > 0) {
          const res = await getReadMapForMessages(messageIds);
          readMap = res.readMap;
          readCountMap = res.readCountMap;

          // 1) 보낸 사람 본인은 항상 읽음으로 간주 - 누락된 경우 dm_read에 보정 INSERT
          // 예: A가 보낸 메시지는 dm_read에 A가 있어야 함. 그래야 모두가 읽으면 readCount == totalMembers
          const missingSenderReads = [];
          normalMessages.forEach(m => {
            if (!readMap[m.id] || !readMap[m.id].has(m.sender_id)) {
              missingSenderReads.push({ user_id: m.sender_id, message_id: m.id });
            }
          });
          if (missingSenderReads.length > 0) {
            try {
              await api("/dm_read", {
                method: "POST",
                body: JSON.stringify(missingSenderReads)
              });
              missingSenderReads.forEach(r => {
                if (!readMap[r.message_id]) readMap[r.message_id] = new Set();
                if (!readMap[r.message_id].has(r.user_id)) {
                  readMap[r.message_id].add(r.user_id);
                  readCountMap[r.message_id] = (readCountMap[r.message_id] || 0) + 1;
                }
              });
            } catch (e) {
              // 중복은 무시하고 로컬에만 반영
              if (String(e.message).includes('409') || String(e.message).includes('duplicate')) {
                missingSenderReads.forEach(r => {
                  if (!readMap[r.message_id]) readMap[r.message_id] = new Set();
                  readMap[r.message_id].add(r.user_id);
                  if (!readCountMap[r.message_id]) readCountMap[r.message_id] = readMap[r.message_id].size;
                });
              } else {
                console.warn('보낸사람 읽음 보정 실패', e);
                // 실패해도 계산상 보낸사람은 읽은걸로 간주
                missingSenderReads.forEach(r => {
                  if (!readMap[r.message_id]) readMap[r.message_id] = new Set();
                  readMap[r.message_id].add(r.user_id);
                  readCountMap[r.message_id] = readMap[r.message_id].size;
                });
              }
            }
          }

          // 2) 내가 아직 안읽은 메시지 찾기 (보낸사람 보정 이후)
          const unreadByMe = messageIds.filter(mid => !(readMap[mid] && readMap[mid].has(currentUser.id)));
          if (unreadByMe.length > 0) {
            const payload = unreadByMe.map(mid => ({ user_id: currentUser.id, message_id: mid }));
            try {
              await api("/dm_read", {
                method: "POST",
                body: JSON.stringify(payload)
              });
              unreadByMe.forEach(mid => {
                if (!readMap[mid]) readMap[mid] = new Set();
                if (!readMap[mid].has(currentUser.id)) {
                  readMap[mid].add(currentUser.id);
                  readCountMap[mid] = (readCountMap[mid] || 0) + 1;
                }
              });
              const dotEl = document.getElementById(`unreadDot-${roomId}`);
              if (dotEl) {
                dotEl.classList.remove('show');
                dotEl.style.display = 'none';
              }
            } catch (e) {
              if (!String(e.message).includes('409') && !String(e.message).includes('duplicate')) {
                console.warn('dm_read 삽입 실패', e);
              } else {
                unreadByMe.forEach(mid => {
                  if (!readMap[mid]) readMap[mid] = new Set();
                  readMap[mid].add(currentUser.id);
                  if (!readCountMap[mid]) readCountMap[mid] = readMap[mid].size;
                });
              }
            }
          }
        }

        container.innerHTML = '';

        msgs.forEach(msg => {
          const wrapper = document.createElement('div');
          
          // 시스템 메시지
          if (msg.content.startsWith('[SYSTEM] ')) {
            const sysText = msg.content.replace('[SYSTEM] ', '').trim();
            wrapper.className = 'system-message-container';
            wrapper.innerHTML = `<div class="system-message-bubble">${escapeHTML(sysText)}</div>`;
            container.appendChild(wrapper);
            return;
          }

          const isMe = msg.sender_id === currentUser.id;
          const time = new Date(msg.created_at).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
          const senderName = isMe ? '' : getUserInfo(msg.sender_id).nickname;

          const readCount = readCountMap[msg.id] || 0;
          const unreadCount = Math.max(0, totalMembers - readCount);

          wrapper.className = `message-wrapper ${isMe ? 'me' : 'other'}`;
          
          let html = '';
          if (!isMe) {
            html += `<div class="message-sender">${escapeHTML(senderName)}</div>`;
          }
          html += `
            <div class="message-row ${isMe ? 'me' : 'other'}">
              <div class="message-bubble">${escapeHTML(msg.content).replace(/\n/g, '<br>')}</div>
              <div class="msg-side">
                ${unreadCount > 0 ? `<span class="unread-count">${unreadCount}</span>` : `<span class="unread-count" style="opacity:0;">0</span>`}
                <span class="message-time" style="margin:0;">${time}</span>
              </div>
            </div>
          `;
          wrapper.innerHTML = html;
          container.appendChild(wrapper);
        });

        container.scrollTop = container.scrollHeight;
      } catch (e) {
        console.error("메시지 로드 오류", e);
      }
    }

    async function sendMessage() {
      if (!activeRoomId || isSending) return;
      const input = document.getElementById('messageInput');
      const content = input.value.trim();
      if (!content) return;

      isSending = true;
      document.getElementById('sendBtn').disabled = true;

      const container = document.getElementById('chatMessages');
      const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
      const tempWrapper = document.createElement('div');
      tempWrapper.className = 'message-wrapper me temp-msg';
      tempWrapper.style.opacity = '0.7';
      
      tempWrapper.innerHTML = `
        <div class="message-row me">
          <div class="message-bubble">${escapeHTML(content).replace(/\n/g, '<br>')}</div>
          <div class="msg-side">
            <span class="message-time" style="margin:0; display:flex; align-items:center; gap:2px;">
              ${time} 
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </span>
          </div>
        </div>
      `;
      container.appendChild(tempWrapper);
      container.scrollTop = container.scrollHeight;

      input.value = '';
      input.style.height = '44px';

      const newMessageId = (crypto.randomUUID ? crypto.randomUUID() : 'msg-' + Date.now() + '-' + Math.random().toString(36).slice(2));

      try {
        await api("/dm_messages", {
          method: "POST",
          headers: { "Prefer": "return=representation" },
          body: JSON.stringify({
            id: newMessageId,
            room_id: activeRoomId,
            sender_id: currentUser.id,
            content: content,
            created_at: new Date().toISOString()
          })
        });
        // 보낸 사람은 즉시 읽음 처리
        try {
          await api("/dm_read", {
            method: "POST",
            body: JSON.stringify({ user_id: currentUser.id, message_id: newMessageId })
          });
        } catch (readErr) {
          // 읽음 삽입 실패는 무시 (loadMessages에서 다시 처리됨)
          console.warn('보낸 메시지 읽음 처리 실패', readErr);
        }
        loadMessages(activeRoomId);
      } catch (e) {
        showAlert("메시지 전송에 실패했습니다.");
        tempWrapper.remove();
      } finally {
        isSending = false;
        document.getElementById('sendBtn').disabled = false;
        input.focus();
      }
    }

    function resizeInput(el) {
      el.style.height = '44px';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function checkEnter(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function closeModals() {
      document.getElementById('createRoomModal').classList.remove('open');
      document.getElementById('inviteModal').classList.remove('open');
      document.getElementById('roomInfoModal').classList.remove('open');
      selectedUserIds.clear();
    }

    function openCreateRoomModal() {
      document.getElementById('createRoomModal').classList.add('open');
      document.getElementById('newRoomName').value = '';
      document.getElementById('createRoomUserSearch').value = '';
      selectedUserIds.clear();
      renderUserSelectList('newUserList');
    }

    function openInviteModal() {
      document.getElementById('inviteModal').classList.add('open');
      document.getElementById('inviteUserSearch').value = '';
      selectedUserIds.clear();
      renderUserSelectList('inviteUserList');
    }

    // 채팅방 정보 모달 열기 함수 (멤버 표시 및 마이페이지 연결)
    function openRoomInfoModal() {
      if (!activeRoomId) return;
      document.getElementById('roomInfoModal').classList.add('open');
      
      const displayRoomName = document.getElementById('activeRoomName').textContent;
      document.getElementById('infoRoomName').value = displayRoomName;
      
      const members = roomMembersMap[activeRoomId] || [];
      const container = document.getElementById('roomMembersList');
      container.innerHTML = '';
      
      members.forEach(id => {
        const u = getUserInfo(id);
        const item = document.createElement('div');
        item.className = 'user-select-item';
        item.title = '클릭하여 프로필로 이동';
        
        const avatarHTML = u.profile_image 
          ? `<img src="${u.profile_image}" style="width:100%; height:100%; object-fit:cover;">`
          : `<span style="font-size:12px;">${u.nickname[0]}</span>`;

        item.innerHTML = `
          <div class="user-meta">
            <div style="width:32px; height:32px; border-radius:50%; background:var(--bg3); display:flex; align-items:center; justify-content:center; overflow:hidden;">
              ${avatarHTML}
            </div>
            <span>${escapeHTML(u.nickname)} ${id === currentUser.id ? '(나)' : ''}</span>
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        `;

        // 마이페이지 이동 링크 처리 (profile.html로 가정)
        item.onclick = () => {
          window.location.href = `user.html?id=${u.id}`;
        };
        
        container.appendChild(item);
      });
    }

    async function leaveRoom() {
      if(!activeRoomId) return;
      if(!confirm("정말로 이 채팅방에서 나가시겠습니까?")) return;
      
      NProgress.start();
      try {
        // 나감 시스템 메시지 발송
        const sysMsg = `[SYSTEM] ${currentUser.nickname}님이 나갔습니다.`;
        await api("/dm_messages", {
          method: "POST",
          body: JSON.stringify({
            room_id: activeRoomId,
            sender_id: currentUser.id,
            content: sysMsg,
            created_at: new Date().toISOString()
          })
        });
        
        // 내 멤버 기록 삭제
        await api(`/dm_room_members?room_id=eq.${activeRoomId}&user_id=eq.${currentUser.id}`, {
          method: "DELETE"
        });

        closeModals();
        closeRoom();
        showAlert("채팅방에서 나갔습니다.");
      } catch(e) {
        showAlert("나가기 실패: " + e.message);
      } finally {
        NProgress.done();
      }
    }

    function renderUserSelectList(containerId, filterKeyword = '') {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      
      const filteredUsers = Object.values(usersCache).filter(u => {
        if (u.id === currentUser.id) return false; 
        if (containerId === 'inviteUserList' && activeRoomId && roomMembersMap[activeRoomId]?.includes(u.id)) return false; // 이미 들어와 있는 유저 필터링
        if (!filterKeyword) return true;
        return u.nickname.toLowerCase().includes(filterKeyword.toLowerCase());
      });

      if (filteredUsers.length === 0) {
        container.innerHTML = '<div style="padding:20px; color:var(--t3); text-align:center; font-size:14px;">검색 결과가 없습니다.</div>';
        return;
      }

      filteredUsers.forEach(u => {
        const item = document.createElement('div');
        item.className = 'user-select-item';
        const isChecked = selectedUserIds.has(u.id);
        
        item.innerHTML = `
          <div class="user-meta">
            <span>${escapeHTML(u.nickname)}</span>
          </div>
          <button type="button" class="select-chk-btn ${isChecked ? 'checked' : ''}" data-id="${u.id}">
            ${isChecked ? '선택됨' : '선택'}
          </button>
        `;

        const toggleSelection = (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (selectedUserIds.has(u.id)) {
            selectedUserIds.delete(u.id);
            btn.classList.remove('checked');
            btn.textContent = '선택';
          } else {
            selectedUserIds.add(u.id);
            btn.classList.add('checked');
            btn.textContent = '선택됨';
          }
        };

        const btn = item.querySelector('.select-chk-btn');
        item.onclick = toggleSelection;
        btn.onclick = toggleSelection;

        container.appendChild(item);
      });
    }

    async function createRoom() {
      const name = document.getElementById('newRoomName').value.trim() || '새 채팅방';
      const selectedIds = Array.from(selectedUserIds);
      
      const btn = document.getElementById('createRoomBtn');
      btn.disabled = true;
      NProgress.start();

      try {
        const roomPayload = { name: name, created_at: new Date().toISOString() };
        roomPayload.id = crypto.randomUUID ? crypto.randomUUID() : 'room-' + Date.now(); 

        const roomRes = await api("/dm_rooms", {
          method: "POST",
          headers: { "Prefer": "return=representation" },
          body: JSON.stringify(roomPayload)
        });
        
        const newRoomId = (roomRes && roomRes[0]) ? roomRes[0].id : roomPayload.id;

        const membersData = [
          { room_id: newRoomId, user_id: currentUser.id, joined_at: new Date().toISOString() }
        ];

        selectedIds.forEach(id => {
          membersData.push({ room_id: newRoomId, user_id: id, joined_at: new Date().toISOString() });
        });

        await api("/dm_room_members", {
          method: "POST",
          body: JSON.stringify(membersData)
        });

        // 초대 완료 시스템 메시지 등록
        if (selectedIds.length > 0) {
          const invitedNames = selectedIds.map(id => getUserInfo(id).nickname).join(', ');
          const sysMsg = `[SYSTEM] ${currentUser.nickname}님이 ${invitedNames}님을 초대했습니다.`;
          await api("/dm_messages", {
            method: "POST",
            body: JSON.stringify({
              room_id: newRoomId,
              sender_id: currentUser.id,
              content: sysMsg,
              created_at: new Date().toISOString()
            })
          });
        }

        closeModals();
        await loadRooms();
        openRoom(newRoomId, name);
        showAlert("새 채팅방이 개설되었습니다.");
      } catch (e) {
        showAlert("방 생성 실패: " + e.message);
      } finally {
        btn.disabled = false;
        NProgress.done();
      }
    }

    async function inviteUsers() {
      if (!activeRoomId) return;
      const selectedIds = Array.from(selectedUserIds);
      if (selectedIds.length === 0) {
        showAlert("초대할 사용자를 선택해주세요.");
        return;
      }

      const btn = document.getElementById('inviteBtn');
      btn.disabled = true;
      NProgress.start();

      try {
        const membersData = selectedIds.map(id => ({
          room_id: activeRoomId,
          user_id: id,
          joined_at: new Date().toISOString()
        }));

        await api("/dm_room_members", {
          method: "POST",
          body: JSON.stringify(membersData)
        });

        // 시스템 메시지 등록sdsadsa
        const invitedNames = selectedIds.map(id => getUserInfo(id).nickname).join(', ');
        const sysMsg = `[SYSTEM] ${currentUser.nickname}님이 ${invitedNames}님을 초대했습니다.`;
        await api("/dm_messages", {
          method: "POST",
          body: JSON.stringify({
            room_id: activeRoomId,
            sender_id: currentUser.id,
            content: sysMsg,
            created_at: new Date().toISOString()
          })
        });

        showAlert("성공적으로 사용자를 초대했습니다.");
        closeModals();
        await loadRooms();
        
        if (roomMembersMap[activeRoomId]) {
          let displayRoomName = document.getElementById('activeRoomName').textContent;
          openRoom(activeRoomId, displayRoomName);
        }
      } catch (e) {
        showAlert("초대 실패: " + e.message);
      } finally {
        btn.disabled = false;
        NProgress.done();
      }
    }

    function escapeHTML(str) {
      if (!str) return '';
      return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
      );
    }
