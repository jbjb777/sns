<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>메시지 : Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>
  <script>
    // 화면 깜빡임(FOUC) 방지를 위해 HTML 렌더링 전 테마를 즉시 적용합니다.
    const savedTheme = localStorage.getItem('theme') || 'dark';
    if (savedTheme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --blue: #3b82f6;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    /* 라이트 모드 변수 정의 */
    html[data-theme="light"] {
      --bg: #fafafa;
      --bg2: #ffffff;
      --bg3: #f0f0f0;
      --bg4: #e4e4e4;
      --border: #dbdbdb;
      --border2: #cccccc;
      --border3: #a3a3a3;
      --t1: #000000;
      --t2: #737373;
      --t3: #a8a8a8;
    }

    #nprogress .bar { background: var(--t1) !important; height: 2px !important; }
    #nprogress .peg { display: none !important; }
    #nprogress .spinner { display: none !important; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
      overflow: hidden; /* DM 페이지는 내부 스크롤 사용 */
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* ─── SIDEBAR (메인 앱 사이드바) ─── */
    .sidebar-container { width: 72px; min-width: 72px; height: 100vh; position: fixed; left: 0; top: 0; z-index: 100; }
    .sidebar-container iframe { width: 72px !important; height: 100%; border: none; }

    /* ─── MAIN WRAPPER ─── */
    .main-wrapper { 
      margin-left: 72px; 
      width: calc(100% - 72px); 
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
    }

    /* ─── HEADER ─── */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      z-index: 50;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .back-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: none;
      background: none;
      color: var(--t2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .back-btn:hover { color: var(--t1); background: var(--bg3); }
    .back-btn:active { transform: scale(0.82); }
    .header-title { font-size: 16px; font-weight: 600; }

    .header-right .action-btn {
      background: var(--t1);
      color: var(--bg);
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .header-right .action-btn:active { transform: scale(0.95); }

    /* ─── DM LAYOUT (Master-Detail) ─── */
    .dm-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      background: var(--bg);
    }

    /* 왼쪽: 채팅방 목록 */
    .room-list-pane {
      width: 320px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      background: var(--bg);
    }
    
    .room-list-header {
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 700;
      border-bottom: 1px solid var(--border);
    }

    .rooms-scroll-area {
      flex: 1;
      overflow-y: auto;
    }
    .rooms-scroll-area::-webkit-scrollbar { width: 6px; }
    .rooms-scroll-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .room-item {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      gap: 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }
    .room-item:hover { background: var(--bg2); }
    .room-item.active { background: var(--bg3); }

    .room-avatar {
      width: 48px; height: 48px;
      border-radius: 18px;
      background: var(--bg4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--t2);
      flex-shrink: 0;
    }
    .room-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .room-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--t1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .room-last-msg {
      font-size: 13px;
      color: var(--t2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 오른쪽: 채팅 화면 */
    .chat-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg2);
      position: relative;
    }

    .chat-empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--t3);
      z-index: 10;
    }
    .chat-empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5; }
    .chat-empty-state p { font-size: 15px; font-weight: 500; }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-header-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .mobile-back-to-list { display: none; }
    
    .chat-title { font-size: 16px; font-weight: 700; color: var(--t1); }
    
    .chat-header-actions button {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--t1);
      padding: 6px 12px;
      border-radius: var(--r1);
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .chat-header-actions button:hover { background: var(--bg4); }

    .chat-messages {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .message-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 70%;
    }
    .message-wrapper.me {
      align-self: flex-end;
      align-items: flex-end;
    }
    .message-wrapper.other {
      align-self: flex-start;
      align-items: flex-start;
    }

    .message-sender {
      font-size: 11px;
      color: var(--t3);
      margin-bottom: 4px;
      margin-left: 4px;
      margin-right: 4px;
    }

    .message-bubble {
      padding: 12px 16px;
      border-radius: 20px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-all;
    }
    .message-wrapper.me .message-bubble {
      background: var(--blue);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message-wrapper.other .message-bubble {
      background: var(--bg3);
      color: var(--t1);
      border: 1px solid var(--border2);
      border-bottom-left-radius: 4px;
    }
    
    .message-time {
      font-size: 10px;
      color: var(--t3);
      margin-top: 4px;
      margin-left: 4px;
      margin-right: 4px;
    }

    .chat-input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    
    .chat-input {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 24px;
      padding: 12px 20px;
      color: var(--t1);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 120px;
      transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: var(--border3); }

    .send-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--blue);
      border: none;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.15s, opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.9; }
    .send-btn:active { transform: scale(0.9); }
    .send-btn:disabled { background: var(--bg3); color: var(--t3); cursor: not-allowed; }

    /* ─── MODAL (POPUP) STYLE ─── */
    .modal {
      display: flex;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0);
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
      justify-content: center;
      align-items: center;
      z-index: 200;
      pointer-events: none;
      visibility: hidden;
      transition: all 0.3s;
    }
    .modal.open { 
      pointer-events: auto;
      visibility: visible;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .modal-content {
      background: var(--bg2);
      border: 1px solid var(--border2);
      width: 90%;
      max-width: 400px;
      border-radius: var(--r4);
      padding: 24px;
      position: relative;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      opacity: 0;
      transform: scale(0.9) translateY(20px);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal.open .modal-content { opacity: 1; transform: scale(1) translateY(0); }
    
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .modal-close {
      position: absolute; top: 20px; right: 20px;
      background: none; border: none; color: var(--t2);
      cursor: pointer; padding: 4px; border-radius: 50%;
    }
    .modal-close:hover { background: var(--bg3); color: var(--t1); }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; color: var(--t2); margin-bottom: 8px; }
    .form-group input {
      width: 100%; padding: 12px 16px; border-radius: var(--r2);
      border: 1px solid var(--border2); background: var(--bg);
      color: var(--t1); font-size: 14px; outline: none;
    }
    .form-group input:focus { border-color: var(--blue); }
    
    .user-select-list {
      max-height: 200px; overflow-y: auto;
      border: 1px solid var(--border2); border-radius: var(--r2);
      background: var(--bg);
    }
    .user-select-item {
      display: flex; align-items: center; padding: 10px 14px; gap: 10px;
      cursor: pointer; border-bottom: 1px solid var(--border);
    }
    .user-select-item:last-child { border-bottom: none; }
    .user-select-item:hover { background: var(--bg3); }
    .user-select-item input { width: auto; margin: 0; }
    
    .modal-btn {
      width: 100%; padding: 14px; border-radius: var(--r2);
      background: var(--t1); color: var(--bg);
      border: none; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .modal-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ─── MOBILE RESPONSIVE ─── */
    @media (max-width: 768px) {
      .sidebar-container { left: 0; right: 0; top: auto; bottom: 0; width: 100%; min-width: 0; height: calc(64px + env(safe-area-inset-bottom, 0px)); }
      .sidebar-container iframe { width: 100% !important; height: 100% !important; }
      .main-wrapper { margin-left: 0; width: 100%; height: calc(100vh - 64px - env(safe-area-inset-bottom, 0px)); }
      
      .dm-container { flex-direction: column; }
      
      .room-list-pane { width: 100%; flex: 1; border-right: none; }
      .chat-pane { display: none; position: absolute; inset: 0; z-index: 60; }
      
      /* 모바일에서 채팅방이 열렸을 때 */
      .dm-container.room-active .room-list-pane { display: none; }
      .dm-container.room-active .chat-pane { display: flex; }
      
      .mobile-back-to-list {
        display: flex; background: none; border: none; color: var(--t1);
        padding: 4px; cursor: pointer; align-items: center; justify-content: center;
      }
      .chat-header { padding: 12px 16px; }
      .chat-messages { padding: 16px; }
      .chat-input-area { padding: 12px 16px; }
    }
  </style>
</head>
<body>
  <div class="sidebar-container">
    <iframe src="sidebar.html"></iframe>
  </div>

  <div class="main-wrapper">
    <div class="header">
      <div class="header-left">
        <button class="back-btn" onclick="window.location.href='index.html'">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M5 12l7-7M5 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <span class="header-title">다이렉트 메시지</span>
      </div>
      <div class="header-right">
        <button class="action-btn" onclick="openCreateRoomModal()">+ 새 채팅방</button>
      </div>
    </div>

    <div class="dm-container" id="dmContainer">
      <!-- 왼쪽: 채팅방 목록 -->
      <div class="room-list-pane">
        <div class="rooms-scroll-area" id="roomList">
          <!-- 채팅방 아이템 예시 (동적 생성) -->
          <!-- <div class="room-item active">
            <div class="room-avatar">A</div>
            <div class="room-info">
              <div class="room-name">테스트 방</div>
              <div class="room-last-msg">마지막 메시지 내용</div>
            </div>
          </div> -->
        </div>
      </div>

      <!-- 오른쪽: 채팅 내용 -->
      <div class="chat-pane" id="chatPane">
        <div class="chat-empty-state" id="chatEmptyState">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
          <p>채팅방을 선택하거나 새로 만들어보세요.</p>
        </div>

        <div class="chat-header" id="chatHeader" style="display: none;">
          <div class="chat-header-info">
            <button class="mobile-back-to-list" onclick="closeRoom()">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="chat-title" id="activeRoomName">채팅방 이름</div>
          </div>
          <div class="chat-header-actions">
            <button onclick="openInviteModal()">+ 초대</button>
          </div>
        </div>

        <div class="chat-messages" id="chatMessages" style="display: none;">
          <!-- 메시지들 (동적 생성) -->
        </div>

        <div class="chat-input-area" id="chatInputArea" style="display: none;">
          <textarea class="chat-input" id="messageInput" placeholder="메시지를 입력하세요..." rows="1" oninput="resizeInput(this)" onkeydown="checkEnter(event)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 방 만들기 모달 -->
  <div class="modal" id="createRoomModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModals()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="modal-title">새 채팅방 만들기</div>
      <div class="form-group">
        <label>채팅방 이름</label>
        <input type="text" id="newRoomName" placeholder="채팅방 이름을 입력하세요">
      </div>
      <div class="form-group">
        <label>초대할 사용자 선택</label>
        <div class="user-select-list" id="newUserList">
          <!-- 유저 목록 -->
        </div>
      </div>
      <button class="modal-btn" id="createRoomBtn" onclick="createRoom()">만들기</button>
    </div>
  </div>

  <!-- 사용자 초대 모달 -->
  <div class="modal" id="inviteModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModals()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="modal-title">사용자 초대하기</div>
      <div class="form-group">
        <label>초대할 사용자 선택</label>
        <div class="user-select-list" id="inviteUserList">
          <!-- 유저 목록 -->
        </div>
      </div>
      <button class="modal-btn" id="inviteBtn" onclick="inviteUsers()">초대하기</button>
    </div>
  </div>

  <script>
    const API_BASE = "https://sharer-api.alexeom97.workers.dev/";
    let currentUser = null;
    let usersCache = {}; // { id: { nickname, ... } }
    let activeRoomId = null;
    let messagePollInterval = null;
    let isSending = false;

    // API 통신 공통 함수
    async function api(endpoint, options = {}) {
      const url = API_BASE + endpoint;
      const res = await fetch(url, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          ...(options.headers || {}),
        },
      });
      if (!res.ok) {
        let err = ""; try { err = await res.text(); } catch{}
        throw new Error(`API 오류 (${res.status}): ${err}`);
      }
      if (res.status === 204 || res.headers.get("content-length") === "0") return null;
      try { return await res.json(); } catch(e) { return null; }
    }

    // 초기화
    async function initPage() {
      NProgress.start();
      const savedUser = localStorage.getItem('snsUser');
      if (!savedUser) {
        alert('로그인이 필요합니다.');
        window.location.href = 'login.html';
        return;
      }
      currentUser = JSON.parse(savedUser);

      try {
        await loadAllUsers();
        await loadRooms();
      } catch (e) {
        console.error("초기화 실패:", e);
      }
      NProgress.done();
    }

    // 유저 정보 로드 (닉네임, 프로필 매핑용)
    async function loadAllUsers() {
      try {
        const users = await api("/users?select=id,nickname,profile_image");
        if (users) {
          users.forEach(u => usersCache[u.id] = u);
        }
      } catch (e) {
        console.warn("유저 목록 로드 실패", e);
      }
    }

    function getUserName(id) {
      if (id === currentUser.id) return currentUser.nickname;
      return usersCache[id]?.nickname || '알 수 없음';
    }

    // 내 채팅방 목록 로드
    async function loadRooms() {
      try {
        // 1. 내가 속한 방 멤버 레코드 가져오기
        const myMemberships = await api(`/dm_room_members?user_id=eq.${encodeURIComponent(currentUser.id)}`);
        if (!myMemberships || myMemberships.length === 0) {
          document.getElementById('roomList').innerHTML = '<div style="padding:20px; color:var(--t3); text-align:center;">참여중인 채팅방이 없습니다.</div>';
          return;
        }

        const roomIds = myMemberships.map(m => m.room_id).join(',');
        // 2. 방 정보 가져오기 (이름 등)
        const rooms = await api(`/dm_rooms?id=in.(${roomIds})&order=created_at.desc`);
        
        renderRoomList(rooms || []);
      } catch (e) {
        console.error("채팅방 로드 오류", e);
      }
    }

    function renderRoomList(rooms) {
      const listEl = document.getElementById('roomList');
      listEl.innerHTML = '';

      rooms.forEach(room => {
        const div = document.createElement('div');
        div.className = `room-item ${room.id === activeRoomId ? 'active' : ''}`;
        div.onclick = () => openRoom(room.id, room.name);

        const avatarChar = (room.name ? room.name[0] : '방').toUpperCase();

        div.innerHTML = `
          <div class="room-avatar">${avatarChar}</div>
          <div class="room-info">
            <div class="room-name">${escapeHTML(room.name)}</div>
            <div class="room-last-msg" id="lastMsg-${room.id}">대화를 시작해보세요</div>
          </div>
        `;
        listEl.appendChild(div);

        // 마지막 메시지 비동기 로드 (간략하게 최신 1개)
        api(`/dm_messages?room_id=eq.${room.id}&order=created_at.desc&limit=1`)
          .then(msgs => {
            if (msgs && msgs.length > 0) {
              const el = document.getElementById(`lastMsg-${room.id}`);
              if (el) el.textContent = msgs[0].content;
            }
          }).catch(()=>{});
      });
    }

    // 채팅방 열기
    function openRoom(roomId, roomName) {
      activeRoomId = roomId;
      
      // 모바일 대응 클래스 토글
      document.getElementById('dmContainer').classList.add('room-active');
      
      // UI 업데이트
      document.getElementById('chatEmptyState').style.display = 'none';
      document.getElementById('chatHeader').style.display = 'flex';
      document.getElementById('chatMessages').style.display = 'flex';
      document.getElementById('chatInputArea').style.display = 'flex';
      document.getElementById('activeRoomName').textContent = roomName;

      // 목록 UI active 상태 업데이트
      document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
      // 다시 렌더링 없이 현재 돔에서 active 추가
      loadRooms(); 

      // 메시지 불러오기 및 폴링 시작
      if (messagePollInterval) clearInterval(messagePollInterval);
      loadMessages(roomId);
      messagePollInterval = setInterval(() => {
        loadMessages(roomId, true);
      }, 3000); // 3초마다 갱신
    }

    function closeRoom() {
      activeRoomId = null;
      document.getElementById('dmContainer').classList.remove('room-active');
      if (messagePollInterval) clearInterval(messagePollInterval);
    }

    let currentMessages = [];
    async function loadMessages(roomId, isPolling = false) {
      try {
        const msgs = await api(`/dm_messages?room_id=eq.${roomId}&order=created_at.asc`);
        if (!msgs) return;
        
        // 폴링 중 갯수가 같으면 다시 렌더링 안함 (간단한 최적화)
        if (isPolling && msgs.length === currentMessages.length) return;
        currentMessages = msgs;

        const container = document.getElementById('chatMessages');
        container.innerHTML = '';

        msgs.forEach(msg => {
          const isMe = msg.sender_id === currentUser.id;
          const time = new Date(msg.created_at).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
          const senderName = isMe ? '' : getUserName(msg.sender_id);

          const wrapper = document.createElement('div');
          wrapper.className = `message-wrapper ${isMe ? 'me' : 'other'}`;
          
          let html = '';
          if (!isMe) {
            html += `<div class="message-sender">${escapeHTML(senderName)}</div>`;
          }
          html += `
            <div style="display:flex; align-items:flex-end; gap:4px; ${isMe ? 'flex-direction:row-reverse;' : ''}">
              <div class="message-bubble">${msg.content.replace(/\n/g, '<br>')}</div>
              <div class="message-time">${time}</div>
            </div>
          `;
          wrapper.innerHTML = html;
          container.appendChild(wrapper);
        });

        // 스크롤 맨 아래로
        container.scrollTop = container.scrollHeight;

      } catch (e) {
        console.error("메시지 로드 오류", e);
      }
    }

    async function sendMessage() {
      if (!activeRoomId || isSending) return;
      const input = document.getElementById('messageInput');
      const content = input.value.trim();
      if (!content) return;

      isSending = true;
      document.getElementById('sendBtn').disabled = true;

      // 낙관적 UI 업데이트 (바로 보이게)
      const container = document.getElementById('chatMessages');
      const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
      const tempWrapper = document.createElement('div');
      tempWrapper.className = 'message-wrapper me temp-msg';
      tempWrapper.style.opacity = '0.7';
      tempWrapper.innerHTML = `
        <div style="display:flex; align-items:flex-end; gap:4px; flex-direction:row-reverse;">
          <div class="message-bubble">${escapeHTML(content).replace(/\n/g, '<br>')}</div>
          <div class="message-time">${time}</div>
        </div>
      `;
      container.appendChild(tempWrapper);
      container.scrollTop = container.scrollHeight;

      input.value = '';
      input.style.height = '44px';

      try {
        await api("/dm_messages", {
          method: "POST",
          body: JSON.stringify({
            room_id: activeRoomId,
            sender_id: currentUser.id,
            content: content,
            created_at: new Date().toISOString()
          })
        });
        // 전송 성공 시 갱신
        loadMessages(activeRoomId);
      } catch (e) {
        alert("메시지 전송에 실패했습니다.");
        tempWrapper.remove();
      } finally {
        isSending = false;
        document.getElementById('sendBtn').disabled = false;
        input.focus();
      }
    }

    // 입력창 크기 자동 조절
    function resizeInput(el) {
      el.style.height = '44px';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function checkEnter(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    /* ─── 모달 제어 및 방 생성/초대 ─── */
    function closeModals() {
      document.getElementById('createRoomModal').classList.remove('open');
      document.getElementById('inviteModal').classList.remove('open');
    }

    function openCreateRoomModal() {
      document.getElementById('createRoomModal').classList.add('open');
      document.getElementById('newRoomName').value = '';
      renderUserSelectList('newUserList');
    }

    function openInviteModal() {
      document.getElementById('inviteModal').classList.add('open');
      renderUserSelectList('inviteUserList');
    }

    function renderUserSelectList(containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      Object.values(usersCache).forEach(u => {
        if (u.id === currentUser.id) return; // 자신 제외
        const label = document.createElement('label');
        label.className = 'user-select-item';
        label.innerHTML = `
          <input type="checkbox" value="${u.id}">
          <span>${escapeHTML(u.nickname)}</span>
        `;
        container.appendChild(label);
      });
    }

    async function createRoom() {
      const name = document.getElementById('newRoomName').value.trim() || '새 채팅방';
      const checkboxes = document.querySelectorAll('#newUserList input:checked');
      const selectedIds = Array.from(checkboxes).map(cb => cb.value);
      
      const btn = document.getElementById('createRoomBtn');
      btn.disabled = true;
      NProgress.start();

      try {
        // 1. 방 생성 (PostgREST는 uuid 자동생성 or return=representation)
        // uuidv4 생성이 DB에 설정되어 있다고 가정, 만약 없다면 JS에서 생성해 넘겨야함
        const roomPayload = { name: name, created_at: new Date().toISOString() };
        // UUID가 자동생성이 안될수 있으므로 간단한 uuid 생성기 사용 (Postgres default없을대비)
        roomPayload.id = crypto.randomUUID ? crypto.randomUUID() : 'temp-' + Date.now(); 

        const roomRes = await api("/dm_rooms", {
          method: "POST",
          headers: { "Prefer": "return=representation" },
          body: JSON.stringify(roomPayload)
        });
        
        const newRoomId = (roomRes && roomRes[0]) ? roomRes[0].id : roomPayload.id;

        // 2. 나를 멤버에 추가
        const membersData = [
          { room_id: newRoomId, user_id: currentUser.id, joined_at: new Date().toISOString() }
        ];

        // 3. 선택된 유저 멤버에 추가
        selectedIds.forEach(id => {
          membersData.push({ room_id: newRoomId, user_id: id, joined_at: new Date().toISOString() });
        });

        await api("/dm_room_members", {
          method: "POST",
          body: JSON.stringify(membersData)
        });

        closeModals();
        await loadRooms();
        openRoom(newRoomId, name);

      } catch (e) {
        alert("방 생성 실패: " + e.message);
      } finally {
        btn.disabled = false;
        NProgress.done();
      }
    }

    async function inviteUsers() {
      if (!activeRoomId) return;
      const checkboxes = document.querySelectorAll('#inviteUserList input:checked');
      const selectedIds = Array.from(checkboxes).map(cb => cb.value);
      if (selectedIds.length === 0) return;

      const btn = document.getElementById('inviteBtn');
      btn.disabled = true;
      NProgress.start();

      try {
        const membersData = selectedIds.map(id => ({
          room_id: activeRoomId,
          user_id: id,
          joined_at: new Date().toISOString()
        }));

        await api("/dm_room_members", {
          method: "POST",
          body: JSON.stringify(membersData)
        });

        alert("초대 완료되었습니다.");
        closeModals();
      } catch (e) {
        alert("초대 실패: " + e.message);
      } finally {
        btn.disabled = false;
        NProgress.done();
      }
    }

    function escapeHTML(str) {
      if (!str) return '';
      return str.replace(/[&<>'"]/g, 
        tag => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;'
        }[tag] || tag)
      );
    }

    // 실행
    initPage();
  </script>
</body>
</html>
