<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>다이렉트 : Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>
  <script>
    const savedTheme = localStorage.getItem('theme') || 'dark';
    if (savedTheme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --blue: #3b82f6;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    html[data-theme="light"] {
      --bg: #fafafa;
      --bg2: #ffffff;
      --bg3: #f0f0f0;
      --bg4: #e4e4e4;
      --border: #dbdbdb;
      --border2: #cccccc;
      --border3: #a3a3a3;
      --t1: #000000;
      --t2: #737373;
      --t3: #a8a8a8;
    }

    #nprogress .bar { background: var(--t1) !important; height: 2px !important; }
    #nprogress .peg { display: none !important; }
    #nprogress .spinner { display: none !important; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
      overflow: hidden;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* 스켈레톤 로딩 애니메이션 */
    .skeleton {
      background: linear-gradient(90deg, var(--bg2) 0%, var(--bg3) 50%, var(--bg2) 100%);
      background-size: 300% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
      border-radius: var(--r1);
    }
    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    /* SIDEBAR */
    .sidebar-container { width: 72px; min-width: 72px; height: 100vh; position: fixed; left: 0; top: 0; z-index: 100; }
    .sidebar-container iframe { width: 72px !important; height: 100%; border: none; }

    /* 검색 패널 슬라이드 */
    .search-panel {
      position: fixed;
      top: 0;
      left: 72px;
      width: 380px;
      max-width: calc(100vw - 72px);
      height: 100vh;
      background: var(--bg);
      border-right: 1px solid var(--border);
      z-index: 90;
      transform: translateX(-100%);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 24px rgba(0,0,0,0.3);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    html[data-theme="light"] .search-panel {
      box-shadow: 4px 0 24px rgba(0,0,0,0.1);
    }
    .search-panel.open {
      transform: translateX(0);
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
    .search-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }
    .search-panel-header h2 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
      color: var(--t1);
    }
    .search-close-btn {
      background: transparent;
      border: none;
      color: var(--t2);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, transform 0.2s;
    }
    .search-close-btn:hover {
      color: var(--t1);
      transform: scale(1.1);
    }
    .search-panel iframe {
      width: 100%;
      flex: 1;
      border: none;
    }

    /* 프로필 시트 모달 (홈 화면과 동일) */
    .sharer-profile-sheet-host[hidden] { display: none !important; }
    .sharer-profile-sheet-host {
      position: fixed;
      inset: 0;
      z-index: 960;
    }
    .sharer-profile-sheet-host .sps-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.34s ease;
    }
    .sharer-profile-sheet-host.sps-host-open .sps-backdrop {
      opacity: 1;
      pointer-events: auto;
    }
    .sharer-profile-sheet-host .sps-panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 20px 20px 0 0;
      padding: 4px 16px calc(20px + env(safe-area-inset-bottom, 0px));
      box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.45);
      max-height: 44vh;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      will-change: transform;
      transform: translateY(100%);
      transition: transform 0.44s cubic-bezier(0.22, 1, 0.36, 1), max-height 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .sharer-profile-sheet-host.sps-host-open .sps-panel { transform: translateY(0); }
    .sharer-profile-sheet-host .sps-panel.sps-panel-expanded { max-height: 88vh; }
    .sharer-profile-sheet-host .sps-panel.sps-panel-dragging { transition: none; }
    .sharer-profile-sheet-host .sps-drag-area {
      touch-action: none; display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 52px; padding: 6px 16px 14px; margin: -2px -16px 0 -16px; cursor: grab; user-select: none;
    }
    .sharer-profile-sheet-host .sps-drag-area:active { cursor: grabbing; }
    .sharer-profile-sheet-host .sps-grab { width: 40px; height: 5px; border-radius: 5px; background: var(--border3); flex-shrink: 0; }
    .sharer-profile-sheet-host .sps-profile {
      display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 14px;
      background: var(--bg2); cursor: pointer; margin-bottom: 12px;
    }
    .sharer-profile-sheet-host .sps-av {
      width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #3478f6, #53b6f9);
      display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; overflow: hidden; flex-shrink: 0;
    }
    .sharer-profile-sheet-host .sps-av img { width: 100%; height: 100%; object-fit: cover; }
    .sharer-profile-sheet-host .sps-name { font-size: 16px; font-weight: 600; color: var(--t1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sharer-profile-sheet-host .sps-logout {
      width: 100%; padding: 14px 16px; border: none; border-radius: 14px; background: rgba(255, 80, 80, 0.15);
      color: #ff8a8a; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
    }

    /* MAIN WRAPPER */
    .main-wrapper { 
      margin-left: 72px; 
      width: calc(100% - 72px); 
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
    }

    /* HEADER */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      z-index: 50;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .back-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: none;
      background: none;
      color: var(--t2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .back-btn:hover { color: var(--t1); background: var(--bg3); }
    .back-btn:active { transform: scale(0.82); }
    .header-title { font-size: 16px; font-weight: 600; }

    .header-right .action-btn {
      background: var(--t1);
      color: var(--bg);
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .header-right .action-btn:active { transform: scale(0.95); }

    /* DM LAYOUT */
    .dm-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      background: var(--bg);
    }

    /* 왼쪽 패널 (목록) */
    .room-list-pane {
      width: 320px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      background: var(--bg);
    }
    .rooms-scroll-area { flex: 1; overflow-y: auto; }
    .rooms-scroll-area::-webkit-scrollbar { width: 6px; }
    .rooms-scroll-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .room-item {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      gap: 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }
    .room-item:hover { background: var(--bg2); }
    .room-item.active { background: var(--bg3); }

    /* 카카오톡 스타일 멀티 프로필 아바타 */
    .room-avatar {
      width: 48px; height: 48px;
      border-radius: 18px;
      background: var(--bg4);
      position: relative;
      overflow: hidden;
      display: grid;
      gap: 1px;
      flex-shrink: 0;
    }
    .room-avatar.grid-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    .room-avatar.grid-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
    .room-avatar.grid-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .room-avatar.grid-3 img:first-child, .room-avatar.grid-3 .avatar-text:first-child { grid-column: 1 / span 2; }
    .room-avatar.grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

    .room-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .room-avatar .avatar-text {
      width: 100%; height: 100%; display: flex; align-items: center; 
      justify-content: center; font-size: 14px; font-weight: 600; color: var(--t1); background: var(--bg4);
    }

    .room-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .room-name { font-size: 15px; font-weight: 600; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .room-last-msg { font-size: 13px; color: var(--t2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* 오른쪽 패널 (채팅창) */
    .chat-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg2);
      position: relative;
    }
    .chat-empty-state {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: var(--bg); color: var(--t3); z-index: 10;
    }
    .chat-empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5; }
    .chat-empty-state p { font-size: 15px; font-weight: 500; }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-header-info { display: flex; align-items: center; gap: 12px; }
    .mobile-back-to-list { display: none; }
    .chat-title { font-size: 16px; font-weight: 700; color: var(--t1); }
    
    .chat-header-actions { display: flex; gap: 8px; align-items: center; }
    .chat-header-actions button {
      background: var(--bg3); border: 1px solid var(--border2); color: var(--t1);
      padding: 6px 12px; border-radius: var(--r1); font-size: 12px; cursor: pointer; transition: background 0.15s;
      display: flex; align-items: center; justify-content: center; height: 32px;
    }
    .chat-header-actions button:hover { background: var(--bg4); }

    .chat-messages {
      flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .message-wrapper { display: flex; flex-direction: column; max-width: 70%; }
    .message-wrapper.me { align-self: flex-end; align-items: flex-end; }
    .message-wrapper.other { align-self: flex-start; align-items: flex-start; }

    .message-sender { font-size: 11px; color: var(--t3); margin-bottom: 4px; margin-left: 4px; margin-right: 4px; }
    .message-bubble { padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.5; word-break: break-all; }
    
    .message-wrapper.me .message-bubble { background: var(--blue); color: #fff; border-bottom-right-radius: 4px; }
    .message-wrapper.other .message-bubble { background: var(--bg3); color: var(--t1); border: 1px solid var(--border2); border-bottom-left-radius: 4px; }
    
    .message-time { font-size: 10px; color: var(--t3); margin-top: 4px; margin-left: 4px; margin-right: 4px; display: flex; align-items: center; gap: 2px;}

    /* 시스템 메시지 UI */
    .system-message-container {
      display: flex; justify-content: center; width: 100%; max-width: 100% !important; margin: 4px 0; align-self: center; align-items: center;
    }
    .system-message-bubble {
      background: var(--bg3); color: var(--t2); font-size: 12px; font-weight: 500;
      padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border2);
      text-align: center;
    }

    .chat-input-area { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--bg); display: flex; gap: 12px; align-items: flex-end; }
    .chat-input {
      flex: 1; background: var(--bg2); border: 1px solid var(--border2); border-radius: 24px;
      padding: 12px 20px; color: var(--t1); font-size: 14px; font-family: inherit; resize: none;
      outline: none; min-height: 44px; max-height: 120px; transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: var(--border3); }

    .send-btn {
      width: 44px; height: 44px; border-radius: 50%; background: var(--blue); border: none; color: #fff;
      display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: transform 0.15s, opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.9; }
    .send-btn:active { transform: scale(0.9); }
    .send-btn:disabled { background: var(--bg3); color: var(--t3); cursor: not-allowed; }

    /* MODAL STYLE */
    .modal {
      display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0); backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
      justify-content: center; align-items: center; z-index: 200; pointer-events: none; visibility: hidden; transition: all 0.3s;
    }
    .modal.open { 
      pointer-events: auto; visibility: visible; background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .modal-content {
      background: var(--bg2); border: 1px solid var(--border2); width: 90%; max-width: 400px;
      border-radius: var(--r4); padding: 24px; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      opacity: 0; transform: scale(0.9) translateY(20px); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal.open .modal-content { opacity: 1; transform: scale(1) translateY(0); }
    
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--t2); cursor: pointer; padding: 4px; border-radius: 50%; }
    .modal-close:hover { background: var(--bg3); color: var(--t1); }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; color: var(--t2); margin-bottom: 8px; }
    .form-group input { width: 100%; padding: 12px 16px; border-radius: var(--r2); border: 1px solid var(--border2); background: var(--bg); color: var(--t1); font-size: 14px; outline: none; }
    .form-group input:focus { border-color: var(--blue); }
    .form-group input[readonly] { background: var(--bg3); cursor: default; }
    .form-group input[readonly]:focus { border-color: var(--border2); }

    .modal-search-box { display: flex; align-items: center; background: var(--bg); border: 1px solid var(--border2); border-radius: var(--r2); padding: 0 14px; height: 44px; margin-bottom: 12px; transition: border-color 0.2s; }
    .modal-search-box:focus-within { border-color: var(--blue); }
    .modal-search-box input { flex: 1; background: transparent; border: none; outline: none; color: var(--t1); font-size: 14px; padding-left: 8px; }
    .modal-search-box input::placeholder { color: var(--t3); }
    .modal-search-box .search-icon { color: var(--t2); display: flex; align-items: center; }
    
    .user-select-list { max-height: 200px; overflow-y: auto; border: 1px solid var(--border2); border-radius: var(--r2); background: var(--bg); }
    .user-select-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.2s; }
    .user-select-item:last-child { border-bottom: none; }
    .user-select-item:hover { background: var(--bg3); }
    .user-select-item .user-meta { display: flex; align-items: center; gap: 10px; }
    .user-select-item .user-meta span { font-size: 14px; font-weight: 500; }
    
    .select-chk-btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--t2); padding: 6px 14px; border-radius: 14px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .select-chk-btn.checked { background: var(--blue); border-color: var(--blue); color: #fff; }
    
    .modal-btn { width: 100%; padding: 14px; border-radius: var(--r2); background: var(--t1); color: var(--bg); border: none; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    .modal-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .modal-btn.danger { background: rgba(255,107,107,0.15); color: var(--pink); border: 1px solid rgba(255,107,107,0.3); transition: background 0.2s; }
    .modal-btn.danger:hover { background: rgba(255,107,107,0.25); }

    /* 아이콘 없는 커스텀 알림 */
    .custom-alert {
      position: fixed; top: -70px; left: 50%; transform: translateX(-50%); background: var(--bg3); color: var(--t1);
      border: 1px solid var(--border2); padding: 14px 24px; border-radius: var(--r3); font-size: 14px; font-weight: 600;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 9999; display: flex; align-items: center; justify-content: center;
      transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .custom-alert.show { top: 24px; }

    @media (max-width: 768px) {
      .sidebar-container { left: 0; right: 0; top: auto; bottom: 0; width: 100%; min-width: 0; height: calc(64px + env(safe-area-inset-bottom, 0px)); }
      .sidebar-container iframe { width: 100% !important; height: 100% !important; }
      .main-wrapper { margin-left: 0; width: 100%; height: calc(100vh - 64px - env(safe-area-inset-bottom, 0px)); }
      .dm-container { flex-direction: column; }
      .room-list-pane { width: 100%; flex: 1; border-right: none; }
      
      .chat-pane { 
        display: none; position: absolute; left: 0; top: 0; width: 100%; height: 100%; z-index: 10;
      }
      .chat-pane.active { display: flex; }
      .mobile-back-to-list { display: flex; }
      
      .search-panel {
        left: 0;
        width: 100%;
        max-width: 100%;
        height: calc(100vh - 64px - env(safe-area-inset-bottom, 0px));
        bottom: calc(64px + env(safe-area-inset-bottom, 0px));
        top: 0;
        z-index: 90;
      }
    }
  </style>
</head>
<body>

<!-- 사이드바 정보 및 사이드바 iframe 설정 -->
<div class="sidebar-container">
  <iframe src="sidebar.html" id="sidebarFrame" width="72" height="100%" frameborder="0"></iframe>
</div>

<!-- 검색 패널 추가 (홈 화면과 동일) -->
<div id="searchPanel" class="search-panel">
  <div class="search-panel-header">
    <h2>검색</h2>
    <button class="search-close-btn" onclick="toggleSearchPanel()">✕</button>
  </div>
  <iframe src="search.html" frameborder="0"></iframe>
</div>

<!-- 프로필 시트 호스트 추가 (홈 화면과 동일) -->
<div id="sharerProfileSheetHost" class="sharer-profile-sheet-host" hidden></div>

<div class="main-wrapper">
  <!-- 상단 헤더 -->
  <div class="header">
    <div class="header-left">
      <button class="back-btn" onclick="history.back()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="header-title">다이렉트 메시지</div>
    </div>
    <div class="header-right">
      <button class="action-btn" onclick="openNewChatModal()">새 메시지</button>
    </div>
  </div>

  <div class="dm-container">
    <!-- 왼쪽 룸 목록 -->
    <div class="room-list-pane">
      <div class="rooms-scroll-area" id="roomList">
        <!-- 초기 로딩 스켈레톤 -->
        <div class="room-item skeleton-room">
           <div class="skeleton room-avatar grid-1"></div>
           <div class="room-info">
             <div class="skeleton" style="width: 60%; height: 16px; margin-bottom: 4px;"></div>
             <div class="skeleton" style="width: 80%; height: 14px;"></div>
           </div>
        </div>
      </div>
    </div>

    <!-- 오른쪽 채팅 창 영역 -->
    <div class="chat-pane" id="chatPane">
      <div class="chat-empty-state" id="chatEmptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        <p>메시지를 선택하거나 새 대화를 시작하세요.</p>
      </div>

      <!-- 활성화 시 보이게 될 채팅 헤더 -->
      <div class="chat-header" id="chatHeader" style="display: none;">
        <div class="chat-header-info">
          <button class="back-btn mobile-back-to-list" onclick="closeChat()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 18l-6-6 6-6"/>
            </svg>
          </button>
          <div class="chat-title" id="chatTitle">알 수 없음</div>
        </div>
        <div class="chat-header-actions">
          <button onclick="leaveChat()">나가기</button>
        </div>
      </div>

      <!-- 메시지 영역 -->
      <div class="chat-messages" id="chatMessages" style="display: none;">
      </div>

      <!-- 입력 영역 -->
      <div class="chat-input-area" id="chatInputArea" style="display: none;">
        <textarea class="chat-input" id="chatInput" placeholder="메시지를 입력하세요..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 새 채팅 모달 -->
<div class="modal" id="newChatModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeNewChatModal()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <h3 class="modal-title">새 메시지</h3>
    <div class="modal-search-box">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="userSearchInput" placeholder="사용자 검색 (닉네임)">
    </div>
    <div class="user-select-list" id="userSelectList">
      <!-- 유저 목록 예시 (API 연결 후 렌더링 영역) -->
      <div class="user-select-item" onclick="toggleUserCheck(this)">
        <div class="user-meta"><span>테스트유저</span></div>
        <button class="select-chk-btn">선택</button>
      </div>
    </div>
    <button class="modal-btn" id="startChatBtn" disabled onclick="startNewChat()">대화 시작</button>
  </div>
</div>

<div id="customAlert" class="custom-alert"></div>

<script>
  // 로딩 상태 완료
  window.onload = () => {
    NProgress.done();
  }

  /* 사이드바 연동 관련 스크립트 추가 */
  let currentUser = null;

  function initCurrentUser() {
    const savedUser = localStorage.getItem('snsUser');
    if (savedUser) { 
      currentUser = JSON.parse(savedUser); 
      updateSidebar(); 
    }
  }

  function updateSidebar() {
    const iframe = document.getElementById('sidebarFrame');
    if (iframe?.contentWindow) iframe.contentWindow.postMessage({ type: 'updateUser', user: currentUser }, '*');
  }

  function updateSidebarMode() {
    const iframe = document.getElementById('sidebarFrame');
    const narrow = window.innerWidth <= 768;
    if (iframe?.contentWindow) iframe.contentWindow.postMessage({ type: 'setNarrowMode', narrow }, '*');
  }

  let searchPanelOpen = false;
  window.toggleSearchPanel = function() {
    const panel = document.getElementById('searchPanel');
    searchPanelOpen = !searchPanelOpen;
    if (searchPanelOpen) {
      panel.classList.add('open');
      document.getElementById('sidebarFrame').contentWindow.postMessage({ type: 'activateSearch', active: true }, '*');
    } else {
      panel.classList.remove('open');
      document.getElementById('sidebarFrame').contentWindow.postMessage({ type: 'activateSearch', active: false }, '*');
    }
  };

  // 사이드바 메시지 리스너
  window.addEventListener('message', (event) => {
    const { type, page } = event.data || {};
    if (type === 'toggleSearch') {
      window.toggleSearchPanel();
    }
    if (type === 'navigate') {
      if (page === 'home') location.href = 'index.html';
      if (page === 'explore') location.href = 'explore.html';
      if (page === 'set') location.href = 'set.html';
    }
    if (type === 'logout') { 
      localStorage.removeItem('snsUser'); 
      currentUser = null; 
      location.href = 'index.html';
    }
    if (type === 'requestUserInfo') updateSidebar();
  });

  window.onSharerProfileLogout = function () {
    localStorage.removeItem('snsUser');
    currentUser = null;
    location.href = 'index.html';
  };

  // 초기화 실행
  initCurrentUser();
  updateSidebarMode();
  window.addEventListener('resize', updateSidebarMode);

  /* DM UI 관련 임시 기능 작동 스크립트 */
  function openNewChatModal() { document.getElementById('newChatModal').classList.add('open'); }
  function closeNewChatModal() { document.getElementById('newChatModal').classList.remove('open'); }
  
  function closeChat() { 
    document.getElementById('chatPane').classList.remove('active'); 
  }
  
  function leaveChat() { 
    showCustomAlert('채팅방을 나갔습니다.');
    closeChat(); 
  }

  function toggleUserCheck(item) {
    const btn = item.querySelector('.select-chk-btn');
    btn.classList.toggle('checked');
    btn.textContent = btn.classList.contains('checked') ? '선택됨' : '선택';
    
    // 시작 버튼 활성화 여부
    const startBtn = document.getElementById('startChatBtn');
    startBtn.disabled = !document.querySelector('.select-chk-btn.checked');
  }

  function startNewChat() {
    closeNewChatModal();
    document.getElementById('chatEmptyState').style.display = 'none';
    document.getElementById('chatHeader').style.display = 'flex';
    document.getElementById('chatMessages').style.display = 'flex';
    document.getElementById('chatInputArea').style.display = 'flex';
    document.getElementById('chatPane').classList.add('active'); // 모바일 뷰 적용
    document.getElementById('chatTitle').textContent = '새 대화방';
    
    // 샘플 메시지
    const chatMsg = document.getElementById('chatMessages');
    chatMsg.innerHTML = `
      <div class="system-message-container">
        <div class="system-message-bubble">새로운 대화가 시작되었습니다.</div>
      </div>
    `;
  }

  function showCustomAlert(msg) {
    const alertBox = document.getElementById('customAlert');
    alertBox.textContent = msg;
    alertBox.classList.add('show');
    setTimeout(() => { alertBox.classList.remove('show'); }, 3000);
  }

  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  
  if(chatInput) {
    chatInput.addEventListener('input', function() {
      sendBtn.disabled = !this.value.trim();
    });
  }
</script>

<script src="sharer-profile-sheet-host.js"></script>
</body>
</html>
