<!DOCTYPE html>
<html lang="ko">
<head>

  <meta name="application-name" content="Sharer">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Sharer",
    "url": "https://sharer.r-e.kr",
    "logo": "https://sharer.r-e.kr/logo_google.png"
  }

  <script src="https://accounts.google.com/gsi/client" defer></script>
  <script src="https://developers.kakao.com/sdk/js/kakao.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* ─── HEADER ─── */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      transform: translateY(-10px);
      animation: slideDown 0.4s ease 0.1s forwards;
    }
    @keyframes slideDown { to { opacity: 1; transform: translateY(0); } }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .logo-container:hover { opacity: 0.8; }
    .logo-container:active { transform: scale(0.95); }

    .logo-svg { width: 32px; height: 32px; }

    .logo-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--t1);
      letter-spacing: -0.3px;
    }

    /* ─── MAIN ─── */
    .main-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      opacity: 0;
      transform: translateY(12px);
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
    }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

    /* ─── INSTAGRAM PC LAYOUT ─── */
    .instagram-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      max-width: 935px;
      width: 100%;
      margin: 0 auto;
    }

    .promo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 380px;
      flex-shrink: 0;
    }

    .promo-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--t1);
      text-align: center;
      margin-bottom: 20px;
      line-height: 1.4;
      word-break: keep-all;
      letter-spacing: -0.3px;
    }

    .promo-image-wrapper {
      width: 100%;
      height: 420px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border2);
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }

    .promo-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .auth-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 350px;
      gap: 12px;
    }

    /* ─── AUTH CONTAINER ─── */
    .auth-container {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 40px 30px 24px;
      width: 100%;
      text-align: center;
      opacity: 0;
      animation: fadeInBox 0.4s ease 0.3s forwards;
    }
    @keyframes fadeInBox { to { opacity: 1; } }

    .signup-link-container {
      padding: 20px;
    }

    .signup-prompt-text {
      margin: 0;
      font-size: 14px;
      color: var(--t2);
    }

    .signup-prompt-text button {
      background: none;
      border: none;
      color: #0095f6;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      font-size: 14px;
      font-family: inherit;
      transition: color 0.15s;
    }

    .signup-prompt-text button:hover {
      color: #1877f2;
      text-decoration: underline;
    }

    .auth-logo {
      display: block;
      margin: 0 auto 24px;
      width: 48px;
      height: 48px;
    }

    .auth-container h2 {
      text-align: center;
      margin-bottom: 24px;
      color: var(--t1);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .form-section { display: none; }
    .form-section.active { display: block; }

    /* ─── INPUTS ─── */
    .auth-container input[type="text"],
    .auth-container input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      font-size: 13px;
      margin-bottom: 8px;
      outline: none;
      background: var(--bg3);
      color: var(--t1);
      font-family: inherit;
      transition: border-color 0.2s, background 0.2s;
    }
    .auth-container input:focus { border-color: var(--border3); background: var(--bg4); }
    .auth-container input::placeholder { color: var(--t3); }

    /* ─── BUTTONS ─── */
    .auth-container button#loginBtn {
      width: 100%;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #0095f6;
      color: #fff;
      margin-bottom: 8px;
      margin-top: 6px;
      font-family: inherit;
      transition: background 0.15s;
    }
    .auth-container button#loginBtn:hover:not(:disabled) { background: #1877f2; }
    .auth-container button#loginBtn:disabled { cursor: not-allowed; background: rgba(0, 149, 246, 0.3); color: rgba(255,255,255,0.6); }

    /* ─── SOCIAL BTNS ─── */
    .social-btn {
      width: 100%;
      height: 38px;
      border-radius: 8px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 10px !important;
      font-size: 13px !important;
      font-weight: 600 !important;
      cursor: pointer !important;
      margin-bottom: 8px !important;
      transition: background 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1) !important;
    }
    .social-btn:active:not(:disabled) { transform: scale(0.97); }
    .social-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .social-btn svg, .social-btn img { width: 16px; height: 16px; }

    .google-btn {
      background: var(--bg3) !important;
      color: var(--t1) !important;
      border: 1px solid var(--border2) !important;
    }
    .google-btn:hover:not(:disabled) { background: var(--bg4) !important; border-color: var(--border3) !important; }

    .kakao-btn {
      background: #FEE500 !important;
      color: #3C1E1E !important;
      border: none !important;
    }
    .kakao-btn:hover:not(:disabled) { background: #e6cf00 !important; }
    .kakao-btn svg { fill: #3C1E1E; }

    /* ─── DIVIDER ─── */
    .or-divider {
      text-align: center;
      margin: 16px 0;
      color: var(--t3);
      font-size: 12px;
      position: relative;
    }
    .or-divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0; right: 0;
      height: 1px;
      background: var(--border);
    }
    .or-divider span { background: var(--bg2); padding: 0 16px; position: relative; }

    /* ─── MESSAGES ─── */
    .error-message { color: var(--pink); font-size: 12px; margin-top: -4px; margin-bottom: 8px; text-align: center; font-weight: 500; }
    .success-message { color: var(--green); font-size: 12px; margin-top: -4px; margin-bottom: 8px; text-align: center; font-weight: 500; }

    .forgot-password {
      color: #0095f6;
      font-size: 12px;
      text-decoration: none;
      margin-top: 16px;
      display: inline-block;
      transition: color 0.15s;
    }
    .forgot-password:hover {
      color: #1877f2;
      text-decoration: underline;
    }

    /* ─── TERMS BOX ─── */
    .terms-label {
      text-align: left;
      font-size: 12px;
      margin-bottom: 6px;
      color: var(--t3);
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ─── CUSTOM CHECKBOX ─── */
    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
      padding: 0 4px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      color: var(--t2);
      transition: color 0.2s;
      text-align: left;
    }
    .checkbox-item:hover { color: var(--t1); }

    .checkbox-input {
      display: none;
    }

    .checkbox-custom {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border2);
      border-radius: 6px;
      position: relative;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      flex-shrink: 0;
      background: var(--bg3);
    }

    .checkbox-input:checked + .checkbox-custom {
      background: var(--t1);
      border-color: var(--t1);
    }

    .checkbox-custom::after {
      content: '';
      position: absolute;
      left: 6px;
      top: 2px;
      width: 5px;
      height: 10px;
      border: solid #000;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg) scale(0);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .checkbox-input:checked + .checkbox-custom::after {
      transform: rotate(45deg) scale(1);
    }

    .checkbox-item span a {
      color: var(--t1);
      text-decoration: underline;
      text-underline-offset: 3px;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .checkbox-item span a:hover {
      opacity: 0.7;
    }

    /* ─── SPINNER ─── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.2);
      border-radius: 50%;
      border-top-color: #000;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── MODAL ─── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 999;
    }

    .google-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r4);
      padding: 32px 28px;
      z-index: 1000;
      width: 90%;
      max-width: 360px;
      text-align: center;
      transition: transform 0.28s cubic-bezier(0.34,1.4,0.64,1), opacity 0.22s ease;
      opacity: 0;
    }
    .google-modal.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    .google-modal h3 {
      color: var(--t1);
      margin-bottom: 20px;
      font-size: 16px;
      font-weight: 600;
    }

    .google-btn-container { width: 100%; min-height: 48px; display: flex; align-items: center; justify-content: center; }

    /* ─── AGREEMENT MODAL ─── */
    .agreement-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r3);
      padding: 28px;
      z-index: 1000;
      width: 90%;
      max-width: 400px;
      transition: transform 0.25s cubic-bezier(0.34,1.4,0.64,1), opacity 0.2s ease;
      opacity: 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }
    .agreement-modal.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }
    .agreement-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }
    .agreement-modal-header h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--t1);
    }
    .close-modal-btn {
      background: none;
      border: none;
      color: var(--t2);
      font-size: 24px;
      cursor: pointer;
      line-height: 1;
    }
    .close-modal-btn:hover {
      color: var(--t1);
    }
    .agreement-desc {
      font-size: 13px;
      color: var(--t2);
      margin-bottom: 20px;
      line-height: 1.5;
      text-align: left;
    }
    .agreement-modal-footer {
      margin-top: 24px;
    }
    .agreement-modal-footer button#nextBtn {
      width: 100%;
      background-color: #0095f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background-color 0.15s;
    }
    .agreement-modal-footer button#nextBtn:hover:not(:disabled) {
      background-color: #1877f2;
    }
    .agreement-modal-footer button#nextBtn:disabled {
      background-color: rgba(0, 149, 246, 0.3);
      color: rgba(255,255,255,0.6);
      cursor: not-allowed;
    }

    /* ─── FOOTER ─── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 20px;
      text-align: center;
      color: var(--t3);
      font-size: 11px;
    }

    @media (max-width: 768px) {
      .instagram-container {
        flex-direction: column;
        gap: 0;
      }
      .promo-area {
        display: none;
      }
      .auth-wrapper {
        max-width: 100%;
      }
      .auth-container {
        background: transparent;
        border: none;
        padding: 20px 10px;
      }
      .or-divider span {
        background: var(--bg);
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-container" onclick="goHome()">
      <img src="logo.svg" alt="Sharer 로고" class="logo-svg">
      <span class="logo-text">Sharer</span>
    </div>
  </div>

  <div class="main-content">
    <div class="instagram-container">
      
      <!-- 왼쪽 프로모션 배너 (PC 전용) -->
      <div class="promo-area">
        <div class="promo-text">친한친구의 일상속 순간들을 확인해보세요</div>
        <div class="promo-image-wrapper">
          <img src="background.png" alt="background" class="promo-image">
        </div>
      </div>

      <!-- 오른쪽 로그인 & 가입 영역 -->
      <div class="auth-wrapper">
        <div class="auth-container">
          <img src="logo.svg" alt="Sharer Logo" class="auth-logo">
          <h2>환영합니다!</h2>

          <div class="form-section active" id="loginForm">
            <input type="text" id="loginId" placeholder="아이디">
            <input type="password" id="loginPassword" placeholder="비밀번호">
            <div class="error-message" id="loginError"></div>
            <div class="success-message" id="loginSuccess"></div>
            <button id="loginBtn" onclick="handleLogin()">로그인</button>
            
            <div class="or-divider"><span>또는</span></div>
            <button class="social-btn google-btn" id="googleLoginBtn" onclick="showGoogleModal('login')">
              <img src="https://sharer.r-e.kr/google.svg" alt="Google">
              구글로 계속하기
            </button>
            <button class="social-btn kakao-btn" id="kakaoLoginBtn" onclick="handleKakaoLogin()">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 3c-5.523 0-10 3.504-10 7.828 0 2.766 1.82 5.176 4.625 6.575-.15.532-.478 1.748-.545 2.025-.085.318.113.318.25.213.11-.086 1.48-1.02 2.092-1.436 1.127.33 2.327.508 3.578.508 5.523 0 10-3.504 10-7.828C22 6.504 17.523 3 12 3z"/></svg>
              카카오로 계속하기
            </button>

            <a href="account.html" class="forgot-password">계정을 잊으셨나요?</a>
          </div>
        </div>

        <div class="auth-container signup-link-container">
          <p class="signup-prompt-text">
            계정이 없으신가요? <button id="signUpPromptBtn" onclick="openSignupModal()">새 계정 만들기</button>
          </p>
        </div>
      </div>

    </div>

    <!-- 약관 동의 팝업 모달 -->
    <div class="agreement-modal" id="agreementModal">
      <div class="agreement-modal-header">
        <h3>약관 동의</h3>
        <button class="close-modal-btn" onclick="closeSignupModal()">&times;</button>
      </div>
      <div class="agreement-modal-body">
        <p class="agreement-desc">Sharer의 서비스를 이용하시려면 아래 이용 약관 및 개인정보 처리방침에 동의해 주세요.</p>
        <div class="checkbox-group">
          <label class="checkbox-item">
            <input type="checkbox" class="checkbox-input" id="agreePrivacy" onchange="validateSignup()">
            <span class="checkbox-custom"></span>
            <span>Sharer의 <a href="privacy.html" target="_blank" onclick="event.stopPropagation()">개인정보 처리방침</a>에 동의합니다 (필수)</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" class="checkbox-input" id="agreeTerms" onchange="validateSignup()">
            <span class="checkbox-custom"></span>
            <span>Sharer의 <a href="policy.html" target="_blank" onclick="event.stopPropagation()">이용약관</a>에 동의합니다 (필수)</span>
          </label>
        </div>
      </div>
      <div class="agreement-modal-footer">
        <button id="nextBtn" onclick="handleNextStep()" disabled>다음</button>
      </div>
    </div>

    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="google-modal" id="googleModal">
      <h3 id="modalTitle">구글 인증</h3>
      <div class="google-btn-container" id="googleModalBtn"></div>
    </div>
  </div>

  <div class="footer">
    본 서비스는 대한민국의 중2 개발자 1인이 만든 프로젝트입니다 모든 소스 코드 및 파일의 출처는 전적으로 개발자에게 있음을 알립니다.
  </div>

<script>
  const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";

  // 카카오 SDK 초기화
  Kakao.init("bc817345a961eaced5fe86e5e1f2ca2e");

  async function api(endpoint, options = {}) {
    const url = API_BASE + endpoint;
    const res = await fetch(url, {
      ...options,
      headers: {
        "Content-Type": "application/json",
        ...(options.headers || {}),
      },
    });
    if (!res.ok) {
      let errorText;
      try { errorText = await res.text(); } catch { errorText = "Unknown error"; }
      throw new Error(`API 오류 (${res.status}): ${errorText}`);
    }
    if (res.status === 204) return null;
    return res.json();
  }

  let verificationCode = "";
  let isVerifying = false;

  function waitForGoogle(timeout = 8000) {
    return new Promise((resolve, reject) => {
      const start = Date.now();
      const timer = setInterval(() => {
        if (window.google && google.accounts && google.accounts.id) {
          clearInterval(timer);
          resolve();
        } else if (Date.now() - start > timeout) {
          clearInterval(timer);
          reject(new Error('Google GSI load timeout'));
        }
      }, 100);
    });
  }

  window.handleLogin = async function() {
    const id = document.getElementById('loginId').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const errorDiv = document.getElementById('loginError');
    const successDiv = document.getElementById('loginSuccess');
    errorDiv.textContent = '';
    successDiv.textContent = '';

    if (!id || !password) { errorDiv.textContent = '아이디와 비밀번호를 입력하세요.'; return; }

    const loginBtn = document.getElementById('loginBtn');
    loginBtn.disabled = true;
    loginBtn.innerHTML = `<span class="spinner"></span>로그인 중...`;

    try {
      if (id === "정빈777" && password === "정빈777") {
        if (!isVerifying) {
          isVerifying = true;
          verificationCode = Math.floor(100000 + Math.random() * 900000).toString();
          document.getElementById('loginId').placeholder = "인증 코드 6자리";
          document.getElementById('loginId').value = "";
          document.getElementById('loginPassword').style.display = "none";
          successDiv.textContent = "제작자 이메일로 인증번호를 보냈습니다.";
          await sendVerificationEmail(verificationCode);
          loginBtn.disabled = false;
          loginBtn.innerHTML = '로그인';
          return;
        } else {
          if (id === verificationCode) {
            localStorage.setItem('snsUser', JSON.stringify({id: "정빈777", nickname: "JB777", isVerified: true}));
            successDiv.textContent = '로그인 성공!';
            setTimeout(() => window.location.href = 'index.html', 1000);
          } else {
            errorDiv.textContent = "인증번호가 맞지 않습니다.";
          }
          loginBtn.disabled = false;
          loginBtn.innerHTML = '로그인';
          return;
        }
      }

      const users = await api(`/users?id=eq.${encodeURIComponent(id)}&select=*`);
      if (!users?.length || users[0].password !== password) {
        errorDiv.textContent = '아이디 또는 비밀번호가 일치하지 않습니다.';
        loginBtn.disabled = false;
        loginBtn.innerHTML = '로그인';
        return;
      }

      const user = users[0];
      localStorage.setItem('snsUser', JSON.stringify({ id, nickname: user.nickname, isVerified: false }));
      successDiv.textContent = '로그인 성공!';
      setTimeout(() => window.location.href = 'index.html', 1000);

    } catch (e) {
      console.error('로그인 오류:', e);
      errorDiv.textContent = '로그인 실패. 다시 시도해주세요.';
    } finally {
      loginBtn.disabled = false;
      loginBtn.innerHTML = '로그인';
    }
  }

  // 구글 로그인 & 자동 회원가입 로직
  window.handleCredentialResponse = async function(response) {
    const data = parseJwt(response.credential);
    const googleEmail = data.email;
    const googleName = data.name || googleEmail.split('@')[0];
    const profileImage = data.picture || null; // 구글 프로필 사진 추출

    const errorDiv = document.getElementById('loginError');
    const successDiv = document.getElementById('loginSuccess');
    errorDiv.textContent = '';
    successDiv.textContent = '';

    try {
      const users = await api(`/users?id=eq.${encodeURIComponent(googleEmail)}&select=*`);

      if (users?.length > 0) {
        // 이미 계정이 존재하는 경우 -> 바로 로그인
        localStorage.setItem('snsUser', JSON.stringify({ id: googleEmail, nickname: users[0].nickname, isVerified: false }));
        successDiv.textContent = '구글 로그인 성공!';

        await api("/users", {
          method: "POST",

        });

        successDiv.textContent = '구글로 회원가입 및 로그인 완료!';

      setTimeout(() => window.location.href = 'index.html', 1000);

      console.error(err);
      errorDiv.textContent = '구글 처리 중 오류가 발생했습니다.';
      hideGoogleModal();
    }
  }

  function parseJwt(token) {
    const base64Url = token.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
  }
