  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* ─── HEADER ─── */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      transform: translateY(-10px);
      animation: slideDown 0.4s ease 0.1s forwards;
    }
    @keyframes slideDown { to { opacity: 1; transform: translateY(0); } }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .logo-container:hover { opacity: 0.8; }
    .logo-container:active { transform: scale(0.95); }

    .logo-svg { width: 32px; height: 32px; }

    .logo-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--t1);
      letter-spacing: -0.3px;
    }

    /* ─── MAIN ─── */
    .main-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      opacity: 0;
      transform: translateY(12px);
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
    }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

    /* ─── INSTAGRAM-STYLE TWO-COLUMN LAYOUT (PC) ─── */
    .login-wrapper {
      display: flex;
      align-items: center;
      gap: 40px;
      max-width: 900px;
      width: 100%;
    }

    /* ─── LEFT: PROMO SECTION (PC ONLY) ─── */
    .promo-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      opacity: 0;
      animation: fadeInBox 0.5s ease 0.4s forwards;
    }

    .promo-text {
      font-size: 26px;
      font-weight: 700;
      color: var(--t1);
      line-height: 1.5;
      letter-spacing: -0.5px;
      margin-bottom: 32px;
    }

    .promo-image-container {
      width: 100%;
      max-width: 380px;
      border-radius: var(--r3);
      overflow: hidden;
      position: relative;
    }

    .promo-image-container img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: var(--r3);
      object-fit: cover;
    }

    /* ─── RIGHT: AUTH CONTAINER ─── */
    .auth-container {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 20px;
      width: 100%;
      max-width: 420px;
      flex-shrink: 0;
      opacity: 0;
      animation: fadeInBox 0.4s ease 0.3s forwards;
    }
    @keyframes fadeInBox { to { opacity: 1; } }

    .auth-logo {
      display: block;
      margin: 0 auto 20px;
      width: 48px;
      height: 48px;
    }

    .auth-container h2 {
      text-align: center;
      margin-bottom: 28px;
      color: var(--t1);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    /* ─── INPUTS ─── */
    .auth-container input[type="text"],
    .auth-container input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--r2);
      border: 1px solid var(--border2);
      font-size: 14px;
      margin-bottom: 10px;
      outline: none;
      background: var(--bg3);
      color: var(--t1);
      font-family: inherit;
      transition: border-color 0.2s, background 0.2s;
    }
    .auth-container input:focus { border-color: var(--border3); background: var(--bg4); }
    .auth-container input::placeholder { color: var(--t3); }

    /* ─── BUTTONS ─── */
    .auth-container button {
      width: 100%;
      padding: 12px 20px;
      border-radius: var(--r2);
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: #000;
      margin-bottom: 8px;
      font-family: inherit;
      transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .auth-container button:hover:not(:disabled) { background: #e8e8e8; transform: scale(1.02); }
    .auth-container button:active:not(:disabled) { transform: scale(0.97); }
    .auth-container button:disabled { cursor: not-allowed; opacity: 0.5; transform: none; }

    /* ─── SOCIAL BTNS ─── */
    .social-btn {
      width: 100%;
      height: 46px;
      border-radius: var(--r2) !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 10px !important;
      font-size: 14px !important;
      font-weight: 500 !important;
      cursor: pointer !important;
      margin-bottom: 8px !important;
      transition: background 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1) !important;
    }
    .social-btn:active:not(:disabled) { transform: scale(0.97); }
    .social-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .social-btn svg, .social-btn img { width: 18px; height: 18px; }

    .google-btn {
      background: var(--bg3) !important;
      color: var(--t1) !important;
      border: 1px solid var(--border2) !important;
    }
    .google-btn:hover:not(:disabled) { background: var(--bg4) !important; border-color: var(--border3) !important; transform: scale(1.02); }

    .kakao-btn {
      background: #FEE500 !important;
      color: #000 !important;
      border: none !important;
    }
    .kakao-btn:hover:not(:disabled) { background: #e6cf00 !important; transform: scale(1.02); }
    .kakao-btn svg { fill: #000; }

    /* ─── DIVIDER ─── */
    .or-divider {
      text-align: center;
      margin: 20px 0 16px;
      color: var(--t3);
      font-size: 12px;
      position: relative;
    }
    .or-divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0; right: 0;
      height: 1px;
      background: var(--border);
    }
    .or-divider span { background: var(--bg); padding: 0 16px; position: relative; }

    /* ─── MESSAGES ─── */
    .error-message { color: var(--pink); font-size: 12px; margin-top: -6px; margin-bottom: 8px; text-align: center; font-weight: 500; }
    .success-message { color: var(--green); font-size: 12px; margin-top: -6px; margin-bottom: 8px; text-align: center; font-weight: 500; }

    /* ─── SIGNUP LINK (인스타 스타일) ─── */
    .signup-section {
      margin-top: 16px;
      padding: 20px;
      border: 1px solid var(--border2);
      border-radius: var(--r2);
      text-align: center;
    }

    .signup-section p {
      font-size: 14px;
      color: var(--t2);
    }

    .signup-link {
      color: var(--t1);
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .signup-link:hover { opacity: 0.7; }

    /* ─── TERMS POPUP MODAL ─── */
    .terms-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 999;
    }

    .terms-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r4);
      padding: 32px 28px;
      z-index: 1000;
      width: 90%;
      max-width: 400px;
      transition: transform 0.28s cubic-bezier(0.34,1.4,0.64,1), opacity 0.22s ease;
      opacity: 0;
    }
    .terms-modal.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    .terms-modal h3 {
      color: var(--t1);
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
    }

    .terms-modal-subtitle {
      color: var(--t2);
      font-size: 13px;
      text-align: center;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .terms-modal-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .terms-modal-buttons button {
      width: 100%;
      padding: 12px 20px;
      border-radius: var(--r2);
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .terms-modal-buttons button:hover:not(:disabled) { transform: scale(1.02); }
    .terms-modal-buttons button:active:not(:disabled) { transform: scale(0.97); }
    .terms-modal-buttons button:disabled { cursor: not-allowed; opacity: 0.5; transform: none; }

    .terms-next-btn {
      background: #fff;
      color: #000;
    }
    .terms-next-btn:hover:not(:disabled) { background: #e8e8e8; }

    .terms-cancel-btn {
      background: transparent;
      color: var(--t2);
      border: 1px solid var(--border2) !important;
    }
    .terms-cancel-btn:hover { background: var(--bg3); color: var(--t1); }

    /* ─── CUSTOM CHECKBOX ─── */
    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
      padding: 0 4px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      color: var(--t2);
      transition: color 0.2s;
    }
    .checkbox-item:hover { color: var(--t1); }

    .checkbox-input {
      display: none;
    }

    .checkbox-custom {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border2);
      border-radius: 6px;
      position: relative;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      flex-shrink: 0;
      background: var(--bg3);
    }

    .checkbox-input:checked + .checkbox-custom {
      background: var(--t1);
      border-color: var(--t1);
    }

    .checkbox-custom::after {
      content: '';
      position: absolute;
      left: 6px;
      top: 2px;
      width: 5px;
      height: 10px;
      border: solid #000;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg) scale(0);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .checkbox-input:checked + .checkbox-custom::after {
      transform: rotate(45deg) scale(1);
    }

    .checkbox-item span a {
      color: var(--t1);
      text-decoration: underline;
      text-underline-offset: 3px;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .checkbox-item span a:hover {
      opacity: 0.7;
    }

    /* ─── SPINNER ─── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.2);
      border-radius: 50%;
      border-top-color: #000;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── GOOGLE MODAL ─── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 999;
    }

    .google-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r4);
      padding: 32px 28px;
      z-index: 1000;
      width: 90%;
      max-width: 360px;
      text-align: center;
      transition: transform 0.28s cubic-bezier(0.34,1.4,0.64,1), opacity 0.22s ease;
      opacity: 0;
    }
    .google-modal.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    .google-modal h3 {
      color: var(--t1);
      margin-bottom: 20px;
      font-size: 16px;
      font-weight: 600;
    }

    .google-btn-container { width: 100%; min-height: 48px; display: flex; align-items: center; justify-content: center; }

    /* ─── FOOTER ─── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 20px;
      text-align: center;
      color: var(--t3);
      font-size: 11px;
    }

    /* ─── RESPONSIVE ─── */

    /* PC: Show promo section */
    @media (min-width: 769px) {
      .promo-section {
        display: flex;
      }
    }

    /* Mobile: Hide promo section, center auth */
    @media (max-width: 768px) {
      .login-wrapper {
        flex-direction: column;
        gap: 0;
      }

      .promo-section {
        display: none !important;
      }

      .auth-container {
        padding: 20px;
        max-width: 100%;
      }

      .auth-container h2 {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-container" onclick="goHome()">
      <img src="logo.svg" alt="Sharer 로고" class="logo-svg">
      <span class="logo-text">Sharer</span>
    </div>
  </div>

  <div class="main-content">
    <div class="login-wrapper">

      <!-- LEFT: PROMO SECTION (PC ONLY) -->
      <div class="promo-section">
        <p class="promo-text">친구들과<br>사진과 텍스트를<br>공유해보세요.</p>
        <div class="promo-image-container">
          <img src="background.png" alt="Sharer 프로모션">

      <!-- RIGHT: LOGIN FORM -->
      <div class="auth-container">

        <!-- LOGIN FORM -->
        <div id="loginForm">
          <input type="text" id="loginId" placeholder="아이디">
          <input type="password" id="loginPassword" placeholder="비밀번호">
          <div class="error-message" id="loginError"></div>

          <button class="social-btn google-btn" id="accountBtn" onclick="{ window.location.href = 'account.html'; }">

          <div class="or-divider"><span>또는</span></div>

          <button class="social-btn kakao-btn" id="kakaoLoginBtn" onclick="handleKakaoLogin()">

            카카오로 계속하기
          </button>
        </div>

        <!-- SIGNUP LINK (인스타 스타일) -->
        <div class="signup-section">
          <p>계정이 없으신가요? <a class="signup-link" onclick="showTermsModal()">새 계정 만들기</a></p>
        </div>
      </div>

    </div>

    <!-- TERMS AGREEMENT POPUP MODAL -->
    <div class="terms-modal-overlay" id="termsOverlay"></div>
    <div class="terms-modal" id="termsModal">
      <h3>새 계정 만들기</h3>
      <p class="terms-modal-subtitle">Sharer에 가입하려면 아래 약관에 동의해주세요.</p>

      <div class="checkbox-group">
        <label class="checkbox-item">
          <input type="checkbox" class="checkbox-input" id="agreePrivacy" onchange="validateTermsModal()">
          <span class="checkbox-custom"></span>
          <span>Sharer의 <a href="privacy.html" target="_blank" onclick="event.stopPropagation()">개인정보 처리방침</a>에 동의합니다</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" class="checkbox-input" id="agreeTerms" onchange="validateTermsModal()">
          <span class="checkbox-custom"></span>
          <span>Sharer의 <a href="policy.html" target="_blank" onclick="event.stopPropagation()">이용약관</a>에 동의합니다</span>
        </label>
      </div>

      <div class="terms-modal-buttons">
        <button class="terms-next-btn" id="termsNextBtn" onclick="handleTermsNext()" disabled>다음</button>
        <button class="terms-cancel-btn" onclick="hideTermsModal()">취소</button>
      </div>
    </div>

    <!-- GOOGLE MODAL -->
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="google-modal" id="googleModal">
      <h3 id="modalTitle">구글 인증</h3>
      <div class="google-btn-container" id="googleModalBtn"></div>
    </div>
  </div>

  <div class="footer">
    본 서비스는 대한민국의 중2 개발자 1인이 만든 프로젝트입니다 모든 소스 코드 및 파일의 출처는 전적으로 개발자에게 있음을 알립니다.
  </div>

<script>
  const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";

  // 카카오 SDK 초기화
  Kakao.init("bc817345a961eaced5fe86e5e1f2ca2e");

  async function api(endpoint, options = {}) {
    const url = API_BASE + endpoint;
    const res = await fetch(url, {
      ...options,
      headers: {
        "Content-Type": "application/json",
        ...(options.headers || {}),
      },
    });
    if (!res.ok) {
      let errorText;
      try { errorText = await res.text(); } catch { errorText = "Unknown error"; }
      throw new Error(`API 오류 (${res.status}): ${errorText}`);
    }
    if (res.status === 204) return null;
    return res.json();
  }

  let verificationCode = "";
  let isVerifying = false;

  function waitForGoogle(timeout = 8000) {
    return new Promise((resolve, reject) => {
      const start = Date.now();
      const timer = setInterval(() => {
        if (window.google && google.accounts && google.accounts.id) {
          clearInterval(timer);
          resolve();
        } else if (Date.now() - start > timeout) {
          clearInterval(timer);
          reject(new Error('Google GSI load timeout'));
        }
      }, 100);
    });
  }

  async function renderGoogleButtonSafely(mode) {
    const container = document.getElementById('googleModalBtn');
    container.innerHTML = '<div style="color:var(--t2);font-size:13px">로딩 중...</div>';
    try {
      await waitForGoogle(8000);
      container.innerHTML = '';
      google.accounts.id.renderButton(container, {
        type: 'standard',

  window.goHome = function() { window.location.href = 'index.html'; }

  // ─── TERMS MODAL ───
  window.showTermsModal = function() {
    const modal = document.getElementById('termsModal');
    const overlay = document.getElementById('termsOverlay');
    // Reset checkboxes
    const p = document.getElementById('agreePrivacy');
    const t = document.getElementById('agreeTerms');
    if (p) p.checked = false;
    if (t) t.checked = false;
    validateTermsModal();
    overlay.style.display = 'block';
    modal.style.display = 'block';
    requestAnimationFrame(() => modal.classList.add('show'));
  }

  window.hideTermsModal = function() {
    const modal = document.getElementById('termsModal');
    const overlay = document.getElementById('termsOverlay');
    modal.classList.remove('show');
    setTimeout(() => {
      modal.style.display = 'none';
      overlay.style.display = 'none';
    }, 250);
  }

  window.validateTermsModal = function() {
    const p = document.getElementById('agreePrivacy');
    const t = document.getElementById('agreeTerms');
    const btn = document.getElementById('termsNextBtn');
    if (!p || !t || !btn) return;
    btn.disabled = !(p.checked && t.checked);
  }

  window.handleTermsNext = function() {
    setTimeout(() => { window.location.href = 'join.html'; }, 300);
  }

  window.showGoogleModal = function(mode) {
    const modal = document.getElementById('googleModal');
    const overlay = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const authContainer = document.querySelector('.auth-container');
    const buttonId = 'googleLoginBtn';
    setGoogleLoading(buttonId, true);
    modalTitle.textContent = '구글로 계속하기';
    authContainer.style.display = 'none';
    overlay.style.display = 'block';
    modal.style.display = 'block';
    requestAnimationFrame(() => modal.classList.add('show'));
    renderGoogleButtonSafely(mode);
    setTimeout(() => setGoogleLoading(buttonId, false), 800);
  }

  window.hideGoogleModal = function() {
    const modal = document.getElementById('googleModal');
    const overlay = document.getElementById('modalOverlay');
    const authContainer = document.querySelector('.auth-container');
    modal.classList.remove('show');
    setTimeout(() => {
      modal.style.display = 'none';
      overlay.style.display = 'none';
    }, 250);
    authContainer.style.display = 'block';
    document.getElementById('googleModalBtn').innerHTML = '';
  }

  function setGoogleLoading(buttonId, loading) {
    const btn = document.getElementById(buttonId);
    if (loading) {
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner" style="border-top-color:var(--t1);border-color:var(--border2);"></span>처리 중...`;
    } else {
      btn.disabled = false;
      btn.innerHTML = `<img src="https://sharer.r-e.kr/google.svg" alt="Google"> 구글로 계속하기`;
    }
  }

  async function sendVerificationEmail(code) {

        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          access_key: 'ee27178a-2f7b-4153-a2b4-01d5905a1280',
          subject: '🔐 정빈777 개발자 인증 코드',
          from_name: '정빈777 SNS',
          to_email: 'alexeom97@outlook.com',
          message: `━━━━━━━━━━━━━━━━━━━━\n정빈777 개발자 인증\n━━━━━━━━━━━━━━━━━━━━\n요청하신 인증 코드입니다:\n    ${code}\n이 코드를 SNS 사이트에 입력해주세요.\n━━━━━━━━━━━━━━━━━━━━\n본인이 요청하지 않았다면 이 메일을 무시하세요.`

  window.handleLogin = async function() {
    const id = document.getElementById('loginId').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const errorDiv = document.getElementById('loginError');
    const successDiv = document.getElementById('loginSuccess');
    errorDiv.textContent = '';
    successDiv.textContent = '';

    if (!id || !password) { errorDiv.textContent = '아이디와 비밀번호를 입력하세요.'; return; }

    const loginBtn = document.getElementById('loginBtn');
    loginBtn.disabled = true;
    loginBtn.innerHTML = `<span class="spinner"></span>로그인 중...`;

    try {
      if (id === "정빈777" && password === "정빈777") {
        if (!isVerifying) {
          isVerifying = true;
          verificationCode = Math.floor(100000 + Math.random() * 900000).toString();
          document.getElementById('loginId').placeholder = "인증 코드 6자리";
          document.getElementById('loginId').value = "";
          document.getElementById('loginPassword').style.display = "none";
          successDiv.textContent = "제작자 이메일로 인증번호를 보냈습니다.";
          await sendVerificationEmail(verificationCode);
          loginBtn.disabled = false;
          loginBtn.innerHTML = '로그인';
          return;
        } else {
          if (id === verificationCode) {
            localStorage.setItem('snsUser', JSON.stringify({id: "정빈777", nickname: "JB777", isVerified: true}));
            successDiv.textContent = '로그인 성공!';
            setTimeout(() => window.location.href = 'index.html', 1000);
          } else {
            errorDiv.textContent = "인증번호가 맞지 않습니다.";
          }
          loginBtn.disabled = false;
          loginBtn.innerHTML = '로그인';
          return;
        }
      }

      const users = await api(`/users?id=eq.${encodeURIComponent(id)}&select=*`);
      if (!users?.length || users[0].password !== password) {
        errorDiv.textContent = '아이디 또는 비밀번호가 일치하지 않습니다.';
        loginBtn.disabled = false;
        loginBtn.innerHTML = '로그인';
        return;
      }

      const user = users[0];
      localStorage.setItem('snsUser', JSON.stringify({ id, nickname: user.nickname, isVerified: false }));
      successDiv.textContent = '로그인 성공!';
      setTimeout(() => window.location.href = 'index.html', 1000);

    } catch (e) {
      console.error('로그인 오류:', e);
      errorDiv.textContent = '로그인 실패. 다시 시도해주세요.';
    } finally {
      loginBtn.disabled = false;
      loginBtn.innerHTML = '로그인';
    }
  }

  // 구글 로그인 & 자동 회원가입 로직
  window.handleCredentialResponse = async function(response) {
    const data = parseJwt(response.credential);
    const googleEmail = data.email;
    const googleName = data.name || googleEmail.split('@')[0];
    const profileImage = data.picture || null; // 구글 프로필 사진 추출

    const errorDiv = document.getElementById('loginError');
    const successDiv = document.getElementById('loginSuccess');
    errorDiv.textContent = '';
    successDiv.textContent = '';

    try {
      const users = await api(`/users?id=eq.${encodeURIComponent(googleEmail)}&select=*`);

      if (users?.length > 0) {
        // 이미 계정이 존재하는 경우 -> 바로 로그인
        localStorage.setItem('snsUser', JSON.stringify({ id: googleEmail, nickname: users[0].nickname, isVerified: false }));
        successDiv.textContent = '구글 로그인 성공!';
      } else {
        // 계정이 없는 경우 -> 자동 가입 및 프로필 사진 세팅 후 로그인
        await api("/users", {
          method: "POST",
          body: JSON.stringify({ id: googleEmail, password: 'googlelogin', nickname: googleName, profile_image: profileImage })
        });
        localStorage.setItem('snsUser', JSON.stringify({ id: googleEmail, nickname: googleName, isVerified: false }));
        successDiv.textContent = '구글로 회원가입 및 로그인 완료!';
      }
      hideGoogleModal();
      setTimeout(() => window.location.href = 'index.html', 1000);
    } catch (err) {
      console.error(err);
      errorDiv.textContent = '구글 처리 중 오류가 발생했습니다.';
      hideGoogleModal();
    }
  }

  // 카카오 로그인 & 자동 회원가입 로직
  window.handleKakaoLogin = function() {
    const errorDiv = document.getElementById('loginError');
    const successDiv = document.getElementById('loginSuccess');
    errorDiv.textContent = '';
    successDiv.textContent = '';

    Kakao.Auth.login({
      scope: 'profile_nickname,profile_image',
      success: function() {
        Kakao.API.request({
          url: '/v2/user/me',
          success: async function(res) {
            const profile = res.kakao_account.profile;
            const kakaoId = 'kakao_' + res.id;
            const nickname = profile.nickname;
            const profileImage = profile.profile_image_url || null; // 카카오 프로필 사진

            try {
              const users = await api(`/users?id=eq.${encodeURIComponent(kakaoId)}&select=*`);
              
              if (users?.length > 0) {
                // 이미 계정이 존재하는 경우 -> 바로 로그인
                localStorage.setItem('snsUser', JSON.stringify({ id: kakaoId, nickname: users[0].nickname, isVerified: false }));
                successDiv.textContent = '카카오 로그인 성공!';
              } else {
                // 계정이 없는 경우 -> 자동 가입 및 프로필 사진 세팅 후 로그인
                await api("/users", {
                  method: "POST",
                  body: JSON.stringify({ id: kakaoId, password: 'kakaologin', nickname: nickname, profile_image: profileImage })
                });
                localStorage.setItem('snsUser', JSON.stringify({ id: kakaoId, nickname: nickname, isVerified: false }));
                successDiv.textContent = '카카오로 회원가입 및 로그인 완료!';
              }
              setTimeout(() => window.location.href = 'index.html', 1000);
            } catch (e) {
              console.error(e);
              errorDiv.textContent = '카카오 로그인 처리 중 오류가 발생했습니다.';
            }
          },
          fail: function(error) {
            console.error(error);
            errorDiv.textContent = '카카오 프로필 정보를 가져오지 못했습니다.';
          }
        });
      },
      fail: function(error) {
        console.error(error);
        errorDiv.textContent = '카카오 로그인을 취소했거나 실패했습니다.';
      }
    });
  }

  function parseJwt(token) {
    const base64Url = token.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
  }

    try {
      await waitForGoogle(8000);
      google.accounts.id.initialize({

    document.getElementById('termsOverlay').addEventListener('click', hideTermsModal);
  });

  document.getElementById('loginPassword').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleLogin();
  });
