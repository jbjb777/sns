<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name=\"viewport\" content="width=device-width, initial-scale=1.0" />

  <title>프로필 : Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg" />
  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>
  <script>
    // 화면 깜빡임(FOUC) 방지를 위해 HTML 렌더링 전 테마를 즉시 적용합니다.
    const savedTheme = localStorage.getItem('theme') || 'dark';
    if (savedTheme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    /* 라이트 테마 변수 정의 */
    :root[data-theme='light'] {
      --bg: #fff;
      --bg2: #f5f5f5;
      --bg3: #e8e8e8;
      --bg4: #dfdfdf;
      --border: #e0e0e0;
      --border2: #d0d0d0;
      --border3: #c0c0c0;
      --t1: #000;
      --t2: #666;
      --t3: #999;
    }

    /* NProgress 커스텀 */
    #nprogress .bar { background: var(--t1) !important; }
    #nprogress .spinner-icon { border-top-color: var(--t1) !important; border-left-color: var(--t1) !important; }

    body {
      background-color: var(--bg);
      color: var(--t1);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* 전역 스크롤바 커스텀 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border3); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--t3); }

    /* 메인 레이아웃 구조 */
    .app-container {
      display: flex;
      max-width: 1200px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
    }

    /* 사이드바 */
    .sidebar {
      width: 240px;
      border-right: 1px solid var(--border);
      padding: 24px;
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      background: var(--bg);
      z-index: 100;
      transition: width 0.2s ease, padding 0.2s ease;
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      cursor: pointer;
    }
    .logo-img { width: 28px; height: 28px; }
    .logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }

    .nav-menu { display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 16px;
      border-radius: var(--r2);
      color: var(--t1);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.2s, transform 0.1s;
      cursor: pointer;
    }
    .nav-item:hover { background: var(--bg2); }
    .nav-item:active { transform: scale(0.98); }
    .nav-item svg { width: 22px; height: 22px; stroke: var(--t1); stroke-width: 2; fill: none; }
    .nav-item.active { font-weight: 700; }

    /* 메인 콘텐츠 영역 */
    .main-content {
      flex: 1;
      margin-left: 240px;
      padding: 40px 24px;
      max-width: 960px;
      width: calc(100% - 240px);
      transition: margin-left 0.2s ease, width 0.2s ease;
    }

    /* 프로필 상단 영역 */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 48px;
      margin-bottom: 44px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .profile-avatar-container {
      position: relative;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      padding: 3px;
      background: var(--border);
      flex-shrink: 0;
      cursor: pointer;
    }
    .profile-avatar-container.has-story {
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    }
    .profile-avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: var(--bg2);
      border: 3px solid var(--bg);
    }
    .profile-info { flex: 1; }
    .profile-meta-row { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
    .profile-nickname { font-size: 24px; font-weight: 600; letter-spacing: -0.3px; }
    .profile-badge {
      background: var(--bg2);
      border: 1px solid var(--border2);
      color: var(--t2);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      letter-spacing: 0.3px;
    }
    .profile-id { font-size: 14px; color: var(--t2); margin-bottom: 16px; font-family: monospace; }
    .profile-bio { font-size: 14px; color: var(--t1); line-height: 1.5; white-space: pre-wrap; word-break: break-all; }

    /* 탭 메뉴 */
    .profile-tabs {
      display: flex;
      justify-content: center;
      gap: 48px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .tab-button {
      background: none;
      border: none;
      color: var(--t2);
      font-size: 13px;
      font-weight: 600;
      padding: 14px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      position: relative;
      letter-spacing: 0.5px;
    }
    .tab-button svg { width: 16px; height: 16px; stroke: var(--t2); stroke-width: 2; fill: none; }
    .tab-button.active { color: var(--t1); }
    .tab-button.active svg { stroke: var(--t1); }
    .tab-button.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--t1);
    }

    /* 미디어 그리드 */
    .content-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }
    .grid-item {
      position: relative;
      aspect-ratio: 1 / 1;
      background: var(--bg2);
      cursor: pointer;
      overflow: hidden;
    }
    .grid-item img, .grid-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: filter 0.2s ease;
    }
    .grid-item:hover img, .grid-item:hover video { filter: brightness(0.85); }
    .grid-icon-indicator {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }
    .grid-icon-indicator svg { width: 14px; height: 14px; stroke: #fff; stroke-width: 2.5; fill: none; }
    
    /* 텍스트 전용 아이템 스타일 */
    .grid-text-only {
      width: 100%;
      height: 100%;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid var(--border);
      background: var(--bg2);
      box-sizing: border-box;
      transition: background 0.2s;
    }
    .grid-text-only:hover { background: var(--bg3); }
    .grid-text-body {
      font-size: 13px;
      line-height: 1.5;
      color: var(--t1);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      word-break: break-all;
    }
    .grid-text-date { font-size: 11px; color: var(--t3); font-family: monospace; }

    /* 빈 화면 상태 */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      color: var(--t2);
      text-align: center;
    }
    .empty-icon {
      width: 48px;
      height: 48px;
      stroke: var(--t3);
      stroke-width: 1.5;
      fill: none;
      margin-bottom: 16px;
    }
    .empty-title { font-size: 18px; font-weight: 600; color: var(--t1); margin-bottom: 6px; }
    .empty-desc { font-size: 13px; color: var(--t2); }

    /* 스켈레톤 UI */
    .skeleton-header { animation: pulse 1.5s infinite ease-in-out; }
    .skeleton-avatar { width: 104px; height: 104px; border-radius: 50%; background: var(--bg3); }
    .skeleton-line { height: 16px; background: var(--bg3); border-radius: 4px; margin-bottom: 10px; }
    @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

    /* 하단 모바일 바 */
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 52px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      z-index: 100;
      justify-content: space-around;
      align-items: center;
    }
    .mobile-nav-item {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      height: 100%;
      color: var(--t1);
      cursor: pointer;
    }
    .mobile-nav-item svg { width: 22px; height: 22px; stroke: var(--t1); stroke-width: 2; fill: none; }

    /* 스토리 모달 팝업 */
    .story-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #000;
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .story-wrapper {
      position: relative;
      width: 100%;
      max-width: 420px;
      height: 100%;
      max-height: 780px;
      background: #111;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .story-progress-container {
      position: absolute;
      top: 12px; left: 10px; right: 10px;
      display: flex; gap: 4px; z-index: 10;
    }
    .story-progress-bg { flex: 1; height: 2px; background: rgba(255,255,255,0.35); border-radius: 2px; overflow: hidden; }
    .story-progress-fill { width: 0%; height: 100%; background: #fff; transition: width 0.1s linear; }
    .story-header-area {
      position: absolute;
      top: 22px; left: 12px; right: 12px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 10; color: #fff;
    }
    .story-user-info { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .story-user-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,0.2); }
    .story-user-name { font-size: 14px; font-weight: 600; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
    .story-time-ago { font-size: 12px; color: #bbb; text-shadow: 0 1px 2px rgba(0,0,0,0.6); }
    .story-close-btn { background: none; border: none; color: #fff; cursor: pointer; padding: 4px; }
    .story-close-btn svg { width: 22px; height: 22px; stroke: #fff; stroke-width: 2.5; }
    .story-content-area {
      flex: 1; display: flex; align-items: center; justify-content: center;
      position: relative; background: #000;
    }
    .story-media-box { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
    .story-media-box img, .story-media-box video { width: 100%; height: 100%; object-fit: contain; }
    .short-caption {
      position: absolute; bottom: 32px; left: 16px; right: 16px;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
      padding: 14px 18px; border-radius: 12px; color: #fff;
      font-size: 13px; line-height: 1.5; border: 1px solid rgba(255,255,255,0.15);
      max-height: 160px; overflow-y: auto; text-align: center;
    }
    .short-text-only {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      padding: 32px; box-sizing: border-box; color: #fff; font-size: 18px; line-height: 1.6;
      text-align: center; font-weight: 500; white-space: pre-wrap; word-break: break-all;
      background: linear-gradient(135deg, #1e1e2f 0%, #111119 100%);
    }
    .story-nav-zone {
      position: absolute; top: 0; bottom: 0; width: 20%; z-index: 5; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .story-nav-left { left: 0; }
    .story-nav-right { right: 0; width: 80%; }

    /* 디테일 모달 팝업 추가 */
    .detail-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 1500;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .detail-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 540px;
      border-radius: var(--r3);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 85vh;
      animation: modalUp 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    @keyframes modalUp {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .detail-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .detail-user { display: flex; align-items: center; gap: 10px; }
    .detail-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: var(--bg3); }
    .detail-name-box { display: flex; flex-direction: column; }
    .detail-username { font-size: 14px; font-weight: 600; color: var(--t1); }
    .detail-date { font-size: 11px; color: var(--t3); margin-top: 1px; font-family: monospace; }
    .detail-close-btn {
      background: none; border: none; color: var(--t2); cursor: pointer; padding: 4px;
      display: flex; align-items: center; justify-content: center; transition: color 0.1s;
    }
    .detail-close-btn:hover { color: var(--t1); }
    .detail-close-btn svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2.5; }
    .detail-main { overflow-y: auto; flex: 1; }
    .detail-media { width: 100%; background: #000; display: block; max-height: 480px; object-fit: contain; }
    .detail-body { padding: 18px; font-size: 14px; line-height: 1.6; color: var(--t1); white-space: pre-wrap; word-break: break-all; }
    
    /* 피드 항목 스타일 마크다운 연동 */
    .detail-body p { margin-bottom: 8px; }
    .detail-body p:last-child { margin-bottom: 0; }
    .detail-body strong { font-weight: 600; }
    .detail-body em { font-style: italic; }
    .detail-body a { color: var(--pink); text-decoration: none; }
    .detail-body a:hover { text-decoration: underline; }

    /* 사이드바 미니 모드 (반응형 대비) */
    @media (max-width: 1024px) {
      .sidebar { width: 72px; padding: 24px 12px; align-items: center; }
      .logo-text, .nav-item span { display: none; }
      .logo-area { margin-bottom: 24px; justify-content: center; }
      .nav-item { padding: 12px; justify-content: center; border-radius: 50%; }
      .main-content { margin-left: 72px; width: calc(100% - 72px); }
    }

    /* 모바일 반응형 화면 조정 */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; width: 100%; padding: 16px 12px 64px 12px; }
      .profile-header { gap: 24px; margin-bottom: 24px; padding-bottom: 16px; }
      .profile-avatar-container { width: 84px; height: 84px; }
      .profile-nickname { font-size: 20px; }
      .profile-tabs { gap: 24px; }
      .mobile-nav { display: flex; }
      .story-wrapper { max-width: 100%; height: 100%; max-height: 100%; border-radius: 0; }
      .detail-card { max-height: 100vh; height: 100%; border-radius: 0; max-width: 100%; }
      .detail-modal { padding: 0; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <aside class="sidebar">
      <div class="logo-area" onclick="location.href='index.html'">
        <img src="./logo.png" alt="Sharer" class="logo-img" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23fff\'><path d=\'M12 2L2 22h20L12 2z\'/></svg>'">
        <span class="logo-text">Sharer</span>
      </div>
      <nav class="nav-menu">
        <a class="nav-item" href="index.html">
          <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          <span>홈</span>
        </a>
        <a class="nav-item" href="set.html">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.54 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          <span>설정</span>
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <section class="profile-header" id="profileHeader">
        <div class="skeleton-header" style="display:flex; gap:32px; width:100%; items:center;">
          <div class="skeleton-avatar"></div>
          <div style="flex:1; margin-top:12px;">
            <div class="skeleton-line" style="width:35%; height:20px;"></div>
            <div class="skeleton-line" style="width:20%;"></div>
            <div class="skeleton-line" style="width:70%; margin-top:16px;"></div>
          </div>
        </div>
      </section>

      <div class="profile-tabs">
        <button class="tab-button active" id="tabPostsBtn" onclick="switchTab('posts')">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          게시물
        </button>
        <button class="tab-button" id="tabStoriesBtn" onclick="switchTab('stories')">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          스토리
        </button>
      </div>

      <div class="content-grid" id="contentGrid"></div>
    </main>
  </div>

  <nav class="mobile-nav">
    <div class="mobile-nav-item" onclick="location.href='index.html'">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
    </div>
    <div class="mobile-nav-item" onclick="location.href='set.html'">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.54 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </div>
  </nav>

  <div class="story-modal" id="storyModal">
    <div class="story-wrapper">
      <div class="story-progress-container" id="storyProgressContainer"></div>
      <div class="story-header-area">
        <div class="story-user-info">
          <img src="" alt="" class="story-user-avatar" id="storyUserAvatar">
          <span class="story-user-name" id="storyUserName">User</span>
          <span class="story-time-ago" id="storyTimeAgo">방금 전</span>
        </div>
        <button class="story-close-btn" onclick="closeStory()">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      
      <div class="story-nav-zone story-nav-left" onclick="prevStory()"></div>
      <div class="story-nav-zone story-nav-right" onclick="nextStory()"></div>

      <div class="story-content-area" id="storyContentArea"></div>
    </div>
  </div>

  <div class="detail-modal" id="detailModal" onclick="if(event.target===this) closeDetailModal()">
    <div class="detail-card">
      <div class="detail-header">
        <div class="detail-user">
          <img src="" alt="" class="detail-avatar" id="detailAvatar">
          <div class="detail-name-box">
            <span class="detail-username" id="detailUsername">-</span>
            <span class="detail-date" id="detailDate">-</span>
          </div>
        </div>
        <button class="detail-close-btn" onclick="closeDetailModal()">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="detail-main" id="detailMain"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    // URL 쿼리 파라미터 파싱
    const params = new URLSearchParams(window.location.search);
    const targetUserId = params.get('id');
    const targetNickname = params.get('nickname') || '프로필';

    if(targetNickname) {
      document.title = `${targetNickname} : Sharer`;
    }

    let currentTab = 'posts';
    let postItems = [];
    let storyItems = [];
    let userData = null;

    // 스토리 재생 생명주기 관리 변수
    let currentStoryIndex = 0;
    let storyStartTime = 0;
    let storyAnimationFrame = null;
    const STORY_DURATION = 4000; // 4초

    // 마크다운 파서 커스텀 함수
    function parseMarkdown(text) {
      if (!text) return '';
      let html = text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
      
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      html = html.replace(/`([^`]+)`/g, '<code style="background:var(--bg3); padding:2px 4px; border-radius:4px; font-family:monospace; font-size:90%;">$1</code>');
      html = html.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
      
      return html.split('\n').map(line => `<p>${line}</p>`).join('');
    }

    // 시간 포맷 변환
    function formatTime(isoString) {
      if(!isoString) return '';
      const date = new Date(isoString);
      const now = new Date();
      const diffMs = now - date;
      const diffMin = Math.floor(diffMs / 60000);
      const diffHr = Math.floor(diffMin / 600);
      
      if(diffMin < 1) return '방금 전';
      if(diffMin < 60) return `${diffMin}분 전`;
      if(diffHr < 24) return `${diffHr}시간 전`;
      
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}.${m}.${d}`;
    }

    // 데이터 초기화 및 fetch 바인딩
    async function initProfilePage() {
      NProgress.start();
      if(!targetUserId) {
        document.getElementById('profileHeader').innerHTML = `<div style="text-align:center; padding:40px; color:var(--pink);">잘못된 접근입니다. 사용자 ID가 명시되지 않았습니다.</div>`;
        NProgress.done();
        return;
      }

      try {
        // 프로필 정보 로드
        const userRes = await fetch(`${API_BASE_URL}/users?id=eq.${targetUserId}`, {
          headers: { "apikey": API_KEY, "Authorization": `Bearer ${API_KEY}` }
        });
        const users = await userRes.json();
        if(users && users.length > 0) {
          userData = users[0];
        }

        // 포스트 데이터 로드 (정렬조건 생성일 내림차순)
        const postsRes = await fetch(`${API_BASE_URL}/posts?user_id=eq.${targetUserId}&order=created_at.desc`, {
          headers: { "apikey": API_KEY, "Authorization": `Bearer ${API_KEY}` }
        });
        postItems = await postsRes.json();

        // 스토리 데이터 로드
        const storiesRes = await fetch(`${API_BASE_URL}/stories?user_id=eq.${targetUserId}&order=created_at.desc`, {
          headers: { "apikey": API_KEY, "Authorization": `Bearer ${API_KEY}` }
        });
        storyItems = await storiesRes.json();

        renderHeader();
        renderGrid();

      } catch (err) {
        console.error("데이터 로드 중 심각한 에러가 발생했습니다:", err);
        document.getElementById('profileHeader').innerHTML = `<div style="text-align:center; padding:40px; color:var(--pink);">프로필 정보를 불러오는 도중 오류가 발생했습니다.</div>`;
      } finally {
        NProgress.done();
      }
    }

    // 헤더 영역 동적 렌더러
    function renderHeader() {
      const headerArea = document.getElementById('profileHeader');
      if(!userData) {
        headerArea.innerHTML = `
          <div class="profile-avatar-container">
            <div class="profile-avatar" style="display:flex; align-items:center; justify-content:center; color:var(--t3);">?</div>
          </div>
          <div class="profile-info">
            <div class="profile-meta-row">
              <span class="profile-nickname">${targetNickname}</span>
            </div>
            <div class="profile-id">@${targetUserId.slice(0,8)}...</div>
            <div class="profile-bio">해당 서비스 가입 기록이 없거나 비활성화된 계정 정보입니다.</div>
          </div>
        `;
        return;
      }

      const defaultAvatar = `https://api.dicebear.com/7.x/identicon/svg?seed=${encodeURIComponent(userData.id)}`;
      const avatarSrc = userData.avatar_url || defaultAvatar;
      const hasActiveStory = storyItems.length > 0;
      
      let bioText = userData.bio || "등록된 소개글이 존재하지 않습니다.";
      let badgeHtml = '';
      if(userData.role === 'admin' || userData.is_admin) {
        badgeHtml = `<span class="profile-badge" style="color:var(--pink); border-color:var(--pink);">ADMIN</span>`;
      } else if(userData.is_verified) {
        badgeHtml = `<span class="profile-badge" style="color:var(--green); border-color:var(--green);">VERIFIED</span>`;
      }

      headerArea.innerHTML = `
        <div class="profile-avatar-container ${hasActiveStory ? 'has-story' : ''}" onclick="${hasActiveStory ? 'openStoryPlayer()' : ''}">
          <img src="${avatarSrc}" alt="${userData.nickname}" class="profile-avatar" onerror="this.src='${defaultAvatar}'">
        </div>
        <div class="profile-info">
          <div class="profile-meta-row">
            <span class="profile-nickname">${userData.nickname}</span>
            ${badgeHtml}
          </div>
          <div class="profile-id">@${userData.id}</div>
          <div class="profile-bio">${bioText}</div>
        </div>
      `;
    }

    // 피드 그리드 통합 렌더러
    function renderGrid() {
      const grid = document.getElementById('contentGrid');
      grid.innerHTML = '';

      if(currentTab === 'posts') {
        if(postItems.length === 0) {
          renderEmptyState("작성된 게시물이 없습니다.");
          return;
        }

        postItems.forEach((item, index) => {
          const div = document.createElement('div');
          div.className = 'grid-item';
          div.onclick = () => openDetailModal(index);

          if(item.image_url) {
            const isVideo = item.image_url.match(/\.(mp4|webm|ogg|mov)$/i) || item.image_url.includes("video-bucket");
            if(isVideo) {
              div.innerHTML = `
                <div class="grid-icon-indicator">
                  <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                </div>
                <video src="${item.image_url}" muted playsinline preload="metadata"></video>
              `;
            } else {
              div.innerHTML = `<img src="${item.image_url}" alt="" loading="lazy">`;
            }
          } else {
            // 텍스트 포스트 폴백 컴포넌트
            div.innerHTML = `
              <div class="grid-text-only">
                <div class="grid-text-body">${item.text || ''}</div>
                <div class="grid-text-date">${formatTime(item.created_at)}</div>
              </div>
            `;
          }
          grid.appendChild(div);
        });

      } else {
        // 스토리 그리드 인터페이스 구축
        if(storyItems.length === 0) {
          renderEmptyState("최근 24시간 내 업로드된 스토리가 없습니다.");
          return;
        }

        storyItems.forEach((item, index) => {
          const div = document.createElement('div');
          div.className = 'grid-item';
          div.onclick = () => openStoryPlayer(index);

          if(item.image_url) {
            const isVideo = item.image_url.match(/\.(mp4|webm|ogg|mov)$/i);
            if(isVideo) {
              div.innerHTML = `
                <div class="grid-icon-indicator">
                  <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg>
                </div>
                <video src="${item.image_url}" muted playsinline></video>
              `;
            } else {
              div.innerHTML = `<img src="${item.image_url}" alt="" loading="lazy">`;
            }
          } else {
            div.innerHTML = `
              <div class="grid-text-only" style="background: linear-gradient(135deg, #1f1f2e, #0a0a0f);">
                <div class="grid-text-body" style="color:#fff;-webkit-line-clamp:4;">${item.text || ''}</div>
                <div class="grid-text-date" style="color:rgba(255,255,255,0.4);">${formatTime(item.created_at)}</div>
              </div>
            `;
          }
          grid.appendChild(div);
        });
      }
    }

    // 공용 엠프티 인터페이스 처리기
    function renderEmptyState(message) {
      const grid = document.getElementById('contentGrid');
      grid.innerHTML = `
        <div class="empty-state" style="grid-column: 1 / -1;">
          <svg class="empty-icon" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <div class="empty-title">${message}</div>
        </div>
      `;
    }

    // 상단 탭 스위처 엔진
    function switchTab(tabName) {
      if(currentTab === tabName) return;
      currentTab = tabName;

      document.getElementById('tabPostsBtn').classList.toggle('active', tabName === 'posts');
      document.getElementById('tabStoriesBtn').classList.toggle('active', tabName === 'stories');

      renderGrid();
    }

    // ─── 스토리 동적 뷰어 컴포넌트 내부 로직 ───
    window.openStoryPlayer = function(startIndex = 0) {
      if(storyItems.length === 0) return;
      currentStoryIndex = startIndex;
      
      document.getElementById('storyModal').style.display = 'flex';
      document.body.style.overflow = 'hidden';

      // 상단 프로필 구조화 바인딩
      if(userData) {
        const defaultAvatar = `https://api.dicebear.com/7.x/identicon/svg?seed=${encodeURIComponent(userData.id)}`;
        document.getElementById('storyUserAvatar').src = userData.avatar_url || defaultAvatar;
        document.getElementById('storyUserName').textContent = userData.nickname;
      }

      // 프로그레스 바 영역 생성
      const progressContainer = document.getElementById('storyProgressContainer');
      progressContainer.innerHTML = '';
      storyItems.forEach((_, idx) => {
        const bg = document.createElement('div');
        bg.className = 'story-progress-bg';
        const fill = document.createElement('div');
        fill.className = 'story-progress-fill';
        fill.id = `story-fill-${idx}`;
        
        if (idx < currentStoryIndex) fill.style.width = '100%';
        bg.appendChild(fill);
        progressContainer.appendChild(bg);
      });

      showStory(currentStoryIndex);
    };

    function showStory(index) {
      currentStoryIndex = index;
      const item = storyItems[index];
      const contentArea = document.getElementById('storyContentArea');
      contentArea.innerHTML = '';

      document.getElementById('storyTimeAgo').textContent = formatTime(item.created_at);

      // 이전 인덱스 프로그레스 바 정형화 동기화
      storyItems.forEach((_, idx) => {
        const fill = document.getElementById(`story-fill-${idx}`);
        if(fill) {
          if (idx < index) fill.style.width = '100%';
          else if (idx > index) fill.style.width = '0%';
        }
      });

      const dynamicDiv = document.createElement('div');
      dynamicDiv.style.width = '100%';
      dynamicDiv.style.height = '100%';

      if(item.image_url) {
        let contentHtml = `<div class="story-media-box">`;
        const isVideo = item.image_url.match(/\.(mp4|webm|ogg|mov)$/i);
        if(isVideo) {
          contentHtml += `<video id="storyVideoTarget" src="${item.image_url}" autoplay playsinline></video>`;
        } else {
          contentHtml += `<img src="${item.image_url}" alt="">`;
        }
        
        if(item.text) {
          contentHtml += `<div class="short-caption">${parseMarkdown(item.text)}</div>`;
        }
        contentHtml += `</div>`;
        dynamicDiv.innerHTML = contentHtml;
        contentArea.appendChild(dynamicDiv);

        const vTarget = document.getElementById('storyVideoTarget');
        if(vTarget) {
          cancelAnimationFrame(storyAnimationFrame);
          vTarget.onloadedmetadata = () => {
            const duration = (vTarget.duration * 100) || STORY_DURATION;
            runStoryProgressTrack(duration);
          };
          vTarget.onerror = () => runStoryProgressTrack(STORY_DURATION);
          return;
        }
      } else {
        dynamicDiv.innerHTML = `<div class="short-text-only">${parseMarkdown(item.text)}</div>`;
        contentArea.appendChild(dynamicDiv);
      }

      cancelAnimationFrame(storyAnimationFrame);
      storyStartTime = performance.now();
      animateStoryProgress();
    }

    function animateStoryProgress() {
      const now = performance.now();
      const elapsed = now - storyStartTime;
      const fill = document.getElementById(`story-fill-${currentStoryIndex}`);
      
      if (elapsed >= STORY_DURATION) {
        if(fill) fill.style.width = '100%';
        nextStory();
      } else {
        if(fill) {
          const percent = (elapsed / STORY_DURATION) * 100;
          fill.style.width = `${percent}%`;
        }
        storyAnimationFrame = requestAnimationFrame(animateStoryProgress);
      }
    }

    function runStoryProgressTrack(customDuration) {
      cancelAnimationFrame(storyAnimationFrame);
      const start = performance.now();
      function run() {
        const now = performance.now();
        const elapsed = now - start;
        const fill = document.getElementById(`story-fill-${currentStoryIndex}`);
        if(elapsed >= customDuration) {
          if(fill) fill.style.width = '100%';
          nextStory();
        } else {
          if(fill) fill.style.width = `${(elapsed / customDuration) * 100}%`;
          storyAnimationFrame = requestAnimationFrame(run);
        }
      }
      storyAnimationFrame = requestAnimationFrame(run);
    }

    window.nextStory = function() {
      if (currentStoryIndex < storyItems.length - 1) {
        showStory(currentStoryIndex + 1);
      } else {
        closeStory();
      }
    };

    window.prevStory = function() {
      if (currentStoryIndex > 0) {
        showStory(currentStoryIndex - 1);
      } else {
        showStory(0);
      }
    };

    window.closeStory = function() {
      cancelAnimationFrame(storyAnimationFrame);
      document.getElementById('storyModal').style.display = 'none';
      document.body.style.overflow = '';
    };

    // ─── 포스트 상세 보기 확장 모달 바인딩 제어 파트 ───
    window.openDetailModal = function(index) {
      const item = postItems[index];
      if(!item) return;

      document.getElementById('detailModal').style.display = 'flex';
      document.body.style.overflow = 'hidden';

      // 아바타 처리 적용
      const defaultAvatar = `https://api.dicebear.com/7.x/identicon/svg?seed=${encodeURIComponent(targetUserId)}`;
      document.getElementById('detailAvatar').src = (userData && userData.avatar_url) ? userData.avatar_url : defaultAvatar;
      document.getElementById('detailUsername').textContent = (userData && userData.nickname) ? userData.nickname : targetNickname;
      document.getElementById('detailDate').textContent = formatTime(item.created_at);

      const mainContainer = document.getElementById('detailMain');
      mainContainer.innerHTML = '';

      if(item.image_url) {
        const isVideo = item.image_url.match(/\.(mp4|webm|ogg|mov)$/i) || item.image_url.includes("video-bucket");
        if(isVideo) {
          mainContainer.innerHTML = `<video src="${item.image_url}" class="detail-media" controls autoplay muted></video>`;
        } else {
          mainContainer.innerHTML = `<img src="${item.image_url}" class="detail-media" alt="Post Image">`;
        }
      }

      if(item.text) {
        const textNode = document.createElement('div');
        textNode.className = 'detail-body';
        textNode.innerHTML = parseMarkdown(item.text);
        mainContainer.appendChild(textNode);
      }
    };

    window.closeDetailModal = function() {
      document.getElementById('detailModal').style.display = 'none';
      document.body.style.overflow = '';
      const mainContainer = document.getElementById('detailMain');
      mainContainer.innerHTML = ''; // 오디오/비디오 소스 즉시 스트리밍 해제 처리
    };

    // 초기 구동화 동작 라이프사이클 바인딩
    window.addEventListener('DOMContentLoaded', initProfilePage);
  </script>
</body>
</html>
