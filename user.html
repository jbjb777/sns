<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로필 : Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg" />
  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: bodyReveal 0.4s ease forwards;
    }
    @keyframes bodyReveal { to { opacity: 1; } }

    /* ─── SPLASH SCREEN ─── */
    #splash {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      transition: opacity 0.45s ease;
    }
    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .splash-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }
    .splash-logo {
      width: 72px;
      height: 72px;
      animation: splashLogoPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes splashLogoPop {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* NProgress */
    #nprogress .bar { background: #fff !important; height: 2px !important; }
    #nprogress .peg, #nprogress .spinner { display: none !important; }

    /* ─── SIDEBAR ─── */
    .sidebar-container {
      width: 72px;
      min-width: 72px;
      height: 100vh;
      position: fixed;
      left: 0; top: 0;
      z-index: 100;
    }
    .sidebar-container iframe { width: 72px !important; height: 100%; border: none; }

    /* ─── MAIN WRAPPER ─── */
    .main-wrapper {
      margin-left: 72px;
      width: calc(100% - 72px);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .back-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: none;
      background: none;
      color: var(--t2);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .back-btn:hover { color: var(--t1); background: var(--bg3); }
    .back-btn:active { transform: scale(0.82); }
    .header-title { font-size: 16px; font-weight: 600; }

    /* ─── CONTAINER ─── */
    .container {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px;
      flex: 1;
    }

    .profile-card { padding: 28px 0; margin-bottom: 28px; }
    .profile-header { display: flex; align-items: center; gap: 28px; margin-bottom: 24px; }
    .profile-avatar {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 700;
      flex-shrink: 0;
      color: #666;
      position: relative;
      overflow: hidden;
      transition: all 0.2s;
    }
    .profile-avatar.editable { cursor: pointer; }
    .profile-avatar.editable:hover { border-color: var(--border3); transform: scale(1.05); }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

    .avatar-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      border-radius: 50%;
      align-items: center;
      justify-content: center;
    }
    .profile-avatar.editable:hover .avatar-overlay { display: flex; }

    .profile-info { flex: 1; min-width: 0; }
    .profile-name {
      font-size: 24px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      letter-spacing: -0.3px;
    }
    .verification-badge {
      display: inline-block;
      width: 18px; height: 18px;
      vertical-align: middle;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:%23ff00ff;stop-opacity:1" /><stop offset="100%" style="stop-color:%23ff0066;stop-opacity:1" /></linearGradient></defs><path fill="url(%23grad)" d="M512 0 L1024 295 L1024 729 L512 1024 L0 729 L0 295 Z"/><path fill="white" d="M256 512 L384 640 L768 256 L832 320 L384 768 L192 576 Z"/></svg>');
      background-size: contain;
      background-repeat: no-repeat;
    }
    .profile-stats { display: flex; gap: 36px; align-items: center; }
    .stat-number { font-size: 22px; font-weight: 700; color: var(--t1); }
    .stat-label { font-size: 12px; color: var(--t3); font-weight: 500; }

    .share-btn {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--t2);
      width: 38px; height: 38px;
      border-radius: var(--r2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: auto;
      transition: all 0.15s;
    }
    .share-btn:hover { background: var(--bg4); color: var(--t1); border-color: var(--border3); }
    .share-btn.success { background: rgba(74,222,128,0.12); border-color: var(--green); color: var(--green); }

    .status-message-container {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .status-message-text { color: var(--t2); font-size: 14px; line-height: 1.65; flex: 1; }
    .status-message-empty { color: var(--t3); font-style: italic; }

    .edit-status-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .edit-status-btn:hover { background: var(--bg4); border-color: var(--border3); color: var(--t1); transform: scale(1.08); }

    .posts-section { padding: 20px 0; }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .post-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .post-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r3);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
    }
    .post-item:hover { border-color: var(--border3); transform: translateY(-4px); background: var(--bg3); }
    .post-item-image { width: 100%; height: 220px; object-fit: cover; }
    .post-item-content { padding: 14px 16px 6px; }
    .post-item-text {
      font-size: 14px;
      line-height: 1.65;
      color: var(--t2);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .post-item-footer {
      padding: 10px 16px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .post-item-date { font-size: 11px; color: var(--t3); }
    .post-item-likes { display: flex; align-items: center; gap: 5px; color: var(--pink); font-size: 12px; font-weight: 600; }

    .skeleton {
      background: linear-gradient(90deg, var(--bg2) 0%, var(--bg3) 50%, var(--bg2) 100%);
      background-size: 300% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
      border-radius: var(--r1);
    }
    @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

    .no-posts { text-align: center; padding: 64px 20px; color: var(--t3); font-size: 14px; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(16px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r4);
      padding: 32px;
      width: 90%;
      max-width: 440px;
    }
    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 18px; }
    .modal-input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--r2);
      color: var(--t1);
      font-size: 14px;
      margin-bottom: 18px;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }
    .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-btn {
      padding: 10px 22px;
      border-radius: var(--r2);
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .modal-btn-cancel { background: var(--bg3); color: var(--t2); border: 1px solid var(--border2); }
    .modal-btn-cancel:hover { background: var(--bg4); color: var(--t1); }
    .modal-btn-confirm { background: #fff; color: #000; }

    .upload-toast {
      position: fixed;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg2);
      border: 1px solid var(--border2);
      color: var(--t1);
      padding: 10px 22px;
      border-radius: 22px;
      font-size: 13px;
      font-weight: 500;
      z-index: 9999;
      transition: bottom 0.4s cubic-bezier(0.34,1.4,0.64,1);
    }
    .upload-toast.show { bottom: 28px; }

    .footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      font-size: 12px;
      margin-top: auto;
    }
    .footer-links a { color: var(--t2); text-decoration: none; margin: 0 12px; font-weight: 500; }
    .footer-links a:hover { color: var(--t1); }
    .footer-text { color: var(--t3); font-size: 11px; }

    @media (max-width: 768px) {
      .sidebar-container { width: 80px; min-width: 80px; }
      .sidebar-container iframe { width: 80px !important; }
      .main-wrapper { margin-left: 80px; width: calc(100% - 80px); }
      .container { padding: 20px 16px; }
      .post-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
      .post-item-image { height: 160px; }
      .profile-header { flex-direction: column; text-align: center; gap: 18px; }
    }
  </style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <div class="splash-inner">
    <img src="logo.svg" class="splash-logo" alt="Sharer">
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar-container">
  <iframe src="sidebar.html" id="sidebarFrame" width="72" height="100%" frameborder="0"></iframe>
</div>

<div class="main-wrapper">

  <!-- HEADER -->
  <div class="header">
    <button class="back-btn" onclick="goBack()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M19 12H5M5 12l7-7M5 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="header-title">프로필</div>
  </div>

  <div class="container">
    <div id="profileContent">
      <!-- Skeleton -->
      <div class="profile-card">
        <div class="profile-header">
          <div class="skeleton skeleton-avatar"></div>
          <div class="profile-info" style="flex:1;">
            <div class="skeleton skeleton-text" style="width:200px;"></div>
            <div class="profile-stats">
              <div class="skeleton skeleton-stat"></div>
              <div class="skeleton skeleton-stat"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="posts-section">
      <div class="section-title">게시물</div>
      <div id="userPosts">
        <div class="post-grid">
          <div class="post-item">
            <div class="skeleton skeleton-post-image"></div>
            <div class="post-item-content">
              <div class="skeleton skeleton-post-text"></div>
              <div class="skeleton skeleton-post-text" style="width:75%;"></div>
              <div class="skeleton skeleton-post-text" style="width:55%;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-links">
      <a href="#" onclick="showPrivacyPolicy(); return false;">개인정보처리방침</a>
      <a href="#" onclick="showTerms(); return false;">이용약관</a>
      <a href="mailto:alexeom97@outlook.com">문의하기</a>
    </div>
    <div class="footer-text">본 서비스는 대한민국의 중2 개발자 1인이 만든 프로젝트입니다 모든 소스 코드및 파일의 출처는 전적으로 개발자에게 있음을 알립니다.</div>
  </div>
</div>

<!-- 상태메시지 수정 모달 -->
<div class="modal-overlay" id="statusModal">
  <div class="modal-content">
    <div class="modal-title">상태메시지 수정</div>
    <textarea class="modal-input" id="statusInput" placeholder="상태메시지를 입력하세요..." maxlength="100"></textarea>
    <div class="modal-buttons">
      <button class="modal-btn modal-btn-cancel" onclick="closeStatusModal()">취소</button>
      <button class="modal-btn modal-btn-confirm" onclick="saveStatusMessage()">확인</button>
    </div>
  </div>
</div>

<input type="file" id="profileFileInput" accept="image/*" style="display:none;">

<!-- 업로드 토스트 -->
<div class="upload-toast" id="uploadToast">⏳ 업로드 중...</div>

<script>
// NProgress & Splash
NProgress.configure({ minimum: 0.08, trickleSpeed: 200, showSpinner: false });

(function () {
  const splash = document.getElementById('splash');
  if (sessionStorage.getItem('splashShown')) {
    splash.style.display = 'none';
  } else {
    sessionStorage.setItem('splashShown', 'true');
    function finishSplash() {
      splash.classList.add('fade-out');
      setTimeout(() => { splash.style.display = 'none'; }, 460);
    }
    const splashStart = Date.now();
    const MIN_SPLASH = 2000;
    window.addEventListener('load', () => {
      NProgress.done();
      const elapsed = Date.now() - splashStart;
      setTimeout(finishSplash, Math.max(0, MIN_SPLASH - elapsed));
    });
    setTimeout(finishSplash, 5000);
  }
})();

const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";
const CLOUDINARY_CLOUD = 'dretlhsrk';
const CLOUDINARY_PRESET = 'unsigned_preset';

async function api(endpoint, options = {}) {
  const url = API_BASE + endpoint;
  const res = await fetch(url, {
    ...options,
    headers: { "Content-Type": "application/json", ...(options.headers || {}) },
  });
  if (!res.ok) {
    let errorText = "";
    try { errorText = await res.text(); } catch {}
    throw new Error(`API 오류 (${res.status}): ${errorText}`);
  }
  if (res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function uploadImageToCloudinary(file) {
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', CLOUDINARY_PRESET);
  const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, { method: 'POST', body: formData });
  if (!response.ok) throw new Error('이미지 업로드 실패');
  const data = await response.json();
  return data.secure_url;
}

function showToast(msg) {
  const t = document.getElementById('uploadToast');
  t.textContent = msg;
  t.classList.add('show');
}
function hideToast() {
  document.getElementById('uploadToast').classList.remove('show');
}

const urlParams = new URLSearchParams(window.location.search);
const userNickname = urlParams.get('nickname');
let currentUser = null;
let viewingUser = null;

function initCurrentUser() {
  const savedUser = localStorage.getItem('snsUser');
  if (savedUser) currentUser = JSON.parse(savedUser);
}

function updateSidebar() {
  const iframe = document.getElementById('sidebarFrame');
  if (iframe?.contentWindow) iframe.contentWindow.postMessage({ type: 'updateUser', user: currentUser }, '*');
}

function updateSidebarMode() {
  const iframe = document.getElementById('sidebarFrame');
  const narrow = window.innerWidth <= 768;
  if (iframe?.contentWindow) iframe.contentWindow.postMessage({ type: 'setNarrowMode', narrow }, '*');
}

window.addEventListener('message', (event) => {
  const { type, page } = event.data || {};
  if (type === 'navigate') {
    if (page === 'home') location.href = 'index.html';
    if (page === 'explore') location.href = 'explore.html';
  }
  if (type === 'logout') {
    localStorage.removeItem('snsUser');
    currentUser = null;
    location.href = 'index.html';
  }
});

initCurrentUser();
updateSidebar();
updateSidebarMode();
window.addEventListener('resize', updateSidebarMode);

// 프로필 사진 변경
document.getElementById('profileFileInput').addEventListener('change', async (e) => {
  const file = e.target.files?.[0];
  if (!file || !currentUser?.id) return;
  showToast('⏳ 업로드 중...');
  try {
    const imageUrl = await uploadImageToCloudinary(file);
    await api(`/users?id=eq.${encodeURIComponent(currentUser.id)}`, {
      method: "PATCH",
      body: JSON.stringify({ profile_image: imageUrl }),
      headers: { "Prefer": "return=minimal" }
    });
    currentUser.profile_image = imageUrl;
    localStorage.setItem('snsUser', JSON.stringify(currentUser));
    if (viewingUser) viewingUser.profile_image = imageUrl;
    await displayProfile(viewingUser);
    hideToast();
    showToast('✅ 프로필 사진이 변경되었습니다!');
    setTimeout(hideToast, 2200);
  } catch (err) {
    console.error(err);
    hideToast();
    showToast('❌ 업로드 실패');
    setTimeout(hideToast, 3000);
  }
  e.target.value = '';
});

if (!userNickname) {
  showError('사용자 정보(nickname)가 없습니다.');
} else {
  loadUserProfile();
  loadUserPosts();
}

async function loadUserProfile() {
  try {
    let users = await api(`/users?nickname=eq.${encodeURIComponent(userNickname)}&select=*`);
    if (users?.length === 0) {
      if (userNickname === "JB777" || userNickname === "진정오") {
        users = [{ nickname: userNickname, isVerified: true, message: null, profile_image: null }];
      } else {
        showError('사용자를 찾을 수 없습니다.');
        return;
      }
    }
    viewingUser = users[0];
    await displayProfile(viewingUser);
  } catch (e) {
    console.error('프로필 로드 오류:', e);
    showError('프로필을 불러오는 중 오류가 발생했습니다.');
  }
}

async function displayProfile(user) {
  const contentDiv = document.getElementById('profileContent');
  const isVerified = user.isVerified || user.nickname === "JB777" || user.nickname === "진정오";
  const isOwnProfile = currentUser && currentUser.nickname === user.nickname;

  const userPostsData = await api(`/posts?author=eq.${encodeURIComponent(user.nickname)}&select=id`);
  const postCount = userPostsData?.length ?? 0;

  let totalLikes = 0;
  if (userPostsData?.length) {
    const postIds = userPostsData.map(p => p.id).join(',');
    try {
      const allLikes = await api(`/likes?post_id=in.(${postIds})&select=post_id`);
      totalLikes = allLikes?.length ?? 0;
    } catch (e) {}
  }

  const statusMessage = user.message || '';
  const statusDisplay = statusMessage
    ? `<div class="status-message-text">${escapeHtml(statusMessage)}</div>`
    : `<div class="status-message-text status-message-empty">상태메시지가 없습니다.</div>`;

  const editButton = isOwnProfile
    ? `<button class="edit-status-btn" onclick="openStatusModal()" title="상태메시지 수정">
         <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
           <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
           <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
         </svg>
       </button>`
    : '';

  const avatarOverlay = isOwnProfile
    ? `<div class="avatar-overlay">
         <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
           <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" stroke="#fff" stroke-width="1.8" fill="none"/>
           <circle cx="12" cy="13" r="4" stroke="#fff" stroke-width="1.8"/>
         </svg>
       </div>`
    : '';

  const avatarHtml = user.profile_image
    ? `<div class="profile-avatar${isOwnProfile ? ' editable' : ''}">
         <img src="${escapeHtml(user.profile_image)}" alt="프로필 사진">
         ${avatarOverlay}
       </div>`
    : `<div class="profile-avatar${isOwnProfile ? ' editable' : ''}">
         ${(user.nickname?.[0] || '?').toUpperCase()}
         ${avatarOverlay}
       </div>`;

  contentDiv.innerHTML = `
    <div class="profile-card">
      <div class="profile-header">
        ${avatarHtml}
        <div class="profile-info">
          <div class="profile-name">
            ${escapeHtml(user.nickname)}
            ${isVerified ? '<span class="verification-badge"></span>' : ''}
          </div>
          <div class="profile-stats">
            <div class="stat-item">
              <div class="stat-number">${postCount}</div>
              <div class="stat-label">게시물</div>
            </div>
            <div class="stat-item">
              <div class="stat-number">${totalLikes}</div>
              <div class="stat-label">좋아요</div>
            </div>
            <button class="share-btn" id="shareBtn" onclick="copyProfileLink()" title="프로필 링크 복사">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <div class="status-message-container">
        ${statusDisplay}
        ${editButton}
      </div>
    </div>
  `;

  if (isOwnProfile) {
    const avatarElement = contentDiv.querySelector('.profile-avatar.editable');
    if (avatarElement) avatarElement.onclick = () => document.getElementById('profileFileInput').click();
  }
}

async function loadUserPosts() {
  const postsDiv = document.getElementById('userPosts');
  try {
    const posts = await api(`/posts?author=eq.${encodeURIComponent(userNickname)}&select=*&order=created_at.desc`);
    if (!posts?.length) {
      postsDiv.innerHTML = '<div class="no-posts">아직 게시물이 없습니다.</div>';
      return;
    }

    const postIds = posts.map(p => p.id).join(',');
    let allLikes = [];
    try {
      allLikes = await api(`/likes?post_id=in.(${postIds})&select=post_id`) || [];
    } catch (e) {}

    const likeCountMap = {};
    allLikes.forEach(l => { likeCountMap[l.post_id] = (likeCountMap[l.post_id] || 0) + 1; });

    const postsWithLikes = posts.map(post => ({ ...post, likeCount: likeCountMap[post.id] || 0 }));
    displayPosts(postsWithLikes);
  } catch (e) {
    console.error('게시물 로드 오류:', e);
    postsDiv.innerHTML = '<div class="no-posts">게시물을 불러오는데 실패했습니다.</div>';
  }
}

function displayPosts(posts) {
  const postsDiv = document.getElementById('userPosts');
  const gridDiv = document.createElement('div');
  gridDiv.className = 'post-grid';
  posts.forEach((post, idx) => {
    const postItem = document.createElement('div');
    postItem.className = 'post-item';
    postItem.style.cssText = `opacity:0; transform:translateY(10px); transition: all 0.35s ease ${idx * 0.06}s;`;
    postItem.onclick = () => { window.location.href = `view.html?id=${post.id}`; };
    const timeStr = new Date(post.created_at).toLocaleDateString('ko-KR');
    postItem.innerHTML = `
      ${post.image_url ? `<img src="${escapeHtml(post.image_url)}" class="post-item-image" alt="게시글 이미지" loading="lazy">` : ''}
      ${post.content ? `<div class="post-item-content"><div class="post-item-text">${escapeHtml(post.content)}</div></div>` : ''}
      <div class="post-item-footer">
        <div class="post-item-date">${timeStr}</div>
        <div class="post-item-likes">
          <svg width="12" height="12" viewBox="0 0 2300 2300" fill="currentColor"><path d="M 2169.75708 1273.707397 C 2082.986328 1435.051758 1959.814697 1592.116455 1800.239746 1744.902832 C 1640.756348 1897.699951 1451.88208 2043.705688 1233.619141 2182.920898 C 1220.223145 2191.470215 1206.115234 2198.850586 1191.452637 2204.979248 C 1165.430908 2218.340332 1134.569092 2218.340332 1108.547363 2204.979248 C 1093.884766 2198.850586 1079.776855 2191.470215 1066.380859 2182.920898 C 848.148438 2043.693726 659.267578 1897.687988 499.74292 1744.902832 C 340.21582 1592.116455 217.04187 1435.051758 130.216797 1273.707397 C 43.415771 1112.370728 0 944.232666 0 779.5177 C 0 642.959229 28.581055 527.005981 85.715088 421.457642 C 139.349243 319.653564 219.24231 234.056396 317.106201 173.547607 C 414.637207 113.417725 527.301025 82.374756 641.860352 84.066162 C 755.30127 84.066162 858.310303 112.998535 943.981934 171.086914 C 1030.09082 228.040771 1100.847168 305.330322 1150 396.127686 C 1199.152832 305.330322 1269.90918 228.040771 1356.018066 171.086914 C 1441.689697 112.998535 1544.744385 84.066162 1658.139648 84.066162 C 1772.703369 82.367188 1885.371582 113.411133 1982.904785 173.547607 C 2080.76001 234.048828 2160.637695 319.64917 2214.239258 421.457642 C 2271.384033 527.005981 2300 642.959229 2300 779.5177 C 2300 944.232666 2256.584229 1112.370728 2169.75708 1273.707397 Z"/></svg>
          ${post.likeCount}
        </div>
      </div>
    `;
    gridDiv.appendChild(postItem);
    requestAnimationFrame(() => {
      postItem.style.opacity = '1';
      postItem.style.transform = 'translateY(0)';
    });
  });
  postsDiv.innerHTML = '';
  postsDiv.appendChild(gridDiv);
}

function escapeHtml(t) {
  if (!t) return '';
  return t.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'} [m]));
}

function showError(msg) {
  document.getElementById('profileContent').innerHTML = `
    <div class="profile-card">
      <div style="text-align:center; padding:48px 20px;">
        <div style="color:var(--pink); font-size:14px; margin-bottom:20px;">${msg}</div>
        <button onclick="window.history.back()" style="background:#fff; color:#000; border:none; padding:10px 24px; border-radius:var(--r2); font-size:13px; font-weight:600; cursor:pointer;">돌아가기</button>
      </div>
    </div>
  `;
  document.getElementById('userPosts').innerHTML = '';
}

window.openStatusModal = function() {
  const modal = document.getElementById('statusModal');
  const input = document.getElementById('statusInput');
  input.value = viewingUser?.message || '';
  modal.classList.add('active');
};

window.closeStatusModal = function() {
  document.getElementById('statusModal').classList.remove('active');
};

window.saveStatusMessage = async function() {
  const input = document.getElementById('statusInput');
  const newMessage = input.value.trim();
  if (!currentUser?.id) { alert('로그인이 필요합니다.'); return; }
  try {
    await api(`/users?id=eq.${encodeURIComponent(currentUser.id)}`, {
      method: "PATCH",
      body: JSON.stringify({ message: newMessage }),
      headers: { "Prefer": "return=minimal" }
    });
    viewingUser.message = newMessage;
    await displayProfile(viewingUser);
    closeStatusModal();
  } catch (e) {
    console.error(e);
    alert('상태메시지 저장에 실패했습니다.');
  }
};

document.getElementById('statusModal').addEventListener('click', function(e) {
  if (e.target === this) closeStatusModal();
});

window.goBack = () => window.history.back();
window.showPrivacyPolicy = () => window.location.href = "privacy.html";
window.showTerms = () => window.location.href = "policy.html";

window.copyProfileLink = function() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = document.getElementById('shareBtn');
    if (btn) {
      btn.classList.add('success');
      setTimeout(() => btn.classList.remove('success'), 1500);
    }
  });
};
</script>
