<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>프로필 : Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg" />
  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    /* NProgress 커스텀 */
    #nprogress .bar { background: #fff !important; height: 3px !important; }
    #nprogress .spinner { display: none !important; }

    body {
      background-color: var(--bg);
      color: var(--t1);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* 상단 바 */
    .top-nav {
      position: fixed; top: 0; left: 0; right: 0; height: 60px;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; border-bottom: 1px solid var(--border); z-index: 100;
    }
    .nav-btn {
      background: none; border: none; color: var(--t1); font-size: 20px; cursor: pointer;
      width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; transition: background 0.2s;
    }
    .nav-btn:active { background: var(--bg2); }
    .nav-title { font-size: 16px; font-weight: 700; letter-spacing: -0.5px; }

    /* 메인 컨테이너 */
    .container { max-width: 600px; margin: 0 auto; padding: 76px 16px 100px 16px; }

    /* 프로필 섹션 */
    .profile-header { display: flex; align-items: center; gap: 24px; margin-bottom: 28px; padding: 4px; }
    
    /* 인스타 스토리 스타일 프로필 테두리 애니메이션 효과 추가 */
    .avatar-wrapper { 
      position: relative; width: 86px; height: 86px; 
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
    }
    .avatar-wrapper.has-stories {
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      cursor: pointer;
    }
    .avatar-wrapper.has-stories:active {
      transform: scale(0.95);
      transition: transform 0.1s;
    }
    
    .avatar { 
      width: 80px; height: 80px; border-radius: 50%; object-fit: cover; 
      background: var(--bg3); border: 2px solid var(--bg);
    }
    
    .profile-info { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .name-row { display: flex; align-items: center; gap: 12px; }
    .nickname { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .badge {
      background: var(--bg2); border: 1px solid var(--border2); color: var(--t2);
      font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 20px;
    }
    .status-msg {
      font-size: 14px; color: var(--t2); line-height: 1.4; word-break: break-all;
      cursor: pointer; padding: 4px 0; transition: color 0.2s;
    }
    .status-msg:hover { color: var(--t1); }
    .status-msg.empty { color: var(--t3); font-style: italic; }

    /* 버튼 그룹 */
    .btn-group { display: flex; gap: 8px; margin-bottom: 32px; }
    .btn {
      flex: 1; height: 42px; background: var(--bg2); border: 1px solid var(--border);
      color: var(--t1); font-size: 14px; font-weight: 600; border-radius: var(--r2);
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all 0.2s;
    }
    .btn:active { background: var(--bg3); transform: scale(0.98); }
    .btn.primary { background: var(--t1); color: var(--bg); border: none; }
    .btn.primary:active { background: #e0e0e0; }
    
    #shareBtn.success { background: var(--green); color: var(--bg); border-color: var(--green); }
    #shareBtn.success::before { content: "✓ "; }

    /* 통계 */
    .stats-row {
      display: flex; background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r3); padding: 16px 0; margin-bottom: 32px;
    }
    .stat-item { flex: 1; text-align: center; display: flex; flex-direction: column; gap: 4px; }
    .stat-item:not(:last-child) { border-right: 1px solid var(--border); }
    .stat-val { font-size: 18px; font-weight: 700; }
    .stat-lbl { font-size: 12px; color: var(--t2); font-weight: 500; }

    /* 게시물 그리드 */
    .grid-title { font-size: 14px; font-weight: 700; color: var(--t2); margin-bottom: 16px; padding-left: 4px; }
    .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
    .grid-item {
      position: relative; width: 100%; aspect-ratio: 1; background: var(--bg2);
      border-radius: 4px; overflow: hidden; cursor: pointer;
    }
    .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
    .grid-item .multi-icon {
      position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px); padding: 4px; border-radius: 6px; font-size: 12px; z-index: 2;
    }
    .grid-item .video-icon {
      position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px); padding: 4px; border-radius: 6px; font-size: 12px; z-index: 2;
    }

    /* 모달 공통 스타일 */
    .modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s; padding: 16px;
    }
    .modal.active { opacity: 1; pointer-events: auto; }
    .modal-content {
      background: var(--bg2); border: 1px solid var(--border2); width: 100%; max-width: 400px;
      border-radius: var(--r4); padding: 24px; display: flex; flex-direction: column; gap: 20px;
      transform: scale(0.95); transition: transform 0.2s;
    }
    .modal.active .modal-content { transform: scale(1); }
    .modal-title { font-size: 16px; font-weight: 700; text-align: center; }
    
    .input-wrapper { position: relative; width: 100%; }
    .text-input {
      width: 100%; height: 50px; background: var(--bg3); border: 1px solid var(--border3);
      border-radius: var(--r2); padding: 0 16px; color: var(--t1); font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .text-input:focus { border-color: #444; }
    
    .modal-btns { display: flex; gap: 8px; }
    .modal-btn {
      flex: 1; height: 46px; border-radius: var(--r2); font-size: 14px; font-weight: 600;
      cursor: pointer; border: none; display: flex; align-items: center; justify-content: center;
    }
    .modal-btn.cancel { background: var(--bg4); color: var(--t1); }
    .modal-btn.confirm { background: var(--t1); color: var(--bg); }

    /* 하단 푸터 */
    .footer {
      margin-top: 60px; border-top: 1px solid var(--border); padding-top: 24px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .footer-links { display: flex; gap: 16px; }
    .footer-link { font-size: 12px; color: var(--t3); text-decoration: none; cursor: pointer; }
    .footer-link:hover { color: var(--t2); }
    .copyright { font-size: 11px; color: var(--t3); font-weight: 500; }

    /* 상태 표시 */
    .info-box {
      text-align: center; padding: 40px 20px; color: var(--t2); font-size: 14px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .info-icon { font-size: 28px; }

    /* ==========================================
       인스타 스토리 모달 스타일 추가
       ========================================== */
    .story-modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: #000; z-index: 2000; display: none; flex-direction: column;
      justify-content: center; align-items: center; user-select: none; -webkit-user-select: none;
    }
    .story-modal.active { display: flex; }
    
    .story-container {
      position: relative; width: 100%; max-width: 480px; height: 100%;
      display: flex; flex-direction: column; background: #000; overflow: hidden;
    }
    
    /* 상단 진행 바 관리 */
    .story-progress-container {
      position: absolute; top: 12px; left: 0; right: 0; 
      display: flex; gap: 4px; padding: 0 12px; z-index: 2010;
    }
    .story-progress-bar {
      flex: 1; height: 3px; background: rgba(255, 255, 255, 0.3);
      border-radius: 2px; overflow: hidden; position: relative;
    }
    .story-progress-fill {
      width: 0%; height: 100%; background: #fff; transition: width linear;
    }
    
    /* 스토리 상단 정보 */
    .story-header {
      position: absolute; top: 24px; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; z-index: 2010; color: #fff;
    }
    .story-user-info { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .story-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,0.2); }
    .story-nickname { font-size: 14px; font-weight: 600; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }
    .story-time { font-size: 13px; color: rgba(255,255,255,0.7); text-shadow: 0 1px 4px rgba(0,0,0,0.6); }
    .story-close-btn {
      background: none; border: none; color: #fff; font-size: 24px; cursor: pointer;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }
    
    /* 스토리 본문 컨텐츠 영역 */
    .story-content-area {
      flex: 1; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      background: #000; position: relative;
    }
    .story-media {
      width: 100%; max-height: 100%; object-fit: contain; pointer-events: none;
    }
    
    /* 캡션/내용 표시 overlay */
    .story-caption-overlay {
      position: absolute; bottom: 40px; left: 0; right: 0;
      padding: 20px 16px; background: linear-gradient(transparent, rgba(0,0,0,0.8));
      color: #fff; font-size: 14px; line-height: 1.5; z-index: 2010;
      max-height: 150px; overflow-y: auto; word-break: break-all;
    }
    
    /* 좌우 터치 영역 핸들러 */
    .story-nav-edge {
      position: absolute; top: 60px; bottom: 0; width: 25%; z-index: 2005;
    }
    .story-nav-edge.left { left: 0; }
    .story-nav-edge.right { right: 0; width: 75%; } /* 오른쪽 터치 범위를 넓게 배치 */

  </style>
</head>
<body>

  <div class="top-nav">
    <button class="nav-btn" onclick="goBack()">←</button>
    <div class="nav-title" id="navTitle">프로필</div>
    <div style="width:40px;"></div>
  </div>

  <div class="container" id="mainContainer">
    <div class="profile-header">
      <div class="avatar-wrapper" id="avatarWrapper" onclick="tryOpenStories()">
        <img class="avatar" id="userAvatar" src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'/>" alt="프로필 사진">
      </div>
      <div class="profile-info">
        <div class="name-row">
          <span class="nickname" id="userNickname">-</span>
          <span class="badge" id="userBadge" style="display:none;">Admin</span>
        </div>
        <div class="status-msg empty" id="userStatus" onclick="openStatusModal()">상태메시지가 없습니다.</div>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn primary" id="actionBtn" style="display:none;"></button>
      <button class="btn" id="shareBtn" onclick="copyProfileLink()">프로필 공유</button>
    </div>

    <div class="stats-row">
      <div class="stat-item">
        <span class="stat-val" id="cntPosts">0</span>
        <span class="stat-lbl">게시물</span>
      </div>
      <div class="stat-item">
        <span class="stat-val" id="cntLikes">0</span>
        <span class="stat-lbl">받은 좋아요</span>
      </div>
    </div>

    <div class="grid-title">게시물</div>
    <div class="post-grid" id="postGrid"></div>
  </div>

  <div class="modal" id="statusModal">
    <div class="modal-content">
      <div class="modal-title">상태메시지 변경</div>
      <div class="input-wrapper">
        <input type="text" class="text-input" id="statusInput" placeholder="새로운 상태메시지를 입력하세요." maxlength="60">
      </div>
      <div class="modal-btns">
        <button class="modal-btn cancel" onclick="closeStatusModal()">취소</button>
        <button class="modal-btn confirm" onclick="saveStatusMessage()">저장</button>
      </div>
    </div>
  </div>

  <div class="story-modal" id="storyModal">
    <div class="story-container">
      <div class="story-progress-container" id="storyProgressContainer"></div>
      
      <div class="story-header">
        <div class="story-user-info">
          <img class="story-avatar" id="storyHeaderAvatar" src="" alt="">
          <span class="story-nickname" id="storyHeaderNickname">-</span>
          <span class="story-time" id="storyHeaderTime">-</span>
        </div>
        <button class="story-close-btn" onclick="closeStories()">&times;</button>
      </div>
      
      <div class="story-nav-edge left" onclick="storyPrevPage()"></div>
      <div class="story-nav-edge right" onclick="storyNextPage()"></div>
      
      <div class="story-content-area" id="storyContentArea"></div>
      
      <div class="story-caption-overlay" id="storyCaptionOverlay" style="display:none;"></div>
    </div>
  </div>

  <script>
    // Supabase 및 API 설정
    const API_URL = "https://ryun.r-e.kr/api";
    async function api(path, options = {}) {
      const res = await fetch(`${API_URL}${path}`, {
        ...options,
        headers: { "Content-Type": "application/json", ...options.headers }
      });
      if (!res.ok) {
        const text = await res.text();
        throw new Error(text || res.statusText);
      }
      if (res.status === 204) return null;
      return res.json();
    }

    // URL 파라미터 파싱
    const urlParams = new URLSearchParams(window.location.search);
    const targetUserId = urlParams.get('id');
    const paramNickname = urlParams.get('nickname');

    let currentUser = null;
    let viewingUser = null;
    let allUserPosts = []; // 사용자의 전체 게시물 기록 저장 변수
    
    // 스토리 관련 전역 상태 변수
    let storyPages = []; // { post, mediaUrl, isVideo, type, timeText } 형태로 플래트닝된 페이지 배열
    let currentStoryIndex = 0;
    let storyTimer = null;
    let storyDuration = 5000; // 페이지당 기본 재생 시간 (5초)
    let storyStartTime = 0;
    let storyRemainingTime = 5000;

    // 로컬스토리지 로그인 체크
    try {
      const sessionStr = localStorage.getItem('sb-lpsscfclwunrreiesknb-auth-token');
      if (sessionStr) {
        const session = JSON.parse(sessionStr);
        if (session && session.user) currentUser = session.user;
      }
    } catch(e) { console.error(e); }

    // 초기화
    window.addEventListener('DOMContentLoaded', async () => {
      NProgress.start();
      if (paramNickname) {
        document.getElementById('navTitle').textContent = paramNickname;
        document.getElementById('userNickname').textContent = paramNickname;
      }
      
      try {
        if (!targetUserId) {
          showEmpty('사용자 ID가 없습니다.');
          return;
        }
        await loadProfile();
      } catch (e) {
        console.error(e);
        showEmpty('사용자를 찾을 수 없거나 오류가 발생했습니다.');
      } finally {
        NProgress.done();
      }
    });

    // 프로필 데이터 로드
    async function loadProfile() {
      const users = await api(`/users?id=eq.${encodeURIComponent(targetUserId)}`);
      if (!users || users.length === 0) {
        showEmpty('존재하지 않는 사용자입니다.');
        return;
      }
      viewingUser = users[0];

      // UI 반영
      document.getElementById('navTitle').textContent = viewingUser.nickname;
      document.getElementById('userNickname').textContent = viewingUser.nickname;
      document.getElementById('userAvatar').src = viewingUser.avatar_url || './logo.png';
      
      if (viewingUser.role === 'admin') {
        document.getElementById('userBadge').style.display = 'inline-block';
      }
      
      if (viewingUser.message) {
        document.getElementById('userStatus').textContent = viewingUser.message;
        document.getElementById('userStatus').classList.remove('empty');
      } else {
        document.getElementById('userStatus').textContent = '상태메시지가 없습니다.';
        document.getElementById('userStatus').classList.add('empty');
      }

      // 본인 여부에 따른 버튼 분기 처리
      const actionBtn = document.getElementById('actionBtn');
      if (currentUser && currentUser.id === viewingUser.id) {
        actionBtn.textContent = '프로필 편집';
        actionBtn.className = 'btn';
        actionBtn.onclick = () => openStatusModal();
        actionBtn.style.display = 'flex';
      } else {
        actionBtn.style.display = 'none';
      }

      // 게시물 및 통계 가져오기
      await loadPostsAndStats();
    }

    // 게시물 정보 및 통계 바인딩
    async function loadPostsAndStats() {
      // 작성자의 전체 게시물을 생성일 내림차순 정렬하여 획득
      const posts = await api(`/posts?user_id=eq.${encodeURIComponent(targetUserId)}&order=created_at.desc`);
      allUserPosts = posts || [];
      
      document.getElementById('cntPosts').textContent = allUserPosts.length;

      let totalLikes = 0;
      const grid = document.getElementById('postGrid');
      grid.innerHTML = '';

      if (allUserPosts.length === 0) {
        grid.insertAdjacentHTML('afterend', `
          <div class="info-box">
            <div class="info-icon">📸</div>
            <div>아직 게시물이 없습니다.</div>
          </div>
        `);
        document.getElementById('cntLikes').textContent = '0';
        return;
      }

      // 2일 이내(48시간 이내) 게시물 필터링하여 인스타 프로필 스토리 데이터셋 생성
      const now = new Date();
      const twoDaysAgo = new Date(now.getTime() - 2 * 24 * 60 * 60 * 1000);
      let storyPosts = [];

      allUserPosts.forEach(post => {
        totalLikes += (post.likes_count || 0);

        // 그리드 아이템 렌더링 (explore.html 스타일 구조 차용)
        let mediaUrls = [];
        if (post.media_urls) {
          try { mediaUrls = typeof post.media_urls === 'string' ? JSON.parse(post.media_urls) : post.media_urls; }
          catch(e) { mediaUrls = []; }
        }
        if (!Array.now && mediaUrls.length === 0 && post.image_url) {
          mediaUrls = [post.image_url];
        }

        const firstMedia = mediaUrls[0] || './logo.png';
        const isVideo = firstMedia.match(/\.(mp4|webm|ogg|mov)$/i) || post.video_url;
        
        let iconHtml = '';
        if (mediaUrls.length > 1) {
          iconHtml = `<div class="multi-icon">📁</div>`;
        } else if (isVideo) {
          iconHtml = `<div class="video-icon">🎬</div>`;
        }

        const itemHtml = `
          <div class="grid-item" onclick="goToExplorePost('${post.id}')">
            ${iconHtml}
            ${isVideo ? `<video src="${firstMedia}#t=0.1" muted playsinline></video>` : `<img src="${firstMedia}" alt="post">`}
          </div>
        `;
        grid.insertAdjacentHTML('beforeend', itemHtml);

        // 2일 이내에 작성된 스토리 타겟 대상 적재 (시간 오름차순으로 정렬하기 위해 언쉬프트 혹은 추후 가공)
        const postDate = new Date(post.created_at);
        if (postDate >= twoDaysAgo) {
          storyPosts.push(post);
        }
      });

      document.getElementById('cntLikes').textContent = totalLikes;

      // 2일 이내 게시물이 존재할 시 아바타 그라데이션 링 활성화 및 스토리 가공
      if (storyPosts.length > 0) {
        // 과거 스토리부터 순차 재생되도록 시간 오름차순(과거 -> 최신) 정렬
        storyPosts.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
        
        setupStoryDataset(storyPosts);
        document.getElementById('avatarWrapper').classList.add('has-stories');
      }
    }

    // ==========================================
    // 인스타 스토리 가공 및 분할 기능 파트 추가
    // ==========================================
    function setupStoryDataset(posts) {
      storyPages = [];
      const now = new Date();

      posts.forEach(post => {
        let mediaUrls = [];
        if (post.media_urls) {
          try { mediaUrls = typeof post.media_urls === 'string' ? JSON.parse(post.media_urls) : post.media_urls; }
          catch(e) { mediaUrls = []; }
        }
        if (mediaUrls.length === 0 && post.image_url) {
          mediaUrls = [post.image_url];
        }
        if (mediaUrls.length === 0 && post.video_url) {
          mediaUrls = [post.video_url];
        }
        if (mediaUrls.length === 0) {
          mediaUrls = ['./logo.png'];
        }

        // 경과 시간 계산 및 텍스트 포맷 처리 (몇 시간 전 표시)
        const postDate = new Date(post.created_at);
        const diffMs = now - postDate;
        const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
        let timeText = '';
        if (diffHours < 1) {
          const diffMins = Math.floor(diffMs / (1000 * 60));
          timeText = diffMins <= 0 ? '방금 전' : `${diffMins}분 전`;
        } else {
          timeText = `${diffHours}시간 전`;
        }

        // 하나의 게시물에 이미지/비디오가 여러 개 존재할 때도 각각 개별 페이지 분할 처리
        mediaUrls.forEach((url) => {
          const isVideo = url.match(/\.(mp4|webm|ogg|mov)$/i);
          storyPages.push({
            post: post,
            mediaUrl: url,
            isVideo: isVideo,
            timeText: timeText
          });
        });
      });
    }

    // 스토리 모달 진입 시도 함수
    function tryOpenStories() {
      if (document.getElementById('avatarWrapper').classList.contains('has-stories') && storyPages.length > 0) {
        openStories();
      }
    }

    // 스토리 모달 열기 실행
    function openStories() {
      currentStoryIndex = 0;
      document.getElementById('storyHeaderAvatar').src = viewingUser.avatar_url || './logo.png';
      document.getElementById('storyHeaderNickname').textContent = viewingUser.nickname;
      
      document.getElementById('storyModal').classList.add('active');
      
      // 등분 상단 진행 바 인터페이스 동적 구현
      buildStoryProgressBar();
      renderStoryPage();
    }

    // 상단 진행 바 레이아웃 분할 구성
    function buildStoryProgressBar() {
      const container = document.getElementById('storyProgressContainer');
      container.innerHTML = '';
      
      storyPages.forEach((page, idx) => {
        const bar = document.createElement('div');
        bar.className = 'story-progress-bar';
        
        const fill = document.createElement('div');
        fill.className = 'story-progress-fill';
        fill.id = `storyProgressFill_${idx}`;
        
        // 탐색 완료한 앞단 페이지는 100% 채움 유지 처리
        if (idx < currentStoryIndex) {
          fill.style.width = '100%';
        }
        
        bar.appendChild(fill);
        container.appendChild(bar);
      });
    }

    // 특정 스토리 인덱스 페이지 화면 렌더링
    function renderStoryPage() {
      if (storyTimer) { clearTimeout(storyTimer); storyTimer = null; }
      
      // 진행 바 리셋 및 상태 동기화 업데이트
      storyPages.forEach((_, idx) => {
        const fill = document.getElementById(`storyProgressFill_${idx}`);
        if (fill) {
          fill.style.transition = 'none';
          if (idx < currentStoryIndex) fill.style.width = '100%';
          else fill.style.width = '0%';
        }
      });

      const page = storyPages[currentStoryIndex];
      document.getElementById('storyHeaderTime').textContent = page.timeText;

      // 캡션 오버레이 컨텐츠 업데이트 바인딩
      const captionOverlay = document.getElementById('storyCaptionOverlay');
      if (page.post.content && page.post.content.trim() !== '') {
        captionOverlay.innerHTML = escapeHtml(page.post.content).replace(/\n/g, '<br>');
        captionOverlay.style.display = 'block';
      } else {
        captionOverlay.style.display = 'none';
      }

      // 미디어 요소 동적 바인딩 및 가공 생성
      const contentArea = document.getElementById('storyContentArea');
      contentArea.innerHTML = '';

      if (page.isVideo) {
        const video = document.createElement('video');
        video.className = 'story-media';
        video.src = page.mediaUrl;
        video.autoplay = true;
        video.muted = false; // 소리 재생 허용
        video.playsInline = true;
        
        contentArea.appendChild(video);
        
        // 비디오 재생 준비 완료 시 타이머 동작 분기 연동
        video.onloadedmetadata = function() {
          const duration = (video.duration && !isNaN(video.duration)) ? video.duration * 1000 : storyDuration;
          startStoryTimer(duration);
        };
        video.onerror = function() {
          startStoryTimer(storyDuration);
        };
      } else {
        const img = document.createElement('img');
        img.className = 'story-media';
        img.src = page.mediaUrl;
        
        contentArea.appendChild(img);
        startStoryTimer(storyDuration);
      }
    }

    // 스토리 진행 바 애니메이션 및 타이머 동작 관리 함수
    function startStoryTimer(duration) {
      storyRemainingTime = duration;
      storyStartTime = Date.now();
      
      const fill = document.getElementById(`storyProgressFill_${currentStoryIndex}`);
      if (fill) {
        // 리플로우 강제 유도 후 트랜지션 애니메이션 실행 적용
        fill.getBoundingClientRect();
        fill.style.transition = `width ${duration}ms linear`;
        fill.style.width = '100%';
      }

      storyTimer = setTimeout(() => {
        storyNextPage();
      }, duration);
    }

    // 오른쪽 터치 클릭: 다음 페이지로 이동 처리 핸들러
    function storyNextPage() {
      if (currentStoryIndex < storyPages.length - 1) {
        currentStoryIndex++;
        renderStoryPage();
      } else {
        // 마지막 페이지에서 우측클릭했을 때 스토리 닫고 본래 사용자 페이지 표출 구현
        closeStories();
      }
    }

    // 왼쪽 터치 클릭: 이전 페이지로 이동 처리 핸들러
    function storyPrevPage() {
      if (currentStoryIndex > 0) {
        currentStoryIndex--;
        renderStoryPage();
      } else {
        // 처음 페이지일 때는 동작 대기 무시
        if (storyTimer) {
          // 타이머 초기화 후 현재 페이지 재시작 처리 리셋
          renderStoryPage();
        }
      }
    }

    // 스토리 종료 및 사용자 페이지 복귀 트래킹 함수
    function closeStories() {
      if (storyTimer) { clearTimeout(storyTimer); storyTimer = null; }
      document.getElementById('storyModal').classList.remove('active');
      // 백그라운드 오디오 차단을 위해 내부 미디어 소스 제거 처리
      document.getElementById('storyContentArea').innerHTML = '';
    }

    // explore 페이지 상세 게시물로 연결 이동 기능 라우터
    function goToExplorePost(postId) {
      NProgress.start();
      window.location.href = `explore.html?id=${postId}`;
    }

    // 빈 화면 및 에러 피드백 컴포넌트 렌더러
    function showEmpty(msg) {
      const container = document.getElementById('mainContainer');
      container.innerHTML = `
        <div class="info-box">
          <div class="info-icon">⚠️</div>
          <div>${msg}</div>
        </div>
      `;
    }

    // 상태메시지 편집 다이얼로그 제어 파트
    window.openStatusModal = function() {
      if (!currentUser || currentUser.id !== viewingUser.id) return;
      document.getElementById('statusInput').value = viewingUser.message || '';
      document.getElementById('statusModal').classList.add('active');
      document.getElementById('statusInput').focus();
    };

    window.closeStatusModal = function() {
      document.getElementById('statusModal').classList.remove('active');
    };

    window.saveStatusMessage = async function() {
      const newMessage = document.getElementById('statusInput').value.trim();
      if (!currentUser) { alert('로그인이 필요합니다.'); return; }
      try {
        await api(`/users?id=eq.${encodeURIComponent(currentUser.id)}`, {
          method: "PATCH",
          body: JSON.stringify({ message: newMessage }),
          headers: { "Prefer": "return=minimal" }
        });
        viewingUser.message = newMessage;
        
        if (viewingUser.message) {
          document.getElementById('userStatus').textContent = viewingUser.message;
          document.getElementById('userStatus').classList.remove('empty');
        } else {
          document.getElementById('userStatus').textContent = '상태메시지가 없습니다.';
          document.getElementById('userStatus').classList.add('empty');
        }
        
        closeStatusModal();
      } catch (e) {
        console.error('상태메시지 저장 실패:', e);
        alert('상태메시지 저장에 실패했습니다.');
      }
    };

    document.getElementById('statusModal').addEventListener('click', function(e) {
      if (e.target === this) closeStatusModal();
    });

    window.goBack = () => { NProgress.start(); window.history.back(); };
    window.showPrivacyPolicy = () => { NProgress.start(); window.location.href = "privacy.html"; };
    window.showTerms = () => { NProgress.start(); window.location.href = "policy.html"; };

    window.copyProfileLink = function() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = document.getElementById('shareBtn');
        if (!btn) return;
        btn.classList.add('success');
        setTimeout(() => btn.classList.remove('success'), 1500);
      }).catch(err => {
        console.error('링크 복사 실패:', err });
      });
    };

    function escapeHtml(unsafe) {
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>

  <div class="container" style="padding-top:0; padding-bottom:40px;">
    <footer class="footer">
      <div class="footer-links">
        <span class="footer-link" onclick="showPrivacyPolicy()">개인정보처리방침</span>
        <span class="footer-link" onclick="showTerms()">이용약관</span>
      </div>
      <div class="copyright">© Sharer. All rights reserved.</div>
    </footer>
  </div>

</body>
