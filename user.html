<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>프로필 : Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg" />
  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    /* NProgress 커스텀 */
    #nprogress .bar { background: #fff !important; height: 2px !important; }
    #nprogress .peg { display: none !important; }
    #nprogress .spinner { display: none !important; }

    /* ─── SPLASH ─── */
    #splash {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      transition: opacity 0.45s ease;
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }
    .splash-logo {
      width: 72px; height: 72px;
      animation: splashLogoPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes splashLogoPop {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* ─── SIDEBAR ─── */
    .sidebar-container { width: 72px; min-width: 72px; height: 100vh; position: fixed; left: 0; top: 0; z-index: 100; }
    .sidebar-container iframe { width: 72px !important; height: 100%; border: none; }

    /* ─── MAIN WRAPPER ─── */
    .main-wrapper { margin-left: 72px; width: calc(100% - 72px); display: flex; flex-direction: column; min-height: 100vh; }

    /* ─── HEADER ─── */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
      opacity: 0;
      transform: translateY(-10px);
      animation: slideDown 0.4s ease 0.1s forwards;
    }
    @keyframes slideDown { to { opacity: 1; transform: translateY(0); } }

    .back-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: none;
      background: none;
      color: var(--t2);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .back-btn:hover { color: var(--t1); background: var(--bg3); }
    .back-btn:active { transform: scale(0.82); }

    .header-title { font-size: 16px; font-weight: 600; }

    /* ─── CONTAINER ─── */
    .container {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px;
      flex: 1;
      opacity: 0;
      transform: translateY(12px);
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
    }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

    /* ─── PROFILE CARD ─── */
    .profile-card {
      padding: 28px 0;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeInEl 0.5s ease 0.35s forwards;
    }
    @keyframes fadeInEl { to { opacity: 1; } }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 28px;
      margin-bottom: 24px;
    }

    .profile-avatar {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 700;
      flex-shrink: 0;
      color: #666;
      transition: border-color 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
      overflow: hidden;
    }
    .profile-avatar.editable { cursor: pointer; }
    .profile-avatar.editable:hover { border-color: var(--border3); transform: scale(1.05); }
    .profile-avatar.editable:active { transform: scale(0.96); }

    .profile-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .avatar-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      border-radius: 50%;
      align-items: center;
      justify-content: center;
    }
    .profile-avatar.editable:hover .avatar-overlay { display: flex; }

    .profile-info { flex: 1; min-width: 0; }

    .profile-name {
      font-size: 24px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      letter-spacing: -0.3px;
    }

    .verification-badge {
      display: inline-block;
      width: 14px; 
      height: 14px;
      vertical-align: middle;
      background-image: url('https://sharer.r-e.kr/badge.svg');
      background-repeat: no-repeat;
      background-size: contain;
      background-position: center;
    }

    .profile-stats {
      display: flex;
      gap: 36px;
      align-items: center;
    }

    .stat-item { display: flex; flex-direction: column; gap: 3px; }

    .stat-number { font-size: 22px; font-weight: 700; color: var(--t1); }

    .stat-label { font-size: 12px; color: var(--t3); font-weight: 500; }

    .share-btn {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--t2);
      width: 38px; height: 38px;
      border-radius: var(--r2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: auto;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .share-btn:hover { background: var(--bg4); color: var(--t1); border-color: var(--border3); }
    .share-btn:active { transform: scale(0.88); }
    .share-btn.success { background: rgba(74,222,128,0.12); border-color: var(--green); color: var(--green); }

    .status-message-container {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .status-message-text {
      color: var(--t2);
      font-size: 14px;
      line-height: 1.65;
      flex: 1;
    }

    .status-message-empty { color: var(--t3); font-style: italic; }

    .edit-status-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      color: var(--t2);
    }
    .edit-status-btn:hover { background: var(--bg4); border-color: var(--border3); color: var(--t1); transform: scale(1.08); }
    .edit-status-btn:active { transform: scale(0.9); }

    /* ─── POSTS SECTION ─── */
    .posts-section {
      padding: 20px 0;
      opacity: 0;
      animation: fadeInEl 0.5s ease 0.5s forwards;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .post-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .post-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r3);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1), background 0.15s;
      position: relative;
    }
    .post-item:hover { border-color: var(--border3); transform: translateY(-4px); background: var(--bg3); }
    .post-item:active { transform: translateY(-1px) scale(0.99); }

    /* 여러 이미지 캐러셀 */
    .post-item-image-container {
      position: relative;
      width: 100%;
      height: 220px;
      background: #000;
      overflow: hidden;
    }
    .post-item-image-carousel {
      display: flex;
      height: 100%;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .post-item-image-carousel::-webkit-scrollbar { display: none; }
    .post-item-image-slide {
      flex: 0 0 100%;
      scroll-snap-align: start;
      height: 100%;
    }
    .post-item-image-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .post-item-image-count {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 9px;
      border-radius: 12px;
      z-index: 5;
      pointer-events: none;
    }
    .post-item-image-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      z-index: 10;
      opacity: 1;
      transition: background 0.2s;
    }
    .post-item-image-nav:hover { background: rgba(0,0,0,0.9); }
    .post-item-image-nav.prev { left: 8px; }
    .post-item-image-nav.next { right: 8px; }

    .post-item-content { padding: 14px 16px 6px; }

    .post-item-text {
      font-size: 14px;
      line-height: 1.65;
      color: var(--t2);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: pre-wrap;
    }

    .post-item-footer {
      padding: 10px 16px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .post-item-date { font-size: 11px; color: var(--t3); }

    .post-item-likes {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--pink);
      font-size: 12px;
      font-weight: 600;
    }

    /* ─── SKELETON ─── */
    .skeleton {
      background: linear-gradient(90deg, var(--bg2) 0%, var(--bg3) 50%, var(--bg2) 100%);
      background-size: 300% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
      border-radius: var(--r1);
    }
    @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
    .skeleton-avatar { width: 88px; height: 88px; border-radius: 50%; }
    .skeleton-text { height: 22px; border-radius: 8px; margin-bottom: 12px; }
    .skeleton-stat { width: 70px; height: 44px; border-radius: var(--r1); }
    .skeleton-post-image { width: 100%; height: 220px; border-radius: var(--r3) var(--r3) 0 0; }
    .skeleton-post-text { height: 12px; border-radius: 6px; margin-bottom: 8px; }

    /* ─── NO POSTS ─── */
    .no-posts { text-align: center; padding: 64px 20px; color: var(--t3); font-size: 14px; }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r4);
      padding: 32px;
      width: 90%;
      max-width: 440px;
      animation: modalPop 0.28s cubic-bezier(0.34,1.4,0.64,1);
    }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.90) translateY(14px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 18px; color: var(--t1); }
    .modal-input {
      width: 100%; padding: 12px 14px;
      background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r2);
      color: var(--t1); font-size: 14px; margin-bottom: 18px;
      resize: vertical; min-height: 80px; font-family: inherit; line-height: 1.5;
      transition: border-color 0.2s, background 0.2s;
    }
    .modal-input:focus { outline: none; border-color: var(--border3); background: var(--bg4); }
    .modal-input::placeholder { color: var(--t3); }
    .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-btn {
      padding: 10px 22px; border-radius: var(--r2); border: none; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-btn:active { transform: scale(0.94); }
    .modal-btn-cancel { background: var(--bg3); color: var(--t2); border: 1px solid var(--border2); }
    .modal-btn-cancel:hover { background: var(--bg4); color: var(--t1); }
    .modal-btn-confirm { background: #fff; color: #000; }
    .modal-btn-confirm:hover { background: #e8e8e8; }

    /* ─── INSTAGRAM STORY OVERLAY ─── */
    #storyOverlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 5000;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      user-select: none;
    }
    #storyOverlay.active { display: flex; }
    .story-wrapper {
      position: relative;
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 850px;
      display: flex;
      flex-direction: column;
      background: #121212;
      overflow: hidden;
    }
    @media (max-width: 480px) { .story-wrapper { max-height: 100vh; border-radius: 0; } }
    
    /* 상단 정보 영역 */
    .story-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 20px 16px 40px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0));
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 30;
    }
    .story-user-info { display: flex; align-items: center; gap: 10px; color: #fff; }
    .story-user-avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,0.3); }
    .story-user-name { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
    .story-time { font-size: 13px; color: rgba(255,255,255,0.6); }
    .story-close-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; padding: 4px; opacity: 0.8; transition: opacity 0.2s; }
    .story-close-btn:hover { opacity: 1; }

    /* 콘텐츠 영역 */
    .story-body { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; width: 100%; height: 100%; }
    .story-content-item { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
    .story-img { max-width: 100%; max-height: 70vh; object-fit: contain; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    
    /* 텍스트 단독 게시물 스타일 (탐색 페이지 참고) */
    .story-text-only {
      background: linear-gradient(135deg, #1e1e1e, #2a2a2a);
      border: 1px solid #333; border-radius: 16px; padding: 40px;
      max-width: 85%; max-height: 60vh; overflow-y: auto; text-align: center;
      display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
    }
    .story-text-content { font-size: 18px; line-height: 1.6; color: #fff; white-space: pre-wrap; word-break: break-word; }

    /* 캡션 오버레이 */
    .story-caption {
      position: absolute; bottom: 80px; left: 16px; right: 16px;
      padding: 14px 16px; background: rgba(30, 30, 30, 0.85); border-radius: 12px;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1); z-index: 25; max-height: 120px; overflow-y: auto;
    }
    .story-caption-text { font-size: 14px; line-height: 1.5; color: #fff; white-space: pre-wrap; word-break: break-word; }

    /* 하단 등분 바 프로그레스 시스템 */
    .story-footer-bars {
      position: absolute; bottom: 20px; left: 12px; right: 12px;
      display: flex; gap: 6px; z-index: 30; background: linear-gradient(to top, rgba(0,0,0,0.5), rgba(0,0,0,0));
      padding-top: 20px;
    }
    .story-bar-bg { flex: 1; height: 3px; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden; position: relative; }
    .story-bar-fill { height: 100%; width: 0%; background: #fff; transition: width 0.1s linear; }
    .story-bar-bg.active .story-bar-fill { width: 0%; }
    
    /* 좌우 터치/클릭 감지 투명 레이어 */
    .story-click-zone { position: absolute; top: 0; bottom: 0; width: 50%; z-index: 20; cursor: pointer; }
    .story-click-zone.left { left: 0; }
    .story-click-zone.right { right: 0; }
  </style>
</head>
<body>

  <div id="splash">
    <img src="./logo.png" class="splash-logo" alt="Logo">
  </div>

  <div class="sidebar-container">
    <iframe src="sidebar.html"></iframe>
  </div>

  <div class="main-wrapper">
    <header class="header">
      <button class="back-btn" onclick="goBack()">←</button>
      <div class="header-title" id="headerTitle">프로필</div>
    </header>

    <main class="container">
      <section class="profile-card" id="profileCard">
        <div class="profile-header">
          <div class="skeleton skeleton-avatar"></div>
          <div class="profile-info">
            <div class="skeleton" style="width: 150px; height: 28px; margin-bottom: 16px;"></div>
            <div class="profile-stats">
              <div class="skeleton skeleton-stat"></div>
              <div class="skeleton skeleton-stat"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="posts-section">
        <h2 class="section-title">게시물</h2>
        <div class="post-grid" id="postGrid">
          <div class="post-item">
            <div class="skeleton skeleton-post-image"></div>
            <div class="post-item-content">
              <div class="skeleton skeleton-post-text" style="width: 80%;"></div>
              <div class="skeleton skeleton-post-text" style="width: 50%;"></div>
            </div>
          </div>
          <div class="post-item">
            <div class="skeleton skeleton-post-image"></div>
            <div class="post-item-content">
              <div class="skeleton skeleton-post-text" style="width: 70%;"></div>
              <div class="skeleton skeleton-post-text" style="width: 40%;"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="storyOverlay">
    <div class="story-wrapper">
      <div class="story-header">
        <div class="story-user-info">
          <div id="storyAvatarContainer"></div>
          <span class="story-user-name" id="storyUsername">사용자</span>
          <span class="story-time" id="storyTimeAgo">• 0시간 전</span>
        </div>
        <button class="story-close-btn" onclick="closeStory()">✕</button>
      </div>

      <div class="story-body">
        <div class="story-click-zone left" onclick="prevStory(event)"></div>
        <div class="story-click-zone right" onclick="nextStory(event)"></div>
        <div id="storyContentContainer" class="story-content-item"></div>
      </div>

      <div class="story-footer-bars" id="storyFooterBars"></div>
    </div>
  </div>

  <div class="modal-overlay" id="statusModal">
    <div class="modal-content">
      <h3 class="modal-title">상태메시지 수정</h3>
      <textarea class="modal-input" id="statusInput" placeholder="새로운 상태메시지를 입력하세요..." maxlength="150"></textarea>
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-cancel" onclick="closeStatusModal()">취소</button>
        <button class="modal-btn modal-btn-confirm" onclick="saveStatusMessage()">저장</button>
      </div>
    </div>
  </div>

  <script>
    // Supabase 연동 정보 및 전역 초기화
    const API_URL = "https://wzsnvscfofgbybknanyv.supabase.co/rest/v1";
    let SUPABASE_KEY = "";

    let currentUser = null;
    let viewingUser = null;
    let allUserPosts = [];
    
    // 스토리 상태 변수들
    let storyPages = [];
    let currentStoryIdx = 0;
    let storyTimer = null;
    let storyDuration = 5000; // 한 페이지당 5초
    let storyProgressInterval = null;
    let storyPercent = 0;

    // URL 파라미터 파싱
    const urlParams = new URLSearchParams(window.location.search);
    const userIdParam = urlParams.get('id');
    const userNicknameParam = urlParams.get('nickname');

    async function api(endpoint, options = {}) {
      if(!SUPABASE_KEY) {
        const configResp = await fetch('./config.json');
        const configData = await configResp.json();
        SUPABASE_KEY = configData.supabaseKey;
      }
      const headers = {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
        ...options.headers
      };
      const response = await fetch(`${API_URL}${endpoint}`, { ...options, headers });
      if (!response.ok) {
        const errText = await response.text();
        throw new Error(errText || response.statusText);
      }
      if (options.headers && options.headers["Prefer"] === "return=minimal") {
        return null;
      }
      return response.json();
    }

    document.addEventListener("DOMContentLoaded", async () => {
      NProgress.start();
      try {
        const sessionStr = localStorage.getItem('session');
        if (sessionStr) {
          const session = JSON.parse(sessionStr);
          if (session && session.user) currentUser = session.user;
        }
      } catch(e) { console.error("세션 파싱 에러:", e); }

      try {
        await loadProfilePage();
      } catch(e) {
        console.error("페이지 로딩 에러:", e);
        alert("데이터를 가져오는 중 오류가 발생했습니다.");
      } finally {
        NProgress.done();
      }
    });

    async function loadProfilePage() {
      let targetUid = userIdParam;
      
      if (!targetUid && currentUser) {
        targetUid = currentUser.id;
      } else if (!targetUid && !currentUser) {
        alert("사용자 정보가 지정되지 않았습니다. 로그인 또는 올바른 주소로 접근해 주세요.");
        window.location.href = "explore.html";
        return;
      }

      // 사용자 정보 로드
      const userArray = await api(`/users?id=eq.${encodeURIComponent(targetUid)}&select=*`);
      if (!userArray || userArray.length === 0) {
        if (userNicknameParam) {
          viewingUser = { id: targetUid, nickname: userNicknameParam, message: "" };
        } else {
          viewingUser = { id: targetUid, nickname: "알 수 없는 사용자", message: "" };
        }
      } else {
        viewingUser = userArray[0];
      }

      if (viewingUser.nickname) {
        document.getElementById('headerTitle').textContent = `${viewingUser.nickname}님의 프로필`;
      }

      await displayProfile(viewingUser);
      await loadUserPosts(targetUid);
    }

    async function displayProfile(user) {
      const card = document.getElementById('profileCard');
      const isMe = currentUser && currentUser.id === user.id;

      let avatarContent = (user.nickname ? user.nickname.substring(0,1).toUpperCase() : "?");
      if (user.avatar_url) {
        avatarContent = `<img src="${user.avatar_url}" alt="Avatar">`;
      }

      const hasBadge = user.badge === true;
      const badgeHtml = hasBadge ? '<span class="verification-badge" title="인증된 사용자"></span>' : '';

      card.innerHTML = `
        <div class="profile-header">
          <div class="profile-avatar ${isMe ? 'editable' : ''}" id="profileAvatarBtn">
            ${avatarContent}
            ${isMe ? '<div class="avatar-overlay">⚙️</div>' : ''}
          </div>
          <div class="profile-info">
            <h1 class="profile-name">
              <span>${escapeHtml(user.nickname || "사용자")}</span>${badgeHtml}
            </h1>
            <div class="profile-stats">
              <div class="stat-item">
                <span class="stat-number" id="postCountEl">0</span>
                <span class="stat-label">게시물이 존재함</span>
              </div>
            </div>
          </div>
          <button class="share-btn" id="shareBtn" onclick="copyProfileLink()" title="프로필 링크 복사">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
          </button>
        </div>
        <div class="status-message-container">
          <div class="status-message-text">
            ${user.message ? escapeHtml(user.message) : '<span class="status-message-empty">등록된 상태메시지가 존재하지 않습니다.</span>'}
          </div>
          ${isMe ? `<button class="edit-status-btn" onclick="openStatusModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg></button>` : ''}
        </div>
      `;

      // 아바타 클릭 시 핸들러 바인딩
      const avatarBtn = document.getElementById('profileAvatarBtn');
      if (avatarBtn) {
        avatarBtn.addEventListener('click', () => {
          // 2일 이내 공유된 게시물이 있을 경우 스토리 모드 실행
          if (storyPages.length > 0) {
            openStory();
          } else if (isMe) {
            alert("프로필 이미지는 설정 페이지 혹은 아바타 관리 기능 개발 시 수정 가능합니다. (2일 이내 새 글 작성 시 스토리가 열립니다)");
          }
        });
      }
    }

    async function loadUserPosts(uid) {
      const grid = document.getElementById('postGrid');
      try {
        const posts = await api(`/posts?user_id=eq.${encodeURIComponent(uid)}&order=created_at.desc`);
        allUserPosts = posts || [];

        const countEl = document.getElementById('postCountEl');
        if (countEl) countEl.textContent = allUserPosts.length;

        // ─── 2일 이내 게시물 추출 로직 (인스타 스토리용) ───
        storyPages = [];
        const now = new Date();
        const twoDaysInMs = 2 * 24 * 60 * 60 * 1000;

        // 최신 글부터 순회
        allUserPosts.forEach(post => {
          const postDate = new Date(post.created_at);
          if (now - postDate <= twoDaysInMs) {
            // 몇 시간 지났는지 미리 계산
            const diffHours = Math.max(0, Math.floor((now - postDate) / (1000 * 60 * 60)));
            const timeAgoText = diffHours === 0 ? "방금 전" : `${diffHours}시간 전`;

            // 한 게시물 내에 이미지가 여러 개일 경우 각각 개별 스토리 페이지로 매핑
            if (post.images && Array.isArray(post.images) && post.images.length > 0) {
              post.images.forEach(imgUrl => {
                storyPages.push({
                  id: post.id,
                  type: 'image',
                  url: imgUrl,
                  text: post.text,
                  timeAgo: timeAgoText
                });
              });
            } else if (post.image_url) {
              storyPages.push({
                id: post.id,
                type: 'image',
                url: post.image_url,
                text: post.text,
                timeAgo: timeAgoText
              });
            } else {
              // 이미지가 없는 텍스트 전용 게시글
              storyPages.push({
                id: post.id,
                type: 'text',
                text: post.text,
                timeAgo: timeAgoText
              });
            }
          }
        });

        // 만약 2일 이내 게시물이 있다면 프로필 아바타 외곽에 무지개 링 추가 스타일 효과 부여
        const avatarEl = document.getElementById('profileAvatarBtn');
        if (storyPages.length > 0 && avatarEl) {
          avatarEl.style.border = "2.5px solid #ff6b6b";
          avatarEl.style.boxShadow = "0 0 8px rgba(255,107,107,0.5)";
          avatarEl.setAttribute('title', '스토리 보기');
        }

        if (allUserPosts.length === 0) {
          grid.innerHTML = `
            <div class="no-posts" style="grid-column: 1/-1;">
              <div style="font-size: 32px; margin-bottom:12px;">📭</div>
              작성된 게시물이 존재하지 않습니다.
            </div>
          `;
          return;
        }

        grid.innerHTML = "";
        allUserPosts.forEach((post, index) => {
          const item = document.createElement('div');
          item.className = 'post-item';

          let imageContainerHtml = "";
          let imagesArray = [];
          if (post.images && Array.isArray(post.images)) imagesArray = post.images;
          else if (post.image_url) imagesArray = [post.image_url];

          if (imagesArray.length > 0) {
            const countBadge = imagesArray.length > 1 ? `<div class="post-item-image-count">1/${imagesArray.length}</div>` : "";
            const leftNav = imagesArray.length > 1 ? `<button class="post-item-image-nav prev" onclick="handleCarouselNav(event, ${index}, -1)">‹</button>` : "";
            const rightNav = imagesArray.length > 1 ? `<button class="post-item-image-nav next" onclick="handleCarouselNav(event, ${index}, 1)">›</button>` : "";
            
            let slidesHtml = "";
            imagesArray.forEach(src => {
              slidesHtml += `<div class="post-item-image-slide"><img src="${src}" alt="Post image" loading="lazy"></div>`;
            });

            imageContainerHtml = `
              <div class="post-item-image-container" id="carousel-container-${index}">
                ${countBadge}
                ${leftNav}
                ${rightNav}
                <div class="post-item-image-carousel" id="carousel-${index}" data-current-page="0" data-total-pages="${imagesArray.length}">
                  ${slidesHtml}
                </div>
              </div>
            `;
          } else {
            imageContainerHtml = `
              <div class="post-item-image-container" style="display:flex; align-items:center; justify-content:center; background:var(--bg3); padding:20px;">
                <div style="font-size:13px; color:var(--t3); line-height:1.5; text-align:center; display:-webkit-box; -webkit-line-clamp:5; -webkit-box-orient:vertical; overflow:hidden;">${escapeHtml(post.text)}</div>
              </div>
            `;
          }

          const likesCount = post.likes_count || 0;
          const displayDate = post.created_at ? post.created_at.substring(0,10) : "";

          item.innerHTML = `
            ${imageContainerHtml}
            <div class="post-item-content" onclick="goToDetail('${post.id}')">
              <p class="post-item-text">${escapeHtml(post.text || "")}</p>
            </div>
            <div class="post-item-footer" onclick="goToDetail('${post.id}')">
              <span class="post-item-date">${displayDate}</span>
              <div class="post-item-likes">
                <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <span>${likesCount}</span>
              </div>
            </div>
          `;
          grid.appendChild(item);
        });

      } catch (e) {
        console.error("게시물 연동 실패:", e);
        grid.innerHTML = `<div class="no-posts" style="grid-column: 1/-1; color: var(--pink);">게시물을 불러오는 과정에서 오류가 발생했습니다.</div>`;
      }
    }

    window.handleCarouselNav = function(event, index, direction) {
      event.stopPropagation();
      const carousel = document.getElementById(`carousel-${index}`);
      const container = document.getElementById(`carousel-container-${index}`);
      if (!carousel) return;

      let currentPage = parseInt(carousel.getAttribute('data-current-page') || '0');
      const totalPages = parseInt(carousel.getAttribute('data-total-pages') || '1');

      currentPage += direction;
      if (currentPage < 0) currentPage = 0;
      if (currentPage >= totalPages) currentPage = totalPages - 1;

      carousel.setAttribute('data-current-page', currentPage);
      
      const slideWidth = carousel.offsetWidth;
      carousel.scrollTo({
        left: slideWidth * currentPage,
        behavior: 'smooth'
      });

      const countEl = container.querySelector('.post-item-image-count');
      if (countEl) {
        countEl.textContent = `${currentPage + 1}/${totalPages}`;
      }
    };

    window.goToDetail = function(postId) {
      window.location.href = `explore.html?postId=${postId}`;
    };

    // ─── INSTAGRAM STORY SYSTEM CORE LOGIC ───
    window.openStory = function() {
      if (storyPages.length === 0) return;
      currentStoryIdx = 0;
      
      document.getElementById('storyUsername').textContent = viewingUser.nickname || "사용자";
      
      const avatarContainer = document.getElementById('storyAvatarContainer');
      if (viewingUser.avatar_url) {
        avatarContainer.innerHTML = `<img src="${viewingUser.avatar_url}" class="story-user-avatar" alt="Avatar">`;
      } else {
        const initLetter = viewingUser.nickname ? viewingUser.nickname.substring(0,1).toUpperCase() : "?";
        avatarContainer.innerHTML = `<div class="story-user-avatar" style="background:#444; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:14px; color:#fff;">${initLetter}</div>`;
      }

      // 하단 등분 바 엘리먼트 동적 생성
      const footerBars = document.getElementById('storyFooterBars');
      footerBars.innerHTML = "";
      for (let i = 0; i < storyPages.length; i++) {
        const barBg = document.createElement('div');
        barBg.className = 'story-bar-bg';
        barBg.id = `story-bar-bg-${i}`;
        barBg.innerHTML = `<div class="story-bar-fill" id="story-bar-fill-${i}"></div>`;
        footerBars.appendChild(barBg);
      }

      document.getElementById('storyOverlay').classList.add('active');
      renderCurrentStoryPage();
    };

    function renderCurrentStoryPage() {
      // 타이머 리셋
      clearTimeout(storyTimer);
      clearInterval(storyProgressInterval);
      
      if (currentStoryIdx >= storyPages.length || currentStoryIdx < 0) {
        closeStory();
        return;
      }

      const pData = storyPages[currentStoryIdx];
      
      // 몇 시간 전인지 세팅
      document.getElementById('storyTimeAgo').textContent = `• ${pData.timeAgo}`;

      // 하단 등분 프로그레스 바 배경 상태 업데이트
      for (let i = 0; i < storyPages.length; i++) {
        const fill = document.getElementById(`story-bar-fill-${i}`);
        if (!fill) continue;
        if (i < currentStoryIdx) {
          fill.style.width = "100%";
        } else if (i > currentStoryIdx) {
          fill.style.width = "0%";
        } else {
          fill.style.width = "0%";
        }
      }

      // 콘텐츠 가공 채우기
      const container = document.getElementById('storyContentContainer');
      container.innerHTML = "";

      if (pData.type === 'image') {
        container.innerHTML = `<img src="${pData.url}" class="story-img" alt="Story Asset">`;
        if (pData.text && pData.text.trim().length > 0) {
          const capDiv = document.createElement('div');
          capDiv.className = 'story-caption';
          capDiv.innerHTML = `<p class="story-caption-text">${escapeHtml(pData.text)}</p>`;
          container.appendChild(capDiv);
        }
      } else {
        // 텍스트 단독 글
        container.innerHTML = `
          <div class="story-text-only">
            <div class="story-text-content">${escapeHtml(pData.text || "")}</div>
          </div>
        `;
      }

      // 하단 바 게이지 채우기 애니메이션 구동
      storyPercent = 0;
      const intervalStep = 100; // 0.1초마다 갱신
      const fillEl = document.getElementById(`story-bar-fill-${currentStoryIdx}`);
      
      storyProgressInterval = setInterval(() => {
        storyPercent += (intervalStep / storyDuration) * 100;
        if (storyPercent >= 100) {
          storyPercent = 100;
          if (fillEl) fillEl.style.width = `100%`;
          clearInterval(storyProgressInterval);
        } else {
          if (fillEl) fillEl.style.width = `${storyPercent}%`;
        }
      }, intervalStep);

      // 명시된 시간이 끝난 경우 자동으로 다음 페이지 처리 (마지막이면 사용자페이지 원복)
      storyTimer = setTimeout(() => {
        if (currentStoryIdx === storyPages.length - 1) {
          closeStory();
        } else {
          currentStoryIdx++;
          renderCurrentStoryPage();
        }
      }, storyDuration);
    }

    window.prevStory = function(event) {
      if(event) event.stopPropagation();
      if (currentStoryIdx > 0) {
        currentStoryIdx--;
        renderCurrentStoryPage();
      }
    };

    window.nextStory = function(event) {
      if(event) event.stopPropagation();
      if (currentStoryIdx < storyPages.length - 1) {
        currentStoryIdx++;
        renderCurrentStoryPage();
      } else {
        // 마지막 페이지에서 우측 클릭했을 때 스토리 형태의 게시물 사라지고 사용자페이지 표시
        closeStory();
      }
    };

    window.closeStory = function() {
      clearTimeout(storyTimer);
      clearInterval(storyProgressInterval);
      document.getElementById('storyOverlay').classList.remove('active');
    };

    // 상태메시지 모달 제어 함수군
    window.openStatusModal = function() {
      const modal = document.getElementById('statusModal');
      const input = document.getElementById('statusInput');
      if(viewingUser) {
        input.value = viewingUser.message || "";
      }
      modal.classList.add('active');
      input.focus();
    };

    window.closeStatusModal = function() {
      document.getElementById('statusModal').classList.remove('active');
    };

    window.saveStatusMessage = async function() {
      const newMessage = document.getElementById('statusInput').value;
      if (!currentUser) { alert('로그인이 필요합니다.'); return; }
      try {
        await api(`/users?id=eq.${encodeURIComponent(currentUser.id)}`, {
          method: "PATCH",
          body: JSON.stringify({ message: newMessage }),
          headers: { "Prefer": "return=minimal" }
        });
        viewingUser.message = newMessage;
        await displayProfile(viewingUser);
        closeStatusModal();
      } catch (e) {
        console.error('상태메시지 저장 실패:', e);
        alert('상태메시지 저장에 실패했습니다.');
      }
    };

    document.getElementById('statusModal').addEventListener('click', function(e) {
      if (e.target === this) closeStatusModal();
    });

    window.goBack = () => { NProgress.start(); window.history.back(); };

    window.copyProfileLink = function() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = document.getElementById('shareBtn');
        if (!btn) return;
        btn.classList.add('success');
        setTimeout(() => btn.classList.remove('success'), 1500);
      }).catch(err => {
        console.error('링크 복사 실패:', err);
      });
    };

    function escapeHtml(unsafe) {
      if(!unsafe) return "";
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
