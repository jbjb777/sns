<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로필 : Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg" />
  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    #nprogress .bar { background: #fff !important; height: 2px !important; }
    #nprogress .spinner { display: none !important; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      display: flex;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── SIDEBAR ─── */
    .sidebar-container {
      width: 72px;
      min-width: 72px;
      height: 100vh;
      position: fixed;
      left: 0; top: 0;
      border-right: 1px solid var(--border);
      z-index: 100;
      background: var(--bg);
    }
    .sidebar-container iframe {
      width: 72px !important;
      height: 100%;
      border: none;
    }

    /* ─── MAIN LAYOUT ─── */
    .main-layout {
      margin-left: 72px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 0;
    }

    .profile-container {
      max-width: 640px;
      width: 100%;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* ─── HEADER ─── */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 28px;
      position: relative;
    }
    
    .back-btn {
      position: absolute;
      top: -12px; left: -8px;
      background: none; border: none; color: var(--t2);
      cursor: pointer; padding: 8px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, background 0.15s;
    }
    .back-btn:hover { color: var(--t1); background: var(--bg3); }
    .back-btn svg { width: 20px; height: 20px; }

    .avatar-wrapper {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: var(--bg3);
      border: 2px solid var(--border3);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: 700; color: #666;
      overflow: hidden; flex-shrink: 0;
    }
    .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }

    .profile-meta-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .name-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .profile-nickname {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    
    .action-buttons-group {
      display: flex;
      gap: 8px;
    }

    .btn-base {
      background: var(--bg3);
      border: 1px solid var(--border3);
      color: var(--t1);
      padding: 8px 16px;
      border-radius: var(--r1);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .btn-base:hover { background: var(--bg4); border-color: var(--t3); }
    .btn-base:active { transform: scale(0.97); }
    
    .btn-base.success {
      background: rgba(74,222,128,0.1);
      border-color: var(--green);
      color: var(--green);
    }

    .profile-bio-text {
      font-size: 14px;
      line-height: 1.5;
      color: var(--t2);
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* ─── STATS ─── */
    .stats-row {
      display: flex;
      gap: 24px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 14px 4px;
    }
    .stat-item {
      font-size: 14px;
      color: var(--t2);
    }
    .stat-item strong {
      color: var(--t1);
      font-weight: 600;
      margin-right: 4px;
    }

    /* ─── TABS ─── */
    .tabs-nav {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-top: -12px;
    }
    .tab-trigger {
      flex: 1;
      background: none; border: none;
      color: var(--t3);
      padding: 14px 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      position: relative;
      transition: color 0.15s;
    }
    .tab-trigger:hover { color: var(--t2); }
    .tab-trigger.active { color: var(--t1); }
    .tab-trigger.active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; width: 100%; height: 2px;
      background: var(--t1);
    }

    /* ─── TIMELINE ─── */
    .posts-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .post-card {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r4);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: border-color 0.2s, background 0.2s;
    }
    .post-card:hover {
      border-color: var(--border3);
    }

    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .post-time { font-size: 11px; color: var(--t3); }
    .post-content {
      font-size: 14.5px;
      line-height: 1.6;
      color: #eee;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .post-content h1 { font-size: 1.35em; margin-bottom: 6px; font-weight: 700; color: #fff; }
    .post-content h2 { font-size: 1.2em; margin-bottom: 5px; font-weight: 600; color: #fff; }
    .post-content h3 { font-size: 1.1em; margin-bottom: 4px; font-weight: 600; color: #fff; }
    .post-content strong { font-weight: 700; color: #fff; }
    .post-content em { font-style: italic; }
    .post-content hr { border: none; height: 1px; background: var(--border3); margin: 12px 0; }

    .post-image-container {
      border-radius: var(--r3);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .image-grid { display: grid; gap: 2px; background: var(--border); cursor: pointer; }
    .image-grid.count-1 { grid-template-columns: 1fr; }
    .image-grid.count-2 { grid-template-columns: 1fr 1fr; }
    .image-grid.count-3 { grid-template-columns: 1.2fr 1fr; grid-template-rows: 1fr 1fr; }
    .image-grid.count-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .image-grid.count-5 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1.2fr 1fr; }

    .image-grid-item { position: relative; overflow: hidden; width: 100%; height: 100%; }
    .image-grid.count-3 .image-grid-item:nth-child(1) { grid-row: span 2; }
    .image-grid.count-5 .image-grid-item:nth-child(2) { grid-column: span 2; }

    .image-grid img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
    .image-grid-item:hover img { transform: scale(1.02); }

    .image-grid.count-1 .image-grid-item { aspect-ratio: 16 / 10; max-height: 440px; }
    .image-grid.count-2 { aspect-ratio: 16 / 10; }
    .image-grid.count-3 { aspect-ratio: 16 / 11; }
    .image-grid.count-4 { aspect-ratio: 16 / 11; }
    .image-grid.count-5 { aspect-ratio: 16 / 12; }

    .image-more-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 16px; font-weight: 600; pointer-events: none;
    }

    .post-actions { display: flex; gap: 16px; }
    .action-btn-item {
      background: none; border: none; display: flex; align-items: center; gap: 6px;
      color: var(--t3); font-size: 12.5px; font-weight: 500;
    }
    .action-btn-item.liked { color: var(--pink); }
    .action-btn-item svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; }
    .action-btn-item.liked svg { fill: var(--pink); stroke: var(--pink); }

    .no-data-notice { text-align: center; padding: 56px 24px; color: var(--t3); font-size: 14px; }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 200; display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal-card {
      background: var(--bg2); border: 1px solid var(--border3);
      border-radius: var(--r3); max-width: 400px; width: 100%;
      padding: 24px; display: flex; flex-direction: column; gap: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-textarea {
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: var(--r1); width: 100%; height: 100px;
      padding: 12px; color: var(--t1); font-size: 14px; font-family: inherit;
      resize: none; outline: none;
    }
    .modal-textarea:focus { border-color: var(--border3); }
    .modal-foot-actions { display: flex; justify-content: flex-end; gap: 8px; }

    .profile-footer {
      margin-top: 40px; padding-top: 20px;
      border-top: 1px solid var(--border); text-align: center;
      font-size: 11px; color: var(--t3); line-height: 1.6; width: 100%;
    }
    .profile-footer a { color: var(--t3); text-decoration: none; margin: 0 4px; }
    .profile-footer a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      .sidebar-container { display: none; }
      .main-layout { margin-left: 0; }
      .profile-container { padding: 24px 16px; gap: 24px; }
      .profile-header { gap: 20px; flex-direction: column; align-items: flex-start; }
      .back-btn { top: -16px; left: -4px; }
      .avatar-wrapper { width: 80px; height: 80px; font-size: 28px; }
      .action-buttons-group { width: 100%; }
      .btn-base { flex: 1; justify-content: center; }
      .post-card { padding: 18px; border-radius: var(--r3); }
    }
  </style>
</head>
<body>

  <div class="sidebar-container">
    <iframe src="sidebar.html"></iframe>
  </div>

  <div class="main-layout">
    <div class="profile-container">
      
      <div class="profile-header">
        <button class="back-btn" onclick="goBack()" title="뒤로가기">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </button>

        <div class="avatar-wrapper" id="userAvatarBox">?</div>
        
        <div class="profile-meta-info">
          <div class="name-row">
            <span class="profile-nickname" id="userNicknameLabel">로딩 중...</span>
            <div class="action-buttons-group" id="profileActionsBox" style="display:none;"></div>
          </div>
          <p class="profile-bio-text" id="userBioLabel">등록된 상태메시지가 없습니다.</p>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-item"><strong id="cntPosts">0</strong>게시물</div>
        <div class="stat-item"><strong id="cntLikes">0</strong>받은 좋아요</div>
      </div>

      <div class="tabs-nav">
        <button class="tab-trigger active" id="tabPostsBtn" onclick="switchSubTab('posts')">게시물</button>
        <button class="tab-trigger" id="tabInfoBtn" onclick="switchSubTab('info')">정보</button>
      </div>

      <div id="tabContentWrapper">
        <div class="posts-grid" id="userPostsTimeline"></div>
      </div>

      <div class="profile-footer">
        <p>© 2026 Sharer. Designed by 정빈777</p>
        <p style="margin-top:2px;">
          <a href="#" onclick="showPrivacyPolicy()">개인정보처리방침</a> · 
          <a href="#" onclick="showTerms()">이용약관</a>
        </p>
      </div>

    </div>
  </div>

  <div class="modal-overlay" id="statusModal">
    <div class="modal-card">
      <span class="modal-title">상태메시지 설정</span>
      <textarea class="modal-textarea" id="statusInput" placeholder="나를 표현하는 한 문장을 적어보세요..." maxlength="150"></textarea>
      <div class="modal-foot-actions">
        <button class="btn-base" style="background:none; border:none; color:var(--t3);" onclick="closeStatusModal()">취소</button>
        <button class="btn-base" style="background:var(--t1); color:var(--bg); border:none;" onclick="saveStatusMsg()">저장</button>
      </div>
    </div>
  </div>

<script src="markdown.js"></script>
<script>
  const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";
  let currentUser = null;
  let viewingUserId = null;
  let viewingUserNickname = "";
  let viewingUser = null;
  let currentTab = "posts";

  async function api(endpoint, options = {}) {
    const res = await fetch(API_BASE + endpoint, {
      ...options,
      headers: {
        "Content-Type": "application/json",
        ...(options.headers || {}),
      },
    });
    if (!res.ok) {
      let errTxt = ""; try { errTxt = await res.text(); } catch {}
      throw new Error(`오류 (${res.status}): ${errTxt}`);
    }
    if (res.status === 204 || res.headers.get("content-length") === "0") return null;
    try { return await res.json(); } catch { return null; }
  }

  function getInitial(n) {
    return (n ? n[0] : '?').toUpperCase();
  }

  window.addEventListener('DOMContentLoaded', async () => {
    const saved = localStorage.getItem('snsUser');
    if (saved) currentUser = JSON.parse(saved);

    const params = new URLSearchParams(window.location.search);
    viewingUserId = params.get('id');
    viewingUserNickname = params.get('nickname') || "";

    if (!viewingUserId) {
      alert('올바르지 않은 접근입니다.');
      window.location.href = 'index.html';
      return;
    }

    await loadProfileContext();
  });

  async function loadProfileContext() {
    try {
      const users = await api(`/users?id=eq.${encodeURIComponent(viewingUserId)}&select=*`);
      if (!users || users.length === 0) {
        viewingUser = {
          id: viewingUserId,
          nickname: viewingUserNickname || '알 수 없는 사용자',
          message: ''
        };
      } else {
        viewingUser = users[0];
      }

      await displayProfile(viewingUser);
      await loadUserPostsCountAndLikes();
      switchSubTab('posts');
    } catch (e) {
      console.error('프로필 초기 마운트 실패:', e);
      document.getElementById('userNicknameLabel').textContent = '오류 발생';
    }
  }

  async function displayProfile(user) {
    document.getElementById('userNicknameLabel').textContent = user.nickname || '익명';
    
    const bioLabel = document.getElementById('userBioLabel');
    bioLabel.textContent = user.message ? user.message : '등록된 상태메시지가 없습니다.';

    const avatarBox = document.getElementById('userAvatarBox');
    if (user.profile_image) {
      avatarBox.innerHTML = `<img src="${user.profile_image}" alt="avatar">`;
    } else {
      avatarBox.innerHTML = getInitial(user.nickname);
    }

    const actionBox = document.getElementById('profileActionsBox');
    actionBox.innerHTML = '';
    actionBox.style.display = 'flex';

    const isMe = currentUser && String(currentUser.id) === String(user.id);
    if (isMe) {
      actionBox.innerHTML = `
        <button class="btn-base" onclick="openStatusModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
          프로필 편집
        </button>
      `;
    } else {
      actionBox.innerHTML = `
        <button class="btn-base" id="shareBtn" onclick="copyProfileLink()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
          프로필 공유
        </button>
      `;
    }
  }

  async function loadUserPostsCountAndLikes() {
    try {
      const posts = await api(`/posts?author_id=eq.${encodeURIComponent(viewingUserId)}&select=*&order=created_at.desc`);
      const allFetched = posts || [];
      
      // 본인이 보는 마이페이지가 아니라 타인이 방문한 프로필인 경우 비공개/일부공개 게시물 수량 필터링
      const isMe = currentUser && String(currentUser.id) === String(viewingUserId);
      const visiblePosts = isMe ? allFetched : allFetched.filter(p => p.access !== 'private' && p.access !== 'link');
      
      document.getElementById('cntPosts').textContent = visiblePosts.length;

      let totalLikes = 0;
      if (visiblePosts.length > 0) {
        for (const p of visiblePosts) {
          const lData = await api(`/likes?post_id=eq.${p.id}&select=id`);
          if (lData) totalLikes += lData.length;
        }
      }
      document.getElementById('cntLikes').textContent = totalLikes;
    } catch (e) {
      console.warn('카운팅 데이터 바인딩 오류 무시:', e);
    }
  }

  window.switchSubTab = function(tabName) {
    currentTab = tabName;
    document.getElementById('tabPostsBtn').classList.toggle('active', tabName === 'posts');
    document.getElementById('tabInfoBtn').classList.toggle('active', tabName === 'info');

    const wrapper = document.getElementById('tabContentWrapper');
    wrapper.innerHTML = '';

    if (tabName === 'posts') {
      wrapper.innerHTML = `<div class="posts-grid" id="userPostsTimeline"></div>`;
      loadUserPosts();
    } else {
      const joinDate = viewingUser && viewingUser.created_at ? new Date(viewingUser.created_at).toLocaleDateString('ko-KR', {
        year: 'numeric', month: 'long', day: 'numeric'
      }) : '확인 불가';
      
      wrapper.innerHTML = `
        <div style="background:var(--bg2); border:1px solid var(--border2); border-radius:var(--r3); padding:24px; display:flex; flex-direction:column; gap:16px;">
          <div style="font-size:14px; color:var(--t2);">고유 식별 정보 코드: <span style="color:var(--t1); font-family:monospace; margin-left:6px;">${viewingUser.id}</span></div>
          <div style="font-size:14px; color:var(--t2);">가입일 및 활동 시작일: <span style="color:var(--t1); margin-left:6px;">${joinDate}</span></div>
        </div>
      `;
    }
  };

  async function loadUserPosts() {
    const timeline = document.getElementById('userPostsTimeline');
    if (!timeline) return;
    timeline.innerHTML = '<div class="no-data-notice">게시물을 가져오는 중...</div>';

    try {
      // 오리지널 불러오기 주소 구조 유지
      const posts = await api(`/posts?author_id=eq.${encodeURIComponent(viewingUserId)}&select=*&order=created_at.desc`);
      timeline.innerHTML = '';

      const allFetched = posts || [];
      
      // 본인이 자신의 프로필을 확인하는 경우에는 비공개 게시물이 보이도록 허용하고,
      // 다른 사용자가 타인의 프로필을 확인하는 경우에는 비공개(private) 및 일부공개(link) 게시물이 보이지 않도록 클라이언트 필터링 처리합니다.
      const isMe = currentUser && String(currentUser.id) === String(viewingUserId);
      const visiblePosts = isMe ? allFetched : allFetched.filter(post => post.access !== 'private' && post.access !== 'link');

      if (visiblePosts.length === 0) {
        timeline.innerHTML = '<div class="no-data-notice">작성된 공개 게시물이 존재하지 않습니다.</div>';
        return;
      }

      visiblePosts.forEach(post => {
        const card = document.createElement('div');
        card.className = 'post-card';

        const tStr = post.created_at ? new Date(post.created_at).toLocaleString('ko-KR', {
          month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
        }) : '';

        let imgBlock = '';
        if (post.image_url) {
          const arr = post.image_url.split(',').filter(Boolean);
          if (arr.length > 0) {
            const gridCls = `count-${Math.min(arr.length, 5)}`;
            let gridItems = '';
            arr.slice(0, 5).forEach((url, i) => {
              const hasMore = i === 4 && arr.length > 5;
              gridItems += `
                <div class="image-grid-item">
                  <img src="${url}" loading="lazy" alt="img">
                  ${hasMore ? `<div class="image-more-overlay">+${arr.length - 5}</div>` : ''}
                </div>
              `;
            });
            imgBlock = `
              <div class="post-image-container" onclick="window.location.href='view.html?id=${post.id}'">
                <div class="image-grid ${gridCls}">${gridItems}</div>
              </div>
            `;
          }
        }

        const parsedContent = post.content ? markdownToHtml(post.content) : '';

        // 비공개 상태 배지 텍스트 유무 가독성 표시 처리 (본인 전용)
        let lockBadge = '';
        if (isMe && post.access === 'private') lockBadge = ' <span style="color:var(--pink); font-size:11px; margin-left:4px;">🔒 비공개</span>';
        if (isMe && post.access === 'link') lockBadge = ' <span style="color:var(--green); font-size:11px; margin-left:4px;">🔗 링크 공개</span>';

        card.innerHTML = `
          <div class="post-header">
            <span class="post-time">${tStr}${lockBadge}</span>
          </div>
          ${parsedContent ? `<div class="post-content" onclick="window.location.href='view.html?id=${post.id}'" style="cursor:pointer;">${parsedContent}</div>` : ''}
          ${imgBlock}
          <div class="post-actions">
            <button class="action-btn-item" id="lBtn-${post.id}" onclick="event.stopPropagation(); toggleLike('${post.id}')">
              <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
              <span id="lCnt-${post.id}">0</span>
            </button>
            <button class="action-btn-item" onclick="window.location.href='view.html?id=${post.id}'">
              <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
              <span id="cCnt-${post.id}">0</span>
            </button>
          </div>
        `;

        timeline.appendChild(card);
        loadLiveStats(post.id);
      });

    } catch (e) {
      timeline.innerHTML = '<div class="no-data-notice" style="color:var(--pink);">타임라인 피드를 불러오지 못했습니다.</div>';
    }
  }

  async function loadLiveStats(postId) {
    try {
      const likes = await api(`/likes?post_id=eq.${postId}&select=id,user_id`);
      const lCnt = document.getElementById(`lCnt-${postId}`);
      if (lCnt) lCnt.textContent = likes ? likes.length : 0;

      if (currentUser && likes) {
        const isL = likes.some(l => String(l.user_id) === String(currentUser.id));
        const btn = document.getElementById(`lBtn-${postId}`);
        if (btn && isL) btn.classList.add('liked');
      }

      const comments = await api(`/comments?post_id=eq.${postId}&select=id`);
      const cCnt = document.getElementById(`cCnt-${postId}`);
      if (cCnt) cCnt.textContent = comments ? comments.length : 0;
    } catch {}
  }

  window.toggleLike = async function(postId) {
    if (!currentUser) { alert('로그인이 필요한 기능입니다.'); return; }
    const btn = document.getElementById(`lBtn-${postId}`);
    const cnt = document.getElementById(`lCnt-${postId}`);
    if (!btn || !cnt) return;

    const isL = btn.classList.contains('liked');
    let num = parseInt(cnt.textContent || '0');

    try {
      if (isL) {
        btn.classList.remove('liked');
        cnt.textContent = Math.max(0, num - 1);
        await api(`/likes?post_id=eq.${postId}&user_id=eq.${encodeURIComponent(currentUser.id)}`, { method: "DELETE" });
      } else {
        btn.classList.add('liked');
        cnt.textContent = num + 1;
        await api("/likes", { method: "POST", body: JSON.stringify({ post_id: postId, user_id: currentUser.id }) });
      }
    } catch {
      if (isL) { btn.classList.add('liked'); cnt.textContent = num; }
      else { btn.classList.remove('liked'); cnt.textContent = num; }
    }
  };

  window.openStatusModal = () => {
    document.getElementById('statusInput').value = viewingUser.message || '';
    document.getElementById('statusModal').classList.add('open');
  };
  window.closeStatusModal = () => {
    document.getElementById('statusModal').classList.remove('open');
  };

  window.saveStatusMsg = async () => {
    const newMessage = document.getElementById('statusInput').value.trim();
    if (!currentUser) { alert('로그인이 필요합니다.'); return; }
    try {
      await api(`/users?id=eq.${encodeURIComponent(currentUser.id)}`, {
        method: "PATCH",
        body: JSON.stringify({ message: newMessage }),
        headers: { "Prefer": "return=minimal" }
      });
      viewingUser.message = newMessage;
      await displayProfile(viewingUser);
      closeStatusModal();
    } catch (e) {
      console.error('상태메시지 저장 실패:', e);
      alert('상태메시지 저장에 실패했습니다.');
    }
  };

  document.getElementById('statusModal').addEventListener('click', function(e) {
    if (e.target === this) closeStatusModal();
  });

  window.goBack = () => { NProgress.start(); window.history.back(); };
  window.showPrivacyPolicy = () => { NProgress.start(); window.location.href = "privacy.html"; };
  window.showTerms = () => { NProgress.start(); window.location.href = "policy.html"; };

  window.copyProfileLink = function() {
    navigator.clipboard.writeText(window.location.href).then(() => {
      const btn = document.getElementById('shareBtn');
      if (!btn) return;
      btn.classList.add('success');
      setTimeout(() => btn.classList.remove('success'), 1500);
    }).catch(err => {
      console.error('링크 복사 실패:', err);
    });
  };
</script>
</body>
</html>
