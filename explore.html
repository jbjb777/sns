<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>탐색 : Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; min-height: 100vh; display: flex; overflow: hidden; }
  
    .sidebar-container {
      width: 72px;
      min-width: 72px;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 100;
    }
    .sidebar-container iframe {
      width: 72px !important;
      height: 100%;
      border: none;
    }
    .main-wrapper {
      margin-left: 72px;
      width: calc(100% - 72px);
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100svh;
      overflow: hidden;
    }
    .shorts-container {
      flex: 1;
      position: relative;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none; /* Firefox */
    }
    .shorts-container::-webkit-scrollbar {
      display: none; /* Chrome, Safari, Opera */
    }
    .short-slide {
      width: 100%;
      height: 100vh;
      height: 100svh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      background: #000;
      border-bottom: 1px solid #222;
    }
    .short-content-box {
      width: 100%;
      max-width: 480px;
      height: 100%;
      position: relative;
      background: #111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }
    
    /* 미디어 영역 */
    .media-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #050505;
      z-index: 1;
    }
    .media-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .no-image-bg {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      text-align: center;
    }
    .no-image-text {
      font-size: 18px;
      line-height: 1.6;
      color: #e0e0e0;
      max-height: 60%;
      overflow-y: auto;
      word-break: break-all;
      white-space: pre-wrap;
    }

    /* 하단 오버레이 그래디언트 */
    .bottom-gradient-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 250px;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0) 100%);
      z-index: 2;
      pointer-events: none;
    }

    /* 포스트 정보 디테일 오버레이 */
    .post-details-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 30px 80px 30px 24px;
      z-index: 3;
    }
    .author-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .author-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
      color: #fff;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
    }
    .author-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .author-name-text {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      cursor: pointer;
    }
    .author-name-text:hover { text-decoration: underline; }
    .post-caption-text {
      font-size: 14px;
      line-height: 1.5;
      color: #f0f0f0;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      word-break: break-all;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      max-height: 65px;
      cursor: pointer;
    }
    .post-caption-text.expanded {
      display: block;
      overflow: visible;
      max-height: 200px;
      overflow-y: auto;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 8px;
    }

    /* 우측 고정 액션 유틸 버튼 단추 바 */
    .right-action-bar {
      position: absolute;
      right: 12px;
      bottom: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      z-index: 4;
    }
    .action-circle-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(40, 40, 40, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
    }
    .action-circle-btn:hover { background: rgba(60, 60, 60, 0.8); transform: scale(1.05); }
    .action-circle-btn:active { transform: scale(0.95); }
    .action-circle-btn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2.2; }
    
    .action-circle-btn.liked { color: #ff6b6b; background: rgba(255, 107, 107, 0.15); border-color: rgba(255, 107, 107, 0.3); }
    .action-circle-btn.liked svg { fill: #ff6b6b; }
    
    .action-item-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .action-counter-num {
      font-size: 12px;
      font-weight: 500;
      color: #e0e0e0;
      text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    }

    /* ─── COMMENT SIDE PANEL ─── */
    .comment-side-panel {
      position: absolute;
      bottom: -100%;
      left: 0;
      width: 100%;
      height: 65%;
      background: #1a1a1a;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      z-index: 10;
      transition: bottom 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.125);
      display: flex;
      flex-direction: column;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
    }
    .comment-side-panel.open { bottom: 0; }
    
    .panel-header-row {
      padding: 18px 20px;
      border-bottom: 1px solid #2b2b2b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-title-text { font-size: 15px; font-weight: 600; color: #fff; }
    .panel-close-btn { background: none; border: none; color: #888; cursor: pointer; display: flex; }
    .panel-close-btn:hover { color: #fff; }

    .comment-list-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 15px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .comment-node-unit { display: flex; gap: 12px; position: relative; }
    .comment-node-unit:hover .comment-delete-btn { display: inline-flex; }
    .cmt-avatar { width: 30px; height: 30px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; overflow: hidden; flex-shrink: 0; }
    .cmt-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .cmt-body-box { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .cmt-meta-info { display: flex; align-items: center; gap: 8px; }
    .cmt-author-name { font-size: 13px; font-weight: 600; color: #fff; }
    .cmt-time-label { font-size: 11px; color: #666; }
    .cmt-main-text { font-size: 13.5px; color: #dddddd; line-height: 1.4; word-break: break-all; }
    .comment-delete-btn { position: absolute; right: 0; top: 2px; background: none; border: none; color: #555; cursor: pointer; display: none; align-items: center; }
    .comment-delete-btn:hover { color: #ff6b6b; }

    .comment-input-dock {
      padding: 14px 20px;
      border-top: 1px solid #2b2b2b;
      background: #151515;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .comment-text-field {
      flex: 1;
      background: #252525;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 10px 16px;
      color: #fff;
      font-size: 13.5px;
      outline: none;
      font-family: inherit;
    }
    .comment-text-field:focus { border-color: #444; background: #2a2a2a; }
    .comment-submit-btn {
      background: none; border: none; color: #fff; font-weight: 600; font-size: 13.5px; cursor: pointer; padding: 5px; transition: opacity 0.15s;
    }
    .comment-submit-btn:disabled { opacity: 0.3; cursor: default; }

    /* 빈 데이터 센터 */
    .no-posts {
      display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; color: #666; gap: 14px;
    }
    .no-posts-icon { font-size: 40px; }
    .no-posts-text { font-size: 14px; text-align: center; line-height: 1.6; }

    @media (max-width: 768px) {
      .sidebar-container { display: none; }
      .main-wrapper { margin-left: 0; width: 100%; }
      .short-content-box { max-width: 100%; }
    }
  </style>
</head>
<body>

  <div class="sidebar-container">
    <iframe src="sidebar.html"></iframe>
  </div>

  <div class="main-wrapper">
    <div class="shorts-container" id="shortsContainer">
      <div class="no-posts">
        <div class="no-posts-icon">🔄</div>
        <div class="no-posts-text">게시물을 가져오는 중입니다...</div>
      </div>
    </div>
  </div>

<script>
  const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";
  let currentUser = null;
  let shortsDataList = [];
  
  async function api(endpoint, options = {}) {
    const res = await fetch(API_BASE + endpoint, {
      ...options,
      headers: { "Content-Type": "application/json", ...(options.headers || {}) }
    });
    if (!res.ok) {
      let t = ""; try { t = await res.text(); } catch {}
      throw new Error(`오류: ${res.status} - ${t}`);
    }
    if (res.status === 204 || res.headers.get("content-length") === "0") return null;
    try { return await res.json(); } catch { return null; }
  }

  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('snsUser');
    if (saved) currentUser = JSON.parse(saved);
    fetchShortsFeed();
  });

  async function fetchShortsFeed() {
    try {
      // 오리지널 주소 규격 유지
      const posts = await api("/posts?select=*&order=created_at.desc");
      const fetched = posts || [];
      
      // 비공개(private) 및 일부공개(link)로 설정된 게시물은 탐색 탭에서 보이지 않도록 클라이언트 필터링 처리
      shortsDataList = fetched.filter(post => post.access !== 'private' && post.access !== 'link');

      if (shortsDataList.length === 0) {
        showNoPosts();
        return;
      }

      renderShortsDOM();
    } catch (e) {
      console.error(e);
      showError();
    }
  }

  function renderShortsDOM() {
    const container = document.getElementById('shortsContainer');
    container.innerHTML = '';

    shortsDataList.forEach((post, index) => {
      const slide = document.createElement('div');
      slide.className = 'short-slide';
      slide.id = `slide-${post.id}`;

      // 첫 장 이미지 매핑 매퍼 구조체
      let mediaHtml = '';
      if (post.image_url) {
        const firstImg = post.image_url.split(',')[0];
        mediaHtml = `<div class="media-container"><img src="${firstImg}" alt="short-img" loading="lazy"></div>`;
      } else {
        mediaHtml = `
          <div class="media-container">
            <div class="no-image-bg">
              <div class="no-image-text">${escapeHtml(post.content || '')}</div>
            </div>
          </div>
        `;
      }

      const initial = (post.author ? post.author[0] : '?').toUpperCase();

      slide.innerHTML = `
        <div class="short-content-box">
          ${mediaHtml}
          <div class="bottom-gradient-overlay"></div>
          
          <div class="post-details-overlay">
            <div class="author-row">
              <div class="author-avatar" id="avatar-${post.id}" onclick="goToProfile('${post.author_id}', '${post.author}')">${initial}</div>
              <span class="author-name-text" onclick="goToProfile('${post.author_id}', '${post.author}')">${escapeHtml(post.author || '익명')}</span>
            </div>
            ${post.image_url ? `<p class="post-caption-text" onclick="this.classList.toggle('expanded')">${escapeHtml(post.content || '')}</p>` : ''}
          </div>

          <div class="right-action-bar">
            <div class="action-item-wrap">
              <button class="action-circle-btn" id="likeBtn-${post.id}" onclick="handleShortLike('${post.id}')">
                <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
              </button>
              <span class="action-counter-num" id="likeCnt-${post.id}">0</span>
            </div>

            <div class="action-item-wrap">
              <button class="action-circle-btn" onclick="openCommentPanel('${post.id}')">
                <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
              </button>
              <span class="action-counter-num" data-comment-count="${post.id}">0</span>
            </div>
          </div>

          <div class="comment-side-panel" id="panel-${post.id}">
            <div class="panel-header-row">
              <span class="panel-title-text">댓글</span>
              <button class="panel-close-btn" onclick="closeCommentPanel('${post.id}')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
              </button>
            </div>
            <div class="comment-list-scroll" id="cmtList-${post.id}">
              <div style="text-align:center; color:#555; padding:20px; font-size:13px;">댓글을 불러오는 중...</div>
            </div>
            <div class="comment-input-dock">
              <input type="text" class="comment-text-field" id="cmtIn-${post.id}" placeholder="댓글 달기..." onkeydown="if(event.key==='Enter') submitComment('${post.id}')">
              <button class="comment-submit-btn" id="cmtSubmitBtn-${post.id}" onclick="submitComment('${post.id}')">게시</button>
            </div>
          </div>

        </div>
      `;

      container.appendChild(slide);
      
      fetchAuthorImage(post.id, post.author_id);
      loadLiveCounts(post.id);
    });
  }

  async function fetchAuthorImage(postId, authorId) {
    if(!authorId) return;
    try {
      const u = await api(`/users?id=eq.${encodeURIComponent(authorId)}&select=profile_image`);
      if(u && u[0] && u[0].profile_image) {
        const el = document.getElementById(`avatar-${postId}`);
        if(el) el.innerHTML = `<img src="${u[0].profile_image}">`;
      }
    } catch {}
  }

  async function loadLiveCounts(postId) {
    try {
      const likes = await api(`/likes?post_id=eq.${postId}&select=id,user_id`);
      const likeCnt = document.getElementById(`likeCnt-${postId}`);
      if (likeCnt) likeCnt.textContent = likes ? likes.length : 0;

      if (currentUser && likes) {
        const hasL = likes.some(l => String(l.user_id) === String(currentUser.id));
        const btn = document.getElementById(`likeBtn-${postId}`);
        if (btn && hasL) btn.classList.add('liked');
      }

      const comments = await api(`/comments?post_id=eq.${postId}&select=id`);
      const cmtCountEl = document.querySelector(`[data-comment-count="${postId}"]`);
      if (cmtCountEl) cmtCountEl.textContent = comments ? comments.length : 0;
    } catch {}
  }

  window.handleShortLike = async function(postId) {
    if (!currentUser) { alert('로그인이 필요합니다.'); return; }
    const btn = document.getElementById(`likeBtn-${postId}`);
    const countEl = document.getElementById(`likeCnt-${postId}`);
    if (!btn || !countEl) return;

    const isL = btn.classList.contains('liked');
    let num = parseInt(countEl.textContent || '0');

    try {
      if (isL) {
        btn.classList.remove('liked');
        countEl.textContent = Math.max(0, num - 1);
        await api(`/likes?post_id=eq.${postId}&user_id=eq.${encodeURIComponent(currentUser.id)}`, { method: "DELETE" });
      } else {
        btn.classList.add('liked');
        countEl.textContent = num + 1;
        await api("/likes", { method: "POST", body: JSON.stringify({ post_id: postId, user_id: currentUser.id }) });
      }
    } catch {
      if (isL) { btn.classList.add('liked'); countEl.textContent = num; }
      else { btn.classList.remove('liked'); countEl.textContent = num; }
    }
  };

  window.openCommentPanel = function(postId) {
    const panel = document.getElementById(`panel-${postId}`);
    if(panel) {
      panel.classList.add('open');
      loadComments(postId);
    }
  };

  window.closeCommentPanel = function(postId) {
    const panel = document.getElementById(`panel-${postId}`);
    if(panel) panel.classList.remove('open');
  };

  async function loadComments(postId) {
    const scrollBox = document.getElementById(`cmtList-${postId}`);
    if (!scrollBox) return;

    try {
      const data = await api(`/comments?post_id=eq.${postId}&select=*&order=created_at.asc`);
      scrollBox.innerHTML = '';
      const list = data || [];

      if (list.length === 0) {
        scrollBox.innerHTML = '<div style="text-align:center; color:#555; padding:30px 0; font-size:13px;">아직 댓글이 없습니다. 첫 댓글을 남겨보세요!</div>';
        return;
      }

      for (const cmt of list) {
        const node = document.createElement('div');
        node.className = 'comment-node-unit';
        const init = (cmt.author ? cmt.author[0] : '?').toUpperCase();
        
        const isMyCmt = currentUser && String(cmt.user_id) === String(currentUser.id);
        const delBtn = isMyCmt ? `<button class="comment-delete-btn" onclick="deleteComment('${cmt.id}', '${postId}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>` : '';

        node.innerHTML = `
          <div class="cmt-avatar" id="cmtAv-${cmt.id}">${init}</div>
          <div class="cmt-body-box">
            <div class="cmt-meta-info">
              <span class="cmt-author-name">${escapeHtml(cmt.author || '익명')}</span>
              <span class="cmt-time-label">${cmt.created_at ? new Date(cmt.created_at).toLocaleDateString() : ''}</span>
            </div>
            <div class="cmt-main-text">${escapeHtml(cmt.content || '')}</div>
          </div>
          ${delBtn}
        `;
        scrollBox.appendChild(node);
        fetchCmtUserAvatar(cmt.id, cmt.user_id);
      }
    } catch {
      scrollBox.innerHTML = '<div style="text-align:center; color:#ff6b6b; padding:20px; font-size:13px;">댓글을 가져오지 못했습니다.</div>';
    }
  }

  async function fetchCmtUserAvatar(cmtId, userId) {
    if(!userId) return;
    try {
      const u = await api(`/users?id=eq.${encodeURIComponent(userId)}&select=profile_image`);
      if (u && u[0] && u[0].profile_image) {
        const box = document.getElementById(`cmtAv-${cmtId}`);
        if(box) box.innerHTML = `<img src="${u[0].profile_image}">`;
      }
    } catch {}
  }

  window.submitComment = async function(postId) {
    if (!currentUser) { alert('로그인이 필요한 기능입니다.'); return; }
    const input = document.getElementById(`cmtIn-${postId}`);
    const submitBtn = document.getElementById(`cmtSubmitBtn-${postId}`);
    const txt = input.value.trim();
    if (!txt) return;

    submitBtn.disabled = true;
    try {
      await api("/comments", {
        method: "POST",
        body: JSON.stringify({
          post_id: postId,
          user_id: currentUser.id,
          author: currentUser.nickname,
          content: txt,
          created_at: new Date().toISOString()
        })
      });
      input.value = '';
      await loadComments(postId);
      const countEl = document.querySelector(`[data-comment-count="${postId}"]`);
      if (countEl) countEl.textContent = parseInt(countEl.textContent || '0') + 1;
    } catch (e) {
      console.error('댓글 업로드 오류:', e);
      alert('댓글 업로드에 실패했습니다.');
    } finally {
      submitBtn.disabled = false;
    }
  };

  window.deleteComment = async function(commentId, postId) {
    if (!confirm('댓글을 삭제하시겠습니까?')) return;
    try {
      await api(`/comments?id=eq.${commentId}`, { method: "DELETE" });
      await loadComments(postId);
      const countEl = document.querySelector(`[data-comment-count="${postId}"]`);
      if (countEl) {
        countEl.textContent = Math.max(0, parseInt(countEl.textContent || '0') - 1);
      }
    } catch (e) {
      console.error('댓글 삭제 오류:', e);
      alert('삭제에 실패했습니다.');
    }
  };

  window.goToProfile = function(userId, nickname) {
    window.location.href = `user.html?id=${userId}&nickname=${encodeURIComponent(nickname)}`;
  };

  function showNoPosts() {
    document.getElementById('shortsContainer').innerHTML = `
      <div class="no-posts">
        <div class="no-posts-icon">📭</div>
        <div class="no-posts-text">아직 게시물이 없습니다.<br>첫 번째 게시물을 작성해보세요!</div>
      </div>
    `;
  }

  function showError() {
    document.getElementById('shortsContainer').innerHTML = `
      <div class="no-posts">
        <div class="no-posts-icon">⚠️</div>
        <div class="no-posts-text">데이터를 불러오는 도중 오류가 발생했습니다.</div>
      </div>
    `;
  }

  function escapeHtml(unsafe) {
    return unsafe
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }
</script>
</body>
</html>
