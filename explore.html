<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>탐색 : Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; min-height: 100vh; display: flex; overflow: hidden; }
  
    .sidebar-container {
      width: 72px;
      min-width: 72px;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 100;
    }
    .sidebar-container iframe {
      width: 72px !important;
      height: 100%;
      border: none;
    }
    .main-wrapper {
      margin-left: 72px;
      width: calc(100% - 72px);
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100svh;
      overflow: hidden;
    }
    .shorts-container {
      flex: 1;
      position: relative;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      background: #000;
    }
    /* 크롬/사파리 스크롤바 숨기기 */
    .shorts-container::-webkit-scrollbar { display: none; }
    .shorts-container { -ms-overflow-style: none; scrollbar-width: none; }

    .short-slide {
      width: 100%;
      height: 100vh;
      height: 100svh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
    }
    
    /* 9:16 비율 미디어 컨테이너 */
    .media-container {
      position: relative;
      width: 100%;
      max-width: 440px;
      height: 100%;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .media-container img, .media-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    /* 미디어가 없을 때 보여주는 텍스트 전용 배경 그라데이션 패널 */
    .text-only-bg {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1e1e1e, #2d1b4e, #142847);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      box-sizing: border-box;
    }

    /* 슬라이드 내부 하단/우측 UI 오버레이 */
    .overlay-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 40px 20px 24px 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0) 100%);
      z-index: 10;
      pointer-events: none;
    }
    .overlay-bottom * { pointer-events: auto; }

    .user-info-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .user-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #333;
      border: 1px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 14px; color: #fff;
      overflow: hidden; cursor: pointer;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-size: 15px; font-weight: 600; text-shadow: 0 1px 3px rgba(0,0,0,0.6); cursor: pointer; }
    .user-name:hover { text-decoration: underline; }

    .post-caption {
      font-size: 14px;
      line-height: 1.5;
      color: #eaeaea;
      max-height: 80px;
      overflow-y: auto;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      white-space: pre-wrap;
    }
    .post-caption::-webkit-scrollbar { display: none; }

    /* 우측 고정 액션 버튼들 */
    .overlay-right-actions {
      position: absolute;
      bottom: 30px;
      right: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      z-index: 15;
    }
    .action-btn-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      background: none;
      border: none;
      color: #fff;
    }
    .action-icon-circle {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(30, 30, 30, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s;
    }
    .action-btn-item:hover .action-icon-circle { transform: scale(1.08); background: rgba(50,50,50,0.6); }
    .action-btn-item:active .action-icon-circle { transform: scale(0.95); }
    
    .action-icon-circle svg { width: 22px; height: 22px; fill: currentColor; }
    .action-label { font-size: 11px; font-weight: 500; text-shadow: 0 1px 3px rgba(0,0,0,0.8); color: #ccc; }

    /* 좋아요 전용 액티브 색상 */
    .action-btn-item.liked .action-icon-circle { color: #ff4757; }

    /* ─── 하단에서 올라오는 커스텀 댓글 창 시트 ─── */
    .comments-bottom-sheet {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translate(-50%, 100%);
      width: 100%; max-width: 440px;
      height: 65vh;
      background: #1c1c1e;
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      box-shadow: 0 -8px 24px rgba(0,0,0,0.5);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .comments-bottom-sheet.open { transform: translate(-50%, 0); }

    .sheet-header {
      padding: 14px 16px;
      border-bottom: 1px solid #2c2c2e;
      display: flex; justify-content: space-between; align-items: center;
    }
    .sheet-title { font-size: 15px; font-weight: 600; }
    .sheet-close-btn { background: none; border: none; color: #999; cursor: pointer; font-size: 18px; padding: 4px; }

    .sheet-comments-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .comment-item { display: flex; gap: 10px; align-items: flex-start; position: relative; }
    .comment-avatar {
      width: 32px; height: 32px; border-radius: 50%; background: #444;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: bold; overflow: hidden; flex-shrink: 0;
    }
    .comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
    
    .comment-content-box { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .comment-author-name { font-size: 13px; font-weight: 600; color: #aaa; }
    .comment-text { font-size: 13.5px; color: #fff; line-height: 1.4; white-space: pre-wrap; }
    .comment-date { font-size: 11px; color: #666; margin-top: 2px; }
    
    .comment-delete-btn {
      background: none; border: none; color: #555; font-size: 11px; cursor: pointer;
      align-self: center; padding: 4px 6px; border-radius: 4px;
    }
    .comment-delete-btn:hover { color: #ff4757; background: rgba(255,71,87,0.1); }

    .sheet-input-form {
      padding: 12px 16px;
      border-top: 1px solid #2c2c2e;
      background: #1c1c1e;
      display: flex; gap: 10px; align-items: center;
    }
    .sheet-input-field {
      flex: 1; background: #2c2c2e; border: none; outline: none;
      padding: 10px 14px; border-radius: 20px; color: #fff; font-size: 13.5px;
    }
    .sheet-input-field::placeholder { color: #777; }
    .sheet-submit-btn {
      background: none; border: none; color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; padding: 6px 10px; display: flex; align-items: center; justify-content: center;
    }
    .sheet-submit-btn:disabled { color: #444; cursor: not-allowed; }

    /* 백드롭 오버레이 */
    .sheet-backdrop {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4); z-index: 190; display: none;
    }
    .sheet-backdrop.open { display: block; }

    /* 텅 비어있을 때 알림 UI */
    .no-posts, .no-comments {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; color: #666; padding: 40px 20px; width: 100%; height: 100%;
    }
    .no-posts-icon, .no-comments-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.7; }
    .no-posts-text, .no-comments-text { font-size: 14px; line-height: 1.5; color: #888; }

    /* ─── 다중 이미지 내비게이션 요소 ─── */
    .image-nav-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
      color: #fff; font-size: 14px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 8; transition: background 0.2s;
    }
    .image-nav-btn:hover { background: rgba(0,0,0,0.7); }
    .image-nav-prev { left: 10px; }
    .image-nav-next { right: 10px; }
    
    .image-index-indicator {
      position: absolute; top: 14px; right: 14px;
      background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 500; color: #ddd; z-index: 8;
    }

    /* 반응형 구조 조정 */
    @media (max-width: 768px) {
      .sidebar-container { display: none; }
      .main-wrapper { margin-left: 0; width: 100%; }
    }
  </style>
</head>
<body>

  <div class="sidebar-container">
    <iframe src="sidebar.html"></iframe>
  </div>

  <div class="main-wrapper">
    <div class="shorts-container" id="shortsContainer">
      </div>
  </div>

  <div class="sheet-backdrop" id="sheetBackdrop" onclick="closeCommentsSheet()"></div>
  <div class="comments-bottom-sheet" id="commentsBottomSheet">
    <div class="sheet-header">
      <span class="sheet-title">댓글</span>
      <button class="sheet-close-btn" onclick="closeCommentsSheet()">✕</button>
    </div>
    <div class="sheet-comments-list" id="sheetCommentsList">
      </div>
    <div class="sheet-input-form">
      <input type="text" class="sheet-input-field" id="commentInputField" placeholder="댓글을 입력하세요..." oninput="toggleCommentSubmitBtn()">
      <button class="sheet-submit-btn" id="commentSubmitBtn" disabled>게시</button>
    </div>
  </div>

<script>
  const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";
  let currentUser = null;
  let activeCommentsPostId = null;

  // Supabase 전용 공용 API 비동기 처리기
  async function api(endpoint, options = {}) {
    const res = await fetch(API_BASE + endpoint, {
      ...options,
      headers: {
        "Content-Type": "application/json",
        ...(options.headers || {}),
      },
    });
    if (!res.ok) {
      let errTxt = ""; try { errTxt = await res.text(); } catch {}
      throw new Error(`오류 발생 (${res.status}): ${errTxt}`);
    }
    if (res.status === 204 || res.headers.get("content-length") === "0") return null;
    try { return await res.json(); } catch { return null; }
  }

  // 초기 시작 초기화
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('snsUser');
    if (saved) currentUser = JSON.parse(saved);
    loadPosts();
  });

  // 게시물 정보 데이터 가져오기 (비공개, 일부 공개 제외 필터링 반영)
  async function loadPosts() {
    try {
      // access=eq.public 조건을 추가하여 공개 범위가 public인 게시물만 조회합니다.
      const posts = await api("/posts?access=eq.public&select=*&order=created_at.desc");
      if (!posts || posts.length === 0) {
        showNoPosts();
        return;
      }
      renderPosts(posts);
    } catch (e) {
      console.error('게시물 연동 오류:', e);
      showError();
    }
  }

  // 숏폼 구조 UI 렌더링 엔진
  function renderPosts(posts) {
    const container = document.getElementById('shortsContainer');
    container.innerHTML = '';

    posts.forEach(post => {
      const slide = document.createElement('div');
      slide.className = 'short-slide';
      slide.id = `slide-${post.id}`;

      // 미디어 분기 처리 로직 (다중 이미지 파싱)
      let mediaHtml = '';
      const imageUrls = post.image_url ? post.image_url.split(',').filter(Boolean) : [];

      if (imageUrls.length > 0) {
        // 단일 이미지 또는 다중 이미지 슬라이더 적용 구조 생성
        mediaHtml = `
          <div class="media-container" id="media-view-${post.id}">
            ${imageUrls.length > 1 ? `<div class="image-index-indicator">1 / ${imageUrls.length}</div>` : ''}
            <img src="${imageUrls[0]}" class="current-slide-img" id="img-target-${post.id}">
            ${imageUrls.length > 1 ? `
              <button class="image-nav-btn image-nav-prev" style="display:none;" onclick="navigateImage('${post.id}', -1)">❮</button>
              <button class="image-nav-btn image-nav-next" onclick="navigateImage('${post.id}', 1)">❯</button>
            ` : ''}
          </div>
        `;
        // 다중 이미지 주소 상태 데이터 바인딩 저장
        slide.dataset.images = JSON.stringify(imageUrls);
        slide.dataset.currentImgIdx = 0;
      } else {
        // 이미지 미첨부 시 텍스트 가독성을 보완하는 패널 바인딩
        mediaHtml = `
          <div class="media-container">
            <div class="text-only-bg">
              <div style="font-size:16px; color:#fff; font-weight:500; text-align:center; line-height:1.6; max-height:80%; overflow-y:auto; word-break:break-all; width:100%;">
                ${escapeHtml(post.content || '')}
              </div>
            </div>
          </div>
        `;
      }

      // 글자 추출을 위한 기본 이니셜 아바타 처리 알고리즘
      const initial = (post.author ? post.author[0] : '?').toUpperCase();
      
      slide.innerHTML = `
        ${mediaHtml}
        
        ${post.image_url ? `
          <div class="overlay-bottom">
            <div class="user-info-row">
              <div class="user-avatar" id="avatar-${post.id}" onclick="goToProfile('${post.author_id}', '${post.author}')">${initial}</div>
              <span class="user-name" onclick="goToProfile('${post.author_id}', '${post.author}')">${escapeHtml(post.author || '익명')}</span>
            </div>
            <div class="post-caption">${escapeHtml(post.content || '')}</div>
          </div>
        ` : `
          <div class="overlay-bottom">
            <div class="user-info-row">
              <div class="user-avatar" id="avatar-${post.id}" onclick="goToProfile('${post.author_id}', '${post.author}')">${initial}</div>
              <span class="user-name" onclick="goToProfile('${post.author_id}', '${post.author}')">${escapeHtml(post.author || '익명')}</span>
            </div>
          </div>
        `}

        <div class="overlay-right-actions">
          <button class="action-btn-item" id="likeBtn-${post.id}" onclick="toggleLike('${post.id}')">
            <div class="action-icon-circle">
              <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </div>
            <span class="action-label" id="likeCount-${post.id}">0</span>
          </button>

          <button class="action-btn-item" onclick="openCommentsSheet('${post.id}')">
            <div class="action-icon-circle">
              <svg viewBox="0 0 24 24"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18zM18 14H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
            </div>
            <span class="action-label" data-comment-count="${post.id}">0</span>
          </button>

          <button class="action-btn-item" onclick="copyPostLink('${post.id}')">
            <div class="action-icon-circle">
              <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
            </div>
            <span class="action-label">공유</span>
          </button>
        </div>
      `;

      container.appendChild(slide);
      
      // 작성자의 고유 최신 프로필 아바타 이미지 불러오기 바인딩
      fetchAuthorAvatar(post.id, post.author_id);
      // 실시간 수치 데이터 카운트 동기화 로드
      loadLikesAndCommentsCounts(post.id);
    });
  }

  // 다중 이미지 내비게이터 핵심 분기 처리 함수
  window.navigateImage = function(postId, direction) {
    const slide = document.getElementById(`slide-${postId}`);
    if (!slide) return;

    const imageUrls = JSON.parse(slide.dataset.images);
    let currentIdx = parseInt(slide.dataset.currentImgIdx);

    currentIdx += direction;
    if (currentIdx < 0 || currentIdx >= imageUrls.length) return;

    slide.dataset.currentImgIdx = currentIdx;

    // UI 요소 변경 반영 업데이트
    const imgEl = document.getElementById(`img-target-${postId}`);
    if (imgEl) imgEl.src = imageUrls[currentIdx];

    const prevBtn = slide.querySelector('.image-nav-prev');
    const nextBtn = slide.querySelector('.image-nav-next');
    const indicator = slide.querySelector('.image-index-indicator');

    if (prevBtn) prevBtn.style.display = currentIdx === 0 ? 'none' : 'flex';
    if (nextBtn) nextBtn.style.display = currentIdx === imageUrls.length - 1 ? 'none' : 'flex';
    if (indicator) indicator.textContent = `${currentIdx + 1} / ${imageUrls.length}`;
  };

  // 개별 작성자의 고유 최신 프로필 사진 비동기 추적 함수
  async function fetchAuthorAvatar(postId, authorId) {
    if (!authorId) return;
    try {
      const users = await api(`/users?id=eq.${encodeURIComponent(authorId)}&select=profile_image`);
      if (users && users[0] && users[0].profile_image) {
        const targetAvatarBox = document.getElementById(`avatar-${postId}`);
        if (targetAvatarBox) {
          targetAvatarBox.innerHTML = `<img src="${users[0].profile_image}">`;
        }
      }
    } catch (e) {
      console.warn('아바타 매핑 정보 조회 생략:', e);
    }
  }

  // 좋아요 및 댓글 수 카운트 일괄 업데이트 스캔 시스템
  async function loadLikesAndCommentsCounts(postId) {
    try {
      const likes = await api(`/likes?post_id=eq.${postId}&select=id,user_id`);
      const likeCountEl = document.getElementById(`likeCount-${postId}`);
      if (likeCountEl) likeCountEl.textContent = likes ? likes.length : 0;

      // 로그인 상태 확인 후 좋아요 여부 체크 및 액티브 클래스 부여
      if (currentUser && likes) {
        const hasLiked = likes.some(l => String(l.user_id) === String(currentUser.id));
        const likeBtn = document.getElementById(`likeBtn-${postId}`);
        if (likeBtn && hasLiked) likeBtn.classList.add('liked');
      }

      const comments = await api(`/comments?post_id=eq.${postId}&select=id`);
      const commentCountEl = document.querySelector(`[data-comment-count="${postId}"]`);
      if (commentCountEl) commentCountEl.textContent = comments ? comments.length : 0;
    } catch (e) {
      console.warn('수치 데이터 초기 로드 누락 캐치:', e);
    }
  }

  // 좋아요 등록 및 취소 토글 인터랙션 컨트롤러
  window.toggleLike = async function(postId) {
    if (!currentUser) {
      alert('로그인이 필요한 기능입니다.');
      return;
    }
    const likeBtn = document.getElementById(`likeBtn-${postId}`);
    const likeCountEl = document.getElementById(`likeCount-${postId}`);
    if (!likeBtn || !likeCountEl) return;

    const isLiked = likeBtn.classList.contains('liked');
    let currentNum = parseInt(likeCountEl.textContent || '0');

    try {
      if (isLiked) {
        // 이미 누른 상태이면 제거 처리
        likeBtn.classList.remove('liked');
        likeCountEl.textContent = Math.max(0, currentNum - 1);
        await api(`/likes?post_id=eq.${postId}&user_id=eq.${encodeURIComponent(currentUser.id)}`, {
          method: "DELETE"
        });
      } else {
        // 안 누른 상태이면 등록 처리
        likeBtn.classList.add('liked');
        likeCountEl.textContent = currentNum + 1;
        await api("/likes", {
          method: "POST",
          body: JSON.stringify({
            post_id: postId,
            user_id: currentUser.id
          })
        });
      }
    } catch (e) {
      console.error('좋아요 토글 트랜잭션 오류:', e);
      // 에러 발생 시 UI 롤백 처리 연동
      if (isLiked) {
        likeBtn.classList.add('liked');
        likeCountEl.textContent = currentNum;
      } else {
        likeBtn.classList.remove('liked');
        likeCountEl.textContent = currentNum;
      }
    }
  };

  // ─── 하단 팝업 댓글창 모달 인터랙션 핸들러 ───
  window.openCommentsSheet = function(postId) {
    activeCommentsPostId = postId;
    document.getElementById('commentsBottomSheet').classList.add('open');
    document.getElementById('sheetBackdrop').classList.add('open');
    document.getElementById('commentInputField').value = '';
    toggleCommentSubmitBtn();
    loadComments(postId);
  };

  window.closeCommentsSheet = function() {
    activeCommentsPostId = null;
    document.getElementById('commentsBottomSheet').classList.remove('open');
    document.getElementById('sheetBackdrop').classList.remove('open');
  };

  window.toggleCommentSubmitBtn = function() {
    const txt = document.getElementById('commentInputField').value.trim();
    document.getElementById('commentSubmitBtn').disabled = !txt;
  };

  // 댓글 리스트 비동기 패치 렌더러
  async function loadComments(postId) {
    const listEl = document.getElementById('sheetCommentsList');
    listEl.innerHTML = '<div style="text-align:center; padding:20px; font-size:13px; color:#666;">불러오는 중...</div>';

    try {
      const comments = await api(`/comments?post_id=eq.${postId}&select=*&order=created_at.asc`);
      listEl.innerHTML = '';

      if (!comments || comments.length === 0) {
        listEl.innerHTML = `
          <div class="no-comments">
            <div class="no-comments-icon">💬</div>
            <div class="no-comments-text">아직 댓글이 없습니다.<br>첫 의견을 남겨보세요!</div>
          </div>
        `;
        return;
      }

      // 댓글 리스트 바인딩 적용 루프
      for (const comment of comments) {
        const item = document.createElement('div');
        item.className = 'comment-item';
        
        const cInitial = (comment.author ? comment.author[0] : '?').toUpperCase();
        let avatarContent = cInitial;

        // 개별 댓글 프로필 이미지 캐싱 동적 바인딩 루프 처리
        if (comment.author_id) {
          try {
            const uData = await api(`/users?id=eq.${encodeURIComponent(comment.author_id)}&select=profile_image`);
            if (uData && uData[0] && uData[0].profile_image) {
              avatarContent = `<img src="${uData[0].profile_image}">`;
            }
          } catch {}
        }

        const formattedDate = comment.created_at ? new Date(comment.created_at).toLocaleString('ko-KR', {
          month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
        }) : '';

        // 본인 작성 댓글 삭제 권한 노출 필터링 분기문
        const isMyComment = currentUser && String(comment.author_id) === String(currentUser.id);
        const deleteBtnHtml = isMyComment ? `<button class="comment-delete-btn" onclick="deleteComment('${comment.id}', '${postId}')">삭제</button>` : '';

        item.innerHTML = `
          <div class="comment-avatar">${avatarContent}</div>
          <div class="comment-content-box">
            <span class="comment-author-name" onclick="goToProfile('${comment.author_id}', '${comment.author}')">${escapeHtml(comment.author || '익명')}</span>
            <div class="comment-text">${escapeHtml(comment.content || '')}</div>
            <span class="comment-date">${formattedDate}</span>
          </div>
          ${deleteBtnHtml}
        `;

        listEl.appendChild(item);
      }
    } catch (e) {
      listEl.innerHTML = '<div style="text-align:center; padding:20px; font-size:13px; color:#ff6b6b;">댓글 로드 중 오류 발생</div>';
    }
  }

  // 댓글 추가 업로드 서브밋 바인딩 연동
  document.getElementById('commentSubmitBtn').onclick = async () => {
    if (!currentUser) {
      alert('로그인이 해제되었습니다.');
      return;
    }
    const inputEl = document.getElementById('commentInputField');
    const contentText = inputEl.value.trim();
    const postId = activeCommentsPostId;
    if (!contentText || !postId) return;

    const submitBtn = document.getElementById('commentSubmitBtn');
    submitBtn.disabled = true;

    try {
      await api("/comments", {
        method: "POST",
        body: JSON.stringify({
          post_id: postId,
          author: currentUser.nickname,
          author_id: currentUser.id,
          content: contentText,
          created_at: new Date().toISOString()
        })
      });

      inputEl.value = '';
      toggleCommentSubmitBtn();
      
      // 실시간 전용 목록 리로드 처리 및 수치 데이터 증감 동기화 카운팅
      await loadComments(postId);
      const countEl = document.querySelector(`[data-comment-count="${postId}"]`);
      if (countEl) {
        countEl.textContent = parseInt(countEl.textContent || '0') + 1;
      }
    } catch (e) {
      console.error('댓글 업로드 오류:', e);
      alert('댓글 업로드에 실패했습니다.');
    } finally {
      submitBtn.disabled = false;
    }
  };

  // 댓글 삭제 핸들러 기능
  window.deleteComment = async function(commentId, postId) {
    if (!confirm('댓글을 삭제하시겠습니까?')) return;
    try {
      await api(`/comments?id=eq.${commentId}`, { method: \"DELETE\" });
      await loadComments(postId);
      const countEl = document.querySelector(`[data-comment-count="${postId}"]`);
      if (countEl) {
        countEl.textContent = Math.max(0, parseInt(countEl.textContent || '0') - 1);
      }
    } catch (e) {
      console.error('댓글 삭제 오류:', e);
      alert('삭제에 실패했습니다.');
    }
  };

  // 프로필 보기 전환 링크 연동 함수
  window.goToProfile = function(userId, nickname) {
    window.location.href = `user.html?id=${userId}&nickname=${encodeURIComponent(nickname)}`;
  };

  // 다이렉트 게시글 단독 링크 URL 복사 엔진 클립보드 인터랙션
  window.copyPostLink = function(postId) {
    // 도메인 가변 처리 연동하여 view 페이지 연동 처리 규격화 정의
    const shareUrl = `${window.location.origin}/view.html?id=${postId}`;
    navigator.clipboard.writeText(shareUrl).then(() => {
      alert('게시물 공유 링크가 클립보드에 복사되었습니다.');
    }).catch(() => {
      alert('링크 복사에 실패했습니다.');
    });
  };

  function showNoPosts() {
    document.getElementById('shortsContainer').innerHTML = `
      <div class=\"no-posts\">
        <div class=\"no-posts-icon\">📭</div>
        <div class=\"no-posts-text\">
          아직 게시물이 없습니다.<br>
          첫 번째 게시물을 작성해보세요!
        </div>
      </div>
    `;
  }

  function showError() {
    document.getElementById('shortsContainer').innerHTML = `
      <div class=\"no-posts\">
        <div class=\"no-posts-icon\">⚠️</div>
        <div class=\"no-posts-text\">
          데이터를 로드하는 도중<br>
          문제가 발생했습니다.
        </div>
      </div>
    `;
  }

  function escapeHtml(unsafe) {
    return unsafe
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }
</script>
</body>
</html>
