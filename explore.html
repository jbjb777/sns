<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>탐색 : Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; min-height: 100vh; display: flex; overflow: hidden; }
  
    .sidebar-container {
      width: 72px;
      min-width: 72px;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 100;
    }
    .sidebar-container iframe {
      width: 72px !important;
      height: 100%;
      border: none;
    }
    .main-wrapper {
      margin-left: 72px;
      width: calc(100% - 72px);
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100svh;
      overflow: hidden;
    }
    .shorts-container {
      flex: 1;
      position: relative;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      height: 100vh;
      height: 100svh;
      scroll-behavior: smooth;
    }
    .shorts-container::-webkit-scrollbar {
      display: none;
    }
    .short-item {
      width: 100%;
      height: 100vh;
      height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      padding: 20px 20px calc(120px + env(safe-area-inset-bottom)) 20px;
    }
    .short-content {
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .short-image {
      max-width: 100%;
      max-height: 65vh;
      width: auto;
      height: auto;
      border-radius: 16px;
      object-fit: contain;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
    }
    .short-text-only {
      background: linear-gradient(135deg, #1e1e1e, #2a2a2a);
      border: 1px solid #333;
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      max-height: 70vh;
      overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .short-text-content {
      font-size: 20px;
      line-height: 1.6;
      color: #fff;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .short-text-content a {
      color: #00bfff;
      text-decoration: underline;
    }
    .short-text-content a:hover {
      color: #53b6f9;
    }
    .short-caption {
      padding: 16px 20px;
      background: rgba(30, 30, 30, 0.9);
      border-radius: 12px;
      max-width: 500px;
      width: 100%;
      backdrop-filter: blur(10px);
      border: 1px solid #333;
    }
    .short-caption-text {
      font-size: 15px;
      line-height: 1.5;
      color: #fff;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .short-caption-text a {
      color: #00bfff;
      text-decoration: underline;
    }
    .short-caption-text a:hover {
      color: #53b6f9;
    }
    .short-info-bar {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 80px;
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: auto;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .short-author-info {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      background: rgba(30, 30, 30, 0.8);
      padding: 8px 16px 8px 8px;
      border-radius: 30px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .short-author-info:hover {
      background: rgba(54, 99, 255, 0.8);
      border-color: #3663FF;
      transform: scale(1.05);
    }
    .short-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3478f6, #53b6f9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      border: 2px solid #fff;
      flex-shrink: 0;
      overflow: hidden;
    }
    .short-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .short-author-name {
      font-weight: 600;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 6px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
    }
    .verification-badge {
      display: inline-block;
      width: 14px; 
      height: 14px;
      vertical-align: middle;
      background-image: url('https://sharer.jbjb.r-e.kr/badge.svg');
      background-repeat: no-repeat;
      background-size: contain;
      background-position: center;
    }
    .short-actions {
      position: absolute;
      right: 20px;
      bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .action-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(30, 30, 30, 0.8);
      border: 2px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
      color: #fff;
      font-size: 24px;
    }
    .action-btn:hover {
      transform: scale(1.1);
      background: rgba(54, 99, 255, 0.8);
      border-color: #3663FF;
    }
    .action-btn.liked {
      background: rgba(54, 99, 255, 0.8);
      border-color: #3663FF;
    }
    .action-count {
      font-size: 11px;
      font-weight: 600;
      margin-top: 2px;
    }
    .nav-buttons {
      position: fixed;
      right: 100px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 50;
    }
    .nav-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(30, 30, 30, 0.9);
      border: 2px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
      color: #fff;
      font-size: 20px;
    }
    .nav-btn:hover {
      background: rgba(54, 99, 255, 0.9);
      border-color: #3663FF;
      transform: scale(1.1);
    }
    .nav-btn:active {
      transform: scale(0.95);
    }
    .nav-btn.disabled {
      opacity: 0.3;
      cursor: not-allowed;
      pointer-events: none;
    }
    .comment-modal {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 70vh;
      background: #1e1e1e;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom: none;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.45);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.44s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: transform;
    }
    .comment-modal.active {
      transform: translateY(0);
    }
    .comment-modal.dragging {
      transition: none;
    }
    .comment-drag-area {
      touch-action: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 10px 0;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      flex-shrink: 0;
    }
    .comment-drag-area:active {
      cursor: grabbing;
    }
    .comment-grab {
      width: 40px;
      height: 5px;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.28);
    }
    .comment-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 999;
      display: none;
      backdrop-filter: blur(4px);
    }
    .comment-modal-overlay.active {
      display: block;
    }
    .comment-modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .comment-modal-title {
      font-size: 16px;
      font-weight: 600;
    }
    .comment-close-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
    }
    .comment-modal-list {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .comment-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid #333;
    }
    .comment-item:last-child {
      border-bottom: none;
    }
    .comment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .comment-author-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }
    .comment-author-wrapper:hover {
      opacity: 0.8;
    }
    .comment-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3478f6, #53b6f9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: bold;
      flex-shrink: 0;
      overflow: hidden;
    }
    .comment-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .comment-author {
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .comment-content {
      font-size: 14px;
      color: #ddd;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .comment-content a {
      color: #00bfff;
      text-decoration: underline;
    }
    .comment-content a:hover {
      color: #53b6f9;
    }
    .comment-date {
      font-size: 12px;
      color: #666;
    }
    .comment-del-btn {
      background: none;
      border: none;
      color: #ff4444;
      font-size: 12px;
      cursor: pointer;
      padding: 4px 8px;
    }
    .comment-input-wrapper {
      padding: 16px 20px;
      border-top: 1px solid #333;
      display: flex;
      gap: 10px;
      background: #1e1e1e;
    }
    .comment-input {
      flex: 1;
      background: #121212;
      border: 1px solid #444;
      border-radius: 20px;
      padding: 10px 16px;
      color: #fff;
      font-size: 14px;
      resize: none;
      min-height: 40px;
      max-height: 100px;
    }
    .comment-input:focus {
      outline: none;
      border-color: #3663FF;
    }
    .comment-submit-btn {
      background: #3663FF;
      border: none;
      color: white;
      padding: 0 20px;
      border-radius: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
      font-size: 14px;
    }
    .comment-submit-btn:hover {
      background: #2952CC;
    }
    .comment-submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .loading-spinner {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #aaa;
    }
    .skeleton {
      background: linear-gradient(90deg, #1e1e1e 25%, #2a2a2a 50%, #1e1e1e 75%);
      background-size: 200% 100%;
      animation: loading 1.5s ease-in-out infinite;
      border-radius: 4px;
    }
    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-short-item {
      width: 100%;
      height: 100vh;
      height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      padding: 20px 20px calc(120px + env(safe-area-inset-bottom)) 20px;
    }
    .skeleton-content {
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .skeleton-image {
      width: 100%;
      max-width: 500px;
      height: 65vh;
      border-radius: 16px;
    }
    .skeleton-caption {
      width: 100%;
      max-width: 500px;
      height: 80px;
      border-radius: 12px;
    }
    .skeleton-author-bar {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 200px;
      height: 56px;
      border-radius: 30px;
    }
    .skeleton-actions {
      position: absolute;
      right: 20px;
      bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .skeleton-action-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
    }
    .no-posts {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 40px;
      text-align: center;
    }
    .no-posts-icon {
      font-size: 64px;
    }
    .no-posts-text {
      font-size: 20px;
      color: #aaa;
      line-height: 1.6;
    }

    /* ─── 모바일 프로필 시트(부모) ─── */
    .sharer-profile-sheet-host[hidden] { display: none !important; }
    .sharer-profile-sheet-host {
      position: fixed;
      inset: 0;
      z-index: 1100;
    }
    .sharer-profile-sheet-host .sps-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.34s ease;
    }
    .sharer-profile-sheet-host.sps-host-open .sps-backdrop {
      opacity: 1;
      pointer-events: auto;
    }
    .sharer-profile-sheet-host .sps-panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      background: #141414;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom: none;
      border-radius: 20px 20px 0 0;
      padding: 4px 16px calc(20px + env(safe-area-inset-bottom, 0px));
      box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.45);
      max-height: 44vh;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      will-change: transform;
      transform: translateY(100%);
      transition: transform 0.44s cubic-bezier(0.22, 1, 0.36, 1), max-height 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .sharer-profile-sheet-host.sps-host-open .sps-panel {
      transform: translateY(0);
    }
    .sharer-profile-sheet-host .sps-panel.sps-panel-expanded {
      max-height: 88vh;
    }
    .sharer-profile-sheet-host .sps-panel.sps-panel-dragging {
      transition: none;
    }
    .sharer-profile-sheet-host .sps-drag-area {
      touch-action: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 6px 16px 14px;
      margin: -2px -16px 0 -16px;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
    }
    .sharer-profile-sheet-host .sps-drag-area:active {
      cursor: grabbing;
    }
    .sharer-profile-sheet-host .sps-grab {
      width: 40px;
      height: 5px;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.28);
      flex-shrink: 0;
    }
    .sharer-profile-sheet-host .sps-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      cursor: pointer;
      margin-bottom: 12px;
    }
    .sharer-profile-sheet-host .sps-av {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3478f6, #53b6f9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #fff;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sharer-profile-sheet-host .sps-av img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .sharer-profile-sheet-host .sps-name {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sharer-profile-sheet-host .sps-logout {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      background: rgba(255, 80, 80, 0.15);
      color: #ff8a8a;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    @media (max-width: 768px) {
      .sidebar-container {
        left: 0;
        right: 0;
        top: auto;
        bottom: 0;
        width: 100%;
        min-width: 0;
        height: calc(64px + env(safe-area-inset-bottom, 0px));
      }
      .sidebar-container iframe {
        width: 100% !important;
        height: 100% !important;
      }
      .main-wrapper {
        margin-left: 0;
        width: 100%;
        padding-bottom: calc(64px + env(safe-area-inset-bottom, 0px));
      }
      .shorts-container {
        height: auto;
        overflow-y: auto;
      }
      .short-item {
        height: auto;
        min-height: 100svh;
        min-height: 100vh;
        padding: 10px 10px 100px 10px;
      }
      .skeleton-short-item {
        height: auto;
        min-height: 100svh;
        min-height: 100vh;
        padding: 10px 10px 100px 10px;
      }
      .short-content {
        max-width: 100%;
        width: 100%;
      }
      .short-image {
        max-height: 70vh;
      }
      .short-text-only {
        max-width: 100%;
        width: 100%;
        padding: 30px 20px;
      }
      .short-text-content {
        font-size: 18px;
      }
      .short-info-bar {
        left: 10px;
        right: 75px;
        bottom: calc(72px + env(safe-area-inset-bottom, 0px));
      }
      .short-author-info {
        padding: 6px 12px 6px 6px;
      }
      .short-avatar {
        width: 36px;
        height: 36px;
        font-size: 16px;
      }
      .short-author-name {
        font-size: 14px;
      }
      .short-actions {
        right: 10px;
        bottom: calc(72px + env(safe-area-inset-bottom, 0px));
        gap: 12px;
      }
      .action-btn {
        width: 48px;
        height: 48px;
        font-size: 20px;
      }
      .short-caption {
        padding: 12px 16px;
      }
      .short-caption-text {
        font-size: 14px;
      }
      .skeleton-author-bar {
        left: 10px;
        bottom: calc(72px + env(safe-area-inset-bottom, 0px));
        width: 180px;
        height: 48px;
      }
      .skeleton-actions {
        right: 10px;
        bottom: calc(72px + env(safe-area-inset-bottom, 0px));
        gap: 12px;
      }
      .skeleton-action-btn {
        width: 48px;
        height: 48px;
      }
      .comment-modal {
        height: 80vh;
      }
    
      .nav-buttons {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="sidebar-container">
    <iframe
      src="sidebar.html"
      id="sidebarFrame"
      width="72"
      height="100%"
      frameborder="0"
    ></iframe>
  </div>
  <div id="sharerProfileSheetHost" class="sharer-profile-sheet-host" hidden></div>
  <div class="main-wrapper">
    <div class="shorts-container" id="shortsContainer">
      <!-- 초기 스켈레톤 3개 -->
      <div class="skeleton-short-item">
        <div class="skeleton-content">
          <div class="skeleton skeleton-image"></div>
          <div class="skeleton skeleton-caption"></div>
        </div>
        <div class="skeleton skeleton-author-bar"></div>
        <div class="skeleton-actions">
          <div class="skeleton skeleton-action-btn"></div>
          <div class="skeleton skeleton-action-btn"></div>
        </div>
      </div>
      <div class="skeleton-short-item">
        <div class="skeleton-content">
          <div class="skeleton skeleton-image"></div>
        </div>
        <div class="skeleton skeleton-author-bar"></div>
        <div class="skeleton-actions">
          <div class="skeleton skeleton-action-btn"></div>
          <div class="skeleton skeleton-action-btn"></div>
        </div>
      </div>
      <div class="skeleton-short-item">
        <div class="skeleton-content">
          <div class="skeleton skeleton-caption" style="height: 300px;"></div>
        </div>
        <div class="skeleton skeleton-author-bar"></div>
        <div class="skeleton-actions">
          <div class="skeleton skeleton-action-btn"></div>
          <div class="skeleton skeleton-action-btn"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="nav-buttons" id="navButtons">
    <div class="nav-btn" id="navUpBtn" onclick="scrollToPrevious()">▲</div>
    <div class="nav-btn" id="navDownBtn" onclick="scrollToNext()">▼</div>
  </div>
  <div class="comment-modal-overlay" id="commentOverlay" onclick="closeComments()"></div>
  <div class="comment-modal" id="commentModal">
    <div class="comment-drag-area" id="commentDragArea">
      <div class="comment-grab"></div>
    </div>
    <div class="comment-modal-header">
      <div class="comment-modal-title">댓글 <span id="commentCountTitle">0</span>개</div>
      <button class="comment-close-btn" onclick="closeComments()">✕</button>
    </div>
    <div class="comment-modal-list" id="commentList">
      <div style="text-align: center; color: #666; padding: 40px 20px;">
        댓글을 불러오는 중...
      </div>
    </div>
    <div class="comment-input-wrapper">
      <textarea id="commentInput" class="comment-input" placeholder="댓글을 입력하세요..." maxlength="500"></textarea>
      <button class="comment-submit-btn" id="commentSubmitBtn" onclick="submitComment()">등록</button>
    </div>
  </div>

<script>
  // Cloudflare Worker API 프록시 주소 (키 노출 완전 제거)
  const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";

  async function api(endpoint, options = {}) {
    const url = API_BASE + endpoint;
    const res = await fetch(url, {
      ...options,
      headers: {
        "Content-Type": "application/json",
        ...(options.headers || {}),
      },
    });

    if (!res.ok) {
      let errorText = "";
      try {
        errorText = await res.text();
      } catch {}
      throw new Error(`API 오류 (${res.status}): ${errorText || "알 수 없는 오류"}`);
    }

    // 204 No Content 또는 본문 길이 0이면 성공으로 간주
    if (res.status === 204 || res.headers.get("content-length") === "0") {
      return null;
    }

    // JSON 파싱 시도 (실패해도 무시하고 null 반환)
    try {
      return await res.json();
    } catch (e) {
      console.warn("JSON 파싱 실패했지만 성공으로 처리:", e);
      return null;
    }
  }

  let currentUser = JSON.parse(localStorage.getItem('snsUser')) || null;
  let allPosts = [];
  let displayedPosts = [];
  let currentPostIndex = 0;
  let currentCommentPostId = null;
  let currentScrollIndex = 0;
  let loadedPostIndices = new Set();
  const INITIAL_LOAD = 2;

  // 댓글 창 드래그 기능
  const _commentModal = document.getElementById('commentModal');
  const _commentDragArea = document.getElementById('commentDragArea');
  let _isDraggingComment = false;
  let _startCommentY, _currentCommentY;

  _commentDragArea.addEventListener('touchstart', (e) => {
    _isDraggingComment = true;
    _startCommentY = e.touches[0].clientY;
    _commentModal.classList.add('dragging');
  }, { passive: true });

  window.addEventListener('touchmove', (e) => {
    if (!_isDraggingComment) return;
    _currentCommentY = e.touches[0].clientY;
    let diffY = _currentCommentY - _startCommentY;
    if (diffY < 0) diffY = 0; // 위로는 안 올라가게
    _commentModal.style.transform = `translateY(${diffY}px)`;
  }, { passive: true });

  window.addEventListener('touchend', (e) => {
    if (!_isDraggingComment) return;
    _isDraggingComment = false;
    _commentModal.classList.remove('dragging');
    
    let diffY = _currentCommentY - _startCommentY;
    if (diffY > 100) {
      closeComments();
    }
    _commentModal.style.transform = '';
    _currentCommentY = _startCommentY;
  });

  async function createNotification(targetUserId, detail, link) {
    if (!targetUserId || targetUserId === currentUser?.id) return;
    try {
      await api("/notification", {
        method: "POST",
        body: JSON.stringify({
          user: targetUserId,
          detail,
          link,
          isread: 0,
          created_at: new Date().toISOString()
        })
      });
    } catch (e) {}
  }

  function getPostById(postId) {
    return allPosts.find(p => p.id === postId) || displayedPosts.find(p => p.id === postId) || null;
  }

  // 프로필 이미지 캐시 (user_id → url)
  const profileImageCache = new Map();

  async function getProfileImage(userId) {
    if (!userId) return null;
    if (profileImageCache.has(userId)) {
      return profileImageCache.get(userId);
    }
    try {
      const users = await api(`/users?id=eq.${userId}&select=profile_image`);
      const url = users?.[0]?.profile_image || null;
      profileImageCache.set(userId, url);
      return url;
    } catch (e) {
      console.warn('getProfileImage 오류:', e);
      return null;
    }
  }

  function linkify(text) {
    text = escapeHtml(text);
    const urlRegex = /((https?:\/\/)?[^\s]+\.(com|net|io|kr|org|co|me|us|한국|google|ai|me|cc|shop|dev|info|page|rest|help|wiki|fyi|sale|army|im)(\/[^\s]*)?)/gi;
    return text.replace(urlRegex, url => {
      let href = url.startsWith('http') ? url : 'https://' + url;
      return `<a href="${href}" target="_blank">${url}</a>`;
    });
  }

  function initCurrentUser() {
    const savedUser = localStorage.getItem('snsUser');
    if (savedUser) {
      currentUser = JSON.parse(savedUser);
      updateSidebar();
    }
  }

  function updateSidebar() {
    const iframe = document.getElementById('sidebarFrame');
    if (iframe && iframe.contentWindow) {
      iframe.contentWindow.postMessage({ type: 'updateUser', user: currentUser }, '*');
    }
  }

  function updateSidebarMode() {
    const iframe = document.getElementById('sidebarFrame');
    const narrow = window.innerWidth <= 768;
    if (iframe && iframe.contentWindow) {
      iframe.contentWindow.postMessage({ type: 'setNarrowMode', narrow }, '*');
    }
  }

  window.addEventListener('message', (event) => {
    const { type, page } = event.data || {};
    if (type === 'navigate') {
      if (page === 'home') location.href = 'index.html';
      if (page === 'explore') location.href = 'explore.html';
    }
    if (type === 'logout') {
      localStorage.removeItem('snsUser');
      currentUser = null;
      location.reload();
    }
    if (type === 'requestUserInfo') {
      updateSidebar();
    }
  });

  window.onSharerProfileLogout = function () {
    localStorage.removeItem('snsUser');
    currentUser = null;
    location.reload();
  };

  window.addEventListener('DOMContentLoaded', () => {
    const iframe = document.getElementById('sidebarFrame');
    function activateExplore() {
      if (iframe && iframe.contentWindow) {
        iframe.contentWindow.postMessage({ type: 'activateExplore' }, '*');
      }
    }
    activateExplore();
    iframe.addEventListener('load', activateExplore);
  });

  initCurrentUser();
  updateSidebarMode();
  window.addEventListener('resize', updateSidebarMode);

  window.scrollToNext = function() {
    const container = document.getElementById('shortsContainer');
    const items = container.querySelectorAll('.short-item');
    if (currentScrollIndex < items.length - 1) {
      currentScrollIndex++;
      items[currentScrollIndex].scrollIntoView({ behavior: 'smooth', block: 'start' });
      updateNavButtons();
      preloadNextPost();
    } else {
      preloadNextPost();
      setTimeout(() => {
        const updatedItems = container.querySelectorAll('.short-item');
        if (updatedItems.length > items.length) {
          currentScrollIndex++;
          updatedItems[currentScrollIndex].scrollIntoView({ behavior: 'smooth', block: 'start' });
          updateNavButtons();
        }
      }, 100);
    }
  };

  window.scrollToPrevious = function() {
    const container = document.getElementById('shortsContainer');
    const items = container.querySelectorAll('.short-item');
    if (currentScrollIndex > 0) {
      currentScrollIndex--;
      items[currentScrollIndex].scrollIntoView({ behavior: 'smooth', block: 'start' });
      updateNavButtons();
    }
  };

  function updateNavButtons() {
    const container = document.getElementById('shortsContainer');
    const items = container.querySelectorAll('.short-item');
    const upBtn = document.getElementById('navUpBtn');
    const downBtn = document.getElementById('navDownBtn');
    if (upBtn && downBtn) {
      upBtn.classList.toggle('disabled', currentScrollIndex === 0);
      downBtn.classList.remove('disabled');
    }
  }

  async function loadAllPosts() {
    try {
      const posts = await api("/posts?select=*&order=created_at.desc");
      if (!posts || posts.length === 0) {
        showNoPosts();
        return;
      }
      allPosts = posts;
      shuffleAndDisplay();
    } catch (error) {
      console.error('loadAllPosts 전체 오류:', error);
      showError();
    }
  }

  function shuffleAndDisplay() {
    displayedPosts = [...allPosts].sort(() => Math.random() - 0.5);
    currentPostIndex = 0;
    currentScrollIndex = 0;
    loadedPostIndices.clear();
    renderInitialPosts();
    setupScrollTracking();
    updateNavButtons();
  }

  function renderInitialPosts() {
    const container = document.getElementById('shortsContainer');
    container.innerHTML = '';
    for (let i = 0; i < INITIAL_LOAD; i++) {
      const post = getNextPost();
      if (post) {
        createShortItem(post, i).then(shortItem => {
          container.appendChild(shortItem);
          loadedPostIndices.add(i);
        });
      }
    }
    // 비동기 후 좋아요/댓글 로드
    setTimeout(loadLikesAndComments, 300);
  }

  function getNextPost() {
    if (currentPostIndex >= displayedPosts.length) {
      const newShuffled = [...allPosts].sort(() => Math.random() - 0.5);
      displayedPosts = [...displayedPosts, ...newShuffled];
    }
    return displayedPosts[currentPostIndex++];
  }

  function preloadNextPost() {
    const container = document.getElementById('shortsContainer');
    const nextIndex = container.children.length;
    if (!loadedPostIndices.has(nextIndex)) {
      const post = getNextPost();
      if (post) {
        createShortItem(post, nextIndex).then(shortItem => {
          container.appendChild(shortItem);
          loadedPostIndices.add(nextIndex);
          loadLikesAndComments();
          updateNavButtons();
        });
      }
    }
  }

  function setupScrollTracking() {
    const container = document.getElementById('shortsContainer');
    container.addEventListener('scroll', () => {
      const scrollPosition = container.scrollTop;
      const windowHeight = container.clientHeight;
      const items = container.querySelectorAll('.short-item');
      items.forEach((item, index) => {
        const itemTop = item.offsetTop;
        const itemHeight = item.clientHeight;
        if (scrollPosition >= itemTop - windowHeight / 2 &&
            scrollPosition < itemTop + itemHeight - windowHeight / 2) {
          if (currentScrollIndex !== index) {
            currentScrollIndex = index;
            updateNavButtons();
            preloadNextPost();
          }
        }
      });
    });
  }

  async function createShortItem(post, index) {
    const isVerified = ["JB777", "진정오"].includes(post.author);
    const hasImage = !!post.image_url;
    const hasContent = !!post.content?.trim();

    // 작성자 프로필 이미지 비동기 가져오기
    const authorProfileUrl = await getProfileImage(post.author_id);
    let avatarHTML = post.author ? post.author[0].toUpperCase() : '?';
    if (authorProfileUrl) {
      const cacheBuster = authorProfileUrl.includes('?') ? '&' : '?';
      avatarHTML = `<img src="${authorProfileUrl}${cacheBuster}v=${Date.now()}" alt="${escapeHtml(post.author)}">`;
    }

    let contentHTML = '';
    if (hasImage && hasContent) {
      const linkedContent = linkify(post.content);
      contentHTML = `
        <div class="short-content">
          <img src="${post.image_url}" class="short-image" alt="게시글 이미지">
          <div class="short-caption">
            <div class="short-caption-text">${linkedContent}</div>
          </div>
        </div>
      `;
    } else if (hasImage && !hasContent) {
      contentHTML = `
        <div class="short-content">
          <img src="${post.image_url}" class="short-image" alt="게시글 이미지">
        </div>
      `;
    } else if (!hasImage && hasContent) {
      const linkedContent = linkify(post.content);
      contentHTML = `
        <div class="short-content">
          <div class="short-text-only">
            <div class="short-text-content">${linkedContent}</div>
          </div>
        </div>
      `;
    }

    const shortItem = document.createElement('div');
    shortItem.className = 'short-item';
    shortItem.dataset.postId = post.id;
    shortItem.dataset.index = index;
    shortItem.innerHTML = `
      ${contentHTML}
      <div class="short-info-bar">
        <div class="short-author-info" onclick="goToProfile('${post.author_id}', '${escapeHtml(post.author)}')">
          <div class="short-avatar">${avatarHTML}</div>
          <div class="short-author-name">
            ${escapeHtml(post.author)}
            ${isVerified ? '<span class="verification-badge"></span>' : ''}
          </div>
        </div>
      </div>
      <div class="short-actions">
        <div class="action-btn" onclick="toggleLike('${post.id}')" data-like-btn="${post.id}">
          👍
          <div class="action-count" data-like-count="${post.id}">0</div>
        </div>
        <div class="action-btn" onclick="openComments('${post.id}')">
          💬
          <div class="action-count" data-comment-count="${post.id}">0</div>
        </div>
      </div>
    `;
    return shortItem;
  }

  async function loadLikesAndComments() {
    try {
      // 전체 likes 조회 (post_id별 그룹화)
      const likes = await api("/likes?select=post_id,user_id");
      
      displayedPosts.forEach(post => {
        const postLikes = likes?.filter(l => l.post_id === post.id) || [];
        updateLikeUI(post.id, postLikes);
      });

      // 전체 comments 조회 (post_id별 카운트)
      const comments = await api("/comments?select=post_id");
      displayedPosts.forEach(post => {
        const postComments = comments?.filter(c => c.post_id === post.id) || [];
        const countEl = document.querySelector(`[data-comment-count="${post.id}"]`);
        if (countEl) countEl.textContent = postComments.length;
      });
    } catch (e) {
      console.error('좋아요/댓글 카운트 로드 오류:', e);
    }
  }

  function updateLikeUI(postId, likes) {
    const btn = document.querySelector(`[data-like-btn="${postId}"]`);
    const count = document.querySelector(`[data-like-count="${postId}"]`);
    if (!btn || !count) return;
    count.textContent = likes.length;
    if (currentUser && likes.some(like => like.user_id === currentUser.id)) {
      btn.classList.add('liked');
    } else {
      btn.classList.remove('liked');
    }
  }

  window.toggleLike = async function(postId) {
    if (!currentUser) {
      if (confirm('로그인이 필요합니다. 홈으로 이동하시겠습니까?')) {
        window.location.href = 'index.html';
      }
      return;
    }
    try {
      const likes = await api(`/likes?post_id=eq.${postId}&user_id=eq.${currentUser.id}&select=id`);

      if (likes?.length > 0) {
        // 이미 좋아요 → 삭제
        await api(`/likes?id=eq.${likes[0].id}`, { method: "DELETE" });
      } else {
        // 좋아요 추가
        await api("/likes", {
          method: "POST",
          body: JSON.stringify({
            post_id: postId,
            user_id: currentUser.id
          })
        });
        const post = getPostById(postId);
        createNotification(post?.author_id, `${currentUser.nickname}님이 좋아요를 눌렀습니다`, `view.html?id=${postId}`);
      }

      // 업데이트된 좋아요 목록 가져오기
      const updatedLikes = await api(`/likes?post_id=eq.${postId}&select=user_id`);
      updateLikeUI(postId, updatedLikes || []);
    } catch (e) {
      console.error('좋아요 토글 오류:', e);
    }
  };

  window.openComments = async function(postId) {
    currentCommentPostId = postId;
    document.getElementById('commentOverlay').classList.add('active');
    document.getElementById('commentModal').classList.add('active');
    await loadComments(postId);
  };

  window.closeComments = function() {
    document.getElementById('commentOverlay').classList.remove('active');
    document.getElementById('commentModal').classList.remove('active');
    document.getElementById('commentModal').style.transform = ''; // 리셋
    currentCommentPostId = null;
    document.getElementById('commentInput').value = '';
    document.getElementById('commentList').innerHTML = '';
  };

  async function loadComments(postId) {
    const listDiv = document.getElementById('commentList');
    listDiv.innerHTML = '<div style="text-align: center; color: #666; padding: 40px 20px;">댓글을 불러오는 중...</div>';
    try {
      const comments = await api(`/comments?post_id=eq.${postId}&select=*&order=created_at.desc`);

      document.getElementById('commentCountTitle').textContent = comments?.length || 0;

      if (!comments || comments.length === 0) {
        listDiv.innerHTML = '<div style="text-align: center; color: #666; padding: 40px 20px;">첫 댓글을 남겨보세요!</div>';
        return;
      }

      listDiv.innerHTML = '';

      // 댓글 작성자 프로필 사진 미리 로드
      const uniqueUserIds = [...new Set(comments.map(c => c.user_id))];
      const profileMap = {};
      await Promise.all(
        uniqueUserIds.map(async uid => {
          const url = await getProfileImage(uid);
          if (url) profileMap[uid] = url;
        })
      );

      comments.forEach(comment => {
        const isMyComment = currentUser && currentUser.id === comment.user_id;
        const date = new Date(comment.created_at).toLocaleString('ko-KR');
        const isVerified = ["JB777", "진정오"].includes(comment.user_name);
        let avatarHTML = comment.user_name ? comment.user_name[0].toUpperCase() : '?';
        if (profileMap[comment.user_id]) {
          const url = profileMap[comment.user_id];
          const cacheBuster = url.includes('?') ? '&' : '?';
          avatarHTML = `<img src="${url}${cacheBuster}v=${Date.now()}" alt="${escapeHtml(comment.user_name)}">`;
        }
        const linkedText = linkify(comment.text);
        const div = document.createElement('div');
        div.className = 'comment-item';
        div.innerHTML = `
          <div class="comment-header">
            <div class="comment-author-wrapper" onclick="goToProfile('${comment.user_id}', '${escapeHtml(comment.user_name)}')">
              <div class="comment-avatar">${avatarHTML}</div>
              <span class="comment-author">
                ${escapeHtml(comment.user_name)}
                ${isVerified ? '<span class="verification-badge" style="width:14px; height:14px;"></span>' : ''}
              </span>
            </div>
            ${isMyComment ? `<button class="comment-del-btn" onclick="deleteComment('${comment.id}', '${postId}')">삭제</button>` : ''}
          </div>
          <div class="comment-content">${linkedText}</div>
          <div class="comment-date">${date}</div>
        `;
        listDiv.appendChild(div);
      });
    } catch (e) {
      console.error('댓글 로드 오류:', e);
      listDiv.innerHTML = '<div style="text-align: center; color: #ff6b6b; padding: 40px 20px;">댓글을 불러오는데 실패했습니다.</div>';
    }
  }

  window.submitComment = async function() {
    if (!currentUser) {
      if (confirm('로그인이 필요합니다. 홈으로 이동하시겠습니까?')) {
        window.location.href = 'index.html';
      }
      return;
    }
    const input = document.getElementById('commentInput');
    const text = input.value.trim();
    if (!text) return;
    const submitBtn = document.getElementById('commentSubmitBtn');
    submitBtn.disabled = true;
    try {
      await api("/comments", {
        method: "POST",
        body: JSON.stringify({
          post_id: currentCommentPostId,
          user_id: currentUser.id,
          user_name: currentUser.nickname,
          text,
          created_at: new Date().toISOString()
        })
      });

      const post = getPostById(currentCommentPostId);
      createNotification(post?.author_id, `${currentUser.nickname}님이 댓글을 남겼습니다`, `view.html?id=${currentCommentPostId}`);

      input.value = '';
      await loadComments(currentCommentPostId);

      const countEl = document.querySelector(`[data-comment-count="${currentCommentPostId}"]`);
      if (countEl) {
        countEl.textContent = parseInt(countEl.textContent || '0') + 1;
      }
    } catch (e) {
      console.error('댓글 업로드 오류:', e);
      alert('댓글 업로드에 실패했습니다.');
    } finally {
      submitBtn.disabled = false;
    }
  };

  window.deleteComment = async function(commentId, postId) {
    if (!confirm('댓글을 삭제하시겠습니까?')) return;
    try {
      await api(`/comments?id=eq.${commentId}`, { method: "DELETE" });
      await loadComments(postId);
      const countEl = document.querySelector(`[data-comment-count="${postId}"]`);
      if (countEl) {
        countEl.textContent = Math.max(0, parseInt(countEl.textContent || '0') - 1);
      }
    } catch (e) {
      console.error('댓글 삭제 오류:', e);
      alert('삭제에 실패했습니다.');
    }
  };

  window.goToProfile = function(userId, nickname) {
    window.location.href = `user.html?id=${userId}&nickname=${encodeURIComponent(nickname)}`;
  };

  function showNoPosts() {
    document.getElementById('shortsContainer').innerHTML = `
      <div class="no-posts">
        <div class="no-posts-icon">📭</div>
        <div class="no-posts-text">
          아직 게시물이 없습니다.<br>
          첫 번째 게시물을 작성해보세요!
        </div>
      </div>
    `;
  }

  function showError() {
    document.getElementById('shortsContainer').innerHTML = `
      <div class="no-posts">
        <div class="no-posts-icon">⚠️</div>
        <div class="no-posts-text">
          게시물을 불러오는데 실패했습니다.<br>
          잠시 후 다시 시도해주세요.
        </div>
      </div>
    `;
  }

  function escapeHtml(text) {
    if (!text) return '';
    const map = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, m => map[m]);
  }

  // 초기 로드
  loadAllPosts();
</script>
<script src="sharer-profile-sheet-host.js"></script>
</body>
</html>
