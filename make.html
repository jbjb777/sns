<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>새 게시물 : Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* ─── HEADER ─── */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 50;
      opacity: 0;
      transform: translateY(-10px);
      animation: slideDown 0.4s ease 0.08s forwards;
    }
    @keyframes slideDown { to { opacity: 1; transform: translateY(0); } }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .back-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: none;
      background: none;
      color: var(--t2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .back-btn:hover { color: var(--t1); background: var(--bg3); }
    .back-btn:active { transform: scale(0.82); }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--t1);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-profile-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      overflow: hidden;
      color: #666;
    }
    .header-profile-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    /* ─── POST BUTTON ─── */
    .post-btn {
      background: #fff;
      color: #000;
      border: none;
      padding: 9px 22px;
      border-radius: 22px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-width: 90px;
      transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .post-btn:hover:not(:disabled) { background: #e8e8e8; transform: scale(1.04); }
    .post-btn:active:not(:disabled) { transform: scale(0.94); }
    .post-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .spinner {
      display: none;
      width: 15px; height: 15px;
      border: 2px solid rgba(0,0,0,0.2);
      border-radius: 50%;
      border-top-color: #000;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading .spinner { display: block; }
    .loading .btn-text { display: none; }

    /* ─── MAIN CONTENT ─── */
    .main-content {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 36px 20px;
    }

    .create-container {
      max-width: 580px;
      width: 100%;
      opacity: 0;
      transform: translateY(12px);
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.18s forwards;
    }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

    /* ─── AUTHOR ROW ─── */
    .author-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeInEl 0.4s ease 0.32s forwards;
    }
    @keyframes fadeInEl { to { opacity: 1; } }

    .create-profile-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 700;
      flex-shrink: 0;
      overflow: hidden;
      color: #666;
      transition: border-color 0.2s;
    }
    .create-profile-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .author-info { display: flex; flex-direction: column; gap: 2px; }
    .author-name { font-size: 14px; font-weight: 600; color: var(--t1); }
    .author-sub { font-size: 12px; color: var(--t3); }

    /* ─── EDITOR TOOLBAR ─── */
    .editor-toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      opacity: 0;
      animation: fadeInEl 0.4s ease 0.36s forwards;
    }
    .editor-toolbar button {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--t1);
      padding: 6px 12px;
      border-radius: var(--r1);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .editor-toolbar button:hover {
      background: var(--bg4);
      border-color: var(--border3);
    }
    
    .preview-container {
      opacity: 0;
      animation: fadeInEl 0.4s ease 0.42s forwards;
    }
    .preview-title {
      font-size: 12px;
      color: var(--t2);
      margin-top: 14px;
      margin-bottom: 6px;
    }

    /* ─── TEXTAREA ─── */
    .create-textarea {
      width: 100%;
      border: 1px solid var(--border2);
      resize: vertical;
      min-height: 180px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      background: var(--bg2);
      color: var(--t1);
      padding: 16px;
      border-radius: var(--r3);
      line-height: 1.65;
      transition: border-color 0.2s, background 0.2s;
      opacity: 0;
      animation: fadeInEl 0.4s ease 0.4s forwards;
      overflow-y: auto;
    }
    .create-textarea[contenteditable]:empty::before {
      content: attr(placeholder);
      color: var(--t3);
      pointer-events: none;
    }
    .create-textarea:focus { border-color: var(--border3); background: var(--bg3); }
    .create-textarea::placeholder { color: var(--t3); }

    /* ─── 여러 이미지 미리보기 ─── */
    .image-preview-container {
      margin-top: 14px;
      opacity: 0;
      animation: fadeInEl 0.4s ease 0.48s forwards;
    }

    .image-preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .image-preview-item {
      position: relative;
      border-radius: var(--r3);
      overflow: hidden;
      border: 1px solid var(--border);
      aspect-ratio: 1 / 1;
    }

    .image-preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .remove-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .remove-btn:hover {
      background: var(--pink);
    }

    .upload-btn {
      background: var(--bg3);
      border: 1px dashed var(--border2);
      padding: 10px 20px;
      border-radius: var(--r2);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      color: var(--t2);
      margin-top: 14px;
      transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      display: inline-block;
      opacity: 0;
      animation: fadeInEl 0.4s ease 0.52s forwards;
    }
    .upload-btn:hover { border-color: var(--border3); color: var(--t1); background: var(--bg4); transform: scale(1.02); }
    .upload-btn:active { transform: scale(0.97); }

    .image-count {
      font-size: 13px;
      color: var(--t2);
      margin-top: 6px;
    }

    /* ─── MESSAGE ─── */
    #postMessage {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
      font-weight: 500;
      opacity: 0;
      animation: fadeInEl 0.4s ease 0.56s forwards;
    }
    #postMessage.error { color: var(--pink); }
    #postMessage.success { color: var(--green); }
    #postMessage.info { color: var(--t2); }

    /* ─── DIVIDER ─── */
    .section-divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
      opacity: 0;
      animation: fadeInEl 0.4s ease 0.44s forwards;
    }

    /* ─── FOOTER ─── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 20px;
      text-align: center;
      color: var(--t3);
      font-size: 11px;
    }

    @media (max-width: 768px) {
      .main-content { padding: 24px 16px; }
      .create-textarea { min-height: 140px; }
      .image-preview-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <button class="back-btn" onclick="goBack()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M19 12H5M5 12l7-7M5 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="header-title">
        새 게시물 만들기
        <div class="header-profile-avatar" id="headerAvatar"></div>
      </span>
    </div>
    <button class="post-btn" id="postBtn">
      <span class="btn-text">공유하기</span>
      <div class="spinner"></div>
    </button>
  </div>

  <div class="main-content">
    <div class="create-container">

      <!-- 작성자 행 -->
      <div class="author-row">
        <div class="create-profile-avatar" id="createAvatar"></div>
        <div class="author-info">
          <div class="author-name" id="authorName">불러오는 중...</div>
          <div class="author-sub">무엇을 공유하시겠어요?</div>
        </div>
      </div>

      <!-- 마크다운 툴바 -->
      <div class="editor-toolbar" id="editorToolbar">
        <button type="button" onclick="execFormat('bold')"><b>B</b></button>
        <button type="button" onclick="execFormat('italic')"><i>I</i></button>
        <button type="button" onclick="execFormat('underline')"><u>U</u></button>
        <button type="button" onclick="execFormat('formatBlock', 'H1')">H1</button>
        <button type="button" onclick="execFormat('formatBlock', 'H2')">H2</button>
        <button type="button" onclick="execFormat('insertHorizontalRule')">HR</button>
      </div>

      <!-- 텍스트 입력 -->
      <div class="create-textarea" id="postContent" contenteditable="true" placeholder="문구를 입력하세요..."></div>

      <div class="section-divider"></div>

      <!-- 여러 이미지 미리보기 -->
      <div class="image-preview-container">
        <div class="image-preview-grid" id="imagePreviewGrid"></div>
        <div class="image-count" id="imageCount">0 / 5 장</div>
      </div>

      <input type="file" id="imageInput" accept="image/*" multiple style="display: none;">
      <button class="upload-btn" id="uploadBtn">📷 사진 추가 (최대 5장)</button>

      <div id="postMessage"></div>
    </div>
  </div>

  <div class="footer">
    본 서비스는 대한민국의 중2 개발자 1인이 만든 프로젝트입니다 모든 소스 코드 및 파일의 출처는 전적으로 개발자에게 있음을 알립니다.
  </div>

<script src="markdown.js"></script>
<script>
  const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";

  async function api(endpoint, options = {}) {
    const url = API_BASE + endpoint;
    const res = await fetch(url, {
      ...options,
      headers: {
        "Content-Type": "application/json",
        ...(options.headers || {}),
      },
    });
    if (!res.ok) {
      let errorText = "";
      try { errorText = await res.text(); } catch {}
      throw new Error(`API 오류 (${res.status}): ${errorText || "알 수 없는 오류"}`);
    }
    if (res.status === 204 || res.headers.get("content-length") === "0") return null;
    try { return await res.json(); } catch (e) {
      console.warn("JSON 파싱 실패했지만 2xx 성공으로 간주:", e);
      return null;
    }
  }

  const cloudName = 'dretlhsrk';
  const uploadPreset = 'unsigned_preset';
  let currentUser = null;
  let selectedImages = [];   // 여러 이미지 저장 배열

  function setAvatar(el, profileImage, nickname) {
    if (profileImage) {
      el.innerHTML = `<img src="${profileImage}" alt="${nickname || ''}">`;
    } else {
      el.textContent = (nickname?.[0] || '?').toUpperCase();
    }
  }

  // 미리보기 업데이트 함수
  function updateImagePreview() {
    const grid = document.getElementById('imagePreviewGrid');
    const countEl = document.getElementById('imageCount');
    grid.innerHTML = '';

    selectedImages.forEach((file, index) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const div = document.createElement('div');
        div.className = 'image-preview-item';
        div.innerHTML = `
          <img src="${e.target.result}" alt="preview">
          <button class="remove-btn" data-index="${index}">×</button>
        `;
        grid.appendChild(div);

        div.querySelector('.remove-btn').onclick = () => {
          selectedImages.splice(index, 1);
          updateImagePreview();
        };
      };
      reader.readAsDataURL(file);
    });

    countEl.textContent = `${selectedImages.length} / 5 장`;
  }

  async function initPage() {
    const savedUser = localStorage.getItem('snsUser');
    if (!savedUser) {
      alert('로그인이 필요합니다.');
      window.location.href = 'login.html';
      return;
    }
    currentUser = JSON.parse(savedUser);

    const headerAvatar = document.getElementById('headerAvatar');
    const createAvatar = document.getElementById('createAvatar');
    const authorName = document.getElementById('authorName');

    setAvatar(headerAvatar, currentUser.profile_image || null, currentUser.nickname);
    setAvatar(createAvatar, currentUser.profile_image || null, currentUser.nickname);
    if (authorName) authorName.textContent = currentUser.nickname || '';

    if (currentUser.id) {
      try {
        const users = await api(`/users?id=eq.${encodeURIComponent(currentUser.id)}&select=nickname,profile_image`);
        if (users?.[0]) {
          const latest = users[0];
          currentUser.profile_image = latest.profile_image || currentUser.profile_image;
          currentUser.nickname = latest.nickname || currentUser.nickname;
          localStorage.setItem('snsUser', JSON.stringify(currentUser));

          setAvatar(headerAvatar, currentUser.profile_image, currentUser.nickname);
          setAvatar(createAvatar, currentUser.profile_image, currentUser.nickname);
          if (authorName) authorName.textContent = currentUser.nickname || '';
        }
      } catch (e) {
        console.warn('프로필 최신 정보 로드 실패:', e);
      }
    }
  }

  window.goBack = function() { window.history.back(); };

  window.execFormat = function(command, value = null) {
    const postContentDiv = document.getElementById('postContent');
    postContentDiv.focus();
    document.execCommand(command, false, value);
  };

  // 파일 선택 (multiple 지원)
  document.getElementById('uploadBtn').onclick = () => {
    document.getElementById('imageInput').click();
  };

  document.getElementById('imageInput').onchange = (e) => {
    const files = Array.from(e.target.files);
    
    if (selectedImages.length + files.length > 5) {
      alert('최대 5장까지 업로드할 수 있습니다.');
      return;
    }

    selectedImages = [...selectedImages, ...files];
    updateImagePreview();

    e.target.value = ''; // 같은 파일 재선택 가능하게 초기화
  };

  async function uploadImagesToCloudinary() {
    const uploadedUrls = [];
    
    for (let file of selectedImages) {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', uploadPreset);

      const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
        method: 'POST',
        body: formData
      });

      if (!response.ok) throw new Error('이미지 업로드 실패');
      const data = await response.json();
      uploadedUrls.push(data.secure_url);
    }
    
    return uploadedUrls;
  }

  function htmlToMarkdown(html) {
    let md = html;
    
    md = md.replace(/<div><br><\/div>/gi, '\n');
    md = md.replace(/<div[^>]*>/gi, '\n');
    md = md.replace(/<\/div>/gi, '');
    md = md.replace(/<p[^>]*>/gi, '\n');
    md = md.replace(/<\/p>/gi, '');
    md = md.replace(/<br\s*\/?>/gi, '\n');
    
    md = md.replace(/<b[^>]*>(.*?)<\/b>/gi, '**$1**');
    md = md.replace(/<strong[^>]*>(.*?)<\/strong>/gi, '**$1**');
    md = md.replace(/<i[^>]*>(.*?)<\/i>/gi, '*$1*');
    md = md.replace(/<em[^>]*>(.*?)<\/em>/gi, '*$1*');
    md = md.replace(/<u[^>]*>(.*?)<\/u>/gi, '__$1__');
    
    md = md.replace(/<h1[^>]*>(.*?)<\/h1>/gi, '# $1\n');
    md = md.replace(/<h2[^>]*>(.*?)<\/h2>/gi, '## $1\n');
    md = md.replace(/<h3[^>]*>(.*?)<\/h3>/gi, '### $1\n');
    
    md = md.replace(/<hr\s*\/?>/gi, '\n---\n');

    md = md.replace(/<[^>]+>/g, '');
    
    md = md.replace(/&nbsp;/g, ' ')
           .replace(/&lt;/g, '<')
           .replace(/&gt;/g, '>')
           .replace(/&amp;/g, '&');
           
    md = md.replace(/\n{3,}/g, '\n\n');
    
    return md.trim();
  }

  // 게시 버튼
  document.getElementById('postBtn').onclick = async () => {
    const rawHtml = document.getElementById('postContent').innerHTML;
    const content = htmlToMarkdown(rawHtml);
    const messageDiv = document.getElementById('postMessage');
    const postButton = document.getElementById('postBtn');

    if (!content && selectedImages.length === 0) {
      messageDiv.className = 'error';
      messageDiv.textContent = '내용 또는 이미지를 추가해주세요.';
      return;
    }

    postButton.disabled = true;
    postButton.classList.add('loading');
    messageDiv.textContent = '';
    messageDiv.className = '';

    try {
      let imageUrls = null;
      if (selectedImages.length > 0) {
        messageDiv.className = 'info';
        messageDiv.textContent = `이미지 ${selectedImages.length}장 업로드 중...`;
        imageUrls = await uploadImagesToCloudinary();
      }

      messageDiv.className = 'info';
      messageDiv.textContent = '게시 중...';

      await api("/posts", {
        method: "POST",
        body: JSON.stringify({
          author: currentUser.nickname,
          author_id: currentUser.id,
          content: content,
          image_url: imageUrls ? imageUrls.join(',') : null,
          created_at: new Date().toISOString()
        })
      });

      messageDiv.className = 'success';
      messageDiv.textContent = '게시물이 성공적으로 업로드되었습니다!';

      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);

    } catch (error) {
      console.error('게시 오류:', error);
      messageDiv.className = 'error';
      messageDiv.textContent = '게시에 실패했습니다. 다시 시도해주세요.';
    } finally {
      postButton.disabled = false;
      postButton.classList.remove('loading');
    }
  };

  initPage();
</script>
</body>
</html>
