<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>새 게시물 : Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #121212;
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      animation: fadeIn 0.4s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .header {
      background: #1e1e1e;
      border-bottom: 1px solid #333;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      transform: translateY(-20px);
      animation: slideDown 0.5s ease-out 0.15s forwards;
    }
    @keyframes slideDown {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .back-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
      transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    .back-btn:hover {
      transform: translateX(-4px) scale(1.1);
    }
    .logo-container {
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    .logo-container:hover {
      transform: scale(1.05);
    }
    .header-title {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-profile-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3478f6, #53b6f9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: bold;
      flex-shrink: 0;
    }
    /* 공유하기 버튼 */
    .post-btn {
      background: #3663FF;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 100px;
      position: relative;
      transform: scale(1);
    }
    .post-btn:hover:not(:disabled) {
      transform: scale(1.1);
    }
    .post-btn:active:not(:disabled) {
      transform: scale(0.95);
      transition: transform 0.1s ease;
    }
    .post-btn:disabled {
      opacity: 0.8;
      cursor: not-allowed;
    }
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading .spinner {
      display: block;
    }
    .loading .btn-text {
      display: none;
    }
    .main-content {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }
    .create-container {
      max-width: 600px;
      width: 100%;
      background: #1e1e1e;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      opacity: 0;
      transform: translateY(30px);
      animation: slideUp 0.6s ease-out 0.3s forwards;
    }
    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .create-container h2 {
      margin: 0 0 20px 0;
      font-size: 24px;
      font-weight: 600;
      color: #fff;
      opacity: 0;
      animation: fadeInText 0.5s ease-out 0.55s forwards;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .create-profile-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3478f6, #53b6f9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: bold;
      flex-shrink: 0;
    }
    textarea {
      opacity: 0;
      animation: fadeInText 0.5s ease-out 0.7s forwards;
    }
    .image-preview-container, .upload-btn, #postMessage {
      opacity: 0;
      animation: fadeInText 0.5s ease-out 0.85s forwards;
    }
    @keyframes fadeInText {
      to { opacity: 1; }
    }
    .create-container textarea {
      width: 100%;
      border: 2px solid #333;
      resize: vertical;
      min-height: 200px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      background: #2c2c2c;
      color: #fff;
      padding: 16px;
      border-radius: 12px;
      box-sizing: border-box;
      margin-bottom: 20px;
    }
    .create-container textarea:focus {
      border-color: #3663FF;
    }
    .image-preview-container {
      margin-bottom: 20px;
    }
    .image-preview {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      border-radius: 12px;
      display: none;
    }
    .image-preview.show {
      display: block;
      margin-bottom: 15px;
    }
    /* 사진 추가 버튼 */
    .upload-btn {
      background: #2c2c2c;
      border: 2px solid #333;
      padding: 12px 24px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 14px;
      color: #fff;
      transition: all 0.3s ease;
      display: inline-block;
      transform: scale(1);
    }
    .upload-btn:hover {
      background: #3663FF;
      border-color: #3663FF;
      transform: scale(1.1);
    }
    .upload-btn:active {
      transform: scale(0.95);
      transition: transform 0.1s ease;
    }
    .message {
      margin-top: 15px;
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }
    .message.error { color: #ff6b6b; }
    .message.success { color: #00ff00; }
    .message.info { color: #aaa; }
    .footer {
      background: #1e1e1e;
      border-top: 1px solid #333;
      padding: 20px;
      text-align: center;
      color: #666;
      font-size: 12px;
      opacity: 0;
      animation: fadeInText 0.5s ease-out 1s forwards;
    }
    @media (max-width: 768px) {
      .header-title { font-size: 16px; }
      .create-container { padding: 20px; }
      .create-container h2 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <button class="back-btn" onclick="goBack()">←</button>
      <div class="logo-container" onclick="goHome()">
      </div>
      <span class="header-title">새 게시물 만들기 <div class="header-profile-avatar" id="headerAvatar"></div></span>
    </div>
    <button class="post-btn" id="postBtn">
      <span class="btn-text">공유하기</span>
      <div class="spinner"></div>
    </button>
  </div>
  <div class="main-content">
    <div class="create-container">
      <h2><div class="create-profile-avatar" id="createAvatar"></div>무엇을 공유하시겠어요?</h2>
      <textarea id="postContent" placeholder="문구를 입력하세요..."></textarea>
   
      <div class="image-preview-container">
        <img id="imagePreview" class="image-preview">
      </div>
   
      <input type="file" id="imageInput" accept="image/*" style="display: none;">
      <button class="upload-btn" id="uploadBtn">📷 사진 추가</button>
   
      <div id="postMessage" class="message"></div>
    </div>
  </div>
  <div class="footer">
    © 2025 ㋡꧁정빈777꧂ SNS. All rights reserved.
  </div>

<script>
  // Cloudflare Worker API 프록시 주소
  const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";

  // 안전한 api 헬퍼 함수 (204 처리 강화 + body 유무 확인)
  async function api(endpoint, options = {}) {
    const url = API_BASE + endpoint;
    const res = await fetch(url, {
      ...options,
      headers: {
        "Content-Type": "application/json",
        ...(options.headers || {}),
      },
    });

    if (!res.ok) {
      let errorText = "";
      try {
        errorText = await res.text();
      } catch {}
      throw new Error(`API 오류 (${res.status}): ${errorText || "알 수 없는 오류"}`);
    }

    // 204거나 Content-Length가 0이면 성공으로 간주 (본문 없음)
    if (res.status === 204 || res.headers.get("content-length") === "0") {
      return null;
    }

    // 그 외에는 안전하게 json() 시도
    try {
      return await res.json();
    } catch (e) {
      console.warn("JSON 파싱 실패했지만 2xx 성공으로 간주:", e);
      return null; // 파싱 실패해도 성공으로 처리 (INSERT 성공 시 흔함)
    }
  }

  const cloudName = 'dretlhsrk';
  const uploadPreset = 'unsigned_preset';
  let currentUser = null;
  let selectedImage = null;

  function initPage() {
    const savedUser = localStorage.getItem('snsUser');
    if (!savedUser) {
      alert('로그인이 필요합니다.');
      window.location.href = 'login.html';
      return;
    }
    currentUser = JSON.parse(savedUser);
    const avatarLetter = currentUser.nickname ? currentUser.nickname[0].toUpperCase() : '?';
    document.getElementById('headerAvatar').innerHTML = avatarLetter;
    document.getElementById('createAvatar').innerHTML = avatarLetter;
  }

  window.goBack = function() {
    window.history.back();
  }

  window.goHome = function() {
    window.location.href = 'index.html';
  }

  document.getElementById('uploadBtn').onclick = () => {
    document.getElementById('imageInput').click();
  };

  document.getElementById('imageInput').onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
      selectedImage = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        const preview = document.getElementById('imagePreview');
        preview.src = e.target.result;
        preview.classList.add('show');
      }
      reader.readAsDataURL(file);
    }
  };

  async function uploadImageToCloudinary(file) {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', uploadPreset);
    try {
      const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
        method: 'POST',
        body: formData
      });
      if (!response.ok) throw new Error('이미지 업로드 실패');
      const data = await response.json();
      return data.secure_url;
    } catch (error) {
      console.error('Cloudinary 업로드 오류:', error);
      throw error;
    }
  }

  document.getElementById('postBtn').onclick = async () => {
    const content = document.getElementById('postContent').value.trim();
    const messageDiv = document.getElementById('postMessage');
    const postButton = document.getElementById('postBtn');

    if (!content && !selectedImage) {
      messageDiv.className = 'message error';
      messageDiv.textContent = '내용 또는 이미지를 추가해주세요.';
      return;
    }

    postButton.disabled = true;
    postButton.classList.add('loading');
    messageDiv.textContent = '';
    messageDiv.className = 'message';

    try {
      let imageUrl = null;
      if (selectedImage) {
        imageUrl = await uploadImageToCloudinary(selectedImage);
      }

      console.log('게시 요청 시작...');
      await api("/posts", {
        method: "POST",
        body: JSON.stringify({
          author: currentUser.nickname,
          author_id: currentUser.id,
          content: content,
          image_url: imageUrl,
          created_at: new Date().toISOString()
        })
      });

      console.log('게시 성공! 리다이렉트 시도');

      messageDiv.className = 'message success';
      messageDiv.textContent = '게시물이 성공적으로 업로드되었습니다!';

      // 0.1초만 기다리고 바로 이동 (거의 즉시)
      setTimeout(() => {
        console.log('location.href 실행');
        window.location.href = 'index.html';
        // 혹시 모르니 replace도 같이
        // window.location.replace('index.html');
      }, 100);

    } catch (error) {
      console.error('게시 오류:', error);
      messageDiv.className = 'message error';
      messageDiv.textContent = '게시에 실패했습니다. 다시 시도해주세요.';
    } finally {
      postButton.disabled = false;
      postButton.classList.remove('loading');
    }
  };

  initPage();
</script>
</body>
</html>
