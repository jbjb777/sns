<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.png">
  <meta name="description" content="Sharer는 이미지와 텍스트를 업로드하고 사람들과 소통할 수 있는 무료 커뮤니티·SNS 서비스입니다. 정빈777이 만들었습니다.">
  <meta name="keywords" content="Sharer, 커뮤니티, SNS, 정빈777, 정빈정빈">
  <meta name="author" content="정빈777">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Sharer | 커뮤니티 · SNS">
  <meta property="og:description" content="이미지와 텍스트를 업로드해보세요. 사람들과 소통해보세요. 모든 기능은 무료입니다.">
  <meta property="og:url" content="https://sharer.jbjb.r-e.kr/">
  <meta property="og:image" content="https://sharer.jbjb.r-e.kr/logo.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:site_name" content="Sharer">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Sharer | 커뮤니티 · SNS">
  <meta name="twitter:description" content="이미지와 텍스트를 업로드하고 사람들과 소통해보세요.">
  <meta name="twitter:image" content="https://sharer.jbjb.r-e.kr/logo.png">
  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: bodyReveal 0.4s ease forwards;
    }

    @keyframes bodyReveal { to { opacity: 1; } }

    /* ─── SPLASH SCREEN ─── */
    #splash {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      transition: opacity 0.45s ease;
    }

    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .splash-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .splash-logo {
      width: 72px;
      height: 72px;
      animation: splashLogoPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes splashLogoPop {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* NProgress 커스텀 스타일 */
    #nprogress .bar {
      background: #fff !important;
      height: 2px !important;
    }
    #nprogress .peg {
      display: none !important;
    }
    #nprogress .spinner {
      display: none !important;
    }

    /* ─── SIDEBAR ─── */
    .sidebar-container {
      width: 72px;
      min-width: 72px;
      height: 100vh;
      position: fixed;
      left: 0; top: 0;
      z-index: 100;
    }
    .sidebar-container iframe { width: 72px !important; height: 100%; border: none; }

    /* ─── MAIN WRAPPER ─── */
    .main-wrapper {
      margin-left: 72px;
      width: calc(100% - 72px);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ─── MAIN CONTENT ─── */
    .main-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 36px 28px;
      overflow-y: auto;
      opacity: 0;
      transform: translateY(16px);
      animation: contentReveal 0.5s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
    }

    @keyframes contentReveal { to { opacity: 1; transform: translateY(0); } }

    /* ─── FEED ─── */
    .feed-container { max-width: 590px; width: 100%; }

    /* ─── RECOMMEND ─── */
    .recommend-container {
      width: 240px;
      margin-left: 32px;
      position: sticky;
      top: 36px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r4);
      padding: 20px;
      opacity: 0;
      animation: sidebarReveal 0.5s cubic-bezier(0.22,1,0.36,1) 0.25s forwards;
    }

    @keyframes sidebarReveal {
      from { opacity: 0; transform: translateX(12px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .recommend-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 14px;
    }

    .profile-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--r2);
      cursor: pointer;
      transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .profile-item:hover { background: var(--bg3); transform: translateX(3px); }
    .profile-item:active { transform: scale(0.97); }

    .profile-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
      object-fit: cover;
      color: #666;
    }

    .profile-nickname {
      font-size: 13px;
      font-weight: 500;
      color: var(--t2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.15s;
    }
    .profile-item:hover .profile-nickname { color: var(--t1); }

    /* ─── SKELETON ─── */
    .skeleton {
      background: linear-gradient(90deg, var(--bg2) 0%, var(--bg3) 50%, var(--bg2) 100%);
      background-size: 300% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
      border-radius: var(--r1);
    }
    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    .skeleton-post { padding: 24px 0; border-bottom: 1px solid var(--border); }
    .skeleton-post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .skeleton-avatar { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; }
    .skeleton-username { width: 120px; height: 12px; }
    .skeleton-post-image { width: 100%; height: 340px; border-radius: var(--r3); margin: 12px 0; }
    .skeleton-text { height: 10px; margin: 8px 0; }
    .text-short { width: 50%; }
    .text-medium { width: 75%; }
    .text-long { width: 100%; }
    .skeleton-profile-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; }
    .skeleton-profile-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; }
    .skeleton-profile-nickname { width: 90px; height: 10px; }

    /* ─── POST CARD ─── */
    .post-card {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 24px 0;
      cursor: pointer;
      transition: background 0.15s;
      opacity: 0;
      transform: translateY(12px);
      animation: postIn 0.4s cubic-bezier(0.22,1,0.36,1) forwards;
      position: relative;
    }
    @keyframes postIn { to { opacity: 1; transform: translateY(0); } }
    .post-card:hover { background: #080808; }
    .post-card:last-child { border-bottom: none; }

    .post-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 0 2px;
    }

    .post-author-info { display: flex; align-items: center; gap: 10px; cursor: pointer; }

    .post-author-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 600;
      flex-shrink: 0;
      transition: border-color 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      color: #666;
    }
    .post-author-info:hover .post-author-avatar {
      border-color: var(--border3);
      transform: scale(1.06);
    }

    .post-author-name {
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--t1);
    }

    .post-image {
      width: 100%;
      max-height: 560px;
      object-fit: cover;
      border-radius: var(--r3);
      margin: 14px 0;
      border: 1px solid var(--border);
      display: block;
      transition: opacity 0.2s, transform 0.3s cubic-bezier(0.22,1,0.36,1);
    }
    .post-image:hover { opacity: 0.9; transform: scale(1.004); }

    .post-content { font-size: 14px; line-height: 1.75; color: var(--t1); white-space: pre-wrap; padding: 0 2px; }

    .post-time { padding: 8px 2px 10px; font-size: 11px; color: var(--t3); letter-spacing: 0.02em; }

    .post-actions { margin: 8px 0 2px; display: flex; align-items: center; gap: 16px; padding: 0 2px; }

    /* ─── LIKE BUTTON ─── */
    .like-button {
      background: none;
      border: none;
      padding: 5px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--t3);
      transition: color 0.15s;
      font-size: 13px;
      font-family: inherit;
    }
    .like-button:hover { color: var(--pink); }
    .like-button.liked { color: var(--pink); }

    .like-heart {
      width: 19px; height: 19px;
      fill: currentColor;
      transition: transform 0.25s cubic-bezier(0.34,1.7,0.64,1);
    }
    .like-button:hover .like-heart { transform: scale(1.25); }
    .like-button.liked .like-heart { transform: scale(1.1); }
    .like-button.liked:hover .like-heart { transform: scale(1.3); }

    .like-count { font-weight: 600; font-size: 13px; line-height: 1; min-width: 12px; }

    /* ─── NO POSTS ─── */
    .no-posts { text-align: center; padding: 80px 20px; color: var(--t2); font-size: 14px; line-height: 2; }

    /* ─── DELETE BTN ─── */
    .delete-btn {
      background: transparent;
      border: 1px solid #2a1a1a;
      color: var(--pink);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      transition: background 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      font-family: inherit;
    }
    .delete-btn:hover { background: rgba(255,107,107,0.1); border-color: var(--pink); transform: scale(1.04); }
    .delete-btn:active { transform: scale(0.94); }

    /* ─── VERIFICATION BADGE ─── */
    .verification-badge {
      display: inline-block;
      width: 14px; height: 14px;
      vertical-align: middle;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:%23ff00ff;stop-opacity:1" /><stop offset="100%" style="stop-color:%23ff0066;stop-opacity:1" /></linearGradient></defs><path fill="url(%23grad)" d="M512 0 L1024 295 L1024 729 L512 1024 L0 729 L0 295 Z"/><path fill="white" d="M256 512 L384 640 L768 256 L832 320 L384 768 L192 576 Z"/></svg>');
      background-size: contain;
      background-repeat: no-repeat;
    }

    /* ─── FOOTER ─── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      font-size: 12px;
      margin-top: auto;
    }
    .footer-links { margin-bottom: 8px; }
    .footer-links a { color: var(--t2); text-decoration: none; margin: 0 12px; font-weight: 500; transition: color 0.15s; }
    .footer-links a:hover { color: var(--t1); }
    .footer-text { color: var(--t3); font-size: 11px; }

    /* ─── MODALS ─── */
    .auth-modal, .create-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .auth-modal.active, .create-modal.active { display: flex; }

    .auth-box, .create-modal-content {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r4);
      padding: 40px;
      width: 90%;
      max-width: 380px;
      position: relative;
      animation: modalPop 0.28s cubic-bezier(0.34,1.4,0.64,1);
    }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.90) translateY(14px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .create-modal-content { max-width: 540px; max-height: 90vh; overflow-y: auto; padding: 0; }

    .auth-close, .close-btn {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--t2);
      font-size: 16px;
      cursor: pointer;
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      line-height: 1;
    }
    .auth-close { position: absolute; top: 16px; right: 16px; }
    .auth-close:hover, .close-btn:hover { background: var(--bg4); color: var(--t1); transform: scale(1.1); }
    .auth-close:active, .close-btn:active { transform: scale(0.90); }

    .auth-box h2, .create-modal-header h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--t1);
      letter-spacing: -0.02em;
    }
    .auth-box h2 { text-align: center; margin-bottom: 26px; }

    .auth-box input {
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--r2);
      border: 1px solid var(--border2);
      font-size: 14px;
      margin-bottom: 10px;
      outline: none;
      background: var(--bg3);
      color: var(--t1);
      font-family: inherit;
      transition: border-color 0.2s, background 0.2s;
    }
    .auth-box input:focus { border-color: var(--border3); background: var(--bg4); }
    .auth-box input::placeholder { color: var(--t3); }

    .auth-box button {
      width: 100%;
      padding: 12px 20px;
      border-radius: var(--r2);
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: #000;
      margin-bottom: 8px;
      font-family: inherit;
      transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .auth-box button:hover { background: #e8e8e8; transform: scale(1.02); }
    .auth-box button:active { transform: scale(0.97); }
    .auth-box button.secondary {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--t2);
    }
    .auth-box button.secondary:hover { background: var(--bg4); color: var(--t1); }

    .error-message, .success-message {
      font-size: 12px;
      margin-top: -6px;
      margin-bottom: 8px;
      text-align: center;
      font-weight: 500;
    }
    .error-message { color: var(--pink); }
    .success-message { color: var(--green); }

    /* ─── CREATE MODAL ─── */
    .create-modal-header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .post-btn {
      background: #fff;
      border: none;
      color: #000;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 22px;
      font-family: inherit;
      transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .post-btn:hover { background: #e8e8e8; transform: scale(1.04); }
    .post-btn:active { transform: scale(0.94); }
    .post-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .create-modal-body { padding: 20px 22px 24px; }

    .create-modal textarea {
      width: 100%;
      min-height: 110px;
      padding: 12px 14px;
      border-radius: var(--r2);
      border: 1px solid var(--border2);
      font-size: 14px;
      outline: none;
      background: var(--bg3);
      color: var(--t1);
      resize: vertical;
      font-family: inherit;
      line-height: 1.65;
      transition: border-color 0.2s, background 0.2s;
    }
    .create-modal textarea:focus { border-color: var(--border3); background: var(--bg4); }
    .create-modal textarea::placeholder { color: var(--t3); }

    .image-preview-container { margin-top: 12px; }

    .image-preview {
      width: 100%;
      max-height: 340px;
      object-fit: cover;
      border-radius: var(--r2);
      display: none;
      border: 1px solid var(--border);
    }
    .image-preview.show { display: block; }

    .upload-btn {
      background: var(--bg3);
      border: 1px dashed var(--border2);
      padding: 10px 18px;
      border-radius: var(--r2);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      margin-top: 10px;
      color: var(--t2);
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      width: 100%;
    }
    .upload-btn:hover { border-color: var(--border3); color: var(--t1); background: var(--bg4); transform: scale(1.01); }
    .upload-btn:active { transform: scale(0.98); }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .recommend-container { display: none; }
      .sidebar-container {
        width: 100%;
        min-width: 100%;
        height: calc(72px + env(safe-area-inset-bottom));
        left: 0;
        right: 0;
        top: auto;
        bottom: 0;
      }
      .sidebar-container iframe {
        width: 100% !important;
        height: calc(72px + env(safe-area-inset-bottom)) !important;
        display: block;
      }
      .main-wrapper {
        margin-left: 0;
        width: 100%;
      }
      .main-content {
        padding: 20px 16px calc(20px + 72px + env(safe-area-inset-bottom)) 16px;
      }
    }
  </style>
</head>
<body>

<!-- ─── SPLASH SCREEN ─── -->
<div id="splash">
  <div class="splash-inner">
    <img src="logo.svg" class="splash-logo" alt="Sharer">
  </div>
</div>

<div class="sidebar-container">
  <iframe src="sidebar.html" id="sidebarFrame" width="72" height="100%" frameborder="0"></iframe>
</div>
<div class="main-wrapper">

  <!-- Login Modal -->
  <div class="auth-modal" id="loginModal">
    <div class="auth-box">
      <button class="auth-close" onclick="closeLoginModal()">✕</button>
      <h2>로그인</h2>
      <input type="text" id="loginId" placeholder="아이디">
      <input type="password" id="loginPassword" placeholder="비밀번호">
      <div class="error-message" id="loginError"></div>
      <div class="success-message" id="loginSuccess"></div>
      <button onclick="handleLogin()">로그인</button>
      <button class="secondary" onclick="showSignup()">회원가입</button>
    </div>
  </div>

  <!-- Signup Modal -->
  <div class="auth-modal" id="signupModal">
    <div class="auth-box">
      <button class="auth-close" onclick="closeSignupModal()">✕</button>
      <h2>회원가입</h2>
      <input type="text" id="signupNickname" placeholder="닉네임" maxlength="20">
      <div class="error-message" id="nicknameError"></div>
      <input type="text" id="signupId" placeholder="아이디">
      <div class="error-message" id="idError"></div>
      <input type="password" id="signupPassword" placeholder="비밀번호">
      <div class="error-message" id="signupError"></div>
      <div class="success-message" id="signupSuccess"></div>
      <button onclick="handleSignup()">가입</button>
      <button class="secondary" onclick="backToLogin()">로그인으로 돌아가기</button>
    </div>
  </div>

  <!-- Create Post Modal -->
  <div class="create-modal" id="createModal">
    <div class="create-modal-content">
      <div class="create-modal-header">
        <h3>새 게시물 만들기</h3>
        <div style="display: flex; gap: 10px; align-items: center;">
          <button class="post-btn" id="modalPostBtn">공유하기</button>
          <button class="close-btn" id="closeModal">×</button>
        </div>

(function () {

const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";

async function api(endpoint, options = {}) {
  const url = API_BASE + endpoint;
  const res = await fetch(url, {
    ...options,
    headers: { "Content-Type": "application/json", ...(options.headers || {}) },
  });
  if (!res.ok) {
    let errorText;
    try { errorText = await res.text(); } catch { errorText = ""; }
    throw new Error(`API 오류 (${res.status}): ${errorText}`);
  }
  if (res.status === 204) return null;
  return res.json();
}

async function uploadImageToCloudinary(file) {
  const formData = new FormData();
  formData.append('file', file);

  if (!response.ok) throw new Error('이미지 업로드 실패');
  const data = await response.json();
  return data.secure_url;
}

function formatPostTime(dateString) {
  const now = new Date();
  const date = new Date(dateString);
  const diffMs = now - date;
  const diffMin = Math.floor(diffMs / 60000);
  const diffHour = Math.floor(diffMin / 60);
  const isToday = now.toDateString() === date.toDateString();
  if (isToday) {
    if (diffMin < 1) return '방금 전';
    if (diffMin < 60) return diffMin + '분 전';
    return diffHour + '시간 전';
  }
  return date.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' });
}

function escapeHtml(text) {
  if (!text) return '';
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
  return text.replace(/[&<>"']/g, m => map[m]);
}

async function toggleLike(postId, button) {
  if (!currentUser) {
    document.getElementById('loginModal').classList.add('active');
    return;
  }
  const countEl = button.querySelector('.like-count');
  try {
    const [likeRecords, likeCountResult] = await Promise.all([
      api(`/likes?post_id=eq.${postId}&user_id=eq.${currentUser.id}&select=id`),
      api(`/likes?post_id=eq.${postId}&select=count`)
    ]);
    const currentlyLiked = likeRecords?.length > 0;
    const currentServerCount = Math.max(0, likeCountResult?.[0]?.count || 0);
    const uiLiked = button.classList.contains('liked');
    const uiCount = parseInt(countEl.textContent, 10) || 0;
    if (uiLiked !== currentlyLiked || uiCount !== currentServerCount) {
      button.classList.toggle('liked', currentlyLiked);
      countEl.textContent = currentServerCount;
      console.log('UI와 서버 상태 불일치 → 자동 동기화');
    }
    if (currentlyLiked) {
      if (likeRecords?.[0]?.id) {
        await api(`/likes?id=eq.${likeRecords[0].id}`, { method: "DELETE" });
      }
      button.classList.remove('liked');
      countEl.textContent = currentServerCount - 1;
    } else {
      await api("/likes", {
        method: "POST",
        body: JSON.stringify({
          post_id: postId,
          user_id: currentUser.id
        })
      });
      button.classList.add('liked');
      countEl.textContent = currentServerCount + 1;
    }
    const finalCount = await api(`/likes?post_id=eq.${postId}&select=count`)
      .then(r => Math.max(0, r?.[0]?.count || 0));
    countEl.textContent = finalCount;
  } catch (err) {
    console.error("좋아요 처리 중 오류:", err);
    try {
      const [records, countRes] = await Promise.all([
        api(`/likes?post_id=eq.${postId}&user_id=eq.${currentUser.id}&select=id`),
        api(`/likes?post_id=eq.${postId}&select=count`)
      ]);
      button.classList.toggle('liked', records?.length > 0);
      countEl.textContent = Math.max(0, countRes?.[0]?.count || 0);
    } catch (recoveryErr) {
      console.error("복구 실패:", recoveryErr);
    }
  }
}

// 최적화된 loadPosts
// 기존: 게시물 N개 × (유저 1 + 좋아요수 1 + 내좋아요 1) = 3N 요청
// 개선: 게시물 1 + 유저 1(배치) + 좋아요전체 1 + 내좋아요 1 = 4 요청 고정
// ──────────────────────────────────────────────────────────────
async function loadPosts() {
  const feedDiv = document.getElementById('postsFeed');
  try {
    // 1) 게시물 로드
    const posts = await api("/posts?select=*&order=created_at.desc");
    if (!posts?.length) {
      feedDiv.innerHTML = '<div class="no-posts">아직 게시물이 없습니다.<br>첫 번째 게시물을 작성해보세요! ✨</div>';
      return;
    }

    // 2) 유니크 author_id 목록 → 유저 정보 배치 로드 (요청 1번)
    const authorIds = [...new Set(posts.map(p => p.author_id).filter(Boolean))];
    const usersMap = {};
    if (authorIds.length) {
      try {
        const inFilter = authorIds.join(',');
        const users = await api(`/users?id=in.(${inFilter})&select=id,nickname,profile_image`);
        (users || []).forEach(u => { usersMap[u.id] = u; });
      } catch (e) { console.warn("유저 일괄 로드 실패:", e); }
    }

    // 3) 모든 게시물의 좋아요 데이터 한 번에 로드 (요청 1~2번)
    const postIds = posts.map(p => p.id);
    const postIdFilter = postIds.join(',');

    const [allLikes, myLikes] = await Promise.all([
      api(`/likes?post_id=in.(${postIdFilter})&select=post_id`).catch(() => []),
      currentUser
        ? api(`/likes?post_id=in.(${postIdFilter})&user_id=eq.${currentUser.id}&select=post_id`).catch(() => [])
        : Promise.resolve([])
    ]);

    // 좋아요 수 집계 (클라이언트에서)
    const likeCountMap = {};
    (allLikes || []).forEach(l => { likeCountMap[l.post_id] = (likeCountMap[l.post_id] || 0) + 1; });
    const myLikeSet = new Set((myLikes || []).map(l => l.post_id));

    // 4) 전체 DOM 한 번에 렌더링
    feedDiv.innerHTML = '';
    posts.forEach((post, idx) => {
      const userInfo = usersMap[post.author_id] || null;
      const authorNickname = userInfo?.nickname || post.author || '알 수 없음';
      const authorAvatar = userInfo?.profile_image || null;
      const isVerified = authorNickname === "JB777";
      const timeStr = formatPostTime(post.created_at);
      const canDelete = currentUser?.nickname === "JB777";
      const likeCount = likeCountMap[post.id] || 0;
      const liked = myLikeSet.has(post.id);

      const avatarHTML = authorAvatar
        ? `<img src="${escapeHtml(authorAvatar)}" class="post-author-avatar" style="object-fit:cover;" alt="${escapeHtml(authorNickname)}">`
        : `<div class="post-author-avatar">${(authorNickname[0] || '?').toUpperCase()}</div>`;

      const authorDisplay = isVerified
        ? `${escapeHtml(authorNickname)}<span class="verification-badge"></span>`
        : escapeHtml(authorNickname);

      const deleteButton = canDelete
        ? `<button class="delete-btn" onclick="event.stopPropagation(); deletePost('${post.id}')">삭제</button>`
        : '';

      let contentHTML = '';
      if (post.content) {
        const lines = escapeHtml(post.content).split('\n');
        const title = lines.shift() || '';
        const body = lines.filter(l => l.trim()).join('<br>');
        contentHTML = `<div class="post-content">
          <div style="font-weight:700; font-size:15px; margin-bottom:6px;">${title}</div>
          ${body ? `<div style="color:#666; font-size:14px; line-height:1.75;">${body}</div>` : ''}
        </div>`;
      }

      const postCard = document.createElement('div');
      postCard.className = 'post-card';
      postCard.style.animationDelay = `${Math.min(idx, 7) * 0.07}s`;
      postCard.innerHTML = `
        <div class="post-header">
          <div class="post-author-info" onclick="event.stopPropagation(); goToProfile('${post.author_id}', '${escapeHtml(authorNickname)}')">
            ${avatarHTML}
            <div class="post-author-name">${authorDisplay}</div>
          </div>
          ${deleteButton}
        </div>
        ${post.image_url ? `<img src="${escapeHtml(post.image_url)}" class="post-image" alt="게시글 이미지" loading="lazy">` : ''}
        ${contentHTML}
        <div class="post-actions">
          <button class="like-button ${liked ? 'liked' : ''}" onclick="event.stopPropagation(); toggleLike('${post.id}', this)">
            <svg class="like-heart" viewBox="0 0 2300 2300" xmlns="http://www.w3.org/2000/svg">
              <path fill="currentColor" d="M 2169.75708 1273.707397 C 2082.986328 1435.051758 1959.814697 1592.116455 1800.239746 1744.902832 C 1640.756348 1897.699951 1451.88208 2043.705688 1233.619141 2182.920898 C 1220.223145 2191.470215 1206.115234 2198.850586 1191.452637 2204.979248 C 1165.430908 2218.340332 1134.569092 2218.340332 1108.547363 2204.979248 C 1093.884766 2198.850586 1079.776855 2191.470215 1066.380859 2182.920898 C 848.148438 2043.693726 659.267578 1897.687988 499.74292 1744.902832 C 340.21582 1592.116455 217.04187 1435.051758 130.216797 1273.707397 C 43.415771 1112.370728 0 944.232666 0 779.5177 C 0 642.959229 28.581055 527.005981 85.715088 421.457642 C 139.349243 319.653564 219.24231 234.056396 317.106201 173.547607 C 414.637207 113.417725 527.301025 82.374756 641.860352 84.066162 C 755.30127 84.066162 858.310303 112.998535 943.981934 171.086914 C 1030.09082 228.040771 1100.847168 305.330322 1150 396.127686 C 1199.152832 305.330322 1269.90918 228.040771 1356.018066 171.086914 C 1441.689697 112.998535 1544.744385 84.066162 1658.139648 84.066162 C 1772.703369 82.367188 1885.371582 113.411133 1982.904785 173.547607 C 2080.76001 234.048828 2160.637695 319.64917 2214.239258 421.457642 C 2271.384033 527.005981 2300 642.959229 2300 779.5177 C 2300 944.232666 2256.584229 1112.370728 2169.75708 1273.707397 Z"/>
            </svg>
            <span class="like-count">${likeCount}</span>
          </button>
        </div>
        <div class="post-time">${timeStr}</div>
      `;
      postCard.onclick = (e) => {
        if (!e.target.closest('.like-button') && !e.target.closest('.delete-btn') && !e.target.closest('.post-author-info')) {
          window.location.href = `view.html?id=${post.id}`;
        }
      };
      feedDiv.appendChild(postCard);
    });

  } catch (err) {
    console.error('게시물 로드 오류:', err);
    feedDiv.innerHTML = '<div class="no-posts">게시물을 불러오는데 실패했습니다.</div>';
  }
}

async function loadRecommendedProfiles() {
  const container = document.getElementById('recommendProfiles');
  const skeleton = document.getElementById('recommendSkeleton');
  try {
    let users = await api("/users?select=id,nickname,profile_image");
    if (!users?.length) {
      skeleton?.remove();
      container.innerHTML += '<div style="text-align:center; color:var(--t3); padding:12px 0; font-size:13px;">사용자 없음</div>';
      return;
    }
    for (let i = users.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [users[i], users[j]] = [users[j], users[i]];
    }
    users = users.slice(0, 7);
    skeleton?.remove();
    users.forEach((user, idx) => {
      const avatarHTML = user.profile_image
        ? `<img src="${escapeHtml(user.profile_image)}" class="profile-avatar" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid var(--border2);" alt="${escapeHtml(user.nickname)}">`
        : `<div class="profile-avatar">${(user.nickname?.[0] || '?').toUpperCase()}</div>`;
      const item = document.createElement('div');
      item.className = 'profile-item';
      item.style.cssText = `opacity:0; transform:translateX(8px); transition: opacity 0.3s ease ${idx * 0.05}s, transform 0.3s cubic-bezier(0.22,1,0.36,1) ${idx * 0.05}s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);`;
      item.innerHTML = `${avatarHTML}<span class="profile-nickname">${escapeHtml(user.nickname)}</span>`;
      item.onclick = () => { window.location.href = `user.html?id=${user.id}&nickname=${encodeURIComponent(user.nickname)}`; };
      container.appendChild(item);
      requestAnimationFrame(() => requestAnimationFrame(() => {
        item.style.opacity = '1';
        item.style.transform = 'translateX(0)';
      }));
    });
  } catch (err) {
    console.error('추천 프로필 로드 오류:', err);
    if (skeleton) skeleton.innerHTML = '<div style="text-align:center; color:var(--t3); padding:12px 0; font-size:13px;">로드 실패</div>';
  }
}

window.goToProfile = (userId, nickname) => {
  if (userId && nickname) window.location.href = `user.html?id=${userId}&nickname=${encodeURIComponent(nickname)}`;
};

window.deletePost = async (postId) => {
  if (!confirm('이 게시물을 삭제하시겠습니까?')) return;
  try {
    await api(`/posts?id=eq.${postId}`, { method: "DELETE" });
    loadPosts();
  } catch (err) {
    console.error('삭제 오류:', err);
    alert('삭제에 실패했습니다.');
  }
};
