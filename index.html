<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.png">
  <meta name="description" content="Sharer는 이미지와 텍스트를 업로드하고 사람들과 소통할 수 있는 무료 커뮤니티·SNS 서비스입니다. 정빈777이 만들었습니다.">
  <meta name="keywords" content="Sharer, 커뮤니티, SNS, 정빈777, 정빈정빈">
  <meta name="author" content="정빈777">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Sharer | 커뮤니티 · SNS">
  <meta property="og:description" content="이미지와 텍스트를 업로드해보세요. 사람들과 소통해보세요. 모든 기능은 무료입니다.">
  <meta property="og:url" content="https://sharer.jbjb.r-e.kr/">
  <meta property="og:image" content="https://sharer.jbjb.r-e.kr/logo.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:site_name" content="Sharer">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Sharer | 커뮤니티 · SNS">
  <meta name="twitter:description" content="이미지와 텍스트를 업로드하고 사람들과 소통해보세요.">
  <meta name="twitter:image" content="https://sharer.jbjb.r-e.kr/logo.png">
  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>
  <style>
    .splash-text {
      text-align: center;
      animation: fadeUp 0.6s ease forwards;
      animation-delay: 0.2s;
      opacity: 1;
    }
    .splash-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #fff;
    }
    .splash-sub {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
      letter-spacing: 0.08em;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: bodyReveal 0.4s ease forwards;
    }
    @keyframes bodyReveal { to { opacity: 1; } }

    #splash {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      transition: opacity 0.45s ease;
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }

    .splash-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }
    .splash-logo {
      width: 72px;
      height: 72px;
      animation: splashLogoPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes splashLogoPop {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    #nprogress .bar { background: #fff !important; height: 2px !important; }
    #nprogress .peg { display: none !important; }
    #nprogress .spinner { display: none !important; }

    .sidebar-container {
      width: 72px;
      min-width: 72px;
      height: 100vh;
      position: fixed;
      left: 0; top: 0;
      z-index: 100;
    }
    .sidebar-container iframe { width: 72px !important; height: 100%; border: none; }

    .main-wrapper {
      margin-left: 72px;
      width: calc(100% - 72px);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .main-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 36px 28px;
      overflow-y: auto;
      opacity: 0;
      transform: translateY(16px);
      animation: contentReveal 0.5s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
    }
    @keyframes contentReveal { to { opacity: 1; transform: translateY(0); } }

    .feed-container { max-width: 590px; width: 100%; }

    .recommend-container {
      width: 240px;
      margin-left: 32px;
      position: sticky;
      top: 36px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r4);
      padding: 20px;
      opacity: 0;
      animation: sidebarReveal 0.5s cubic-bezier(0.22,1,0.36,1) 0.25s forwards;
    }
    @keyframes sidebarReveal {
      from { opacity: 0; transform: translateX(12px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .recommend-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 14px;
    }

    .profile-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--r2);
      cursor: pointer;
      transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .profile-item:hover { background: var(--bg3); transform: translateX(3px); }
    .profile-item:active { transform: scale(0.97); }

    .profile-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
      object-fit: cover;
      color: #666;
    }

    .profile-nickname {
      font-size: 13px;
      font-weight: 500;
      color: var(--t2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.15s;
    }
    .profile-item:hover .profile-nickname { color: var(--t1); }

    .skeleton {
      background: linear-gradient(90deg, var(--bg2) 0%, var(--bg3) 50%, var(--bg2) 100%);
      background-size: 300% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
      border-radius: var(--r1);
    }
    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    .skeleton-post { padding: 24px 0; border-bottom: 1px solid var(--border); }
    .skeleton-post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .skeleton-avatar { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; }
    .skeleton-username { width: 120px; height: 12px; }
    .skeleton-post-image { width: 100%; height: 340px; border-radius: var(--r3); margin: 12px 0; }
    .skeleton-text { height: 10px; margin: 8px 0; }
    .text-short { width: 50%; }
    .text-medium { width: 75%; }
    .text-long { width: 100%; }
    .skeleton-profile-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; }
    .skeleton-profile-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; }
    .skeleton-profile-nickname { width: 90px; height: 10px; }

    .post-card {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 36px 0;
      cursor: pointer;
      transition: background 0.15s;
      opacity: 0;
      transform: translateY(12px);
      animation: postIn 0.4s cubic-bezier(0.22,1,0.36,1) forwards;
      position: relative;
    }
    @keyframes postIn { to { opacity: 1; transform: translateY(0); } }
    .post-card:hover { background: #080808; }
    .post-card:last-child { border-bottom: none; }

    .post-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 0 2px;
    }

    .post-author-info { display: flex; align-items: center; gap: 10px; cursor: pointer; }

    .post-author-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 600;
      flex-shrink: 0;
      transition: border-color 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      color: #666;
    }
    .post-author-info:hover .post-author-avatar {
      border-color: var(--border3);
      transform: scale(1.06);
    }

    .post-author-name {
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--t1);
    }

    .post-image-container {
      position: relative;
      margin: 14px 0;
      border-radius: var(--r3);
      overflow: hidden;
      background: #000;
      border: 1px solid var(--border);
    }
    .post-image-carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .post-image-carousel::-webkit-scrollbar { display: none; }
    .post-image-slide {
      flex: 0 0 100%;
      scroll-snap-align: start;
    }
    .post-image-slide img {
      width: 100%;
      max-height: 560px;
      object-fit: cover;
      display: block;
    }
    .post-image-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
      z-index: 10;
      opacity: 1;
      transition: background 0.2s;
    }
    .post-image-nav:hover {
      background: rgba(0,0,0,0.9);
    }
    .post-image-nav.prev { left: 12px; }
    .post-image-nav.next { right: 12px; }

    .post-content {
      font-size: 14px;
      line-height: 1.6;
      max-height: calc(1.6em * 10);
      overflow: hidden;
      position: relative;
    }
    .post-content.fade::after {
      display: block;
      content: "";
      position: absolute;
      left: 0; right: 0;
      top: calc(1.6em * 6);
      height: calc(1.6em * 4);
      background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.3) 40%, rgba(0,0,0,0.7) 75%, var(--bg) 100%);
      pointer-events: none;
    }

    .post-time { padding: 8px 2px 10px; font-size: 11px; color: var(--t3); letter-spacing: 0.02em; }

    .post-actions { margin: 8px 0 2px; display: flex; align-items: center; gap: 16px; padding: 0 2px; }

    .like-button {
      background: none;
      border: none;
      padding: 5px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--t3);
      transition: color 0.15s;
      font-size: 13px;
      font-family: inherit;
    }
    .like-button:hover { color: var(--pink); }
    .like-button.liked { color: var(--pink); }

    .like-heart {
      width: 19px; height: 19px;
      fill: currentColor;
      transition: transform 0.25s cubic-bezier(0.34,1.7,0.64,1);
    }
    .like-button:hover .like-heart { transform: scale(1.25); }
    .like-button.liked .like-heart { transform: scale(1.1); }
    .like-button.liked:hover .like-heart { transform: scale(1.3); }

    .like-count { font-weight: 600; font-size: 13px; line-height: 1; min-width: 12px; }

    .no-posts {
      text-align: center;
      padding: 100px 20px;
      color: var(--t2);
      font-size: 15px;
      line-height: 1.8;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .no-posts-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.8;
      animation: floatIcon 3s ease-in-out infinite;
    }
    @keyframes floatIcon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .delete-btn {
      background: transparent;
      border: 1px solid #2a1a1a;
      color: var(--pink);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      transition: background 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      font-family: inherit;
    }
    .delete-btn:hover { background: rgba(255,107,107,0.1); border-color: var(--pink); transform: scale(1.04); }
    .delete-btn:active { transform: scale(0.94); }

    .verification-badge {
      display: inline-block;
      width: 14px; 
      height: 14px;
      vertical-align: middle;
      background-image: url('https://sharer.jbjb.r-e.kr/badge.svg');
      background-repeat: no-repeat;
      background-size: contain;
      background-position: center;
    }

    .footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      font-size: 12px;
      margin-top: auto;
    }
    .footer-links { margin-bottom: 8px; }
    .footer-links a { color: var(--t2); text-decoration: none; margin: 0 12px; font-weight: 500; transition: color 0.15s; }
    .footer-links a:hover { color: var(--t1); }
    .footer-text { color: var(--t3); font-size: 11px; }

    .auth-modal, .create-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .auth-modal.active, .create-modal.active { display: flex; }

    .auth-box, .create-modal-content {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r4);
      padding: 40px;
      width: 90%;
      max-width: 380px;
      position: relative;
      animation: modalPop 0.28s cubic-bezier(0.34,1.4,0.64,1);
    }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.90) translateY(14px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .create-modal-content { max-width: 540px; max-height: 90vh; overflow-y: auto; padding: 0; }

    .auth-close, .close-btn {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--t2);
      font-size: 16px;
      cursor: pointer;
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .auth-close:hover, .close-btn:hover { background: var(--bg4); color: var(--t1); }
    .auth-close { position: absolute; top: 16px; right: 16px; }

    .error-message { color: var(--pink); font-size: 12px; margin-top: -4px; margin-bottom: 10px; padding: 0 4px; display: none; }
    .success-message { color: var(--green); font-size: 12px; margin-top: -4px; margin-bottom: 10px; padding: 0 4px; display: none; }

    /* 모바일 반응형 추가 스태킹 */
    @media (max-width: 920px) {
      .recommend-container { display: none; }
      .main-content { padding: 36px 20px; }
    }
    @media (max-width: 680px) {
      body { padding-bottom: calc(56px + env(safe-area-inset-bottom, 0px)); }
      .sidebar-container {
        width: 100vw; height: calc(56px + env(safe-area-inset-bottom, 0px));
        top: auto; bottom: 0; left: 0;
        border-top: 1px solid var(--border);
      }
      .sidebar-container iframe { width: 100vw !important; height: 100%; }
      .main-wrapper { margin-left: 0; width: 100vw; min-height: calc(100vh - 56px - env(safe-area-inset-bottom, 0px)); }
      .main-content { padding: 20px 16px; }
      .post-image-nav { width: 36px; height: 36px; font-size: 20px; }
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="splash-inner">
      <img src="logo.svg" class="splash-logo" alt="Sharer">
      <div class="splash-text">
        <div class="splash-title">Sharer</div>
        <div class="splash-sub">By JBJB</div>
      </div>
    </div>
  </div>

  <div class="sidebar-container">
    <iframe src="sidebar.html" id="sidebarFrame" width="72" height="100%" frameborder="0"></iframe>
  </div>

  <div id="sharerProfileSheetHost" class="sharer-profile-sheet-host" hidden></div>

  <div class="main-wrapper">
    <div class="auth-modal" id="loginModal">
      <div class="auth-box">
        <button class="auth-close" onclick="closeLoginModal()">✕</button>
        <h2>로그인</h2>
        <input type="text" id="loginId" placeholder="아이디">

        <div class="success-message" id="loginSuccess"></div>
        <button onclick="handleLogin()">로그인</button>
        <button class="secondary" onclick="showSignup()">회원가입</button>

    </div>

    <div class="auth-modal" id="signupModal">
      <div class="auth-box">
        <button class="auth-close" onclick="closeSignupModal()">✕</button>
        <h2>회원가입</h2>
        <input type="text" id="signupNickname" placeholder="닉네임" maxlength="20">
        <div class="error-message" id="nicknameError"></div>
        <input type="text" id="signupId" placeholder="아이디">
        <div class="error-message" id="idError"></div>
        <input type="password" id="signupPassword" placeholder="비밀번호">
        <div class="error-message" id="signupError"></div>
        <div class="success-message" id="signupSuccess"></div>
        <button onclick="handleSignup()">가입</button>
        <button class="secondary" onclick="backToLogin()">로그인으로 돌아가기</button>

    </div>

    <main class="main-content">
      <div class="feed-container">
        <div id="postsFeed">
          <div class="skeleton-post">
            <div class="skeleton-post-header">
              <div class="skeleton skeleton-avatar"></div>
              <div class="skeleton skeleton-username"></div>
            </div>
            <div class="skeleton skeleton-post-image"></div>
            <div class="skeleton skeleton-text text-long"></div>
            <div class="skeleton skeleton-text text-medium"></div>
          </div>
          <div class="skeleton-post">
            <div class="skeleton-post-header">
              <div class="skeleton skeleton-avatar"></div>
              <div class="skeleton skeleton-username"></div>
            </div>
            <div class="skeleton skeleton-post-image"></div>
            <div class="skeleton skeleton-text text-long"></div>
          </div>
        </div>
      </div>

      <div class="recommend-container">
        <div class="recommend-title">추천 프로필</div>
        <div id="recommendedProfiles">
          <div class="skeleton-profile-item">
            <div class="skeleton skeleton-profile-avatar"></div>
            <div class="skeleton skeleton-profile-nickname"></div>
          </div>
          <div class="skeleton-profile-item">
            <div class="skeleton skeleton-profile-avatar"></div>
            <div class="skeleton skeleton-profile-nickname"></div>
          </div>
          <div class="skeleton-profile-item">
            <div class="skeleton skeleton-profile-avatar"></div>
            <div class="skeleton skeleton-profile-nickname"></div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-links">
        <a href="privacy.html">개인정보처리방침</a>
        <a href="policy.html">이용약관</a>
      </div>
      <div class="footer-text">© 2026 Sharer. Designed by 정빈777. All rights reserved.</div>
    </footer>
  </div>

  <script>
    (function () {
      const splash = document.getElementById('splash');
      if (sessionStorage.getItem('splashShown')) {
        splash.style.display = 'none';
      } else {
        sessionStorage.setItem('splashShown', 'true');
        function finishSplash() {
          splash.classList.add('fade-out');
          setTimeout(() => {
            splash.style.display = 'none';
          }, 460);
        }
        const splashStart = Date.now();
        const MIN_SPLASH = 2000;
        window.addEventListener('load', () => {
          NProgress.done();
          const elapsed = Date.now() - splashStart;
          const remaining = Math.max(0, MIN_SPLASH - elapsed);
          setTimeout(finishSplash, remaining);
        });
        setTimeout(finishSplash, 5000);
      }
    })();

    const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";

    async function api(endpoint, options = {}) {
      const url = API_BASE + endpoint;
      const res = await fetch(url, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          ...(options.headers || {})
        },
      });
      if (!res.ok) {
        let errorText;
        try { errorText = await res.text(); } catch { errorText = ""; }
        throw new Error(`API 오류 (${res.status}): ${errorText}`);
      }
      if (res.status === 204) return null;
      return res.json();
    }

    let currentUser = null;
    let selectedImage = null;
    const postAuthorIdMap = Object.create(null);
    const cloudName = 'dretlhsrk';
    const uploadPreset = 'unsigned_preset';

    async function createNotification(targetUserId, detail, link) {
      if (!targetUserId || targetUserId === currentUser?.id) return;
      try {
        await api("/notification", {
          method: "POST",
          body: JSON.stringify({ user: targetUserId, detail, link, isread: 0, created_at: new Date().toISOString() })
        });
      } catch (e) {}
    }

    function initCurrentUser() {
      const savedUser = localStorage.getItem('snsUser');
      if (savedUser) {
        currentUser = JSON.parse(savedUser);
        updateSidebar();
      }
    }

    function applyFadeEffect() {
      const elements = document.querySelectorAll('.post-content');
      elements.forEach(el => {
        if (el.scrollHeight > el.clientHeight) {
          el.classList.add('fade');
        }
      });
    }

    function formatPostTime(isoString) {
      if (!isoString) return '';
      const date = new Date(isoString);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMins / 60);

      if (diffMins < 1) return '방금 전';
      if (diffMins < 60) return `${diffMins}분 전`;
      if (diffHours < 24) return `${diffHours}시간 전`;

      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}년 ${m}월 ${d}일`;
    }

    function parseMarkdown(text) {
      if (!text) return '';
      let html = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
      html = html.replace(/__(.*?)__/g, '<u>$1</u>');
      html = html.replace(/~~(.*?)~~/g, '<del>$1</del>');
      html = html.replace(/\n/g, '<br>');
      return html;
    }

    function escapeHtml(unsafe) {
      if (!unsafe) return '';
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function loadPosts() {
      const feedDiv = document.getElementById('postsFeed');
      try {
        let [rawPosts, users, likes] = await Promise.all([
          api("/posts?select=*"),
          api("/users?select=id,nickname,profile_image"),
          api("/likes?select=post_id")
        ]);

        if (!rawPosts || rawPosts.length === 0) {
          showNoPosts();
          return;
        }

        // 비공개 및 일부 공개 게시물 필터링 추가 (visibility 필터 적용)
        const posts = rawPosts.filter(post => {
          return post.visibility !== '비공개' && post.visibility !== '일부 공개' && post.visibility !== '일부공개';
        });

        if (posts.length === 0) {
          showNoPosts();
          return;
        }

        posts.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

        const usersMap = Object.create(null);
        if (users) {
          users.forEach(u => { usersMap[u.id] = u; });
        }

        const likeCountMap = Object.create(null);
        if (likes) {
          likes.forEach(l => {
            likeCountMap[l.post_id] = (likeCountMap[l.post_id] || 0) + 1;
          });
        }

        let myLikes = null;
        if (currentUser) {
          myLikes = await api(`/likes?user_id=eq.${currentUser.id}&select=post_id`);
        }
        const myLikeSet = new Set((myLikes || []).map(l => l.post_id));

        feedDiv.innerHTML = '';

        posts.forEach((post, idx) => {
          postAuthorIdMap[post.id] = post.author_id;
          const userInfo = usersMap[post.author_id] || null;
          const authorNickname = userInfo?.nickname || post.author || '알 수 없음';
          const authorAvatar = userInfo?.profile_image || null;
          const isVerified = authorNickname === "JB777";
          const timeStr = formatPostTime(post.created_at);
          const canDelete = currentUser?.nickname === "JB777";
          const likeCount = likeCountMap[post.id] || 0;
          const liked = myLikeSet.has(post.id);

          const avatarHTML = authorAvatar 
            ? `<img src="${escapeHtml(authorAvatar)}" class="post-author-avatar" style="object-fit:cover;" alt="${escapeHtml(authorNickname)}">` 
            : `<div class="post-author-avatar">${(authorNickname[0] || '?').toUpperCase()}</div>`;
          
          const authorDisplay = isVerified 
            ? `${escapeHtml(authorNickname)}<span class="verification-badge"></span>` 
            : escapeHtml(authorNickname);
          
          const deleteButton = canDelete 
            ? `<button class="delete-btn" onclick="event.stopPropagation(); deletePost('${post.id}')">삭제</button>` 
            : '';

          let contentHTML = '';
          if (post.content) {
            contentHTML = `<div class="post-content">${parseMarkdown(post.content)}</div>`;
          }

          const postCard = document.createElement('div');
          postCard.className = 'post-card';
          postCard.style.animationDelay = `${Math.min(idx, 7) * 0.07}s`;
          postCard.innerHTML = `
            <div class="post-header">
              <div class="post-author-info" onclick="event.stopPropagation(); goToProfile('${post.author_id}', '${encodeURIComponent(authorNickname)}')">
                ${avatarHTML}
                <span class="post-author-name">${authorDisplay}</span>
              </div>
              ${deleteButton}
            </div>
            ${renderPostImages(post.image_url)}
            ${contentHTML}
            <div class="post-time">${timeStr}</div>
            <div class="post-actions">
              <button class="like-button ${liked ? 'liked' : ''}" data-post-id="${post.id}" onclick="event.stopPropagation(); handleLikeClick(this)">
                <svg class="like-heart" viewBox="0 0 24 24">
                  <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
                <span class="like-count">${likeCount}</span>
              </button>
            </div>
          `;

          postCard.onclick = () => {
            window.location.href = `view.html?id=${post.id}`;
          };

          feedDiv.appendChild(postCard);
        });

        applyFadeEffect();

      } catch (err) {
        console.error('피드 로드 오류:', err);
        feedDiv.innerHTML = '<div class="no-posts"><div class="no-posts-icon">⚠️</div><div class="no-posts-text">피드를 불러오는 중 오류가 발생했습니다.</div></div>';
      }
    }

    function showNoPosts() {
      document.getElementById('postsFeed').innerHTML = `
        <div class="no-posts">
          <div class="no-posts-icon">📭</div>
          <div class="no-posts-text">
            아직 게시물이 없습니다.<br>
            첫 번째 게시물을 작성해보세요!
          </div>
        </div>
      `;
    }

    async function handleLikeClick(button) {
      if (!currentUser) {
        document.getElementById('loginModal').classList.add('active');
        return;
      }
      const postId = button.getAttribute('data-post-id');
      const countEl = button.querySelector('.like-count');
      
      try {
        const [likeRecords, likeCountResult] = await Promise.all([
          api(`/likes?post_id=eq.${postId}&user_id=eq.${currentUser.id}&select=id`),
          api(`/likes?post_id=eq.${postId}&select=count`)
        ]);

        const currentlyLiked = likeRecords && likeRecords.length > 0;
        const currentServerCount = Math.max(0, likeCountResult?.[0]?.count || 0);

        const uiLiked = button.classList.contains('liked');
        const uiCount = parseInt(countEl.textContent, 10) || 0;

        if (uiLiked !== currentlyLiked || uiCount !== currentServerCount) {
          button.classList.toggle('liked', currentlyLiked);
          countEl.textContent = currentServerCount;
        }

        if (currentlyLiked) {
          if (likeRecords?.[0]?.id) {
            await api(`/likes?id=eq.${likeRecords[0].id}`, { method: "DELETE" });
          }
          button.classList.remove('liked');
          countEl.textContent = currentServerCount - 1;
        } else {
          await api("/likes", {
            method: "POST",
            body: JSON.stringify({ post_id: postId, user_id: currentUser.id })
          });
          button.classList.add('liked');
          countEl.textContent = currentServerCount + 1;
          createNotification(postAuthorIdMap[postId], `${currentUser.nickname}님이 좋아요를 눌렀습니다`, `view.html?id=${postId}`);
        }

        const finalCount = await api(`/likes?post_id=eq.${postId}&select=count`).then(r => Math.max(0, r?.[0]?.count || 0));
        countEl.textContent = finalCount;

      } catch (err) {
        console.error("좋아요 처리 중 오류:", err);
        try {
          const [records, countRes] = await Promise.all([
            api(`/likes?post_id=eq.${postId}&user_id=eq.${currentUser.id}&select=id`),
            api(`/likes?post_id=eq.${postId}&select=count`)
          ]);
          button.classList.toggle('liked', records?.length > 0);
          countEl.textContent = Math.max(0, countRes?.[0]?.count || 0);
        } catch (recoveryErr) {
          console.error("복구 실패:", recoveryErr);
        }
      }
    }

    function renderPostImages(imageUrl) {
      if (!imageUrl) return '';
      const urls = imageUrl.split(',').map(u => u.trim()).filter(Boolean);
      if (urls.length === 0) return '';

      let html = `<div class="post-image-container">`;
      html += `<div class="post-image-carousel">`;
      urls.forEach(url => {
        html += `
          <div class="post-image-slide">
            <img src="${escapeHtml(url)}" loading="lazy" alt="Post Image">
          </div>
        `;
      });
      html += `</div>`;

      if (urls.length > 1) {
        html += `
          <button class="post-image-nav prev" onclick="event.stopPropagation(); moveCarousel(this, -1)">‹</button>
          <button class="post-image-nav next" onclick="event.stopPropagation(); moveCarousel(this, 1)">›</button>
        `;
      }
      html += `</div>`;
      return html;
    }

    window.moveCarousel = function(button, direction) {
      const container = button.parentElement.querySelector('.post-image-carousel');
      if (!container) return;
      const width = container.clientWidth;
      container.scrollBy({ left: direction * width, behavior: 'smooth' });
    };

    async function loadRecommendedProfiles() {
      const container = document.getElementById('recommendedProfiles');
      const skeleton = container.innerHTML;
      try {
        let users = await api("/users?select=id,nickname,profile_image");
        if (!users?.length) {
          container.innerHTML = '<div style="text-align:center; color:var(--t3); padding:12px 0; font-size:13px;">사용자 없음</div>';
          return;
        }

        for (let i = users.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [users[i], users[j]] = [users[j], users[i]];
        }
        users = users.slice(0, 7);

        container.innerHTML = '';
        users.forEach((user, idx) => {
          const isVerified = user.nickname === "JB777";
          const avatarHTML = user.profile_image 
            ? `<img src="${escapeHtml(user.profile_image)}" class="profile-avatar" style="object-fit:cover;" alt="${escapeHtml(user.nickname)}">` 
            : `<div class="profile-avatar">${(user.nickname[0] || '?').toUpperCase()}</div>`;
          
          const nameDisplay = isVerified 
            ? `${escapeHtml(user.nickname)}<span class="verification-badge"></span>` 
            : escapeHtml(user.nickname);

          const item = document.createElement('div');
          item.className = 'profile-item';
          item.style.opacity = '0';
          item.style.transform = 'translateX(8px)';
          item.style.transition = `opacity 0.4s cubic-bezier(0.22,1,0.36,1) ${idx * 0.05}s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1)`;
          item.innerHTML = `${avatarHTML}<span class="profile-nickname">${nameDisplay}</span>`;
          
          item.onclick = () => { 
            window.location.href = `user.html?id=${user.id}&nickname=${encodeURIComponent(user.nickname)}`; 
          };
          
          container.appendChild(item);
          requestAnimationFrame(() => requestAnimationFrame(() => {
            item.style.opacity = '1';
            item.style.transform = 'translateX(0)';
          }));
        });
      } catch (err) {
        console.error('추천 프로필 로드 오류:', err);
        container.innerHTML = '<div style="text-align:center; color:var(--t3); padding:12px 0; font-size:13px;">로드 실패</div>';
      }
    }

    window.goToProfile = (userId, nickname) => {
      if (userId && nickname) window.location.href = `user.html?id=${userId}&nickname=${encodeURIComponent(nickname)}`;
    };

    window.deletePost = async (postId) => {
      if (!confirm('이 게시물을 삭제하시겠습니까?')) return;
      try {
        await api(`/posts?id=eq.${postId}`, { method: "DELETE" });
        loadPosts();
      } catch (err) {
        console.error('삭제 오류:', err);
        alert('삭제에 실패했습니다.');
      }
    };

    function updateSidebar() {
      try {
        const iframe = document.getElementById('sidebarFrame');
        if (iframe && iframe.contentWindow) {
          iframe.contentWindow.postMessage({ type: 'AUTH_UPDATE' }, '*');
        }
      } catch (e) {}
    }

    function updateSidebarMode() {
      const iframe = document.getElementById('sidebarFrame');
      if (!iframe) return;
      if (window.innerWidth <= 680) {
        iframe.style.width = '100vw';
        iframe.style.height = '100%';
      } else {
        iframe.style.width = '72px';
        iframe.style.height = '100vh';
      }
    }

    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'OPEN_LOGIN') {
        if (currentUser) {
          localStorage.removeItem('snsUser');
          currentUser = null;
          updateSidebar();
          location.reload();
        } else {
          document.getElementById('loginModal').classList.add('active');
        }
      }
    });

    window.closeLoginModal = () => document.getElementById('loginModal').classList.remove('active');
    window.closeSignupModal = () => document.getElementById('signupModal').classList.remove('active');
    
    window.showSignup = () => {
      closeLoginModal();
      document.getElementById('signupModal').classList.add('active');
    };
    
    window.backToLogin = () => {
      closeSignupModal();
      document.getElementById('loginModal').classList.add('active');
    };

    async function handleLogin() {
      const idInput = document.getElementById('loginId');
      const pwInput = document.getElementById('loginPassword');
      const errDiv = document.getElementById('loginError');
      const succDiv = document.getElementById('loginSuccess');

      const username = idInput.value.trim();
      const password = pwInput.value.trim();

      errDiv.style.display = 'none';
      succDiv.style.display = 'none';

      if (!username || !password) {
        errDiv.textContent = '아이디와 비밀번호를 모두 입력해주세요.';
        errDiv.style.display = 'block';
        return;
      }

      try {
        const users = await api(`/users?username=eq.${encodeURIComponent(username)}&password=eq.${encodeURIComponent(password)}`);
        if (!users || users.length === 0) {
          errDiv.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
          errDiv.style.display = 'block';
          return;
        }

        succDiv.textContent = '로그인 성공!';
        succDiv.style.display = 'block';

        localStorage.setItem('snsUser', JSON.stringify(users[0]));
        currentUser = users[0];
        updateSidebar();

        setTimeout(() => {
          closeLoginModal();
          location.reload();
        }, 600);

      } catch (err) {
        errDiv.textContent = '로그인 중 오류가 발생했습니다.';
        errDiv.style.display = 'block';
      }
    }

    async function handleSignup() {
      const nickInput = document.getElementById('signupNickname');
      const idInput = document.getElementById('signupId');
      const pwInput = document.getElementById('signupPassword');
      
      const nickErr = document.getElementById('nicknameError');
      const idErr = document.getElementById('idError');
      const signErr = document.getElementById('signupError');
      const signSucc = document.getElementById('signupSuccess');

      nickErr.style.display = 'none';
      idErr.style.display = 'none';
      signErr.style.display = 'none';
      signSucc.style.display = 'none';

      const nickname = nickInput.value.trim();
      const username = idInput.value.trim();
      const password = pwInput.value.trim();

      if (!nickname) { nickErr.textContent = '닉네임을 입력해주세요.'; nickErr.style.display = 'block'; return; }
      if (!username) { idErr.textContent = '아이디를 입력해주세요.'; idErr.style.display = 'block'; return; }
      if (!password) { signErr.textContent = '비밀번호를 입력해주세요.'; signErr.style.display = 'block'; return; }

      try {
        const existNick = await api(`/users?nickname=eq.${encodeURIComponent(nickname)}`);
        if (existNick && existNick.length > 0) {
          nickErr.textContent = '이미 사용 중인 닉네임입니다.';
          nickErr.style.display = 'block';
          return;
        }

        const existId = await api(`/users?username=eq.${encodeURIComponent(username)}`);
        if (existId && existId.length > 0) {
          idErr.textContent = '이미 사용 중인 아이디입니다.';
          idErr.style.display = 'block';
          return;
        }

        const newUser = await api("/users", {
          method: "POST",
          body: JSON.stringify({ nickname, username, password, created_at: new Date().toISOString() })
        });

        signSucc.textContent = '회원가입이 완료되었습니다!';
        signSucc.style.display = 'block';

        setTimeout(async () => {
          try {
            const loginUsers = await api(`/users?username=eq.${encodeURIComponent(username)}&password=eq.${encodeURIComponent(password)}`);
            if (loginUsers && loginUsers.length > 0) {
              localStorage.setItem('snsUser', JSON.stringify(loginUsers[0]));
            }
          } catch (e) {}
          closeSignupModal();
          location.reload();
        }, 1000);

      } catch (err) {
        signErr.textContent = '회원가입 처리 중 오류가 발생했습니다.';
        signErr.style.display = 'block';
      }
    }

    // 초기 로드 실행
    NProgress.start();
    initCurrentUser();
    updateSidebarMode();
    window.addEventListener('resize', updateSidebarMode);

    document.addEventListener('DOMContentLoaded', () => {
      loadPosts();
      loadRecommendedProfiles();
    });
  </script>
</body>
</html>
