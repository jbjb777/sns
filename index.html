  <script>
    const savedTheme = localStorage.getItem('theme') || 'dark';
    if (savedTheme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  </script>

  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>
  <style>
    .splash-text {
      text-align: center;
      animation: fadeUp 0.6s ease forwards;
      animation-delay: 0.2s;
      opacity: 1;
    }
    .splash-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--t1); /* 테마 변수로 수정 */
    }
    .splash-sub {
      font-size: 12px;
      color: var(--t2); /* 테마 변수로 수정 */
      margin-top: 4px;
      letter-spacing: 0.08em;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    /* 라이트 모드 변수 정의 추가 */
    html[data-theme="light"] {
      --bg: #fafafa;
      --bg2: #ffffff;
      --bg3: #f0f0f0;
      --bg4: #e4e4e4;
      --border: #dbdbdb;
      --border2: #cccccc;
      --border3: #a3a3a3;
      --t1: #000000;
      --t2: #737373;
      --t3: #a8a8a8;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: bodyReveal 0.4s ease forwards;
      padding-top: 45px; /* 상단 고정 배너 높이만큼 여백 제공 (배너가 글을 가리지 않게 함) */
      transition: padding-top 0.3s ease; /* 배너가 닫힐 때 여백도 부드럽게 사라짐 */
    }
    @keyframes bodyReveal { to { opacity: 1; } }

    #splash {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      transition: opacity 0.45s ease;
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }

    .splash-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }
    .splash-logo {
      width: 72px;
      height: 72px;
      animation: splashLogoPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes splashLogoPop {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    #nprogress .bar { background: var(--t1) !important; height: 2px !important; } /* 테마 변수로 수정 */
    #nprogress .peg { display: none !important; }
    #nprogress .spinner { display: none !important; }

    .sidebar-container {
      width: 72px;
      min-width: 72px;
      height: 100vh;
      position: fixed;
      left: 0; top: 0;
      z-index: 100;
    }
    .sidebar-container iframe { width: 72px !important; height: 100%; border: none; }

    .main-wrapper {
      margin-left: 72px;
      width: calc(100% - 72px);
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .main-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 36px 28px;
      overflow-y: auto;
      opacity: 0;
      transform: translateY(16px);
      animation: contentReveal 0.5s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
    }
    @keyframes contentReveal { to { opacity: 1; transform: translateY(0); } }

    .feed-container { max-width: 590px; width: 100%; }

    .recommend-container {
      width: 240px;
      margin-left: 32px;
      position: sticky;
      top: 36px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r4);
      padding: 20px;
      opacity: 0;
      animation: sidebarReveal 0.5s cubic-bezier(0.22,1,0.36,1) 0.25s forwards;
    }
    @keyframes sidebarReveal {
      from { opacity: 0; transform: translateX(12px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .recommend-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 14px;
    }

    .profile-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--r2);
      cursor: pointer;
      transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .profile-item:hover { background: var(--bg3); transform: translateX(3px); }
    .profile-item:active { transform: scale(0.97); }

    .profile-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
      object-fit: cover;
      color: var(--t2); /* 테마 변수로 수정 */
    }

    /* 스토리 프로필 테두리 그라데이션 */
    .story-ring-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      flex-shrink: 0;
      vertical-align: middle; /* 다른 텍스트나 버튼과 수평 축 맞추기 */
    }
    .story-ring-wrapper.has-story {
      padding: 2.5px;
      background: linear-gradient(270deg, #0740ba, #651fff, #29b1ff, #0740ba);
      background-size: 200% 200%;
      animation: storyRing 3s linear infinite;
    }
    @keyframes storyRing {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    .story-ring-wrapper.has-story .post-author-avatar,
    .story-ring-wrapper.has-story .profile-avatar {
      border: 3px solid var(--bg) !important;
    }

    .profile-nickname {
      font-size: 13px;
      font-weight: 500;
      color: var(--t2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.15s;
    }
    .profile-item:hover .profile-nickname { color: var(--t1); }

    .skeleton {
      background: linear-gradient(90deg, var(--bg2) 0%, var(--bg3) 50%, var(--bg2) 100%);
      background-size: 300% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
      border-radius: var(--r1);
    }
    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    .skeleton-post { padding: 24px 0; border-bottom: 1px solid var(--border); }
    .skeleton-post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .skeleton-avatar { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; }
    .skeleton-username { width: 120px; height: 12px; }
    .skeleton-post-image { width: 100%; height: 340px; border-radius: var(--r3); margin: 12px 0; }
    .skeleton-text { height: 10px; margin: 8px 0; }
    .text-short { width: 50%; }
    .text-medium { width: 75%; }
    .text-long { width: 100%; }
    .skeleton-profile-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; }
    .skeleton-profile-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; }
    .skeleton-profile-nickname { width: 90px; height: 10px; }

    .post-card {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 36px 0;
      cursor: pointer;
      transition: background 0.15s;
      opacity: 0;
      transform: translateY(12px);
      animation: postIn 0.4s cubic-bezier(0.22,1,0.36,1) forwards;
      position: relative;
    }
    @keyframes postIn { to { opacity: 1; transform: translateY(0); } }
    .post-card:hover { background: var(--bg2); } /* 테마 변수로 수정 */
    .post-card:last-child { border-bottom: none; }

    .post-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 0 2px;
    }

    .post-author-info { display: flex; align-items: center; gap: 10px; cursor: pointer; }

    .post-author-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 600;
      flex-shrink: 0;
      transition: border-color 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      color: var(--t2); /* 테마 변수로 수정 */
    }
    .post-author-info:hover .post-author-avatar {
      border-color: var(--border3);
      transform: scale(1.06);
    }

    .post-author-name {
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--t1);
    }

    .post-image-container {
      position: relative;
      margin: 14px 0;
      border-radius: var(--r3);
      overflow: hidden;
      background: #000;
      border: 1px solid var(--border);
    }
    .post-image-carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .post-image-carousel::-webkit-scrollbar { display: none; }
    .post-image-slide {
      flex: 0 0 100%;
      scroll-snap-align: start;
    }
    .post-image-slide img {
      width: 100%;
      max-height: 560px;
      object-fit: cover;
      display: block;
    }
    .post-image-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
      z-index: 10;
      opacity: 1;
      transition: background 0.2s;
    }
    .post-image-nav:hover {
      background: rgba(0,0,0,0.9);
    }
    .post-image-nav.prev { left: 12px; }
    .post-image-nav.next { right: 12px; }

    .post-content {
      font-size: 14px;
      line-height: 1.6;
      max-height: calc(1.6em * 10);
      overflow: hidden;
      position: relative;
    }
    /* 라이트 모드 대응을 위해 투명 그라데이션의 끝 색상을 각 모드의 배경색 변수(--bg)로 매핑 */
    .post-content.fade::after {
      display: block;
      content: "";
      position: absolute;
      left: 0; right: 0;
      top: calc(1.6em * 6);
      height: calc(1.6em * 4);
      background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.02) 40%, rgba(0,0,0,0.05) 75%, var(--bg) 100%);
      pointer-events: none;
    }

    /* 만약 라이트 모드일 때 조금 더 또렷하고 깔끔한 그라데이션 처리를 원할 경우 대비 */
    html[data-theme="light"] .post-content.fade::after {
      background: linear-gradient(to bottom, rgba(250,250,250,0) 0%, rgba(250,250,250,0.4) 40%, rgba(250,250,250,0.8) 75%, var(--bg) 100%);
    }

    .post-time { padding: 8px 2px 10px; font-size: 11px; color: var(--t3); letter-spacing: 0.02em; }

    .post-actions { margin: 8px 0 2px; display: flex; align-items: center; gap: 16px; padding: 0 2px; }

    .like-button {
      background: none;
      border: none;
      padding: 5px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--t3);
      transition: color 0.15s;
      font-size: 13px;
      font-family: inherit;
    }
    .like-button:hover { color: var(--pink); }
    .like-button.liked { color: var(--pink); }

    .like-heart {
      width: 19px; height: 19px;
      fill: currentColor;
      transition: transform 0.25s cubic-bezier(0.34,1.7,0.64,1);
    }
    .like-button:hover .like-heart { transform: scale(1.25); }
    .like-button.liked .like-heart { transform: scale(1.1); }
    .like-button.liked:hover .like-heart { transform: scale(1.3); }

    .like-count { font-weight: 600; font-size: 13px; line-height: 1; min-width: 12px; }

    .no-posts {
      text-align: center;
      padding: 100px 20px;
      color: var(--t2);
      font-size: 15px;
      line-height: 1.8;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .no-posts-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.8;
      animation: floatIcon 3s ease-in-out infinite;
    }
    @keyframes floatIcon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .delete-btn {
      background: transparent;
      border: 1px solid var(--border2); /* 테마 변수로 수정 */
      color: var(--pink);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      transition: background 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      font-family: inherit;
    }
    .delete-btn:hover { background: rgba(255,107,107,0.1); border-color: var(--pink); transform: scale(1.04); }
    .delete-btn:active { transform: scale(0.94); }

    .verification-badge {
      display: inline-block;
      width: 14px; 
      height: 14px;
      vertical-align: middle;
      background-image: url('https://sharer.r-e.kr/badge.svg');
      background-repeat: no-repeat;
      background-size: contain;
      background-position: center;
    }

    .footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      font-size: 12px;
      margin-top: auto;
    }
    .footer-links { margin-bottom: 8px; }
    .footer-links a { color: var(--t2); text-decoration: none; margin: 0 12px; font-weight: 500; transition: color 0.15s; }
    .footer-links a:hover { color: var(--t1); }
    .footer-text { color: var(--t3); font-size: 11px; }

    .auth-modal, .create-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .auth-modal.active, .create-modal.active { display: flex; }

    .auth-box, .create-modal-content {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r4);
      padding: 40px;
      width: 90%;
      max-width: 380px;
      position: relative;
      animation: modalPop 0.28s cubic-bezier(0.34,1.4,0.64,1);
    }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.90) translateY(14px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .create-modal-content { max-width: 540px; max-height: 90vh; overflow-y: auto; padding: 0; }

    .auth-close, .close-btn {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--t2);
      font-size: 16px;
      cursor: pointer;
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      line-height: 1;
    }
    .auth-close { position: absolute; top: 16px; right: 16px; }
    .auth-close:hover, .close-btn:hover { background: var(--bg4); color: var(--t1); transform: scale(1.1); }
    .auth-close:active, .close-btn:active { transform: scale(0.90); }

    .auth-box h2, .create-modal-header h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--t1);
      letter-spacing: -0.02em;
    }
    .auth-box h2 { text-align: center; margin-bottom: 26px; }

    .auth-box input {
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--r2);
      border: 1px solid var(--border2);
      font-size: 14px;
      margin-bottom: 10px;
      outline: none;
      background: var(--bg3);
      color: var(--t1);
      font-family: inherit;
      transition: border-color 0.2s, background 0.2s;
    }
    .auth-box input:focus { border-color: var(--border3); background: var(--bg4); }
    .auth-box input::placeholder { color: var(--t3); }

    .auth-box button {
      width: 100%;
      padding: 12px 20px;
      border-radius: var(--r2);
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: var(--t1); /* 테마 변수로 수정 */
      color: var(--bg); /* 테마 변수로 수정 */
      margin-bottom: 8px;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .auth-box button:hover { opacity: 0.85; transform: scale(1.02); } /* 테마 변수로 수정 */
    .auth-box button:active { transform: scale(0.97); }
    .auth-box button.secondary {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--t2);
    }
    .auth-box button.secondary:hover { background: var(--bg4); color: var(--t1); opacity: 1; }

    .error-message, .success-message {
      font-size: 12px;
      margin-top: -6px;
      margin-bottom: 8px;
      text-align: center;
      font-weight: 500;
    }
    .error-message { color: var(--pink); }
    .success-message { color: var(--green); }

    .create-modal-header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .post-btn {
      background: var(--t1); /* 테마 변수로 수정 */
      color: var(--bg); /* 테마 변수로 수정 */
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 22px;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .post-btn:hover { opacity: 0.85; transform: scale(1.04); } /* 테마 변수로 수정 */
    .post-btn:active { transform: scale(0.94); }
    .post-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .create-modal-body { padding: 20px 22px 24px; }

    .create-modal textarea {
      width: 100%;
      min-height: 110px;
      padding: 12px 14px;
      border-radius: var(--r2);
      border: 1px solid var(--border2);
      font-size: 14px;
      outline: none;
      background: var(--bg3);
      color: var(--t1);
      resize: vertical;
      font-family: inherit;
      line-height: 1.65;
      transition: border-color 0.2s, background 0.2s;
    }
    .create-modal textarea:focus { border-color: var(--border3); background: var(--bg4); }
    .create-modal textarea::placeholder { color: var(--t3); }

    .image-preview-container { margin-top: 12px; }

    .image-preview {
      width: 100%;
      max-height: 340px;
      object-fit: cover;
      border-radius: var(--r2);
      display: none;
      border: 1px solid var(--border);
    }
    .image-preview.show { display: block; }

    .upload-btn {
      background: var(--bg3);
      border: 1px dashed var(--border2);
      padding: 10px 18px;
      border-radius: var(--r2);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      margin-top: 10px;
      color: var(--t2);
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.01,0.64,1);
      width: 100%;
    }
    .upload-btn:hover { border-color: var(--border3); color: var(--t1); background: var(--bg4); transform: scale(1.01); }
    .upload-btn:active { transform: scale(0.98); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; } /* 테마 변수로 수정 */
    ::-webkit-scrollbar-thumb:hover { background: var(--border3); }

    .sharer-profile-sheet-host[hidden] { display: none !important; }
    .sharer-profile-sheet-host {
      position: fixed;
      inset: 0;
      z-index: 960;
    }
    .sharer-profile-sheet-host .sps-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.34s ease;
    }
    .sharer-profile-sheet-host.sps-host-open .sps-backdrop {
      opacity: 1;
      pointer-events: auto;
    }
    .sharer-profile-sheet-host .sps-panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg); /* 테마 변수로 수정 */
      border: 1px solid var(--border); /* 테마 변수로 수정 */
      border-bottom: none;
      border-radius: 20px 20px 0 0;
      padding: 4px 16px calc(20px + env(safe-area-inset-bottom, 0px));
      box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.45);
      max-height: 44vh;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      will-change: transform;
      transform: translateY(100%);
      transition: transform 0.44s cubic-bezier(0.22, 1, 0.36, 1), max-height 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .sharer-profile-sheet-host.sps-host-open .sps-panel {
      transform: translateY(0);
    }
    .sharer-profile-sheet-host .sps-panel.sps-panel-expanded {
      max-height: 88vh;
    }
    .sharer-profile-sheet-host .sps-panel.sps-panel-dragging {
      transition: none;
    }
    .sharer-profile-sheet-host .sps-drag-area {
      touch-action: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 6px 16px 14px;
      margin: -2px -16px 0 -16px;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
    }
    .sharer-profile-sheet-host .sps-drag-area:active {
      cursor: grabbing;
    }
    .sharer-profile-sheet-host .sps-grab {
      width: 40px;
      height: 5px;
      border-radius: 5px;
      background: var(--border3); /* 테마 변수로 수정 */
      flex-shrink: 0;
    }
    .sharer-profile-sheet-host .sps-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--bg2); /* 테마 변수로 수정 */
      cursor: pointer;
      margin-bottom: 12px;
    }
    .sharer-profile-sheet-host .sps-av {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3478f6, #53b6f9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #fff;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sharer-profile-sheet-host .sps-av img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .sharer-profile-sheet-host .sps-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--t1); /* 테마 변수로 수정 */
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sharer-profile-sheet-host .sps-logout {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      background: rgba(255, 80, 80, 0.15);
      color: #ff8a8a;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    @media (max-width: 768px) {
      .recommend-container { display: none; }
      .sidebar-container {
        left: 0; right: 0; top: auto; bottom: 0;
        width: 100%; min-width: 0;
        height: calc(64px + env(safe-area-inset-bottom, 0px));
      }
      .sidebar-container iframe { width: 100% !important; height: 100% !important; }
      .main-wrapper {
        margin-left: 0; width: 100%;
        padding-bottom: calc(64px + env(safe-area-inset-bottom, 0px));
      }
      .main-content { padding: 20px 16px; }
      .post-image-nav { width: 36px; height: 36px; font-size: 20px; }
    }

    /* --- Pull To Refresh 지메일/ChatGPT 얇은 원형 스피너 스타일 --- */
    #pullRefresh {
      position: fixed;
      top: -65px;
      left: 50%;
      transform: translateX(-50%);
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      pointer-events: none; /* 드래그 방해 방지 */
    }

    #pullSpinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--border3);
      border-top-color: #4a90ff;
      border-radius: 50%;
      transform-origin: center;
      transition: transform 0.1s linear;
    }

    #pullRefresh.loading #pullSpinner {
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="pullRefresh">
    <div id="pullSpinner"></div>
  </div>

  <div id="splash">
    <div class="splash-inner">
      <img src="logo.svg" class="splash-logo" alt="Sharer">
      <div class="splash-text">
        <div class="splash-title">Sharer</div>
        <div class="splash-sub">By JBJB</div>
      </div>
    </div>
  </div>

  <div class="sidebar-container">
    <iframe src="sidebar.html" id="sidebarFrame" width="72" height="100%" frameborder="0"></iframe>
  </div>

  <div id="sharerProfileSheetHost" class="sharer-profile-sheet-host" hidden></div>

  <div class="main-wrapper">
    <div class="auth-modal" id="loginModal">
      <div class="auth-box">
        <button class="auth-close" onclick="closeLoginModal()">✕</button>
        <h2>로그인</h2>
        <input type="text" id="loginId" placeholder="아이디">
        <input type="password" id="loginPassword" placeholder="비밀번호">
        <div class="error-message" id="loginError"></div>
        <div class="success-message" id="loginSuccess"></div>
        <button onclick="handleLogin()">로그인</button>
        <button class="secondary" onclick="showSignup()">회원가입</button>
      </div>
    </div>

    <div class="auth-modal" id="signupModal">
      <div class="auth-box">
        <button class="auth-close" onclick="closeSignupModal()">✕</button>
        <h2>회원가입</h2>
        <input type="text" id="signupNickname" placeholder="닉네임" maxlength="20">
        <div class="error-message" id="nicknameError"></div>
        <input type="text" id="signupId" placeholder="아이디">
        <div class="error-message" id="idError"></div>
        <input type="password" id="signupPassword" placeholder="비밀번호">
        <div class="error-message" id="signupError"></div>
        <div class="success-message" id="signupSuccess"></div>
        <button onclick="handleSignup()">가입</button>
        <button class="secondary" onclick="backToLogin()">로그인으로 돌아가기</button>
      </div>
    </div>

    <div class="create-modal" id="createModal">
      <div class="create-modal-content">
        <div class="create-modal-header">
          <h3>새 게시물 만들기</h3>
          <div style="display: flex; gap: 10px; align-items: center;">
            <button class="post-btn" id="modalPostBtn">공유하기</button>
            <button class="close-btn" id="closeModal">×</button>
          </div>
        </div>
        <div class="create-modal-body">
          <textarea id="postContent" placeholder="문구를 입력하세요..."></textarea>
          <div class="image-preview-container">
            <img id="imagePreview" class="image-preview">
          </div>
          <input type="file" id="imageInput" accept="image/*" style="display: none;">
          <button class="upload-btn" id="uploadBtn">📷 사진 추가</button>
          <div id="postMessage" style="margin-top: 10px; font-size: 13px; font-weight: 500;"></div>
        </div>
      </div>
    </div>

    <div class="main-content">
      <div class="feed-container">
        <div id="postsFeed">
          <div class="skeleton-post">
            <div class="skeleton-post-header">
              <div class="skeleton skeleton-avatar"></div>
              <div class="skeleton skeleton-username"></div>
            </div>
            <div class="skeleton skeleton-post-image"></div>
            <div class="skeleton skeleton-text text-long"></div>
            <div class="skeleton skeleton-text text-medium"></div>
            <div class="skeleton skeleton-text text-short"></div>
          </div>
          <div class="skeleton-post">
            <div class="skeleton-post-header">
              <div class="skeleton skeleton-avatar"></div>
              <div class="skeleton skeleton-username"></div>
            </div>
            <div class="skeleton skeleton-post-image"></div>
            <div class="skeleton skeleton-text text-long"></div>
            <div class="skeleton skeleton-text text-long"></div>
          </div>
        </div>
      </div>

      <div class="recommend-container" id="recommendProfiles">
        <div class="recommend-title">프로필 추천</div>
        <div id="recommendSkeleton">
          <div class="skeleton-profile-item"><div class="skeleton skeleton-profile-avatar"></div><div class="skeleton skeleton-profile-nickname"></div></div>
          <div class="skeleton-profile-item"><div class="skeleton skeleton-profile-avatar"></div><div class="skeleton skeleton-profile-nickname"></div></div>
          <div class="skeleton-profile-item"><div class="skeleton skeleton-profile-avatar"></div><div class="skeleton skeleton-profile-nickname"></div></div>
        </div>
        <div id="recommendList"></div>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-links">
        <a href="#">소개</a>
        <a href="#">블로그</a>
        <a href="#">채용 정보</a>
        <a href="#">도움말</a>
        <a href="#">API</a>
        <a href="#">개인정보처리방침</a>
        <a href="#">약관</a>
      </div>
      <div class="footer-text">© 2025 Sharer from JBJB</div>
    </footer>
  </div>

  <script type="module">
    import { 
      auth, db, 
      collection, addDoc, getDocs, query, orderBy, limit, startAfter, deleteDoc, doc, getDoc, updateDoc, increment, arrayUnion, arrayRemove,
      onAuthStateChanged, signOut,
      storage, ref, uploadBytes, getDownloadURL
    } from './firebase-config.js';

    let currentUser = null;
    let lastVisible = null;
    let isFetching = false;
    let hasMore = true;

    // --- 원본 초기 스켈레톤 디자인 상태 보존 변수 정의 ---
    const defaultFeedSkeleton = document.getElementById('postsFeed').innerHTML;
    const defaultRecommendSkeleton = document.getElementById('recommendSkeleton') ? document.getElementById('recommendProfiles').innerHTML : '';

    const postsFeed = document.getElementById('postsFeed');
    const recommendList = document.getElementById('recommendList');
    const recommendSkeleton = document.getElementById('recommendSkeleton');

    const createModal = document.getElementById('createModal');
    const postContent = document.getElementById('postContent');
    const imageInput = document.getElementById('imageInput');
    const imagePreview = document.getElementById('imagePreview');
    const uploadBtn = document.getElementById('uploadBtn');
    const modalPostBtn = document.getElementById('modalPostBtn');
    const postMessage = document.getElementById('postMessage');

    // UI elements for Auth state
    let sidebarWindow = null;

    window.addEventListener('message', (e) => {
      if (e.data === 'sidebar-ready') {
        sidebarWindow = document.getElementById('sidebarFrame').contentWindow;
        updateSidebarAuthUI();
      }
      if (e.data === 'click-profile') {
        if (currentUser) {
          openProfileSheet();
        } else {
          showLoginModal();
        }
      }
      if (e.data === 'click-create') {
        if (currentUser) {
          openCreateModal();
        } else {
          showLoginModal();
        }
      }
      if (e.data === 'click-theme') {
        toggleTheme();
      }
    });

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'dark';
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      if (sidebarWindow) {
        sidebarWindow.postMessage({ type: 'theme-changed', theme: next }, '*');
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists()) {
          currentUser = { uid: user.uid, ...userDoc.data() };
        } else {
          currentUser = { uid: user.uid, nickname: user.displayName || '익명 사용자', avatarText: (user.displayName || '익').substring(0,1) };
        }
      } else {
        currentUser = null;
      }
      updateSidebarAuthUI();
      closeProfileSheet();
    });

    function updateSidebarAuthUI() {
      if (!sidebarWindow) return;
      const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
      sidebarWindow.postMessage({ type: 'theme-changed', theme: currentTheme }, '*');
      if (currentUser) {
        sidebarWindow.postMessage({
          type: 'auth-state',
          isLoggedIn: true,
          avatarText: currentUser.avatarText || currentUser.nickname.substring(0,1),
          avatarUrl: currentUser.avatarUrl || ''
        }, '*');
      } else {
        sidebarWindow.postMessage({
          type: 'auth-state',
          isLoggedIn: false
        }, '*');
      }
    }

    // Modal triggers exported to window
    window.showLoginModal = () => { document.getElementById('loginModal').classList.add('active'); };
    window.closeLoginModal = () => { document.getElementById('loginModal').classList.remove('active'); clearAuthFields(); };
    window.showSignup = () => { document.getElementById('loginModal').classList.remove('active'); document.getElementById('signupModal').classList.add('active'); };
    window.closeSignupModal = () => { document.getElementById('signupModal').classList.remove('active'); clearAuthFields(); };
    window.backToLogin = () => { document.getElementById('signupModal').classList.remove('active'); document.getElementById('loginModal').classList.add('active'); };

    function clearAuthFields() {
      ['loginId','loginPassword','signupNickname','signupId','signupPassword'].forEach(id => {
        const el = document.getElementById(id); if(el) el.value='';
      });
      ['loginError','loginSuccess','nicknameError','idError','signupError','signupSuccess'].forEach(id => {
        const el = document.getElementById(id); if(el) el.innerHTML='';
      });
    }

    window.handleLogin = async () => {
      const id = document.getElementById('loginId').value.trim();
      const pw = document.getElementById('loginPassword').value;
      const errEl = document.getElementById('loginError');
      const succEl = document.getElementById('loginSuccess');
      errEl.innerHTML = ''; succEl.innerHTML = '';

      if(!id || !pw) { errEl.innerHTML = '아이디와 비밀번호를 모두 입력해 주세요.'; return; }
      try {
        const { signInWithEmailAndPassword } = await import('./firebase-config.js');
        const email = id + "@sharer.internal";
        await signInWithEmailAndPassword(auth, email, pw);
        succEl.innerHTML = '로그인 성공!';
        setTimeout(() => { closeLoginModal(); window.location.reload(); }, 600);
      } catch (err) {
        console.error(err);
        errEl.innerHTML = '아이디 또는 비밀번호가 올바르지 않습니다.';
      }
    };

    window.handleSignup = async () => {
      const nickname = document.getElementById('signupNickname').value.trim();
      const id = document.getElementById('signupId').value.trim();
      const pw = document.getElementById('signupPassword').value;
      
      const nErr = document.getElementById('nicknameError');
      const iErr = document.getElementById('idError');
      const sErr = document.getElementById('signupError');
      const sSucc = document.getElementById('signupSuccess');
      
      [nErr, iErr, sErr, sSucc].forEach(el => el.innerHTML = '');

      if(!nickname) { nErr.innerHTML = '닉네임을 입력해 주세요.'; return; }
      if(!id) { iErr.innerHTML = '아이디를 입력해 주세요.'; return; }
      if(pw.length < 6) { sErr.innerHTML = '비밀번호는 6자리 이상이어야 합니다.'; return; }

      try {
        const idCheck = await getDoc(doc(db, "usernames", id.toLowerCase()));
        if(idCheck.exists()) { iErr.innerHTML = '이미 존재하는 아이디입니다.'; return; }

        const { createUserWithEmailAndPassword } = await import('./firebase-config.js');
        const email = id + "@sharer.internal";
        const userCredential = await createUserWithEmailAndPassword(auth, email, pw);
        const user = userCredential.user;

        const avatarText = nickname.substring(0,1);
        await updateDoc(doc(db, "usernames", id.toLowerCase()), { uid: user.uid });
        await updateDoc(doc(db, "users", user.uid), {
          username: id,
          nickname: nickname,
          avatarText: avatarText,
          createdAt: new Date().toISOString()
        });

        sSucc.innerHTML = '회원가입이 완료되었습니다!';
        setTimeout(() => { closeSignupModal(); window.location.reload(); }, 1000);
      } catch(err) {
        console.error(err);
        sErr.innerHTML = '가입 중 오류가 발생했습니다. 다시 시도해 주세요.';
      }
    };

    // Profile Bottom Sheet Action Setup
    const sheetHost = document.getElementById('sharerProfileSheetHost');
    function openProfileSheet() {
      if(!currentUser) return;
      sheetHost.removeAttribute('hidden');
      sheetHost.innerHTML = `
        <div class="sps-backdrop" id="spsBackdrop"></div>
        <div class="sps-panel" id="spsPanel">
          <div class="sps-drag-area" id="spsDrag">
            <div class="sps-grab"></div>
          </div>
          <div class="sps-profile">
            <div class="sps-av">
              ${currentUser.avatarUrl ? `<img src="${currentUser.avatarUrl}">` : (currentUser.avatarText || 'U')}
            </div>
            <div class="sps-name">${currentUser.nickname}</div>
          </div>
          <button class="sps-logout" id="spsLogoutBtn">로그아웃</button>
        </div>
      `;
      setTimeout(() => sheetHost.classList.add('sps-host-open'), 20);

      document.getElementById('spsBackdrop').addEventListener('click', closeProfileSheet);
      document.getElementById('spsLogoutBtn').addEventListener('click', async () => {
        await signOut(auth);
        window.location.reload();
      });

      setupDragSheet();
    }
    window.closeProfileSheet = () => {
      sheetHost.classList.remove('sps-host-open');
      setTimeout(() => sheetHost.setAttribute('hidden', ''), 440);
    };

    function setupDragSheet() {
      const panel = document.getElementById('spsPanel');
      const drag = document.getElementById('spsDrag');
      let startY = 0, currentY = 0, initialY = 0;
      let dragging = false;

      drag.addEventListener('touchstart', e => {
        startY = e.touches[0].clientY;
        dragging = true;
        panel.classList.add('sps-panel-dragging');
      });
      window.addEventListener('touchmove', e => {
        if(!dragging) return;
        currentY = e.touches[0].clientY;
        const delta = currentY - startY;
        if(delta > 0) {
          panel.style.transform = `translateY(${delta}px)`;
        } else {
          panel.style.transform = `translateY(${delta * 0.2}px)`;
        }
      });
      window.addEventListener('touchend', e => {
        if(!dragging) return;
        dragging = false;
        panel.classList.remove('sps-panel-dragging');
        const delta = currentY - startY;
        panel.style.transform = '';
        if(delta > 110) {
          closeProfileSheet();
        }
      });
    }

    // Post Creation Modal
    function openCreateModal() { createModal.classList.add('active'); postContent.focus(); }
    function closeCreateModal() {
      createModal.classList.remove('active');
      postContent.value = '';
      imageInput.value = '';
      imagePreview.src = '';
      imagePreview.classList.remove('show');
      postMessage.innerHTML = '';
      modalPostBtn.disabled = false;
    }
    document.getElementById('closeModal').addEventListener('click', closeCreateModal);
    uploadBtn.addEventListener('click', () => imageInput.click());

    imageInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          imagePreview.src = e.target.result;
          imagePreview.classList.add('show');
        };
        reader.readAsDataURL(file);
      }
    });

    modalPostBtn.addEventListener('click', async () => {
      const text = postContent.value.trim();
      const file = imageInput.files[0];
      if (!text && !file) { postMessage.innerHTML = '<span style="color:var(--pink)">내용이나 사진을 추가해 주세요.</span>'; return; }

      modalPostBtn.disabled = true;
      postMessage.innerHTML = '업로드 중...';

      try {
        let imageUrls = [];
        if (file) {
          const filename = Date.now() + "_" + file.name;
          const storageRef = ref(storage, 'posts/' + filename);
          const snapshot = await uploadBytes(storageRef, file);
          const url = await getDownloadURL(snapshot.ref);
          imageUrls.push(url);
        }

        await addDoc(collection(db, "posts"), {
          uid: currentUser.uid,
          authorName: currentUser.nickname,
          authorUsername: currentUser.username || 'user',
          authorAvatarText: currentUser.avatarText || currentUser.nickname.substring(0,1),
          authorAvatarUrl: currentUser.avatarUrl || '',
          content: text,
          images: imageUrls,
          createdAt: new Date().toISOString(),
          likesCount: 0,
          likedBy: []
        });

        postMessage.innerHTML = '<span style="color:var(--green)">성공적으로 공유되었습니다!</span>';
        setTimeout(() => { closeCreateModal(); window.location.reload(); }, 800);
      } catch (err) {
        console.error(err);
        postMessage.innerHTML = '<span style="color:var(--pink)">업로드 중 에러가 발생했습니다.</span>';
        modalPostBtn.disabled = false;
      }
    });

    // Content Feeds Loader
    async function loadPosts(isRefresh = false) {
      if (isFetching) return;
      isFetching = true;

      if (isRefresh) {
        lastVisible = null;
        hasMore = true;
      }

      try {
        let postsQuery = query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(6));
        if (lastVisible && !isRefresh) {
          postsQuery = query(collection(db, "posts"), orderBy("createdAt", "desc"), startAfter(lastVisible), limit(6));
        }

        const snapshot = await getDocs(postsQuery);
        if (isRefresh) postsFeed.innerHTML = '';

        if (snapshot.empty) {
          hasMore = false;
          if (postsFeed.children.length === 0) {
            postsFeed.innerHTML = `
              <div class="no-posts">
                <div class="no-posts-icon">🍃</div>
                <div>아직 작성된 게시글이 없습니다.</div>
                <div style="font-size:12px;color:var(--t3);margin-top:4px;">첫 번째 이야기를 사람들과 공유해 보세요.</div>
              </div>
            `;
          }
          isFetching = false;
          return;
        }

        lastVisible = snapshot.docs[snapshot.docs.length - 1];

        snapshot.forEach((docSnap) => {
          const post = docSnap.data();
          const postId = docSnap.id;
          const card = createPostCard(postId, post);
          postsFeed.appendChild(card);
        });

      } catch (err) {
        console.error("게시글 파싱 실패:", err);
      } finally {
        isFetching = false;
      }
    }

    function createPostCard(id, post) {
      const card = document.createElement('div');
      card.className = 'post-card';

      const hasImages = post.images && post.images.length > 0;
      const isLiked = currentUser && post.likedBy && post.likedBy.includes(currentUser.uid);
      const isAuthor = currentUser && currentUser.uid === post.uid;

      // 시간 포맷팅
      let timeString = '방금 전';
      if (post.createdAt) {
        const diff = Date.now() - new Date(post.createdAt).getTime();
        const mins = Math.floor(diff / 60000);
        const hours = Math.floor(mins / 60);
        const days = Math.floor(hours / 24);
        if (days > 0) timeString = `${days}일 전`;
        else if (hours > 0) timeString = `${hours}시간 전`;
        else if (mins > 0) timeString = `${mins}분 전`;
      }

      // 글자수 체크 후 더보기 페이드 클래스 결정
      const needsFade = post.content && post.content.length > 220;

      card.innerHTML = `
        <div class="post-header">
          <div class="post-author-info">
            <div class="story-ring-wrapper">
              <div class="post-author-avatar">
                ${post.authorAvatarUrl ? `<img src="${post.authorAvatarUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : (post.authorAvatarText || 'U')}
              </div>
            </div>
            <div class="post-author-name">
              ${post.authorName}
              ${post.authorUsername === 'jbjb' ? '<span class="verification-badge"></span>' : ''}
            </div>
          </div>
          ${isAuthor ? `<button class="delete-btn" data-id="${id}">삭제</button>` : ''}
        </div>

        ${hasImages ? `
          <div class="post-image-container">
            <div class="post-image-carousel">
              <div class="post-image-slide"><img src="${post.images[0]}" alt="Post Image"></div>
            </div>
          </div>
        ` : ''}

        <div class="post-content ${needsFade ? 'fade' : ''}" id="content-${id}">
          ${post.content ? post.content.replace(/\n/g, '<br>') : ''}
        </div>

        <div class="post-time">${timeString}</div>

        <div class="post-actions">
          <button class="like-button ${isLiked ? 'liked' : ''}" data-id="${id}">
            <svg class="like-heart" viewBox="0 0 24 24">
              <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
            <span class="like-count">${post.likesCount || 0}</span>
          </button>
        </div>
      `;

      // 이벤트 위임 대신 개별 바인딩
      if (isAuthor) {
        card.querySelector('.delete-btn').addEventListener('click', async (e) => {
          e.stopPropagation();
          if(confirm("정말 이 게시물을 삭제하시겠습니까?")) {
            await deleteDoc(doc(db, "posts", id));
            card.remove();
          }
        });
      }

      card.querySelector('.like-button').addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!currentUser) { showLoginModal(); return; }
        const btn = e.currentTarget;
        const countEl = btn.querySelector('.like-count');
        const currentIsLiked = btn.classList.contains('liked');
        
        // UI 반영 최적화 (Optimistic update)
        let count = parseInt(countEl.innerText);
        if (currentIsLiked) {
          btn.classList.remove('liked');
          count = Math.max(0, count - 1);
        } else {
          btn.classList.add('liked');
          count += 1;
        }
        countEl.innerText = count;

        try {
          const postRef = doc(db, "posts", id);
          if (currentIsLiked) {
            await updateDoc(postRef, { likedBy: arrayRemove(currentUser.uid), likesCount: increment(-1) });
          } else {
            await updateDoc(postRef, { likedBy: arrayUnion(currentUser.uid), likesCount: increment(1) });
          }
        } catch(err) {
          console.error(err);
        }
      });

      if (needsFade) {
        card.querySelector(`#content-${id}`).addEventListener('click', (e) => {
          e.currentTarget.classList.remove('fade');
          e.currentTarget.style.maxHeight = 'none';
        });
      }

      return card;
    }

    async function loadRecommendedProfiles() {
      if (!recommendList) return;
      try {
        const userQuery = query(collection(db, "users"), limit(5));
        const snapshot = await getDocs(userQuery);
        
        if (recommendSkeleton) recommendSkeleton.style.display = 'none';
        recommendList.innerHTML = '';

        snapshot.forEach(docSnap => {
          const u = docSnap.data();
          if (currentUser && docSnap.id === currentUser.uid) return;

          const item = document.createElement('div');
          item.className = 'profile-item';
          item.innerHTML = `
            <div class="profile-avatar">${u.avatarUrl ? `<img src="${u.avatarUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : (u.avatarText || 'U')}</div>
            <div class="profile-nickname">${u.nickname}</div>
          `;
          recommendList.appendChild(item);
        });
      } catch (err) {
        console.error("추천 프로필 로딩 실패:", err);
      }
    }

    // 인피니트 스크롤 핸들러
    const contentEl = document.querySelector('.main-content');
    contentEl.addEventListener('scroll', () => {
      if (!hasMore || isFetching) return;
      const { scrollTop, scrollHeight, clientHeight } = contentEl;
      if (scrollTop + clientHeight >= scrollHeight - 160) {
        loadPosts();
      }
    });

    // --- Pull to Refresh 드래그 앤 드롭 구현 로직 (지메일 스타일 원형 스피너 제어) ---
    let startY = 0;
    let pulling = false;
    let isLoading = false;
    const refreshEl = document.getElementById('pullRefresh');
    const spinnerEl = document.getElementById('pullSpinner');

    function isScrollTop() {
      return contentEl.scrollTop === 0;
    }

    window.addEventListener('touchstart', e => {
      if (!isScrollTop() || isLoading) return;
      startY = e.touches[0].clientY;
      pulling = true;
    }, { passive: true });

    window.addEventListener('touchmove', e => {
      if (!pulling || isLoading) return;
      const currentY = e.touches[0].clientY;
      const distance = currentY - startY;

      if (distance > 0 && isScrollTop()) {
        // 당길 때 화면 스크롤이 같이 동작하지 못하도록 기본 액션 제어
        if (e.cancelable) e.preventDefault();
        
        // 최대 드래그 임계치 지정 및 감쇠 효과 적용
        const topPos = Math.min(24, -65 + distance * 0.45);
        refreshEl.style.top = `${topPos}px`;
        refreshEl.style.transition = 'none'; // 드래그 중에는 애니메이션 제거

        // 당기는 거리에 반응하여 스피너 축 회전 각도 실시간 반영
        const rotateDeg = distance * 2.5;
        spinnerEl.style.transform = `rotate(${rotateDeg}deg)`;
      } else {
        pulling = false;
        refreshEl.style.top = '-65px';
        refreshEl.style.transition = 'top .2s ease';
      }
    }, { passive: false });

    window.addEventListener('touchend', async e => {
      if (!pulling || isLoading) return;
      pulling = false;

      const currentY = e.changedTouches[0].clientY;
      const distance = currentY - startY;

      refreshEl.style.transition = 'top .25s cubic-bezier(0.22, 1, 0.36, 1)';

      // 80px 이상 충분히 아래로 넘겨 당겼을 때 새로고침 동작 활성화
      if (distance > 80 && isScrollTop()) {
        isLoading = true;
        
        // [수정사항] 새로고침 확정 즉시, 기존 게시물 영역을 스켈레톤 상태로 실시간 치환
        postsFeed.innerHTML = defaultFeedSkeleton;
        const recommendContainer = document.getElementById('recommendProfiles');
        if (recommendContainer && defaultRecommendSkeleton) {
          recommendContainer.innerHTML = defaultRecommendSkeleton;
        }

        refreshEl.classList.add('loading');
        refreshEl.style.top = '24px'; // 로딩바 고정 위치 고수

        try {
          // 비동기 병렬 구조 처리로 성능 향상 촉진
          await Promise.all([
            loadPosts(true),
            loadRecommendedProfiles()
          ]);
        } catch (err) {
          console.error("새로고침 실행 중 데이터 연동 에러 발생:", err);
        } finally {
          // 비동기 통신 완료 후 안정적으로 원래 자리로 이동 조치
          setTimeout(() => {
            refreshEl.classList.remove('loading');
            refreshEl.style.top = '-65px';
            spinnerEl.style.transform = 'none';
            isLoading = false;
          }, 450);
        }
      } else {
        // 임계값 미만 도달 시 자연스럽게 원상 복구 처리
        refreshEl.style.top = '-65px';
        spinnerEl.style.transform = 'none';
      }
    });

    // 앱 구동 시 초기 로드 바인딩 진입점 정의
    (async function initApp() {
      NProgress.start();
      await Promise.all([
        loadPosts(true),
        loadRecommendedProfiles()
      ]);
      NProgress.done();
      
      // 스플래시 화면 페이드아웃 적용
      const splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('fade-out');
        setTimeout(() => splash.remove(), 450);
      }
    })();

  </script>
</body>
