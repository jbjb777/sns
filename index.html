<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.png">
  <meta name="description" content="Sharer는 이미지와 텍스트를 업로드하고 사람들과 소통할 수 있는 무료 커뮤니티·SNS 서비스입니다. 정빈777이 만들었습니다.">
  <meta name="keywords" content="Sharer, 커뮤니티, SNS, 정빈777, 정빈정빈">
  <meta name="author" content="정빈777">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Sharer | 커뮤니티 · SNS">
  <meta property="og:description" content="이미지와 텍스트를 업로드해보세요. 사람들과 소통해보세요. 모든 기능은 무료입니다.">
  <meta property="og:url" content="https://sharer.jbjb.r-e.kr/">
  <meta property="og:image" content="https://sharer.jbjb.r-e.kr/logo.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:site_name" content="Sharer">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Sharer | 커뮤니티 · SNS">
  <meta name="twitter:description" content="이미지와 텍스트를 업로드해보세요. 사람들과 소통해보세요. 모든 기능은 무료입니다.">
  <meta name="twitter:image" content="https://sharer.jbjb.r-e.kr/logo.png">
  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      display: flex;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    #nprogress .bar { background: #fff !important; height: 2px !important; }
    #nprogress .spinner { display: none !important; }

    /* ─── SIDEBAR ─── */
    .sidebar-container {
      width: 72px;
      min-width: 72px;
      height: 100vh;
      position: fixed;
      left: 0; top: 0;
      border-right: 1px solid var(--border);
      z-index: 100;
      background: var(--bg);
    }
    .sidebar-container iframe {
      width: 72px !important;
      height: 100%;
      border: none;
    }

    /* ─── LAYOUT STRUCT ─── */
    .main-layout {
      margin-left: 72px;
      flex: 1;
      display: flex;
      justify-content: center;
      min-width: 0;
    }

    .feed-container {
      max-width: 600px;
      width: 100%;
      padding: 36px 20px;
      min-width: 0;
    }

    .right-sidebar {
      width: 320px;
      padding: 36px 24px;
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ─── STORY / BANNER ─── */
    .story-section {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 12px;
      margin-bottom: 24px;
    }
    .story-section::-webkit-scrollbar { display: none; }

    /* ─── SEARCH BOX ─── */
    .search-box {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r4);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.2s, background 0.2s;
    }
    .search-box:focus-within {
      border-color: var(--border3);
      background: var(--bg3);
    }
    .search-box svg { color: var(--t3); flex-shrink: 0; }
    .search-box input {
      background: none;
      border: none;
      outline: none;
      color: var(--t1);
      font-size: 14px;
      width: 100%;
      font-family: inherit;
    }
    .search-box input::placeholder { color: var(--t3); }

    /* ─── POST CARD ─── */
    .posts-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .post-card {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r4);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      opacity: 0;
      transform: translateY(14px);
      transition: border-color 0.2s, background 0.2s;
    }
    .post-card:hover {
      border-color: var(--border3);
      background: var(--bg2);
    }

    /* ─── POST HEADER ─── */
    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .post-author-info {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }
    .avatar-circle {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: #666;
      flex-shrink: 0;
      overflow: hidden;
    }
    .avatar-circle img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .author-details {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .author-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--t1);
    }
    .post-time {
      font-size: 11px;
      color: var(--t3);
    }

    /* ─── MORE BUTTON & DROPDOWN ─── */
    .more-btn {
      background: none;
      border: none;
      color: var(--t3);
      cursor: pointer;
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }
    .more-btn:hover { color: var(--t1); background: var(--bg3); }

    .dropdown-menu {
      position: absolute;
      top: 64px; right: 24px;
      background: var(--bg3);
      border: 1px solid var(--border3);
      border-radius: var(--r2);
      padding: 6px;
      display: none;
      flex-direction: column;
      gap: 4px;
      z-index: 10;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .dropdown-item {
      padding: 8px 14px;
      font-size: 13px;
      color: var(--t2);
      border-radius: var(--r1);
      cursor: pointer;
      white-space: nowrap;
      background: none;
      border: none;
      text-align: left;
      font-family: inherit;
      width: 100%;
    }
    .dropdown-item:hover { background: var(--bg4); color: var(--t1); }
    .dropdown-item.delete { color: var(--pink); }
    .dropdown-item.delete:hover { background: rgba(255,107,107,0.1); }

    /* ─── POST CONTENT ─── */
    .post-content {
      font-size: 15px;
      line-height: 1.6;
      color: #eee;
      white-space: pre-wrap;
      word-break: break-all;
    }
    
    .post-content h1 { font-size: 1.4em; margin-bottom: 8px; font-weight: 700; color: #fff; }
    .post-content h2 { font-size: 1.25em; margin-bottom: 6px; font-weight: 600; color: #fff; }
    .post-content h3 { font-size: 1.1em; margin-bottom: 4px; font-weight: 600; color: #fff; }
    .post-content strong { font-weight: 700; color: #fff; }
    .post-content em { font-style: italic; }
    .post-content u { text-decoration: underline; }
    .post-content hr { border: none; height: 1px; background: var(--border3); margin: 14px 0; }

    /* ─── IMAGE GRID ─── */
    .post-image-container {
      border-radius: var(--r3);
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
    }

    .image-grid {
      display: grid;
      gap: 2px;
      background: var(--border);
    }

    .image-grid.count-1 { grid-template-columns: 1fr; }
    .image-grid.count-2 { grid-template-columns: 1fr 1fr; }
    .image-grid.count-3 { grid-template-columns: 1.2fr 1fr; grid-template-rows: 1fr 1fr; }
    .image-grid.count-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .image-grid.count-5 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1.2fr 1fr; }

    .image-grid-item {
      position: relative;
      overflow: hidden;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    .image-grid.count-3 .image-grid-item:nth-child(1) {
      grid-row: span 2;
    }
    .image-grid.count-5 .image-grid-item:nth-child(1) { grid-column: span 1; }
    .image-grid.count-5 .image-grid-item:nth-child(2) { grid-column: span 2; }

    .image-grid img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }
    .image-grid-item:hover img {
      transform: scale(1.02);
    }

    .image-grid.count-1 .image-grid-item { aspect-ratio: 16 / 10; max-height: 480px; }
    .image-grid.count-2 { aspect-ratio: 16 / 10; }
    .image-grid.count-3 { aspect-ratio: 16 / 11; }
    .image-grid.count-4 { aspect-ratio: 16 / 11; }
    .image-grid.count-5 { aspect-ratio: 16 / 12; }

    .image-more-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 18px; font-weight: 600;
      pointer-events: none;
    }

    /* ─── POST ACTIONS ─── */
    .post-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      padding-top: 4px;
    }

    .action-btn {
      background: none;
      border: none;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--t2);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      padding: 6px 10px;
      border-radius: var(--r1);
      transition: color 0.15s, background 0.15s, transform 0.15s;
    }
    .action-btn:hover { color: var(--t1); background: var(--bg3); }
    .action-btn:active { transform: scale(0.96); }
    .action-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .action-btn.liked { color: var(--pink); }
    .action-btn.liked svg { fill: var(--pink); stroke: var(--pink); }

    /* ─── RECOMMEND SIDEBAR ─── */
    .rec-title { font-size: 13px; font-weight: 600; color: var(--t3); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 4px; }
    .rec-list { display: flex; flex-direction: column; gap: 4px; }
    .rec-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-radius: var(--r2);
      cursor: pointer;
      transition: opacity 0.3s, transform 0.3s, background 0.15s;
      background: transparent;
      opacity: 0;
      transform: translateX(10px);
    }
    .rec-item:hover { background: var(--bg2); }
    .profile-nickname { font-size: 13.5px; font-weight: 600; color: var(--t2); }
    .rec-item:hover .profile-nickname { color: var(--t1); }

    .no-posts, .feed-end {
      text-align: center;
      padding: 48px 24px;
      color: var(--t3);
      font-size: 14px;
    }

    /* ─── SKELETON ─── */
    .skeleton-card {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r4);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .skeleton-anim {
      background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 37%, var(--bg3) 63%);
      background-size: 400% 100%;
      animation: skeleton-loading 1.4s ease infinite;
      border-radius: 4px;
    }
    @keyframes skeleton-loading { 0% { background-position: 100% 50%; } 100% { background-position: 0 50%; } }

    .footer {
      margin-top: auto;
      font-size: 11px;
      color: var(--t3);
      line-height: 1.5;
    }
    .footer a { color: var(--t3); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    @media (max-width: 1024px) {
      .right-sidebar { display: none; }
    }
    @media (max-width: 768px) {
      .sidebar-container { display: none; }
      .main-layout { margin-left: 0; }
      .feed-container { padding: 20px 14px; }
      .post-card { padding: 18px; border-radius: var(--r3); }
    }
  </style>
</head>
<body>

  <div class="sidebar-container">
    <iframe src="sidebar.html"></iframe>
  </div>

  <div class="main-layout">
    <div class="feed-container">
      
      <div class="search-box" style="margin-bottom: 24px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="searchInput" placeholder="게시물 내용 또는 작성자 검색...">
      </div>

      <div class="posts-list" id="postsList">
        <div class="skeleton-card">
          <div class="post-header">
            <div class="post-author-info">
              <div class="skeleton-anim" style="width:42px; height:42px; border-radius:50%;"></div>
              <div class="author-details">
                <div class="skeleton-anim" style="width:80px; height:14px;"></div>
                <div class="skeleton-anim" style="width:40px; height:10px; margin-top:4px;"></div>
              </div>
            </div>
          </div>
          <div class="skeleton-anim" style="width:100%; height:16px;"></div>
          <div class="skeleton-anim" style="width:70%; height:16px;"></div>
        </div>
      </div>

      <div id="loadMoreTrigger" style="height: 10px;"></div>
    </div>

    <div class="right-sidebar">
      <div>
        <div class="rec-title">추천 프로필</div>
        <div class="rec-list" id="recommendedProfiles">
          <div id="recSkeleton">
            <div style="display:flex; align-items:center; gap:12px; padding:8px 12px;">
              <div class="skeleton-anim" style="width:32px; height:32px; border-radius:50%;"></div>
              <div class="skeleton-anim" style="width:70px; height:13px;"></div>
            </div>
            <div style="display:flex; align-items:center; gap:12px; padding:8px 12px;">
              <div class="skeleton-anim" style="width:32px; height:32px; border-radius:50%;"></div>
              <div class="skeleton-anim" style="width:90px; height:13px;"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="footer">
        <p>© 2026 Sharer. Designed by 정빈777</p>
        <p style="margin-top:4px;"><a href="privacy.html" onclick="NProgress.start()">개인정보처리방침</a> · <a href="policy.html" onclick="NProgress.start()">이용약관</a></p>
      </div>
    </div>
  </div>

<script src="markdown.js"></script>
<script>
  const API_BASE = "https://sharer-api.alexeom97.workers.dev/api";
  let currentUser = null;
  let allPosts = [];
  let displayedCount = 0;
  const PAGE_SIZE = 7;
  let currentSearchQuery = "";
  let activeDropdown = null;

  async function api(endpoint, options = {}) {
    const res = await fetch(API_BASE + endpoint, {
      ...options,
      headers: {
        "Content-Type": "application/json",
        ...(options.headers || {}),
      },
    });
    if (!res.ok) {
      let errorText = ""; try { errorText = await res.text(); } catch {}
      throw new Error(`API 오류 (${res.status}): ${errorText}`);
    }
    if (res.status === 204 || res.headers.get("content-length") === "0") return null;
    try { return await res.json(); } catch { return null; }
  }

  function getInitial(name) {
    return (name ? name[0] : '?').toUpperCase();
  }

  window.addEventListener('DOMContentLoaded', () => {
    const savedUser = localStorage.getItem('snsUser');
    if (savedUser) currentUser = JSON.parse(savedUser);

    loadPosts();
    loadRecommendedProfiles();

    document.addEventListener('click', () => {
      if (activeDropdown) {
        activeDropdown.style.display = 'none';
        activeDropdown = null;
      }
    });

    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        currentSearchQuery = e.target.value.trim().toLowerCase();
        renderFeedFlow(true);
      }, 200);
    });

    const trigger = document.getElementById('loadMoreTrigger');
    const observer = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && allPosts.length > displayedCount) {
        renderFeedFlow(false);
      }
    }, { rootMargin: '150px' });
    observer.observe(trigger);
  });

  async function loadPosts() {
    try {
      // 오리지널 주소 유지 후 비공개(private) 및 일부공개(link) 클라이언트 사이드 필터링 적용
      const data = await api("/posts?select=*&order=created_at.desc");
      const fetchedPosts = data || [];
      
      // access 속성이 private이거나 link인 게시물은 메인 피드에서 완전히 숨김
      allPosts = fetchedPosts.filter(post => post.access !== 'private' && post.access !== 'link');
      
      renderFeedFlow(true);
    } catch (err) {
      console.error('피드 로드 실패:', err);
      document.getElementById('postsList').innerHTML = '<div class="no-posts">⚠️ 데이터를 불러올 수 없습니다.</div>';
    }
  }

  function renderFeedFlow(isReset = false) {
    const container = document.getElementById('postsList');
    if (isReset) {
      container.innerHTML = '';
      displayedCount = 0;
    }

    const filtered = allPosts.filter(post => {
      if (!currentSearchQuery) return true;
      const contentMatch = post.content && post.content.toLowerCase().includes(currentSearchQuery);
      const authorMatch = post.author && post.author.toLowerCase().includes(currentSearchQuery);
      return contentMatch || authorMatch;
    });

    if (filtered.length === 0) {
      container.innerHTML = '<div class="no-posts">검색 결과 또는 게시물이 없습니다.</div>';
      return;
    }

    const nextBatch = filtered.slice(displayedCount, displayedCount + PAGE_SIZE);
    
    nextBatch.forEach((post) => {
      const card = document.createElement('div');
      card.className = 'post-card';
      card.id = `post-${post.id}`;

      const timeStr = post.created_at ? new Date(post.created_at).toLocaleString('ko-KR', {
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      }) : '';

      const isMyPost = currentUser && String(post.author_id) === String(currentUser.id);
      const moreBtnHTML = `
        <button class="more-btn" onclick="toggleDropdown(event, '${post.id}')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
        </button>
        <div class="dropdown-menu" id="dropdown-${post.id}">
          <button class="dropdown-item" onclick="copyPostLink('${post.id}')">링크 복사</button>
          ${isMyPost ? `<button class="dropdown-item delete" onclick="deletePost('${post.id}')">삭제</button>` : ''}
        </div>
      `;

      let imagesHtml = '';
      if (post.image_url) {
        const urls = post.image_url.split(',').filter(Boolean);
        if (urls.length > 0) {
          const gridCountClass = `count-${Math.min(urls.length, 5)}`;
          let gridItemsHtml = '';
          
          urls.slice(0, 5).forEach((url, index) => {
            const isLastAndMore = index === 4 && urls.length > 5;
            gridItemsHtml += `
              <div class="image-grid-item" onclick="window.location.href='view.html?id=${post.id}'">
                <img src="${url}" loading="lazy" alt="post-img">
                ${isLastAndMore ? `<div class="image-more-overlay">+${urls.length - 5}</div>` : ''}
              </div>
            `;
          });

          imagesHtml = `
            <div class="post-image-container">
              <div class="image-grid ${gridCountClass}">
                ${gridItemsHtml}
              </div>
            </div>
          `;
        }
      }

      const parsedContent = post.content ? markdownToHtml(post.content) : '';

      card.innerHTML = `
        <div class="post-header">
          <div class="post-author-info" onclick="goToProfile('${post.author_id}', '${post.author}')">
            <div class="avatar-circle" id="avatar-${post.id}">${getInitial(post.author)}</div>
            <div class="author-details">
              <span class="author-name">${escapeHtml(post.author || '익명')}</span>
              <span class="post-time">${timeStr}</span>
            </div>
          </div>
          <div style="position:relative;">${moreBtnHTML}</div>
        </div>
        ${parsedContent ? `<div class="post-content">${parsedContent}</div>` : ''}
        ${imagesHtml}
        <div class="post-actions">
          <button class="action-btn" id="likeBtn-${post.id}" onclick="toggleLike('${post.id}')">
            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <span id="likeCount-${post.id}">0</span>
          </button>
          <button class="action-btn" onclick="window.location.href='view.html?id=${post.id}'">
            <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
            <span id="commentCount-${post.id}">0</span>
          </button>
        </div>
      `;

      container.appendChild(card);
      
      requestAnimationFrame(() => {
        setTimeout(() => {
          card.style.opacity = '1';
          card.style.transform = 'translateY(0)';
          card.style.transition = 'opacity 0.4s cubic-bezier(0.22,1,0.36,1), transform 0.4s cubic-bezier(0.22,1,0.36,1), border-color 0.2s, background 0.2s';
        }, 30);
      });

      fetchAuthorProfileImage(post.id, post.author_id);
      loadLiveCounts(post.id);
    });

    displayedCount += nextBatch.length;

    const endEl = document.getElementById('feedEndNotice');
    if(endEl) endEl.remove();
    if (displayedCount >= filtered.length && filtered.length > 0) {
      const notice = document.createElement('div');
      notice.id = 'feedEndNotice';
      notice.className = 'feed-end';
      notice.textContent = '모든 게시물을 확인했습니다.';
      container.appendChild(notice);
    }
  }

  window.toggleDropdown = function(e, postId) {
    e.stopPropagation();
    const menu = document.getElementById(`dropdown-${postId}`);
    if (activeDropdown && activeDropdown !== menu) {
      activeDropdown.style.display = 'none';
    }
    if (menu.style.display === 'flex') {
      menu.style.display = 'none';
      activeDropdown = null;
    } else {
      menu.style.display = 'flex';
      activeDropdown = menu;
    }
  };

  async function fetchAuthorProfileImage(postId, authorId) {
    if (!authorId) return;
    try {
      const users = await api(`/users?id=eq.${encodeURIComponent(authorId)}&select=profile_image`);
      if (users && users[0] && users[0].profile_image) {
        const box = document.getElementById(`avatar-${postId}`);
        if (box) box.innerHTML = `<img src="${users[0].profile_image}" alt="p">`;
      }
    } catch {}
  }

  async function loadLiveCounts(postId) {
    try {
      const likes = await api(`/likes?post_id=eq.${postId}&select=id,user_id`);
      const likeCountEl = document.getElementById(`likeCount-${postId}`);
      if (likeCountEl) likeCountEl.textContent = likes ? likes.length : 0;

      if (currentUser && likes) {
        const hasLiked = likes.some(l => String(l.user_id) === String(currentUser.id));
        const btn = document.getElementById(`likeBtn-${postId}`);
        if (btn && hasLiked) btn.classList.add('liked');
      }

      const comments = await api(`/comments?post_id=eq.${postId}&select=id`);
      const commentCountEl = document.getElementById('commentCount-' + postId);
      if (commentCountEl) commentCountEl.textContent = comments ? comments.length : 0;
    } catch {}
  }

  window.toggleLike = async function(postId) {
    if (!currentUser) {
      alert('로그인이 필요한 서비스입니다.');
      return;
    }
    const btn = document.getElementById(`likeBtn-${postId}`);
    const countEl = document.getElementById(`likeCount-${postId}`);
    if (!btn || !countEl) return;

    const isLiked = btn.classList.contains('liked');
    let num = parseInt(countEl.textContent || '0');

    try {
      if (isLiked) {
        btn.classList.remove('liked');
        countEl.textContent = Math.max(0, num - 1);
        await api(`/likes?post_id=eq.${postId}&user_id=eq.${encodeURIComponent(currentUser.id)}`, { method: "DELETE" });
      } else {
        btn.classList.add('liked');
        countEl.textContent = num + 1;
        await api("/likes", { method: "POST", body: JSON.stringify({ post_id: postId, user_id: currentUser.id }) });
      }
    } catch {
      if (isLiked) { btn.classList.add('liked'); countEl.textContent = num; }
      else { btn.classList.remove('liked'); countEl.textContent = num; }
    }
  };

  window.copyPostLink = function(postId) {
    const link = `${window.location.origin}/view.html?id=${postId}`;
    navigator.clipboard.writeText(link).then(() => {
      alert('공유 링크가 클립보드에 복사되었습니다.');
    }).catch(() => alert('복사에 실패했습니다.'));
  };

  async function loadRecommendedProfiles() {
    const container = document.getElementById('recommendedProfiles');
    const skeleton = document.getElementById('recSkeleton');
    try {
      const users = await api("/users?select=id,nickname,profile_image&limit=4");
      if (skeleton) skeleton.remove();

      if (!users || users.length === 0) {
        container.innerHTML = '<div style="font-size:12px; color:var(--t3); padding:8px 12px;">추천이 없습니다.</div>';
        return;
      }

      users.forEach((user, idx) => {
        if (currentUser && String(user.id) === String(currentUser.id)) return;
        const item = document.createElement('div');
        item.className = 'rec-item';
        
        let avatarHTML = `<div class="avatar-circle" style="width:32px; height:32px; font-size:13px;">${getInitial(user.nickname)}</div>`;
        if (user.profile_image) {
          avatarHTML = `<div class="avatar-circle" style="width:32px; height:32px;"><img src="${user.profile_image}"></div>`;
        }

        item.style.transition = `opacity 0.4s cubic-bezier(0.22,1,0.36,1) ${idx * 0.05}s, transform 0.4s cubic-bezier(0.22,1,0.36,1) ${idx * 0.05}s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);`;
        item.innerHTML = `${avatarHTML}<span class="profile-nickname">${escapeHtml(user.nickname)}</span>`;
        item.onclick = () => { window.location.href = `user.html?id=${user.id}&nickname=${encodeURIComponent(user.nickname)}`; };
        container.appendChild(item);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          item.style.opacity = '1';
          item.style.transform = 'translateX(0)';
        }));
      });
    } catch (err) {
      console.error('추천 프로필 로드 오류:', err);
      if (skeleton) skeleton.innerHTML = '<div style="text-align:center; color:var(--t3); padding:12px 0; font-size:13px;">로드 실패</div>';
    }
  }

  window.goToProfile = (userId, nickname) => {
    if (userId && nickname) window.location.href = `user.html?id=${userId}&nickname=${encodeURIComponent(nickname)}`;
  };

  window.deletePost = async (postId) => {
    if (!confirm('이 게시물을 삭제하시겠습니까?')) return;
    try {
      await api(`/posts?id=eq.${postId}`, { method: "DELETE" });
      loadPosts();
    } catch (err) {
      console.error('삭제 오류:', err);
      alert('삭제에 실패했습니다.');
    }
  };

  function escapeHtml(unsafe) {
    return unsafe
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }
</script>
</body>
