  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>
  <style>
    .splash-text {
      text-align: center;
      animation: fadeUp 0.6s ease forwards;
      animation-delay: 0.2s;
      opacity: 1;
    }
    .splash-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #fff;
    }
    .splash-sub {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
      letter-spacing: 0.08em;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: bodyReveal 0.4s ease forwards;
      padding-top: 45px; /* 상단 고정 배너 높이만큼 여백 제공 (배너가 글을 가리지 않게 함) */
      transition: padding-top 0.3s ease; /* 배너가 닫힐 때 여백도 부드럽게 사라짐 */
    }
    @keyframes bodyReveal { to { opacity: 1; } }




    #splash {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      transition: opacity 0.45s ease;
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }

    .splash-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }
    .splash-logo {
      width: 72px;
      height: 72px;
      animation: splashLogoPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes splashLogoPop {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    #nprogress .bar { background: #fff !important; height: 2px !important; }
    #nprogress .peg { display: none !important; }
    #nprogress .spinner { display: none !important; }

    .sidebar-container {
      width: 72px;
      min-width: 72px;
      height: 100vh;
      position: fixed;
      left: 0; top: 0;
      z-index: 100;
    }
    .sidebar-container iframe { width: 72px !important; height: 100%; border: none; }

    .main-wrapper {
      margin-left: 72px;
      width: calc(100% - 72px);
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .main-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 36px 28px;
      overflow-y: auto;
      opacity: 0;
      transform: translateY(16px);
      animation: contentReveal 0.5s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
    }
    @keyframes contentReveal { to { opacity: 1; transform: translateY(0); } }

    .feed-container { max-width: 590px; width: 100%; }

    .recommend-container {
      width: 240px;
      margin-left: 32px;
      position: sticky;
      top: 36px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r4);
      padding: 20px;
      opacity: 0;
      animation: sidebarReveal 0.5s cubic-bezier(0.22,1,0.36,1) 0.25s forwards;
    }
    @keyframes sidebarReveal {
      from { opacity: 0; transform: translateX(12px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .recommend-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 14px;
    }

    .profile-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--r2);
      cursor: pointer;
      transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .profile-item:hover { background: var(--bg3); transform: translateX(3px); }
    .profile-item:active { transform: scale(0.97); }

    /* 2일이내 게시물 있을 때 그라데이션 테두리 공통 스타일 */
    .profile-avatar-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .profile-avatar-wrapper.has-story {
      padding: 2px;
      border-radius: 50%;
      background: linear-gradient(
        270deg,
        #0740ba,
        #651fff,
        #29b1ff,
        #0740ba
      );
      background-size: 200% 200%;
      animation: indexStoryRing 3s linear infinite;
    }
    @keyframes indexStoryRing {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    .profile-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
      object-fit: cover;
      color: #666;
    }
    /* 그라데이션이 적용되었을 때 간격을 만들어주기 위해 수정된 보더 설정 */
    .profile-avatar-wrapper.has-story .profile-avatar {
      border: 2px solid #000;
      width: 100%; height: 100%;
    }

    .profile-nickname {
      font-size: 13px;
      font-weight: 500;
      color: var(--t2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.15s;
    }
    .profile-item:hover .profile-nickname { color: var(--t1); }

    .skeleton {
      background: linear-gradient(90deg, var(--bg2) 0%, var(--bg3) 50%, var(--bg2) 100%);
      background-size: 300% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
      border-radius: var(--r1);
    }
    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    .skeleton-post { padding: 24px 0; border-bottom: 1px solid var(--border); }
    .skeleton-post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .skeleton-avatar { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; }
    .skeleton-username { width: 120px; height: 12px; }
    .skeleton-post-image { width: 100%; height: 340px; border-radius: var(--r3); margin: 12px 0; }
    .skeleton-text { height: 10px; margin: 8px 0; }
    .text-short { width: 50%; }
    .text-medium { width: 75%; }
    .text-long { width: 100%; }
    .skeleton-profile-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; }
    .skeleton-profile-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; }
    .skeleton-profile-nickname { width: 90px; height: 10px; }

    .post-card {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 36px 0;
      cursor: pointer;
      transition: background 0.15s;
      opacity: 0;
      transform: translateY(12px);
      animation: postIn 0.4s cubic-bezier(0.22,1,0.36,1) forwards;
      position: relative;
    }
    @keyframes postIn { to { opacity: 1; transform: translateY(0); } }
    .post-card:hover { background: #080808; }
    .post-card:last-child { border-bottom: none; }

    .post-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 0 2px;
    }

    .post-author-info { display: flex; align-items: center; gap: 10px; cursor: pointer; }

    .post-author-avatar-wrapper {
      width: 42px; height: 42px;
    }
    .post-author-avatar-wrapper.has-story {
      padding: 2.5px;
    }

    .post-author-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 600;
      flex-shrink: 0;
      transition: border-color 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      color: #666;
    }
    .post-author-avatar-wrapper.has-story .post-author-avatar {
      border: 3px solid #000;
      width: 100%; height: 100%;
    }
    .post-author-info:hover .post-author-avatar {
      border-color: var(--border3);
      transform: scale(1.06);
    }

    .post-author-name {
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--t1);
    }

    .post-image-container {
      position: relative;
      margin: 14px 0;
      border-radius: var(--r3);
      overflow: hidden;
      background: #000;
      border: 1px solid var(--border);
    }
    .post-image-carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .post-image-carousel::-webkit-scrollbar { display: none; }
    .post-image-slide {
      flex: 0 0 100%;
      scroll-snap-align: start;
    }
    .post-image-slide img {
      width: 100%;
      max-height: 560px;
      object-fit: cover;
      display: block;
    }
    .post-image-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
      z-index: 10;
      opacity: 1;
      transition: background 0.2s;
    }
    .post-image-nav:hover {
      background: rgba(0,0,0,0.9);
    }
    .post-image-nav.prev { left: 12px; }
    .post-image-nav.next { right: 12px; }

    .post-content {
      font-size: 14px;
      line-height: 1.6;
      max-height: calc(1.6em * 10);
      overflow: hidden;
      position: relative;
    }
    .post-content.fade::after {
      display: block;
      content: "";
      position: absolute;
      left: 0; right: 0;
      top: calc(1.6em * 6);
      height: calc(1.6em * 4);
      background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.3) 40%, rgba(0,0,0,0.7) 75%, var(--bg) 100%);
      pointer-events: none;
    }

    .post-time { padding: 8px 2px 10px; font-size: 11px; color: var(--t3); letter-spacing: 0.02em; }

    .post-actions { margin: 8px 0 2px; display: flex; align-items: center; gap: 16px; padding: 0 2px; }

    .like-button {
      background: none;
      border: none;
      padding: 5px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--t3);
      transition: color 0.15s;
      font-size: 13px;
      font-family: inherit;
    }
    .like-button:hover { color: var(--pink); }
    .like-button.liked { color: var(--pink); }

    .like-heart {
      width: 19px; height: 19px;
      fill: currentColor;
      transition: transform 0.25s cubic-bezier(0.34,1.7,0.64,1);
    }
    .like-button:hover .like-heart { transform: scale(1.25); }
    .like-button.liked .like-heart { transform: scale(1.1); }
    .like-button.liked:hover .like-heart { transform: scale(1.3); }

    .like-count { font-weight: 600; font-size: 13px; line-height: 1; min-width: 12px; }

    .no-posts {
      text-align: center;
      padding: 100px 20px;
      color: var(--t2);
      font-size: 15px;
      line-height: 1.8;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .no-posts-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.8;
      animation: floatIcon 3s ease-in-out infinite;
    }
    @keyframes floatIcon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .delete-btn {
      background: transparent;
      border: 1px solid #2a1a1a;
      color: var(--pink);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      transition: background 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      font-family: inherit;
    }
    .delete-btn:hover { background: rgba(255,107,107,0.1); border-color: var(--pink); transform: scale(1.04); }
    .delete-btn:active { transform: scale(0.94); }

    .verification-badge {
      display: inline-block;
      width: 14px;
      height: 14px;
      vertical-align: middle;
      background-image: url('https://sharer.r-e.kr/badge.svg');
      background-repeat: no-repeat;
      background-size: contain;
      background-position: center;
    }

    .footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      font-size: 12px;
      margin-top: auto;
    }
    .footer-links { margin-bottom: 8px; }
    .footer-links a { color: var(--t2); text-decoration: none; margin: 0 12px; font-weight: 500; transition: color 0.15s; }
    .footer-links a:hover { color: var(--t1); }
    .footer-text { color: var(--t3); font-size: 11px; }

    .auth-modal, .create-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .auth-modal.active, .create-modal.active { display: flex; }

    .auth-box, .create-modal-content {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r4);
      padding: 40px;
      width: 90%;
      max-width: 380px;
      position: relative;
      animation: modalPop 0.28s cubic-bezier(0.34,1.4,0.64,1);
    }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.90) translateY(14px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .create-modal-content { max-width: 540px; max-height: 90vh; overflow-y: auto; padding: 0; }
  </style>
</head>

  <div id="splash">
    <div class="splash-inner">
      <img src="./logo.png" class="splash-logo" alt="Logo">
      <div class="splash-text">
        <div class="splash-title">Sharer</div>
        <div class="splash-sub">CONNECT &amp; SHARE</div>
      </div>
    </div>
  </div>

  <div class="sidebar-container">
    <iframe src="sidebar.html"></iframe>
  </div>

  <div class="main-wrapper">
    <main class="main-content">
      <div class="feed-container" id="posts-container">
        <div class="skeleton-post">
          <div class="skeleton-post-header">
            <div class="skeleton skeleton-avatar"></div>
            <div class="skeleton skeleton-username"></div>
          </div>
          <div class="skeleton skeleton-post-image"></div>
          <div class="skeleton skeleton-text text-long"></div>
          <div class="skeleton skeleton-text text-medium"></div>
        </div>
      </div>

      <aside class="recommend-container">
        <div class="recommend-title">추천 프로필</div>
        <div id="recommend-profiles">
          <div class="skeleton-profile-item"><div class="skeleton skeleton-profile-avatar"></div><div class="skeleton skeleton-profile-nickname"></div></div>
          <div class="skeleton-profile-item"><div class="skeleton skeleton-profile-avatar"></div><div class="skeleton skeleton-profile-nickname"></div></div>
          <div class="skeleton-profile-item"><div class="skeleton skeleton-profile-avatar"></div><div class="skeleton skeleton-profile-nickname"></div></div>
        </div>
      </aside>
    </main>

    <footer class="footer">
      <div class="footer-links">
        <a href="terms.html">이용약관</a>
        <a href="privacy.html">개인정보처리방침</a>
      </div>
      <div class="footer-text">© 2026 Sharer. All rights reserved. Built by JBJB.</div>
    </footer>
  </div>

  <script src="https://unpkg.com/supabase-js"></script>
  <script>
    // API 주소 및 초기 세팅 생략하지 않고 유기적으로 구현
    const API_URL = "https://sharer.r-e.kr/api"; 
    
    async function api(path, options = {}) {
      const res = await fetch(`${API_URL}${path}`, options);
      if(!res.ok) throw new Error('API Error');
      return res.json();
    }

    function escapeHtml(str) {
      if(!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    // 2일 이내 게시물 존재 여부 확인 헬퍼 함수
    function checkRecentPost(lastPostCreatedAt) {
      if (!lastPostCreatedAt) return false;
      const createdDate = new Date(lastPostCreatedAt);
      const now = new Date();
      const diffTime = Math.abs(now - createdDate);
      const diffDays = diffTime / (1000 * 60 * 60 * 24);
      return diffDays <= 2;
    }

    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if(splash) {
          splash.classList.add('fade-out');
          setTimeout(() => splash.remove(), 450);
        }
      }, 600);

      loadPosts();
      loadRecommendProfiles();
    });

    async function loadPosts() {
      const container = document.getElementById('posts-container');
      try {
        // 실제 운영 환경의 엔드포인트 및 조인 구조에 부합하도록 데이터를 바인딩합니다.
        const posts = await api('/posts?select=*,users(*)&order=created_at.desc');
        container.innerHTML = '';
        
        if(posts.length === 0) {
          container.innerHTML = '<div class="no-posts"><div class="no-posts-icon">📭</div>게시물이 없습니다.<br>첫 게시물을 공유해보세요!</div>';
          return;
        }

        posts.forEach(post => {
          const user = post.users || {};
          const isVerified = user.verified ? '<span class="verification-badge"></span>' : '';
          
          // 2일 이내 새 글 존재 조건 체크 (추천 프로필 등과의 연동을 위해 유저 기준 데이터 분석)
          const hasRecentPost = checkRecentPost(user.last_post_created_at || post.created_at);
          const borderClass = hasRecentPost ? 'has-story' : '';

          let avatarHTML = '';
          if (user.avatar_url) {
            avatarHTML = `<div class="profile-avatar-wrapper ${borderClass}" style="width:38px; height:38px;"><div class="profile-avatar"><img src="${escapeHtml(user.avatar_url)}" alt="avatar" style="width:100%; height:100%; object-fit:cover; border-radius:50%;"/></div></div>`;
          } else {
            const firstChar = escapeHtml(user.nickname || 'U').charAt(0).toUpperCase();
            avatarHTML = `<div class="profile-avatar-wrapper ${borderClass}" style="width:38px; height:38px;"><div class="profile-avatar">${firstChar}</div></div>`;
          }

          const card = document.createElement('div');
          card.className = 'post-card';
          
          // 이미지 캐러셀 로직 파싱
          let images = [];
          if(post.image_url) {
            try { images = JSON.parse(post.image_url); } catch(e) { images = [post.image_url]; }
          }
          if(!Array.isArray(images)) images = [images];

          let carouselHTML = '';
          if(images.length > 0) {
            carouselHTML = `
              <div class="post-image-container">
                <div class="post-image-carousel">
                  ${images.map(img => `<div class="post-image-slide"><img src="${escapeHtml(img)}" alt="post img"></div>`).join('')}
                </div>
                ${images.length > 1 ? '<button class="post-image-nav prev">‹</button><button class="post-image-nav next">›</button>' : ''}
              </div>
            `;
          }

          card.innerHTML = `
            <div class="post-header">
              <div class="post-author-info" onclick="goToProfile('${user.id}', '${encodeURIComponent(user.nickname || '')}')">
                ${avatarHTML}
                <span class="post-author-name">${escapeHtml(user.nickname || '알 수 없음')}${isVerified}</span>
              </div>
            </div>
            ${carouselHTML}
            <div class="post-content">${escapeHtml(post.content || '')}</div>
            <div class="post-time">${new Date(post.created_at).toLocaleString()}</div>
          `;

          container.appendChild(card);
        });
      } catch (err) {
        console.error('게시물 로드 오류:', err);
        container.innerHTML = '<div style="text-align:center; padding:40px; color:var(--t3);">로드 중 오류가 발생했습니다.</div>';
      }
    }

    async function loadRecommendProfiles() {
      const container = document.getElementById('recommend-profiles');
      const skeleton = container.innerHTML;
      try {
        const users = await api('/users?limit=5');
        container.innerHTML = '';
        
        users.forEach((user, idx) => {
          // 추천 프로필 리스트 유저들의 2일 이내 게시물 작성 트래킹 검증
          const hasRecentPost = checkRecentPost(user.last_post_created_at);
          const borderClass = hasRecentPost ? 'has-story' : '';

          let avatarHTML = '';
          if (user.avatar_url) {
            avatarHTML = `<div class="profile-avatar-wrapper ${borderClass}" style="width:32px; height:32px;"><div class="profile-avatar"><img src="${escapeHtml(user.avatar_url)}" alt="avatar" style="width:100%; height:100%; object-fit:cover; border-radius:50%;"/></div></div>`;
          } else {
            const firstChar = escapeHtml(user.nickname || 'U').charAt(0).toUpperCase();
            avatarHTML = `<div class="profile-avatar-wrapper ${borderClass}" style="width:32px; height:32px;"><div class="profile-avatar">${firstChar}</div></div>`;
          }

          const item = document.createElement('div');
          item.className = 'profile-item';
          item.style.opacity = '0';
          item.style.transform = 'translateX(8px)';
          item.style.transition = `opacity 0.4s cubic-bezier(0.22,1,0.36,1) ${idx * 0.05}s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);`;
          item.innerHTML = `${avatarHTML}<span class="profile-nickname">${escapeHtml(user.nickname)}</span>`;
          item.onclick = () => { window.location.href = `user.html?id=${user.id}&nickname=${encodeURIComponent(user.nickname)}`; };
          container.appendChild(item);
          
          requestAnimationFrame(() => requestAnimationFrame(() => {
            item.style.opacity = '1';
            item.style.transform = 'translateX(0)';
          }));
        });
      } catch (err) {
        console.error('추천 프로필 로드 오류:', err);
        if (skeleton) container.innerHTML = '<div style="text-align:center; color:var(--t3); padding:12px 0; font-size:13px;">로드 실패</div>';
      }
    }

    window.goToProfile = (userId, nickname) => {
      if (userId && nickname) window.location.href = `user.html?id=${userId}&nickname=${encodeURIComponent(nickname)}`;
    };
  </script>
</body>
</html>
