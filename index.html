<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sharer</title>
  <link rel="icon" type="image/svg+xml" href="./logo.png">
  <meta name="description" content="Sharer는 이미지와 텍스트를 업로드하고 사람들과 소통할 수 있는 무료 커뮤니티·SNS 서비스입니다. 정빈777이 만들었습니다.">
  <meta name="keywords" content="Sharer, 커뮤니티, SNS, 정빈777, 정빈정빈">
  <meta name="author" content="정빈777">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Sharer | 커뮤니티 · SNS">
  <meta property="og:description" content="이미지와 텍스트를 업로드해보세요. 사람들과 소통해보세요. 모든 기능은 무료입니다.">
  <meta property="og:url" content="https://sharer.jbjb.r-e.kr/">
  <meta property="og:image" content="https://sharer.jbjb.r-e.kr/logo.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:site_name" content="Sharer">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Sharer | 커뮤니티 · SNS">
  <meta name="twitter:description" content="이미지와 텍스트를 업로드하고 사람들과 소통해보세요.">
  <meta name="twitter:image" content="https://sharer.jbjb.r-e.kr/logo.png">
  <link rel="stylesheet" href="https://unpkg.com/nprogress/nprogress.css">
  <script src="https://unpkg.com/nprogress/nprogress.js"></script>
  <style>
    .splash-text {
      text-align: center;
      animation: fadeUp 0.6s ease forwards;
      animation-delay: 0.2s;
      opacity: 1;
    }
    .splash-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #fff;
    }
    .splash-sub {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
      letter-spacing: 0.08em;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --bg4: #222;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --border3: #333;
      --t1: #fff;
      --t2: #888;
      --t3: #444;
      --pink: #ff6b6b;
      --green: #4ade80;
      --r1: 10px;
      --r2: 14px;
      --r3: 20px;
      --r4: 28px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: bodyReveal 0.4s ease forwards;
    }
    @keyframes bodyReveal { to { opacity: 1; } }

    #splash {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      transition: opacity 0.45s ease;
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }

    .splash-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }
    .splash-logo {
      width: 72px;
      height: 72px;
      animation: splashLogoPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes splashLogoPop {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    #nprogress .bar { background: #fff !important; height: 2px !important; }
    #nprogress .peg { display: none !important; }
    #nprogress .spinner { display: none !important; }

    .sidebar-container {
      width: 72px;
      min-width: 72px;
      height: 100vh;
      position: fixed;
      left: 0; top: 0;
      z-index: 100;
    }
    .sidebar-container iframe { width: 72px !important; height: 100%; border: none; }

    .main-wrapper {
      margin-left: 72px;
      width: calc(100% - 72px);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .main-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 36px 28px;
      overflow-y: auto;
      opacity: 0;
      transform: translateY(16px);
      animation: contentReveal 0.5s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
    }
    @keyframes contentReveal { to { opacity: 1; transform: translateY(0); } }

    .feed-container { max-width: 590px; width: 100%; }

    .recommend-container {
      width: 240px;
      margin-left: 32px;
      position: sticky;
      top: 36px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r4);
      padding: 20px;
      opacity: 0;
      animation: sidebarReveal 0.5s cubic-bezier(0.22,1,0.36,1) 0.25s forwards;
    }
    @keyframes sidebarReveal {
      from { opacity: 0; transform: translateX(12px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .recommend-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 14px;
    }

    .profile-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--r2);
      cursor: pointer;
      transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .profile-item:hover { background: var(--bg3); transform: translateX(3px); }
    .profile-item:active { transform: scale(0.97); }

    .profile-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
      object-fit: cover;
      color: #666;
    }

    .profile-nickname {
      font-size: 13px;
      font-weight: 500;
      color: var(--t2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.15s;
    }
    .profile-item:hover .profile-nickname { color: var(--t1); }

    .skeleton {
      background: linear-gradient(90deg, var(--bg2) 0%, var(--bg3) 50%, var(--bg2) 100%);
      background-size: 300% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
      border-radius: var(--r1);
    }
    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    .skeleton-post { padding: 24px 0; border-bottom: 1px solid var(--border); }
    .skeleton-post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .skeleton-avatar { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; }
    .skeleton-username { width: 120px; height: 12px; }
    .skeleton-post-image { width: 100%; height: 340px; border-radius: var(--r3); margin: 12px 0; }
    .skeleton-text { height: 10px; margin: 8px 0; }
    .text-short { width: 50%; }
    .text-medium { width: 75%; }
    .text-long { width: 100%; }
    .skeleton-profile-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; }
    .skeleton-profile-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; }
    .skeleton-profile-nickname { width: 90px; height: 10px; }

    .post-card {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 36px 0;
      cursor: pointer;
      transition: background 0.15s;
      opacity: 0;
      transform: translateY(12px);
      animation: postIn 0.4s cubic-bezier(0.22,1,0.36,1) forwards;
      position: relative;
    }
    @keyframes postIn { to { opacity: 1; transform: translateY(0); } }
    .post-card:hover { background: #080808; }
    .post-card:last-child { border-bottom: none; }

    .post-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 0 2px;
    }

    .post-author-info { display: flex; align-items: center; gap: 10px; cursor: pointer; }

    .post-author-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 600;
      flex-shrink: 0;
      transition: border-color 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      color: #666;
    }
    .post-author-info:hover .post-author-avatar {
      border-color: var(--border3);
      transform: scale(1.06);
    }

    .post-author-name {
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--t1);
    }

    .post-image-container {
      position: relative;
      margin: 14px 0;
      border-radius: var(--r3);
      overflow: hidden;
      background: #000;
      border: 1px solid var(--border);
    }
    .post-image-carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .post-image-carousel::-webkit-scrollbar { display: none; }
    .post-image-slide {
      flex: 0 0 100%;
      scroll-snap-align: start;
    }
    .post-image-slide img {
      width: 100%;
      max-height: 560px;
      object-fit: cover;
      display: block;
    }
    .post-image-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
      z-index: 10;
      opacity: 1;
      transition: background 0.2s;
    }
    .post-image-nav:hover {
      background: rgba(0,0,0,0.9);
    }
    .post-image-nav.prev { left: 12px; }
    .post-image-nav.next { right: 12px; }

    .post-content {
      font-size: 14px;
      line-height: 1.6;
      max-height: calc(1.6em * 10);
      overflow: hidden;
      position: relative;
    }
    .post-content.fade::after {
      display: block;
      content: "";
      position: absolute;
      left: 0; right: 0;
      top: calc(1.6em * 6);
      height: calc(1.6em * 4);
      background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.3) 40%, rgba(0,0,0,0.7) 75%, var(--bg) 100%);
      pointer-events: none;
    }

    .post-time { padding: 8px 2px 10px; font-size: 11px; color: var(--t3); letter-spacing: 0.02em; }

    .post-actions { margin: 8px 0 2px; display: flex; align-items: center; gap: 16px; padding: 0 2px; }

    .like-button {
      background: none;
      border: none;
      padding: 5px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--t3);
      transition: color 0.15s;
      font-size: 13px;
      font-family: inherit;
    }
    .like-button:hover { color: var(--pink); }
    .like-button.liked { color: var(--pink); }

    .like-heart {
      width: 19px; height: 19px;
      fill: currentColor;
      transition: transform 0.25s cubic-bezier(0.34,1.7,0.64,1);
    }
    .like-button:hover .like-heart { transform: scale(1.25); }
    .like-button.liked .like-heart { transform: scale(1.1); }
    .like-button.liked:hover .like-heart { transform: scale(1.3); }

    .like-count { font-weight: 600; font-size: 13px; line-height: 1; min-width: 12px; }

    .no-posts {
      text-align: center;
      padding: 100px 20px;
      color: var(--t2);
      font-size: 15px;
      line-height: 1.8;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .no-posts-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.8;
      animation: floatIcon 3s ease-in-out infinite;
    }
    @keyframes floatIcon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .delete-btn {
      background: transparent;
      border: 1px solid #2a1a1a;
      color: var(--pink);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      transition: background 0.15s, border-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      font-family: inherit;
    }
    .delete-btn:hover { background: rgba(255,107,107,0.1); border-color: var(--pink); transform: scale(1.04); }
    .delete-btn:active { transform: scale(0.94); }

    .verification-badge {
      display: inline-block;
      width: 14px; 
      height: 14px;
      vertical-align: middle;
      background-image: url('https://sharer.jbjb.r-e.kr/badge.svg');
      background-repeat: no-repeat;
      background-size: contain;
      background-position: center;
    }

    .footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      font-size: 12px;
      margin-top: auto;
    }
    .footer-links { margin-bottom: 8px; }
    .footer-links a { color: var(--t2); text-decoration: none; margin: 0 12px; font-weight: 500; transition: color 0.15s; }
    .footer-links a:hover { color: var(--t1); }
    .footer-text { color: var(--t3); font-size: 11px; }

    .auth-modal, .create-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .auth-modal.active, .create-modal.active { display: flex; }

    .auth-box, .create-modal-content {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r4);
      padding: 40px;
      width: 90%;
      max-width: 380px;
      position: relative;
      animation: modalPop 0.28s cubic-bezier(0.34,1.4,0.64,1);
    }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.90) translateY(14px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .create-modal-content { max-width: 540px; max-height: 90vh; overflow-y: auto; padding: 0; }

    .auth-close, .close-btn {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--t2);
      font-size: 16px;
      cursor: pointer;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      line-height: 1;
    }
    .auth-close { position: absolute; top: 16px; right: 16px; }
    .auth-close:hover, .close-btn:hover { background: var(--bg4); color: var(--t1); transform: scale(1.1); }
    .auth-close:active, .close-btn:active { transform: scale(0.90); }

    .auth-box h2, .create-modal-header h3 { font-size: 18px; font-weight: 600; color: var(--t1); letter-spacing: -0.02em; }
    .auth-box h2 { text-align: center; margin-bottom: 26px; }

    .auth-box input {
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--r2);
      border: 1px solid var(--border2);
      font-size: 14px;
      margin-bottom: 10px;
      outline: none;
      background: var(--bg3);
      color: var(--t1);
      font-family: inherit;
      transition: border-color 0.2s, background 0.2s;
    }
    .auth-box input:focus { border-color: var(--border3); background: var(--bg4); }
    .auth-box input::placeholder { color: var(--t3); }

    .auth-box button {
      width: 100%;
      padding: 12px 20px;
      border-radius: var(--r2);
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: var(--t1);
      color: var(--bg);
      transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      font-family: inherit;
      margin-top: 6px;
    }
    .auth-box button:hover { background: #eee; transform: scale(1.02); }
    .auth-box button:active { transform: scale(0.98); }

    .auth-switch { text-align: center; margin-top: 20px; font-size: 13px; color: var(--t2); }
    .auth-switch span { color: var(--t1); cursor: pointer; font-weight: 500; margin-left: 4px; text-decoration: underline; }

    .auth-error { color: var(--pink); font-size: 12px; margin-top: -4px; margin-bottom: 12px; padding: 0 2px; min-height: 16px; }
    .auth-success { color: var(--green); font-size: 12px; margin-top: -4px; margin-bottom: 12px; padding: 0 2px; min-height: 16px; }

    @media (max-width: 930px) {
      .recommend-container { display: none; }
      .main-content { padding: 24px 16px; }
    }
    @media (max-width: 660px) {
      body { flex-direction: column-reverse; }
      .sidebar-container { width: 100%; height: 56px; top: auto; bottom: 0; border-top: 1px solid var(--border); }
      .sidebar-container iframe { width: 100% !important; height: 56px; }
      .main-wrapper { margin-left: 0; width: 100%; padding-bottom: 56px; }
      .main-content { padding: 12px 12px 32px; }
      .post-card { padding: 24px 0; }
    }
  </style>
</head>
<body>

  <div id="splash">
    <div class="splash-inner">
      <img src="./logo.png" alt="Sharer" class="splash-logo">
      <div class="splash-text">
        <div class="splash-title">SHARER</div>
        <div class="splash-sub">FREE COMMUNITY</div>
      </div>
    </div>
  </div>

  <div class="sidebar-container">
    <iframe src="sidebar.html" id="sidebarIframe"></iframe>
  </div>

  <div class="main-wrapper">
    <main class="main-content">
      <div class="feed-container" id="postsContainer">
        <div id="postsSkeleton">
          <div class="skeleton-post">
            <div class="skeleton-post-header">
              <div class="skeleton skeleton-avatar"></div>
              <div class="skeleton skeleton-username"></div>
            </div>
            <div class="skeleton skeleton-post-image"></div>
            <div class="skeleton skeleton-text text-long"></div>
            <div class="skeleton skeleton-text text-medium"></div>
            <div class="skeleton skeleton-text text-short"></div>
          </div>
          <div class="skeleton-post">
            <div class="skeleton-post-header">
              <div class="skeleton skeleton-avatar"></div>
              <div class="skeleton skeleton-username"></div>
            </div>
            <div class="skeleton skeleton-post-image"></div>
            <div class="skeleton skeleton-text text-long"></div>
            <div class="skeleton skeleton-text text-medium"></div>
          </div>
        </div>
      </div>

      <div class="recommend-container">
        <div class="recommend-title">추천 프로필</div>
        <div id="recommendSkeleton" style="display: flex; flex-direction: column; gap: 4px;">
          <div class="skeleton-profile-item"><div class="skeleton skeleton-profile-avatar"></div><div class="skeleton skeleton-profile-nickname"></div></div>
          <div class="skeleton-profile-item"><div class="skeleton skeleton-profile-avatar"></div><div class="skeleton skeleton-profile-nickname"></div></div>
          <div class="skeleton-profile-item"><div class="skeleton skeleton-profile-avatar"></div><div class="skeleton skeleton-profile-nickname"></div></div>
        </div>
        <div id="recommendContainer" style="display: flex; flex-direction: column; gap: 4px;"></div>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-links">
        <a href="privacy.html">개인정보처리방침</a>
        <a href="policy.html">이용약관</a>
      </div>
      <div class="footer-text">© 2026 Sharer. All rights reserved. Built by 정빈777.</div>
    </footer>
  </div>

  <div class="auth-modal" id="loginModal">
    <div class="auth-box">
      <button class="auth-close" onclick="closeLoginModal()">×</button>
      <h2>로그인</h2>
      <input type="text" id="loginId" placeholder="아이디">
      <input type="password" id="loginPassword" placeholder="비밀번호">
      <div class="auth-error" id="loginError"></div>
      <div class="auth-success" id="loginSuccess"></div>
      <button onclick="handleLogin()">로그인</button>
      <div class="auth-switch">계정이 없으신가요?<span onclick="openSignupModal()">회원가입</span></div>
    </div>
  </div>

  <div class="auth-modal" id="signupModal">
    <div class="auth-box">
      <button class="auth-close" onclick="closeSignupModal()">×</button>
      <h2>회원가입</h2>
      <input type="text" id="signupId" placeholder="아이디 (영문, 숫자 4~15자)">
      <input type="text" id="signupNickname" placeholder="닉네임 (2~10자)">
      <input type="password" id="signupPassword" placeholder="비밀번호 (6자 이상)">
      <div class="auth-error" id="signupError"></div>
      <div class="auth-success" id="signupSuccess"></div>
      <button onclick="handleSignup()">회원가입</button>
      <div class="auth-switch">이미 계정이 있으신가요?<span onclick="openLoginModal()">로그인</span></div>
    </div>
  </div>

  <script src="./supabase.js"></script>
  <script>
    let currentUser = null;
    let likedPostsSet = new Set();

    function initCurrentUser() {
      const stored = localStorage.getItem('snsUser');
      if (stored) {
        try { currentUser = JSON.parse(stored); } catch(e) { currentUser = null; }
      }
    }

    window.addEventListener('load', () => {
      NProgress.start();
      initCurrentUser();
      loadPosts();
      loadRecommendProfiles();
      if (currentUser) { loadLikedPosts(); }
      
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) {
          splash.classList.add('fade-out');
          setTimeout(() => splash.remove(), 450);
        }
        NProgress.done();
      }, 600);
    });

    async function loadLikedPosts() {
      if (!currentUser) return;
      try {
        const likes = await api(`/likes?user_id=eq.${currentUser.id}`);
        likedPostsSet = new Set(likes.map(l => l.post_id));
        updateLikeButtonsUI();
      } catch (e) { console.error('좋아요 로드 실패:', e); }
    }

    function updateLikeButtonsUI() {
      likedPostsSet.forEach(postId => {
        const btn = document.querySelector(`[data-post-id="${postId}"] .like-button`);
        if (btn) btn.classList.add('liked');
      });
    }

    // 비공개 및 일부 공개 게시물이 노출되지 않도록 필터링 규칙이 결합된 loadPosts 함수입니다.
    async function loadPosts() {
      const container = document.getElementById('postsContainer');
      const skeleton = document.getElementById('postsSkeleton');
      try {
        // visibility가 '비공개' 및 '일부 공개'인 것은 불러오지 않도록 Supabase API 호출 파라미터 구성
        const posts = await api('/posts?order=created_at.desc&visibility=neq.비공개&visibility=neq.일부 공개');
        if (skeleton) skeleton.remove();

        // 기존 게시글 렌더링 카드들 초기화
        const existingCards = container.querySelectorAll('.post-card, .no-posts');
        existingCards.forEach(el => el.remove());

        if (!posts || posts.length === 0) {
          showNoPosts();
          return;
        }

        posts.forEach((post, idx) => {
          const card = document.createElement('div');
          card.className = 'post-card';
          card.style.animationDelay = `${idx * 0.04}s`;

          let isLiked = likedPostsSet.has(post.id);
          let initialHeart = isLiked ? 'liked' : '';

          let imagesHTML = '';
          if (post.image_url) {
            const urls = post.image_url.split(',').map(u => u.trim()).filter(Boolean);
            if (urls.length > 0) {
              let slides = urls.map(u => `<div class="post-image-slide"><img src="${u}" alt="post image" loading="lazy"></div>`).join('');
              let navButtons = '';
              if (urls.length > 1) {
                navButtons = `
                  <button class="post-image-nav prev" onclick="event.stopPropagation(); moveSlide(this, -1)">‹</button>
                  <button class="post-image-nav next" onclick="event.stopPropagation(); moveSlide(this, 1)">›</button>
                `;
              }
              imagesHTML = `
                <div class="post-image-container">
                  ${navButtons}
                  <div class="post-image-carousel">${slides}</div>
                </div>
              `;
            }
          }

          let deleteBtnHTML = '';
          if (currentUser && (currentUser.id === post.author_id || currentUser.nickname === '정빈777')) {
            deleteBtnHTML = `<button class="delete-btn" onclick="event.stopPropagation(); deletePost('${post.id}')">삭제</button>`;
          }

          let badgeHTML = (post.author === '정빈777') ? '<span class="verification-badge"></span>' : '';

          let initialText = escapeHtml(post.content || '');
          let hasManyLines = initialText.split('\n').length > 10;
          let fadeClass = hasManyLines ? 'fade' : '';

          let avatarHTML = post.author_profile 
            ? `<img src="${post.author_profile}" class="post-author-avatar" alt="">`
            : `<div class="post-author-avatar">${escapeHtml(post.author ? post.author.substring(0,1) : '?')}</div>`;

          card.setAttribute('data-post-id', post.id);
          card.innerHTML = `
            <div class="post-header">
              <div class="post-author-info" onclick="event.stopPropagation(); goToProfile('${post.author_id}', '${post.author}')">
                ${avatarHTML}
                <span class="post-author-name">${escapeHtml(post.author || '알 수 없음')}${badgeHTML}</span>
              </div>
              ${deleteBtnHTML}
            </div>
            <div class="post-content ${fadeClass}">${initialText.replace(/\n/g, '<br>')}</div>
            ${imagesHTML}
            <div class="post-time">${formatTime(post.created_at)}</div>
            <div class="post-actions">
              <button class="like-button ${initialHeart}" onclick="event.stopPropagation(); toggleLike('${post.id}', this)">
                <svg class="like-heart" viewBox="0 0 24 24">
                  <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
                <span class="like-count">${post.likes_count || 0}</span>
              </button>
            </div>
          `;

          card.onclick = () => {
            NProgress.start();
            window.location.href = `view.html?id=${post.id}`;
          };

          container.appendChild(card);
        });

      } catch (err) {
        console.error('피드 로드 오류:', err);
        if (skeleton) skeleton.innerHTML = '<div style="text-align:center;color:var(--t3);padding:40px 0;">게시물을 불러오지 못했습니다.</div>';
      }
    }

    window.moveSlide = function(btn, dir) {
      const container = btn.parentElement;
      const carousel = container.querySelector('.post-image-carousel');
      if (!carousel) return;
      const width = carousel.offsetWidth;
      carousel.scrollBy({ left: width * dir, behavior: 'smooth' });
    };

    function showNoPosts() {
      const container = document.getElementById('postsContainer');
      const div = document.createElement('div');
      div.className = 'no-posts';
      div.innerHTML = `
        <div class="no-posts-icon">📭</div>
        <div>아직 업로드된 전체 공개 게시물이 없습니다.<br>첫 번째 게시물을 공유해보세요!</div>
      `;
      container.appendChild(div);
    }

    async function toggleLike(postId, btn) {
      if (!currentUser) { alert('로그인이 필요한 기능입니다.'); openLoginModal(); return; }
      const countEl = btn.querySelector('.like-count');
      let currentCount = parseInt(countEl.textContent || '0');

      if (likedPostsSet.has(postId)) {
        likedPostsSet.delete(postId);
        btn.classList.remove('liked');
        countEl.textContent = Math.max(0, currentCount - 1);
        try {
          await api(`/likes?user_id=eq.${currentUser.id}&post_id=eq.${postId}`, { method: 'DELETE' });
        } catch(e) { console.error(e); }
      } else {
        likedPostsSet.add(postId);
        btn.classList.add('liked');
        countEl.textContent = currentCount + 1;
        try {
          await api('/likes', {
            method: 'POST',
            body: JSON.stringify({ user_id: currentUser.id, post_id: postId })
          });
        } catch(e) { console.error(e); }
      }
    }

    async function loadRecommendProfiles() {
      const container = document.getElementById('recommendContainer');
      const skeleton = document.getElementById('recommendSkeleton');
      try {
        const users = await api('/users?limit=5');
        if (skeleton) skeleton.remove();
        container.innerHTML = '';

        if (!users || users.length === 0) {
          container.innerHTML = '<div style="text-align:center;color:var(--t3);padding:12px 0;font-size:13px;">추천이 없습니다.</div>';
          return;
        }

        users.forEach((user, idx) => {
          if (currentUser && user.id === currentUser.id) return;
          const item = document.createElement('div');
          item.className = 'profile-item';
          
          let avatarHTML = user.profile_image 
            ? `<img src="${user.profile_image}" class="profile-avatar" alt="">`
            : `<div class="profile-avatar">${escapeHtml(user.nickname ? user.nickname.substring(0,1) : '?')}</div>`;

          item.style.opacity = '0';
          item.style.transform = 'translateX(10px)';
          item.style.transition = `opacity 0.4s cubic-bezier(0.22,1,0.36,1) ${idx * 0.05}s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);`;
          item.innerHTML = `${avatarHTML}<span class=\"profile-nickname\">${escapeHtml(user.nickname)}</span>`;
          item.onclick = () => { window.location.href = `user.html?id=${user.id}&nickname=${encodeURIComponent(user.nickname)}`; };
          container.appendChild(item);
          requestAnimationFrame(() => requestAnimationFrame(() => {
            item.style.opacity = '1';
            item.style.transform = 'translateX(0)';
          }));
        });
      } catch (err) {
        console.error('추천 프로필 로드 오류:', err);
        if (skeleton) skeleton.innerHTML = '<div style="text-align:center; color:var(--t3); padding:12px 0; font-size:13px;">로드 실패</div>';
      }
    }

    window.goToProfile = (userId, nickname) => {
      if (userId && nickname) window.location.href = `user.html?id=${userId}&nickname=${encodeURIComponent(nickname)}`;
    };

    window.deletePost = async (postId) => {
      if (!confirm('이 게시물을 삭제하시겠습니까?')) return;
      try {
        await api(`/posts?id=eq.${postId}`, { method: "DELETE" });
        loadPosts();
      } catch (err) {
        console.error('삭제 오류:', err);
        alert('삭제에 실패했습니다.');
      }
    };

    // 로그인 처리 기능 (기존 코드 누락 부활)
    async function handleLogin() {
      const loginId = document.getElementById('loginId').value.trim();
      const loginPassword = document.getElementById('loginPassword').value.trim();
      const errorDiv = document.getElementById('loginError');
      const successDiv = document.getElementById('loginSuccess');

      errorDiv.textContent = '';
      successDiv.textContent = '';

      if (!loginId || !loginPassword) {
        errorDiv.textContent = '아이디와 비밀번호를 모두 입력해주세요.';
        return;
      }

      try {
        const users = await api(`/users?id=eq.${encodeURIComponent(loginId)}&password=eq.${encodeURIComponent(loginPassword)}`);

        if (users && users.length > 0) {
          const loggedInUser = users[0];
          successDiv.textContent = '로그인 성공! 잠시 후 새로고침됩니다.';
          
          localStorage.setItem('snsUser', JSON.stringify({
            id: loggedInUser.id,
            nickname: loggedInUser.nickname,
            profile_image: loggedInUser.profile_image
          }));

          setTimeout(() => {
            closeLoginModal();
            location.reload();
          }, 1000);
        } else {
          errorDiv.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
        }
      } catch (err) {
        console.error('로그인 오류:', err);
        errorDiv.textContent = '로그인 중 오류가 발생했습니다. 다시 시도해주세요.';
      }
    }

    async function handleSignup() {
      const id = document.getElementById('signupId').value.trim();
      const nick = document.getElementById('signupNickname').value.trim();
      const pw = document.getElementById('signupPassword').value.trim();
      const errEl = document.getElementById('signupError');
      const sucEl = document.getElementById('signupSuccess');

      errEl.textContent = ''; sucEl.textContent = '';

      if (!id || !nick || !pw) { errEl.textContent = '모든 필드를 입력해 주세요.'; return; }
      if (!/^[a-zA-Z0-9]{4,15}$/.test(id)) { errEl.textContent = '아이디는 영문/숫자 4~15자여야 합니다.'; return; }
      if (nick.length < 2 || nick.length > 10) { errEl.textContent = '닉네임은 2~10자여야 합니다.'; return; }
      if (pw.length < 6) { errEl.textContent = '비밀번호는 6자 이상이어야 합니다.'; return; }

      try {
        const checkId = await api(`/users?id=eq.${encodeURIComponent(id)}`);
        if (checkId && checkId.length > 0) { errEl.textContent = '이미 사용 중인 아이디입니다.'; return; }
        const checkNick = await api(`/users?nickname=eq.${encodeURIComponent(nick)}`);
        if (checkNick && checkNick.length > 0) { errEl.textContent = '이미 사용 중인 닉네임입니다.'; return; }

        await api('/users', {
          method: 'POST',
          body: JSON.stringify({ id: id, nickname: nick, password: pw, created_at: new Date().toISOString() })
        });

        sucEl.textContent = '회원가입 완료! 잠시 후 로그인 창으로 이동합니다.';
        setTimeout(() => { openLoginModal(); }, 1200);
      } catch (e) {
        console.error(e);
        errEl.textContent = '회원가입 진행 중 서버 오류가 발생했습니다.';
      }
    }

    window.openLoginModal = () => {
      document.getElementById('signupModal').classList.remove('active');
      document.getElementById('loginModal').classList.add('active');
      document.getElementById('loginId').value = '';
      document.getElementById('loginPassword').value = '';
      document.getElementById('loginError').textContent = '';
      document.getElementById('loginSuccess').textContent = '';
    };
    window.closeLoginModal = () => document.getElementById('loginModal').classList.remove('active');

    window.openSignupModal = () => {
      document.getElementById('loginModal').classList.remove('active');
      document.getElementById('signupModal').classList.add('active');
      document.getElementById('signupId').value = '';
      document.getElementById('signupNickname').value = '';
      document.getElementById('signupPassword').value = '';
      document.getElementById('signupError').textContent = '';
      document.getElementById('signupSuccess').textContent = '';
    };
    window.closeSignupModal = () => document.getElementById('signupModal').classList.remove('active');

    function formatTime(isoString) {
      if (!isoString) return '';
      const date = new Date(isoString);
      const now = new Date();
      const diff = (now - date) / 1000;
      if (diff < 60) return '방금 전';
      if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
      if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
      return `${date.getFullYear()}. ${date.getMonth()+1}. ${date.getDate()}`;
    }

    function escapeHtml(unsafe) {
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    window.handleLogin = handleLogin;
  </script>
</body>
</html>
