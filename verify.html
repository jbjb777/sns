<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인증 완료 : Sharer</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .box {
      text-align: center;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 24px;
      padding: 40px 30px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }

    p {
      color: #888;
      font-size: 14px;
      line-height: 1.6;
    }

    .success-text {
      color: #4ade80;
    }

    .error-text {
      color: #ff6b6b;
    }

    .loader {
      border: 3px solid #222;
      border-top: 3px solid #fff;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="box" id="statusBox">
    <div class="loader"></div>
    <h1>이메일 인증 확인 중...</h1>
    <p>새로운 계정 연결을 확인하고 있습니다.<br>잠시만 기다려주세요.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // verify.html은 클라이언트 단에서 토큰 세션의 검증 활성화만 관장하므로, 최소화된 퍼블릭 초기화만 유지합니다.
    const SUPABASE_URL = "https://hoeevmstbhulbzqyfsug.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_vxGxR4uBuYldz-0l_tQXGw_Cz0V6Mj6";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function init() {
      const statusBox = document.getElementById('statusBox');
      
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');
      const nickname = urlParams.get('nickname');
      const email = urlParams.get('email');
      const password = urlParams.get('password');

      const hash = window.location.hash;
      console.log("Hash Data:", hash);

      if (!hash) {
        statusBox.innerHTML = `
          <h1 class="error-text">잘못된 접근</h1>
          <p>유효하지 않거나 비정상적인 인증 링크 접근입니다.</p>
        `;
        return;
      }

      const params = new URLSearchParams(hash.substring(1));
      const access_token = params.get('access_token');
      const refresh_token = params.get('refresh_token');

      if (access_token && refresh_token) {
        try {
          // Supabase Auth 세션 확정 활성화 실행
          const { data, error } = await supabase.auth.setSession({ access_token, refresh_token });
          if (error) throw error;

          statusBox.innerHTML = `
            <h1 class="success-text">인증 확인 완료</h1>
            <p>회원가입 창으로 돌아가 최종 등록을 마무리합니다.</p>
          `;

          // 세션 증명이 완료되면 가입 대기 스핀들이 떠 있는 join.html로 파라미터를 들고 복귀합니다.
          setTimeout(() => {
            window.location.href = `join.html?u=verified&id=${encodeURIComponent(id)}&nickname=${encodeURIComponent(nickname)}&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`;
          }, 1500);

        } catch (err) {
          console.error("인증 실패 처리 에러:", err);
          statusBox.innerHTML = `
            <h1 class="error-text">인증 실패</h1>
            <p>토큰 설정 중 서버 통신 에러가 발생했습니다.<br>다시 가입을 진행해주세요.</p>
          `;
        }
      } else {
        statusBox.innerHTML = `
          <h1 class="error-text">인증 실패</h1>
          <p>링크가 이미 사용되었거나, 유효 시간이 만료되었습니다.</p>
        `;
      }
    }

    init();
  </script>
</body>
</html>
