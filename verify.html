<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>이메일 인증 : Sharer</title>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #000;
      --bg2: #111;
      --bg3: #1a1a1a;
      --border: #1e1e1e;
      --border2: #2a2a2a;

      --t1: #fff;
      --t2: #888;
      --t3: #555;

      --r1: 14px;
      --r2: 20px;
      --r3: 28px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);

      min-height: 100vh;

      display: flex;
      flex-direction: column;

      -webkit-font-smoothing: antialiased;

      opacity: 0;
      animation: fadeIn 0.35s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .header {
      height: 72px;

      display: flex;
      align-items: center;

      padding: 0 24px;

      border-bottom: 1px solid var(--border);

      position: sticky;
      top: 0;

      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(18px);

      z-index: 50;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;

      text-decoration: none;

      transition: opacity 0.15s;
    }

    .logo-container:hover {
      opacity: 0.75;
    }

    .logo-svg {
      width: 36px;
      height: 36px;
    }

    .logo-text {
      color: var(--t1);

      font-size: 18px;
      font-weight: 700;

      letter-spacing: -0.4px;
    }

    .main {
      flex: 1;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 40px 20px;
    }

    .card {
      width: 100%;
      max-width: 520px;

      background: var(--bg2);

      border: 1px solid var(--border);

      border-radius: var(--r3);

      padding: 42px 34px;

      text-align: center;

      opacity: 0;
      transform: translateY(12px);

      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon {
      width: 82px;
      height: 82px;

      margin: 0 auto 24px;

      border-radius: 24px;

      background:
        linear-gradient(
          135deg,
          #4a57de,
          #7a3fbb
        );

      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 38px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;

      letter-spacing: -0.5px;

      margin-bottom: 14px;
    }

    p {
      color: var(--t2);

      font-size: 15px;
      line-height: 1.7;

      margin-bottom: 30px;
    }

    .btn {
      height: 52px;

      border: none;
      outline: none;

      border-radius: 16px;

      padding: 0 24px;

      background: #fff;
      color: #000;

      font-size: 15px;
      font-weight: 700;

      cursor: pointer;

      transition:
        transform 0.15s,
        opacity 0.15s;
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .footer {
      border-top: 1px solid var(--border);

      padding: 18px;

      text-align: center;

      color: var(--t3);

      font-size: 11px;
    }

    @media (max-width: 768px) {

      .card {
        padding: 34px 24px;
      }

      h1 {
        font-size: 24px;
      }

    }

  </style>
</head>
