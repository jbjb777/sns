<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인증 완료 : Sharer</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .box {
      text-align: center;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 24px;
      padding: 40px 30px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }

    p {
      color: #888;
      font-size: 14px;
      line-height: 1.6;
    }

    .success-text {
      color: #4ade80;
    }

    .error-text {
      color: #ff6b6b;
    }

    /* 단순한 CSS 로딩 스피너 디자인 */
    .loader {
      border: 3px solid #222;
      border-top: 3px solid #fff;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="box" id="statusBox">
    <div class="loader"></div>
    <h1>이메일 인증 중...</h1>
    <p>새로운 계정 연결을 확인하고 있습니다.<br>잠시만 기다려주세요.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // 본인의 Supabase Project URL과 Anon Key 정보를 기입해주세요.
    const SUPABASE_URL = "https://hoeevmstbhulbzqyfsug.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_vxGxR4uBuYldz-0l_tQXGw_Cz0V6Mj6";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function init() {
      const statusBox = document.getElementById('statusBox');
      const hash = window.location.hash;

      // URL 해시에 토큰 정보가 아예 넘어오지 않은 경우의 예외 처리
      if (!hash) {
        statusBox.innerHTML = `
          <h1 class="error-text">잘못된 접근</h1>
          <p>유효하지 않거나 비정상적인 인증 링크 접근입니다.</p>
        `;
        return;
      }

      // 해시 정보에서 access_token과 refresh_token 값 추출 파싱
      const params = new URLSearchParams(hash.substring(1));
      const access_token = params.get('access_token');
      const refresh_token = params.get('refresh_token');

      if (access_token && refresh_token) {
        try {
          // Supabase Auth에 세션을 강제로 주입 및 동기화 처리하여 로그인 유도
          const { data, error } = await supabase.auth.setSession({
            access_token,
            refresh_token
          });

          if (error) throw error;

          // 로컬스토리지 내 가입 기록 데이터의 인증 상태 플래그 변경 업데이트
          const localUser = localStorage.getItem('snsUser');
          if (localUser) {
            const parsed = JSON.parse(localUser);
            parsed.isVerified = true;
            localStorage.setItem('snsUser', JSON.stringify(parsed));
          }

          statusBox.innerHTML = `
            <h1 class="success-text">인증 완료</h1>
            <p>이메일 연결이 성공적으로 마무리되었습니다!<br>잠시 후 메인 화면으로 이동합니다.</p>
          `;

          setTimeout(() => {
            window.location.href = '/';
          }, 2000);

        } catch (err) {
          console.error("인증 처리 중 오류 발생:", err);
          statusBox.innerHTML = `
            <h1 class="error-text">인증 실패</h1>
            <p>토큰 설정 중 서버 통신 에러가 발생했습니다.<br>다시 가입을 진행해주세요.</p>
          `;
        }
      } else {
        // 토큰이 유실되었거나 이미 만료 처리(Outlook 사전 스캔 등)된 상황 대응
        statusBox.innerHTML = `
          <h1 class="error-text">인증 실패</h1>
          <p>링크가 이미 사용되었거나, 유효 시간이 만료되었습니다.</p>
        `;
      }
    }

    // 문서 로드 완료 시 초기 작동 시작
    init();
  </script>
</body>
</html>
