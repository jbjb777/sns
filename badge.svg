<svg xmlns="http://w3.org" viewBox="0 0 400 200" width="100%" height="100%">
  <defs>
    <!-- 그라데이션 정의: 보라색에서 청록색으로 변하는 선형 그라데이션 -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff1ef6; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2038d8; stop-opacity:1" />
    </linearGradient>
    
    <!-- 그림자 효과 정의 (필요시 제거 가능) -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 둥근 모서리 사각형 (rx, ry로 모서리 곡률 조절) -->
  <rect x="20" y="20" width="360" height="160" rx="50" ry="50" fill="url(#grad1)" filter="url(#drop-shadow)" />

  <!-- 중앙 정렬된 텍스트 관리자 역할의 텍스트 요소 -->
  <text x="50%" y="50%" 
        dominant-baseline="middle" 
        text-anchor="middle" 
        fill="#ffffff" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="78" 
        font-weight="bold" 
        letter-spacing="1">
    관리자
  </text>
</svg>
